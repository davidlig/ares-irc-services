# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#canal>"
  short:            "Ștergeți întreaga listă de acces a unui canal."
  help:             |
    Elimină toate intrările de acces din lista de acces a unui canal.
    Această acțiune este ireversibilă și nu poate fi anulată.
    Doar IRCopii cu permisiunea 'chanserv.clearaccess' pot folosi această comandă.

    Sintaxă: CLEARACCESS <#canal>
    Exemple:
      CLEARACCESS #canal
  success:          "\x0303✔\x03 S-au șters \x02%count%\x02 intrări de acces din \x02%channel%\x02."
  empty:            "\x0307ℹ\x03 Canalul \x02%channel%\x02 nu are intrări de acces."

clearusers:
  syntax:           "CLEARUSERS <#canal> [motiv]"
  short:            "Eliminați prin kick toți utilizatorii dintr-un canal."
  help:             |
    Dă kick tuturor utilizatorilor de pe canalul specificat.
    Aceasta este o comandă doar pentru IRCop, folosită pentru administrarea canalelor.
    Se poate furniza un motiv opțional; dacă este omis, se folosește un motiv implicit.

    Doar IRCopii cu permisiunea 'chanserv.clearusers' pot folosi această comandă.

    Sintaxă: CLEARUSERS <#canal> [motiv]
    Exemple:
      CLEARUSERS #canal
      CLEARUSERS #canal flooding
  not_on_network:   "\x0304✗\x03 Canalul \x02%channel%\x02 nu se află în prezent în rețea."
  empty:            "\x0307ℹ\x03 Canalul \x02%channel%\x02 nu are utilizatori cărora să li se dea kick."
  success:          "\x0303✔\x03 S-a dat kick la \x02%count%\x02 utilizator(i) din \x02%channel%\x02."
  default_reason:   "Comanda CLEARUSERS"
