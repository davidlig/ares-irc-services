noexpire:
  syntax:           "NOEXPIRE <#canal> {ON|OFF}"
  short:            "Setați sau eliminați protecția împotriva expirării pentru un canal."
  help:             |
    Controlează dacă un canal va expira din cauza inactivității.
    Când este ON, canalul nu expiră niciodată, indiferent de ultima activitate.
    Când este OFF, se aplică regulile normale de expirare.

    Doar IRCopii cu permisiunea 'chanserv.noexpire' pot folosi această comandă.

    Sintaxă: NOEXPIRE <#canal> {ON|OFF}
    Exemple:
      NOEXPIRE #Important ON
      NOEXPIRE #Important OFF
