# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#canal> {ADD|DEL|VIEW|CLEAR}"
  short:            "Vizualizați sau gestionați istoricul de acțiuni al canalului."
  help:             |
    Gestionați istoricul de acțiuni pentru un canal.
    Doar IRCopii cu permisiunea 'chanserv.history' pot folosi această comandă.

    Subcomenzi:
      ADD   — Adaugă o intrare manuală în istoricul canalului.
      DEL   — Șterge o intrare specifică după ID.
      VIEW  — Vizualizează intrările din istoric (paginat, 3 pe pagină).
      CLEAR — Șterge toate intrările din istoricul canalului.

    Sintaxă: HISTORY <#canal> {ADD|DEL|VIEW|CLEAR} [argumente]
    Exemple:
      HISTORY #canal VIEW
      HISTORY #canal VIEW 2
      HISTORY #canal VIEW ALL
      HISTORY #canal ADD Tentativă suspectă de preluare
      HISTORY #canal DEL 42
      HISTORY #canal CLEAR
  not_registered:   "\x0304✗\x03 Canalul \x02%channel%\x02 nu este înregistrat."
  unknown_operator: "(necunoscut)"

  add:
    syntax:     "HISTORY <#canal> ADD <mesaj>"
    short:      "Adăugați o intrare manuală în istoric."
    help:        |
      Adaugă o intrare manuală în istoricul canalului.
    success:    "\x0303✔\x03 Intrare în istoric adăugată pentru \x02%channel%\x02."

  del:
    syntax:     "HISTORY <#canal> DEL <id>"
    short:      "Ștergeți o intrare din istoric după ID."
    success:    "\x0303✔\x03 Intrarea din istoric \x02%id%\x02 a fost ștearsă."
    not_found:  "\x0304✗\x03 Intrarea din istoric \x02%id%\x02 nu a fost găsită."
    invalid_id: "\x0304✗\x03 ID de intrare invalid: \x02%id%\x02."

  view:
    syntax:     "HISTORY <#canal> VIEW [PAGINĂ|ALL]"
    short:      "Vizualizați istoricul de acțiuni al canalului."
    header:     "\x02Istoric pentru \x0307%channel%\x03\x02 (se afișează %start%-%end% din %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 de %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Nu s-au găsit intrări în istoric pentru \x02%channel%\x02."
    page_hint:   "Folosiți \x0303HISTORY %channel% VIEW %next_page%\x03 pentru mai multe intrări."

  clear:
    syntax:     "HISTORY <#canal> CLEAR"
    short:      "Ștergeți toate intrările din istoricul unui canal."
    success:    "\x0303✔\x03 S-au șters \x02%count%\x02 intrări din istoricul canalului \x02%channel%\x02."

