# --- Nick Protection --------------------------------------------------------
protection:
  nick_in_use:      "\x0304⚠\x03 El nick \x02%nickname%\x02 está registrado. Serás renombrado si no te identificas."
  renamed_to:       "\x0307→\x03 Has sido renombrado a \x02%guest_nick%\x02. Para recuperar tu nick:\n\x0303/msg %bot% IDENTIFY %nickname% <contraseña>\x03"

# --- IRCop Commands ---------------------------------------------------------
userip:
  syntax:           "USERIP <nickname>"
  short:            "Obtiene la dirección IP/Host real del usuario."
  help:             |
    Muestra la dirección IP real y el hostname del usuario especificado.
    Solo disponible para IRCops con permiso 'nickserv.userip'.

    Este comando muestra información sensible del usuario.
    Úsalo con responsabilidad.

    Sintaxis: USERIP <nickname>
    Ejemplo: USERIP SomeUser
  not_online:       "\x0304✗\x03 El usuario \x02%nick%\x02 no está conectado."
  result:           "\x0307ℹ\x03 Usuario: \x02%nick%\x02 | IP: \x0307%ip%\x03 | Host: \x0307%host%\x03"

permissions:
  nickserv.userip:  "Ver la dirección IP/Host real de un usuario (solo IRCop)"
  nickserv.suspend: "Suspender/reactivar un nickname (solo IRCop)"
  nickserv.rename:  "Forzar cambio de nick de un usuario conectado a uno aleatorio (solo IRCop)"
  nickserv.drop:    "Eliminar un nickname registrado (solo IRCop)"

# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <nickname> <duración> <razón>"
  short:            "Suspende un nickname."
  help:             |
    Suspende un nickname, impidiendo que el propietario se identifique.
    La suspensión puede ser temporal o permanente.

    Formatos de duración: \x0303%d\x03 (días), \x0303%h\x03 (horas), \x0303%m\x03 (minutos) o \x03030\x03 (permanente).

    Los usuarios suspendidos no pueden identificarse con su nickname.
    Los operadores IRC y usuarios root no pueden ser suspendidos.

    Sintaxis: SUSPEND <nickname> <duración> <razón>
    Ejemplos:
      SUSPEND MalUsuario 7d Spam en #ayuda
      SUSPEND Abusador 30d Flood repetido
      SUSPEND Problematico 0 Evasión de prohibición
  success:            "\x0303✔\x03 El nickname \x02%nickname%\x02 ha sido suspendido hasta \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 El nickname \x02%nickname%\x02 ya está suspendido."
  not_registered:     "\x0304✗\x03 El nickname \x02%nickname%\x02 no está registrado."
  forbidden:          "\x0304✗\x03 El nickname \x02%nickname%\x02 está prohibido y no puede suspenderse."
  cannot_suspend_oper: "\x0304✗\x03 No se puede suspender al operador IRC \x02%nickname%\x02."
  cannot_suspend_root: "\x0304✗\x03 No se puede suspender al usuario root \x02%nickname%\x02."
  cannot_suspend_service: "\x0304✗\x03 No se puede suspender el nickname de servicio \x02%nickname%\x02."
  invalid_duration:   "\x0304✗\x03 Duración inválida. Usa: \x0303<d><h><m>\x03 (ej: 7d, 12h, 30m) o \x03030\x03 para permanente."
  permanent:          "permanente"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <nickname>"
  short:            "Quita la suspensión de un nickname."
  help:             |
    Quita una suspensión activa de un nickname, permitiendo que el propietario se identifique de nuevo.

    Sintaxis: UNSUSPEND <nickname>
    Ejemplo: UNSUSPEND AlgunUsuario
  success:          "\x0303✔\x03 Se ha levantado la suspensión de \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 El nickname \x02%nickname%\x02 no está registrado."
  not_suspended:    "\x0304✗\x03 El nickname \x02%nickname%\x02 no está suspendido."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <nickname>"
  short:            "Fuerza el cambio de nick de un usuario conectado a uno aleatorio."
  help:             |
    Fuerza a un usuario conectado a cambiar su nickname a uno generado aleatoriamente.
    Útil para hacer cumplir las políticas de la red sin desconectar al usuario.
    
    El formato del nuevo nickname usa el prefijo configurado (%prefix%).
    
    Este comando requiere permiso de IRCop: nickserv.rename
    
    Sintaxis: RENAME <nickname>
    Ejemplo: RENAME Problematico
  not_online:        "\x0304✗\x03 El usuario \x02%nickname%\x02 no está conectado."
  cannot_rename_root: "\x0304✗\x03 No se puede renombrar al usuario root \x02%nickname%\x02."
  cannot_rename_oper: "\x0304✗\x03 No se puede renombrar al IRC operator \x02%nickname%\x02."
  cannot_rename_service: "\x0304✗\x03 No se puede renombrar el nickname de servicio \x02%nickname%\x02."
  success:           "\x0303✓\x03 El usuario \x02%nickname%\x02 ha sido renombrado a \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <nickname>"
  short:            "Elimina un nickname registrado."
  help:             |
    Elimina un nickname registrado de la base de datos.
    Esta acción no se puede deshacer.
    
    Si el usuario está conectado, será renombrado a un nick Guest-.
    Los usuarios root y operadores IRC no pueden ser eliminados.
    No puedes eliminar tu propio nickname.
    
    Este comando requiere permiso de IRCop: nickserv.drop
    
    Sintaxis: DROP <nickname>
    Ejemplo: DROP CuentaAntigua
  not_registered:     "\x0304✗\x03 El nickname \x02%nickname%\x02 no está registrado."
  suspended:         "\x0304✗\x03 El nickname \x02%nickname%\x02 está suspendido. Desuspende primero."
  forbidden:         "\x0304✗\x03 El nickname \x02%nickname%\x02 está prohibido."
  cannot_drop_root:   "\x0304✗\x03 No se puede eliminar al usuario root \x02%nickname%\x02."
  cannot_drop_oper:   "\x0304✗\x03 No se puede eliminar al IRC operator \x02%nickname%\x02."
