# --- Nick Protection --------------------------------------------------------
protection:
  nick_in_use:      "\x0304⚠\x03 El nick \x02%nickname%\x02 está registrado. Serás renombrado si no te identificas."
  renamed_to:       "\x0307→\x03 Has sido renombrado a \x02%guest_nick%\x02. Para recuperar tu nick:\n\x0303/msg %bot% IDENTIFY %nickname% <contraseña>\x03"
  nick_forbidden:   "\x0304✗\x03 El nickname \x02%nickname%\x02 está prohibido: %reason%"

# --- IRCop Commands ---------------------------------------------------------
userip:
  syntax:           "USERIP <nickname>"
  short:            "Obtiene la dirección IP/Host real del nickname."
  help:             |
    Muestra la dirección IP real y el hostname del nickname especificado.
    Solo disponible para IRCops con permiso 'nickserv.userip'.

    Este comando muestra información sensible del nickname.
    Úsalo con responsabilidad.

    Sintaxis: USERIP <nickname>
    Ejemplo: USERIP SomeUser
  not_online:       "\x0304✗\x03 El nickname \x02%nickname%\x02 no está conectado."
  result:           "\x0307ℹ\x03 Nickname: \x02%nickname%\x02 | IP: \x0307%ip%\x03 | Host: \x0307%host%\x03"

permissions:
  nickserv.userip: "Ver la dirección IP/Host real de un nickname"
  nickserv.suspend: "Suspender/reactivar un nickname"
  nickserv.rename: "Forzar cambio de nick de un nickname conectado a uno aleatorio"
  nickserv.drop: "Eliminar un nickname registrado"
  nickserv.saset: "Modificar la configuración de otro nickname"
  nickserv.noexpire: "Activar o desactivar la protección de expiración para un nickname"

# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <nickname> <duración> <razón>"
  short:            "Suspende un nickname."
  help:             |
    Suspende un nickname, impidiendo que el propietario se identifique.
    La suspensión puede ser temporal o permanente.

    Formatos de duración: \x0303%d\x03 (días), \x0303%h\x03 (horas), \x0303%m\x03 (minutos) o \x03030\x03 (permanente).

    Los usuarios suspendidos no pueden identificarse con su nickname.
    Los operadores IRC y usuarios root no pueden ser suspendidos.

    Sintaxis: SUSPEND <nickname> <duración> <razón>
    Ejemplos:
      SUSPEND MalUsuario 7d Spam en #ayuda
      SUSPEND Abusador 30d Flood repetido
      SUSPEND Problematico 0 Evasión de prohibición
  success:            "\x0303✔\x03 El nickname \x02%nickname%\x02 ha sido suspendido hasta \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 El nickname \x02%nickname%\x02 ya está suspendido."
  not_registered:     "\x0304✗\x03 El nickname \x02%nickname%\x02 no está registrado."
  forbidden:          "\x0304✗\x03 El nickname \x02%nickname%\x02 está prohibido y no puede suspenderse."
  cannot_suspend_oper: "\x0304✗\x03 No se puede suspender al operador IRC \x02%nickname%\x02."
  cannot_suspend_root: "\x0304✗\x03 No se puede suspender al usuario root \x02%nickname%\x02."
  cannot_suspend_service: "\x0304✗\x03 No se puede suspender el nickname de servicio \x02%nickname%\x02."
  invalid_duration:   "\x0304✗\x03 Duración inválida. Usa: \x0303<d><h><m>\x03 (ej: 7d, 12h, 30m) o \x03030\x03 para permanente."
  permanent:          "permanente"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <nickname>"
  short:            "Quita la suspensión de un nickname."
  help:             |
    Quita una suspensión activa de un nickname, permitiendo que el propietario se identifique de nuevo.

    Sintaxis: UNSUSPEND <nickname>
    Ejemplo: UNSUSPEND AlgunUsuario
  success:          "\x0303✔\x03 Se ha levantado la suspensión de \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 El nickname \x02%nickname%\x02 no está registrado."
  not_suspended:    "\x0304✗\x03 El nickname \x02%nickname%\x02 no está suspendido."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <nickname>"
  short:            "Fuerza el cambio de nick de un nickname conectado a uno aleatorio."
  help:             |
    Fuerza a un nickname conectado a cambiar su nick a uno generado aleatoriamente.
    Útil para hacer cumplir las políticas de la red sin desconectar al usuario.
    
    El formato del nuevo nickname usa el prefijo configurado (%prefix%).
    
    Este comando requiere permiso de IRCop: nickserv.rename
    
    Sintaxis: RENAME <nickname>
    Ejemplo: RENAME Problematico
  not_online:        "\x0304✗\x03 El nickname \x02%nickname%\x02 no está conectado."
  cannot_rename_root: "\x0304✗\x03 No se puede renombrar al usuario root \x02%nickname%\x02."
  cannot_rename_oper: "\x0304✗\x03 No se puede renombrar al IRC operator \x02%nickname%\x02."
  cannot_rename_service: "\x0304✗\x03 No se puede renombrar el nickname de servicio \x02%nickname%\x02."
  success:           "\x0303✓\x03 El nickname \x02%nickname%\x02 ha sido nombrado a \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <nickname>"
  short:            "Elimina un nickname registrado."
  help:             |
    Elimina un nickname registrado de la base de datos.
    Esta acción no se puede deshacer.
    
    Si el usuario está conectado, será renombrado a un nick Guest-.
    Los usuarios root y operadores IRC no pueden ser eliminados.
    No puedes eliminar tu propio nickname.
    
    Este comando requiere permiso de IRCop: nickserv.drop
    
    Sintaxis: DROP <nickname>
    Ejemplo: DROP CuentaAntigua
  not_registered:     "\x0304✗\x03 El nickname \x02%nickname%\x02 no está registrado."
  suspended:         "\x0304✗\x03 El nickname \x02%nickname%\x02 está suspendido. Desuspende primero."
  forbidden:         "\x0304✗\x03 El nickname \x02%nickname%\x02 está prohibido."
  cannot_drop_root:   "\x0304✗\x03 No se puede eliminar al usuario root \x02%nickname%\x02."
  cannot_drop_oper:   "\x0304✗\x03 No se puede eliminar al IRC operator \x02%nickname%\x02."
  cannot_drop_self:    "\x0304✗\x03 No puedes eliminar tu propio nickname."
  success:            "\x0303✓\x03 El nickname \x02%nickname%\x02 ha sido eliminado."
  cannot_drop_service: "\x0304✗\x03 No se puede eliminar el nickname de servicio \x02%nickname%\x02."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <nickname> <razón>"
  short:            "Prohíbe permanentemente el uso de un nickname."
  help:             |
    Prohíbe el uso de un nickname en la red.
    El nickname no podrá ser registrado ni usado por nadie.
    
    Si el nickname está registrado, será eliminado primero.
    Si alguien lo está usando, será forzado a cambiar a un nick Guest-.
    
    Los usuarios root, operadores IRC y nicknames de servicio no pueden ser prohibidos.
    
    Este comando requiere permiso de IRCop: nickserv.forbid
    
    Sintaxis: FORBID <nickname> <razón>
    Ejemplo: FORBID MalUsuario Violaciones repetidas de política
  success:            "\x0303✔\x03 El nickname \x02%nickname%\x02 ha sido prohibido."
  updated:            "\x0303✔\x03 Se ha actualizado la razón de prohibición para \x02%nickname%\x02."
  reason_required:    "\x0304✗\x03 Debes proporcionar una razón para la prohibición."
  cannot_forbid_root:  "\x0304✗\x03 No se puede prohibir al usuario root \x02%nickname%\x02."
  cannot_forbid_oper:  "\x0304✗\x03 No se puede prohibir al IRC operator \x02%nickname%\x02."
  cannot_forbid_service: "\x0304✗\x03 No se puede prohibir el nickname de servicio \x02%nickname%\x02."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <nickname>"
  short:            "Elimina la prohibición de un nickname."
  help:             |
    Elimina la prohibición de un nickname, permitiendo que pueda usarse nuevamente.
    
    Este comando requiere permiso de IRCop: nickserv.forbid
    
    Sintaxis: UNFORBID <nickname>
    Ejemplo: UNFORBID AlgunNick
  success:          "\x0303✔\x03 El nickname \x02%nickname%\x02 ya no está prohibido."
  not_forbidden:    "\x0304✗\x03 El nickname \x02%nickname%\x02 no está prohibido."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST ADD|DEL|LIST [patrón]"
  short:            "Gestiona vhosts prohibidos."
  help:             |
    Gestiona patrones que impiden a los usuarios establecer vhosts
    coincidentes vía %bot% SET VHOST.
    
    Comodines: * coincide con cualquier secuencia, ? coincide con un caracter.
    Ejemplo: *.pirata.com bloquea cualquier vhost que termine en .pirata.com
    
    Este comando requiere permiso de IRCop: nickserv.forbidvhost
    
    Subcomandos:
      ADD <patrón>    Agregar un patrón prohibido
      DEL <patrón>    Eliminar un patrón prohibido
      LIST            Mostrar todos los patrones prohibidos
  
  unknown_sub: "\x0304✗\x03 Subcomando desconocido \x02%sub%\x02. Usa ADD, DEL o LIST."
  
  add:
    syntax:      "FORBIDVHOST ADD <patrón>"
    short:       "Agregar un patrón de vhost prohibido."
    help:        |
      Agrega un patrón a la lista de vhosts prohibidos. Los usuarios no podrán
      establecer vhosts que coincidan con este patrón vía SET VHOST.
      
      Comodines: * coincide con cualquier secuencia, ? coincide con un caracter.
      
      Sintaxis: FORBIDVHOST ADD <patrón>
      Ejemplo: FORBIDVHOST ADD *.pirata.com
    done:            "\x0303✓\x03 Patrón de vhost prohibido agregado: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 El patrón \x02%pattern%\x02 ya existe."
    invalid:          "\x0304✗\x03 Formato de patrón de vhost inválido."
  
  del:
    syntax:      "FORBIDVHOST DEL <patrón>"
    short:       "Eliminar un patrón de vhost prohibido."
    help:        |
      Elimina un patrón de la lista de vhosts prohibidos.
      
      Sintaxis: FORBIDVHOST DEL <patrón>
      Ejemplo: FORBIDVHOST DEL *.pirata.com
    done:        "\x0303✓\x03 Patrón de vhost prohibido eliminado: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 Patrón \x02%pattern%\x02 no encontrado."
  
  list:
    short:       "Listar todos los patrones de vhost prohibidos."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Muestra todos los patrones de vhost prohibidos.
      
      Sintaxis: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Patrones de vhost prohibidos (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — por %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 No hay patrones de vhost prohibidos."
    unknown_creator: "desconocido"

# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <nickname> {ON|OFF}"
  short:            "Activa o desactiva la protección de expiración para un nickname."
  help:             |
    Controla si un nickname expirará por inactividad.
    Con ON, el nickname nunca expira independientemente de su última actividad.
    Con OFF, se aplican las reglas normales de expiración.
    
    Solo los IRCops con permiso 'nickserv.noexpire' pueden usar este comando.
    
    Sintaxis: NOEXPIRE <nickname> {ON|OFF}
    Ejemplos:
      NOEXPIRE UsuarioImportante ON
      NOEXPIRE UsuarioImportante OFF
  success_on:       "\x0303✔\x03 El nickname \x02%nickname%\x02 está ahora protegido contra expiración."
  success_off:      "\x0303✔\x03 El nickname \x02%nickname%\x02 expirará normalmente."
  not_registered:   "\x0304✗\x03 El nickname \x02%nickname%\x02 no está registrado."
  forbidden:         "\x0304✗\x03 El nickname \x02%nickname%\x02 está prohibido."
  suspended:         "\x0304✗\x03 El nickname \x02%nickname%\x02 está suspendido."

# --- DEBUG -------------------------------------------------------------------
debug:
  action_message: "%operator% ejecuta el comando %command% sobre %target%. %reason%"
  action_with_option: "%operator% ejecuta el comando %command% sobre %target%. Opción: %option%. %reason%"
  action_with_value: "%operator% ejecuta el comando %command% sobre %target%. Opción: %option%=%value%. %reason%"
  action_duration: "%operator% ejecuta el comando %command% sobre %target%. Duración: %duration%. %reason%"
  prefix_reason: "Razón: %reason%"
