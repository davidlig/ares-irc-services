# NickServ translations — Español
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02        bold on/off
#   \x03NN      color (DECIMAL: 03=verde, 04=rojo, 07=naranja, 14=gris oscuro)
#   \x03        reset color
#   \x0F        reset all formatting
#
# NOTA: Los colores IRC usan números DECIMALES (0-15), no hexadecimales.
#   \x0314 = gris oscuro (14 decimal)  ← CORRECTO
#   \x030F = color 0 + letra "F"       ← ERROR (0F es hex, no decimal)

unknown_command: "\x0304✗\x03 Comando desconocido \x02%command%\x02. Usa \x0303/msg NickServ HELP\x03."

error:
  syntax:         "\x0304✗\x03 Sintaxis incorrecta. Uso: \x02%syntax%\x02"
  oper_only:      "\x0304✗\x03 Este comando está restringido a Operadores IRC."
  not_identified: "\x0304✗\x03 No estás identificado. Usa \x0303/msg NickServ IDENTIFY <nickname> <contraseña>\x03"
  mail_failed:    "\x0304✗\x03 No se pudo enviar el correo. Comprueba tu dirección o inténtalo más tarde."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <contraseña> <email>"
  short:            "Registra tu nick en los servicios."
  help:             "Inicia el registro de tu apodo actual. Se enviará un token de verificación\nal correo indicado. El registro se completará cuando ejecutes\n\x0303/msg NickServ VERIFY <token>\x03. El token expira en 1 hora.\nSi no te llega, revisa la carpeta de spam o usa \x0303RESEND\x03."
  pending:          "\x0307→\x03 Se ha enviado un token de verificación a \x02%email%\x02.\n  Ejecuta \x0303/msg NickServ VERIFY <token>\x03 para completar el registro.\n  ¿No te llega? Revisa spam o usa \x0303/msg NickServ RESEND\x03\n  El token expirará en \x021 hora\x02."
  already_registered: "\x0304✗\x03 El nickname \x02%nickname%\x02 ya está registrado."
  already_pending:  "\x0304✗\x03 El nickname \x02%nickname%\x02 ya tiene un registro pendiente de verificación.\n  Usa \x0303/msg NickServ VERIFY <token>\x03 o \x0303/msg NickServ RESEND\x03."
  forbidden:        "\x0304✗\x03 El nickname \x02%nickname%\x02 no puede ser registrado en esta red."
  invalid_email:    "\x0304✗\x03 La dirección de correo electrónico no es válida."
  email_already_used: "\x0304✗\x03 El correo \x02%email%\x02 ya está en uso por otra cuenta. Usa otra dirección."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "Confirma tu dirección de email y activa tu cuenta."
  help:             "Completa el registro verificando el token enviado a tu correo.\nEl token tiene una validez de 1 hora desde el momento del registro."
  success:          "\x0303✔\x03 El nickname \x02%nickname%\x02 ha sido registrado y ya estás identificado."
  invalid_token:    "\x0304✗\x03 El token no es válido o ha expirado. Usa \x0303/msg NickServ REGISTER\x03 para iniciar el proceso de nuevo."
  no_pending:       "\x0304✗\x03 No tienes ningún registro pendiente de verificación."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Reenvía el token de verificación a tu correo."
  help:             "Reenvía el token de verificación a la dirección de correo indicada\ndurante el registro. Solo funciona si tienes un registro pendiente."
  success:          "\x0307→\x03 Token de verificación reenviado a \x02%email%\x02."
  no_pending:       "\x0304✗\x03 No tienes ningún registro pendiente de verificación."
  throttled:        "\x0304✗\x03 Debes esperar \x02%minutes%\x02 minuto(s) antes de solicitar otro correo de verificación."

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <nickname> <contraseña>"
  short:            "Acredita tu identidad como dueño de un nickname."
  help:             "Autentica tu sesión con NickServ indicando tu nickname y contraseña.\nTras identificarte recibirás el modo registrado \x02+r\x02 y, si estabas usando\nun nick de invitado, recuperarás tu nick registrado automáticamente."
  success:          "\x0303✔\x03 Ahora estás identificado como \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 Ya estás identificado como \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 El nickname \x02%nickname%\x02 no está registrado."
  invalid_credentials: "\x0304✗\x03 Contraseña incorrecta. Inténtalo de nuevo."
  ghost_released:   "\x0307⚡\x03 La sesión fantasma que ocupaba \x02%nickname%\x02 ha sido desconectada."
  kill_reason:      "Nick %nickname% reclamado por %source% (el propietario registrado se ha identificado)"
  pending:          "\x0304✗\x03 El nickname \x02%nickname%\x02 está pendiente de verificación de email.\n  Ejecuta \x0303/msg NickServ VERIFY <token>\x03 o \x0303/msg NickServ RESEND\x03."
  suspended:        "\x0304✗\x03 El nickname \x02%nickname%\x02 está suspendido. Motivo: %reason%"
  forbidden:        "\x0304✗\x03 El nickname \x02%nickname%\x02 no puede ser utilizado en esta red."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <nickname>"
  short:            "Muestra el estado de registro de un nickname."
  help:             "Muestra el estado actual de un nickname: si está registrado,\npendiente de verificación, suspendido o prohibido."
  header:           "\x02Estado del nick \x0307%nickname%\x03:\x02"
  unregistered:     "  Estado          : Sin registrar"
  not_registered_offline: "  Estado          : \x0315No registrado\x03"
  pending:          "  Estado          : \x0307Pendiente de validación\x03"
  pending_expires:  "  Expira en       : %minutes% minuto(s)"
  not_connected:    "  Estado          : \x0315No conectado\x03"
  not_identified:   "  Estado          : \x0307No identificado\x03"
  identified:       "  Estado          : \x0303Identificado\x03"
  suspended:        "  Estado          : \x0304Suspendido\x03"
  suspended_reason: "  Motivo          : %reason%"
  forbidden:        "  Estado          : \x0304Prohibido\x03"
  forbidden_reason: "  Motivo          : %reason%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <nickname>"
  short:            "Muestra la información de un nickname registrado."
  help:             "Muestra los datos de registro de un nickname: fecha de alta, estado de\nconexión, último mensaje de salida y correo electrónico. El correo solo es\nvisible para el propietario identificado. Con PRIVATE ON solo el dueño y\nlos Operadores IRC pueden ver la información."
  not_registered:   "\x0304✗\x03 El nickname \x02%nickname%\x02 no está registrado."
  private:          "\x0304✗\x03 La información del nickname \x02%nickname%\x02 es privada."
  header:           "\x02Información del usuario \x0307%nickname%\x03:\x02"
  status:           "  Estado          : %status%"
  status_registered:  "\x0303Registrado\x03"
  status_suspended:   "\x0304Suspendido\x03"
  status_forbidden:   "\x0304Prohibido\x03"
  reason:            "  Motivo          : %reason%"
  registered_at:    "  Fecha registro  : %date%"
  last_seen_online: "  \x0314Última conexión\x03 : \x0303● CONECTADO AHORA\x03"
  last_seen_at:     "  \x0314Última conexión\x03 : %date%"
  last_seen_never:  "  \x0314Última conexión\x03 : Nunca"
  last_quit:        "  \x0314Último mensaje\x03  : %message%"
  email:            "  \x0314Correo\x03          : %email%"
  vhost:            "  \x0314VHost\x03            : %vhost%"
  footer:           "\x0314─────────────────────────────\x03"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <opción> <valor>"
  short:            "Modifica la configuración de tu cuenta."
  help:             "Modifica la configuración de tu cuenta de NickServ.\nDebes estar identificado para usar este comando."
  unknown_option:   "\x0304✗\x03 Opción desconocida \x02%option%\x02. Opciones disponibles: %options%."

  password:
    syntax:         "SET PASSWORD <nueva_contraseña>"
    short:          "Cambia la contraseña de tu cuenta."
    help:           "Cambia la contraseña de acceso a tu cuenta. La nueva contraseña entra en\nvigor de inmediato. Elige una contraseña segura de al menos 6 caracteres\nque no uses en otros servicios."
    success:        "\x0303✔\x03 Tu contraseña ha sido actualizada correctamente."

  email:
    syntax:         "SET EMAIL <nuevo_email> [token]"
    short:          "Cambia el correo electrónico de tu cuenta (confirmación en dos pasos)."
    help:           "Cambio de correo en dos pasos por seguridad.\n1) \x0303SET EMAIL <nuevo_email>\x03 — se envía un token a tu correo actual.\n2) \x0303SET EMAIL <nuevo_email> <token>\x03 — confirmas con el token recibido.\nEl token expira en 1 hora."
    success:        "\x0303✔\x03 Tu correo ha sido actualizado a \x02%email%\x02."
    pending_sent:   "\x0307→\x03 Se ha enviado un token de confirmación a \x02%current_email%\x02.\n  Para confirmar el cambio a \x02%new_email%\x02 ejecuta:\n  \x0303/msg NickServ SET EMAIL %new_email% <token>\x03\n  El token expira en 1 hora."
    invalid_token:  "\x0304✗\x03 El token no es válido o ha expirado. Solicita uno nuevo con \x0303SET EMAIL <nuevo_email>\x03."

  language:
    syntax:         "SET LANGUAGE <código>"
    short:          "Cambia el idioma en el que los servicios se comunican contigo."
    help:           "Cambia el idioma en el que NickServ y el resto de servicios se dirigen\na ti. Idiomas disponibles: \x02es\x02 (español), \x02en\x02 (inglés)."
    success:        "\x0303✔\x03 Idioma cambiado a \x02%language%\x02."
    invalid:        "\x0304✗\x03 Idioma no soportado. Idiomas disponibles: %languages%."

  private:
    syntax:         "SET PRIVATE ON|OFF"
    short:          "Activa o desactiva la privacidad de tu información."
    help:           "Controla la visibilidad de tu información en el comando INFO.\nCon \x02PRIVATE ON\x02 solo tú y los Operadores IRC podrán ver tus datos.\nCon \x02PRIVATE OFF\x02 la información es pública para todos."
    on:             "\x0303✔\x03 La información de tu cuenta es ahora \x02privada\x02."
    off:            "\x0303✔\x03 La información de tu cuenta es ahora \x02pública\x02."

  vhost:
    syntax:         "SET VHOST <vhost>|OFF"
    short:          "Establece o quita tu host virtual (hostname visible)."
    help:           "Establece un hostname personalizado que otros ven cuando estás identificado.\nUsa \x02SET VHOST OFF\x02 para quitarlo y usar tu host/cloak por defecto. Solo se\npermiten letras, dígitos, guiones y puntos; máximo 255 caracteres."
    success:        "\x0303✔\x03 Tu host virtual se ha establecido a \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 Tu host virtual ha sido eliminado."
    invalid:        "\x0304✗\x03 Vhost no válido. Usa solo letras, dígitos, guiones y puntos (máx. 255 caracteres)."

# --- HELP -------------------------------------------------------------------
help:
  syntax:           "HELP [comando]"
  short:            "Muestra la ayuda de los comandos de NickServ."
  help:             "Muestra la ayuda general de NickServ o la información detallada\nde un comando concreto."
  header_title:     "NickServ"
  intro:            "Gestión y protección de nicknames en la red IRC."
  general_header:   "\x02\x0314Comandos disponibles:\x03\x0F"
  command_line:     "  \x0307%command%\x03%description%"
  subcommand_line:  "  \x0307%command%\x03%description%"
  options_header:   "\x02\x0314Opciones:\x03\x0F"
  general_footer:   "Usa \x0303/msg NickServ HELP <comando>\x03 para más información."
  set_sub_footer:   "Usa \x0303/msg NickServ HELP %command% <opción>\x03 para más información."
  command_header:   "\x02Ayuda para %command%:\x02"
  syntax_label:     "\x0307Sintaxis:\x03 \x02%syntax%\x02"
  footer:           "\x0314─────────────────────────────\x03"
  unknown_command:  "\x0304✗\x03 No hay ayuda disponible para \x02%command%\x02."

# --- Nick Protection --------------------------------------------------------
protection:
  nick_in_use:      "\x0304⚠\x03 El nick \x02%nickname%\x02 está registrado. Serás renombrado si no te identificas."
  renamed_to:       "\x0307→\x03 Has sido renombrado a \x02%guest_nick%\x02. Para recuperar tu nick:\n\x0303/msg NickServ IDENTIFY %nickname% <contraseña>\x03"
