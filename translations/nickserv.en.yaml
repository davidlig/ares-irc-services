# NickServ translations — English
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02        bold on/off
#   \x03NN      color (DECIMAL: 03=green, 04=red, 07=orange, 14=dark grey)
#   \x03        reset color
#   \x0F        reset all formatting
#
# NOTE: IRC colors use DECIMAL numbers (0-15), not hexadecimal.
#   \x0314 = dark grey (14 decimal)  ← CORRECT
#   \x030F = color 0 + letter "F"    ← WRONG (0F is hex, not decimal)

unknown_command: "\x0304✗\x03 Unknown command \x02%command%\x02. Use \x0303/msg NickServ HELP\x03."

error:
  syntax:         "\x0304✗\x03 Incorrect syntax. Usage: \x02%syntax%\x02"
  oper_only:      "\x0304✗\x03 This command is restricted to IRC Operators."
  not_identified: "\x0304✗\x03 You are not identified. Use \x0303/msg NickServ IDENTIFY <nickname> <password>\x03"
  mail_failed:    "\x0304✗\x03 The email could not be sent. Check your address or try again later."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <password> <email>"
  short:            "Register your nickname with the services."
  help:             "Starts the registration of your current nickname. A verification token\nwill be sent to the provided email address. Complete the registration\nby running \x0303/msg NickServ VERIFY <token>\x03. The token expires in 1 hour.\nIf it does not arrive, check your spam folder or use \x0303RESEND\x03."
  pending:          "\x0307→\x03 A verification token has been sent to \x02%email%\x02.\n  Run \x0303/msg NickServ VERIFY <token>\x03 to complete registration.\n  Didn't receive it? Check spam or use \x0303/msg NickServ RESEND\x03\n  The token will expire in \x021 hour\x02."
  already_registered: "\x0304✗\x03 Nickname \x02%nickname%\x02 is already registered."
  already_pending:  "\x0304✗\x03 Nickname \x02%nickname%\x02 already has a pending verification.\n  Use \x0303/msg NickServ VERIFY <token>\x03 or \x0303/msg NickServ RESEND\x03."
  forbidden:        "\x0304✗\x03 Nickname \x02%nickname%\x02 cannot be registered on this network."
  invalid_email:    "\x0304✗\x03 The email address provided is not valid."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "Confirm your email address and activate your account."
  help:             "Completes the registration by verifying the token sent to your email.\nThe token is valid for 1 hour from the moment of registration."
  success:          "\x0303✔\x03 Nickname \x02%nickname%\x02 has been successfully registered and you are now identified."
  invalid_token:    "\x0304✗\x03 The token is invalid or has expired. Use \x0303/msg NickServ REGISTER\x03 to start over."
  no_pending:       "\x0304✗\x03 You have no pending registration to verify."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Resend the verification token to your email."
  help:             "Resends the verification token to the email address provided during\nregistration. Only works if you have a pending registration."
  success:          "\x0307→\x03 Verification token resent to \x02%email%\x02."
  no_pending:       "\x0304✗\x03 You have no pending registration to resend a token for."
  throttled:        "\x0304✗\x03 You must wait \x02%minutes%\x02 minute(s) before requesting another verification email."

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <nickname> <password>"
  short:            "Identify yourself as the owner of a nickname."
  help:             "Authenticates your session with NickServ using your nickname and password.\nAfter a successful identification you will receive the registered mode \x02+r\x02\nand, if you were using a guest nick, your registered nick will be restored."
  success:          "\x0303✔\x03 You are now identified as \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 You are already identified as \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 is not registered."
  invalid_credentials: "\x0304✗\x03 Incorrect password. Please try again."
  ghost_released:   "\x0307⚡\x03 The ghost session holding \x02%nickname%\x02 has been disconnected."
  kill_reason:      "Nick %nickname% reclaimed by %source% (the registered owner has identified)"
  pending:          "\x0304✗\x03 Nickname \x02%nickname%\x02 is pending email verification.\n  Run \x0303/msg NickServ VERIFY <token>\x03 or \x0303/msg NickServ RESEND\x03."
  suspended:        "\x0304✗\x03 Nickname \x02%nickname%\x02 is suspended. Reason: %reason%"
  forbidden:        "\x0304✗\x03 Nickname \x02%nickname%\x02 cannot be used on this network."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <nickname>"
  short:            "Display the registration status of a nickname."
  help:             "Shows the current status of a nickname: registered, pending verification,\nsuspended, or forbidden."
  header:           "\x02Status of nick \x0307%nickname%\x03:\x02"
  unregistered:     "  Status          : Not registered"
  not_registered_offline: "  Status          : \x0315Not registered\x03"
  pending:          "  Status          : \x0307Pending verification\x03"
  pending_expires:  "  Expires in      : %minutes% minute(s)"
  not_connected:    "  Status          : \x0315Not connected\x03"
  not_identified:   "  Status          : \x0307Not identified\x03"
  identified:       "  Status          : \x0303Identified\x03"
  suspended:        "  Status          : \x0304Suspended\x03"
  suspended_reason: "  Reason          : %reason%"
  forbidden:        "  Status          : \x0304Forbidden\x03"
  forbidden_reason: "  Reason          : %reason%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <nickname>"
  short:            "Display information about a registered nickname."
  help:             "Shows registration details for a nickname: registration date, connection\nstatus, last quit message, and email address. The email is only visible to\nthe owner when identified. With PRIVATE ON only the owner and IRC Operators\ncan view the information."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 is not registered."
  private:          "\x0304✗\x03 Nickname \x02%nickname%\x02 information is private."
  header:           "\x02Information for nickname \x0307%nickname%\x03:\x02"
  status:           "  Status          : %status%"
  status_registered:  "\x0303Registered\x03"
  status_suspended:   "\x0304Suspended\x03"
  status_forbidden:   "\x0304Forbidden\x03"
  reason:            "  Reason          : %reason%"
  registered_at:    "  Registered      : %date%"
  last_seen_online: "  \x0314Last seen\x03      : \x0303● NOW ONLINE\x03"
  last_seen_at:     "  \x0314Last seen\x03      : %date%"
  last_seen_never:  "  \x0314Last seen\x03      : Never"
  last_quit:        "  \x0314Last quit msg\x03  : %message%"
  email:            "  \x0314Email\x03          : %email%"
  vhost:            "  \x0314VHost\x03           : %vhost%"
  footer:           "\x0314─────────────────────────────\x03"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <option> <value>"
  short:            "Change your NickServ account settings."
  help:             "Modifies your NickServ account settings.\nYou must be identified to use this command."
  unknown_option:   "\x0304✗\x03 Unknown option \x02%option%\x02. Available options: %options%."

  password:
    syntax:         "SET PASSWORD <new_password>"
    short:          "Change your account password."
    help:           "Changes the password for your NickServ account. The new password takes\neffect immediately. Choose a strong password of at least 6 characters\nthat you do not use on other services."
    success:        "\x0303✔\x03 Your password has been updated successfully."

  email:
    syntax:         "SET EMAIL <new_email> [token]"
    short:          "Change the email address linked to your account (two-step confirmation)."
    help:           "Email change in two steps for security.\n1) \x0303SET EMAIL <new_email>\x03 — a token is sent to your current email.\n2) \x0303SET EMAIL <new_email> <token>\x03 — confirm with the token received.\nThe token expires in 1 hour."
    success:        "\x0303✔\x03 Your email has been updated to \x02%email%\x02."
    pending_sent:   "\x0307→\x03 A confirmation token has been sent to \x02%current_email%\x02.\n  To confirm the change to \x02%new_email%\x02 run:\n  \x0303/msg NickServ SET EMAIL %new_email% <token>\x03\n  The token expires in 1 hour."
    invalid_token:  "\x0304✗\x03 The token is invalid or has expired. Request a new one with \x0303SET EMAIL <new_email>\x03."

  language:
    syntax:         "SET LANGUAGE <code>"
    short:          "Change the language the services use to communicate with you."
    help:           "Changes the language NickServ and other services use when talking to you.\nAvailable languages: \x02es\x02 (Spanish), \x02en\x02 (English)."
    success:        "\x0303✔\x03 Language changed to \x02%language%\x02."
    invalid:        "\x0304✗\x03 Unsupported language. Available languages: %languages%."

  private:
    syntax:         "SET PRIVATE ON|OFF"
    short:          "Enable or disable privacy for your account information."
    help:           "Controls the visibility of your account information in the INFO command.\nWith \x02PRIVATE ON\x02 only you and IRC Operators can view your details.\nWith \x02PRIVATE OFF\x02 your information is public to everyone."
    on:             "\x0303✔\x03 Your account information is now \x02private\x02."
    off:            "\x0303✔\x03 Your account information is now \x02public\x02."

  vhost:
    syntax:         "SET VHOST <vhost>|OFF"
    short:          "Set or clear your custom virtual host (displayed hostname)."
    help:           "Sets a custom hostname that others see when you are identified.\nUse \x02SET VHOST OFF\x02 to clear it and use your default/cloak. Only letters,\ndigits, hyphens and dots are allowed; max 255 characters."
    success:        "\x0303✔\x03 Your virtual host has been set to \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 Your virtual host has been cleared."
    invalid:       "\x0304✗\x03 Invalid vhost. Use only letters, digits, hyphens and dots (max 255 characters)."

# --- HELP -------------------------------------------------------------------
help:
  syntax:           "HELP [command]"
  short:            "Display help for NickServ commands."
  help:             "Displays general NickServ help or detailed information\nfor a specific command."
  header_title:     "NickServ"
  intro:            "Nickname registration and protection service for the IRC network."
  general_header:   "\x02\x0314Available commands:\x03\x0F"
  command_line:     "  \x0307%command%\x03%description%"
  subcommand_line:  "  \x0307%command%\x03%description%"
  options_header:   "\x02\x0314Options:\x03\x0F"
  general_footer:   "Use \x0303/msg NickServ HELP <command>\x03 for more information."
  set_sub_footer:   "Use \x0303/msg NickServ HELP %command% <option>\x03 for more information."
  command_header:   "\x02Help for %command%:\x02"
  syntax_label:     "\x0307Syntax:\x03 \x02%syntax%\x02"
  footer:           "\x0314─────────────────────────────\x03"
  unknown_command:  "\x0304✗\x03 No help available for \x02%command%\x02."

# --- Nick Protection --------------------------------------------------------
protection:
  nick_in_use:      "\x0304⚠\x03 Nick \x02%nickname%\x02 is registered. You will be renamed if you do not identify."
  renamed_to:       "\x0307→\x03 You have been renamed to \x02%guest_nick%\x02. To reclaim your nick:\n\x0303/msg NickServ IDENTIFY %nickname% <password>\x03"
