# NickServ translations — English
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02        bold on/off
#   \x03NN      color (DECIMAL: 03=green, 04=red, 07=orange, 14=dark grey)
#   \x03        reset color
#   \x0F        reset all formatting
#
# NOTE: IRC colors use DECIMAL numbers (0-15), not hexadecimal.
#   \x0314 = dark grey (14 decimal)  ← CORRECT
#   \x030F = color 0 + letter "F"    ← WRONG (0F is hex, not decimal)

unknown_command: "\x0304✗\x03 Unknown command \x02%command%\x02. Use \x0303/msg %bot% HELP\x03."

error:
  syntax:         "\x0304✗\x03 Incorrect syntax. Usage: \x02%syntax%\x02"
  oper_only:      "\x0304✗\x03 This command is restricted to IRC Operators."
  not_identified: "\x0304✗\x03 You are not identified. Use \x0303/msg %bot% IDENTIFY <nickname> <password>\x03"
  mail_failed:    "\x0304✗\x03 The email could not be sent. Check your address or try again later."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <password> <email>"
  short:            "Register your nickname with the services."
  help:             "Starts the registration of your current nickname. A verification token\nwill be sent to the provided email address. Complete the registration\nby running \x0303/msg %bot% VERIFY <token>\x03. The token expires in 1 hour.\nIf it does not arrive, check your spam folder or use \x0303RESEND\x03."
  pending:          "\x0307→\x03 A verification token has been sent to \x02%email%\x02.\n  Run \x0303/msg %bot% VERIFY <token>\x03 to complete registration.\n  Didn't receive it? Check spam or use \x0303/msg %bot% RESEND\x03\n  The token will expire in \x021 hour\x02."
  already_registered: "\x0304✗\x03 Nickname \x02%nickname%\x02 is already registered."
  already_pending:  "\x0304✗\x03 Nickname \x02%nickname%\x02 already has a pending verification.\n  Use \x0303/msg %bot% VERIFY <token>\x03 or \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 Nickname \x02%nickname%\x02 cannot be registered on this network."
  invalid_email:    "\x0304✗\x03 The email address provided is not valid."
  email_already_used: "\x0304✗\x03 The email \x02%email%\x02 is already in use by another account. Use a different address."
  throttled:          "\x0304✗\x03 You must wait \x02%minutes%\x02 minute(s) before trying to register again."
  guest_prefix_forbidden: "\x0304✗\x03 You cannot register a nick starting with \x02%prefix%\x02."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "Confirm your email address and activate your account."
  help:             "Completes the registration by verifying the token sent to your email.\nThe token is valid for 1 hour from the moment of registration."
  success:          "\x0303✔\x03 Nickname \x02%nickname%\x02 has been successfully registered and you are now identified."
  invalid_token:    "\x0304✗\x03 The token is invalid or has expired. Use \x0303/msg %bot% REGISTER\x03 to start over."
  no_pending:       "\x0304✗\x03 You have no pending registration to verify."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Resend the verification token to your email."
  help:             "Resends the verification token to the email address provided during\nregistration. Only works if you have a pending registration."
  success:          "\x0307→\x03 Verification token resent to \x02%email%\x02."
  no_pending:       "\x0304✗\x03 You have no pending registration to resend a token for."
  throttled:        "\x0304✗\x03 You must wait \x02%minutes%\x02 minute(s) before requesting another verification email."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <nickname> [token]"
  short:            "Recover your account if you lost your password."
  help:             "Recovers access to a registered account when you have lost your password.\n1) \x0303RECOVER <nickname>\x03 — a token is sent to the account's email.\n2) \x0303RECOVER <nickname> <token>\x03 — enter the token from the email to reset your password.\nYou will then receive a temporary password and the command to change it."
  email_sent:       "\x0307→\x03 A recovery token has been sent to \x02%email_hint%\x02. Check your inbox (and spam folder)."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 is not registered."
  pending:          "\x0304✗\x03 Nickname \x02%nickname%\x02 is pending email verification."
  suspended:        "\x0304✗\x03 Nickname \x02%nickname%\x02 is suspended. Reason: %reason%"
  forbidden:        "\x0304✗\x03 Nickname \x02%nickname%\x02 cannot be used on this network."
  no_email:         "\x0304✗\x03 No email is set for nickname \x02%nickname%\x02. Recovery is not available."
  throttled:        "\x0304✗\x03 You must wait \x02%minutes%\x02 minute(s) before requesting another recovery email."
  invalid_token:    "\x0304✗\x03 The token is invalid or has expired. Request a new one with \x0303RECOVER %nickname%\x03."
  success_identify: "\x0303✔\x03 Password reset. Identify now: \x0303%identify_cmd%\x03"
  success_then_change: "Then change your password: \x0303/msg %bot% SET PASSWORD <new_password>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <nickname> <password>"
  short:            "Identify yourself as the owner of a nickname."
  help:             "Authenticates your session with %nickserv% using your nickname and password.\nAfter a successful identification you will receive the registered mode \x02+r\x02\nand, if you were using a guest nick, your registered nick will be restored."
  success:          "\x0303✔\x03 You are now identified as \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 You are already identified as \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 is not registered."
  invalid_credentials: "\x0304✗\x03 Incorrect password. Please try again."
  locked_out:         "\x0304✗\x03 Too many failed attempts. Try again in \x02%minutes%\x02 minute(s)."
  ghost_released:   "\x0307⚡\x03 The ghost session holding \x02%nickname%\x02 has been disconnected."
  kill_reason:      "Nick %nickname% reclaimed by %source% (the registered owner has identified)"
  pending:          "\x0304✗\x03 Nickname \x02%nickname%\x02 is pending email verification.\n  Run \x0303/msg %bot% VERIFY <token>\x03 or \x0303/msg %bot% RESEND\x03."
  suspended:        "\x0304✗\x03 Nickname \x02%nickname%\x02 is suspended. Reason: %reason%"
  forbidden:        "\x0304✗\x03 Nickname \x02%nickname%\x02 cannot be used on this network."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <nickname>"
  short:            "Display the registration status of a nickname."
  help:             "Shows the current status of a nickname: registered, pending verification,\nsuspended, or forbidden."
  header:           "\x02Status of nick \x0307%nickname%\x03:\x02"
  unregistered:     "  Status          : Not registered"
  not_registered_offline: "  Status          : \x0315Not registered\x03"
  pending:          "  Status          : \x0307Pending verification\x03"
  pending_expires:  "  Expires in      : %minutes% minute(s)"
  pending_expires_at: "  Expires at      : %date%"
  not_connected:    "  Status          : \x0315Not connected\x03"
  not_identified:   "  Status          : \x0307Not identified\x03"
  identified:       "  Status          : \x0303Identified\x03"
  suspended:        "  Status          : \x0304Suspended\x03"
  suspended_reason: "  Reason          : %reason%"
  suspended_until:  "  Ends on         : %date%"
  suspended_permanent: "  Ends on         : Permanent"
  forbidden:        "  Status          : \x0304Forbidden\x03"
  forbidden_reason: "  Reason          : %reason%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <nickname>"
  short:            "Display information about a registered nickname."
  help:             "Shows registration details for a nickname: registration date, connection\nstatus, last quit message, and email address. The email is only visible to\nthe owner when identified. With PRIVATE ON only the owner and IRC Operators\ncan view the information."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 is not registered."
  private:          "\x0304✗\x03 Nickname \x02%nickname%\x02 information is private."
  header:           "\x02Information for nickname \x0307%nickname%\x03:\x02"
  status:           "  \x0314Status\x03          : %status%"
  status_registered:  "\x0303Registered\x03"
  status_suspended:   "\x0304Suspended\x03"
  status_forbidden:   "\x0304Forbidden\x03"
  reason:            "  \x0314Reason\x03          : %reason%"
  suspended_until:   "  \x0314Ends on\x03        : %date%"
  suspended_permanent: "  \x0314Ends on\x03        : Permanent"
  registered_at:    "  \x0314Registered\x03      : %date%"
  last_seen_online: "  \x0314Last seen\x03      : \x0303● NOW ONLINE\x03"
  last_seen_at:     "  \x0314Last seen\x03      : %date%"
  last_seen_never:  "  \x0314Last seen\x03      : Never"
  last_quit:        "  \x0314Last quit msg\x03  : %message%"
  email:            "  \x0314Email\x03          : %email%"
  vhost:            "  \x0314VHost\x03           : %vhost%"
  footer:           "\x0314─────────────────────────────\x03"
  channels_header:  "\x0314\x0AChannels with access:\x03"
  channels_entry_founder:   "  %channel% (\x0303Founder\x03)"
  channels_entry_successor: "  %channel% (\x0303Successor\x03)"
  channels_entry_access:    "  %channel% (%level%)"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <option> <value>"
  short:            "Change your %nickserv% account settings."
  help:             "Modifies your %nickserv% account settings.\nYou must be identified to use this command."
  unknown_option:   "\x0304✗\x03 Unknown option \x02%option%\x02. Available options: %options%."

  password:
    syntax:         "SET PASSWORD <new_password>"
    short:          "Change your account password."
    help:           "Changes the password for your NickServ account. The new password takes\neffect immediately. Choose a strong password of at least 6 characters\nthat you do not use on other services."
    success:        "\x0303✔\x03 Your password has been updated successfully."

  email:
    syntax:         "SET EMAIL <new_email> [token]"
    short:          "Change the email address linked to your account (two-step confirmation)."
    help:           "Email change in two steps for security.\n1) \x0303SET EMAIL <new_email>\x03 — a token is sent to your current email.\n2) \x0303SET EMAIL <new_email> <token>\x03 — confirm with the token received.\nThe token expires in 1 hour."
    success:        "\x0303✔\x03 Your email has been updated to \x02%email%\x02."
    pending_sent:   "\x0307→\x03 A confirmation token has been sent to \x02%current_email%\x02.\n  To confirm the change to \x02%new_email%\x02 run:\n  \x0303/msg %bot% SET EMAIL %new_email% <token>\x03\n  The token expires in 1 hour."
    invalid_token:  "\x0304✗\x03 The token is invalid or has expired. Request a new one with \x0303SET EMAIL <new_email>\x03."

  language:
    syntax:         "SET LANGUAGE <code>"
    short:          "Change the language the services use to communicate with you."
    help:           "Changes the language %nickserv% and other services use when talking to you.\nAvailable languages: \x02es\x02 (Spanish), \x02en\x02 (English)."
    success:        "\x0303✔\x03 Language changed to \x02%language%\x02."
    invalid:        "\x0304✗\x03 Unsupported language. Available languages: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <timezone>"
    short:          "Set the timezone used when displaying dates."
    help:           "Sets the timezone used when %nickserv% shows dates.\nUse \x02HELP SET TIMEZONE\x02 for the region index; \x02HELP SET TIMEZONE <region>\x02 (e.g. Europe) for that region's timezones. Use \x02OFF\x02 to clear."
    success:        "\x0303✔\x03 Timezone set to \x02%timezone%\x02. Dates will be shown in this timezone."
    cleared:        "\x0303✔\x03 Timezone cleared. Dates will use the network default."
    invalid:        "\x0304✗\x03 Invalid timezone \x02%timezone%\x02. Use a valid identifier (e.g. UTC, Europe/Madrid)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Enable or disable privacy for your account information."
    help:           "Controls the visibility of your account information in the INFO command.\nWith \x02PRIVATE ON\x02 only you and IRC Operators can view your details.\nWith \x02PRIVATE OFF\x02 your information is public to everyone."
    on:             "\x0303✔\x03 Your account information is now \x02private\x02."
    off:            "\x0303✔\x03 Your account information is now \x02public\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Use PRIVMSG (ON) or NOTICE (OFF) for service replies."
    help:           "Controls how %nickserv% and other services send messages to you.\nWith \x02MSG ON\x02 replies are sent as \x02PRIVMSG\x02 (some clients may trigger replies or notifications).\nWith \x02MSG OFF\x02 replies are sent as \x02NOTICE\x02 (default; typically no auto-reply)."
    on:             "\x0303✔\x03 Service messages will now be sent as \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 Service messages will now be sent as \x02NOTICE\x02."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Set or clear your custom virtual host (displayed hostname)."
    help:           "Sets a custom hostname that others see when you are identified.\nUse \x02SET VHOST OFF\x02 to clear it. Only letters (a-z, A-Z), digits, hyphen and dot;\nno hyphen or dot at start/end of any block; max 48 characters. Unique per account."
    success:        "\x0303✔\x03 Your virtual host has been set to \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 Your virtual host has been cleared."
    invalid:        "\x0304✗\x03 Invalid vhost. Only letters, digits, hyphen and dot (not at start/end of block); max 48 characters."
    taken:          "\x0304✗\x03 That vhost is already in use by another account."

# --- HELP -------------------------------------------------------------------
help:
  syntax:           "HELP [command]"
  short:            "Display help for %nickserv% commands."
  help:             "Displays general %nickserv% help or detailed information\nfor a specific command."
  header_title:     "%bot%"
  intro:            "Nickname registration and protection service for the IRC network."
  intro_expiration: "NOTE: Nicknames \x0304\x1Funused\x0F for more than %days% days are automatically removed."
  general_header:   "\x02\x0314Available commands:\x03\x0F"
  command_line:     "  \x0307%command%\x03%description%"
  subcommand_line:  "  \x0307%command%\x03%description%"
  options_header:   "\x02\x0314Options:\x03\x0F"
  general_footer:   "Use \x0303/msg %bot% HELP <command>\x03 for more information."
  set_sub_footer:   "Use \x0303/msg %bot% HELP %command% <option>\x03 for more information."
  command_header:   "\x02Help for %command%:\x02"
  syntax_label:     "\x0307Syntax:\x03 \x02%syntax%\x02"
  footer:           "\x0314─────────────────────────────\x03"
  unknown_command:  "\x0304✗\x03 No help available for \x02%command%\x02."
  ircop_header:     "The following commands are available for \x0304\x02IRCOPS\x02\x03:"

  set_timezone:
    index_label:    "\x0314Regions\x03 (use \x02HELP SET TIMEZONE <region>\x02 for list):"
    region_header:  "\x0314Timezones for %region%:\x03"
    region_unknown: "\x0304✗\x03 Unknown region. Use \x02HELP SET TIMEZONE\x02 for the index."

# --- Nick Protection --------------------------------------------------------
protection:
  nick_in_use:      "\x0304⚠\x03 Nick \x02%nickname%\x02 is registered. You will be renamed if you do not identify."
  renamed_to:       "\x0307→\x03 You have been renamed to \x02%guest_nick%\x02. To reclaim your nick:\n\x0303/msg %bot% IDENTIFY %nickname% <password>\x03"

# --- IRCop Commands ---------------------------------------------------------
userip:
  syntax:           "USERIP <nickname>"
  short:            "Get the user's real IP address and hostname."
  help:             |
    Shows the real IP address and hostname of the specified user.
    Only available to IRCops with 'nickserv.userip' permission.
    
    This command displays sensitive user information.
    Use responsibly.
    
    Syntax: USERIP <nickname>
    Example: USERIP SomeUser
  not_online:       "\x0304✗\x03 User \x02%nick%\x02 is not connected."
  result:           "\x0307ℹ\x03 User: \x02%nick%\x02 | IP: \x0307%ip%\x03 | Host: \x0307%host%\x03"

permissions:
  nickserv.userip:  "View the real IP/Host of a user (IRCop only)"
  nickserv.suspend: "Suspend/unsuspend a nickname (IRCop only)"
  nickserv.rename:  "Force rename a connected user to a random nickname (IRCop only)"
  nickserv.drop:    "Drop a registered nickname (IRCop only)"

# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <nickname> <duration> <reason>"
  short:            "Suspend a nickname."
  help:             |
    Suspends a nickname, preventing the owner from identifying.
    The suspension can be temporary or permanent.
    
    Duration formats: \x0303%d\x03 (days), \x0303%h\x03 (hours), \x0303%m\x03 (minutes), or \x03030\x03 (permanent).
    
    Suspended users cannot identify to their nickname.
    IRC operators and root users cannot be suspended.
    
    Syntax: SUSPEND <nickname> <duration> <reason>
    Examples:
      SUSPEND BadUser 7d Spamming in #help
      SUSPEND Abuser 30d Repeated flood
      SUSPEND ProblemUser 0 Permaban evasion
  success:            "\x0303✔\x03 Nickname \x02%nickname%\x02 has been suspended until \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 Nickname \x02%nickname%\x02 is already suspended."
  not_registered:     "\x0304✗\x03 Nickname \x02%nickname%\x02 is not registered."
  forbidden:          "\x0304✗\x03 Nickname \x02%nickname%\x02 is forbidden and cannot be suspended."
  cannot_suspend_oper: "\x0304✗\x03 Cannot suspend IRC operator \x02%nickname%\x02."
  cannot_suspend_root: "\x0304✗\x03 Cannot suspend root user \x02%nickname%\x02."
  invalid_duration:   "\x0304✗\x03 Invalid duration. Use: \x0303<d><h><m>\x03 (e.g., 7d, 12h, 30m) or \x03030\x03 for permanent."
  permanent:          "permanent"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <nickname>"
  short:            "Remove suspension from a nickname."
  help:             |
    Removes an active suspension from a nickname, allowing the owner to identify again.
    
    Syntax: UNSUSPEND <nickname>
    Example: UNSUSPEND SomeUser
  success:          "\x0303✔\x03 Suspension has been lifted from \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 is not registered."
  not_suspended:    "\x0304✗\x03 Nickname \x02%nickname%\x02 is not suspended."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <nickname>"
  short:            "Force rename a connected user to a random nickname."
  help:             |
    Forces a connected user to change their nickname to a randomly generated one.
    Useful for enforcing network policies without disconnecting the user.
    
    The new nickname format uses the configured guest prefix (%prefix%).
    
    This command requires IRCop permission: nickserv.rename
    
    Syntax: RENAME <nickname>
    Example: RENAME Troublemaker
  not_online:        "\x0304✗\x03 User \x02%nickname%\x02 is not connected."
  cannot_rename_root: "\x0304✗\x03 Cannot rename root user \x02%nickname%\x02."
  cannot_rename_oper: "\x0304✗\x03 Cannot rename IRC operator \x02%nickname%\x02."
  success:           "\x0303✓\x03 User \x02%nickname%\x02 has been renamed to \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <nickname>"
  short:            "Drop a registered nickname."
  help:             |
    Drops a registered nickname from the database.
    This action cannot be undone.
    
    If the user is online, they will be renamed to a Guest- nickname.
    Root users and IRC operators cannot be dropped.
    You cannot drop your own nickname.
    
    This command requires IRCop permission: nickserv.drop
    
    Syntax: DROP <nickname>
    Example: DROP OldAccount
  not_registered:     "\x0304✗\x03 Nickname \x02%nickname%\x02 is not registered."
  pending:           "\x0304✗\x03 Nickname \x02%nickname%\x02 is pending verification."
  suspended:         "\x0304✗\x03 Nickname \x02%nickname%\x02 is suspended. Unsuspend first."
  forbidden:         "\x0304✗\x03 Nickname \x02%nickname%\x02 is forbidden."
  cannot_drop_root:   "\x0304✗\x03 Cannot drop root user \x02%nickname%\x02."
  cannot_drop_oper:   "\x0304✗\x03 Cannot drop IRC operator \x02%nickname%\x02."
  cannot_drop_self:    "\x0304✗\x03 You cannot drop your own nickname."
  success:            "\x0303✓\x03 Nickname \x02%nickname%\x02 has been dropped."
