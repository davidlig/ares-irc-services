# NickServ translations — English
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02  bold on/off
#   \x03  color on/off  (e.g. \x0303 = green, \x0304 = red)
#   \x0F  reset all formatting

unknown_command: "Unknown command \x02%command%\x02. Use \x02/msg NickServ HELP\x02 for a list of commands."

error:
  syntax:         "Incorrect syntax. Usage: \x02%syntax%\x02"
  oper_only:      "This command is restricted to IRC Operators."
  not_identified: "You are not identified. Please use \x02/msg NickServ IDENTIFY <password>\x02"

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <password> <email>"
  short:            "Register your nickname with the services."
  help:             "Registers your current nickname with NickServ. You must choose a strong password and provide a valid email address. Once registered, your nick is protected from unauthorized use: any user occupying it without identifying will be renamed automatically."
  success:          "Nickname \x02%nickname%\x02 has been successfully registered and you are now identified."
  already_registered: "Nickname \x02%nickname%\x02 is already registered."
  invalid_email:    "The email address provided is not valid."

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY [nickname] <password>"
  short:            "Identify yourself as the owner of a nickname."
  help:             "Authenticates your session with NickServ. If you omit the nickname, your current nick is used. After a successful identification you will be assigned the registered mode \x02+r\x02 and your nick will be restored if you were using a guest nick."
  success:          "You are now identified as \x02%nickname%\x02."
  not_registered:   "Nickname \x02%nickname%\x02 is not registered."
  invalid_credentials: "Password incorrect. Please try again."

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <nickname>"
  short:            "Display information about a registered nickname."
  help:             "Shows registration details for a nickname: registration date, connection status, last quit message, and email address. The email is only visible to the owner when identified. If the account has PRIVATE enabled, the information will not be shown to other users."
  not_registered:   "Nickname \x02%nickname%\x02 is not registered."
  private:          "Nickname \x02%nickname%\x02 information is private."
  header:           "Information for nickname \x02%nickname%\x02:"
  registered_at:    "  Registered     : %date%"
  last_seen_online: "  Last seen      : \x0303NOW ONLINE\x03"
  last_seen_at:     "  Last seen      : %date%"
  last_seen_never:  "  Last seen      : Never"
  last_quit:        "  Last quit msg  : %message%"
  email:            "  Email          : %email%"
  footer:           "End of INFO."

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <option> <value>"
  short:            "Change your NickServ settings."
  help:             "Modifies your account settings. You must be identified to use this command."
  unknown_option:   "Unknown option \x02%option%\x02. Available options: %options%."

  password:
    syntax:         "SET PASSWORD <new_password>"
    short:          "Change your account password."
    success:        "Your password has been updated successfully."

  email:
    syntax:         "SET EMAIL <new_email>"
    short:          "Change the email address linked to your account."
    success:        "Your email has been updated to \x02%email%\x02."

  language:
    syntax:         "SET LANGUAGE <code>"
    short:          "Change the language the services use to communicate with you."
    success:        "Language changed to \x02%language%\x02."
    invalid:        "Unsupported language. Available languages: %languages%."

  private:
    syntax:         "SET PRIVATE ON|OFF"
    short:          "Enable or disable privacy for your account information."
    on:             "Your account information is now \x02private\x02."
    off:            "Your account information is now \x02public\x02."

# --- HELP -------------------------------------------------------------------
help:
  syntax:           "HELP [command]"
  short:            "Display help for NickServ commands."
  help:             "Displays general NickServ help or detailed information for a specific command."
  intro:            "NickServ handles the registration and protection of nicknames."
  general_header:   "\x02NickServ commands:\x02"
  command_line:     "  \x02%command%\x02%description%"
  subcommand_line:  "  \x02%command%\x02%description%"
  general_footer:   "Use \x02/msg NickServ HELP <command>\x02 for more information."
  command_header:   "\x02Help for %command%:\x02"
  syntax_label:     "\x02Syntax:\x02 %syntax%"
  footer:           "End of HELP."
  unknown_command:  "No help available for \x02%command%\x02."

# --- Nick Protection --------------------------------------------------------
protection:
  nick_in_use:      "Nick \x02%nickname%\x02 is registered and owned by another user. You will be renamed automatically."
  renamed_to:       "You have been renamed to \x02%guest_nick%\x02. To reclaim your nick use: \x02/msg NickServ IDENTIFY %nickname% <password>\x02"
