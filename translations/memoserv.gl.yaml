read:
  syntax: "READ [#canle] <número>"
  short: "Ler unha mensaxe polo número."
  help: "Le a mensaxe co número indicado. Sen #canle, le da súa caixa de entrada persoal. Con #canle, require nivel MEMOREAD."
  header: "\x02\x0307Mensaxe nº%index%\x03 de \x02%from%\x02:\x0F"
  footer: "\x0314─────────────────────────────\x03 \x0314%date%\x03"
