  not_found: "\x0304✗\x03 Mensaxe nº%index% non atopada."

list:
  syntax: "LIST [#canle]"
  short: "Listar mensaxes (non lidas marcadas con * vermello)."
  help: "Lista as súas mensaxes ou as mensaxes da canle. As mensaxes non lidas móstranse cun asterisco vermello e unha vista previa (máx. 50 caracteres). Sen #canle = a súa caixa de entrada persoal; con #canle require MEMOREAD."
  header: "\x02\x0307Mensaxes para %target%\x03:\x0F"
  footer: "\x0314─────────────────────────────\x03"
  empty: "\x0307ℹ\x03 Non hai mensaxes para \x02%target%\x02."
  channel_not_registered: "\x0304✗\x03 A canle \x02%channel%\x02 non está rexistrada."

del:
  syntax: "DEL [#canle] <número>"
  short: "Eliminar unha mensaxe polo número."
  help: "Elimina a mensaxe co número indicado. Para canles require nivel MEMOCHANGE."
  deleted: "\x0303✔\x03 Mensaxe nº%index% eliminada."
  channel_not_registered: "\x0304✗\x03 A canle \x02%channel%\x02 non está rexistrada."
  not_found: "\x0304✗\x03 Mensaxe nº%index% non atopada."

ignore:
  syntax: "IGNORE {ADD|DEL|LIST} [#canle] [alcume]"
  short: "Xestionar a lista de ignorados para mensaxes."
  help: "ADD engade un alcume á súa lista de ignorados (ou á da canle); DEL elimínao; LIST mostra a lista. Para canles, ADD/DEL requiren MEMOCHANGE."
  add:
    syntax: "IGNORE ADD [#canle] <alcume>"
    short: "Engadir alcume á lista de ignorados."
    help: "As mensaxes deste alcume non serán aceptadas para a súa caixa de entrada (ou a da canle)."
  del:
    syntax: "IGNORE DEL [#canle] <alcume>"
    short: "Eliminar alcume da lista de ignorados."
    help: "Elimina o alcume da lista de ignorados."
  list:
    syntax: "IGNORE LIST [#canle]"
    short: "Listar alcumes ignorados."
    help: "Mostra a lista de alcumes que vostede (ou a canle) ignora para mensaxes."
  added: "\x0303✔\x03 \x02%nickname%\x02 engadido á lista de ignorados."
  removed: "\x0303✔\x03 \x02%nickname%\x02 eliminado da lista de ignorados."
  already_ignored: "\x0304✗\x03 \x02%nickname%\x02 xa está na lista de ignorados."
  not_ignored: "\x0304✗\x03 \x02%nickname%\x02 non está na lista de ignorados."
  nick_not_registered: "\x0304✗\x03 O alcume \x02%nickname%\x02 non está rexistrado."
  channel_not_registered: "\x0304✗\x03 A canle \x02%channel%\x02 non está rexistrada."
  limit_reached_nick: "\x0304✗\x03 Límite da lista de ignorados alcanzado para o seu alcume (máx. \x02%limit%\x02)."
  limit_reached_channel: "\x0304✗\x03 Límite da lista de ignorados alcanzado para \x02%channel%\x02 (máx. \x02%limit%\x02)."
