  user_not_online:  "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este conectată."
  protected_root:   "\x0304✗\x03 Nu se poate da kill utilizatorului Root \x02%nickname%\x02."
  protected_ircop:  "\x0304✗\x03 Nu se poate da kill operatorului IRC \x02%nickname%\x02."
