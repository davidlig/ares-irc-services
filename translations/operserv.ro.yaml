# --- IRCOP --------------------------------------------------------------------
ircop:
  syntax:           "IRCOP <poreclă> {ADD|DEL|LIST} [rol]"
  short:            "Gestionați operatorii IRC ai rețelei."
  help:             "Gestionează operatorii IRC ai rețelei. ADD adaugă o poreclă înregistrată\nca operator cu rolul specificat.\nDEL elimină un operator. LIST afișează toți operatorii.\nFolosiți ROLE LIST pentru a vedea rolurile disponibile.\nAceastă comandă este rezervată utilizatorilor Root configurați în servicii."

  unknown_sub:      "\x0304✗\x03 Subcomandă necunoscută \x02%sub%\x02. Folosiți ADD, DEL sau LIST."
  unknown_role:     "\x0304✗\x03 Rolul \x02%role%\x02 nu există. Folosiți \x0303/msg %bot% ROLE LIST\x03 pentru a vedea rolurile disponibile."
  already_admin:    "\x0304✗\x03 \x02%nickname%\x02 este deja operator IRC (rol: %role%)."
  not_admin:       "\x0304✗\x03 \x02%nickname%\x02 nu este operator IRC."
  role_changed:     "\x0303✓\x03 Rol schimbat pentru \x02%nickname%\x02 din %old% în %new%."

  add:
    syntax:         "IRCOP <poreclă> ADD <rol>"
    short:          "Adăugați un operator IRC al rețelei."
    help:           "Adaugă o poreclă înregistrată ca operator IRC al rețelei.\nFolosiți ROLE LIST pentru a vedea rolurile disponibile.\nAceastă comandă este rezervată utilizatorilor Root."
    done:           "\x0303✓\x03 Adăugat \x02%nickname%\x02 ca \x02%role%\x02."
    nick_not_active: "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este o poreclă înregistrată activă."

  del:
    syntax:         "IRCOP <poreclă> DEL"
    short:          "Eliminați un operator IRC al rețelei."
    help:            "Elimină un operator IRC al rețelei din listă.\nAceastă comandă este rezervată utilizatorilor Root."
    done:           "\x0303✓\x03 Eliminat \x02%nickname%\x02 din operatorii IRC."

  list:
    syntax:         "IRCOP LIST"
    short:          "Listați toți operatorii IRC ai rețelei."
    help:            "Listează toți operatorii IRC ai rețelei cu rolurile și data înregistrării.\nAceastă comandă este rezervată utilizatorilor Root."
    header:         "\x0307---\x03 \x02Operatori IRC ai rețelei\x02 \x0307---\x03"
    empty:          "Nu există operatori IRC."

# --- ROLE --------------------------------------------------------------------
role:
  syntax:           "ROLE {ADD|DEL|LIST|PERMS|MODES|VHOST} <nume> ..."
  short:            "Gestionați rolurile de operator."
  help:             "Gestionează rolurile de operator. ADD creează un nou rol, DEL îl șterge,\nLIST afișează toate rolurile, PERMS gestionează permisiunile unui rol, MODES gestionează modurile IRCOP,\nVHOST gestionează modelul de vhost forțat al unui rol.\nRolurile protejate (ADMIN, OPER, PREOPER) nu pot fi șterse.\nAceastă comandă este rezervată utilizatorilor Root."

  unknown_sub:      "\x0304✗\x03 Subcomandă necunoscută \x02%sub%\x02. Folosiți ADD, DEL, LIST, PERMS, MODES sau VHOST."
  not_found:        "\x0304✗\x03 Rolul \x02%role%\x02 nu există."
  already_exists:   "\x0304✗\x03 Rolul \x02%role%\x02 există deja."
  protected:        "\x0304✗\x03 Rolul \x02%role%\x02 este protejat și nu poate fi șters."

  add:
    syntax:         "ROLE ADD <nume> [descriere]"
    short:          "Creați un nou rol."
    help:            "Creează un nou rol personalizat. Descrierea este opțională.\nAceastă comandă este rezervată utilizatorilor Root."
    done:           "\x0303✓\x03 Rol creat \x02%role%\x02."

  del:
    syntax:         "ROLE DEL <nume>"
    short:          "Ștergeți un rol."
    help:            "Șterge un rol personalizat. Rolurile protejate (ADMIN, OPER, PREOPER)\nnu pot fi șterse. Dacă rolul are operatori alocați,\ntrebuie să îi realocați mai întâi.\nAceastă comandă este rezervată utilizatorilor Root."
    done:           "\x0303✓\x03 Rol șters \x02%role%\x02."

  list:
    syntax:         "ROLE LIST"
    short:          "Listați toate rolurile."
    help:            "Listează toate rolurile. Rolurile protejate sunt marcate cu [PROTECTED].\nAceastă comandă este rezervată utilizatorilor Root."
    header:         "\x0307---\x03 \x02Roluri de operator\x02 \x0307---\x03"
    empty:          "Nu există roluri de operator."

  perms:
    syntax:         "ROLE PERMS <rol> {LIST|ADD|DEL|CLEAR} [permisiune|ALL]"
    short:          "Gestionați permisiunile rolului."
    help:            "Gestionează permisiunile atribuite unui rol.\nLIST afișează toate permisiunile rolului.\nADD atribuie o permisiune rolului.\nDEL elimină o permisiune din rol (nu pentru rolurile protejate).\nCLEAR elimină toate permisiunile din rol.\nFolosiți ALL pentru a adăuga toate permisiunile disponibile deodată.\nAceastă comandă este rezervată utilizatorilor Root."
    unknown_action:  "\x0304✗\x03 Acțiune necunoscută \x02%action%\x02. Folosiți LIST, ADD, DEL sau CLEAR."
    not_found:       "\x0304✗\x03 Permisiunea \x02%perm%\x02 nu există."
    already_has:     "\x0304✗\x03 Rolul \x02%role%\x02 are deja permisiunea \x02%perm%\x02."
    does_not_have:   "\x0304✗\x03 Rolul \x02%role%\x02 nu are permisiunea \x02%perm%\x02."
    protected:      "\x0304✗\x03 Nu se pot modifica permisiunile rolului protejat \x02%role%\x02."

    list:
      syntax:       "ROLE PERMS <rol> LIST"
      short:        "Listați permisiunile unui rol."
      help:         "Listează toate permisiunile atribuite unui rol.\nAceastă comandă este rezervată utilizatorilor Root."
      header:        "\x0307---\x03 \x02Permisiuni pentru %role%\x02 \x0307---\x03"
      empty:        "Rolul \x02%role%\x02 nu are permisiuni atribuite."
      assigned:     "\x0310Atribuite:\x03"
      none_assigned: "\x0314Nicio permisiune atribuită.\x03"
      available:    "\x0310Disponibile:\x03"
      all_assigned: "\x0314Toate permisiunile sunt atribuite acestui rol.\x03"

    add:
      syntax:       "ROLE PERMS <rol> ADD {permisiune|ALL}"
      short:        "Adăugați o permisiune unui rol."
      help:         "Adaugă o permisiune unui rol.\nFolosiți ALL pentru a adăuga toate permisiunile disponibile deodată.\nAceastă comandă este rezervată utilizatorilor Root."
      done:         "\x0303✓\x03 Permisiunea \x02%perm%\x02 adăugată rolului \x02%role%\x02."
      all_done:     "\x0303✓\x03 Adăugate \x02%count%\x02 permisiuni rolului \x02%role%\x02."
      all_skipped:  "\x0304✗\x03 Rolul \x02%role%\x02 are deja toate permisiunile disponibile."
      all_empty:    "\x0304✗\x03 Nu există permisiuni disponibile de adăugat."

    del:
      syntax:       "ROLE PERMS <rol> DEL <permisiune>"
      short:        "Eliminați o permisiune dintr-un rol."
      help:         "Elimină o permisiune dintr-un rol.\nNu se pot modifica rolurile protejate.\nAceastă comandă este rezervată utilizatorilor Root."
      done:         "\x0303✓\x03 Permisiunea \x02%perm%\x02 eliminată din rolul \x02%role%\x02."

    clear:
      syntax:       "ROLE PERMS <rol> CLEAR"
      short:        "Eliminați toate permisiunile dintr-un rol."
      help:         "Elimină toate permisiunile dintr-un rol.\nAceastă comandă este rezervată utilizatorilor Root."
      done:         "\x0303✓\x03 Eliminate \x02%count%\x02 permisiuni din rolul \x02%role%\x02."
      empty:        "\x0304✗\x03 Rolul \x02%role%\x02 nu are permisiuni atribuite."

  modes:
    syntax:         "ROLE MODES <rol> {VIEW|SET} [moduri]"
    short:          "Gestionați modurile de utilizator IRCOP pentru rol."
    help:            "Gestionează modurile de utilizator IRCOP atribuite unui rol.\nVIEW afișează modurile actuale ale rolului.\nSET setează modurile IRCOP (de ex. oH pentru +oH).\nUtilizatorii cu acest rol vor primi aceste moduri la identificare.\nModuri disponibile per IRCD: UnrealIRCd (H, q, s, W), InspIRCd (s).\nAceastă comandă este rezervată utilizatorilor Root."
    unknown_action:  "\x0304✗\x03 Acțiune necunoscută \x02%action%\x02. Folosiți VIEW sau SET."

    view:
      syntax:       "ROLE MODES <rol> VIEW"
      short:        "Afișați modurile rolului."
      help:          "Afișează modurile de utilizator IRCOP atribuite unui rol.\nAceastă comandă este rezervată utilizatorilor Root."
      header:        "\x0307---\x03 \x02Moduri pentru %role%\x02 \x0307---\x03"
      empty:        "Rolul \x02%role%\x02 nu are moduri atribuite."
      line:         "  Moduri: \x0303%modes%\x03"

    set:
      syntax:       "ROLE MODES <rol> SET [moduri]"
      short:        "Setați modurile de utilizator IRCOP."
      help:          "Setează modurile de utilizator IRCOP pentru rol.\nFără argumente, elimină toate modurile rolului.\nDoar moduri IRCOP valide pentru IRCd-ul activ.\nUtilizatorii identificați cu acest rol vor primi modificările.\nAceastă comandă este rezervată utilizatorilor Root."
      done:         "\x0303✓\x03 Moduri setate \x02%modes%\x02 pentru rolul \x02%role%\x02."
      cleared:      "\x0303✓\x03 Toate modurile au fost eliminate din rolul \x02%role%\x02."
      invalid_mode: "\x0304✗\x03 Modul \x02%mode%\x02 nu este un mod IRCOP valid."
      invalid_modes: "\x0304✗\x03 Moduri invalide: %invalid%. Moduri valide: %valid%."
      no_irc_user_modes: "\x0304✗\x03 IRCd-ul actual nu are moduri IRCOP configurate."

  vhost:
    syntax:         "ROLE VHOST <rol> {VIEW|SET} [model]"
    short:          "Gestionați modelul de vhost forțat pentru un rol."
    help:           "Gestionează vhostul forțat atribuit unui rol.\nVIEW afișează modelul actual de vhost forțat.\nSET atribuie un model de vhost forțat (utilizatorii cu acest rol vor\nprimi acest vhost la identificare, anulând vhostul personal).\nModelul este adăugat după porecla curățată, de ex.:\n  Poreclă: _davidlig_ → Model: admin.ares → VHost: davidlig.admin.ares\nCaractere valide: a-z, A-Z, 0-9, cratimă (-) și punct (.).\nTrebuie să aibă cel puțin un punct, nu poate începe/termina cu - sau . sau să aibă ..\nFolosiți OFF pentru a șterge modelul de vhost forțat.\nAceastă comandă este rezervată utilizatorilor Root."
    unknown_action:  "\x0304✗\x03 Acțiune necunoscută \x02%action%\x02. Folosiți VIEW sau SET."

    view:
      syntax:       "ROLE VHOST <rol> VIEW"
      short:         "Afișați modelul de vhost forțat al rolului."
      help:          "Afișează modelul de vhost forțat atribuit unui rol.\nAceastă comandă este rezervată utilizatorilor Root."
      header:        "\x0307---\x03 \x02Vhost forțat pentru %role%\x02 \x0307---\x03"
      empty:        "Rolul \x02%role%\x02 nu are un model de vhost forțat setat."
      line:         "  Model: \x0303%pattern%\x03"
      example:      "  Exemplu: \x02poreclă\x02.%pattern%"

    set:
      syntax:       "ROLE VHOST <rol> SET [model]"
      short:         "Setați modelul de vhost forțat pentru rol."
      help:          "Setează modelul de vhost forțat pentru rol.\nUtilizatorii care se identifică cu acest rol vor primi vhostul forțat,\ncare are prioritate față de vhostul personal.\nModelul este adăugat după porecla curățată.\nFolosiți OFF sau omiteți argumentul pentru a șterge vhostul forțat.\nAceastă comandă este rezervată utilizatorilor Root."
      done:         "\x0303✓\x03 Model de vhost forțat setat pentru rolul \x02%role%\x02."
      cleared:      "\x0303✓\x03 Modelul de vhost forțat a fost eliminat din rolul \x02%role%\x02."
      invalid:      "\x0304✗\x03 Model de vhost invalid. Caractere valide: a-z, A-Z, 0-9, - și .. Trebuie să aibă cel puțin un punct, nu poate începe/termina cu - sau . sau să aibă .."

