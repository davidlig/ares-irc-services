  permission_denied: "\x0304✗\x03 Permisiune refuzată. Aveți nevoie de permisiunea operserv.kill."

# --- GLINE --------------------------------------------------------------------
gline:
  syntax:           "GLINE {ADD|DEL|LIST} [mască] [expirare] [motiv]"
  short:            "Gestionați G-line-urile la nivel de rețea."
  help:             "Gestionează G-line-urile la nivel de rețea (interdicții globale).\nADD adaugă un nou G-line cu mască, expirare și motiv.\nDEL elimină un G-line după mască sau numărul intrării.\nLIST afișează toate G-line-urile, opțional filtrate după mască.\n\nFormat de expirare: 0=permanent, sau folosiți sufixul d, h, m (de ex. 7d, 12h, 30m).\nGLINE-urile care corespund utilizatorilor Root sau IRCop sunt respinse.\nAceastă comandă necesită permisiunea operserv.gline."
  unknown_sub:      "\x0304✗\x03 Subcomandă necunoscută \x02%sub%\x02. Folosiți ADD, DEL sau LIST."
  invalid_mask:     "\x0304✗\x03 Format de mască invalid. Trebuie să fie în format utilizator@host (de ex. *@192.168.*)."
  global_mask:      "\x0304✗\x03 Masca G-line \x02%mask%\x02 este prea largă. Măștile globale nu sunt permise."
  dangerous_mask:   "\x0304✗\x03 Masca G-line \x02%mask%\x02 este prea largă. Partea de host necesită cel puțin 4 caractere alfanumerice."
  protected_user:   "\x0304✗\x03 Nu se poate seta G-line pentru utilizatorul protejat \x02%nickname%\x02."
  invalid_expiry:   "\x0304✗\x03 Format de expirare invalid. Folosiți 0 pentru permanent sau o valoare precum 7d, 12h, 30m."
  already_exists:   "\x0304✗\x03 G-line pentru \x02%mask%\x02 există deja."
  max_entries:      "\x0304✗\x03 Numărul maxim de G-line-uri (%max%) a fost atins."
  not_found:        "\x0304✗\x03 G-line \x02%mask%\x02 nu a fost găsit."
  user_not_found:   "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este online."
  permanent:        "permanent"

  add:
    syntax:         "GLINE ADD <mască> <expirare> <motiv>"
    short:          "Adăugați un G-line la nivel de rețea."
    help:           "Adaugă un G-line la nivel de rețea (interdicție globală).\nMasca trebuie să fie în format utilizator@host.\nExpirare: 0=permanent, sau folosiți sufixul d, h, m (de ex. 7d, 12h, 30m).\nGLINE-urile care corespund utilizatorilor Root sau IRCop sunt respinse.\nAceastă comandă necesită permisiunea operserv.gline."
    done:           "\x0303✓\x03 G-line adăugat: \x02%mask%\x02 (%duration%) - %reason%"

  del:
    syntax:         "GLINE DEL <mască|număr>"
    short:          "Eliminați un G-line."
    help:           "Elimină un G-line din listă.\nPuteți specifica masca sau numărul intrării din LIST.\nAceastă comandă necesită permisiunea operserv.gline."
    done:           "\x0303✓\x03 G-line \x02%mask%\x02 eliminat."

  list:
    syntax:         "GLINE LIST [mască]"
    short:          "Listați toate G-line-urile."
    help:           "Listează toate G-line-urile. Opțional, filtrați după modelul de mască.\nAceastă comandă necesită permisiunea operserv.gline."
    header:         "\x0307---\x03 \x02G-line-uri (%count%) \x0307---\x03"
    empty:          "Nu există G-line-uri."
    no_reason:      "Fără motiv"
    never_expires:  "Permanent"
    unknown_creator: "necunoscut"
    entry:          "\x0310%index%.\x03 \x02%mask%\x02 - %reason% (\x0314%nickname%\x03, expiră: %expiration%)"

# --- GLOBAL -------------------------------------------------------------------
global:
  syntax:           "GLOBAL {serviciu|poreclă!ident@vhost} {PRIVMSG|NOTICE} <mesaj>"
  short:            "Trimiteți un mesaj global tuturor utilizatorilor conectați."
  help:             "Trimite un mesaj tuturor utilizatorilor conectați.\n\nDacă primul argument este un nume de serviciu, mesajul va fi trimis folosind acel serviciu existent.\n\nDacă nu este un serviciu, se va crea un pseudo-client temporar cu\nmasca specificată. Masca trebuie să fie în format: poreclă!ident@vhost\n- poreclă: poreclă IRC validă (litere, []{}|\\`, cifre, începe cu literă)\n- ident: alfanumerice cu . _ ~ -\n- vhost: hostname valid\n\nPentru pseudo-clienți, porecla nu poate fi conectată sau înregistrată.\nPseudo-clientul va rămâne conectat în timpul trimiterii și se va deconecta\nautomat (porecla va fi blocată timp de 24h prin SQLINE/QLINE).\n\nPRIVMSG trimite ca mesaj privat, NOTICE trimite ca notificare.\nAceastă comandă necesită permisiunea operserv.global."
  mask_invalid:    "\x0304✗\x03 Format de mască invalid: %error%"
  nick_service:    "\x0304✗\x03 Nu se poate folosi o poreclă de serviciu."
  nick_connected: "\x0304✗\x03 Porecla \x02%nickname%\x02 este conectată în prezent."
  nick_registered: "\x0304✗\x03 Porecla \x02%nickname%\x02 este înregistrată."
  type_invalid:    "\x0304✗\x03 Tipul mesajului trebuie să fie PRIVMSG sau NOTICE."
  done:            "\x0303✓\x03 Mesaj global trimis de la \x02%nickname%\x02 către %count% utilizatori."

# --- RAW ---------------------------------------------------------------------
raw:
  syntax:           "RAW <linie>"
  short:            "Trimiteți o linie de protocol brută către IRCd."
  help:             "Trimite linia specificată direct la socketul IRCd uplink.\nFolosiți cu extremă precauție. Liniile de protocol invalide pot provoca căderea rețelei.\nAceastă comandă necesită permisiunea operserv.raw."
  empty:            "\x0304✗\x03 Trebuie să specificați o linie nevidă de trimis."
  too_long:         "\x0304✗\x03 Linia este prea lungă. Maxim 510 caractere."
  not_connected:    "\x0304✗\x03 Neconectat la IRCd."
  done:             "\x0303✓\x03 Linie brută trimisă."

