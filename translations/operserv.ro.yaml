# --- MOTD ----------------------------------------------------------------------
motd:
  short:            "Gestionați mesajele MOTD de conectare trimise utilizatorilor la conectare."
  syntax:           "MOTD {ADD|DEL|LIST|CLEAN} [arg]"
  help:             "Gestionează intrările Message Of The Day care sunt trimise utilizatorilor când se conectează la rețea.\n\n"
