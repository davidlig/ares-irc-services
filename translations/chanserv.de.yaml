noexpire:
  syntax:           "NOEXPIRE <#channel> {ON|OFF}"
  short:            "Ablaufschutz für einen Channel setzen oder entfernen."
  help:             |
    Steuert, ob ein Channel aufgrund von Inaktivität abläuft.
    Bei ON läuft der Channel unabhängig von der letzten Aktivität nie ab.
    Bei OFF gelten die normalen Ablaufregeln.

    Nur IRCops mit der Berechtigung 'chanserv.noexpire' können diesen Befehl verwenden.

    Syntax: NOEXPIRE <#channel> {ON|OFF}
    Beispiele:
      NOEXPIRE #Wichtig ON
      NOEXPIRE #Wichtig OFF
  success_on:       "\x0303✔\x03 Channel \x02%channel%\x02 ist jetzt vor Ablauf geschützt."
  success_off:      "\x0303✔\x03 Channel \x02%channel%\x02 läuft jetzt normal ab."
  not_registered:   "\x0304✗\x03 Channel \x02%channel%\x02 ist nicht registriert."
  forbidden:         "\x0304✗\x03 Channel \x02%channel%\x02 ist gesperrt."
  suspended:         "\x0304✗\x03 Channel \x02%channel%\x02 ist suspendiert."

forbid:
  syntax:           "FORBID <#channel> <Grund>"
  short:             "Einen Channel für die Nutzung sperren."
  help:              "Verhindert, dass ein Channel von irgendjemandem genutzt wird.\nWenn der Channel derzeit registriert ist, wird er zuerst gelöscht.\nAlle Benutzer im Channel werden gekickt und der Channel wird abgeriegelt.\nDieser Befehl erfordert die IRCop-Berechtigung: chanserv.forbid"
  reason_required:  "\x0304✗\x03 Sie müssen einen Grund angeben."
  success:          "\x0303✔\x03 Channel \x02%channel%\x02 wurde gesperrt."
  updated:          "\x0303✔\x03 Sperrgrund für Channel \x02%channel%\x02 wurde aktualisiert."
  channel_forbidden: "\x0304✗\x03 Channel \x02%channel%\x02 ist gesperrt und kann nicht verwendet werden."

unforbid:
  syntax:           "UNFORBID <#channel>"
  short:             "Eine Channel-Sperrung aufheben."
  help:              "Hebt eine Channel-Sperrung auf, sodass der Channel wieder registriert werden kann.\nDieser Befehl erfordert die IRCop-Berechtigung: chanserv.forbid"
  success:          "\x0303✔\x03 Channel \x02%channel%\x02 ist nicht mehr gesperrt."
  not_forbidden:    "\x0304✗\x03 Channel \x02%channel%\x02 ist nicht gesperrt."

debug:
  action_message: "%operator% führt Befehl %command% auf %target% aus. %reason%"
  action_with_option: "%operator% führt Befehl %command% auf %target% aus. Option: %option%. %reason%"
  action_with_value: "%operator% führt Befehl %command% auf %target% aus. Option: %option%=%value%. %reason%"
  founder_action: "Level-Founder-Aktion"
  prefix_reason:  "Grund: %reason%"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#channel> {ADD|DEL|VIEW|CLEAR}"
  short:            "Channel-Aktionsverlauf anzeigen oder verwalten."
  help:             |
    Verwaltet den Aktionsverlauf für einen Channel.
    Nur IRCops mit der Berechtigung 'chanserv.history' können diesen Befehl verwenden.

    Unterbefehle:
      ADD   — Einen manuellen Eintrag zum Channel-Verlauf hinzufügen.
      DEL   — Einen bestimmten Eintrag anhand der ID löschen.
      VIEW  — Verlaufseinträge anzeigen (seitenweise, 3 pro Seite).
      CLEAR — Alle Verlaufseinträge für den Channel löschen.

    Syntax: HISTORY <#channel> {ADD|DEL|VIEW|CLEAR} [Argumente]
    Beispiele:
      HISTORY #channel VIEW
      HISTORY #channel VIEW 2
      HISTORY #channel VIEW ALL
      HISTORY #channel ADD Verdacht auf Übernahmeversuch
      HISTORY #channel DEL 42
      HISTORY #channel CLEAR
  not_registered:   "\x0304✗\x03 Channel \x02%channel%\x02 ist nicht registriert."
  unknown_operator: "(unbekannt)"

  add:
    syntax:     "HISTORY <#channel> ADD <Nachricht>"
    short:      "Einen manuellen Verlaufseintrag hinzufügen."
    help:        |
      Fügt einen manuellen Eintrag zum Channel-Verlauf hinzu.
    success:    "\x0303✔\x03 Verlaufseintrag für \x02%channel%\x02 hinzugefügt."

  del:
    syntax:     "HISTORY <#channel> DEL <id>"
    short:      "Einen Verlaufseintrag anhand der ID löschen."
    success:    "\x0303✔\x03 Verlaufseintrag \x02%id%\x02 gelöscht."
    not_found:  "\x0304✗\x03 Verlaufseintrag \x02%id%\x02 nicht gefunden."
    invalid_id: "\x0304✗\x03 Ungültige Eintrags-ID: \x02%id%\x02."

  view:
    syntax:     "HISTORY <#channel> VIEW [PAGE|ALL]"
    short:      "Channel-Aktionsverlauf anzeigen."
    header:     "\x02Verlauf für \x0307%channel%\x03\x02 (zeigt %start%-%end% von %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 von %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Keine Verlaufseinträge für \x02%channel%\x02 gefunden."
    page_hint:   "Verwenden Sie \x0303HISTORY %channel% VIEW %next_page%\x03 für weitere Einträge."

  clear:
    syntax:     "HISTORY <#channel> CLEAR"
    short:      "Alle Verlaufseinträge für einen Channel löschen."
    success:    "\x0303✔\x03 \x02%count%\x02 Verlaufseinträge für \x02%channel%\x02 gelöscht."

