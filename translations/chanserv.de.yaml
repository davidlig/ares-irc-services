# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#channel>"
  short:            "Die gesamte Zugriffsliste eines Channels löschen."
  help:             |
    Entfernt alle Zugriffseinträge aus der Zugriffsliste eines Channels.
    Diese Aktion ist unwiderruflich und kann nicht rückgängig gemacht werden.
    Nur IRCops mit der Berechtigung 'chanserv.clearaccess' können diesen Befehl verwenden.

    Syntax: CLEARACCESS <#channel>
    Beispiele:
      CLEARACCESS #channel
  success:          "\x0303✔\x03 \x02%count%\x02 Zugriffseinträge aus \x02%channel%\x02 gelöscht."
  empty:            "\x0307ℹ\x03 Channel \x02%channel%\x02 hat keine Zugriffseinträge."

clearusers:
  syntax:           "CLEARUSERS <#channel> [Grund]"
  short:            "Alle Benutzer aus einem Channel kicken."
  help:             |
    Kickt alle Benutzer aus dem angegebenen Channel.
    Dies ist ein IRCop-exklusiver Befehl für die Channel-Verwaltung.
    Ein optionaler Grund kann angegeben werden; wenn nicht, wird ein Standardgrund verwendet.

    Nur IRCops mit der Berechtigung 'chanserv.clearusers' können diesen Befehl verwenden.

    Syntax: CLEARUSERS <#channel> [Grund]
    Beispiele:
      CLEARUSERS #channel
      CLEARUSERS #channel flooding
  not_on_network:   "\x0304✗\x03 Channel \x02%channel%\x02 ist derzeit nicht im Netzwerk."
  empty:            "\x0307ℹ\x03 Channel \x02%channel%\x02 hat keine Benutzer zum Kicken."
  success:          "\x0303✔\x03 \x02%count%\x02 Benutzer aus \x02%channel%\x02 gekickt."
  default_reason:   "CLEARUSERS-Befehl"
