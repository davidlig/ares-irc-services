  chanserv.drop: "Einen registrierten Channel löschen (DROP)"
  chanserv.suspend: "Einen Channel suspendieren oder entsuspendieren (SUSPEND/UNSUSPEND)"
  chanserv.forbid: "Einen Channel sperren oder entsperren (FORBID/UNFORBID)"
  chanserv.noexpire: "Ablaufschutz für einen Channel setzen oder entfernen (NOEXPIRE)"
