  user_not_on_channel: "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht im Netzwerk."
  notice_grant:     "\x0303✔\x03 \x0302%from%\x03 gibt \x0304%mode%\x03 an \x0314%to%\x03"
  not_supported:    "\x0304✗\x03 Dieses Netzwerk unterstützt den Halfop-Modus (+h) nicht."

dehalfop:
  syntax:           "DEHALFOP <#channel> <nickname>"
