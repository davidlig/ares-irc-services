  invalid_channel: "\x0304✗\x03 Ungültiger Channel-Name. Verwenden Sie \x02#channel\x02."
  channel_not_registered: "\x0304✗\x03 Channel \x02%channel%\x02 ist nicht registriert."
  generic:        "\x0304✗\x03 Ein Fehler ist aufgetreten. Bitte versuchen Sie es erneut."
