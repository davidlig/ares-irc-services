akick:
  syntax:           "AKICK <#channel> {ADD|DEL|LIST|ENFORCE} [Maske] [Ablauf] [Grund]"
  short:            "Auto-Kick-Liste verwalten."
  help:             "ADD <Maske> [Ablauf] [Grund]: Eintrag hinzufügen. DEL <Maske|Nr.>: Entfernen. LIST: Einträge auflisten. ENFORCE <Maske>: Passende Benutzer kicken."
  unknown_sub:      "\x0304✗\x03 Unbekannter Unterbefehl \x02%sub%\x02. Verwenden Sie ADD, DEL, LIST oder ENFORCE."
  invalid_mask:     "\x0304✗\x03 Ungültiges Maskenformat. Verwenden Sie \x02nick!ident@host\x02 mit Platzhaltern (*)."
  dangerous_mask:   "\x0304✗\x03 Die Maske \x02%mask%\x02 ist zu allgemein. Sie muss mindestens 4 alphanumerische Zeichen enthalten."
  protected_user:   "\x0304✗\x03 Nickname \x02%nickname%\x02 hat Zugriff in diesem Channel."
  max_entries:      "\x0304✗\x03 Maximal %max% AKICK-Einträge pro Channel."
  add:
    syntax:         "AKICK <#channel> ADD <Maske> [Ablauf] [Grund]"
    short:          "AKICK-Eintrag hinzufügen."
    help:           "Ablauf erforderlich, wenn Grund angegeben wird. Formate: 0 (dauerhaft), 1d, 7d, 30d, 12h, 60m. Beispiele: 'AKICK #c ADD *!*@* 0', 'AKICK #c ADD *!*@* 7d Spam'."
    done:           "\x0303✔\x03 AKICK \x02%mask%\x02 hinzugefügt."
    already_exists: "\x0304✗\x03 AKICK \x02%mask%\x02 existiert bereits."
    notice_channel: "\x02%from%\x02 fügt AKICK hinzu: \x02%mask%\x02 (%reason%)"
  del:
    syntax:         "AKICK <#channel> DEL <Maske|Nummer>"
    short:          "AKICK-Eintrag entfernen."
    help:           "Entfernt anhand der exakten Maske oder der Eintragsnummer aus LIST."
    not_found:      "\x0304✗\x03 AKICK \x02%mask%\x02 nicht gefunden."
    done:           "\x0303✔\x03 AKICK \x02%mask%\x02 entfernt."
    notice_channel: "\x02%from%\x02 entfernt AKICK: \x02%mask%\x02"
  list:
    syntax:         "AKICK <#channel> LIST"
    short:          "AKICK-Einträge auflisten."
    help:           "Zeigt Maske, Grund, Ablauf und wer hinzugefügt hat."
    header:         "\x0303AKICK-Liste für \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 Channel \x02%channel%\x02 hat keine AKICK-Einträge."
    entry:          "  #%index% %mask% %reason% (von %nickname%, läuft ab: %expiration%)"
    no_reason:      "Kein Grund"
    never_expires:  "nie"
    unknown_creator: "unbekannt"

drop:
  syntax:           "DROP <#channel>"
  short:            "Einen registrierten Channel löschen."
  help:             "Entfernt einen registrierten Channel aus der Datenbank."
  success:          "\x0303✔\x03 Channel \x02%channel%\x02 wurde gelöscht."
  not_registered:   "\x0304✗\x03 Channel \x02%channel%\x02 ist nicht registriert."

suspend:
  syntax:           "SUSPEND <#channel> <Dauer> <Grund>"
  short:            "Einen Channel suspendieren."
  help:             "Deaktiviert vorübergehend einen registrierten Channel. Dauer-Formate: 0 = dauerhaft, 1d, 12h, 60m.\nWährend der Suspendierung sind Channel-Modes, Zugriff und Durchsetzung deaktiviert.\nDieser Befehl erfordert die IRCop-Berechtigung: chanserv.suspend"
  success:          "\x0303✔\x03 Channel \x02%channel%\x02 wurde suspendiert bis \x02%duration%\x02."
  not_registered:   "\x0304✗\x03 Channel \x02%channel%\x02 ist nicht registriert."
  already_suspended: "\x0304✗\x03 Channel \x02%channel%\x02 ist bereits suspendiert."
  invalid_duration:  "\x0304✗\x03 Ungültige Dauer. Verwenden Sie: 0 (dauerhaft), 1d, 12h oder 60m."
  permanent:         "Dauerhaft"
  channel_suspended: "\x0304✗\x03 Channel \x02%channel%\x02 ist suspendiert und kann nicht verwendet werden."
  channel_forbidden: "\x0304✗\x03 Channel \x02%channel%\x02 ist gesperrt und kann nicht verwendet werden."
  notice_channel:    "\x0304⚠\x03 Channel wurde suspendiert. Grund: %reason%"

unsuspend:
  syntax:           "UNSUSPEND <#channel>"
  short:            "Eine Channel-Suspendierung aufheben."
  help:             "Reaktiviert einen suspendierten Channel und stellt seine Modes und Durchsetzung wieder her.\nDieser Befehl erfordert die IRCop-Berechtigung: chanserv.suspend"
  success:          "\x0303✔\x03 Channel \x02%channel%\x02 ist nicht mehr suspendiert."
  not_registered:   "\x0304✗\x03 Channel \x02%channel%\x02 ist nicht registriert."
  not_suspended:    "\x0304✗\x03 Channel \x02%channel%\x02 ist nicht suspendiert."
  reason_expired:   "abgelaufene Suspendierung"

# NOJOIN-Dokumentation für LEVELS:
# NOJOIN: Minimales Zugriffslevel, das zum Betreten des Channels erforderlich ist. Benutzer mit Level < NOJOIN werden gekickt.
# Standard: -1 (deaktiviert). Auf 0 setzen, um nur registrierte Benutzer zuzulassen, 50 für Level 50+ usw.

nojoin:
  reason: "NOJOIN-Level-Einschränkung"

