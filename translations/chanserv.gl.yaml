    syntax:         "AKICK <#canle> DEL <máscara|número>"
    short:          "Eliminar entrada AKICK."
    help:           "Elimina pola máscara exacta ou polo número de entrada de LIST."
    not_found:      "\x0304✗\x03 AKICK \x02%mask%\x02 non atopada."
