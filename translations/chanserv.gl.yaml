    syntax:         "LEVELS <#canle> LIST"
    short:          "Listar os requisitos de nivel."
    help:           "Mostra cada clave de nivel e o seu valor (predeterminado se non está definido)."
    header:         "\x0303Niveis\x03"
  set:
    syntax:         "LEVELS <#canle> SET <nivel> <valor>"
    short:          "Establecer un requisito de nivel."
    help:           "Valor -1 a 499. Só fundador."
    done:           "\x0303✔\x03 \x02%key%\x02 establecido en %value%."
  reset:
    syntax:         "LEVELS <#canle> RESET"
    short:          "Restablecer todos os niveis aos valores predeterminados."
    help:           "Elimina todas as modificacións. Só fundador."
    done:           "\x0303✔\x03 Todos os niveis restablecidos aos valores predeterminados."

