noexpire:
  syntax:           "NOEXPIRE <#canle> {ON|OFF}"
  short:            "Establecer ou eliminar a protección contra caducidade dunha canle."
  help:             |
    Controla se unha canle caducará por inactividade.
    Cando está ON, a canle nunca caduca sen importar a última actividade.
    Cando está OFF, aplícanse as regras normais de caducidade.

    Só os IRCops co permiso 'chanserv.noexpire' poden usar este comando.

    Sintaxe: NOEXPIRE <#canle> {ON|OFF}
    Exemplos:
      NOEXPIRE #Importante ON
      NOEXPIRE #Importante OFF
  success_on:       "\x0303✔\x03 A canle \x02%channel%\x02 está agora protexida contra a caducidade."
  success_off:      "\x0303✔\x03 A canle \x02%channel%\x02 caducará normalmente agora."
  not_registered:   "\x0304✗\x03 A canle \x02%channel%\x02 non está rexistrada."
  forbidden:         "\x0304✗\x03 A canle \x02%channel%\x02 está prohibida."
  suspended:         "\x0304✗\x03 A canle \x02%channel%\x02 está suspendida."

forbid:
  syntax:           "FORBID <#canle> <motivo>"
  short:             "Prohibir que unha canle sexa usada."
  help:              "Impide que unha canle poida ser usada por ninguén.\nSe a canle está actualmente rexistrada, será eliminada primeiro.\nTodos os usuarios na canle serán expulsados e a canle bloquearase.\nEste comando require o permiso IRCop: chanserv.forbid"
  reason_required:  "\x0304✗\x03 Debe especificar un motivo."
  success:          "\x0303✔\x03 A canle \x02%channel%\x02 foi prohibida."
  updated:          "\x0303✔\x03 O motivo de prohibición da canle \x02%channel%\x02 foi actualizado."
  channel_forbidden: "\x0304✗\x03 A canle \x02%channel%\x02 está prohibida e non se pode usar."

unforbid:
  syntax:           "UNFORBID <#canle>"
  short:             "Eliminar unha prohibición de canle."
  help:              "Elimina unha prohibición de canle, permitindo que a canle poida ser rexistrada de novo.\nEste comando require o permiso IRCop: chanserv.forbid"
  success:          "\x0303✔\x03 A canle \x02%channel%\x02 xa non está prohibida."
  not_forbidden:    "\x0304✗\x03 A canle \x02%channel%\x02 non está prohibida."

