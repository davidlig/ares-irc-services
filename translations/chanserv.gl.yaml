  success:          "\x0303✔\x03 A canle \x02%channel%\x02 xa non está suspendida."
  not_registered:   "\x0304✗\x03 A canle \x02%channel%\x02 non está rexistrada."
  not_suspended:    "\x0304✗\x03 A canle \x02%channel%\x02 non está suspendida."
  reason_expired:   "suspensión caducada"

# NOJOIN documentation for LEVELS:
# NOJOIN: Minimum access level required to join channel. Users with level < NOJOIN are kicked.
# Default: -1 (disabled). Set to 0 to only allow registered users, 50 for level 50+, etc.
# NOJOIN: Nivel de acceso mínimo requirido para entrar na canle. Os usuarios con nivel < NOJOIN son expulsados.
# Predeterminado: -1 (desactivado). Estableza 0 para só usuarios rexistrados, 50 para nivel 50+, etc.

nojoin:
  reason: "Restrición de nivel NOJOIN"

