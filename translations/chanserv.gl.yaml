# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#canle> {ADD|DEL|VIEW|CLEAR}"
  short:            "Ver ou xestionar o historial de accións da canle."
  help:             |
    Xestiona o historial de accións dunha canle.
    Só os IRCops co permiso 'chanserv.history' poden usar este comando.

    Subcomandos:
      ADD   — Engadir unha entrada manual ao historial da canle.
      DEL   — Eliminar unha entrada específica polo ID.
      VIEW  — Ver entradas do historial (paxinado, 3 por páxina).
      CLEAR — Eliminar todas as entradas do historial da canle.

    Sintaxe: HISTORY <#canle> {ADD|DEL|VIEW|CLEAR} [argumentos]
    Exemplos:
      HISTORY #canle VIEW
      HISTORY #canle VIEW 2
      HISTORY #canle VIEW ALL
      HISTORY #canle ADD Sospeita de intento de apropiación
      HISTORY #canle DEL 42
      HISTORY #canle CLEAR
  not_registered:   "\x0304✗\x03 A canle \x02%channel%\x02 non está rexistrada."
  unknown_operator: "(descoñecido)"

  add:
    syntax:     "HISTORY <#canle> ADD <mensaxe>"
    short:      "Engadir unha entrada manual ao historial."
    help:        |
      Engade unha entrada manual ao historial da canle.
    success:    "\x0303✔\x03 Entrada do historial engadida para \x02%channel%\x02."

  del:
    syntax:     "HISTORY <#canle> DEL <id>"
    short:      "Eliminar unha entrada do historial polo ID."
    success:    "\x0303✔\x03 Entrada do historial \x02%id%\x02 eliminada."
    not_found:  "\x0304✗\x03 Entrada do historial \x02%id%\x02 non atopada."
    invalid_id: "\x0304✗\x03 ID de entrada non válido: \x02%id%\x02."

  view:
    syntax:     "HISTORY <#canle> VIEW [PÁXINA|ALL]"
    short:      "Ver o historial de accións da canle."
    header:     "\x02Historial de \x0307%channel%\x03\x02 (mostrando %start%-%end% de %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 por %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Non se atoparon entradas do historial para \x02%channel%\x02."
    page_hint:   "Use \x0303HISTORY %channel% VIEW %next_page%\x03 para máis entradas."

  clear:
    syntax:     "HISTORY <#canle> CLEAR"
    short:      "Eliminar todas as entradas do historial dunha canle."
    success:    "\x0303✔\x03 Limpadas \x02%count%\x02 entradas do historial de \x02%channel%\x02."

