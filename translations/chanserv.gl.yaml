    syntax:         "AKICK <#canle> ADD <máscara> [caducidade] [motivo]"
    short:          "Engadir entrada AKICK."
    help:           "Caducidade obrigatoria se se especifica motivo. Formatos: 0 (permanente), 1d, 7d, 30d, 12h, 60m. Exemplos: 'AKICK #c ADD *!*@* 0', 'AKICK #c ADD *!*@* 7d Spam'."
    done:           "\x0303✔\x03 AKICK \x02%mask%\x02 engadida."
