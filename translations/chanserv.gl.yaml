  short:            "Xestionar a lista de acceso."
  help:             "LIST: mostra a lista de acceso (alcume e nivel por entrada). ADD: engade ou actualiza o nivel dun alcume (1-499). DEL: elimina un alcume da lista. Use \x0303HELP ACCESS <opción>\x03 para cada unha."
