  channel_forbidden: "\x0304✗\x03 A canle \x02%channel%\x02 está prohibida e non se pode usar."
  notice_channel:    "\x0304⚠\x03 A canle foi suspendida. Motivo: %reason%"

unsuspend:
  syntax:           "UNSUSPEND <#canle>"
