    notice_channel: "\x0303✔\x03 \x0302%from%\x03 establece \x0314%to%\x03 no nivel \x0304%level%\x03"
  del:
    syntax:         "ACCESS <#canle> DEL <alcume>"
    short:          "Eliminar da lista de acceso (require nivel ACCESSCHANGE)."
    help:           "Só pode eliminar alcumes con nivel inferior ao seu propio."
    not_in_list:    "\x0304✗\x03 \x02%nickname%\x02 non está na lista de acceso."
    done:           "\x0303✔\x03 \x02%nickname%\x02 eliminado da lista de acceso."
    notice_channel: "\x0304✗\x03 \x0302%from%\x03 elimina \x0314%to%\x03 da lista de acceso"

