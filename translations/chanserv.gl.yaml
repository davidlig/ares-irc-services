    syntax:         "ACCESS <#canle> LIST"
    short:          "Listar a lista de acceso (require nivel ACCESSLIST)."
    help:           "Mostra o alcume e nivel de cada entrada."
    header:         "\x0303Lista de acceso de \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 A canle \x02%channel%\x02 non ten entradas de acceso."
    entry:          "  #%index%: %nickname% (nivel %level%)"
  add:
    syntax:         "ACCESS <#canle> ADD <alcume> <nivel>"
    short:          "Engadir ou actualizar nivel de acceso (require nivel ACCESSCHANGE)."
    help:           "Nivel 1-499. Só pode establecer niveis inferiores ao seu propio."
