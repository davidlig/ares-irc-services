# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#canle>"
  short:            "Limpar toda a lista de acceso dunha canle."
  help:             |
    Elimina todas as entradas de acceso da lista de acceso dunha canle.
    Esta acción é irreversible e non se pode desfacer.
    Só os IRCops co permiso 'chanserv.clearaccess' poden usar este comando.

    Sintaxe: CLEARACCESS <#canle>
    Exemplos:
      CLEARACCESS #canle
  success:          "\x0303✔\x03 Limpadas \x02%count%\x02 entradas de acceso de \x02%channel%\x02."
  empty:            "\x0307ℹ\x03 A canle \x02%channel%\x02 non ten entradas de acceso."

clearusers:
  syntax:           "CLEARUSERS <#canle> [motivo]"
  short:            "Expulsar todos os usuarios dunha canle."
  help:             |
    Expulsa todos os usuarios da canle especificada.
    Este é un comando exclusivo para IRCops usado na xestión de canles.
    Pode proporcionarse un motivo opcional; se se omite, úsase un motivo predeterminado.

    Só os IRCops co permiso 'chanserv.clearusers' poden usar este comando.

    Sintaxe: CLEARUSERS <#canle> [motivo]
    Exemplos:
      CLEARUSERS #canle
      CLEARUSERS #canle flooding
  not_on_network:   "\x0304✗\x03 A canle \x02%channel%\x02 non está actualmente na rede."
  empty:            "\x0307ℹ\x03 A canle \x02%channel%\x02 non ten usuarios que expulsar."
  success:          "\x0303✔\x03 Expulsado(s) \x02%count%\x02 usuario(s) de \x02%channel%\x02."
  default_reason:   "Comando CLEARUSERS"
