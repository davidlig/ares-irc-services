  short:            "Configurar os niveis da canle."
  help:             "LIST: mostra os requisitos de nivel (OPDEOP, VOICEDEVOICE, etc.). SET: establece o nivel mínimo para unha acción (-1 a 499). RESET: restaura os valores predeterminados. Só fundador para SET/RESET."
  unknown_sub:      "\x0304✗\x03 Subcomando descoñecido \x02%sub%\x02. Use LIST, SET ou RESET."
