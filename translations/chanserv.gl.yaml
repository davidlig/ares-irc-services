  help:             "Desactiva temporalmente unha canle rexistrada. Formatos de duración: 0 = permanente, 1d, 12h, 60m.\nMentres está suspendida, os modos, acceso e forzado da canle están desactivados.\nEste comando require o permiso IRCop: chanserv.suspend"
  success:          "\x0303✔\x03 A canle \x02%channel%\x02 foi suspendida ata \x02%duration%\x02."
  not_registered:   "\x0304✗\x03 A canle \x02%channel%\x02 non está rexistrada."
  already_suspended: "\x0304✗\x03 A canle \x02%channel%\x02 xa está suspendida."
  invalid_duration:  "\x0304✗\x03 Duración non válida. Use: 0 (permanente), 1d, 12h ou 60m."
