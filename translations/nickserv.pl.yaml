# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <nick> <czas_trwania> <powód>"
  short:            "Zawieś nick."
  help:             |
    Zawiesza nick, uniemożliwiając właścicielowi identyfikację.
    Zawieszenie może być tymczasowe lub stałe.

    Formaty czasu trwania: \x0303%d\x03 (dni), \x0303%h\x03 (godzin), \x0303%m\x03 (minut), lub \x03030\x03 (stałe).

    Zawieszeni użytkownicy nie mogą zidentyfikować się do swojego nicka.
    Operatorzy IRC i użytkownicy root nie mogą być zawieszeni.

    Składnia: SUSPEND <nick> <czas_trwania> <powód>
    Przykłady:
      SUSPEND ZlyUzytkownik 7d Spamowanie na #help
      SUSPEND Naduzywca 30d Powtarzające się zalewanie
      SUSPEND Problematyczny 0 Obchodzenie permabana
  success:            "\x0303✔\x03 Nick \x02%nickname%\x02 został zawieszony do \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 Nick \x02%nickname%\x02 jest już zawieszony."
  not_registered:     "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zarejestrowany."
  forbidden:          "\x0304✗\x03 Nick \x02%nickname%\x02 jest zabroniony i nie może być zawieszony."
  cannot_suspend_oper: "\x0304✗\x03 Nie można zawiesić operatora IRC \x02%nickname%\x02."
  cannot_suspend_root: "\x0304✗\x03 Nie można zawiesić użytkownika root \x02%nickname%\x02."
  cannot_suspend_service: "\x0304✗\x03 Nie można zawiesić nicka serwisowego \x02%nickname%\x02."
  invalid_duration:   "\x0304✗\x03 Nieprawidłowy czas trwania. Użyj: \x0303<d><h><m>\x03 (np., 7d, 12h, 30m) lub \x03030\x03 dla stałego."
  permanent:          "stałe"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <nick>"
  short:            "Usuń zawieszenie z nicka."
  help:             |
    Usuwa aktywne zawieszenie z nicka, pozwalając właścicielowi na ponowną identyfikację.

    Składnia: UNSUSPEND <nick>
    Przykład: UNSUSPEND JakisUzytkownik
  success:          "\x0303✔\x03 Zawieszenie zostało zniesione z \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zarejestrowany."
  not_suspended:    "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zawieszony."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <nick>"
  short:            "Wymuś zmianę nicka połączonego użytkownika na losowy."
  help:             |
    Wymusza na połączonym użytkowniku zmianę nicka na losowo wygenerowany.
    Przydatne do egzekwowania polityk sieci bez rozłączania użytkownika.

    Nowy format nicka używa skonfigurowanego prefiksu gościa (%prefix%).

    Ta komenda wymaga uprawnienia IRCop: nickserv.rename

    Składnia: RENAME <nick>
    Przykład: RENAME Klopotliwy
  not_online:        "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest połączony."
  cannot_rename_root: "\x0304✗\x03 Nie można przemianować użytkownika root \x02%nickname%\x02."
  cannot_rename_oper: "\x0304✗\x03 Nie można przemianować operatora IRC \x02%nickname%\x02."
  cannot_rename_service: "\x0304✗\x03 Nie można przemianować nicka serwisowego \x02%nickname%\x02."
  success:           "\x0303✓\x03 Nick \x02%nickname%\x02 został przemianowany na \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <nick> [FORCE]"
  short:            "Usuń zarejestrowany nick."
  help:             |
    Usuwa zarejestrowany nick z bazy danych.
    Ta akcja jest nieodwracalna.

    Jeśli użytkownik jest online, zostanie przemianowany na nick Gosc-.
    Użytkownicy root i Operatorzy IRC nie mogą być usunięci.
    Nie możesz usunąć własnego nicka.

    Ta komenda wymaga uprawnienia IRCop: nickserv.drop

    Składnia: DROP <nick>
    Przykład: DROP StareKonto
  not_registered:     "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zarejestrowany."
  suspended:         "\x0304✗\x03 Nick \x02%nickname%\x02 jest zawieszony. Najpierw zdejmij zawieszenie."
  forbidden:         "\x0304✗\x03 Nick \x02%nickname%\x02 jest zabroniony."
  cannot_drop_root:   "\x0304✗\x03 Nie można usunąć użytkownika root \x02%nickname%\x02."
  cannot_drop_oper:   "\x0304✗\x03 Nie można usunąć operatora IRC \x02%nickname%\x02."
  cannot_drop_self:    "\x0304✗\x03 Nie możesz usunąć własnego nicka."
  success:            "\x0303✓\x03 Nick \x02%nickname%\x02 został oznaczony do usunięcia i może być przywrócony w okresie karencji."
  force_success:      "\x0303✓\x03 Nick \x02%nickname%\x02 został trwale usunięty."
  pending_deletion:   "\x0304✗\x03 Nick \x02%nickname%\x02 już oczekuje na usunięcie. Użyj DROP <nick> FORCE aby usunąć go trwale."
  cannot_drop_service: "\x0304✗\x03 Nie można usunąć nicka serwisowego \x02%nickname%\x02."

# --- RESTORE (IRCop) -----------------------------------------------------------
restore:
  syntax:           "RESTORE <nick>"
  short:            "Przywróć nicka oczekującego na usunięcie."
  help:             "Przywraca nicka, który został ręcznie usunięty i wciąż znajduje się w okresie karencji. Wymaga uprawnienia IRCop: nickserv.restore."
  success:          "\x0303✓\x03 Nick \x02%nickname%\x02 został przywrócony."
  not_registered:   "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zarejestrowany."
  not_pending_deletion: "\x0304✗\x03 Nick \x02%nickname%\x02 nie oczekuje na usunięcie."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <nick> <powód>"
  short:            "Trwale zablokuj nick przed używaniem."
  help:             |
    Zabrania używania nicka w sieci.
    Nick nie może być zarejestrowany ani używany przez nikogo.

    Jeśli nick jest obecnie zarejestrowany, zostanie najpierw usunięty.
    Jeśli ktoś go używa, zostanie zmuszony do zmiany na nick Gosc-.

    Użytkownicy root, Operatorzy IRC i nicki serwisowe nie mogą być zabronione.

    Ta komenda wymaga uprawnienia IRCop: nickserv.forbid

    Składnia: FORBID <nick> <powód>
    Przykład: FORBID ZlyNick Powtarzające się naruszenia regulaminu
  success:            "\x0303✔\x03 Nick \x02%nickname%\x02 został zabroniony."
  updated:            "\x0303✔\x03 Powód zabronienia dla \x02%nickname%\x02 został zaktualizowany."
  reason_required:    "\x0304✗\x03 Musisz podać powód zabronienia."
  cannot_forbid_root:  "\x0304✗\x03 Nie można zabronić użytkownika root \x02%nickname%\x02."
  cannot_forbid_oper:  "\x0304✗\x03 Nie można zabronić operatora IRC \x02%nickname%\x02."
  cannot_forbid_service: "\x0304✗\x03 Nie można zabronić nicka serwisowego \x02%nickname%\x02."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <nick>"
  short:            "Usuń zabronienie nicka."
  help:             |
    Usuwa zabronienie nicka, pozwalając na ponowne używanie.

    Ta komenda wymaga uprawnienia IRCop: nickserv.forbid

    Składnia: UNFORBID <nick>
    Przykład: UNFORBID JakisNick
  success:          "\x0303✔\x03 Nick \x02%nickname%\x02 nie jest już zabroniony."
  not_forbidden:    "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zabroniony."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST {ADD|DEL|LIST} [wzorzec]"
  short:            "Zarządzaj zabronionymi wzorcami vhost."
  help:             |
    Zarządza wzorcami, które uniemożliwiają użytkownikom ustawianie pasujących
    vhostów przez NickServ SET VHOST.

    Symbole wieloznaczne: * pasuje do dowolnego ciągu, ? pasuje do pojedynczego znaku.
    Przykład: *.piracka.strona blokuje każdy vhost kończący się na .piracka.strona

    Ta komenda wymaga uprawnienia IRCop: nickserv.forbidvhost

    Podkomendy:
      ADD <wzorzec>      Dodaj zabroniony wzorzec
      DEL <wzorzec>      Usuń zabroniony wzorzec
      LIST               Pokaż wszystkie zabronione wzorce

  unknown_sub: "\x0304✗\x03 Nieznana podkomenda \x02%sub%\x02. Użyj ADD, DEL lub LIST."

  add:
    syntax:      "FORBIDVHOST ADD <wzorzec>"
    short:       "Dodaj zabroniony wzorzec vhost."
    help:        |
      Dodaje wzorzec do listy zabronionych vhostów. Użytkownicy nie będą
      mogli ustawiać vhostów pasujących do tego wzorca przez SET VHOST.

      Symbole wieloznaczne: * pasuje do dowolnego ciągu, ? pasuje do pojedynczego znaku.

      Składnia: FORBIDVHOST ADD <wzorzec>
      Przykład: FORBIDVHOST ADD *.piracka.strona
    done:            "\x0303✓\x03 Zabroniony wzorzec vhost dodany: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 Wzorzec \x02%pattern%\x02 już istnieje."
    invalid:          "\x0304✗\x03 Nieprawidłowy format wzorca vhost."

  del:
    syntax:      "FORBIDVHOST DEL <wzorzec>"
    short:       "Usuń zabroniony wzorzec vhost."
    help:        |
      Usuwa wzorzec z listy zabronionych vhostów.

      Składnia: FORBIDVHOST DEL <wzorzec>
      Przykład: FORBIDVHOST DEL *.piracka.strona
    done:        "\x0303✓\x03 Zabroniony wzorzec vhost usunięty: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 Wzorzec \x02%pattern%\x02 nie znaleziony."

  list:
    short:       "Lista wszystkich zabronionych wzorców vhost."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Pokazuje wszystkie zabronione wzorce vhost.

      Składnia: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Zabronione wzorce vhost (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — przez %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 Brak zabronionych wzorców vhost."
    unknown_creator: "nieznany"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <nick> {ADD|DEL|VIEW|CLEAR}"
  short:            "Przeglądaj lub zarządzaj historią działań nicka."
  help:             |
    Zarządzaj historią działań dla nicka.
    Tylko IRCops z uprawnieniem 'nickserv.history' mogą użyć tej komendy.

    Akcje rejestrowane automatycznie:
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Składnia: HISTORY <nick> ADD <wiadomość>
            HISTORY <nick> DEL <id>
            HISTORY <nick> VIEW [PAGE|ALL]
            HISTORY <nick> CLEAR

    Przykłady:
      HISTORY JakisNick VIEW
      HISTORY JakisNick ADD Ręczna notatka o tym użytkowniku
      HISTORY JakisNick VIEW 2
      HISTORY JakisNick VIEW ALL
      HISTORY JakisNick DEL 123
      HISTORY JakisNick CLEAR

    Użyj VIEW aby zobaczyć historię (domyślnie pokazuje 3 wpisy).
    Użyj VIEW PAGE 2 aby zobaczyć następną stronę.
    Użyj VIEW ALL aby zobaczyć pełną historię.
    Użyj ADD aby dodać ręczny wpis.
    Użyj DEL aby usunąć konkretny wpis według ID.
    Użyj CLEAR aby usunąć wszystkie wpisy historii.
  not_registered:   "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zarejestrowany."
  unknown_operator: "(nieznany)"

  add:
    syntax:     "HISTORY <nick> ADD <wiadomość>"
    short:      "Dodaj ręczny wpis historii."
    help:        |
      Dodaje ręczny wpis do historii nicka.

      Składnia: HISTORY <nick> ADD <wiadomość>
      Przykład: HISTORY JakisNick ADD Użytkownik zgłoszony za spam
    success:    "\x0303✔\x03 Wpis historii dodany dla \x02%nickname%\x02."

  del:
    syntax:     "HISTORY <nick> DEL <id>"
    short:      "Usuń wpis historii według ID."
    help:        |
      Usuwa konkretny wpis historii według jego ID.

      Składnia: HISTORY <nick> DEL <id>
      Przykład: HISTORY JakisNick DEL 42
    success:    "\x0303✔\x03 Wpis historii \x02%id%\x02 usunięty."
    not_found:  "\x0304✗\x03 Wpis historii \x02%id%\x02 nie znaleziony."
    invalid_id: "\x0304✗\x03 Nieprawidłowe ID wpisu: \x02%id%\x02."

  view:
    syntax:     "HISTORY <nick> VIEW [PAGE|ALL]"
    short:      "Przeglądaj historię działań nicka."
    help:        |
      Wyświetla historię działań nicka.

      Składnia: HISTORY <nick> VIEW
              HISTORY <nick> VIEW PAGE
              HISTORY <nick> VIEW ALL

      Domyślnie pokazuje 3 wpisy na raz.
      Użyj VIEW 2 aby zobaczyć drugą stronę.
      Użyj VIEW ALL aby zobaczyć pełną historię.
    header:     "\x02Historia dla \x0307%nickname%\x03\x02 (pokazuje %start%-%end% z %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 przez %operator% — %message%"
    extra:       "  Dodatkowo \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Brak wpisów historii dla \x02%nickname%\x02."
    page_hint:   "Użyj \x0303HISTORY %nickname% VIEW %next_page%\x03 aby zobaczyć więcej wpisów."

  clear:
    syntax:     "HISTORY <nick> CLEAR"
    short:      "Usuń wszystkie wpisy historii nicka."
    help:        |
      Usuwa wszystkie wpisy historii dla podanego nicka.
      Ta akcja jest nieodwracalna.

      Składnia: HISTORY <nick> CLEAR
      Przykład: HISTORY JakisNick CLEAR
    success:    "\x0303✔\x03 Wyczyszczono \x02%count%\x02 wpisów historii dla \x02%nickname%\x02."

