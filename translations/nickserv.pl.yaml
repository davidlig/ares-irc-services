# NickServ translations — Polski
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02        bold on/off
#   \x03NN      color (DECIMAL: 03=green, 04=red, 07=orange, 14=dark grey)
#   \x03        reset color
#   \x0F        reset all formatting
#
# NOTE: IRC colors use DECIMAL numbers (0-15), not hexadecimal.
#   \x0314 = dark grey (14 decimal)  ← CORRECT
#   \x030F = color 0 + letter "F"    ← WRONG (0F is hex, not decimal)

unknown_command: "\x0304✗\x03 Nieznana komenda \x02%command%\x02. Użyj \x0303/msg %bot% HELP\x03."

error:
  syntax:            "\x0304✗\x03 Nieprawidłowa składnia. Użycie: \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Ta komenda jest dostępna tylko dla Operatorów IRC."
  not_identified:    "\x0304✗\x03 Nie jesteś zidentyfikowany. Użyj \x0303/msg %bot% IDENTIFY <nick> <hasło>\x03"
  permission_denied: "\x0304✗\x03 Odmowa dostępu. Nie masz uprawnień do tej komendy."
  mail_failed:       "\x0304✗\x03 Nie można wysłać wiadomości e-mail. Sprawdź adres lub spróbuj później."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <hasło> <e-mail>"
  short:            "Zarejestruj swój nick w serwisach."
  help:             "Rozpoczyna rejestrację Twojego obecnego nicka. Token weryfikacyjny\nzostanie wysłany na podany adres e-mail. Zakończ rejestrację\nużywając \x0303/msg %bot% VERIFY <token>\x03. Token wygasa za 1 godzinę.\nJeśli nie dotarł, sprawdź folder spam lub użyj \x0303RESEND\x03."
  pending:          "\x0307→\x03 Token weryfikacyjny został wysłany na \x02%email%\x02.\n  Uruchom \x0303/msg %bot% VERIFY <token>\x03 aby zakończyć rejestrację.\n  Nie otrzymałeś? Sprawdź spam lub użyj \x0303/msg %bot% RESEND\x03\n  Token wygaśnie za \x021 godzinę\x02."
  already_registered: "\x0304✗\x03 Nick \x02%nickname%\x02 jest już zarejestrowany."
  already_pending:  "\x0304✗\x03 Nick \x02%nickname%\x02 ma już oczekującą weryfikację.\n  Użyj \x0303/msg %bot% VERIFY <token>\x03 lub \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 Nick \x02%nickname%\x02 nie może być zarejestrowany w tej sieci."
  pending_deletion: "\x0304✗\x03 Nick \x02%nickname%\x02 oczekuje na usunięcie i nie może być zarejestrowany."
  invalid_email:    "\x0304✗\x03 Podany adres e-mail jest nieprawidłowy."
  email_already_used: "\x0304✗\x03 E-mail \x02%email%\x02 jest już używany przez inny nick. Użyj innego adresu."
  throttled:          "\x0304✗\x03 Musisz poczekać \x02%minutes%\x02 minut(y) przed ponowną próbą rejestracji."
  guest_prefix_forbidden: "\x0304✗\x03 Nie możesz zarejestrować nicka zaczynającego się od \x02%prefix%\x02."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "Potwierdź swój adres e-mail i aktywuj nicka."
  help:             "Kończy rejestrację poprzez weryfikację tokenu wysłanego na Twój e-mail.\nToken jest ważny przez 1 godzinę od momentu rejestracji."
  success:          "\x0303✔\x03 Nick \x02%nickname%\x02 został pomyślnie zarejestrowany i jesteś teraz zidentyfikowany."
  invalid_token:    "\x0304✗\x03 Token jest nieprawidłowy lub wygasł. Użyj \x0303/msg %bot% REGISTER\x03 aby zacząć od nowa."
  no_pending:       "\x0304✗\x03 Nie masz oczekującej rejestracji do zweryfikowania."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Wyślij ponownie token weryfikacyjny na Twój e-mail."
  help:             "Wysyła ponownie token weryfikacyjny na adres e-mail podany podczas\nrejestracji. Działa tylko jeśli masz oczekującą rejestrację."
  success:          "\x0307→\x03 Token weryfikacyjny ponownie wysłany na \x02%email%\x02."
  no_pending:       "\x0304✗\x03 Nie masz oczekującej rejestracji do ponownego wysłania tokenu."
  throttled:        "\x0304✗\x03 Musisz poczekać \x02%minutes%\x02 minut(y) przed zażądaniem kolejnego e-maila weryfikacyjnego."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <nick> [token]"
  short:            "Odzyskaj nick jeśli zgubiłeś hasło."
  help:             "Odzyskuje dostęp do zarejestrowanego nicka gdy zgubiłeś hasło.\n1) \x0303RECOVER <nick>\x03 — token jest wysyłany na e-mail nicka.\n2) \x0303RECOVER <nick> <token>\x03 — wprowadź token z e-maila aby zresetować hasło.\nOtrzymasz następnie tymczasowe hasło i komendę do jego zmiany."
  email_sent:       "\x0307→\x03 Token odzyskiwania został wysłany na \x02%email_hint%\x02. Sprawdź skrzynkę odbiorczą (i folder spam)."
  not_registered:   "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zarejestrowany."
  pending:          "\x0304✗\x03 Nick \x02%nickname%\x02 oczekuje na weryfikację e-mail."
  suspended:        "\x0304✗\x03 Nick \x02%nickname%\x02 jest zawieszony. Powód: %reason%"
  forbidden:        "\x0304✗\x03 Nick \x02%nickname%\x02 nie może być używany w tej sieci."
  no_email:         "\x0304✗\x03 Brak ustawionego e-maila dla nicka \x02%nickname%\x02. Odzyskiwanie nie jest dostępne."
  throttled:        "\x0304✗\x03 Musisz poczekać \x02%minutes%\x02 minut(y) przed zażądaniem kolejnego e-maila odzyskiwania."
  invalid_token:    "\x0304✗\x03 Token jest nieprawidłowy lub wygasł. Poproś o nowy używając \x0303RECOVER %nickname%\x03."
  success_identify: "\x0303✔\x03 Hasło zresetowane. Zidentyfikuj się teraz: \x0303%identify_cmd%\x03"
  success_then_change: "Następnie zmień hasło: \x0303/msg %bot% SET PASSWORD <nowe_hasło>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <nick> <hasło>"
  short:            "Zidentyfikuj się jako właściciel nicka."
  help:             "Uwierzytelnia Twoją sesję z %nickserv% używając Twojego nicka i hasła.\nPo udanej identyfikacji otrzymasz tryb zarejestrowanego \x02+r\x02\ni, jeśli używałeś nicka gościa, Twój zarejestrowany nick zostanie przywrócony."
  success:          "\x0303✔\x03 Jesteś teraz zidentyfikowany jako \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 Jesteś już zidentyfikowany jako \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zarejestrowany."
  invalid_credentials: "\x0304✗\x03 Nieprawidłowe hasło. Spróbuj ponownie."
  locked_out:         "\x0304✗\x03 Zbyt wiele nieudanych prób. Spróbuj ponownie za \x02%minutes%\x02 minut(y)."
  ghost_released:   "\x0307⚡\x03 Sesja-duch trzymająca \x02%nickname%\x02 została rozłączona."
  kill_reason:      "Nick %nickname% odzyskany przez %source% (zarejestrowany właściciel zidentyfikował się)"
  pending:          "\x0304✗\x03 Nick \x02%nickname%\x02 oczekuje na weryfikację e-mail.\n  Uruchom \x0303/msg %bot% VERIFY <token>\x03 lub \x0303/msg %bot% RESEND\x03."
  suspended:        "\x0304✗\x03 Nick \x02%nickname%\x02 jest zawieszony. Powód: %reason%"
  forbidden:        "\x0304✗\x03 Nick \x02%nickname%\x02 nie może być używany w tej sieci."
  pending_deletion: "\x0304✗\x03 Nick \x02%nickname%\x02 oczekuje na usunięcie i nie może być używany."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <nick>"
  short:            "Wyświetl status rejestracji nicka."
  help:             "Pokazuje obecny status nicka: zarejestrowany, oczekująca weryfikacja,\nzawieszony lub zabroniony."
  header:           "\x02Status nicka \x0307%nickname%\x03:\x02"
  unregistered:     "  Status          : Niezarejestrowany"
  not_registered_offline: "  Status          : \x0315Niezarejestrowany\x03"
  pending:          "  Status          : \x0307Oczekująca weryfikacja\x03"
  pending_expires:  "  Wygasa za       : %minutes% minut(y)"
  pending_expires_at: "  Wygasa o        : %date%"
  not_connected:    "  Status          : \x0315Niepołączony\x03"
  not_identified:   "  Status          : \x0307Niezidentyfikowany\x03"
  identified:       "  Status          : \x0303Zidentyfikowany\x03"
  suspended:        "  Status          : \x0304Zawieszony\x03"
  suspended_reason: "  Powód           : %reason%"
  suspended_until:  "  Kończy się      : %date%"
  suspended_permanent: "  Kończy się      : Stałe"
  forbidden:        "  Status          : \x0304Zabroniony\x03"
  forbidden_reason: "  Powód           : %reason%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <nick>"
  short:            "Wyświetl informacje o zarejestrowanym nicku."
  help:             "Pokazuje szczegóły rejestracji nicka: datę rejestracji, status\npołączenia, ostatnią wiadomość wyjścia i adres e-mail. E-mail jest widoczny tylko\ndla właściciela gdy zidentyfikowany. Przy PRIVATE ON tylko właściciel i Operatorzy IRC\nmogą zobaczyć informacje."
  not_registered:   "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zarejestrowany."
  private:          "\x0304✗\x03 Informacje o nicku \x02%nickname%\x02 są prywatne."
  header:           "\x02Informacje o nicku \x0307%nickname%\x03:\x02"
  status:           "  \x0314Status\x03                  : %status%"
  status_registered:  "\x0303Zarejestrowany\x03"
  status_suspended:   "\x0304Zawieszony\x03"
  status_forbidden:   "\x0304Zabroniony\x03"
  status_pending_deletion: "07Oczekuje na usunięcie"
  status_pending_deletion_at:  "  14Usunięty           : %date%"
  reason:           "  \x0314Powód\x03                   : %reason%"
  suspended_until:  "  \x0314Kończy się\x03              : %date%"
  suspended_permanent: "  \x0314Kończy się\x03              : Stałe"
  registered_at:    "  \x0314Zarejestrowany\x03          : %date%"
  last_seen_online: "  \x0314Ostatnio widziany\x03       : \x0303● TERAZ ONLINE\x03"
  last_seen_at:     "  \x0314Ostatnio widziany\x03       : %date%"
  last_seen_never:  "  \x0314Ostatnio widziany\x03       : Nigdy"
  last_quit:        "  \x0314Ostatnia wiad. wyjścia\x03  : %message%"
  last_connect:     "  \x0314Ostatnio widziany z\x03     : %ip% (%host%)"
  language:         "  \x0314Język\x03                   : %language%"
  email:            "  \x0314E-mail\x03                  : %email%"
  vhost:            "  \x0314VHost\x03                   : %vhost%"
