  pending_deletion_notice: "  07Ten nick oczekuje na usunięcie i nie może być zarejestrowany."
  footer:           "\x0314─────────────────────────────\x03"
  channels_header:  "\x0314\x0AKanały z dostępem:\x03"
  channels_entry_founder:   "  %channel% (\x0303Założyciel\x03)"
  channels_entry_successor: "  %channel% (\x0303Następca\x03)"
  channels_entry_access:    "  %channel% (%level%)"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <opcja> <wartość>"
  short:            "Zmień ustawienia swojego nicka %nickserv%."
  help:             "Modyfikuje ustawienia Twojego nicka %nickserv%.\nMusisz być zidentyfikowany aby użyć tej komendy."
  unknown_option:   "\x0304✗\x03 Nieznana opcja \x02%option%\x02. Dostępne opcje: %options%."

  password:
    syntax:         "SET PASSWORD <nowe_hasło>"
    short:          "Zmień hasło swojego nicka."
    help:           "Zmienia hasło dla Twojego nicka NickServ. Nowe hasło obowiązuje\nnatychmiast. Wybierz silne hasło o długości co najmniej 6 znaków,\nktórego nie używasz w innych serwisach."
    success:        "\x0303✔\x03 Twoje hasło zostało pomyślnie zaktualizowane."

  email:
    syntax:         "SET EMAIL <nowy_e-mail> [token]"
    short:          "Zmień adres e-mail powiązany z Twoim nickiem (dwuetapowe potwierdzenie)."
    help:           "Zmiana e-maila w dwóch krokach dla bezpieczeństwa.\n1) \x0303SET EMAIL <nowy_e-mail>\x03 — token jest wysyłany na Twój obecny e-mail.\n2) \x0303SET EMAIL <nowy_e-mail> <token>\x03 — potwierdź otrzymanym tokenem.\nToken wygasa za 1 godzinę."
    success:        "\x0303✔\x03 Twój e-mail został zaktualizowany na \x02%email%\x02."
    pending_sent:   "\x0307→\x03 Token potwierdzający został wysłany na \x02%current_email%\x02.\n  Aby potwierdzić zmianę na \x02%new_email%\x02 uruchom:\n  \x0303/msg %bot% SET EMAIL %new_email% <token>\x03\n  Token wygasa za 1 godzinę."
    invalid_token:  "\x0304✗\x03 Token jest nieprawidłowy lub wygasł. Poproś o nowy używając \x0303SET EMAIL <nowy_e-mail>\x03."

  language:
    syntax:         "SET LANGUAGE <kod>"
    short:          "Zmień język używany przez serwisy do komunikacji z Tobą."
    help:           "Zmienia język, w jakim %nickserv% i inne serwisy mówią do Ciebie.\nDostępne języki:\n  \x02ca\x02 (kataloński)\n  \x02de\x02 (niemiecki)\n  \x02el\x02 (grecki)\n  \x02en\x02 (angielski)\n  \x02es\x02 (hiszpański)\n  \x02eu\x02 (baskijski)\n  \x02fr\x02 (francuski)\n  \x02gl\x02 (galicyjski)\n  \x02it\x02 (włoski)\n  \x02nl\x02 (niderlandzki)\n  \x02pl\x02 (polski)\n  \x02pt\x02 (portugalski)\n  \x02ro\x02 (rumuński)\n  \x02tr\x02 (turecki)"
    success:        "\x0303✔\x03 Język zmieniony na \x02%language%\x02."
    invalid:        "\x0304✗\x03 Nieobsługiwany język. Dostępne języki: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <strefa_czasowa>"
    short:          "Ustaw strefę czasową używaną przy wyświetlaniu dat."
    help:           "Ustawia strefę czasową używaną gdy %nickserv% pokazuje daty.\nUżyj \x02HELP SET TIMEZONE\x02 aby zobaczyć indeks regionów; \x02HELP SET TIMEZONE <region>\x02 (np. Europe) aby zobaczyć strefy danego regionu. Użyj \x02OFF\x02 aby wyczyścić."
    success:        "\x0303✔\x03 Strefa czasowa ustawiona na \x02%timezone%\x02. Daty będą wyświetlane w tej strefie."
    cleared:        "\x0303✔\x03 Strefa czasowa wyczyszczona. Daty będą używać domyślnej sieciowej."
    invalid:        "\x0304✗\x03 Nieprawidłowa strefa czasowa \x02%timezone%\x02. Użyj prawidłowego identyfikatora (np. UTC, Europe/Warsaw)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Włącz lub wyłącz prywatność informacji o Twoim nicku."
    help:           "Kontroluje widoczność informacji o Twoim nicku w komendzie INFO.\nPrzy \x02PRIVATE ON\x02 tylko Ty i Operatorzy IRC mogą zobaczyć Twoje dane.\nPrzy \x02PRIVATE OFF\x02 Twoje informacje są publiczne dla wszystkich."
    on:             "\x0303✔\x03 Informacje o Twoim nicku są teraz \x02prywatne\x02."
    off:            "\x0303✔\x03 Informacje o Twoim nicku są teraz \x02publiczne\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Użyj PRIVMSG (ON) lub NOTICE (OFF) dla odpowiedzi serwisów."
    help:           "Kontroluje jak %nickserv% i inne serwisy wysyłają do Ciebie wiadomości.\nPrzy \x02MSG ON\x02 odpowiedzi są wysyłane jako \x02PRIVMSG\x02 (niektóre klienty mogą wywołać automatyczne odpowiedzi lub powiadomienia).\nPrzy \x02MSG OFF\x02 odpowiedzi są wysyłane jako \x02NOTICE\x02 (domyślnie; zazwyczaj bez automatycznej odpowiedzi)."
    on:             "\x0303✔\x03 Wiadomości serwisów będą teraz wysyłane jako \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 Wiadomości serwisów będą teraz wysyłane jako \x02NOTICE\x02."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Ustaw lub wyczyść swój niestandardowy host wirtualny (wyświetlany hostname)."
    help:           "Ustawia niestandardową nazwę hosta, którą inni widzą gdy jesteś zidentyfikowany.\nUżyj \x02SET VHOST OFF\x02 aby wyczyścić. Tylko litery (a-z, A-Z), cyfry, myślnik i kropka;\nbez myślnika lub kropki na początku/końcu bloku; maks. 48 znaków. Unikalny na nick."
    success:        "\x0303✔\x03 Twój host wirtualny został ustawiony na \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 Twój host wirtualny został wyczyszczony."
    invalid:        "\x0304✗\x03 Nieprawidłowy vhost. Tylko litery, cyfry, myślnik i kropka (nie na początku/końcu bloku); maks. 48 znaków."
    taken:          "\x0304✗\x03 Ten vhost jest już używany przez inny nick."
    forced:         "\x0304✗\x03 Twój vhost jest konfigurowany automatycznie i nie może być zmieniony przez SET VHOST."

# --- SASET (IRCop) --------------------------------------------------------------
saset:
  syntax:           "SASET <nick> <opcja> <wartość>"
  short:            "Modyfikuj ustawienia innego nicka."
  help:             |
    Umożliwia Operatorowi IRC modyfikowanie ustawień zarejestrowanego nicka.
    Docelowy nick nie może być użytkownikiem root, Operatorem IRC ani nickiem serwisowym.

    Dostępne opcje: PASSWORD, EMAIL, LANGUAGE, TIMEZONE, PRIVATE, MSG, VHOST

    SASET PASSWORD: Zmienia hasło bezpośrednio (bez potwierdzenia e-mailem).
    SASET EMAIL: Zmienia e-mail bezpośrednio (bez walidacji tokenem).

    Ta komenda wymaga uprawnienia IRCop: nickserv.saset

    Składnia: SASET <nick> <opcja> <wartość>
    Przykład: SASET Użytkownik PASSWORD nowehasło
  unknown_option:   "\x0304✗\x03 Nieznana opcja \x02%option%\x02. Dostępne opcje: %options%."
  not_registered:   "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zarejestrowany."
  cannot_modify_oper: "\x0304✗\x03 Nie można modyfikować nicka Operatora IRC."

  password:
    syntax:         "SASET <nick> PASSWORD <nowe_hasło>"
    short:          "Zmień hasło nicka."
    help:           "Zmienia hasło innego nicka.\nZmiana jest natychmiastowa.\n\nSkładnia: SASET <nick> PASSWORD <nowe_hasło>\nPrzykład: SASET Użytkownik PASSWORD nowehasło123"
    success:        "\x0303✔\x03 Hasło \x02%nickname%\x02 zostało zaktualizowane."

  email:
    syntax:         "SASET <nick> EMAIL <nowy_e-mail>"
    short:          "Zmień e-mail nicka."
    help:           "Zmienia e-mail innego nicka.\nŻadne potwierdzenie nie jest wysyłane—zmiana jest natychmiastowa.\n\nSkładnia: SASET <nick> EMAIL <nowy_e-mail>\nPrzykład: SASET Użytkownik EMAIL użytkownik@przykład.com"
    success:        "\x0303✔\x03 E-mail \x02%nickname%\x02 został zaktualizowany na \x02%email%\x02."

  language:
    syntax:         "SASET <nick> LANGUAGE <kod>"
    short:          "Zmień język nicka."
    help:           "Zmienia język innego nicka.\nDostępne języki: en (angielski), es (hiszpański).\n\nSkładnia: SASET <nick> LANGUAGE <kod>\nPrzykład: SASET Użytkownik LANGUAGE pl"
    success:        "\x0303✔\x03 Język \x02%nickname%\x02 został zmieniony na \x02%language%\x02."

  timezone:
    syntax:         "SASET <nick> TIMEZONE <strefa_czasowa|OFF>"
    short:          "Zmień strefę czasową nicka."
    help:           "Ustawia lub czyści strefę czasową innego nicka.\nUżyj OFF, aby wyczyścić.\n\nSkładnia: SASET <nick> TIMEZONE <strefa_czasowa>\nPrzykład: SASET Użytkownik TIMEZONE Europe/Warsaw"
    success:        "\x0303✔\x03 Strefa czasowa \x02%nickname%\x02 została ustawiona na \x02%timezone%\x02."
    cleared:        "\x0303✔\x03 Strefa czasowa \x02%nickname%\x02 została wyczyszczona."
    invalid:        "\x0304✗\x03 Nieprawidłowa strefa czasowa \x02%timezone%\x02."

  private:
    syntax:         "SASET <nick> PRIVATE {ON|OFF}"
    short:          "Zmień prywatność nicka."
    help:           "Włącza lub wyłącza prywatność informacji innego nicka.\n\nSkładnia: SASET <nick> PRIVATE {ON|OFF}\nPrzykład: SASET Użytkownik PRIVATE ON"
    on:             "\x0303✔\x03 Informacje \x02%nickname%\x02 są teraz \x02prywatne\x02."
    off:            "\x0303✔\x03 Informacje \x02%nickname%\x02 są teraz \x02publiczne\x02."

  msg:
    syntax:         "SASET <nick> MSG {ON|OFF}"
    short:          "Zmień preferencję wiadomości nicka."
    help:           "Ustawia, czy inny nick otrzymuje odpowiedzi jako PRIVMSG (ON) lub NOTICE (OFF).\n\nSkładnia: SASET <nick> MSG {ON|OFF}\nPrzykład: SASET Użytkownik MSG ON"
    on:             "\x0303✔\x03 \x02%nickname%\x02 będzie teraz otrzymywać wiadomości jako \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 \x02%nickname%\x02 będzie teraz otrzymywać wiadomości jako \x02NOTICE\x02."

  vhost:
