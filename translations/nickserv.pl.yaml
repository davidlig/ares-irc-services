# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <nick> {ON|OFF}"
  short:            "Ustaw lub usuń ochronę przed wygaśnięciem nicka."
  help:             |
    Określa czy nick wygaśnie z powodu braku aktywności.
    Gdy ON, nick nigdy nie wygasa niezależnie od ostatniej aktywności.
    Gdy OFF, obowiązują normalne zasady wygaśnięcia.

    Tylko IRCops z uprawnieniem 'nickserv.noexpire' mogą użyć tej komendy.

    Składnia: NOEXPIRE <nick> {ON|OFF}
    Przykłady:
      NOEXPIRE WaznyUzytkownik ON
      NOEXPIRE WaznyUzytkownik OFF
  success_on:       "\x0303✔\x03 Nick \x02%nickname%\x02 jest teraz chroniony przed wygaśnięciem."
  success_off:      "\x0303✔\x03 Nick \x02%nickname%\x02 będzie teraz wygasał normalnie."
  not_registered:   "\x0304✗\x03 Nick \x02%nickname%\x02 nie jest zarejestrowany."
  forbidden:         "\x0304✗\x03 Nick \x02%nickname%\x02 jest zabroniony."
  suspended:         "\x0304✗\x03 Nick \x02%nickname%\x02 jest zawieszony."

