    short:          "Zmień host wirtualny nicka."
    help:           "Ustawia lub czyści host wirtualny innego nicka.\nUżyj OFF, aby wyczyścić.\n\nSkładnia: SASET <nick> VHOST <vhost>\nPrzykład: SASET Użytkownik VHOST użytkownicy.przykład.com"
    success:        "\x0303✔\x03 Host wirtualny \x02%nickname%\x02 został ustawiony na \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 Host wirtualny \x02%nickname%\x02 został wyczyszczony."
