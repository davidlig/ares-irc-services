    syntax: "IGNORE LIST [#kanał]"
    short: "Lista ignorowanych nicków."
    help: "Pokazuje listę nicków, które Ty (lub kanał) ignorujecie dla wiadomości."
  added: "\x0303✔\x03 \x02%nickname%\x02 dodany do listy ignorowanych."
