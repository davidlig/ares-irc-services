  short: "Zarządzaj listą ignorowanych dla wiadomości."
  help: "ADD dodaje nick do Twojej (lub kanału) listy ignorowanych; DEL usuwa; LIST pokazuje listę. Dla kanałów, ADD/DEL wymagają MEMOCHANGE."
  add:
    syntax: "IGNORE ADD [#kanał] <nick>"
    short: "Dodaj nick do listy ignorowanych."
    help: "Wiadomości od tego nicka nie będą przyjmowane do Twojej skrzynki (lub skrzynki kanału)."
