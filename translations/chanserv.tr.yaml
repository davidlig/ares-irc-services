# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#channel> {ADD|DEL|VIEW|CLEAR}"
  short:            "Kanal eylem geçmişini görüntüleyin veya yönetin."
  help:             |
    Bir kanalın eylem geçmişini yönetin.
    Bu komutu yalnızca 'chanserv.history' iznine sahip IRCop'ler kullanabilir.

    Alt komutlar:
      ADD   — Kanalın geçmişine manuel bir giriş ekleyin.
      DEL   — Belirli bir girişi ID ile silin.
      VIEW  — Geçmiş girişlerini görüntüleyin (sayfalı, sayfa başına 3).
      CLEAR — Kanal için tüm geçmiş girişlerini silin.

    Sözdizimi: HISTORY <#channel> {ADD|DEL|VIEW|CLEAR} [argümanlar]
    Örnekler:
      HISTORY #channel VIEW
      HISTORY #channel VIEW 2
      HISTORY #channel VIEW ALL
      HISTORY #channel ADD Şüpheli devralma girişimi
      HISTORY #channel DEL 42
      HISTORY #channel CLEAR
  not_registered:   "\x0304✗\x03 \x02%channel%\x02 kanalı kayıtlı değil."
  unknown_operator: "(bilinmiyor)"

  add:
    syntax:     "HISTORY <#channel> ADD <mesaj>"
    short:      "Manuel bir geçmiş girişi ekleyin."
    help:        |
      Kanalın geçmişine manuel bir giriş ekler.
    success:    "\x0303✔\x03 \x02%channel%\x02 için geçmiş girişi eklendi."

  del:
    syntax:     "HISTORY <#channel> DEL <id>"
    short:      "ID ile bir geçmiş girişini silin."
    success:    "\x0303✔\x03 Geçmiş girişi \x02%id%\x02 silindi."
    not_found:  "\x0304✗\x03 Geçmiş girişi \x02%id%\x02 bulunamadı."
    invalid_id: "\x0304✗\x03 Geçersiz giriş ID'si: \x02%id%\x02."

  view:
    syntax:     "HISTORY <#channel> VIEW [SAYFA|ALL]"
    short:      "Kanal eylem geçmişini görüntüleyin."
    header:     "\x02\x0307%channel%\x03\x02 için geçmiş (%start%-%end% / %total% gösteriliyor):"
    entry:       "#%id% [%date%] \x0303%action%\x03 - %operator% tarafından — %message%"
    extra:       "  Ekstra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 \x02%channel%\x02 için geçmiş girişi bulunamadı."
    page_hint:   "Daha fazla giriş için \x0303HISTORY %channel% VIEW %next_page%\x03 kullanın."

  clear:
    syntax:     "HISTORY <#channel> CLEAR"
    short:      "Bir kanal için tüm geçmiş girişlerini silin."
    success:    "\x0303✔\x03 \x02%channel%\x02 için \x02%count%\x02 geçmiş girişi temizlendi."

