# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#channel>"
  short:            "Bir kanalın tüm erişim listesini temizleyin."
  help:             |
    Bir kanalın erişim listesindeki tüm erişim girişlerini kaldırır.
    Bu eylem geri alınamaz.
    Bu komutu yalnızca 'chanserv.clearaccess' iznine sahip IRCop'ler kullanabilir.

    Sözdizimi: CLEARACCESS <#channel>
    Örnekler:
      CLEARACCESS #channel
  success:          "\x0303✔\x03 \x02%channel%\x02 kanalından \x02%count%\x02 erişim girişi temizlendi."
  empty:            "\x0307ℹ\x03 \x02%channel%\x02 kanalının erişim girişi yok."

clearusers:
  syntax:           "CLEARUSERS <#channel> [sebep]"
  short:            "Bir kanaldaki tüm kullanıcıları atın."
  help:             |
    Belirtilen kanaldaki tüm kullanıcıları atar.
    Bu, kanal yönetimi için kullanılan yalnızca IRCop'lere özel bir komuttur.
    İsteğe bağlı bir sebep belirtilebilir; belirtilmezse varsayılan sebep kullanılır.

    Bu komutu yalnızca 'chanserv.clearusers' iznine sahip IRCop'ler kullanabilir.

    Sözdizimi: CLEARUSERS <#channel> [sebep]
    Örnekler:
      CLEARUSERS #channel
      CLEARUSERS #channel flooding
  not_on_network:   "\x0304✗\x03 \x02%channel%\x02 kanalı şu anda ağda değil."
  empty:            "\x0307ℹ\x03 \x02%channel%\x02 kanalında atılacak kullanıcı yok."
  success:          "\x0303✔\x03 \x02%channel%\x02 kanalından \x02%count%\x02 kullanıcı atıldı."
  default_reason:   "CLEARUSERS komutu"
