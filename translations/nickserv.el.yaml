# --- Nick Protection --------------------------------------------------------
protection:
  nick_in_use:      "\x0304⚠\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι καταχωρημένο. Θα μετονομαστείτε αν δεν ταυτοποιηθείτε."
  renamed_to:       "\x0307→\x03 Έχετε μετονομαστεί σε \x02%guest_nick%\x02. Για ανάκτηση του ψευδωνύμου σας:\n\x0303/msg %bot% IDENTIFY %nickname% <password>\x03"
  nick_forbidden:   "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι απαγορευμένο: %reason%"

# --- IRCop Commands ---------------------------------------------------------
userip:
  syntax:           "USERIP <nickname>"
  short:            "Λάβετε την πραγματική διεύθυνση IP και το hostname του ψευδωνύμου."
  help:             |
    Εμφανίζει την πραγματική διεύθυνση IP και το hostname του καθορισμένου ψευδωνύμου.
    Διαθέσιμο μόνο σε IRCops με άδεια 'nickserv.userip'.

    Αυτή η εντολή εμφανίζει ευαίσθητες πληροφορίες ψευδωνύμου.
    Χρησιμοποιήστε υπεύθυνα.

    Σύνταξη: USERIP <nickname>
    Παράδειγμα: USERIP SomeUser
  not_online:       "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι συνδεδεμένο."
  result:           "\x0307ℹ\x03 Ψευδώνυμο: \x02%nickname%\x02 | IP: \x0307%ip%\x03 | Host: \x0307%host%\x03"

permissions:
  nickserv.userip: "Προβολή πραγματικής διεύθυνσης IP/hostname ψευδωνύμου (USERIP)"
  nickserv.suspend: "Αναστολή ή άρση αναστολής ψευδωνύμου (SUSPEND/UNSUSPEND)"
  nickserv.rename: "Αναγκαστική μετονομασία συνδεδεμένου ψευδωνύμου σε τυχαίο (RENAME)"
  nickserv.drop: "Διαγραφή καταχωρημένου ψευδωνύμου (DROP)"
  nickserv.forbid: "Απαγόρευση ή άρση απαγόρευσης ψευδωνύμου (FORBID/UNFORBID)"
  nickserv.forbidvhost: "Απαγόρευση ή επιτρεπή μοτίβων vhost (FORBIDVHOST)"
  nickserv.saset: "Τροποποίηση ρυθμίσεων ψευδωνύμου άλλου χρήστη (SASET)"
  nickserv.noexpire: "Ορισμός ή αφαίρεση προστασίας λήξης για ψευδώνυμο (NOEXPIRE)"
  nickserv.history: "Προβολή και διαχείριση ιστορικού ενεργειών ψευδωνύμου (HISTORY)"

# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <nickname> <duration> <reason>"
  short:            "Αναστολή ψευδωνύμου."
  help:             |
    Θέτει σε αναστολή ένα ψευδώνυμο, εμποδίζοντας τον κάτοχο από το να ταυτοποιηθεί.
    Η αναστολή μπορεί να είναι προσωρινή ή μόνιμη.

    Μορφές διάρκειας: \x0303%d\x03 (ημέρες), \x0303%h\x03 (ώρες), \x0303%m\x03 (λεπτά), ή \x03030\x03 (μόνιμη).

    Οι χρήστες σε αναστολή δεν μπορούν να ταυτοποιηθούν στο ψευδώνυμό τους.
    Οι IRC operators και οι root χρήστες δεν μπορούν να τεθούν σε αναστολή.

    Σύνταξη: SUSPEND <nickname> <duration> <reason>
    Παραδείγματα:
      SUSPEND BadUser 7d Spamming στο #help
      SUSPEND Abuser 30d Επαναλαμβανόμενο flood
      SUSPEND ProblemUser 0 Αποφυγή permaban
  success:            "\x0303✔\x03 Το ψευδώνυμο \x02%nickname%\x02 έχει τεθεί σε αναστολή μέχρι \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι ήδη σε αναστολή."
  not_registered:     "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι καταχωρημένο."
  forbidden:          "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι απαγορευμένο και δεν μπορεί να τεθεί σε αναστολή."
  cannot_suspend_oper: "\x0304✗\x03 Δεν μπορεί να τεθεί σε αναστολή ο IRC operator \x02%nickname%\x02."
  cannot_suspend_root: "\x0304✗\x03 Δεν μπορεί να τεθεί σε αναστολή ο root χρήστης \x02%nickname%\x02."
  cannot_suspend_service: "\x0304✗\x03 Δεν μπορεί να τεθεί σε αναστολή το ψευδώνυμο υπηρεσίας \x02%nickname%\x02."
  invalid_duration:   "\x0304✗\x03 Μη έγκυρη διάρκεια. Χρησιμοποιήστε: \x0303<d><h><m>\x03 (π.χ., 7d, 12h, 30m) ή \x03030\x03 για μόνιμη."
  permanent:          "μόνιμη"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <nickname>"
  short:            "Αφαίρεση αναστολής από ψευδώνυμο."
  help:             |
    Αφαιρεί μια ενεργή αναστολή από ένα ψευδώνυμο, επιτρέποντας στον κάτοχο να ταυτοποιηθεί ξανά.

    Σύνταξη: UNSUSPEND <nickname>
    Παράδειγμα: UNSUSPEND SomeUser
  success:          "\x0303✔\x03 Η αναστολή έχει αρθεί από \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι καταχωρημένο."
  not_suspended:    "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι σε αναστολή."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <nickname>"
  short:            "Αναγκαστική μετονομασία συνδεδεμένου ψευδωνύμου σε τυχαίο."
  help:             |
    Αναγκάζει ένα συνδεδεμένο ψευδώνυμο να αλλάξει το nick του σε ένα τυχαία παραγόμενο.
    Χρήσιμο για επιβολή πολιτικών δικτύου χωρίς αποσύνδεση του χρήστη.

    Η μορφή του νέου ψευδωνύμου χρησιμοποιεί το διαμορφωμένο πρόθεμα επισκέπτη (%prefix%).

    Αυτή η εντολή απαιτεί άδεια IRCop: nickserv.rename

    Σύνταξη: RENAME <nickname>
    Παράδειγμα: RENAME Troublemaker
  not_online:        "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι συνδεδεμένο."
  cannot_rename_root: "\x0304✗\x03 Δεν μπορεί να μετονομαστεί ο root χρήστης \x02%nickname%\x02."
  cannot_rename_oper: "\x0304✗\x03 Δεν μπορεί να μετονομαστεί ο IRC operator \x02%nickname%\x02."
  cannot_rename_service: "\x0304✗\x03 Δεν μπορεί να μετονομαστεί το ψευδώνυμο υπηρεσίας \x02%nickname%\x02."
  success:           "\x0303✓\x03 Το ψευδώνυμο \x02%nickname%\x02 έχει μετονομαστεί σε \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <nickname>"
  short:            "Διαγραφή καταχωρημένου ψευδωνύμου."
  help:             |
    Διαγράφει ένα καταχωρημένο ψευδώνυμο από τη βάση δεδομένων.
    Αυτή η ενέργεια δεν μπορεί να αναιρεθεί.

    Αν ο χρήστης είναι online, θα μετονομαστεί σε ψευδώνυμο Guest-.
    Οι root χρήστες και οι IRC operators δεν μπορούν να διαγραφούν.
    Δεν μπορείτε να διαγράψετε το δικό σας ψευδώνυμο.

    Αυτή η εντολή απαιτεί άδεια IRCop: nickserv.drop

    Σύνταξη: DROP <nickname>
    Παράδειγμα: DROP OldAccount
  not_registered:     "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι καταχωρημένο."
  suspended:         "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι σε αναστολή. Άρετε πρώτα την αναστολή."
  forbidden:         "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι απαγορευμένο."
  cannot_drop_root:   "\x0304✗\x03 Δεν μπορεί να διαγραφεί ο root χρήστης \x02%nickname%\x02."
  cannot_drop_oper:   "\x0304✗\x03 Δεν μπορεί να διαγραφεί ο IRC operator \x02%nickname%\x02."
  cannot_drop_self:    "\x0304✗\x03 Δεν μπορείτε να διαγράψετε το δικό σας ψευδώνυμο."
  success:            "\x0303✓\x03 Το ψευδώνυμο \x02%nickname%\x02 έχει διαγραφεί."
  cannot_drop_service: "\x0304✗\x03 Δεν μπορεί να διαγραφεί το ψευδώνυμο υπηρεσίας \x02%nickname%\x02."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <nickname> <reason>"
  short:            "Μόνιμος αποκλεισμός ψευδωνύμου από χρήση."
  help:             |
    Απαγορεύει τη χρήση ενός ψευδωνύμου στο δίκτυο.
    Το ψευδώνυμο δεν μπορεί να καταχωρηθεί ή να χρησιμοποιηθεί από κανέναν.

    Αν το ψευδώνυμο είναι τρέχοντα καταχωρημένο, θα διαγραφεί πρώτα.
    Αν κάποιος το χρησιμοποιεί, θα αναγκαστεί να αλλάξει σε ψευδώνυμο Guest-.

    Οι root χρήστες, οι IRC operators και τα ψευδώνυμα υπηρεσιών δεν μπορούν να απαγορευτούν.

    Αυτή η εντολή απαιτεί άδεια IRCop: nickserv.forbid

    Σύνταξη: FORBID <nickname> <reason>
    Παράδειγμα: FORBID BadNick Επαναλαμβανόμενες παραβιάσεις πολιτικής
  success:            "\x0303✔\x03 Το ψευδώνυμο \x02%nickname%\x02 έχει απαγορευτεί."
  updated:            "\x0303✔\x03 Η αιτία απαγόρευσης για το \x02%nickname%\x02 έχει ενημερωθεί."
  reason_required:    "\x0304✗\x03 Πρέπει να δώσετε αιτία για την απαγόρευση."
  cannot_forbid_root:  "\x0304✗\x03 Δεν μπορεί να απαγορευτεί ο root χρήστης \x02%nickname%\x02."
  cannot_forbid_oper:  "\x0304✗\x03 Δεν μπορεί να απαγορευτεί ο IRC operator \x02%nickname%\x02."
  cannot_forbid_service: "\x0304✗\x03 Δεν μπορεί να απαγορευτεί το ψευδώνυμο υπηρεσίας \x02%nickname%\x02."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <nickname>"
  short:            "Άρση απαγόρευσης ψευδωνύμου."
  help:             |
    Αφαιρεί την απαγόρευση ενός ψευδωνύμου, επιτρέποντας τη χρήση του ξανά.

    Αυτή η εντολή απαιτεί άδεια IRCop: nickserv.forbid

    Σύνταξη: UNFORBID <nickname>
    Παράδειγμα: UNFORBID SomeNick
  success:          "\x0303✔\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι πλέον απαγορευμένο."
  not_forbidden:    "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι απαγορευμένο."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST ADD|DEL|LIST [pattern]"
  short:            "Διαχείριση απαγορευμένων μοτίβων vhost."
  help:             |
    Διαχειρίζεται μοτίβα που εμποδίζουν τους χρήστες να ορίσουν vhosts που ταιριάζουν
    μέσω του NickServ SET VHOST.

    Wildcards: * ταιριάζει με οποιαδήποτε ακολουθία, ? ταιριάζει με έναν χαρακτήρα.
    Παράδειγμα: *.pirated.com μπλοκάρει οποιοδήποτε vhost τελειώνει σε .pirated.com

    Αυτή η εντολή απαιτεί άδεια IRCop: nickserv.forbidvhost

    Υπο-εντολές:
      ADD <pattern>    Προσθήκη απαγορευμένου μοτίβου
      DEL <pattern>    Αφαίρεση απαγορευμένου μοτίβου
      LIST             Εμφάνιση όλων των απαγορευμένων μοτίβων

  unknown_sub: "\x0304✗\x03 Άγνωστη υπο-εντολή \x02%sub%\x02. Χρησιμοποιήστε ADD, DEL, ή LIST."

  add:
    syntax:      "FORBIDVHOST ADD <pattern>"
    short:       "Προσθήκη απαγορευμένου μοτίβου vhost."
    help:        |
      Προσθέτει ένα μοτίβο στη λίστα απαγορευμένων vhost. Οι χρήστες δεν θα
      μπορούν να ορίσουν vhosts που ταιριάζουν με αυτό το μοτίβο μέσω SET VHOST.

      Wildcards: * ταιριάζει με οποιαδήποτε ακολουθία, ? ταιριάζει με έναν χαρακτήρα.

      Σύνταξη: FORBIDVHOST ADD <pattern>
      Παράδειγμα: FORBIDVHOST ADD *.pirated.com
    done:            "\x0303✓\x03 Προστέθηκε απαγορευμένο μοτίβο vhost: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 Το μοτίβο \x02%pattern%\x02 υπάρχει ήδη."
    invalid:          "\x0304✗\x03 Μη έγκυρη μορφή μοτίβου vhost."

  del:
    syntax:      "FORBIDVHOST DEL <pattern>"
    short:       "Αφαίρεση απαγορευμένου μοτίβου vhost."
    help:        |
      Αφαιρεί ένα μοτίβο από τη λίστα απαγορευμένων vhost.

      Σύνταξη: FORBIDVHOST DEL <pattern>
      Παράδειγμα: FORBIDVHOST DEL *.pirated.com
    done:        "\x0303✓\x03 Αφαιρέθηκε απαγορευμένο μοτίβο vhost: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 Το μοτίβο \x02%pattern%\x02 δεν βρέθηκε."

  list:
    short:       "Λίστα όλων των απαγορευμένων μοτίβων vhost."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Εμφανίζει όλα τα απαγορευμένα μοτίβα vhost.

      Σύνταξη: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Απαγορευμένα μοτίβα vhost (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — από %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 Δεν υπάρχουν απαγορευμένα μοτίβα vhost."
    unknown_creator: "άγνωστος"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <nickname> {ADD|DEL|VIEW|CLEAR}"
  short:            "Προβολή ή διαχείριση ιστορικού ενεργειών ψευδωνύμου."
  help:             |
    Διαχείριση του ιστορικού ενεργειών για ένα ψευδώνυμο.
    Μόνο IRCops με άδεια 'nickserv.history' μπορούν να χρησιμοποιήσουν αυτήν την εντολή.

    Ενέργειες που καταγράφονται αυτόματα:
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Σύνταξη: HISTORY <nickname> ADD <message>
            HISTORY <nickname> DEL <id>
            HISTORY <nickname> VIEW [PAGE|ALL]
            HISTORY <nickname> CLEAR

    Παραδείγματα:
      HISTORY SomeNick VIEW
      HISTORY SomeNick ADD Χειροκίνητη σημείωση για αυτόν τον χρήστη
      HISTORY SomeNick VIEW 2
      HISTORY SomeNick VIEW ALL
      HISTORY SomeNick DEL 123
      HISTORY SomeNick CLEAR

    Χρησιμοποιήστε VIEW για να δείτε το ιστορικό (εμφανίζει 3 καταχωρήσεις προεπιλεγμένα).
    Χρησιμοποιήστε VIEW PAGE 2 για την επόμενη σελίδα.
    Χρησιμοποιήστε VIEW ALL για πλήρες ιστορικό.
    Χρησιμοποιήστε ADD για χειροκίνητη καταχώρηση.
    Χρησιμοποιήστε DEL για διαγραφή συγκεκριμένης καταχώρησης μέσω ID.
    Χρησιμοποιήστε CLEAR για διαγραφή όλων των καταχωρήσεων ιστορικού.
  not_registered:   "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι καταχωρημένο."
  unknown_operator: "(άγνωστος)"

  add:
    syntax:     "HISTORY <nickname> ADD <message>"
    short:      "Προσθήκη χειροκίνητης καταχώρησης ιστορικού."
    help:        |
      Προσθέτει μια χειροκίνητη καταχώρηση στο ιστορικό του ψευδωνύμου.

      Σύνταξη: HISTORY <nickname> ADD <message>
      Παράδειγμα: HISTORY SomeNick ADD Ο χρήστης αναφέρθηκε για spam
    success:    "\x0303✔\x03 Η καταχώρηση ιστορικού προστέθηκε για \x02%nickname%\x02."

  del:
    syntax:     "HISTORY <nickname> DEL <id>"
    short:      "Διαγραφή καταχώρησης ιστορικού μέσω ID."
    help:        |
      Διαγράφει μια συγκεκριμένη καταχώρηση ιστορικού με το ID της.

      Σύνταξη: HISTORY <nickname> DEL <id>
      Παράδειγμα: HISTORY SomeNick DEL 42
    success:    "\x0303✔\x03 Η καταχώρηση ιστορικού \x02%id%\x02 διαγράφηκε."
    not_found:  "\x0304✗\x03 Η καταχώρηση ιστορικού \x02%id%\x02 δεν βρέθηκε."
    invalid_id: "\x0304✗\x03 Μη έγκυρο ID καταχώρησης: \x02%id%\x02."

  view:
    syntax:     "HISTORY <nickname> VIEW [PAGE|ALL]"
    short:      "Προβολή ιστορικού ενεργειών ψευδωνύμου."
    help:        |
      Εμφανίζει το ιστορικό ενεργειών του ψευδωνύμου.

      Σύνταξη: HISTORY <nickname> VIEW
              HISTORY <nickname> VIEW PAGE
              HISTORY <nickname> VIEW ALL

      Προεπιλεγμένα εμφανίζει 3 καταχωρήσεις κάθε φορά.
      Χρησιμοποιήστε VIEW 2 για τη δεύτερη σελίδα.
      Χρησιμοποιήστε VIEW ALL για πλήρες ιστορικό.
    header:     "\x02Ιστορικό για \x0307%nickname%\x03\x02 (εμφάνιση %start%-%end% από %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 από %operator% — %message%"
    extra:       "  Επιπλέον \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Δεν βρέθηκαν καταχωρήσεις ιστορικού για \x02%nickname%\x02."
    page_hint:   "Χρησιμοποιήστε \x0303HISTORY %nickname% VIEW %next_page%\x03 για περισσότερες καταχωρήσεις."

  clear:
    syntax:     "HISTORY <nickname> CLEAR"
    short:      "Διαγραφή όλων των καταχωρήσεων ιστορικού για ένα ψευδώνυμο."
    help:        |
      Αφαιρεί όλες τις καταχωρήσεις ιστορικού για το καθορισμένο ψευδώνυμο.
      Αυτή η ενέργεια δεν μπορεί να αναιρεθεί.

      Σύνταξη: HISTORY <nickname> CLEAR
      Παράδειγμα: HISTORY SomeNick CLEAR
    success:    "\x0303✔\x03 Εκκαθαρίστηκαν \x02%count%\x02 καταχωρήσεις ιστορικού για \x02%nickname%\x02."

