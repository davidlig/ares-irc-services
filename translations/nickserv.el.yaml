# NickServ translations — Greek
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02        bold on/off
#   \x03NN      color (DECIMAL: 03=green, 04=red, 07=orange, 14=dark grey)
#   \x03        reset color
#   \x0F        reset all formatting
#
# NOTE: IRC colors use DECIMAL numbers (0-15), not hexadecimal.
#   \x0314 = dark grey (14 decimal)  ← CORRECT
#   \x030F = color 0 + letter "F"    ← WRONG (0F is hex, not decimal)

unknown_command: "\x0304✗\x03 Άγνωστη εντολή \x02%command%\x02. Χρησιμοποιήστε \x0303/msg %bot% HELP\x03."

error:
  syntax:            "\x0304✗\x03 Λανθασμένη σύνταξη. Χρήση: \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Αυτή η εντολή περιορίζεται σε IRC Operators."
  not_identified:    "\x0304✗\x03 Δεν έχετε ταυτοποιηθεί. Χρησιμοποιήστε \x0303/msg %bot% IDENTIFY <nickname> <password>\x03"
  permission_denied: "\x0304✗\x03 Άρνηση πρόσβασης. Δεν έχετε πρόσβαση σε αυτήν την εντολή."
  mail_failed:       "\x0304✗\x03 Το email δεν μπόρεσε να σταλεί. Ελέγξτε τη διεύθυνσή σας ή δοκιμάστε αργότερα."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <password> <email>"
  short:            "Καταχωρήστε το ψευδώνυμό σας στις υπηρεσίες."
  help:             "Ξεκινά την καταχώρηση του τρέχοντος ψευδωνύμου σας. Ένα token επαλήθευσης\nθα σταλεί στη διεύθυνση email που δώσατε. Ολοκληρώστε την καταχώρηση\nεκτελώντας \x0303/msg %bot% VERIFY <token>\x03. Το token λήγει σε 1 ώρα.\nΑν δεν φτάσει, ελέγξτε τον φάκελο spam ή χρησιμοποιήστε \x0303RESEND\x03."
  pending:          "\x0307→\x03 Ένα token επαλήθευσης έχει σταλεί στο \x02%email%\x02.\n  Εκτελέστε \x0303/msg %bot% VERIFY <token>\x03 για να ολοκληρώσετε την καταχώρηση.\n  Δεν το λάβατε; Ελέγξτε το spam ή χρησιμοποιήστε \x0303/msg %bot% RESEND\x03\n  Το token θα λήξει σε \x021 ώρα\x02."
  already_registered: "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι ήδη καταχωρημένο."
  already_pending:  "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 έχει ήδη εκκρεμή επαλήθευση.\n  Χρησιμοποιήστε \x0303/msg %bot% VERIFY <token>\x03 ή \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν μπορεί να καταχωρηθεί σε αυτό το δίκτυο."
  invalid_email:    "\x0304✗\x03 Η διεύθυνση email που δώσατε δεν είναι έγκυρη."
  email_already_used: "\x0304✗\x03 Το email \x02%email%\x02 χρησιμοποιείται ήδη από άλλο ψευδώνυμο. Χρησιμοποιήστε διαφορετική διεύθυνση."
  throttled:          "\x0304✗\x03 Πρέπει να περιμένετε \x02%minutes%\x02 λεπτό(ά) πριν δοκιμάσετε να καταχωρηθείτε ξανά."
  guest_prefix_forbidden: "\x0304✗\x03 Δεν μπορείτε να καταχωρήσετε ψευδώνυμο που ξεκινά με \x02%prefix%\x02."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "Επιβεβαιώστε τη διεύθυνση email σας και ενεργοποιήστε το ψευδώνυμό σας."
  help:             "Ολοκληρώνει την καταχώρηση επαληθεύοντας το token που στάλθηκε στο email σας.\nΤο token ισχύει για 1 ώρα από τη στιγμή της καταχώρησης."
  success:          "\x0303✔\x03 Το ψευδώνυμο \x02%nickname%\x02 έχει καταχωρηθεί επιτυχώς και είστε πλέον ταυτοποιημένοι."
  invalid_token:    "\x0304✗\x03 Το token είναι άκυρο ή έχει λήξει. Χρησιμοποιήστε \x0303/msg %bot% REGISTER\x03 για να ξεκινήσετε από την αρχή."
  no_pending:       "\x0304✗\x03 Δεν έχετε εκκρεμή καταχώρηση προς επαλήθευση."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Επαναποστολή του token επαλήθευσης στο email σας."
  help:             "Επαναστέλνει το token επαλήθευσης στη διεύθυνση email που δώσατε κατά την\nκαταχώρηση. Λειτουργεί μόνο αν έχετε εκκρεμή καταχώρηση."
  success:          "\x0307→\x03 Το token επαλήθευσης επαναστάλθηκε στο \x02%email%\x02."
  no_pending:       "\x0304✗\x03 Δεν έχετε εκκρεμή καταχώρηση για επαναποστολή token."
  throttled:        "\x0304✗\x03 Πρέπει να περιμένετε \x02%minutes%\x02 λεπτό(ά) πριν ζητήσετε άλλο email επαλήθευσης."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <nickname> [token]"
  short:            "Ανακτήστε το ψευδώνυμό σας αν χάσατε τον κωδικό σας."
  help:             "Ανακτά πρόσβαση σε καταχωρημένο ψευδώνυμο όταν έχετε χάσει τον κωδικό σας.\n1) \x0303RECOVER <nickname>\x03 — αποστέλλεται token στο email του ψευδωνύμου.\n2) \x0303RECOVER <nickname> <token>\x03 — εισάγετε το token από το email για επαναφορά κωδικού.\nΘα λάβετε έναν προσωρινό κωδικό και την εντολή για να τον αλλάξετε."
  email_sent:       "\x0307→\x03 Ένα token ανάκτησης έχει σταλεί στο \x02%email_hint%\x02. Ελέγξτε τα εισερχόμενά σας (και τον φάκελο spam)."
  not_registered:   "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι καταχωρημένο."
  pending:          "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 έχει εκκρεμή επαλήθευση email."
  suspended:        "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι σε αναστολή. Αιτία: %reason%"
  forbidden:        "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν μπορεί να χρησιμοποιηθεί σε αυτό το δίκτυο."
  no_email:         "\x0304✗\x03 Δεν έχει οριστεί email για το ψευδώνυμο \x02%nickname%\x02. Η ανάκτηση δεν είναι διαθέσιμη."
  throttled:        "\x0304✗\x03 Πρέπει να περιμένετε \x02%minutes%\x02 λεπτό(ά) πριν ζητήσετε άλλο email ανάκτησης."
  invalid_token:    "\x0304✗\x03 Το token είναι άκυρο ή έχει λήξει. Ζητήστε νέο με \x0303RECOVER %nickname%\x03."
  success_identify: "\x0303✔\x03 Επαναφορά κωδικού. Ταυτοποιηθείτε τώρα: \x0303%identify_cmd%\x03"
  success_then_change: "Μετά αλλάξτε τον κωδικό σας: \x0303/msg %bot% SET PASSWORD <new_password>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <nickname> <password>"
  short:            "Ταυτοποιηθείτε ως ο κάτοχος ενός ψευδωνύμου."
  help:             "Πιστοποιεί τη συνεδρία σας με το %nickserv% χρησιμοποιώντας το ψευδώνυμο και τον κωδικό σας.\nΜετά από επιτυχή ταυτοποίηση θα λάβετε τη λειτουργία \x02+r\x02\nκαι, αν χρησιμοποιούσατε ψευδώνυμο επισκέπτη, το καταχωρημένο σας ψευδώνυμο θα αποκατασταθεί."
  success:          "\x0303✔\x03 Είστε πλέον ταυτοποιημένοι ως \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 Είστε ήδη ταυτοποιημένοι ως \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι καταχωρημένο."
  invalid_credentials: "\x0304✗\x03 Λανθασμένος κωδικός. Παρακαλώ δοκιμάστε ξανά."
  locked_out:         "\x0304✗\x03 Πάρα πολλές αποτυχημένες προσπάθειες. Δοκιμάστε ξανά σε \x02%minutes%\x02 λεπτό(ά)."
  ghost_released:   "\x0307⚡\x03 Η συνεδρία-φάντασμα που κατείχε το \x02%nickname%\x02 έχει αποσυνδεθεί."
  kill_reason:      "Το ψευδώνυμο %nickname% ανακτήθηκε από %source% (ο καταχωρημένος κάτοχος ταυτοποιήθηκε)"
  pending:          "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 έχει εκκρεμή επαλήθευση email.\n  Εκτελέστε \x0303/msg %bot% VERIFY <token>\x03 ή \x0303/msg %bot% RESEND\x03."
  suspended:        "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι σε αναστολή. Αιτία: %reason%"
  forbidden:        "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν μπορεί να χρησιμοποιηθεί σε αυτό το δίκτυο."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <nickname>"
  short:            "Εμφάνιση κατάστασης καταχώρησης ενός ψευδωνύμου."
  help:             "Εμφανίζει την τρέχουσα κατάσταση ενός ψευδωνύμου: καταχωρημένο, εκκρεμή επαλήθευση,\nσε αναστολή ή απαγορευμένο."
  header:           "\x02Κατάσταση του ψευδωνύμου \x0307%nickname%\x03:\x02"
  unregistered:     "  Κατάσταση      : Μη καταχωρημένο"
  not_registered_offline: "  Κατάσταση      : \x0315Μη καταχωρημένο\x03"
  pending:          "  Κατάσταση      : \x0307Εκκρεμής επαλήθευση\x03"
  pending_expires:  "  Λήγει σε       : %minutes% λεπτό(ά)"
  pending_expires_at: "  Λήγει στις     : %date%"
  not_connected:    "  Κατάσταση      : \x0315Μη συνδεδεμένο\x03"
  not_identified:   "  Κατάσταση      : \x0307Μη ταυτοποιημένο\x03"
  identified:       "  Κατάσταση      : \x0303Ταυτοποιημένο\x03"
  suspended:        "  Κατάσταση      : \x0304Σε αναστολή\x03"
  suspended_reason: "  Αιτία          : %reason%"
  suspended_until:  "  Λήγει στις     : %date%"
  suspended_permanent: "  Λήγει στις     : Μόνιμη"
  forbidden:        "  Κατάσταση      : \x0304Απαγορευμένο\x03"
  forbidden_reason: "  Αιτία          : %reason%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <nickname>"
  short:            "Εμφάνιση πληροφοριών για καταχωρημένο ψευδώνυμο."
  help:             "Εμφανίζει λεπτομέρειες καταχώρησης για ένα ψευδώνυμο: ημερομηνία καταχώρησης,\nκατάσταση σύνδεσης, τελευταίο μήνυμα εξόδου και διεύθυνση email. Το email\nείναι ορατό μόνο στον κάτοχο όταν είναι ταυτοποιημένος. Με PRIVATE ON μόνο\nο κάτοχος και οι IRC Operators μπορούν να δουν τις πληροφορίες."
  not_registered:   "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι καταχωρημένο."
  private:          "\x0304✗\x03 Οι πληροφορίες του ψευδωνύμου \x02%nickname%\x02 είναι ιδιωτικές."
  header:           "\x02Πληροφορίες για το ψευδώνυμο \x0307%nickname%\x03:\x02"
  status:           "  \x0314Κατάσταση\x03      : %status%"
  status_registered:  "\x0303Καταχωρημένο\x03"
  status_suspended:   "\x0304Σε αναστολή\x03"
  status_forbidden:   "\x0304Απαγορευμένο\x03"
  reason:           "  \x0314Αιτία\x03          : %reason%"
  suspended_until:  "  \x0314Λήγει στις\x03     : %date%"
  suspended_permanent: "  \x0314Λήγει στις\x03     : Μόνιμη"
  registered_at:    "  \x0314Καταχωρήθηκε\x03  : %date%"
  last_seen_online: "  \x0314Τελ. εμφάνιση\x03 : \x0303● ONLINE ΤΩΡΑ\x03"
  last_seen_at:     "  \x0314Τελ. εμφάνιση\x03 : %date%"
  last_seen_never:  "  \x0314Τελ. εμφάνιση\x03 : Ποτέ"
  last_quit:        "  \x0314Τελ. μήνυμα\x03   : %message%"
  last_connect:     "  \x0314Τελ. εμφ. από\x03  : %ip% (%host%)"
  email:            "  \x0314Email\x03         : %email%"
  vhost:            "  \x0314VHost\x03         : %vhost%"
  no_expire:        "  \x0314Ποτέ δεν λήγει\x03 : Ναι"
  footer:           "\x0314─────────────────────────────\x03"
  channels_header:  "\x0314\x0AΚανάλια με πρόσβαση:\x03"
  channels_entry_founder:   "  %channel% (\x0303Ιδρυτής\x03)"
  channels_entry_successor: "  %channel% (\x0303Διάδοχος\x03)"
  channels_entry_access:    "  %channel% (%level%)"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <option> <value>"
  short:            "Αλλάξτε τις ρυθμίσεις του ψευδωνύμου σας στο %nickserv%."
  help:             "Τροποποιεί τις ρυθμίσεις του ψευδωνύμου σας στο %nickserv%.\nΠρέπει να είστε ταυτοποιημένοι για να χρησιμοποιήσετε αυτήν την εντολή."
  unknown_option:   "\x0304✗\x03 Άγνωστη επιλογή \x02%option%\x02. Διαθέσιμες επιλογές: %options%."

  password:
    syntax:         "SET PASSWORD <new_password>"
    short:          "Αλλάξτε τον κωδικό του ψευδωνύμου σας."
    help:           "Αλλάζει τον κωδικό για το ψευδώνυμό σας στο NickServ. Ο νέος κωδικός\nισχύει άμεσα. Επιλέξτε έναν ισχυρό κωδικό τουλάχιστον 6 χαρακτήρων\nπου δεν χρησιμοποιείτε σε άλλες υπηρεσίες."
    success:        "\x0303✔\x03 Ο κωδικός σας έχει ενημερωθεί επιτυχώς."

  email:
    syntax:         "SET EMAIL <new_email> [token]"
    short:          "Αλλάξτε τη διεύθυνση email που συνδέεται με το ψευδώνυμό σας (επιβεβαίωση δύο βημάτων)."
    help:           "Αλλαγή email σε δύο βήματα για ασφάλεια.\n1) \x0303SET EMAIL <new_email>\x03 — αποστέλλεται token στο τρέχον email σας.\n2) \x0303SET EMAIL <new_email> <token>\x03 — επιβεβαίωση με το token που λάβατε.\nΤο token λήγει σε 1 ώρα."
    success:        "\x0303✔\x03 Το email σας έχει ενημερωθεί σε \x02%email%\x02."
    pending_sent:   "\x0307→\x03 Ένα token επιβεβαίωσης έχει σταλεί στο \x02%current_email%\x02.\n  Για να επιβεβαιώσετε την αλλαγή σε \x02%new_email%\x02 εκτελέστε:\n  \x0303/msg %bot% SET EMAIL %new_email% <token>\x03\n  Το token λήγει σε 1 ώρα."
    invalid_token:  "\x0304✗\x03 Το token είναι άκυρο ή έχει λήξει. Ζητήστε νέο με \x0303SET EMAIL <new_email>\x03."

  language:
    syntax:         "SET LANGUAGE <code>"
    short:          "Αλλάξτε τη γλώσσα που χρησιμοποιούν οι υπηρεσίες για να επικοινωνούν μαζί σας."
    help:           "Αλλάζει τη γλώσσα που το %nickserv% και άλλες υπηρεσίες χρησιμοποιούν όταν σας μιλούν.\nΔιαθέσιμες γλώσσες: \x02es\x02 (Ισπανικά), \x02en\x02 (Αγγλικά)."
    success:        "\x0303✔\x03 Η γλώσσα άλλαξε σε \x02%language%\x02."
    invalid:        "\x0304✗\x03 Μη υποστηριζόμενη γλώσσα. Διαθέσιμες γλώσσες: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <timezone>"
    short:          "Ορίστε τη ζώνη ώρας που χρησιμοποιείται κατά την εμφάνιση ημερομηνιών."
    help:           "Ορίζει τη ζώνη ώρας που χρησιμοποιεί το %nickserv% όταν εμφανίζει ημερομηνίες.\nΧρησιμοποιήστε \x02HELP SET TIMEZONE\x02 για το ευρετήριο περιοχών· \x02HELP SET TIMEZONE <region>\x02 (π.χ. Europe) για τις ζώνες ώρας αυτής της περιοχής. Χρησιμοποιήστε \x02OFF\x02 για εκκαθάριση."
    success:        "\x0303✔\x03 Ζώνη ώρας ορίστηκε σε \x02%timezone%\x02. Οι ημερομηνίες θα εμφανίζονται σε αυτήν τη ζώνη ώρας."
    cleared:        "\x0303✔\x03 Η ζώνη ώρας εκκαθαρίστηκε. Οι ημερομηνίες θα χρησιμοποιούν την προεπιλογή του δικτύου."
    invalid:        "\x0304✗\x03 Μη έγκυρη ζώνη ώρας \x02%timezone%\x02. Χρησιμοποιήστε έγκυρο αναγνωριστικό (π.χ. UTC, Europe/Athens)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Ενεργοποίηση ή απενεργοποίηση ιδιωτικότητας για τις πληροφορίες του ψευδωνύμου σας."
    help:           "Ελέγχει την ορατότητα των πληροφοριών του ψευδωνύμου σας στην εντολή INFO.\nΜε \x02PRIVATE ON\x02 μόνο εσείς και οι IRC Operators μπορούν να δουν τις λεπτομέρειές σας.\nΜε \x02PRIVATE OFF\x02 οι πληροφορίες σας είναι δημόσιες για όλους."
    on:             "\x0303✔\x03 Οι πληροφορίες του ψευδωνύμου σας είναι τώρα \x02ιδιωτικές\x02."
    off:            "\x0303✔\x03 Οι πληροφορίες του ψευδωνύμου σας είναι τώρα \x02δημόσιες\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Χρήση PRIVMSG (ON) ή NOTICE (OFF) για απαντήσεις υπηρεσιών."
    help:           "Ελέγχει πώς το %nickserv% και άλλες υπηρεσίες στέλνουν μηνύματα σε εσάς.\nΜε \x02MSG ON\x02 οι απαντήσεις στέλνονται ως \x02PRIVMSG\x02 (ορισμένοι clients μπορεί να ενεργοποιούν απαντήσεις ή ειδοποιήσεις).\nΜε \x02MSG OFF\x02 οι απαντήσεις στέλνονται ως \x02NOTICE\x02 (προεπιλογή· συνήθως χωρίς αυτόματη απάντηση)."
    on:             "\x0303✔\x03 Τα μηνύματα υπηρεσιών θα στέλνονται τώρα ως \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 Τα μηνύματα υπηρεσιών θα στέλνονται τώρα ως \x02NOTICE\x02."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Ορίστε ή εκκαθαρίστε το προσαρμοσμένο εικονικό host σας (εμφανιζόμενο hostname)."
    help:           "Ορίζει ένα προσαρμοσμένο hostname που βλέπουν οι άλλοι όταν είστε ταυτοποιημένοι.\nΧρησιμοποιήστε \x02SET VHOST OFF\x02 για εκκαθάριση. Μόνο γράμματα (a-z, A-Z), ψηφία,\nπαύλα και τελεία· όχι παύλα ή τελεία στην αρχή/τέλος κάθε μπλοκ· μέγιστο 48 χαρακτήρες.\nΜοναδικό ανά ψευδώνυμο."
    success:        "\x0303✔\x03 Το εικονικό host σας έχει οριστεί σε \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 Το εικονικό host σας έχει εκκαθαριστεί."
    invalid:        "\x0304✗\x03 Μη έγκυρο vhost. Μόνο γράμματα, ψηφία, παύλα και τελεία (όχι στην αρχή/τέλος μπλοκ)· μέγιστο 48 χαρακτήρες."
    taken:          "\x0304✗\x03 Αυτό το vhost χρησιμοποιείται ήδη από άλλο ψευδώνυμο."
    forced:         "\x0304✗\x03 Το vhost σας διαμορφώνεται αυτόματα και δεν μπορεί να αλλάξει με SET VHOST."

# --- HELP -------------------------------------------------------------------
help:
  syntax:           "HELP [command]"
  short:            "Εμφάνιση βοήθειας για εντολές του %nickserv%."
