# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <nickname> {ON|OFF}"
  short:            "Ορισμός ή αφαίρεση προστασίας λήξης για ένα ψευδώνυμο."
  help:             |
    Ελέγχει αν ένα ψευδώνυμο θα λήξει λόγω αδράνειας.
    Όταν είναι ON, το ψευδώνυμο δεν λήγει ποτέ ανεξάρτητα από την τελευταία δραστηριότητα.
    Όταν είναι OFF, ισχύουν οι κανονικοί κανόνες λήξης.

    Μόνο IRCops με άδεια 'nickserv.noexpire' μπορούν να χρησιμοποιήσουν αυτήν την εντολή.

    Σύνταξη: NOEXPIRE <nickname> {ON|OFF}
    Παραδείγματα:
      NOEXPIRE ImportantUser ON
      NOEXPIRE ImportantUser OFF
  success_on:       "\x0303✔\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι τώρα προστατευμένο από λήξη."
  success_off:      "\x0303✔\x03 Το ψευδώνυμο \x02%nickname%\x02 θα λήγει τώρα κανονικά."
  not_registered:   "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι καταχωρημένο."
  forbidden:         "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι απαγορευμένο."
  suspended:         "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι σε αναστολή."

