  header_title:     "%bot%"
  intro:            "Servicio de gestión de red para operadores de IRC."
  general_header:   "\x02\x0314Comandos disponibles:\x03\x0F"
  command_line:     "  \x0307%command%\x03%description%"
  subcommand_line:  "  \x0307%command%\x03%description%"
  options_header:   "\x02\x0314Opciones:\x03\x0F"
  general_footer:   "Usa \x0303/msg %bot% HELP <comando>\x03 para más información."
  set_sub_footer:   "Usa \x0303/msg %bot% HELP %command% <opción>\x03 para más información."
  syntax_label:     "\x0307Sintaxis:\x03 \x02%syntax%\x02"
  footer:           "\x0314─────────────────────────────\x03"
  intro_expiration: "NOTA: Los nicks \x0304\x1Fsin usar\x0F durante más de %days% días se eliminan automáticamente."
  unknown_command:  "\x0304✗\x03 Comando desconocido \x02%command%\x02. Usa \x0303/msg %bot% HELP\x03."
  suboptions:       "Sub-opciones:"

# --- IRCOP --------------------------------------------------------------------
ircop:
  syntax:           "IRCOP <nickname> {ADD|DEL|LIST} <rol>"
  short:            "Gestiona operadores de red."
  help:             "Gestiona operadores de red. ADD añade un nickname registrado\ncomo operador con el rol especificado.\nDEL elimina un operador. LIST muestra todos los operadores.\nUsa ROLE LIST para ver los roles disponibles.\nEste comando está restringido a usuarios Root configurados en los servicios."

  unknown_sub:      "\x0304✗\x03 Subcomando desconocido \x02%sub%\x02. Usa ADD, DEL o LIST."
  unknown_role:     "\x0304✗\x03 El rol \x02%role%\x02 no existe. Usa \x0303/msg %bot% ROLE LIST\x03 para ver los roles disponibles."
  already_admin:   "\x0304✗\x03 \x02%nick%\x02 ya es operador (rol: %role%)."
  not_admin:       "\x0304✗\x03 \x02%nick%\x02 no es un operador de red."
  role_changed:    "\x0303✓\x03 Cambiado el rol de \x02%nick%\x02 de %old% a %new%."

  add:
    syntax:         "IRCOP <nickname> ADD <rol>"
    short:          "Añade un operador de red."
    help:            "Añade un nickname registrado como operador de red.\nUsa ROLE LIST para ver los roles disponibles.\nEste comando está restringido a usuarios Root."
    done:           "\x0303✓\x03 Añadido \x02%nick%\x02 como \x02%role%\x02."
    nick_not_active: "\x0304✗\x03 El nickname \x02%nick%\x02 no es un nickname registrado activo."

  del:
    syntax:         "IRCOP <nickname> DEL"
    short:          "Elimina un operador de red."
    help:            "Elimina un operador de red de la lista.\nEste comando está restringido a usuarios Root."
    done:           "\x0303✓\x03 Eliminado \x02%nick%\x02 de operadores."

  list:
    syntax:         "IRCOP LIST"
    short:          "Lista todos los operadores de red."
    help:            "Lista todos los operadores de red con sus roles y fecha de registro.\nEste comando está restringido a usuarios Root."
    header:         "\x0307---\x03 \x02Operadores de Red\x02 \x0307---\x03"
    empty:          "No hay operadores de red."

# --- ROLE --------------------------------------------------------------------
role:
  syntax:           "ROLE {ADD|DEL|LIST|PERMS|MODES|VHOST} <nombre> ..."
  short:            "Gestiona roles de operadores."
  help:             "Gestiona roles de operadores. ADD crea un nuevo rol, DEL lo elimina,\nLIST muestra todos los roles, PERMS gestiona permisos de un rol, MODES gestiona modos IRCOP,\nVHOST gestiona el patrón de vhost forzado de un rol.\nRoles protegidos (ADMIN, OPER, PREOPER) no pueden eliminarse.\nEste comando está restringido a usuarios Root."

  unknown_sub:      "\x0304✗\x03 Subcomando desconocido \x02%sub%\x02. Usa ADD, DEL, LIST, PERMS, MODES o VHOST."
  not_found:        "\x0304✗\x03 El rol \x02%role%\x02 no existe."
  already_exists:   "\x0304✗\x03 El rol \x02%role%\x02 ya existe."
  protected:        "\x0304✗\x03 El rol \x02%role%\x02 está protegido y no puede eliminarse."

  add:
    syntax:         "ROLE ADD <nombre> [descripción]"
    short:          "Crea un nuevo rol."
    help:            "Crea un nuevo rol personalizado. La descripción es opcional.\nEste comando está restringido a usuarios Root."
    done:           "\x0303✓\x03 Creado el rol \x02%role%\x02."

  del:
    syntax:         "ROLE DEL <nombre>"
    short:          "Elimina un rol."
    help:            "Elimina un rol personalizado. Los roles protegidos (ADMIN, OPER, PREOPER)\nno pueden eliminarse. Si el rol tiene operadores asignados,\ndebes reasignarlos primero.\nEste comando está restringido a usuarios Root."
    done:           "\x0303✓\x03 Eliminado el rol \x02%role%\x02."

  list:
    syntax:         "ROLE LIST"
    short:          "Lista todos los roles."
    help:            "Lista todos los roles. Los roles protegidos se marcan con [PROTEGIDO].\nEste comando está restringido a usuarios Root."
    header:         "\x0307---\x03 \x02Roles de Operadores\x02 \x0307---\x03"
    empty:          "No hay roles de operadores."

  perms:
    syntax:         "ROLE PERMS <rol> {LIST|ADD|DEL} [permiso]"
    short:          "Gestiona permisos de un rol."
    help:            "Gestiona permisos asignados a un rol.\nLIST muestra todos los permisos del rol.\nADD asigna un permiso al rol.\nDEL quita un permiso del rol (no para roles protegidos).\nEste comando está restringido a usuarios Root."
    unknown_action:  "\x0304✗\x03 Acción desconocida \x02%action%\x02. Usa LIST, ADD o DEL."
    not_found:       "\x0304✗\x03 El permiso \x02%perm%\x02 no existe."
    already_has:     "\x0304✗\x03 El rol \x02%role%\x02 ya tiene el permiso \x02%perm%\x02."
    does_not_have:   "\x0304✗\x03 El rol \x02%role%\x02 no tiene el permiso \x02%perm%\x02."
    protected:      "\x0304✗\x03 No se pueden modificar permisos del rol protegido \x02%role%\x02."

    list:
      syntax:       "ROLE PERMS <rol> LIST"
      short:        "Lista permisos de un rol."
      help:         "Lista todos los permisos asignados a un rol.\nEste comando está restringido a usuarios Root."
      header:        "\x0307---\x03 \x02Permisos de %role%\x02 \x0307---\x03"
      empty:        "El rol \x02%role%\x02 no tiene permisos asignados."
      assigned:     "\x0310Asignados:\x03"
      none_assigned: "\x0314No hay permisos asignados.\x03"
      available:    "\x0310Disponibles:\x03"
      all_assigned: "\x0314Todos los permisos están asignados a este rol.\x03"

    add:
      syntax:       "ROLE PERMS <rol> ADD <permiso>"
      short:        "Añade un permiso a un rol."
      help:         "Añade un permiso a un rol.\nEste comando está restringido a usuarios Root."
      done:         "\x0303✓\x03 Añadido permiso \x02%perm%\x02 al rol \x02%role%\x02."

    del:
      syntax:       "ROLE PERMS <rol> DEL <permiso>"
      short:        "Quita un permiso de un rol."
      help:         "Quita un permiso de un rol.\nNo se pueden modificar roles protegidos.\nEste comando está restringido a usuarios Root."
      done:         "\x0303✓\x03 Quitado permiso \x02%perm%\x02 del rol \x02%role%\x02."

  modes:
    syntax:         "ROLE MODES <rol> {VIEW|SET} [modos]"
    short:          "Gestiona modos de usuario IRCOP del rol."
    help:            "Gestiona los modos de usuario IRCOP asignados a un rol.\nVIEW muestra los modos actuales del rol.\nSET establece los modos IRCOP (ej: oH para +oH).\nLos usuarios con este rol recibirán estos modos al identificarse.\nModos disponibles según IRCD: UnrealIRCd (H, q, s, W), InspIRCd (s).\nEste comando está restringido a usuarios Root."
    unknown_action:  "\x0304✗\x03 Acción desconocida \x02%action%\x02. Usa VIEW o SET."

    view:
      syntax:       "ROLE MODES <rol> VIEW"
      short:        "Muestra los modos del rol."
      help:          "Muestra los modos de usuario IRCOP asignados a un rol.\nEste comando está restringido a usuarios Root."
      header:        "\x0307---\x03 \x02Modos de %role%\x02 \x0307---\x03"
      empty:        "El rol \x02%role%\x02 no tiene modos asignados."
      line:         "  Modos: \x0303%modes%\x03"

    set:
      syntax:       "ROLE MODES <rol> SET [modos]"
      short:        "Establece modos de usuario IRCOP."
      help:          "Establece los modos de usuario IRCOP para el rol.\nSin argumentos, elimina todos los modos del rol.\nSolo modos IRCOP válidos según el IRCD activo.\nLos usuarios identificados con este rol recibirán los cambios.\nEste comando está restringido a usuarios Root."
      done:         "\x0303✓\x03 Establecidos modos \x02%modes%\x02 para el rol \x02%role%\x02."
      cleared:      "\x0303✓\x03 Eliminados los modos del rol \x02%role%\x02."
      invalid_mode: "\x0304✗\x03 El modo \x02%mode%\x02 no es un modo IRCOP válido."
      invalid_modes: "\x0304✗\x03 Modos inválidos: %invalid%. Modos válidos: %valid%."
      no_irc_user_modes: "\x0304✗\x03 El IRCD actual no tiene modos IRCOP configurados."

  vhost:
    syntax:         "ROLE VHOST <rol> {VIEW|SET} [patrón]"
    short:          "Gestiona el patrón de vhost forzado del rol."
    help:           "Gestiona el vhost forzado asignado a un rol.\nVIEW muestra el patrón de vhost forzado actual.\nSET asigna un patrón de vhost forzado (los usuarios con este rol\nrecibirán este vhost al identificarse, sobrescribiendo el vhost personal).\nEl patrón se añade después del nickname limpio, ej:\n  Nick: _davidlig_ → Patrón: admin.ares → VHost: davidlig.admin.ares\nCaracteres válidos: a-z, A-Z, 0-9, guion (-) y punto (.).\nDebe tener al menos un punto, no puede empezar/terminar con - o . o tener ..\nUsa OFF para eliminar el patrón de vhost forzado.\nEste comando está restringido a usuarios Root."
    unknown_action:  "\x0304✗\x03 Acción desconocida \x02%action%\x02. Usa VIEW o SET."

    view:
      syntax:       "ROLE VHOST <rol> VIEW"
      short:         "Muestra el patrón de vhost forzado del rol."
      help:          "Muestra el patrón de vhost forzado asignado a un rol.\nEste comando está restringido a usuarios Root."
      header:        "\x0307---\x03 \x02VHost forzado de %role%\x02 \x0307---\x03"
      empty:        "El rol \x02%role%\x02 no tiene patrón de vhost forzado configurado."
      line:         "  Patrón: \x0303%pattern%\x03"
      example:      "  Ejemplo: \x02nickname\x02.%pattern%"

    set:
      syntax:       "ROLE VHOST <rol> SET <patrón>"
      short:         "Establece el patrón de vhost forzado del rol."
      help:          "Establece el patrón de vhost forzado para el rol.\nLos usuarios que se identifiquen con este rol recibirán el vhost forzado,\nque tiene prioridad sobre el vhost personal.\nEl patrón se añade después del nickname limpio.\nUsa OFF u omite el argumento para eliminar el vhost forzado.\nEste comando está restringido a usuarios Root."
      done:         "\x0303✓\x03 Establecido patrón de vhost forzado para el rol \x02%role%\x02."
      cleared:      "\x0303✓\x03 Eliminado el patrón de vhost forzado del rol \x02%role%\x02."
      invalid:      "\x0304✗\x03 Patrón de vhost inválido. Caracteres válidos: a-z, A-Z, 0-9, - y .. Debe tener al menos un punto, no puede empezar/terminar con - o . o tener .."

# --- KILL --------------------------------------------------------------------
kill:
  syntax:           "KILL <nickname> <razón>"
  short:            "Desconecta forzosamente a un usuario de la red."
  help:             "Desconecta a un usuario de la red IRC.\nLos IRCops y usuarios Root no pueden ser killeados.\nEste comando requiere el permiso operserv.kill.\n\nSintaxis: KILL <nickname> <razón>\nEjemplo: KILL BadUser Flooding en canales"
  user_not_online:  "\x0304✗\x03 El nick \x02%nick%\x02 no está conectado."
  protected_root:   "\x0304✗\x03 No se puede hacer KILL al usuario Root \x02%nick%\x02."
  protected_ircop:  "\x0304✗\x03 No se puede hacer KILL al IRC operator \x02%nick%\x02."
  done:             "\x0303✓\x03 Usuario \x02%nick%\x02 desconectado (%reason%)."
  permission_denied: "\x0304✗\x03 Permiso denegado. Necesitas el permiso operserv.kill."

# --- GLINE --------------------------------------------------------------------
gline:
  syntax:           "GLINE <ADD|DEL|LIST> [máscara] [expiración] [razón]"
  short:            "Gestiona G-lines de red."
  help:             "Gestiona G-lines (bans globales) de red.\nADD añade un nuevo G-line con máscara, expiración y razón.\nDEL elimina un G-line por máscara o número de entrada.\nLIST muestra todos los G-lines, filtrable por máscara.\n\nFormato de expiración: 0=permanente, o usa sufijo d, h, m (ej: 7d, 12h, 30m).\nLos GLINEs que coincidan con usuarios Root o IRCop son rechazados.\nEste comando requiere el permiso operserv.gline."
  unknown_sub:      "\x0304✗\x03 Subcomando desconocido \x02%sub%\x02. Usa ADD, DEL o LIST."
  invalid_mask:     "\x0304✗\x03 Formato de máscara inválido. Debe ser usuario@host (ej: *@192.168.*)."
  global_mask:      "\x0304✗\x03 La máscara G-line \x02%mask%\x02 es demasiado amplia. No se permiten máscaras globales."
  dangerous_mask:   "\x0304✗\x03 La máscara G-line \x02%mask%\x02 es demasiado amplia. La parte del host necesita al menos 4 caracteres alfanuméricos."
  protected_user:   "\x0304✗\x03 No se puede aplicar GLINE al usuario protegido \x02%nick%\x02."
  invalid_expiry:   "\x0304✗\x03 Formato de expiración inválido. Usa 0 para permanente, o un valor como 7d, 12h, 30m."
  already_exists:   "\x0304✗\x03 Ya existe un G-line para \x02%mask%\x02."
  max_entries:      "\x0304✗\x03 Se alcanzó el máximo de G-lines (%max%)."
  not_found:        "\x0304✗\x03 G-line \x02%mask%\x02 no encontrado."
  user_not_found:   "\x0304✗\x03 El usuario \x02%nick%\x02 no está conectado."
  permanent:        "permanente"

  add:
    syntax:         "GLINE ADD <máscara> <expiración> <razón>"
    short:          "Añade un G-line de red."
    help:           "Añade un G-line (ban global) de red.\nLa máscara debe tener formato usuario@host.\nExpiración: 0=permanente, o usa sufijo d, h, m (ej: 7d, 12h, 30m).\nLos GLINEs que coincidan con usuarios Root o IRCop son rechazados.\nEste comando requiere el permiso operserv.gline."
    done:           "\x0303✓\x03 G-line añadido: \x02%mask%\x02 (%duration%) - %reason%"

  del:
    syntax:         "GLINE DEL <máscara|número>"
    short:          "Elimina un G-line."
    help:           "Elimina un G-line de la lista.\nPuedes especificar la máscara o el número de entrada de LIST.\nEste comando requiere el permiso operserv.gline."
    done:           "\x0303✓\x03 G-line \x02%mask%\x02 eliminado."

  list:
    syntax:         "GLINE LIST [máscara]"
    short:          "Lista todos los G-lines."
    help:           "Lista todos los G-lines. Opcionalmente filtra por patrón de máscara.\nEste comando requiere el permiso operserv.gline."
    header:         "\x0307---\x03 \x02G-lines (%count%) \x0307---\x03"
    empty:          "No hay G-lines."
    no_reason:      "Sin razón"
    never_expires:  "Permanente"
    unknown_creator: "desconocido"
    entry:          "\x0310%index%.\x03 \x02%mask%\x02 - %reason% (\x0314%nick%\x03, expira: %expiration%)"

# --- GLOBAL -------------------------------------------------------------------
global:
  syntax:           "GLOBAL {servicio|nick!ident@vhost} {PRIVMSG|NOTICE} <mensaje>"
  short:            "Envía un mensaje global a todos los usuarios conectados."
  help:             "Envía un mensaje a todos los usuarios conectados.\n\nSi el primer argumento es un nombre de servicio (NickServ, ChanServ,\nMemoServ, OperServ), el mensaje se enviará usando ese servicio existente.\n\nSi no es un servicio, se creará un pseudo-cliente temporal con la máscara\nespecificada. La máscara debe tener el formato: nick!ident@vhost\n- nick: nickname IRC válido (letras, []{}|\\`, dígitos, empieza por letra)\n- ident: alfanumérico con . _ ~ -\n- vhost: hostname válido\n\nPara pseudo-clientes, el nickname no puede estar conectado ni registrado.\nEl pseudo-cliente permanecerá conectado durante el envío y se desconectará\nautomáticamente (el nick será bloqueado 24h mediante SQLINE/QLINE).\n\nPRIVMSG envía como mensaje privado, NOTICE envía como aviso.\nEste comando requiere el permiso operserv.global."
  mask_invalid:    "\x0304✗\x03 Formato de máscara inválido: %error%"
  nick_service:    "\x0304✗\x03 No se puede usar un nickname de servicio."
  nick_connected: "\x0304✗\x03 El nickname \x02%nick%\x02 está conectado actualmente."
  nick_registered: "\x0304✗\x03 El nickname \x02%nick%\x02 está registrado."
  type_invalid:    "\x0304✗\x03 El tipo de mensaje debe ser PRIVMSG o NOTICE."
  done:            "\x0303✓\x03 Mensaje global enviado desde \x02%nick%\x02 a %count% usuarios."

