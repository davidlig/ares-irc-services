# --- IRCOP --------------------------------------------------------------------
ircop:
  syntax:           "IRCOP <nickname> {ADD|DEL|LIST} <rol>"
  short:            "Gestiona operadores de red."
  help:             "Gestiona operadores de red. ADD aГұade un nickname registrado\ncomo operador con el rol especificado.\nDEL elimina un operador. LIST muestra todos los operadores.\nUsa ROLE LIST para ver los roles disponibles.\nEste comando estГЎ restringido a usuarios Root configurados en los servicios."

  unknown_sub:      "\x0304вң—\x03 Subcomando desconocido \x02%sub%\x02. Usa ADD, DEL o LIST."
  unknown_role:     "\x0304вң—\x03 El rol \x02%role%\x02 no existe. Usa \x0303/msg %bot% ROLE LIST\x03 para ver los roles disponibles."
  already_admin:   "\x0304вң—\x03 \x02%nick%\x02 ya es operador (rol: %role%)."
  role_changed:    "\x0303вң“\x03 Cambiado el rol de \x02%nick%\x02 de %old% a %new%."

  add:
    syntax:         "IRCOP <nickname> ADD <rol>"
    short:          "AГұade un operador de red."
    help:            "AГұade un nickname registrado como operador de red.\nUsa ROLE LIST para ver los roles disponibles.\nEste comando estГЎ restringido a usuarios Root."
    done:           "\x0303вң“\x03 AГұadido \x02%nick%\x02 como \x02%role%\x02."
    nick_not_active: "\x0304вң—\x03 El nickname \x02%nick%\x02 no es un nickname registrado activo."

  del:
    syntax:         "IRCOP <nickname> DEL"
    short:          "Elimina un operador de red."
    help:            "Elimina un operador de red de la lista.\nEste comando estГЎ restringido a usuarios Root."
    done:           "\x0303вң“\x03 Eliminado \x02%nick%\x02 de operadores."
    not_admin:      "\x0304вң—\x03 \x02%nick%\x02 no es un operador de red."

  list:
    syntax:         "IRCOP LIST"
    short:          "Lista todos los operadores de red."
    help:            "Lista todos los operadores de red con sus roles y fecha de registro.\nEste comando estГЎ restringido a usuarios Root."
    header:         "\x0307---\x03 \x02Operadores de Red\x02 \x0307---\x03"
    empty:          "No hay operadores de red."

# --- ROLE --------------------------------------------------------------------
role:
  syntax:           "ROLE {ADD|DEL|LIST|PERMS} <nombre> ..."
  short:            "Gestiona roles de operadores."
  help:             "Gestiona roles de operadores. ADD crea un nuevo rol, DEL lo elimina,\nLIST muestra todos los roles, PERMS gestiona permisos de un rol.\nRoles protegidos (ADMIN, OPER, PREOPER) no pueden eliminarse.\nEste comando estГЎ restringido a usuarios Root."

  unknown_sub:      "\x0304вң—\x03 Subcomando desconocido \x02%sub%\x02. Usa ADD, DEL, LIST o PERMS."
  not_found:        "\x0304вң—\x03 El rol \x02%role%\x02 no existe."
  already_exists:   "\x0304вң—\x03 El rol \x02%role%\x02 ya existe."
  protected:        "\x0304вң—\x03 El rol \x02%role%\x02 estГЎ protegido y no puede eliminarse."

  add:
    syntax:         "ROLE ADD <nombre> [descripciГіn]"
    short:          "Crea un nuevo rol."
    help:            "Crea un nuevo rol personalizado. La descripciГіn es opcional.\nEste comando estГЎ restringido a usuarios Root."
    done:           "\x0303вң“\x03 Creado el rol \x02%role%\x02."

  del:
    syntax:         "ROLE DEL <nombre>"
    short:          "Elimina un rol."
    help:            "Elimina un rol personalizado. Los roles protegidos (ADMIN, OPER, PREOPER)\nno pueden eliminarse. Si el rol tiene operadores asignados,\ndebes reasignarlos primero.\nEste comando estГЎ restringido a usuarios Root."
    done:           "\x0303вң“\x03 Eliminado el rol \x02%role%\x02."

  list:
    syntax:         "ROLE LIST"
    short:          "Lista todos los roles."
    help:            "Lista todos los roles. Los roles protegidos se marcan con [PROTEGIDO].\nEste comando estГЎ restringido a usuarios Root."
    header:         "\x0307---\x03 \x02Roles de Operadores\x02 \x0307---\x03"
    empty:          "No hay roles de operadores."

  perms:
    syntax:         "ROLE PERMS <rol> {LIST|ADD|DEL} [permiso]"
    short:          "Gestiona permisos de un rol."
    help:            "Gestiona permisos asignados a un rol.\nLIST muestra todos los permisos del rol.\nADD asigna un permiso al rol.\nDEL quita un permiso del rol (no para roles protegidos).\nEste comando estГЎ restringido a usuarios Root."
    unknown_action:  "\x0304вң—\x03 AcciГіn desconocida \x02%action%\x02. Usa LIST, ADD o DEL."
    not_found:       "\x0304вң—\x03 El permiso \x02%perm%\x02 no existe."
    already_has:     "\x0304вң—\x03 El rol \x02%role%\x02 ya tiene el permiso \x02%perm%\x02."
    does_not_have:   "\x0304вң—\x03 El rol \x02%role%\x02 no tiene el permiso \x02%perm%\x02."
    protected:      "\x0304вң—\x03 No se pueden modificar permisos del rol protegido \x02%role%\x02."

    list:
      syntax:       "ROLE PERMS <rol> LIST"
      short:        "Lista permisos de un rol."
      help:         "Lista todos los permisos asignados a un rol.\nEste comando estГЎ restringido a usuarios Root."
      header:        "\x0307---\x03 \x02Permisos de %role%\x02 \x0307---\x03"
      empty:        "El rol \x02%role%\x02 no tiene permisos asignados."

    add:
      syntax:       "ROLE PERMS <rol> ADD <permiso>"
      short:        "AГұade un permiso a un rol."
      help:         "AГұade un permiso a un rol.\nEste comando estГЎ restringido a usuarios Root."
      done:         "\x0303вң“\x03 AГұadido permiso \x02%perm%\x02 al rol \x02%role%\x02."

    del:
      syntax:       "ROLE PERMS <rol> DEL <permiso>"
      short:        "Quita un permiso de un rol."
      help:         "Quita un permiso de un rol.\nNo se pueden modificar roles protegidos.\nEste comando estГЎ restringido a usuarios Root."
      done:         "\x0303вң“\x03 Quitado permiso \x02%perm%\x02 del rol \x02%role%\x02."