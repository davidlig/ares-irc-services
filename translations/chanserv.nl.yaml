# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#kanaal>"
  short:            "Wis de volledige toegangslijst van een kanaal."
  help:             |
    Verwijdert alle toegangsvermeldingen uit de toegangslijst van een kanaal.
    Deze actie is onomkeerbaar en kan niet ongedaan worden gemaakt.
    Alleen IRCops met 'chanserv.clearaccess'-toestemming kunnen dit commando gebruiken.

    Syntax: CLEARACCESS <#kanaal>
    Voorbeelden:
      CLEARACCESS #kanaal
  success:          "\x0303✔\x03 \x02%count%\x02 toegangsvermeldingen gewist uit \x02%channel%\x02."
  empty:            "\x0307ℹ\x03 Kanaal \x02%channel%\x02 heeft geen toegangsvermeldingen."

clearusers:
  syntax:           "CLEARUSERS <#kanaal> [reden]"
  short:            "Kick alle gebruikers uit een kanaal."
  help:             |
    Kickt alle gebruikers uit het opgegeven kanaal.
    Dit is een IRCop-only commando voor kanaalbeheer.
    Een optionele reden kan worden opgegeven; indien weggelaten wordt een standaardreden gebruikt.

    Alleen IRCops met 'chanserv.clearusers'-toestemming kunnen dit commando gebruiken.

    Syntax: CLEARUSERS <#kanaal> [reden]
    Voorbeelden:
      CLEARUSERS #kanaal
      CLEARUSERS #kanaal flooding
  not_on_network:   "\x0304✗\x03 Kanaal \x02%channel%\x02 is momenteel niet op het netwerk."
  empty:            "\x0307ℹ\x03 Kanaal \x02%channel%\x02 heeft geen gebruikers om te kicken."
  success:          "\x0303✔\x03 \x02%count%\x02 gebruiker(s) gekickt uit \x02%channel%\x02."
  default_reason:   "CLEARUSERS commando"
