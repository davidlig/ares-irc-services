    syntax:         "ACCESS <#kanaal> LIST"
    short:          "Toon toegangslijst (vereist ACCESSLIST-niveau)."
    help:           "Toont bijnaam en niveau voor elke vermelding."
    header:         "\x0303Toegangslijst voor \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 Kanaal \x02%channel%\x02 heeft geen toegangsvermeldingen."
