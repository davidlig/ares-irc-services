noexpire:
  syntax:           "NOEXPIRE <#kanaal> {ON|OFF}"
  short:            "Stel verloopbescherming in of verwijder deze voor een kanaal."
  help:             |
    Bepaalt of een kanaal verloopt door inactiviteit.
    Wanneer ON, verloopt het kanaal nooit, ongeacht de laatste activiteit.
    Wanneer OFF, zijn de normale verloopregels van toepassing.

    Alleen IRCops met 'chanserv.noexpire'-toestemming kunnen dit commando gebruiken.

    Syntax: NOEXPIRE <#kanaal> {ON|OFF}
    Voorbeelden:
      NOEXPIRE #Belangrijk ON
      NOEXPIRE #Belangrijk OFF
  success_on:       "\x0303✔\x03 Kanaal \x02%channel%\x02 is nu beschermd tegen verloop."
  success_off:      "\x0303✔\x03 Kanaal \x02%channel%\x02 verloopt nu normaal."
  not_registered:   "\x0304✗\x03 Kanaal \x02%channel%\x02 is niet geregistreerd."
  forbidden:         "\x0304✗\x03 Kanaal \x02%channel%\x02 is verboden."
  suspended:         "\x0304✗\x03 Kanaal \x02%channel%\x02 is geschorst."

forbid:
  syntax:           "FORBID <#kanaal> <reden>"
  short:             "Verbied een kanaal van gebruik."
  help:              "Voorkomt dat een kanaal door iemand wordt gebruikt.\nAls het kanaal momenteel geregistreerd is, wordt het eerst verwijderd.\nAlle gebruikers in het kanaal worden gekickt en het kanaal wordt vergrendeld.\nDit commando vereist IRCop-toestemming: chanserv.forbid"
  reason_required:  "\x0304✗\x03 U moet een reden opgeven."
  success:          "\x0303✔\x03 Kanaal \x02%channel%\x02 is verboden."
  updated:          "\x0303✔\x03 Verbodsreden voor kanaal \x02%channel%\x02 is bijgewerkt."
  channel_forbidden: "\x0304✗\x03 Kanaal \x02%channel%\x02 is verboden en kan niet worden gebruikt."

unforbid:
  syntax:           "UNFORBID <#kanaal>"
  short:             "Hef een kanaalverbod op."
  help:              "Heft een kanaalverbod op, zodat het kanaal opnieuw kan worden geregistreerd.\nDit commando vereist IRCop-toestemming: chanserv.forbid"
  success:          "\x0303✔\x03 Kanaal \x02%channel%\x02 is niet langer verboden."
  not_forbidden:    "\x0304✗\x03 Kanaal \x02%channel%\x02 is niet verboden."

