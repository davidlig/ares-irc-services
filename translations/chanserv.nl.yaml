  not_registered:   "\x0304✗\x03 Kanaal \x02%channel%\x02 is niet geregistreerd."

suspend:
  syntax:           "SUSPEND <#kanaal> <duur> <reden>"
  short:            "Schors een kanaal."
  help:             "Schakelt tijdelijk een geregistreerd kanaal uit. Duurformaten: 0 = permanent, 1d, 12h, 60m.\nTijdens schorsing zijn kanaalmodi, toegang en handhaving uitgeschakeld.\nDit commando vereist IRCop-toestemming: chanserv.suspend"
  success:          "\x0303✔\x03 Kanaal \x02%channel%\x02 is geschorst tot \x02%duration%\x02."
  not_registered:   "\x0304✗\x03 Kanaal \x02%channel%\x02 is niet geregistreerd."
  already_suspended: "\x0304✗\x03 Kanaal \x02%channel%\x02 is al geschorst."
  invalid_duration:  "\x0304✗\x03 Ongeldige duur. Gebruik: 0 (permanent), 1d, 12h of 60m."
  permanent:         "Permanent"
  channel_suspended: "\x0304✗\x03 Kanaal \x02%channel%\x02 is geschorst en kan niet worden gebruikt."
  channel_forbidden: "\x0304✗\x03 Kanaal \x02%channel%\x02 is verboden en kan niet worden gebruikt."
  notice_channel:    "\x0304⚠\x03 Kanaal is geschorst. Reden: %reason%"

unsuspend:
  syntax:           "UNSUSPEND <#kanaal>"
  short:            "Heef een kanaalschorsing op."
  help:             "Reactieert een geschorst kanaal, herstelt de modi en handhaving.\nDit commando vereist IRCop-toestemming: chanserv.suspend"
  success:          "\x0303✔\x03 Kanaal \x02%channel%\x02 is niet langer geschorst."
  not_registered:   "\x0304✗\x03 Kanaal \x02%channel%\x02 is niet geregistreerd."
  not_suspended:    "\x0304✗\x03 Kanaal \x02%channel%\x02 is niet geschorst."
  reason_expired:   "verlopen schorsing"

# NOJOIN documentation for LEVELS:
# NOJOIN: Minimum access level required to join channel. Users with level < NOJOIN are kicked.
# Default: -1 (disabled). Set to 0 to only allow registered users, 50 for level 50+, etc.

nojoin:
  reason: "NOJOIN niveau-beperking"

