  action_message: "%operator% voert commando %command% uit op %target%. %reason%"
  action_with_option: "%operator% voert commando %command% uit op %target%. Optie: %option%. %reason%"
  action_with_value: "%operator% voert commando %command% uit op %target%. Optie: %option%=%value%. %reason%"
  founder_action: "Niveau-oprichter actie"
  prefix_reason:  "Reden: %reason%"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#kanaal> {ADD|DEL|VIEW|CLEAR}"
  short:            "Bekijk of beheer kanaalactiegeschiedenis."
  help:             |
    Beheer de actiegeschiedenis voor een kanaal.
    Alleen IRCops met 'chanserv.history'-toestemming kunnen dit commando gebruiken.

    Subcommando's:
      ADD   — Voeg een handmatige vermelding toe aan de kanaalgeschiedenis.
      DEL   — Verwijder een specifieke vermelding op ID.
      VIEW  — Bekijk geschiedenisvermeldingen (gepagineerd, 3 per pagina).
      CLEAR — Verwijder alle geschiedenisvermeldingen voor het kanaal.

    Syntax: HISTORY <#kanaal> {ADD|DEL|VIEW|CLEAR} [argumenten]
    Voorbeelden:
      HISTORY #kanaal VIEW
      HISTORY #kanaal VIEW 2
      HISTORY #kanaal VIEW ALL
      HISTORY #kanaal ADD Vermoedelijke overnamepoging
      HISTORY #kanaal DEL 42
      HISTORY #kanaal CLEAR
  not_registered:   "\x0304✗\x03 Kanaal \x02%channel%\x02 is niet geregistreerd."
  unknown_operator: "(onbekend)"

  add:
    syntax:     "HISTORY <#kanaal> ADD <bericht>"
    short:      "Voeg een handmatige geschiedenisvermelding toe."
    help:        |
      Voegt een handmatige vermelding toe aan de kanaalgeschiedenis.
    success:    "\x0303✔\x03 Geschiedenisvermelding toegevoegd voor \x02%channel%\x02."

  del:
    syntax:     "HISTORY <#kanaal> DEL <id>"
    short:      "Verwijder een geschiedenisvermelding op ID."
    success:    "\x0303✔\x03 Geschiedenisvermelding \x02%id%\x02 verwijderd."
    not_found:  "\x0304✗\x03 Geschiedenisvermelding \x02%id%\x02 niet gevonden."
    invalid_id: "\x0304✗\x03 Ongeldige vermeldings-ID: \x02%id%\x02."

  view:
    syntax:     "HISTORY <#kanaal> VIEW [PAGINA|ALL]"
    short:      "Bekijk kanaalactiegeschiedenis."
    header:     "\x02Geschiedenis voor \x0307%channel%\x03\x02 (toont %start%-%end% van %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 door %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Geen geschiedenisvermeldingen gevonden voor \x02%channel%\x02."
    page_hint:   "Gebruik \x0303HISTORY %channel% VIEW %next_page%\x03 voor meer vermeldingen."

  clear:
    syntax:     "HISTORY <#kanaal> CLEAR"
    short:      "Verwijder alle geschiedenisvermeldingen voor een kanaal."
    success:    "\x0303✔\x03 \x02%count%\x02 geschiedenisvermeldingen gewist voor \x02%channel%\x02."

