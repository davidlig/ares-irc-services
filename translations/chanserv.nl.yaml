    syntax:         "ACCESS <#kanaal> ADD <bijnaam> <niveau>"
    short:          "Voeg toegangsniveau toe of werk bij (vereist ACCESSCHANGE-niveau)."
    help:           "Niveau 1-499. U kunt alleen niveaus lager dan uw eigen instellen."
