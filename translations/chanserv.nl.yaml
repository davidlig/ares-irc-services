  short:            "Beheer toegangslijst."
  help:             "LIST: toon toegangslijst (bijnaam en niveau per item). ADD: voeg toe of werk niveau van een bijnaam bij (1-499). DEL: verwijder een bijnaam uit de lijst. Gebruik \x0303HELP ACCESS <optie>\x03 voor elk."
