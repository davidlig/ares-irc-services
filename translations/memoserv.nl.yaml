ignore:
  syntax: "IGNORE {ADD|DEL|LIST} [#kanaal] [bijnaam]"
  short: "Beheer negeerlijst voor berichten."
  help: "ADD voegt een bijnaam toe aan uw (of de kanaal-) negeerlijst; DEL verwijdert; LIST toont de lijst. Voor kanalen vereisen ADD/DEL MEMOCHANGE."
  add:
    syntax: "IGNORE ADD [#kanaal] <bijnaam>"
    short: "Voeg bijnaam toe aan negeerlijst."
    help: "Berichten van deze bijnaam worden niet geaccepteerd voor uw inbox (of die van het kanaal)."
  del:
    syntax: "IGNORE DEL [#kanaal] <bijnaam>"
    short: "Verwijder bijnaam uit negeerlijst."
    help: "Verwijdert de bijnaam uit de negeerlijst."
  list:
    syntax: "IGNORE LIST [#kanaal]"
    short: "Toon genegeerde bijnamen."
    help: "Toont de lijst met bijnamen die u (of het kanaal) negeert voor berichten."
  added: "\x0303✔\x03 \x02%nickname%\x02 toegevoegd aan negeerlijst."
