list:
  syntax: "LIST [#kanaal]"
  short: "Toon berichten (ongelezen gemarkeerd met rode *)."
  help: "Toont uw berichten of kanaalberichten. Ongelezen berichten worden getoond met een rode asterisk en een voorbeeld (max 50 tekens). Zonder #kanaal = uw bijnaam-inbox; met #kanaal is MEMOREAD vereist."
