# --- IRCop Commands ---------------------------------------------------------
userip:
  syntax:           "USERIP <nickname>"
  short:            "Obter o endereço IP real e hostname do nickname."
  help:             |
    Mostra o endereço IP real e o hostname do nickname especificado.
    Disponível apenas para IRCops com permissão 'nickserv.userip'.

    Este comando mostra informações sensíveis do nickname.
    Use com responsabilidade.

    Sintaxe: USERIP <nickname>
    Exemplo: USERIP SomeUser
  not_online:       "\x0304✗\x03 O nickname \x02%nickname%\x02 não está ligado."
  result:           "\x0307ℹ\x03 Nickname: \x02%nickname%\x02 | IP: \x0307%ip%\x03 | Host: \x0307%host%\x03"

permissions:
  nickserv.userip: "Ver o endereço IP/hostname real de um nickname (USERIP)"
  nickserv.suspend: "Suspender ou remover suspensão de um nickname (SUSPEND/UNSUSPEND)"
  nickserv.rename: "Forçar renomeação de um nickname ligado para um nick aleatório (RENAME)"
  nickserv.drop: "Remover um nickname registado (DROP)"
  nickserv.drop.force: "Forçar a eliminação permanente de um nickname recuperável (DROP FORCE)"
  nickserv.restore: "Restaurar um nickname pendente de eliminação (RESTORE)"
  nickserv.forbid: "Proibir ou remover proibição de um nickname (FORBID/UNFORBID)"
