# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <nickname> <duração> <motivo>"
  short:            "Suspender um nickname."
  help:             |
    Suspende um nickname, impedindo o proprietário de se identificar.
    A suspensão pode ser temporária ou permanente.

    Formatos de duração: \x0303%d\x03 (dias), \x0303%h\x03 (horas), \x0303%m\x03 (minutos), ou \x03030\x03 (permanente).

    Utilizadores suspensos não podem identificar-se com o seu nickname.
    Operadores de IRC e utilizadores root não podem ser suspensos.

    Sintaxe: SUSPEND <nickname> <duração> <motivo>
    Exemplos:
      SUSPEND BadUser 7d Spam em #help
      SUSPEND Abuser 30d Flood repetido
      SUSPEND ProblemUser 0 Evasão de permaban
  success:            "\x0303✔\x03 O nickname \x02%nickname%\x02 foi suspenso até \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 O nickname \x02%nickname%\x02 já está suspenso."
  not_registered:     "\x0304✗\x03 O nickname \x02%nickname%\x02 não está registado."
  forbidden:          "\x0304✗\x03 O nickname \x02%nickname%\x02 está proibido e não pode ser suspenso."
  cannot_suspend_oper: "\x0304✗\x03 Não é possível suspender o operador de IRC \x02%nickname%\x02."
  cannot_suspend_root: "\x0304✗\x03 Não é possível suspender o utilizador root \x02%nickname%\x02."
  cannot_suspend_service: "\x0304✗\x03 Não é possível suspender o nickname de serviço \x02%nickname%\x02."
  invalid_duration:   "\x0304✗\x03 Duração inválida. Use: \x0303<d><h><m>\x03 (ex: 7d, 12h, 30m) ou \x03030\x03 para permanente."
  permanent:          "permanente"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <nickname>"
  short:            "Remover a suspensão de um nickname."
  help:             |
    Remove uma suspensão ativa de um nickname, permitindo que o proprietário se identifique novamente.

    Sintaxe: UNSUSPEND <nickname>
    Exemplo: UNSUSPEND SomeUser
  success:          "\x0303✔\x03 A suspensão foi levantada de \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 O nickname \x02%nickname%\x02 não está registado."
  not_suspended:    "\x0304✗\x03 O nickname \x02%nickname%\x02 não está suspenso."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <nickname>"
  short:            "Forçar renomeação de um nickname ligado para um nickname aleatório."
  help:             |
    Força um nickname ligado a alterar o seu nick para um gerado aleatoriamente.
    Útil para aplicar políticas de rede sem desligar o utilizador.

    O formato do novo nickname usa o prefixo de convidado configurado (%prefix%).

    Este comando requer permissão IRCop: nickserv.rename

    Sintaxe: RENAME <nickname>
    Exemplo: RENAME Troublemaker
  not_online:        "\x0304✗\x03 O nickname \x02%nickname%\x02 não está ligado."
  cannot_rename_root: "\x0304✗\x03 Não é possível renomear o utilizador root \x02%nickname%\x02."
  cannot_rename_oper: "\x0304✗\x03 Não é possível renomear o operador de IRC \x02%nickname%\x02."
  cannot_rename_service: "\x0304✗\x03 Não é possível renomear o nickname de serviço \x02%nickname%\x02."
  success:           "\x0303✓\x03 O nickname \x02%nickname%\x02 foi renomeado para \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <nickname> [FORCE]"
  short:            "Remover um nickname registado."
  help:             |
    Remove um nickname registado da base de dados.
    Esta ação não pode ser desfeita.

    Se o utilizador estiver online, será renomeado para um nickname Guest-.
    Utilizadores root e operadores de IRC não podem ser removidos.
    Não pode remover o seu próprio nickname.

    Este comando requer permissão IRCop: nickserv.drop

    Sintaxe: DROP <nickname>
    Exemplo: DROP OldAccount
  not_registered:     "\x0304✗\x03 O nickname \x02%nickname%\x02 não está registado."
  suspended:         "\x0304✗\x03 O nickname \x02%nickname%\x02 está suspenso. Remova a suspensão primeiro."
  forbidden:         "\x0304✗\x03 O nickname \x02%nickname%\x02 está proibido."
  cannot_drop_root:   "\x0304✗\x03 Não é possível remover o utilizador root \x02%nickname%\x02."
  cannot_drop_oper:   "\x0304✗\x03 Não é possível remover o operador de IRC \x02%nickname%\x02."
  cannot_drop_self:    "\x0304✗\x03 Não pode remover o seu próprio nickname."
  success:            "\x0303✓\x03 O nickname \x02%nickname%\x02 foi marcado para eliminação e pode ser restaurado durante o período de carência."
  force_success:      "\x0303✓\x03 O nickname \x02%nickname%\x02 foi eliminado permanentemente."
  pending_deletion:   "\x0304✗\x03 O nickname \x02%nickname%\x02 já está pendente de eliminação. Use DROP <nickname> FORCE para eliminá-lo permanentemente."
  cannot_drop_service: "\x0304✗\x03 Não é possível remover o nickname de serviço \x02%nickname%\x02."

# --- RESTORE (IRCop) -----------------------------------------------------------
restore:
  syntax:           "RESTORE <nickname>"
  short:            "Restaurar um nickname pendente de eliminação."
  help:             "Restaura um nickname que foi removido manualmente e ainda está dentro do período de carência. Requer permissão IRCop: nickserv.restore."
  success:          "\x0303✓\x03 O nickname \x02%nickname%\x02 foi restaurado."
  not_registered:   "\x0304✗\x03 O nickname \x02%nickname%\x02 não está registado."
  not_pending_deletion: "\x0304✗\x03 O nickname \x02%nickname%\x02 não está pendente de eliminação."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <nickname> <motivo>"
  short:            "Bloquear permanentemente um nickname de ser usado."
  help:             |
    Proíbe um nickname de ser usado na rede.
    O nickname não pode ser registado ou usado por ninguém.

    Se o nickname estiver atualmente registado, será removido primeiro.
    Se alguém o estiver a usar, será forçado a mudar para um nickname Guest-.

    Utilizadores root, operadores de IRC e nicknames de serviço não podem ser proibidos.

    Este comando requer permissão IRCop: nickserv.forbid

    Sintaxe: FORBID <nickname> <motivo>
    Exemplo: FORBID BadNick Violações repetidas de políticas
  success:            "\x0303✔\x03 O nickname \x02%nickname%\x02 foi proibido."
  updated:            "\x0303✔\x03 O motivo de proibição de \x02%nickname%\x02 foi atualizado."
  reason_required:    "\x0304✗\x03 Deve fornecer um motivo para a proibição."
  cannot_forbid_root:  "\x0304✗\x03 Não é possível proibir o utilizador root \x02%nickname%\x02."
  cannot_forbid_oper:  "\x0304✗\x03 Não é possível proibir o operador de IRC \x02%nickname%\x02."
  cannot_forbid_service: "\x0304✗\x03 Não é possível proibir o nickname de serviço \x02%nickname%\x02."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <nickname>"
  short:            "Remover uma proibição de nickname."
  help:             |
    Remove uma proibição de nickname, permitindo que o nickname seja usado novamente.

    Este comando requer permissão IRCop: nickserv.forbid

    Sintaxe: UNFORBID <nickname>
    Exemplo: UNFORBID SomeNick
  success:          "\x0303✔\x03 O nickname \x02%nickname%\x02 já não está proibido."
  not_forbidden:    "\x0304✗\x03 O nickname \x02%nickname%\x02 não está proibido."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST {ADD|DEL|LIST} [padrão]"
  short:            "Gerir padrões de vhost proibidos."
  help:             |
    Gere padrões que impedem os utilizadores de definir vhosts correspondentes
    via NickServ SET VHOST.

    Caracteres universais: * corresponde a qualquer sequência, ? corresponde a um único caractere.
    Exemplo: *.pirated.com bloqueia qualquer vhost que termine com .pirated.com

    Este comando requer permissão IRCop: nickserv.forbidvhost

    Subcomandos:
      ADD <padrão>    Adiciona um padrão proibido
      DEL <padrão>    Remove um padrão proibido
      LIST            Mostra todos os padrões proibidos

  unknown_sub: "\x0304✗\x03 Subcomando desconhecido \x02%sub%\x02. Use ADD, DEL ou LIST."

  add:
    syntax:      "FORBIDVHOST ADD <padrão>"
    short:       "Adicionar um padrão de vhost proibido."
    help:        |
      Adiciona um padrão à lista de vhosts proibidos. Os utilizadores não poderão
      definir vhosts que correspondam a este padrão via SET VHOST.

      Caracteres universais: * corresponde a qualquer sequência, ? corresponde a um único caractere.

      Sintaxe: FORBIDVHOST ADD <padrão>
      Exemplo: FORBIDVHOST ADD *.pirated.com
    done:            "\x0303✓\x03 Padrão de vhost proibido adicionado: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 O padrão \x02%pattern%\x02 já existe."
    invalid:          "\x0304✗\x03 Formato de padrão de vhost inválido."

  del:
    syntax:      "FORBIDVHOST DEL <padrão>"
    short:       "Remover um padrão de vhost proibido."
    help:        |
      Remove um padrão da lista de vhosts proibidos.

      Sintaxe: FORBIDVHOST DEL <padrão>
      Exemplo: FORBIDVHOST DEL *.pirated.com
    done:        "\x0303✓\x03 Padrão de vhost proibido removido: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 Padrão \x02%pattern%\x02 não encontrado."

  list:
    short:       "Listar todos os padrões de vhost proibidos."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Mostra todos os padrões de vhost proibidos.

      Sintaxe: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Padrões de vhost proibidos (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — por %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 Nenhum padrão de vhost proibido."
    unknown_creator: "desconhecido"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <nickname> {ADD|DEL|VIEW|CLEAR}"
  short:            "Ver ou gerir histórico de ações do nickname."
  help:             |
    Gere o histórico de ações de um nickname.
    Apenas IRCops com permissão 'nickserv.history' podem usar este comando.

    Ações registadas automaticamente:
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Sintaxe: HISTORY <nickname> ADD <mensagem>
            HISTORY <nickname> DEL <id>
            HISTORY <nickname> VIEW [PÁGINA|ALL]
            HISTORY <nickname> CLEAR

    Exemplos:
      HISTORY SomeNick VIEW
      HISTORY SomeNick ADD Nota manual sobre este utilizador
      HISTORY SomeNick VIEW 2
      HISTORY SomeNick VIEW ALL
      HISTORY SomeNick DEL 123
      HISTORY SomeNick CLEAR

    Use VIEW para ver o histórico (mostra 3 entradas por padrão).
    Use VIEW PAGE 2 para ver a página seguinte.
    Use VIEW ALL para ver o histórico completo.
    Use ADD para adicionar uma entrada manual.
    Use DEL para eliminar uma entrada específica por ID.
    Use CLEAR para eliminar todas as entradas do histórico.
  not_registered:   "\x0304✗\x03 O nickname \x02%nickname%\x02 não está registado."
  unknown_operator: "(desconhecido)"

  add:
    syntax:     "HISTORY <nickname> ADD <mensagem>"
    short:      "Adicionar uma entrada manual ao histórico."
    help:        |
      Adiciona uma entrada manual ao histórico do nickname.

      Sintaxe: HISTORY <nickname> ADD <mensagem>
      Exemplo: HISTORY SomeNick ADD Utilizador reportado por spam
    success:    "\x0303✔\x03 Entrada de histórico adicionada para \x02%nickname%\x02."

  del:
    syntax:     "HISTORY <nickname> DEL <id>"
    short:      "Eliminar uma entrada de histórico por ID."
    help:        |
      Elimina uma entrada específica do histórico pelo seu ID.

      Sintaxe: HISTORY <nickname> DEL <id>
      Exemplo: HISTORY SomeNick DEL 42
    success:    "\x0303✔\x03 Entrada de histórico \x02%id%\x02 eliminada."
    not_found:  "\x0304✗\x03 Entrada de histórico \x02%id%\x02 não encontrada."
    invalid_id: "\x0304✗\x03 ID de entrada inválido: \x02%id%\x02."

  view:
    syntax:     "HISTORY <nickname> VIEW [PÁGINA|ALL]"
    short:      "Ver histórico de ações do nickname."
    help:        |
      Mostra o histórico de ações do nickname.

      Sintaxe: HISTORY <nickname> VIEW
              HISTORY <nickname> VIEW PÁGINA
              HISTORY <nickname> VIEW ALL

      Por padrão mostra 3 entradas de cada vez.
      Use VIEW 2 para ver a segunda página.
      Use VIEW ALL para ver o histórico completo.
    header:     "\x02Histórico de \x0307%nickname%\x03\x02 (a mostrar %start%-%end% de %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 por %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Nenhuma entrada de histórico encontrada para \x02%nickname%\x02."
    page_hint:   "Use \x0303HISTORY %nickname% VIEW %next_page%\x03 para mais entradas."

  clear:
    syntax:     "HISTORY <nickname> CLEAR"
    short:      "Eliminar todas as entradas de histórico de um nickname."
    help:        |
      Remove todas as entradas de histórico do nickname especificado.
      Esta ação não pode ser desfeita.

      Sintaxe: HISTORY <nickname> CLEAR
      Exemplo: HISTORY SomeNick CLEAR
    success:    "\x0303✔\x03 Eliminadas \x02%count%\x02 entradas de histórico de \x02%nickname%\x02."

