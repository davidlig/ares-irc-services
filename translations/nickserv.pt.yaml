# NickServ translations — Portuguese
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02        bold on/off
#   \x03NN      color (DECIMAL: 03=green, 04=red, 07=orange, 14=dark grey)
#   \x03        reset color
#   \x0F        reset all formatting
#
# NOTE: IRC colors use DECIMAL numbers (0-15), not hexadecimal.
#   \x0314 = dark grey (14 decimal)  ← CORRECT
#   \x030F = color 0 + letter "F"    ← WRONG (0F is hex, not decimal)

unknown_command: "\x0304✗\x03 Comando desconhecido \x02%command%\x02. Use \x0303/msg %bot% HELP\x03."

error:
  syntax:            "\x0304✗\x03 Sintaxe incorreta. Uso: \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Este comando é restrito a Operadores de IRC."
  not_identified:    "\x0304✗\x03 Não está identificado. Use \x0303/msg %bot% IDENTIFY <nickname> <password>\x03"
  permission_denied: "\x0304✗\x03 Permissão negada. Não tem acesso a este comando."
  mail_failed:       "\x0304✗\x03 O email não pôde ser enviado. Verifique o seu endereço ou tente novamente mais tarde."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <palavra-passe> <email>"
  short:            "Registe o seu nickname nos serviços."
  help:             "Inicia o registo do seu nickname atual. Um token de verificação\nserá enviado para o endereço de email fornecido. Conclua o registo\nexecutando \x0303/msg %bot% VERIFY <token>\x03. O token expira em 1 hora.\nSe não chegar, verifique a sua pasta de spam ou use \x0303RESEND\x03."
  pending:          "\x0307→\x03 Um token de verificação foi enviado para \x02%email%\x02.\n  Execute \x0303/msg %bot% VERIFY <token>\x03 para concluir o registo.\n  Não recebeu? Verifique o spam ou use \x0303/msg %bot% RESEND\x03\n  O token expira em \x021 hora\x02."
  already_registered: "\x0304✗\x03 O nickname \x02%nickname%\x02 já está registado."
  already_pending:  "\x0304✗\x03 O nickname \x02%nickname%\x02 já tem uma verificação pendente.\n  Use \x0303/msg %bot% VERIFY <token>\x03 ou \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 O nickname \x02%nickname%\x02 não pode ser registado nesta rede."
  pending_deletion: "\x0304✗\x03 O nickname \x02%nickname%\x02 está pendente de eliminação e não pode ser registado."
  invalid_email:    "\x0304✗\x03 O endereço de email fornecido não é válido."
  email_already_used: "\x0304✗\x03 O email \x02%email%\x02 já está em uso por outro nickname. Use um endereço diferente."
  throttled:          "\x0304✗\x03 Deve aguardar \x02%minutes%\x02 minuto(s) antes de tentar registar novamente."
  guest_prefix_forbidden: "\x0304✗\x03 Não pode registar um nick que começa com \x02%prefix%\x02."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "Confirme o seu endereço de email e ative o seu nickname."
  help:             "Conclui o registo verificando o token enviado para o seu email.\nO token é válido por 1 hora a partir do momento do registo."
  success:          "\x0303✔\x03 O nickname \x02%nickname%\x02 foi registado com sucesso e agora está identificado."
  invalid_token:    "\x0304✗\x03 O token é inválido ou expirou. Use \x0303/msg %bot% REGISTER\x03 para recomeçar."
  no_pending:       "\x0304✗\x03 Não tem nenhum registo pendente para verificar."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Reenviar o token de verificação para o seu email."
  help:             "Reenvia o token de verificação para o endereço de email fornecido durante\no registo. Só funciona se tiver um registo pendente."
  success:          "\x0307→\x03 Token de verificação reenviado para \x02%email%\x02."
  no_pending:       "\x0304✗\x03 Não tem nenhum registo pendente para reenviar um token."
  throttled:        "\x0304✗\x03 Deve aguardar \x02%minutes%\x02 minuto(s) antes de solicitar outro email de verificação."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <nickname> [token]"
  short:            "Recupere o seu nickname se perdeu a sua palavra-passe."
  help:             "Recupera o acesso a um nickname registado quando perdeu a palavra-passe.\n1) \x0303RECOVER <nickname>\x03 — um token é enviado para o email do nickname.\n2) \x0303RECOVER <nickname> <token>\x03 — insira o token do email para redefinir a sua palavra-passe.\nReceberá então uma palavra-passe temporária e o comando para a alterar."
  email_sent:       "\x0307→\x03 Um token de recuperação foi enviado para \x02%email_hint%\x02. Verifique a sua caixa de entrada (e a pasta de spam)."
  not_registered:   "\x0304✗\x03 O nickname \x02%nickname%\x02 não está registado."
  pending:          "\x0304✗\x03 O nickname \x02%nickname%\x02 está pendente de verificação de email."
  suspended:        "\x0304✗\x03 O nickname \x02%nickname%\x02 está suspenso. Motivo: %reason%"
  forbidden:        "\x0304✗\x03 O nickname \x02%nickname%\x02 não pode ser usado nesta rede."
  no_email:         "\x0304✗\x03 Não está definido nenhum email para o nickname \x02%nickname%\x02. A recuperação não está disponível."
  throttled:        "\x0304✗\x03 Deve aguardar \x02%minutes%\x02 minuto(s) antes de solicitar outro email de recuperação."
  invalid_token:    "\x0304✗\x03 O token é inválido ou expirou. Solicite um novo com \x0303RECOVER %nickname%\x03."
  success_identify: "\x0303✔\x03 Palavra-passe redefinida. Identifique-se agora: \x0303%identify_cmd%\x03"
  success_then_change: "Depois altere a sua palavra-passe: \x0303/msg %bot% SET PASSWORD <nova_palavra-passe>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <nickname> <palavra-passe>"
  short:            "Identifique-se como proprietário de um nickname."
  help:             "Autentica a sua sessão com %nickserv% usando o seu nickname e palavra-passe.\nApós uma identificação bem-sucedida receberá o modo registado \x02+r\x02\ne, se estava a usar um nick de convidado, o seu nick registado será restaurado."
  success:          "\x0303✔\x03 Está agora identificado como \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 Já está identificado como \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 O nickname \x02%nickname%\x02 não está registado."
  invalid_credentials: "\x0304✗\x03 Palavra-passe incorreta. Tente novamente."
  locked_out:         "\x0304✗\x03 Demasiadas tentativas falhadas. Tente novamente dentro de \x02%minutes%\x02 minuto(s)."
  ghost_released:   "\x0307⚡\x03 A sessão fantasma que ocupava \x02%nickname%\x02 foi desligada."
  kill_reason:      "Nick %nickname% recuperado por %source% (o proprietário registado identificou-se)"
  pending:          "\x0304✗\x03 O nickname \x02%nickname%\x02 está pendente de verificação de email.\n  Execute \x0303/msg %bot% VERIFY <token>\x03 ou \x0303/msg %bot% RESEND\x03."
  suspended:        "\x0304✗\x03 O nickname \x02%nickname%\x02 está suspenso. Motivo: %reason%"
  forbidden:        "\x0304✗\x03 O nickname \x02%nickname%\x02 não pode ser usado nesta rede."
  pending_deletion: "\x0304✗\x03 O nickname \x02%nickname%\x02 está pendente de eliminação e não pode ser usado."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <nickname>"
  short:            "Mostrar o estado de registo de um nickname."
  help:             "Mostra o estado atual de um nickname: registado, pendente de verificação,\nsuspenso ou proibido."
  header:           "\x02Estado do nick \x0307%nickname%\x03:\x02"
  unregistered:     "  Estado          : Não registado"
  not_registered_offline: "  Estado          : \x0315Não registado\x03"
  pending:          "  Estado          : \x0307Pendente de verificação\x03"
  pending_expires:  "  Expira em       : %minutes% minuto(s)"
  pending_expires_at: "  Expira em       : %date%"
  not_connected:    "  Estado          : \x0315Não ligado\x03"
  not_identified:   "  Estado          : \x0307Não identificado\x03"
  identified:       "  Estado          : \x0303Identificado\x03"
  suspended:        "  Estado          : \x0304Suspenso\x03"
  suspended_reason: "  Motivo          : %reason%"
  suspended_until:  "  Termina em      : %date%"
  suspended_permanent: "  Termina em      : Permanente"
  forbidden:        "  Estado          : \x0304Proibido\x03"
  forbidden_reason: "  Motivo          : %reason%"
  pending_deletion:   "  \x0314Estado\x03          : \x0307Pendente de eliminação\x03"
  pending_deletion_at: "  \x0314Eliminado\x03       : %date%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <nickname>"
  short:            "Mostrar informações sobre um nickname registado."
  help:             "Mostra detalhes de registo de um nickname: data de registo, estado\nde ligação, última mensagem de saída e endereço de email. O email só é visível para\no proprietário quando identificado. Com PRIVATE ON apenas o proprietário e Operadores de IRC\npodem ver as informações."
  not_registered:   "\x0304✗\x03 O nickname \x02%nickname%\x02 não está registado."
  private:          "\x0304✗\x03 As informações do nickname \x02%nickname%\x02 são privadas."
  header:           "\x02Informações do nickname \x0307%nickname%\x03:\x02"
  status:           "  \x0314Estado\x03            : %status%"
  status_registered:  "\x0303Registado\x03"
  status_suspended:   "\x0304Suspenso\x03"
  status_forbidden:   "\x0304Proibido\x03"
  status_pending_deletion: "\x0307Pendente de eliminação\x03"
  status_pending_deletion_at:  "  \x0314Eliminado\x03          : %date%"
  reason:           "  \x0314Motivo\x03                 : %reason%"
  suspended_until:  "  \x0314Termina em\x03        : %date%"
  suspended_permanent: "  \x0314Termina em\x03        : Permanente"
  registered_at:    "  \x0314Registado\x03         : %date%"
  last_seen_online: "  \x0314Última vez\x03        : \x0303● ONLINE AGORA\x03"
  last_seen_at:     "  \x0314Última vez\x03        : %date%"
  last_seen_never:  "  \x0314Última vez\x03        : Nunca"
  last_quit:        "  \x0314Última msg saída\x03  : %message%"
  last_connect:     "  \x0314Última vez de\x03     : %ip% (%host%)"
  language:         "  \x0314Idioma\x03            : %language%"
  email:            "  \x0314Email\x03             : %email%"
  vhost:            "  \x0314VHost\x03             : %vhost%"
  no_expire:        "  \x0314Nunca expira\x03           : Sim"
  pending_deletion_at: "  \x0314Eliminado\x03              : %date%"
  pending_deletion_until: "  \x0314Elim. definitiva\x03       : %date%"
  pending_deletion_notice: "  \x0307Este nickname está pendente de eliminação e não pode ser registado.\x03"
  footer:           "\x0314─────────────────────────────\x03"
  channels_header:  "\x0314\x0ACanais com acesso:\x03"
  channels_entry_founder:   "  %channel% (\x0303Fundador\x03)"
  channels_entry_successor: "  %channel% (\x0303Sucessor\x03)"
  channels_entry_access:    "  %channel% (%level%)"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <opção> <valor>"
  short:            "Alterar as configurações do seu nickname %nickserv%."
  help:             "Modifica as configurações do seu nickname %nickserv%.\nDeve estar identificado para usar este comando."
  unknown_option:   "\x0304✗\x03 Opção desconhecida \x02%option%\x02. Opções disponíveis: %options%."

  password:
    syntax:         "SET PASSWORD <nova_palavra-passe>"
    short:          "Alterar a sua palavra-passe do nickname."
    help:           "Altera a palavra-passe do seu nickname NickServ. A nova palavra-passe tem\nefeito imediato. Escolha uma palavra-passe forte de pelo menos 6 caracteres\nque não use noutros serviços."
    success:        "\x0303✔\x03 A sua palavra-passe foi atualizada com sucesso."

  email:
    syntax:         "SET EMAIL <novo_email> [token]"
    short:          "Alterar o endereço de email associado ao seu nickname (confirmação em dois passos)."
    help:           "Alteração de email em dois passos por segurança.\n1) \x0303SET EMAIL <novo_email>\x03 — um token é enviado para o seu email atual.\n2) \x0303SET EMAIL <novo_email> <token>\x03 — confirme com o token recebido.\nO token expira em 1 hora."
    success:        "\x0303✔\x03 O seu email foi atualizado para \x02%email%\x02."
    pending_sent:   "\x0307→\x03 Um token de confirmação foi enviado para \x02%current_email%\x02.\n  Para confirmar a alteração para \x02%new_email%\x02 execute:\n  \x0303/msg %bot% SET EMAIL %new_email% <token>\x03\n  O token expira em 1 hora."
    invalid_token:  "\x0304✗\x03 O token é inválido ou expirou. Solicite um novo com \x0303SET EMAIL <novo_email>\x03."

  language:
    syntax:         "SET LANGUAGE <código>"
    short:          "Alterar o idioma que os serviços usam para comunicar consigo."
    help:           "Altera o idioma que %nickserv% e outros serviços usam quando falam consigo.\nIdiomas disponíveis:\n  \x02ca\x02 (Catalão)\n  \x02de\x02 (Alemão)\n  \x02el\x02 (Grego)\n  \x02en\x02 (Inglês)\n  \x02es\x02 (Espanhol)\n  \x02eu\x02 (Basco)\n  \x02fr\x02 (Francês)\n  \x02gl\x02 (Galego)\n  \x02it\x02 (Italiano)\n  \x02nl\x02 (Holandês)\n  \x02pl\x02 (Polaco)\n  \x02pt\x02 (Português)\n  \x02ro\x02 (Romeno)\n  \x02tr\x02 (Turco)"
    success:        "\x0303✔\x03 Idioma alterado para \x02%language%\x02."
    invalid:        "\x0304✗\x03 Idioma não suportado. Idiomas disponíveis: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <fuso_horário>"
    short:          "Definir o fuso horário usado ao mostrar datas."
    help:           "Define o fuso horário usado quando %nickserv% mostra datas.\nUse \x02HELP SET TIMEZONE\x02 para o índice de regiões; \x02HELP SET TIMEZONE <região>\x02 (ex: Europe) para os fusos dessa região. Use \x02OFF\x02 para limpar."
    success:        "\x0303✔\x03 Fuso horário definido como \x02%timezone%\x02. As datas serão mostradas neste fuso."
    cleared:        "\x0303✔\x03 Fuso horário removido. As datas usarão o padrão da rede."
    invalid:        "\x0304✗\x03 Fuso horário inválido \x02%timezone%\x02. Use um identificador válido (ex: UTC, Europe/Lisbon)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Ativar ou desativar a privacidade das informações do seu nickname."
    help:           "Controla a visibilidade das informações do seu nickname no comando INFO.\nCom \x02PRIVATE ON\x02 apenas você e Operadores de IRC podem ver os seus detalhes.\nCom \x02PRIVATE OFF\x02 as suas informações são públicas para todos."
    on:             "\x0303✔\x03 As informações do seu nickname são agora \x02privadas\x02."
    off:            "\x0303✔\x03 As informações do seu nickname são agora \x02públicas\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Usar PRIVMSG (ON) ou NOTICE (OFF) para as respostas dos serviços."
    help:           "Controla como %nickserv% e outros serviços lhe enviam mensagens.\nCom \x02MSG ON\x02 as respostas são enviadas como \x02PRIVMSG\x02 (alguns clientes podem disparar respostas ou notificações).\nCom \x02MSG OFF\x02 as respostas são enviadas como \x02NOTICE\x02 (padrão; normalmente sem resposta automática)."
    on:             "\x0303✔\x03 As mensagens dos serviços serão agora enviadas como \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 As mensagens dos serviços serão agora enviadas como \x02NOTICE\x02."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Definir ou remover o seu host virtual personalizado (hostname exibido)."
    help:           "Define um hostname personalizado que outros veem quando está identificado.\nUse \x02SET VHOST OFF\x02 para o limpar. Apenas letras (a-z, A-Z), dígitos, hífen e ponto;\nnenhum hífen ou ponto no início/fim de qualquer bloco; máx. 48 caracteres. Único por nickname."
    success:        "\x0303✔\x03 O seu host virtual foi definido como \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 O seu host virtual foi removido."
    invalid:        "\x0304✗\x03 Vhost inválido. Apenas letras, dígitos, hífen e ponto (não no início/fim de bloco); máx. 48 caracteres."
    taken:          "\x0304✗\x03 Esse vhost já está em uso por outro nickname."
    forced:         "\x0304✗\x03 O seu vhost é configurado automaticamente e não pode ser alterado com SET VHOST."

# --- SASET (IRCop) --------------------------------------------------------------
saset:
  syntax:           "SASET <nickname> <opção> <valor>"
  short:            "Modificar as configurações de outro nickname."
  help:             |
    Permite a um Operador de IRC modificar as configurações de um nickname registado.
    O nickname alvo não pode ser um utilizador root, um Operador de IRC nem um serviço.

    Opções disponíveis: PASSWORD, EMAIL, LANGUAGE, TIMEZONE, PRIVATE, MSG, VHOST

    SASET PASSWORD: Altera a palavra-passe diretamente (sem confirmação por email).
    SASET EMAIL: Altera o email diretamente (sem validação de token).

    Este comando requer permissão IRCop: nickserv.saset

    Sintaxe: SASET <nickname> <opção> <valor>
    Exemplo: SASET Utilizador PASSWORD novapasse
  unknown_option:   "\x0304✗\x03 Opção desconhecida \x02%option%\x02. Opções disponíveis: %options%."
  not_registered:   "\x0304✗\x03 O nickname \x02%nickname%\x02 não está registado."
  cannot_modify_oper: "\x0304✗\x03 Não é possível modificar um nickname de Operador de IRC."

  password:
    syntax:         "SASET <nickname> PASSWORD <nova_palavra-passe>"
    short:          "Alterar a palavra-passe de um nickname."
    help:           "Altera a palavra-passe de outro nickname.\nA alteração é imediata.\n\nSintaxe: SASET <nickname> PASSWORD <nova_palavra-passe>\nExemplo: SASET Utilizador PASSWORD novapasse123"
    success:        "\x0303✔\x03 A palavra-passe de \x02%nickname%\x02 foi atualizada."

  email:
    syntax:         "SASET <nickname> EMAIL <novo_email>"
    short:          "Alterar o email de um nickname."
    help:           "Altera o email de outro nickname.\nNenhuma confirmação é enviada—a alteração é imediata.\n\nSintaxe: SASET <nickname> EMAIL <novo_email>\nExemplo: SASET Utilizador EMAIL utilizador@exemplo.com"
    success:        "\x0303✔\x03 O email de \x02%nickname%\x02 foi atualizado para \x02%email%\x02."

  language:
    syntax:         "SASET <nickname> LANGUAGE <código>"
    short:          "Alterar o idioma de um nickname."
    help:           "Altera o idioma de outro nickname.\nIdiomas disponíveis: en (inglês), es (espanhol).\n\nSintaxe: SASET <nickname> LANGUAGE <código>\nExemplo: SASET Utilizador LANGUAGE pt"
    success:        "\x0303✔\x03 O idioma de \x02%nickname%\x02 foi alterado para \x02%language%\x02."

  timezone:
    syntax:         "SASET <nickname> TIMEZONE <fuso_horário|OFF>"
    short:          "Alterar o fuso horário de um nickname."
    help:           "Define ou remove o fuso horário de outro nickname.\nUse OFF para remover.\n\nSintaxe: SASET <nickname> TIMEZONE <fuso_horário>\nExemplo: SASET Utilizador TIMEZONE Europe/Lisboa"
    success:        "\x0303✔\x03 O fuso horário de \x02%nickname%\x02 foi definido como \x02%timezone%\x02."
    cleared:        "\x0303✔\x03 O fuso horário de \x02%nickname%\x02 foi removido."
    invalid:        "\x0304✗\x03 Fuso horário inválido \x02%timezone%\x02."

  private:
    syntax:         "SASET <nickname> PRIVATE {ON|OFF}"
    short:          "Alterar a privacidade de um nickname."
    help:           "Ativa ou desativa a privacidade das informações de outro nickname.\n\nSintaxe: SASET <nickname> PRIVATE {ON|OFF}\nExemplo: SASET Utilizador PRIVATE ON"
    on:             "\x0303✔\x03 As informações de \x02%nickname%\x02 são agora \x02privadas\x02."
    off:            "\x0303✔\x03 As informações de \x02%nickname%\x02 são agora \x02públicas\x02."

  msg:
    syntax:         "SASET <nickname> MSG {ON|OFF}"
    short:          "Alterar a preferência de mensagens de um nickname."
    help:           "Define se outro nickname recebe respostas como PRIVMSG (ON) ou NOTICE (OFF).\n\nSintaxe: SASET <nickname> MSG {ON|OFF}\nExemplo: SASET Utilizador MSG ON"
    on:             "\x0303✔\x03 \x02%nickname%\x02 receberá agora mensagens como \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 \x02%nickname%\x02 receberá agora mensagens como \x02NOTICE\x02."

  vhost:
    syntax:         "SASET <nickname> VHOST <vhost|OFF>"
    short:          "Alterar o host virtual de um nickname."
    help:           "Define ou remove o host virtual de outro nickname.\nUse OFF para remover.\n\nSintaxe: SASET <nickname> VHOST <vhost>\nExemplo: SASET Utilizador VHOST utilizadores.exemplo.com"
    success:        "\x0303✔\x03 O VHost de \x02%nickname%\x02 foi definido como \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 O VHost de \x02%nickname%\x02 foi removido."
    invalid:        "\x0304✗\x03 VHost inválido para \x02%nickname%\x02."
    taken:          "\x0304✗\x03 Esse vhost já está em uso por outro nickname."

# --- HELP -------------------------------------------------------------------
help:
  syntax:           "HELP [comando]"
  short:            "Mostrar ajuda para os comandos %nickserv%."
  help:             "Mostra ajuda geral de %nickserv% ou informações detalhadas\npara um comando específico."
  header_title:     "%bot%"
  intro:            "Serviço de registo e proteção de nicknames para a rede IRC."
  intro_expiration: "NOTA: Nicknames \x0304\x1Fnão utilizados\x0F há mais de %days% dias são removidos automaticamente."
  general_header:   "\x02\x0314Comandos disponíveis:\x03\x0F"
  command_line:     "  \x0307%command%\x03%description%"
  subcommand_line:  "  \x0307%command%\x03%description%"
