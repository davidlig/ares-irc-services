# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <nickname> {ON|OFF}"
  short:            "Definir ou remover proteção de expiração para um nickname."
  help:             |
    Controla se um nickname irá expirar devido a inatividade.
    Quando ON, o nickname nunca expira independentemente da última atividade.
    Quando OFF, aplicam-se as regras normais de expiração.

    Apenas IRCops com permissão 'nickserv.noexpire' podem usar este comando.

    Sintaxe: NOEXPIRE <nickname> {ON|OFF}
    Exemplos:
      NOEXPIRE ImportantUser ON
      NOEXPIRE ImportantUser OFF
  success_on:       "\x0303✔\x03 O nickname \x02%nickname%\x02 está agora protegido contra expiração."
  success_off:      "\x0303✔\x03 O nickname \x02%nickname%\x02 irá agora expirar normalmente."
  not_registered:   "\x0304✗\x03 O nickname \x02%nickname%\x02 não está registado."
  forbidden:         "\x0304✗\x03 O nickname \x02%nickname%\x02 está proibido."
  suspended:         "\x0304✗\x03 O nickname \x02%nickname%\x02 está suspenso."

