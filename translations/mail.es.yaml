# Contenido de correos — dominio: mail (texto plano, sin códigos IRC)
# Placeholders: %nickname%, %token%, %new_email%

# REGISTER / VERIFY — token de verificación
register_verification_subject: "%bot%: verifica el registro de tu nickname"
register_verification_body: |
  Hola,

  Solicitaste registrar el nickname "%nickname%" en la red IRC.

  Tu token de verificación es: %token%

  Para completar el registro, envía este comando a %bot% (sustituye <token> por el token anterior):
    /msg %bot% VERIFY %token%

  El token expira en 1 hora. Si no solicitaste esto, ignora este correo.

# RESEND — reenvío del token
resend_verification_subject: "%bot%: tu token de verificación (reenvío)"
resend_verification_body: |
  Hola,

  Solicitaste un nuevo token de verificación para el nickname "%nickname%".

  Tu token de verificación es: %token%

  Para completar el registro, envía a %bot%:
    /msg %bot% VERIFY %token%

  El token expira en 1 hora. Si no solicitaste esto, ignora este correo.

# SET EMAIL — token de confirmación al email actual
email_change_token_subject: "%bot%: confirma tu nueva dirección de correo"
email_change_token_body: |
  Hola,

  Solicitaste cambiar la dirección de correo de tu cuenta %bot% a: %new_email%

  Tu token de confirmación es: %token%

  Para confirmar el cambio, envía a %bot%:
    /msg %bot% SET EMAIL %new_email% %token%

  El token expira en 1 hora. Si no solicitaste este cambio, ignora este correo.

# RECOVER — token de recuperación de contraseña
recovery_token_subject: "%bot%: recuperación de contraseña"
recovery_token_body: |
  Hola,

  Se solicitó una recuperación de contraseña para el nickname "%nickname%".

  Tu token de recuperación es: %token%

  Para restablecer tu contraseña, envía a %bot%:
    /msg %bot% RECOVER %nickname% %token%

  El token expira en 1 hora. Si no solicitaste esto, ignora este correo.

# ChanServ SET FOUNDER — token de cambio de fundador
founder_change_token_subject: "%bot%: token de cambio de fundador para %channel%"
founder_change_token_body: |
  Hola,

  Se solicitó un cambio de fundador del canal "%channel%" al nickname "%new_nick%".

  Tu token de confirmación es: %token%

  Para completar el cambio, envía a %bot% este comando (puedes copiarlo y pegarlo):

    /msg %bot% %command%

  El token expira en 1 hora. Si no solicitaste esto, ignora este correo.
