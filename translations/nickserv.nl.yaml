# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <bijnaam> <duur> <reden>"
  short:            "Schors een bijnaam."
  help:             |
    Schorst een bijnaam, waardoor de eigenaar zich niet kan identificeren.
    De schorsing kan tijdelijk of permanent zijn.

    Duurformaten: \x0303%d\x03 (dagen), \x0303%h\x03 (uren), \x0303%m\x03 (minuten), of \x03030\x03 (permanent).

    Geschorste gebruikers kunnen zich niet identificeren met hun bijnaam.
    IRC-operators en rootgebruikers kunnen niet worden geschorst.

    Syntax: SUSPEND <bijnaam> <duur> <reden>
    Voorbeelden:
      SUSPEND SlechteGebr 7d Spammen in #hulp
      SUSPEND Misbruiker 30d Herhaalde flood
      SUSPEND ProbleemGebr 0 Permaban ontduiking
  success:            "\x0303✔\x03 Bijnaam \x02%nickname%\x02 is geschorst tot \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is al geschorst."
  not_registered:     "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet geregistreerd."
  forbidden:          "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is verboden en kan niet worden geschorst."
  cannot_suspend_oper: "\x0304✗\x03 Kan IRC-operator \x02%nickname%\x02 niet schorsen."
  cannot_suspend_root: "\x0304✗\x03 Kan rootgebruiker \x02%nickname%\x02 niet schorsen."
  cannot_suspend_service: "\x0304✗\x03 Kan service-bijnaam \x02%nickname%\x02 niet schorsen."
  invalid_duration:   "\x0304✗\x03 Ongeldige duur. Gebruik: \x0303<d><h><m>\x03 (bijv. 7d, 12h, 30m) of \x03030\x03 voor permanent."
  permanent:          "permanent"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <bijnaam>"
  short:            "Hef schorsing van een bijnaam op."
  help:             |
    Heft een actieve schorsing van een bijnaam op, zodat de eigenaar zich weer kan identificeren.

    Syntax: UNSUSPEND <bijnaam>
    Voorbeeld: UNSUSPEND EenGebruiker
  success:          "\x0303✔\x03 De schorsing van \x02%nickname%\x02 is opgeheven."
  not_registered:   "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet geregistreerd."
  not_suspended:    "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet geschorst."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <bijnaam>"
  short:            "Forceer hernoeming van een verbonden bijnaam naar een willekeurige bijnaam."
  help:             |
    Dwingt een verbonden bijnaam om zijn/haar nick te wijzigen naar een willekeurig gegenereerde.
    Handig voor het afdwingen van netwerkbeleid zonder de gebruiker te verbreken.

    Het nieuwe bijnaamformaat gebruikt het geconfigureerde gastprefix (%prefix%).

    Dit commando vereist IRCop-toestemming: nickserv.rename

    Syntax: RENAME <bijnaam>
    Voorbeeld: RENAME Lastpost
  not_online:        "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet verbonden."
  cannot_rename_root: "\x0304✗\x03 Kan rootgebruiker \x02%nickname%\x02 niet hernoemen."
  cannot_rename_oper: "\x0304✗\x03 Kan IRC-operator \x02%nickname%\x02 niet hernoemen."
  cannot_rename_service: "\x0304✗\x03 Kan service-bijnaam \x02%nickname%\x02 niet hernoemen."
  success:           "\x0303✓\x03 Bijnaam \x02%nickname%\x02 is hernoemd naar \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <bijnaam> [FORCE]"
  short:            "Laat een geregistreerde bijnaam vallen."
  help:             |
    Verwijdert een geregistreerde bijnaam uit de database.
    Deze actie kan niet ongedaan worden gemaakt.

    Als de gebruiker online is, wordt hij/zij hernoemd naar een Gast-bijnaam.
    Rootgebruikers en IRC-operators kunnen niet worden verwijderd.
    U kunt uw eigen bijnaam niet verwijderen.

    Dit commando vereist IRCop-toestemming: nickserv.drop

    Syntax: DROP <bijnaam>
    Voorbeeld: DROP OudAccount
  not_registered:     "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet geregistreerd."
  suspended:         "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is geschorst. Hef eerst de schorsing op."
  forbidden:         "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is verboden."
  cannot_drop_root:   "\x0304✗\x03 Kan rootgebruiker \x02%nickname%\x02 niet verwijderen."
  cannot_drop_oper:   "\x0304✗\x03 Kan IRC-operator \x02%nickname%\x02 niet verwijderen."
  cannot_drop_self:    "\x0304✗\x03 U kunt uw eigen bijnaam niet verwijderen."
  success:            "\x0303✓\x03 Bijnaam \x02%nickname%\x02 is gemarkeerd voor verwijdering en kan tijdens de respijtperiode worden hersteld."
  force_success:      "\x0303✓\x03 Bijnaam \x02%nickname%\x02 is definitief verwijderd."
  pending_deletion:   "\x0304✗\x03 Bijnaam \x02%nickname%\x02 staat al op het punt verwijderd te worden. Gebruik DROP <bijnaam> FORCE om hem definitief te verwijderen."
  cannot_drop_service: "\x0304✗\x03 Kan service-bijnaam \x02%nickname%\x02 niet verwijderen."

# --- RESTORE (IRCop) -----------------------------------------------------------
restore:
  syntax:           "RESTORE <bijnaam>"
  short:            "Een bijnaam die op verwijdering wacht herstellen."
  help:             "Herstelt een bijnaam die handmatig is verwijderd en zich nog in de respijtperiode bevindt. Vereist IRCop-toestemming: nickserv.restore."
  success:          "\x0303✓\x03 Bijnaam \x02%nickname%\x02 is hersteld."
  not_registered:   "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet geregistreerd."
  not_pending_deletion: "\x0304✗\x03 Bijnaam \x02%nickname%\x02 staat niet op het punt verwijderd te worden."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <bijnaam> <reden>"
  short:            "Blokkeer permanent het gebruik van een bijnaam."
  help:             |
    Verbiedt het gebruik van een bijnaam op het netwerk.
    De bijnaam kan door niemand worden geregistreerd of gebruikt.

    Als de bijnaam momenteel geregistreerd is, wordt deze eerst verwijderd.
    Als iemand hem gebruikt, wordt hij/zij gedwongen te wijzigen naar een Gast-bijnaam.

    Rootgebruikers, IRC-operators en service-bijnamen kunnen niet worden verboden.

    Dit commando vereist IRCop-toestemming: nickserv.forbid

    Syntax: FORBID <bijnaam> <reden>
    Voorbeeld: FORBID SlechteNick Herhaalde beleidsovertredingen
  success:            "\x0303✔\x03 Bijnaam \x02%nickname%\x02 is verboden."
  updated:            "\x0303✔\x03 Verbodsreden voor \x02%nickname%\x02 is bijgewerkt."
  reason_required:    "\x0304✗\x03 U moet een reden opgeven voor het verbod."
  cannot_forbid_root:  "\x0304✗\x03 Kan rootgebruiker \x02%nickname%\x02 niet verbieden."
  cannot_forbid_oper:  "\x0304✗\x03 Kan IRC-operator \x02%nickname%\x02 niet verbieden."
  cannot_forbid_service: "\x0304✗\x03 Kan service-bijnaam \x02%nickname%\x02 niet verbieden."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <bijnaam>"
  short:            "Hef een bijnaamverbod op."
  help:             |
    Heft een bijnaamverbod op, zodat de bijnaam weer kan worden gebruikt.

    Dit commando vereist IRCop-toestemming: nickserv.forbid

    Syntax: UNFORBID <bijnaam>
    Voorbeeld: UNFORBID EenNick
  success:          "\x0303✔\x03 Bijnaam \x02%nickname%\x02 is niet langer verboden."
  not_forbidden:    "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet verboden."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST {ADD|DEL|LIST} [patroon]"
  short:            "Beheer verboden vhost-patronen."
  help:             |
    Beheert patronen die voorkomen dat gebruikers overeenkomende vhosts
    instellen via NickServ SET VHOST.

    Wildcards: * komt overeen met elke reeks, ? komt overeen met één teken.
    Voorbeeld: *.pirated.com blokkeert elke vhost die eindigt op .pirated.com

    Dit commando vereist IRCop-toestemming: nickserv.forbidvhost

    Subcommando's:
      ADD <patroon>    Voeg een verboden patroon toe
      DEL <patroon>    Verwijder een verboden patroon
      LIST             Toon alle verboden patronen

  unknown_sub: "\x0304✗\x03 Onbekende subopdracht \x02%sub%\x02. Gebruik ADD, DEL of LIST."

  add:
    syntax:      "FORBIDVHOST ADD <patroon>"
    short:       "Voeg een verboden vhost-patroon toe."
    help:        |
      Voegt een patroon toe aan de lijst met verboden vhosts. Gebruikers kunnen
      geen vhosts instellen die overeenkomen met dit patroon via SET VHOST.

      Wildcards: * komt overeen met elke reeks, ? komt overeen met één teken.

      Syntax: FORBIDVHOST ADD <patroon>
      Voorbeeld: FORBIDVHOST ADD *.pirated.com
    done:            "\x0303✓\x03 Verboden vhost-patroon toegevoegd: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 Patroon \x02%pattern%\x02 bestaat al."
    invalid:          "\x0304✗\x03 Ongeldig vhost-patroonformaat."

  del:
    syntax:      "FORBIDVHOST DEL <patroon>"
    short:       "Verwijder een verboden vhost-patroon."
    help:        |
      Verwijdert een patroon uit de lijst met verboden vhosts.

      Syntax: FORBIDVHOST DEL <patroon>
      Voorbeeld: FORBIDVHOST DEL *.pirated.com
    done:        "\x0303✓\x03 Verboden vhost-patroon verwijderd: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 Patroon \x02%pattern%\x02 niet gevonden."

  list:
    short:       "Toon alle verboden vhost-patronen."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Toont alle verboden vhost-patronen.

      Syntax: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Verboden vhost-patronen (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — door %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 Geen verboden vhost-patronen."
    unknown_creator: "onbekend"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <bijnaam> {ADD|DEL|VIEW|CLEAR}"
  short:            "Bekijk of beheer bijnaamactiegeschiedenis."
  help:             |
    Beheer de actiegeschiedenis voor een bijnaam.
    Alleen IRCops met 'nickserv.history'-toestemming kunnen dit commando gebruiken.

    Acties die automatisch worden vastgelegd:
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Syntax: HISTORY <bijnaam> ADD <bericht>
            HISTORY <bijnaam> DEL <id>
            HISTORY <bijnaam> VIEW [PAGINA|ALL]
            HISTORY <bijnaam> CLEAR

    Voorbeelden:
      HISTORY EenNick VIEW
      HISTORY EenNick ADD Handmatige opmerking over deze gebruiker
      HISTORY EenNick VIEW 2
      HISTORY EenNick VIEW ALL
      HISTORY EenNick DEL 123
      HISTORY EenNick CLEAR

    Gebruik VIEW om de geschiedenis te bekijken (toont standaard 3 vermeldingen).
    Gebruik VIEW PAGINA 2 om de volgende pagina te zien.
    Gebruik VIEW ALL om de volledige geschiedenis te zien.
    Gebruik ADD om een handmatige vermelding toe te voegen.
    Gebruik DEL om een specifieke vermelding op ID te verwijderen.
    Gebruik CLEAR om alle geschiedenisvermeldingen te verwijderen.
  not_registered:   "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet geregistreerd."
  unknown_operator: "(onbekend)"

  add:
    syntax:     "HISTORY <bijnaam> ADD <bericht>"
    short:      "Voeg een handmatige geschiedenisvermelding toe."
    help:        |
      Voegt een handmatige vermelding toe aan de geschiedenis van de bijnaam.

      Syntax: HISTORY <bijnaam> ADD <bericht>
      Voorbeeld: HISTORY EenNick ADD Gebruiker gerapporteerd voor spam
    success:    "\x0303✔\x03 Geschiedenisvermelding toegevoegd voor \x02%nickname%\x02."

  del:
    syntax:     "HISTORY <bijnaam> DEL <id>"
    short:      "Verwijder een geschiedenisvermelding op ID."
    help:        |
      Verwijdert een specifieke geschiedenisvermelding op zijn ID.

      Syntax: HISTORY <bijnaam> DEL <id>
      Voorbeeld: HISTORY EenNick DEL 42
    success:    "\x0303✔\x03 Geschiedenisvermelding \x02%id%\x02 verwijderd."
    not_found:  "\x0304✗\x03 Geschiedenisvermelding \x02%id%\x02 niet gevonden."
    invalid_id: "\x0304✗\x03 Ongeldige vermeldings-ID: \x02%id%\x02."

  view:
    syntax:     "HISTORY <bijnaam> VIEW [PAGINA|ALL]"
    short:      "Bekijk bijnaamactiegeschiedenis."
    help:        |
      Toont de actiegeschiedenis van de bijnaam.

      Syntax: HISTORY <bijnaam> VIEW
              HISTORY <bijnaam> VIEW PAGINA
              HISTORY <bijnaam> VIEW ALL

      Standaard worden er 3 vermeldingen tegelijk getoond.
      Gebruik VIEW 2 om de tweede pagina te zien.
      Gebruik VIEW ALL om de volledige geschiedenis te zien.
    header:     "\x02Geschiedenis voor \x0307%nickname%\x03\x02 (toont %start%-%end% van %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 door %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Geen geschiedenisvermeldingen gevonden voor \x02%nickname%\x02."
    page_hint:   "Gebruik \x0303HISTORY %nickname% VIEW %next_page%\x03 voor meer vermeldingen."

  clear:
    syntax:     "HISTORY <bijnaam> CLEAR"
    short:      "Verwijder alle geschiedenisvermeldingen voor een bijnaam."
    help:        |
      Verwijdert alle geschiedenisvermeldingen voor de opgegeven bijnaam.
      Deze actie kan niet ongedaan worden gemaakt.

      Syntax: HISTORY <bijnaam> CLEAR
      Voorbeeld: HISTORY EenNick CLEAR
    success:    "\x0303✔\x03 \x02%count%\x02 geschiedenisvermeldingen gewist voor \x02%nickname%\x02."

