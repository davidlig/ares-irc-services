# NickServ translations — Dutch
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02        bold on/off
#   \x03NN      color (DECIMAL: 03=green, 04=red, 07=orange, 14=dark grey)
#   \x03        reset color
#   \x0F        reset all formatting
#
# NOTE: IRC colors use DECIMAL numbers (0-15), not hexadecimal.
#   \x0314 = dark grey (14 decimal)  ← CORRECT
#   \x030F = color 0 + letter "F"    ← WRONG (0F is hex, not decimal)

unknown_command: "\x0304✗\x03 Onbekend commando \x02%command%\x02. Gebruik \x0303/msg %bot% HELP\x03."

error:
  syntax:            "\x0304✗\x03 Onjuiste syntax. Gebruik: \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Dit commando is voorbehouden aan IRC Operators."
  not_identified:    "\x0304✗\x03 U bent niet geïdentificeerd. Gebruik \x0303/msg %bot% IDENTIFY <bijnaam> <wachtwoord>\x03"
  permission_denied: "\x0304✗\x03 Toegang geweigerd. U heeft geen toegang tot dit commando."
  mail_failed:       "\x0304✗\x03 De e-mail kon niet worden verzonden. Controleer uw adres of probeer het later opnieuw."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <wachtwoord> <e-mail>"
  short:            "Registreer uw bijnaam bij de services."
  help:             "Start de registratie van uw huidige bijnaam. Er wordt een verificatietoken\nnaar het opgegeven e-mailadres gestuurd. Voltooi de registratie\ndoor \x0303/msg %bot% VERIFY <token>\x03 uit te voeren. De token verloopt binnen 1 uur.\nAls deze niet aankomt, controleer uw spammap of gebruik \x0303RESEND\x03."
  pending:          "\x0307→\x03 Er is een verificatietoken verzonden naar \x02%email%\x02.\n  Voer \x0303/msg %bot% VERIFY <token>\x03 uit om de registratie te voltooien.\n  Niet ontvangen? Controleer spam of gebruik \x0303/msg %bot% RESEND\x03\n  De token verloopt over \x021 uur\x02."
  already_registered: "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is al geregistreerd."
  already_pending:  "\x0304✗\x03 Bijnaam \x02%nickname%\x02 heeft al een lopende verificatie.\n  Gebruik \x0303/msg %bot% VERIFY <token>\x03 of \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 Bijnaam \x02%nickname%\x02 kan niet worden geregistreerd op dit netwerk."
  pending_deletion: "\x0304✗\x03 Bijnaam \x02%nickname%\x02 staat op het punt verwijderd te worden en kan niet worden geregistreerd."
  invalid_email:    "\x0304✗\x03 Het opgegeven e-mailadres is niet geldig."
  email_already_used: "\x0304✗\x03 De e-mail \x02%email%\x02 is al in gebruik door een andere bijnaam. Gebruik een ander adres."
  throttled:          "\x0304✗\x03 U moet \x02%minutes%\x02 minu(u)t(en) wachten voordat u opnieuw probeert te registreren."
  guest_prefix_forbidden: "\x0304✗\x03 U kunt geen bijnaam registreren die begint met \x02%prefix%\x02."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "Bevestig uw e-mailadres en activeer uw bijnaam."
  help:             "Voltooit de registratie door de token te verifiëren die naar uw e-mail is verzonden.\nDe token is 1 uur geldig vanaf het moment van registratie."
  success:          "\x0303✔\x03 Bijnaam \x02%nickname%\x02 is succesvol geregistreerd en u bent nu geïdentificeerd."
  invalid_token:    "\x0304✗\x03 De token is ongeldig of verlopen. Gebruik \x0303/msg %bot% REGISTER\x03 om opnieuw te beginnen."
  no_pending:       "\x0304✗\x03 U heeft geen lopende registratie om te verifiëren."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Verstuur de verificatietoken opnieuw naar uw e-mail."
  help:             "Verstuurt de verificatietoken opnieuw naar het e-mailadres dat is opgegeven tijdens\nde registratie. Werkt alleen als u een lopende registratie heeft."
  success:          "\x0307→\x03 Verificatietoken opnieuw verzonden naar \x02%email%\x02."
  no_pending:       "\x0304✗\x03 U heeft geen lopende registratie om een token voor opnieuw te verzenden."
  throttled:        "\x0304✗\x03 U moet \x02%minutes%\x02 minu(u)t(en) wachten voordat u een nieuwe verificatie-e-mail aanvraagt."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <bijnaam> [token]"
  short:            "Herstel uw bijnaam als u uw wachtwoord bent kwijtgeraakt."
  help:             "Herstelt de toegang tot een geregistreerde bijnaam wanneer u uw wachtwoord bent vergeten.\n1) \x0303RECOVER <bijnaam>\x03 — er wordt een token naar de e-mail van de bijnaam gestuurd.\n2) \x0303RECOVER <bijnaam> <token>\x03 — voer de token uit de e-mail in om uw wachtwoord te resetten.\nU ontvangt dan een tijdelijk wachtwoord en het commando om het te wijzigen."
  email_sent:       "\x0307→\x03 Er is een hersteltoken verzonden naar \x02%email_hint%\x02. Controleer uw inbox (en spammap)."
  not_registered:   "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet geregistreerd."
  pending:          "\x0304✗\x03 Bijnaam \x02%nickname%\x02 wacht op e-mailverificatie."
  suspended:        "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is geschorst. Reden: %reason%"
  forbidden:        "\x0304✗\x03 Bijnaam \x02%nickname%\x02 kan niet worden gebruikt op dit netwerk."
  no_email:         "\x0304✗\x03 Er is geen e-mail ingesteld voor bijnaam \x02%nickname%\x02. Herstel is niet beschikbaar."
  throttled:        "\x0304✗\x03 U moet \x02%minutes%\x02 minu(u)t(en) wachten voordat u een nieuwe herstel-e-mail aanvraagt."
  invalid_token:    "\x0304✗\x03 De token is ongeldig of verlopen. Vraag een nieuwe aan met \x0303RECOVER %nickname%\x03."
  success_identify: "\x0303✔\x03 Wachtwoord gereset. Identificeer nu: \x0303%identify_cmd%\x03"
  success_then_change: "Wijzig daarna uw wachtwoord: \x0303/msg %bot% SET PASSWORD <nieuw_wachtwoord>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <bijnaam> <wachtwoord>"
  short:            "Identificeer uzelf als de eigenaar van een bijnaam."
  help:             "Authenticeert uw sessie bij %nickserv% met uw bijnaam en wachtwoord.\nNa succesvolle identificatie ontvangt u de geregistreerde modus \x02+r\x02\nen, als u een gastbijnaam gebruikte, wordt uw geregistreerde bijnaam hersteld."
  success:          "\x0303✔\x03 U bent nu geïdentificeerd als \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 U bent al geïdentificeerd als \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet geregistreerd."
  invalid_credentials: "\x0304✗\x03 Onjuist wachtwoord. Probeer het opnieuw."
  locked_out:         "\x0304✗\x03 Te veel mislukte pogingen. Probeer het over \x02%minutes%\x02 minu(u)t(en) opnieuw."
  ghost_released:   "\x0307⚡\x03 De spooksessie die \x02%nickname%\x02 vasthield is verbroken."
  kill_reason:      "Bijnaam %nickname% teruggevorderd door %source% (de geregistreerde eigenaar heeft zich geïdentificeerd)"
  pending:          "\x0304✗\x03 Bijnaam \x02%nickname%\x02 wacht op e-mailverificatie.\n  Voer \x0303/msg %bot% VERIFY <token>\x03 uit of \x0303/msg %bot% RESEND\x03."
  suspended:        "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is geschorst. Reden: %reason%"
  forbidden:        "\x0304✗\x03 Bijnaam \x02%nickname%\x02 kan niet worden gebruikt op dit netwerk."
  pending_deletion: "\x0304✗\x03 Bijnaam \x02%nickname%\x02 staat op het punt verwijderd te worden en kan niet worden gebruikt."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <bijnaam>"
  short:            "Toon de registratiestatus van een bijnaam."
  help:             "Toont de huidige status van een bijnaam: geregistreerd, verificatie in afwachting,\ngeschorst of verboden."
  header:           "\x02Status van bijnaam \x0307%nickname%\x03:\x02"
  unregistered:     "  Status          : Niet geregistreerd"
  not_registered_offline: "  Status          : \x0315Niet geregistreerd\x03"
  pending:          "  Status          : \x0307Wacht op verificatie\x03"
  pending_expires:  "  Verloopt over     : %minutes% minu(u)t(en)"
  pending_expires_at: "  Verloopt op       : %date%"
  not_connected:    "  Status          : \x0315Niet verbonden\x03"
  not_identified:   "  Status          : \x0307Niet geïdentificeerd\x03"
  identified:       "  Status          : \x0303Geïdentificeerd\x03"
  suspended:        "  Status          : \x0304Geschorst\x03"
  suspended_reason: "  Reden           : %reason%"
  suspended_until:  "  Eindigt op      : %date%"
  suspended_permanent: "  Eindigt op      : Permanent"
  forbidden:        "  Status          : \x0304Verboden\x03"
  forbidden_reason: "  Reden           : %reason%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <bijnaam>"
  short:            "Toon informatie over een geregistreerde bijnaam."
  help:             "Toont registratiedetails voor een bijnaam: registratiedatum, verbindingsstatus,\nlaatste quitbericht en e-mailadres. De e-mail is alleen zichtbaar voor\nde eigenaar wanneer geïdentificeerd. Met PRIVATE ON kunnen alleen de eigenaar en IRC Operators\nde informatie bekijken."
  not_registered:   "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet geregistreerd."
  private:          "\x0304✗\x03 Informatie van bijnaam \x02%nickname%\x02 is privé."
  header:           "\x02Informatie voor bijnaam \x0307%nickname%\x03:\x02"
  status:           "  \x0314Status\x03               : %status%"
