# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <bijnaam> {ON|OFF}"
  short:            "Stel verloopbescherming in of verwijder deze voor een bijnaam."
  help:             |
    Bepaalt of een bijnaam verloopt door inactiviteit.
    Wanneer ON, verloopt de bijnaam nooit, ongeacht de laatste activiteit.
    Wanneer OFF, zijn de normale verloopregels van toepassing.

    Alleen IRCops met 'nickserv.noexpire'-toestemming kunnen dit commando gebruiken.

    Syntax: NOEXPIRE <bijnaam> {ON|OFF}
    Voorbeelden:
      NOEXPIRE BelangrijkeGebr ON
      NOEXPIRE BelangrijkeGebr OFF
  success_on:       "\x0303✔\x03 Bijnaam \x02%nickname%\x02 is nu beschermd tegen verloop."
  success_off:      "\x0303✔\x03 Bijnaam \x02%nickname%\x02 verloopt nu normaal."
  not_registered:   "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet geregistreerd."
  forbidden:         "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is verboden."
  suspended:         "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is geschorst."

