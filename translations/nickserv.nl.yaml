  channels_entry_access:    "  %channel% (%level%)"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <optie> <waarde>"
  short:            "Wijzig uw %nickserv% bijnaaminstellingen."
  help:             "Wijzigt uw %nickserv% bijnaaminstellingen.\nU moet geïdentificeerd zijn om dit commando te gebruiken."
  unknown_option:   "\x0304✗\x03 Onbekende optie \x02%option%\x02. Beschikbare opties: %options%."

  password:
    syntax:         "SET PASSWORD <nieuw_wachtwoord>"
    short:          "Wijzig uw bijnaamwachtwoord."
    help:           "Wijzigt het wachtwoord voor uw NickServ-bijnaam. Het nieuwe wachtwoord wordt\ndirect van kracht. Kies een sterk wachtwoord van minimaal 6 tekens\ndat u niet op andere services gebruikt."
    success:        "\x0303✔\x03 Uw wachtwoord is succesvol bijgewerkt."

  email:
    syntax:         "SET EMAIL <nieuwe_e-mail> [token]"
    short:          "Wijzig het e-mailadres dat aan uw bijnaam is gekoppeld (tweestapsbevestiging)."
    help:           "E-mailwijziging in twee stappen voor veiligheid.\n1) \x0303SET EMAIL <nieuwe_e-mail>\x03 — er wordt een token naar uw huidige e-mail gestuurd.\n2) \x0303SET EMAIL <nieuwe_e-mail> <token>\x03 — bevestig met de ontvangen token.\nDe token verloopt binnen 1 uur."
    success:        "\x0303✔\x03 Uw e-mail is bijgewerkt naar \x02%email%\x02."
    pending_sent:   "\x0307→\x03 Er is een bevestigingstoken verzonden naar \x02%current_email%\x02.\n  Om de wijziging naar \x02%new_email%\x02 te bevestigen, voer uit:\n  \x0303/msg %bot% SET EMAIL %new_email% <token>\x03\n  De token verloopt binnen 1 uur."
    invalid_token:  "\x0304✗\x03 De token is ongeldig of verlopen. Vraag een nieuwe aan met \x0303SET EMAIL <nieuwe_e-mail>\x03."

  language:
    syntax:         "SET LANGUAGE <code>"
    short:          "Wijzig de taal die de services gebruiken om met u te communiceren."
    help:           "Wijzigt de taal die %nickserv% en andere services gebruiken wanneer ze met u praten.\nBeschikbare talen:\n  \x02ca\x02 (Catalaans)\n  \x02de\x02 (Duits)\n  \x02el\x02 (Grieks)\n  \x02en\x02 (Engels)\n  \x02es\x02 (Spaans)\n  \x02eu\x02 (Baskisch)\n  \x02fr\x02 (Frans)\n  \x02gl\x02 (Galicisch)\n  \x02it\x02 (Italiaans)\n  \x02nl\x02 (Nederlands)\n  \x02pl\x02 (Pools)\n  \x02pt\x02 (Portugees)\n  \x02ro\x02 (Roemeens)\n  \x02tr\x02 (Turks)"
    success:        "\x0303✔\x03 Taal gewijzigd naar \x02%language%\x02."
    invalid:        "\x0304✗\x03 Niet-ondersteunde taal. Beschikbare talen: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <tijdzone>"
    short:          "Stel de tijdzone in die wordt gebruikt bij het weergeven van datums."
    help:           "Stelt de tijdzone in die %nickserv% gebruikt bij het tonen van datums.\nGebruik \x02HELP SET TIMEZONE\x02 voor de regio-index; \x02HELP SET TIMEZONE <regio>\x02 (bijv. Europe) voor de tijdzones van die regio. Gebruik \x02OFF\x02 om te wissen."
    success:        "\x0303✔\x03 Tijdzone ingesteld op \x02%timezone%\x02. Datums worden in deze tijdzone weergegeven."
    cleared:        "\x0303✔\x03 Tijdzone gewist. Datums gebruiken de netwerkstandaard."
    invalid:        "\x0304✗\x03 Ongeldige tijdzone \x02%timezone%\x02. Gebruik een geldige identificatie (bijv. UTC, Europe/Amsterdam)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Schakel privacy in of uit voor uw bijnaaminformatie."
    help:           "Bepaalt de zichtbaarheid van uw bijnaaminformatie in het INFO-commando.\nMet \x02PRIVATE ON\x02 kunnen alleen u en IRC Operators uw gegevens bekijken.\nMet \x02PRIVATE OFF\x02 is uw informatie openbaar voor iedereen."
    on:             "\x0303✔\x03 Uw bijnaaminformatie is nu \x02privé\x02."
    off:            "\x0303✔\x03 Uw bijnaaminformatie is nu \x02openbaar\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Gebruik PRIVMSG (ON) of NOTICE (OFF) voor service-antwoorden."
    help:           "Bepaalt hoe %nickserv% en andere services berichten naar u sturen.\nMet \x02MSG ON\x02 worden antwoorden verzonden als \x02PRIVMSG\x02 (sommige clients kunnen antwoorden of meldingen activeren).\nMet \x02MSG OFF\x02 worden antwoorden verzonden als \x02NOTICE\x02 (standaard; meestal geen automatisch antwoord)."
    on:             "\x0303✔\x03 Serviceberichten worden nu verzonden als \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 Serviceberichten worden nu verzonden als \x02NOTICE\x02."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Stel uw aangepaste virtuele host in of wis deze (weergegeven hostnaam)."
    help:           "Stelt een aangepaste hostnaam in die anderen zien wanneer u geïdentificeerd bent.\nGebruik \x02SET VHOST OFF\x02 om te wissen. Alleen letters (a-z, A-Z), cijfers, koppelteken en punt;\ngeen koppelteken of punt aan begin/einde van een blok; max 48 tekens. Uniek per bijnaam."
    success:        "\x0303✔\x03 Uw virtuele host is ingesteld op \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 Uw virtuele host is gewist."
    invalid:        "\x0304✗\x03 Ongeldige vhost. Alleen letters, cijfers, koppelteken en punt (niet aan begin/einde van blok); max 48 tekens."
    taken:          "\x0304✗\x03 Die vhost is al in gebruik door een andere bijnaam."
    forced:         "\x0304✗\x03 Uw vhost wordt automatisch geconfigureerd en kan niet worden gewijzigd met SET VHOST."

# --- SASET (IRCop) --------------------------------------------------------------
saset:
  syntax:           "SASET <bijnaam> <optie> <waarde>"
  short:            "Instellingen van een andere bijnaam wijzigen."
  help:             |
    Stelt een IRC-operator in staat de instellingen van een geregistreerde bijnaam te wijzigen.
    De doelbijnaam mag geen rootgebruiker, IRC-operator of service-bijnaam zijn.

    Beschikbare opties: PASSWORD, EMAIL, LANGUAGE, TIMEZONE, PRIVATE, MSG, VHOST

    SASET PASSWORD: Wijzigt het wachtwoord direct (zonder e-mailbevestiging).
    SASET EMAIL: Wijzigt de e-mail direct (zonder tokenvalidatie).

    Dit commando vereist IRCop-toestemming: nickserv.saset

    Syntax: SASET <bijnaam> <optie> <waarde>
    Voorbeeld: SASET Gebruiker PASSWORD nieuwwachtwoord
  unknown_option:   "\x0304✗\x03 Onbekende optie \x02%option%\x02. Beschikbare opties: %options%."
  not_registered:   "\x0304✗\x03 Bijnaam \x02%nickname%\x02 is niet geregistreerd."
  cannot_modify_oper: "\x0304✗\x03 Kan de bijnaam van een IRC-operator niet wijzigen."

  password:
    syntax:         "SASET <bijnaam> PASSWORD <nieuw_wachtwoord>"
    short:          "Wachtwoord van een bijnaam wijzigen."
    help:           "Wijzigt het wachtwoord van een andere bijnaam.\nDe wijziging is direct.\n\nSyntax: SASET <bijnaam> PASSWORD <nieuw_wachtwoord>\nVoorbeeld: SASET Gebruiker PASSWORD nieuwwachtwoord123"
    success:        "\x0303✔\x03 Het wachtwoord van \x02%nickname%\x02 is bijgewerkt."

  email:
    syntax:         "SASET <bijnaam> EMAIL <nieuwe_e-mail>"
    short:          "E-mail van een bijnaam wijzigen."
    help:           "Wijzigt de e-mail van een andere bijnaam.\nEr wordt geen bevestiging verzonden—de wijziging is direct.\n\nSyntax: SASET <bijnaam> EMAIL <nieuwe_e-mail>\nVoorbeeld: SASET Gebruiker EMAIL gebruiker@voorbeeld.com"
    success:        "\x0303✔\x03 De e-mail van \x02%nickname%\x02 is bijgewerkt naar \x02%email%\x02."

  language:
    syntax:         "SASET <bijnaam> LANGUAGE <code>"
    short:          "Taal van een bijnaam wijzigen."
    help:           "Wijzigt de taal van een andere bijnaam.\nBeschikbare talen: en (Engels), es (Spaans).\n\nSyntax: SASET <bijnaam> LANGUAGE <code>\nVoorbeeld: SASET Gebruiker LANGUAGE nl"
    success:        "\x0303✔\x03 De taal van \x02%nickname%\x02 is gewijzigd naar \x02%language%\x02."

  timezone:
    syntax:         "SASET <bijnaam> TIMEZONE <tijdzone|OFF>"
    short:          "Tijdzone van een bijnaam wijzigen."
    help:           "Stelt de tijdzone van een andere bijnaam in of wist deze.\nGebruik OFF om te wissen.\n\nSyntax: SASET <bijnaam> TIMEZONE <tijdzone>\nVoorbeeld: SASET Gebruiker TIMEZONE Europe/Amsterdam"
    success:        "\x0303✔\x03 De tijdzone van \x02%nickname%\x02 is ingesteld op \x02%timezone%\x02."
    cleared:        "\x0303✔\x03 De tijdzone van \x02%nickname%\x02 is gewist."
    invalid:        "\x0304✗\x03 Ongeldige tijdzone \x02%timezone%\x02."

  private:
    syntax:         "SASET <bijnaam> PRIVATE {ON|OFF}"
    short:          "Privacy van een bijnaam wijzigen."
    help:           "Schakelt de privacy van de informatie van een andere bijnaam in of uit.\n\nSyntax: SASET <bijnaam> PRIVATE {ON|OFF}\nVoorbeeld: SASET Gebruiker PRIVATE ON"
    on:             "\x0303✔\x03 De informatie van \x02%nickname%\x02 is nu \x02privé\x02."
    off:            "\x0303✔\x03 De informatie van \x02%nickname%\x02 is nu \x02openbaar\x02."

  msg:
    syntax:         "SASET <bijnaam> MSG {ON|OFF}"
    short:          "Berichtvoorkeur van een bijnaam wijzigen."
    help:           "Stelt in of een andere bijnaam antwoorden ontvangt als PRIVMSG (ON) of NOTICE (OFF).\n\nSyntax: SASET <bijnaam> MSG {ON|OFF}\nVoorbeeld: SASET Gebruiker MSG ON"
    on:             "\x0303✔\x03 \x02%nickname%\x02 ontvangt nu berichten als \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 \x02%nickname%\x02 ontvangt nu berichten als \x02NOTICE\x02."

  vhost:
    syntax:         "SASET <bijnaam> VHOST <vhost|OFF>"
    short:          "Virtuele host van een bijnaam wijzigen."
    help:           "Stelt de virtuele host van een andere bijnaam in of wist deze.\nGebruik OFF om te wissen.\n\nSyntax: SASET <bijnaam> VHOST <vhost>\nVoorbeeld: SASET Gebruiker VHOST gebruikers.voorbeeld.com"
    success:        "\x0303✔\x03 De VHost van \x02%nickname%\x02 is ingesteld op \x02%vhost%\x02."
