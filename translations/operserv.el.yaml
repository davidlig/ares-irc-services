  short:            "Λίστα εντολών ή βοήθεια για μια εντολή."
  help:             "Χωρίς ορίσματα εμφανίζει όλες τις εντολές. Χρησιμοποιήστε \x0303HELP <command>\x03 για πλήρη βοήθεια, ή \x0303HELP <command> <option>\x03 για υπο-επιλογές."
  header_title:     "%bot%"
  intro:            "Υπηρεσία διαχείρισης δικτύου για IRC operators."
  general_header:   "\x02\x0314Διαθέσιμες εντολές:\x03\x0F"
  command_line:     "  \x0307%command%\x03%description%"
  subcommand_line:  "  \x0307%command%\x03%description%"
  options_header:   "\x02\x0314Επιλογές:\x03\x0F"
  general_footer:   "Χρησιμοποιήστε \x0303/msg %bot% HELP <command>\x03 για περισσότερες πληροφορίες."
  set_sub_footer:   "Χρησιμοποιήστε \x0303/msg %bot% HELP %command% <option>\x03 για περισσότερες πληροφορίες."
  syntax_label:     "\x0307Σύνταξη:\x03 \x02%syntax%\x02"
  footer:           "\x0314─────────────────────────────\x03"
  intro_expiration: "ΣΗΜΕΙΩΣΗ: Τα ψευδώνυμα \x0304\x1Fαχρησιμοποίητα\x0F για περισσότερες από %days% ημέρες αφαιρούνται αυτόματα."
  unknown_command:  "\x0304✗\x03 Άγνωστη εντολή \x02%command%\x02. Χρησιμοποιήστε \x0303/msg %bot% HELP\x03."
  suboptions:       "Υπο-επιλογές:"

# --- IRCOP --------------------------------------------------------------------
ircop:
  syntax:           "IRCOP <nickname> {ADD|DEL|LIST} [role]"
  short:            "Διαχείριση IRC operators του δικτύου."
  help:             "Διαχείριση IRC operators του δικτύου. ADD προσθέτει ένα καταχωρημένο\nψευδώνυμο ως operator με τον καθορισμένο ρόλο.\nDEL αφαιρεί έναν operator. LIST εμφανίζει όλους τους operators.\nΧρησιμοποιήστε ROLE LIST για να δείτε τους διαθέσιμους ρόλους.\nΑυτή η εντολή περιορίζεται σε Root χρήστες που έχουν διαμορφωθεί στις υπηρεσίες."

  unknown_sub:      "\x0304✗\x03 Άγνωστη υπο-εντολή \x02%sub%\x02. Χρησιμοποιήστε ADD, DEL, ή LIST."
  unknown_role:     "\x0304✗\x03 Ο ρόλος \x02%role%\x02 δεν υπάρχει. Χρησιμοποιήστε \x0303/msg %bot% ROLE LIST\x03 για να δείτε τους διαθέσιμους ρόλους."
  already_admin:    "\x0304✗\x03 Ο/Η \x02%nickname%\x02 είναι ήδη IRC operator (ρόλος: %role%)."
  not_admin:       "\x0304✗\x03 Ο/Η \x02%nickname%\x02 δεν είναι IRC operator."
  role_changed:     "\x0303✓\x03 Άλλαξε ο ρόλος για \x02%nickname%\x02 από %old% σε %new%."

  add:
    syntax:         "IRCOP <nickname> ADD <role>"
    short:          "Προσθήκη IRC operator δικτύου."
    help:           "Προσθέτει ένα καταχωρημένο ψευδώνυμο ως IRC operator δικτύου.\nΧρησιμοποιήστε ROLE LIST για να δείτε τους διαθέσιμους ρόλους.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
    done:           "\x0303✓\x03 Προστέθηκε ο/η \x02%nickname%\x02 ως \x02%role%\x02."
    nick_not_active: "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι ενεργό καταχωρημένο ψευδώνυμο."

  del:
    syntax:         "IRCOP <nickname> DEL"
    short:          "Αφαίρεση IRC operator δικτύου."
    help:            "Αφαιρεί έναν IRC operator δικτύου από τη λίστα.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
    done:           "\x0303✓\x03 Αφαιρέθηκε ο/η \x02%nickname%\x02 από τους IRC operators."

  list:
    syntax:         "IRCOP LIST"
    short:          "Λίστα όλων των IRC operators δικτύου."
    help:            "Εμφανίζει όλους τους IRC operators δικτύου με τους ρόλους και την ημερομηνία καταχώρησης.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
    header:         "\x0307---\x03 \x02IRC Operators Δικτύου\x02 \x0307---\x03"
    empty:          "Δεν υπάρχουν IRC operators."

# --- ROLE --------------------------------------------------------------------
role:
  syntax:           "ROLE {ADD|DEL|LIST|PERMS|MODES|VHOST} <name> ..."
  short:            "Διαχείριση ρόλων operator."
  help:             "Διαχείριση ρόλων operator. ADD δημιουργεί νέο ρόλο, DEL τον αφαιρεί,\nLIST εμφανίζει όλους τους ρόλους, PERMS διαχειρίζεται άδειες για έναν ρόλο,\nMODES διαχειρίζεται λειτουργίες IRCOP, VHOST διαχειρίζεται μοτίβο\nαναγκαστικού vhost για έναν ρόλο.\nΟι προστατευμένοι ρόλοι (ADMIN, OPER, PREOPER) δεν μπορούν να διαγραφούν.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."

  unknown_sub:      "\x0304✗\x03 Άγνωστη υπο-εντολή \x02%sub%\x02. Χρησιμοποιήστε ADD, DEL, LIST, PERMS, MODES, ή VHOST."
  not_found:        "\x0304✗\x03 Ο ρόλος \x02%role%\x02 δεν υπάρχει."
  already_exists:   "\x0304✗\x03 Ο ρόλος \x02%role%\x02 υπάρχει ήδη."
  protected:        "\x0304✗\x03 Ο ρόλος \x02%role%\x02 είναι προστατευμένος και δεν μπορεί να διαγραφεί."

  add:
    syntax:         "ROLE ADD <name> [description]"
    short:          "Δημιουργία νέου ρόλου."
    help:            "Δημιουργεί έναν νέο προσαρμοσμένο ρόλο. Η περιγραφή είναι προαιρετική.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
    done:           "\x0303✓\x03 Δημιουργήθηκε ο ρόλος \x02%role%\x02."

  del:
    syntax:         "ROLE DEL <name>"
    short:          "Διαγραφή ρόλου."
    help:            "Διαγράφει έναν προσαρμοσμένο ρόλο. Οι προστατευμένοι ρόλοι\n(ADMIN, OPER, PREOPER) δεν μπορούν να διαγραφούν.\nΑν ο ρόλος έχει ανατεθειμένους operators,\nπρέπει να τους επανατοποθετήσετε πρώτα.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
    done:           "\x0303✓\x03 Διαγράφηκε ο ρόλος \x02%role%\x02."

  list:
    syntax:         "ROLE LIST"
    short:          "Λίστα όλων των ρόλων."
    help:            "Εμφανίζει όλους τους ρόλους. Οι προστατευμένοι ρόλοι\nσημειώνονται με [ΠΡΟΣΤΑΤΕΥΜΕΝΟΣ].\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
    header:         "\x0307---\x03 \x02Ρόλοι Operator\x02 \x0307---\x03"
    empty:          "Δεν υπάρχουν ρόλοι operator."

  perms:
    syntax:         "ROLE PERMS <role> {LIST|ADD|DEL|CLEAR} [permission|ALL]"
    short:          "Διαχείριση αδειών ρόλου."
    help:            "Διαχείριση αδειών που ανατίθενται σε έναν ρόλο.\nLIST εμφανίζει όλες τις άδειες για τον ρόλο.\nADD αναθέτει μια άδεια στον ρόλο.\nDEL αφαιρεί μια άδεια από τον ρόλο (όχι για προστατευμένους ρόλους).\nCLEAR αφαιρεί όλες τις άδειες από τον ρόλο.\nΧρησιμοποιήστε ALL για να προσθέσετε όλες τις διαθέσιμες άδειες ταυτόχρονα.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
    unknown_action:  "\x0304✗\x03 Άγνωστη ενέργεια \x02%action%\x02. Χρησιμοποιήστε LIST, ADD, DEL ή CLEAR."
    not_found:       "\x0304✗\x03 Η άδεια \x02%perm%\x02 δεν υπάρχει."
    already_has:     "\x0304✗\x03 Ο ρόλος \x02%role%\x02 έχει ήδη την άδεια \x02%perm%\x02."
    does_not_have:   "\x0304✗\x03 Ο ρόλος \x02%role%\x02 δεν έχει την άδεια \x02%perm%\x02."
    protected:      "\x0304✗\x03 Δεν μπορούν να τροποποιηθούν οι άδειες για τον προστατευμένο ρόλο \x02%role%\x02."

    list:
      syntax:       "ROLE PERMS <role> LIST"
      short:        "Λίστα αδειών για έναν ρόλο."
      help:         "Εμφανίζει όλες τις άδειες που έχουν ανατεθεί σε έναν ρόλο.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
      header:        "\x0307---\x03 \x02Άδειες για %role%\x02 \x0307---\x03"
      empty:        "Ο ρόλος \x02%role%\x02 δεν έχει ανατεθειμένες άδειες."
      assigned:     "\x0310Ανατεθειμένες:\x03"
      none_assigned: "\x0314Δεν έχουν ανατεθεί άδειες.\x03"
      available:    "\x0310Διαθέσιμες:\x03"
      all_assigned: "\x0314Όλες οι άδειες έχουν ανατεθεί σε αυτόν τον ρόλο.\x03"

    add:
      syntax:       "ROLE PERMS <role> ADD {permission|ALL}"
      short:        "Προσθήκη άδειας σε ρόλο."
      help:         "Προσθέτει μια άδεια σε έναν ρόλο.\nΧρησιμοποιήστε ALL για να προσθέσετε όλες τις διαθέσιμες άδειες ταυτόχρονα.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
      done:         "\x0303✓\x03 Προστέθηκε η άδεια \x02%perm%\x02 στον ρόλο \x02%role%\x02."
      all_done:     "\x0303✓\x03 Προστέθηκαν \x02%count%\x02 άδειες στον ρόλο \x02%role%\x02."
      all_skipped:  "\x0304✗\x03 Ο ρόλος \x02%role%\x02 έχει ήδη όλες τις διαθέσιμες άδειες."
      all_empty:    "\x0304✗\x03 Δεν υπάρχουν διαθέσιμες άδειες για προσθήκη."

    del:
      syntax:       "ROLE PERMS <role> DEL <permission>"
      short:        "Αφαίρεση άδειας από ρόλο."
      help:         "Αφαιρεί μια άδεια από έναν ρόλο.\nΔεν μπορούν να τροποποιηθούν προστατευμένοι ρόλοι.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
      done:         "\x0303✓\x03 Αφαιρέθηκε η άδεια \x02%perm%\x02 από τον ρόλο \x02%role%\x02."

    clear:
      syntax:       "ROLE PERMS <role> CLEAR"
      short:        "Αφαίρεση όλων των αδειών από έναν ρόλο."
      help:         "Αφαιρεί όλες τις άδειες από έναν ρόλο.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
      done:         "\x0303✓\x03 Αφαιρέθηκαν \x02%count%\x02 άδειες από τον ρόλο \x02%role%\x02."
      empty:        "\x0304✗\x03 Ο ρόλος \x02%role%\x02 δεν έχει ανατεθειμένες άδειες."

  modes:
    syntax:         "ROLE MODES <role> {VIEW|SET} [modes]"
    short:          "Διαχείριση λειτουργιών χρήστη IRCOP για τον ρόλο."
    help:            "Διαχείριση λειτουργιών χρήστη IRCOP που ανατίθενται σε έναν ρόλο.\nVIEW εμφανίζει τις τρέχουσες λειτουργίες του ρόλου.\nSET ορίζει τις λειτουργίες IRCOP (π.χ., oH για +oH).\nΟι χρήστες με αυτόν τον ρόλο θα λαμβάνουν αυτές τις λειτουργίες κατά την ταυτοποίηση.\nΔιαθέσιμες λειτουργίες ανά IRCD: UnrealIRCd (H, q, s, W), InspIRCd (s).\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
    unknown_action:  "\x0304✗\x03 Άγνωστη ενέργεια \x02%action%\x02. Χρησιμοποιήστε VIEW ή SET."

    view:
      syntax:       "ROLE MODES <role> VIEW"
      short:        "Εμφανίζει τις λειτουργίες του ρόλου."
      help:          "Εμφανίζει τις λειτουργίες χρήστη IRCOP που έχουν ανατεθεί σε έναν ρόλο.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
      header:        "\x0307---\x03 \x02Λειτουργίες για %role%\x02 \x0307---\x03"
      empty:        "Ο ρόλος \x02%role%\x02 δεν έχει ανατεθειμένες λειτουργίες."
      line:         "  Λειτουργίες: \x0303%modes%\x03"

    set:
      syntax:       "ROLE MODES <role> SET [modes]"
      short:        "Ορισμός λειτουργιών χρήστη IRCOP."
      help:          "Ορίζει τις λειτουργίες χρήστη IRCOP για τον ρόλο.\nΧωρίς ορίσματα, αφαιρεί όλες τις λειτουργίες από τον ρόλο.\nΜόνο έγκυρες λειτουργίες IRCOP για το ενεργό IRCD.\nΟι ταυτοποιημένοι χρήστες με αυτόν τον ρόλο θα λάβουν τις αλλαγές.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
      done:         "\x0303✓\x03 Ορίστηκαν οι λειτουργίες \x02%modes%\x02 για τον ρόλο \x02%role%\x02."
      cleared:      "\x0303✓\x03 Αφαιρέθηκαν όλες οι λειτουργίες από τον ρόλο \x02%role%\x02."
      invalid_mode: "\x0304✗\x03 Η λειτουργία \x02%mode%\x02 δεν είναι έγκυρη λειτουργία IRCOP."
      invalid_modes: "\x0304✗\x03 Μη έγκυρες λειτουργίες: %invalid%. Έγκυρες λειτουργίες: %valid%."
      no_irc_user_modes: "\x0304✗\x03 Το τρέχον IRCD δεν έχει διαμορφωμένες λειτουργίες IRCOP."

  vhost:
    syntax:         "ROLE VHOST <role> {VIEW|SET} [pattern]"
    short:          "Διαχείριση μοτίβου αναγκαστικού vhost για έναν ρόλο."
    help:           "Διαχείριση αναγκαστικού vhost που ανατίθεται σε έναν ρόλο.\nVIEW εμφανίζει το τρέχον μοτίβο αναγκαστικού vhost.\nSET αναθέτει ένα μοτίβο αναγκαστικού vhost (οι χρήστες με αυτόν τον ρόλο\nθα λαμβάνουν αυτό το vhost κατά την ταυτοποίηση,\nπαρακάμπτοντας το προσωπικό vhost).\nΤο μοτίβο προσαρτάται μετά το καθαρισμένο ψευδώνυμο, π.χ.:\n  Nick: _davidlig_ → Μοτίβο: admin.ares → VHost: davidlig.admin.ares\nΈγκυροι χαρακτήρες: a-z, A-Z, 0-9, παύλα (-) και τελεία (.).\nΠρέπει να έχει τουλάχιστον μία τελεία, δεν μπορεί να ξεκινά/τελειώνει\nμε - ή . ή να έχει ..\nΧρησιμοποιήστε OFF για εκκαθάριση του μοτίβου αναγκαστικού vhost.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
    unknown_action:  "\x0304✗\x03 Άγνωστη ενέργεια \x02%action%\x02. Χρησιμοποιήστε VIEW ή SET."

    view:
      syntax:       "ROLE VHOST <role> VIEW"
      short:         "Εμφανίζει το μοτίβο αναγκαστικού vhost του ρόλου."
      help:          "Εμφανίζει το μοτίβο αναγκαστικού vhost που έχει ανατεθεί σε έναν ρόλο.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
      header:        "\x0307---\x03 \x02Αναγκαστικό vhost για %role%\x02 \x0307---\x03"
      empty:        "Ο ρόλος \x02%role%\x02 δεν έχει ορισμένο μοτίβο αναγκαστικού vhost."
      line:         "  Μοτίβο: \x0303%pattern%\x03"
      example:      "  Παράδειγμα: \x02nickname\x02.%pattern%"

    set:
      syntax:       "ROLE VHOST <role> SET [pattern]"
      short:         "Ορισμός μοτίβου αναγκαστικού vhost για τον ρόλο."
      help:          "Ορίζει το μοτίβο αναγκαστικού vhost για τον ρόλο.\nΟι χρήστες που ταυτοποιούνται με αυτόν τον ρόλο θα λαμβάνουν\nτο αναγκαστικό vhost, που έχει προτεραιότητα έναντι του προσωπικού.\nΤο μοτίβο προσαρτάται μετά το καθαρισμένο ψευδώνυμο.\nΧρησιμοποιήστε OFF ή παραλείψτε το όρισμα για εκκαθάριση.\nΑυτή η εντολή περιορίζεται σε Root χρήστες."
      done:         "\x0303✓\x03 Ορίστηκε μοτίβο αναγκαστικού vhost για τον ρόλο \x02%role%\x02."
      cleared:      "\x0303✓\x03 Αφαιρέθηκε το μοτίβο αναγκαστικού vhost από τον ρόλο \x02%role%\x02."
      invalid:      "\x0304✗\x03 Μη έγκυρο μοτίβο vhost. Έγκυροι χαρακτήρες: a-z, A-Z, 0-9, - και .. Πρέπει να έχει τουλάχιστον μία τελεία, δεν μπορεί να ξεκινά/τελειώνει με - ή . ή να έχει .."

# --- KILL --------------------------------------------------------------------
kill:
  syntax:           "KILL <nickname> <reason>"
  short:            "Αναγκαστική αποσύνδεση χρήστη από το δίκτυο."
  help:             "Αποσυνδέει έναν χρήστη από το δίκτυο IRC.\nΟι IRCops και οι Root χρήστες δεν μπορούν να γίνουν kill.\nΑυτή η εντολή απαιτεί την άδεια operserv.kill.\n\nΣύνταξη: KILL <nickname> <reason>\nΠαράδειγμα: KILL BadUser Flooding σε κανάλια"
  user_not_online:  "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι συνδεδεμένο."
  protected_root:   "\x0304✗\x03 Δεν μπορεί να γίνει kill ο Root χρήστης \x02%nickname%\x02."
  protected_ircop:  "\x0304✗\x03 Δεν μπορεί να γίνει kill ο IRC operator \x02%nickname%\x02."
  done:             "\x0303✓\x03 Ο χρήστης \x02%nickname%\x02 έχει γίνει kill (%reason%)."
  permission_denied: "\x0304✗\x03 Άρνηση πρόσβασης. Χρειάζεστε την άδεια operserv.kill."

# --- GLINE --------------------------------------------------------------------
gline:
  syntax:           "GLINE {ADD|DEL|LIST} [mask] [expiry] [reason]"
  short:            "Διαχείριση G-lines σε όλο το δίκτυο."
  help:             "Διαχείριση G-lines σε όλο το δίκτυο (καθολικοί αποκλεισμοί).\nADD προσθέτει νέο G-line με μάσκα, λήξη και αιτία.\nDEL αφαιρεί ένα G-line με μάσκα ή αριθμό καταχώρησης.\nLIST εμφανίζει όλα τα G-lines, προαιρετικά φιλτραρισμένα κατά μάσκα.\n\nΜορφή λήξης: 0=μόνιμο, ή χρήση κατάληξης d, h, m (π.χ., 7d, 12h, 30m).\nΤα GLINE που ταιριάζουν με Root ή IRCop χρήστες απορρίπτονται.\nΑυτή η εντολή απαιτεί την άδεια operserv.gline."
  unknown_sub:      "\x0304✗\x03 Άγνωστη υπο-εντολή \x02%sub%\x02. Χρησιμοποιήστε ADD, DEL, ή LIST."
  invalid_mask:     "\x0304✗\x03 Μη έγκυρη μορφή μάσκας. Πρέπει να είναι στη μορφή user@host (π.χ., *@192.168.*)."
  global_mask:      "\x0304✗\x03 Η μάσκα G-line \x02%mask%\x02 είναι πολύ ευρεία. Οι καθολικές μάσκες δεν επιτρέπονται."
  dangerous_mask:   "\x0304✗\x03 Η μάσκα G-line \x02%mask%\x02 είναι πολύ ευρεία. Το τμήμα host χρειάζεται τουλάχιστον 4 αλφαριθμητικούς χαρακτήρες."
  protected_user:   "\x0304✗\x03 Δεν μπορεί να μπει G-line σε προστατευμένο χρήστη \x02%nickname%\x02."
  invalid_expiry:   "\x0304✗\x03 Μη έγκυρη μορφή λήξης. Χρησιμοποιήστε 0 για μόνιμο, ή τιμή όπως 7d, 12h, 30m."
  already_exists:   "\x0304✗\x03 Το G-line για \x02%mask%\x02 υπάρχει ήδη."
  max_entries:      "\x0304✗\x03 Επιτεύχθηκε ο μέγιστος αριθμός G-lines (%max%)."
  not_found:        "\x0304✗\x03 Το G-line \x02%mask%\x02 δεν βρέθηκε."
  user_not_found:   "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι online."
  permanent:        "μόνιμο"

  add:
    syntax:         "GLINE ADD <mask> <expiry> <reason>"
    short:          "Προσθήκη G-line σε όλο το δίκτυο."
    help:           "Προσθέτει ένα G-line σε όλο το δίκτυο (καθολικός αποκλεισμός).\nΗ μάσκα πρέπει να είναι στη μορφή user@host.\nΛήξη: 0=μόνιμο, ή χρήση κατάληξης d, h, m (π.χ., 7d, 12h, 30m).\nΤα GLINE που ταιριάζουν με Root ή IRCop χρήστες απορρίπτονται.\nΑυτή η εντολή απαιτεί την άδεια operserv.gline."
    done:           "\x0303✓\x03 Προστέθηκε G-line: \x02%mask%\x02 (%duration%) - %reason%"

  del:
    syntax:         "GLINE DEL <mask|number>"
    short:          "Αφαίρεση G-line."
    help:           "Αφαιρεί ένα G-line από τη λίστα.\nΜπορείτε να καθορίσετε τη μάσκα ή τον αριθμό καταχώρησης από το LIST.\nΑυτή η εντολή απαιτεί την άδεια operserv.gline."
    done:           "\x0303✓\x03 Το G-line \x02%mask%\x02 αφαιρέθηκε."

  list:
    syntax:         "GLINE LIST [mask]"
    short:          "Λίστα όλων των G-lines."
    help:           "Εμφανίζει όλα τα G-lines. Προαιρετικά φιλτράρισμα κατά μοτίβο μάσκας.\nΑυτή η εντολή απαιτεί την άδεια operserv.gline."
    header:         "\x0307---\x03 \x02G-lines (%count%) \x0307---\x03"
    empty:          "Δεν υπάρχουν G-lines."
    no_reason:      "Χωρίς αιτία"
    never_expires:  "Μόνιμο"
    unknown_creator: "άγνωστος"
    entry:          "\x0310%index%.\x03 \x02%mask%\x02 - %reason% (\x0314%nickname%\x03, λήγει: %expiration%)"

# --- GLOBAL -------------------------------------------------------------------
global:
  syntax:           "GLOBAL {service|nick!ident@vhost} {PRIVMSG|NOTICE} <message>"
  short:            "Αποστολή καθολικού μηνύματος σε όλους τους συνδεδεμένους χρήστες."
  help:             "Στέλνει ένα μήνυμα σε όλους τους συνδεδεμένους χρήστες.\n\nΑν το πρώτο όρισμα είναι όνομα υπηρεσίας, το μήνυμα θα σταλεί\nχρησιμοποιώντας αυτήν την υπάρχουσα υπηρεσία.\n\nΑν δεν είναι υπηρεσία, θα δημιουργηθεί ένας προσωρινός ψευδο-πελάτης\nμε την καθορισμένη μάσκα. Η μάσκα πρέπει να είναι στη μορφή: nick!ident@vhost\n- nick: έγκυρο ψευδώνυμο IRC (γράμματα, []{}|\\`, ψηφία, ξεκινά με γράμμα)\n- ident: αλφαριθμητικό με . _ ~ -\n- vhost: έγκυρο hostname\n\nΓια ψευδο-πελάτες, το ψευδώνυμο δεν μπορεί να είναι συνδεδεμένο ή καταχωρημένο.\nΟ ψευδο-πελάτης θα παραμείνει συνδεδεμένος κατά την αποστολή και θα\nαποσυνδεθεί αυτόματα (το nick θα μπλοκαριστεί για 24 ώρες μέσω SQLINE/QLINE).\n\nPRIVMSG στέλνει ως ιδιωτικό μήνυμα, NOTICE στέλνει ως notice.\nΑυτή η εντολή απαιτεί την άδεια operserv.global."
  mask_invalid:    "\x0304✗\x03 Μη έγκυρη μορφή μάσκας: %error%"
  nick_service:    "\x0304✗\x03 Δεν μπορεί να χρησιμοποιηθεί ψευδώνυμο υπηρεσίας."
  nick_connected: "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι τρέχοντα συνδεδεμένο."
  nick_registered: "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 είναι καταχωρημένο."
  type_invalid:    "\x0304✗\x03 Ο τύπος μηνύματος πρέπει να είναι PRIVMSG ή NOTICE."
  done:            "\x0303✓\x03 Καθολικό μήνυμα στάλθηκε από \x02%nickname%\x02 σε %count% χρήστες."

# --- RAW ---------------------------------------------------------------------
raw:
  syntax:           "RAW <line>"
  short:            "Αποστολή ακατέργαστης γραμμής πρωτοκόλλου στο IRCd."
  help:             "Στέλνει τη δοσμένη γραμμή απευθείας στο socket του uplink IRCd.\nΧρησιμοποιήστε με εξαιρετική προσοχή. Μη έγκυρες γραμμές πρωτοκόλλου\nμπορεί να καταρρεύσουν το δίκτυο.\nΑυτή η εντολή απαιτεί την άδεια operserv.raw."
  empty:            "\x0304✗\x03 Πρέπει να καθορίσετε μια μη κενή γραμμή για αποστολή."
  too_long:         "\x0304✗\x03 Η γραμμή είναι πολύ μεγάλη. Μέγιστο 510 χαρακτήρες."
  not_connected:    "\x0304✗\x03 Δεν υπάρχει σύνδεση με το IRCd."
  done:             "\x0303✓\x03 Ακατέργαστη γραμμή στάλθηκε."

# --- DEBUG -------------------------------------------------------------------
debug:
  action_message:   "%operator% εκτελεί την εντολή %command% σε %target%. %reason%"
  actionWithDuration: "%operator% εκτελεί την εντολή %command% σε %target%. Διάρκεια: %duration%. %reason%"
  action_global:    "%operator% εκτελεί την εντολή GLOBAL με ψευδώνυμο %target% μέσω %type% σε %count% χρήστες. Μήνυμα: %message%"
  prefix_reason:    "Αιτία: %reason%"
  prefix_message:   "Μήνυμα: %reason%"

# --- PERMISSIONS --------------------------------------------------------------
permissions:
  operserv.kill:    "Αποσύνδεση ψευδωνύμου από το δίκτυο (KILL)"
  operserv.gline:   "Διαχείριση G-lines σε όλο το δίκτυο (GLINE)"
  operserv.global:  "Αποστολή καθολικών μηνυμάτων σε όλους τους χρήστες (GLOBAL)"
  operserv.raw:     "Αποστολή ακατέργαστων γραμμών πρωτοκόλλου στο IRCd (RAW)"
  operserv.motd:    "Διαχείριση μηνυμάτων MOTD σύνδεσης (MOTD)"

# --- MOTD ----------------------------------------------------------------------
motd:
  short:            "Διαχείριση μηνυμάτων MOTD που στέλνονται στους χρήστες κατά τη σύνδεση."
  syntax:           "MOTD {ADD|DEL|LIST|CLEAN} [args]"
  help:             "Διαχείριση καταχωρήσεων Message Of The Day που στέλνονται στους χρήστες όταν συνδέονται στο δίκτυο.\n\n"
  unknown_sub:      "\x0304✗\x03 Άγνωστη υπο-εντολή. Χρησιμοποιήστε: \x02ADD\x02, \x02DEL\x02, \x02LIST\x02, \x02CLEAN\x02"
  add:
    syntax:         "MOTD ADD {service|nick!ident@vhost} {PRIVMSG|NOTICE} <expiry> <message>"
    syntax_hint:    "\x0304✗\x03 Χρήση: \x02%syntax%\x02"
    short:          "Προσθήκη καταχώρησης MOTD."
    help:           "Προσθέτει ένα νέο μήνυμα MOTD που θα στέλνεται σε κάθε χρήστη όταν συνδέεται στο δίκτυο.\n\n"
    done:           "\x0303✓\x03 Προστέθηκε καταχώρηση MOTD #%id%."
    invalid_type:   "\x0304✗\x03 Μη έγκυρος τύπος μηνύματος. Πρέπει να είναι \x02PRIVMSG\x02 ή \x02NOTICE\x02."
    invalid_expiry: "\x0304✗\x03 Μη έγκυρη μορφή λήξης. Χρησιμοποιήστε: \x02<number><s|m|h|d>\x02 (π.χ., 30s, 5m, 24h, 7d)."
  del:
    syntax:         "MOTD DEL <id>"
    syntax_hint:    "\x0304✗\x03 Χρήση: \x02%syntax%\x02"
    short:          "Διαγραφή καταχώρησης MOTD."
    help:           "Διαγράφει μια καταχώρηση MOTD με το ID της.\n\n"
    done:           "\x0303✓\x03 Διαγράφηκε η καταχώρηση MOTD #%id%."
    not_found:      "\x0304✗\x03 Η καταχώρηση MOTD δεν βρέθηκε."
  list:
    syntax:         "MOTD LIST"
    short:          "Λίστα όλων των καταχωρήσεων MOTD."
    help:           "Εμφανίζει όλες τις διαμορφωμένες καταχωρήσεις MOTD.\n\n"
    empty:          "Δεν υπάρχουν διαμορφωμένες καταχωρήσεις MOTD."
    header:         "Καταχωρήσεις MOTD:"
    status_enabled: "\x0303ενεργή\x03"
    status_disabled: "\x0304ανενεργή\x03"
    expired:        "\x0304έληξε\x03"
    no_bot:         "(χωρίς bot)"
    never:          "ποτέ"
    shown_count:    "εμφανίστηκε %count% φορές"
  clean:
    syntax:         "MOTD CLEAN"
    short:          "Αφαίρεση όλων των ληγμένων καταχωρήσεων MOTD."
    help:           "Αφαιρεί όλες τις καταχωρήσεις MOTD των οποίων ο χρόνος λήξης έχει παρέλθει.\n\n"
    done:           "\x0303✓\x03 Αφαιρέθηκαν %count% ληγμένες καταχωρήσεις MOTD."
    none:           "\x0303✓\x03 Δεν υπάρχουν ληγμένες καταχωρήσεις MOTD προς αφαίρεση."
  debug:
    finalized:      "Το μήνυμα MOTD #%id% ολοκληρώθηκε: [%type%] %message% | %date% | %shown_count%"
