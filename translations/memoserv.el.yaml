  throttled: "\x0304✗\x03 Πρέπει να περιμένετε \x02%seconds%\x02 δευτερόλεπτο(α) πριν στείλετε άλλο μήνυμα."
  limit_reached: "\x0304✗\x03 Επιτεύχθηκε το όριο μηνυμάτων για \x02%target%\x02."
  ignored: "\x0304✗\x03 Δεν μπορείτε να στείλετε μηνύματα σε αυτόν τον παραλήπτη, είστε στη λίστα αγνόησής του."
  cannot_send_to_self: "\x0304✗\x03 Δεν μπορείτε να στείλετε μήνυμα στον εαυτό σας."
  message_too_long: "\x0304✗\x03 Το μήνυμα είναι πολύ μεγάλο. Το μέγιστο είναι \x02%max%\x02 χαρακτήρες."
  service_disabled_for_target: "\x0304✗\x03 Η υπηρεσία μηνυμάτων είναι απενεργοποιημένη για \x02%target%\x02."

read:
  syntax: "READ [#channel] <number>"
  short: "Ανάγνωση μηνύματος με αριθμό."
  help: "Διαβάζει το μήνυμα με τον δοσμένο αριθμό. Χωρίς #channel, διαβάζει από τα εισερχόμενά σας. Με #channel, απαιτεί επίπεδο MEMOREAD."
  header: "\x02\x0307Μήνυμα #%index%\x03 από \x02%from%\x02:\x0F"
  footer: "\x0314─────────────────────────────\x03 \x0314%date%\x03"
  channel_not_registered: "\x0304✗\x03 Το κανάλι \x02%channel%\x02 δεν είναι καταχωρημένο."
  not_found: "\x0304✗\x03 Το μήνυμα #%index% δεν βρέθηκε."

list:
  syntax: "LIST [#channel]"
  short: "Λίστα μηνυμάτων (μη αναγνωσμένα σημειώνονται με κόκκινο *)."
  help: "Εμφανίζει τα μηνύματά σας ή τα μηνύματα του καναλιού. Τα μη αναγνωσμένα μηνύματα εμφανίζονται με κόκκινο αστερίσκο και προεπισκόπηση (μέγιστο 50 χαρακτήρες). Χωρίς #channel = τα εισερχόμενά σας· με #channel απαιτεί MEMOREAD."
  header: "\x02\x0307Μηνύματα για %target%\x03:\x0F"
  footer: "\x0314─────────────────────────────\x03"
  empty: "\x0307ℹ\x03 Δεν υπάρχουν μηνύματα για \x02%target%\x02."
  channel_not_registered: "\x0304✗\x03 Το κανάλι \x02%channel%\x02 δεν είναι καταχωρημένο."

del:
  syntax: "DEL [#channel] <number>"
  short: "Διαγραφή μηνύματος με αριθμό."
  help: "Διαγράφει το μήνυμα με τον δοσμένο αριθμό. Για κανάλια απαιτεί επίπεδο MEMOCHANGE."
  deleted: "\x0303✔\x03 Το μήνυμα #%index% διαγράφηκε."
