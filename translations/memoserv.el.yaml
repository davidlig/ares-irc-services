  not_found: "\x0304✗\x03 Το μήνυμα #%index% δεν βρέθηκε."

ignore:
  syntax: "IGNORE {ADD|DEL|LIST} [#channel] [nickname]"
  short: "Διαχείριση λίστας αγνόησης για μηνύματα."
  help: "ADD προσθέτει ένα ψευδώνυμο στη λίστα αγνόησής σας (ή του καναλιού)· DEL αφαιρεί· LIST εμφανίζει τη λίστα. Για κανάλια, ADD/DEL απαιτούν MEMOCHANGE."
  add:
    syntax: "IGNORE ADD [#channel] <nickname>"
    short: "Προσθήκη ψευδωνύμου στη λίστα αγνόησης."
    help: "Τα μηνύματα από αυτό το ψευδώνυμο δεν θα γίνονται δεκτά στα εισερχόμενά σας (ή του καναλιού)."
  del:
    syntax: "IGNORE DEL [#channel] <nickname>"
    short: "Αφαίρεση ψευδωνύμου από τη λίστα αγνόησης."
    help: "Αφαιρεί το ψευδώνυμο από τη λίστα αγνόησης."
  list:
    syntax: "IGNORE LIST [#channel]"
    short: "Λίστα ψευδωνύμων που αγνοούνται."
    help: "Εμφανίζει τη λίστα των ψευδωνύμων που εσείς (ή το κανάλι) αγνοείτε για μηνύματα."
  added: "\x0303✔\x03 Το \x02%nickname%\x02 προστέθηκε στη λίστα αγνόησης."
  removed: "\x0303✔\x03 Το \x02%nickname%\x02 αφαιρέθηκε από τη λίστα αγνόησης."
  already_ignored: "\x0304✗\x03 Το \x02%nickname%\x02 είναι ήδη στη λίστα αγνόησης."
  not_ignored: "\x0304✗\x03 Το \x02%nickname%\x02 δεν είναι στη λίστα αγνόησης."
  nick_not_registered: "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι καταχωρημένο."
  channel_not_registered: "\x0304✗\x03 Το κανάλι \x02%channel%\x02 δεν είναι καταχωρημένο."
  limit_reached_nick: "\x0304✗\x03 Επιτεύχθηκε το όριο λίστας αγνόησης για το ψευδώνυμό σας (μέγιστο \x02%limit%\x02)."
