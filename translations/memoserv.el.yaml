send:
  syntax: "SEND {nickname|#channel} <message>"
  short: "Αποστολή μηνύματος σε ψευδώνυμο ή κανάλι."
  help: "Στέλνει ένα μήνυμα σε ένα καταχωρημένο ψευδώνυμο ή κανάλι. Ο παραλήπτης πρέπει να έχει ενεργοποιήσει την υπηρεσία μηνυμάτων (ENABLE)."
  sent_nick: "\x0303✔\x03 Μήνυμα στάλθηκε στο \x02%nickname%\x02."
  sent_channel: "\x0303✔\x03 Μήνυμα στάλθηκε στο κανάλι \x02%channel%\x02."
  nick_not_registered: "\x0304✗\x03 Το ψευδώνυμο \x02%nickname%\x02 δεν είναι καταχωρημένο."
