# --- MOTD ----------------------------------------------------------------------
motd:
  short:            "Beheer connect MOTD-berichten die naar gebruikers worden gestuurd bij verbinding."
  syntax:           "MOTD \x02{ADD|DEL|LIST|CLEAN}\x02 [args]"
  help:             "Beheer Message Of The Day-vermeldingen die naar gebruikers worden gestuurd wanneer ze verbinding maken met het netwerk.\n\n"
  unknown_sub:      "\x0304✗\x03 Onbekende subopdracht. Gebruik: \x02ADD\x02, \x02DEL\x02, \x02LIST\x02, \x02CLEAN\x02"
  add:
    syntax:         "MOTD ADD {service|nick!ident@vhost} {PRIVMSG|NOTICE} <verloop> <bericht>"
    syntax_hint:    "\x0304✗\x03 Gebruik: \x02%syntax%\x02"
    short:          "Voeg een MOTD-vermelding toe."
    help:           "Voegt een nieuwe MOTD-vermelding toe die naar elke gebruiker wordt gestuurd wanneer deze verbinding maakt met het netwerk.\n\n"
    done:           "\x0303✓\x03 MOTD-vermelding #%id% toegevoegd."
    invalid_type:   "\x0304✗\x03 Ongeldig berichttype. Moet \x02PRIVMSG\x02 of \x02NOTICE\x02 zijn."
    invalid_expiry: "\x0304✗\x03 Ongeldig verloopformaat. Gebruik: \x02<getal><s|m|h|d>\x02 (bijv. 30s, 5m, 24h, 7d)."
  del:
    syntax:         "MOTD DEL \x02<id>\x02"
    syntax_hint:    "\x0304✗\x03 Gebruik: \x02%syntax%\x02"
    short:          "Verwijder een MOTD-vermelding."
    help:           "Verwijdert een MOTD-vermelding op basis van zijn ID.\n\n"
    done:           "\x0303✓\x03 MOTD-vermelding #%id% verwijderd."
    not_found:      "\x0304✗\x03 MOTD-vermelding niet gevonden."
  list:
    syntax:         "MOTD LIST"
    short:          "Toon alle MOTD-vermeldingen."
    help:           "Toont alle geconfigureerde MOTD-vermeldingen.\n\n"
    empty:          "Geen MOTD-vermeldingen geconfigureerd."
    header:         "MOTD-vermeldingen:"
    status_enabled: "\x0303ingeschakeld\x03"
