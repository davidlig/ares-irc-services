# Common translations — Greek
# Domain: common
#
# Shared translations used across all IRC services.

antiflood:
  blocked: "Έχετε υπερβεί το όριο ρυθμού εντολών. Παρακαλώ δοκιμάστε ξανά σε %seconds% δευτερόλεπτα."
  debug_channel: "%nick% %command% επιτεύχθηκε όριο για %host% (%seconds%s απομένουν)"

ctcp:
  version:
    tribute: |
      \x02Για τον πιστό και αιώνιο φίλο μου,\x02

      Αν και το 2023 ήταν η χρονιά που έπρεπε να πούμε αντίο, ο χρόνος δεν έχει σβήσει ούτε μία
      λεπτομέρεια από εσένα. Ακόμα θυμάμαι την απεριόριστη ενέργειά σου, το ευγενικό σου βλέμμα
      και εκείνη την τεράστια και μεταδοτική χαρά που μόνο εσύ ήξερες να δίνεις.

      Γέμισες το σπίτι μου με ζωή και τη ζωή μου με ανιδιοτελή αγάπη που δεν θα ξεχάσω ποτέ.
      Αν και πια δεν ακούω τα βήματά σου να τρέχουν για να με υποδεχτούν ούτε νιώθω το κεφάλι
      σου να ακουμπά πάνω μου αναζητώντας στοργή, ξέρω πως το παιχνιδιάρικο πνεύμα σου ακόμα
      με συντροφεύει.

      Σε ευχαριστώ για κάθε στιγμή, κάθε σκανταλιά, και που υπήρξες ο καλύτερος σύντροφος που
      θα μπορούσα να ζητήσω. Ο χώρος που άφησες δίπλα μου τώρα γεμίζει με τις πιο ευτυχισμένες
      αναμνήσεις. Θα είσαι πάντα ο αγαπημένος μου φίλος και θα έχεις πάντα μια τεράστια θέση
      στην καρδιά μου.
