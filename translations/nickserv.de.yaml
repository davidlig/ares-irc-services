  nick_forbidden:   "\x0304✗\x03 Nickname \x02%nickname%\x02 ist gesperrt: %reason%"

# --- IRCop-Befehle ---------------------------------------------------------
userip:
  syntax:           "USERIP <nickname>"
  short:            "Die echte IP-Adresse und den Hostnamen eines Nicknames abrufen."
  help:             |
    Zeigt die echte IP-Adresse und den Hostnamen des angegebenen Nicknames.
    Nur verfügbar für IRCops mit der Berechtigung 'nickserv.userip'.

    Dieser Befehl zeigt sensible Nickname-Informationen an.
    Verwenden Sie ihn verantwortungsvoll.

    Syntax: USERIP <nickname>
    Beispiel: USERIP EinBenutzer
  not_online:       "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht verbunden."
  result:           "\x0307ℹ\x03 Nickname: \x02%nickname%\x02 | IP: \x0307%ip%\x03 | Host: \x0307%host%\x03"

permissions:
  nickserv.userip: "Echte IP-Adresse/Hostnamen eines Nicknames anzeigen (USERIP)"
  nickserv.suspend: "Einen Nickname suspendieren oder entsuspendieren (SUSPEND/UNSUSPEND)"
  nickserv.rename: "Einen verbundenen Nickname zwangsweise in einen zufälligen Nick umbenennen (RENAME)"
  nickserv.drop: "Einen registrierten Nickname löschen (DROP)"
  nickserv.drop.force: "Einen wiederherstellbaren Nickname dauerhaft löschen (DROP FORCE)"
  nickserv.restore: "Einen zur Löschung anstehenden Nickname wiederherstellen (RESTORE)"
  nickserv.forbid: "Einen Nickname sperren oder entsperren (FORBID/UNFORBID)"
  nickserv.forbidvhost: "VHost-Muster sperren oder erlauben (FORBIDVHOST)"
  nickserv.saset: "Die Einstellungen eines anderen Nicknames ändern (SASET)"
  nickserv.noexpire: "Ablaufschutz für einen Nickname setzen oder entfernen (NOEXPIRE)"
  nickserv.history: "Nickname-Aktionsverlauf anzeigen und verwalten (HISTORY)"

# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <nickname> <Dauer> <Grund>"
  short:            "Einen Nickname suspendieren."
  help:             |
    Suspendiert einen Nickname und verhindert, dass der Besitzer sich identifiziert.
    Die Suspendierung kann vorübergehend oder dauerhaft sein.

    Dauer-Formate: \x0303%d\x03 (Tage), \x0303%h\x03 (Stunden), \x0303%m\x03 (Minuten) oder \x03030\x03 (dauerhaft).

    Suspendierte Benutzer können sich nicht mit ihrem Nickname identifizieren.
    IRC-Operatoren und Root-Benutzer können nicht suspendiert werden.

    Syntax: SUSPEND <nickname> <Dauer> <Grund>
    Beispiele:
      SUSPEND SchlechterBenutzer 7d Spamming in #hilfe
      SUSPEND Missbraucher 30d Wiederholter Flood
      SUSPEND ProblemBenutzer 0 Sperrumgehung
  success:            "\x0303✔\x03 Nickname \x02%nickname%\x02 wurde suspendiert bis \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 Nickname \x02%nickname%\x02 ist bereits suspendiert."
  not_registered:     "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht registriert."
  forbidden:          "\x0304✗\x03 Nickname \x02%nickname%\x02 ist gesperrt und kann nicht suspendiert werden."
  cannot_suspend_oper: "\x0304✗\x03 IRC-Operator \x02%nickname%\x02 kann nicht suspendiert werden."
  cannot_suspend_root: "\x0304✗\x03 Root-Benutzer \x02%nickname%\x02 kann nicht suspendiert werden."
  cannot_suspend_service: "\x0304✗\x03 Service-Nickname \x02%nickname%\x02 kann nicht suspendiert werden."
  invalid_duration:   "\x0304✗\x03 Ungültige Dauer. Verwenden Sie: \x0303<d><h><m>\x03 (z. B. 7d, 12h, 30m) oder \x03030\x03 für dauerhaft."
  permanent:          "dauerhaft"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <nickname>"
  short:            "Suspendierung eines Nicknames aufheben."
  help:             |
    Hebt eine aktive Suspendierung eines Nicknames auf, sodass der Besitzer sich wieder identifizieren kann.

    Syntax: UNSUSPEND <nickname>
    Beispiel: UNSUSPEND EinBenutzer
  success:          "\x0303✔\x03 Suspendierung wurde von \x02%nickname%\x02 aufgehoben."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht registriert."
  not_suspended:    "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht suspendiert."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <nickname>"
  short:            "Einen verbundenen Nickname zwangsweise in einen zufälligen Nickname umbenennen."
  help:             |
    Zwingt einen verbundenen Nickname, seinen Nick in einen zufällig generierten zu ändern.
    Nützlich zur Durchsetzung von Netzwerkrichtlinien, ohne den Benutzer zu trennen.

    Das neue Nickname-Format verwendet das konfigurierte Gast-Präfix (%prefix%).

    Dieser Befehl erfordert die IRCop-Berechtigung: nickserv.rename

    Syntax: RENAME <nickname>
    Beispiel: RENAME Störenfried
  not_online:        "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht verbunden."
  cannot_rename_root: "\x0304✗\x03 Root-Benutzer \x02%nickname%\x02 kann nicht umbenannt werden."
  cannot_rename_oper: "\x0304✗\x03 IRC-Operator \x02%nickname%\x02 kann nicht umbenannt werden."
  cannot_rename_service: "\x0304✗\x03 Service-Nickname \x02%nickname%\x02 kann nicht umbenannt werden."
  success:           "\x0303✓\x03 Nickname \x02%nickname%\x02 wurde in \x02%new_nick%\x02 umbenannt."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <nickname> [FORCE]"
  short:            "Einen registrierten Nickname löschen."
  help:             |
    Löscht einen registrierten Nickname aus der Datenbank.
    Diese Aktion kann nicht rückgängig gemacht werden.

    Wenn der Benutzer online ist, wird er in einen Gast-Nickname umbenannt.
    Root-Benutzer und IRC-Operatoren können nicht gelöscht werden.
    Sie können Ihren eigenen Nickname nicht löschen.

    Dieser Befehl erfordert die IRCop-Berechtigung: nickserv.drop

    Syntax: DROP <nickname>
    Beispiel: DROP AlterAccount
  not_registered:     "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht registriert."
  suspended:         "\x0304✗\x03 Nickname \x02%nickname%\x02 ist suspendiert. Zuerst entsuspendieren."
  forbidden:         "\x0304✗\x03 Nickname \x02%nickname%\x02 ist gesperrt."
  cannot_drop_root:   "\x0304✗\x03 Root-Benutzer \x02%nickname%\x02 kann nicht gelöscht werden."
  cannot_drop_oper:   "\x0304✗\x03 IRC-Operator \x02%nickname%\x02 kann nicht gelöscht werden."
  cannot_drop_self:    "\x0304✗\x03 Sie können Ihren eigenen Nickname nicht löschen."
  success:            "\x0303✓\x03 Nickname \x02%nickname%\x02 wurde zur Löschung markiert und kann während der Gnadenfrist wiederhergestellt werden."
  force_success:      "\x0303✓\x03 Nickname \x02%nickname%\x02 wurde endgültig gelöscht."
  pending_deletion:   "\x0304✗\x03 Nickname \x02%nickname%\x02 ist bereits zur Löschung vorgemerkt. Verwenden Sie DROP <nickname> FORCE, um ihn dauerhaft zu löschen."
  cannot_drop_service: "\x0304✗\x03 Service-Nickname \x02%nickname%\x02 kann nicht gelöscht werden."

# --- RESTORE (IRCop) -----------------------------------------------------------
restore:
  syntax:           "RESTORE <nickname>"
  short:            "Einen zur Löschung anstehenden Nickname wiederherstellen."
  help:             "Stellt einen Nickname wieder her, der manuell gelöscht wurde und sich noch in der Gnadenfrist befindet. Erfordert IRCop-Berechtigung: nickserv.restore."
  success:          "\x0303✓\x03 Nickname \x02%nickname%\x02 wurde wiederhergestellt."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht registriert."
  not_pending_deletion: "\x0304✗\x03 Nickname \x02%nickname%\x02 steht nicht zur Löschung an."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <nickname> <Grund>"
  short:            "Einen Nickname dauerhaft für die Nutzung sperren."
  help:             |
    Verbietet die Nutzung eines Nicknames im Netzwerk.
    Der Nickname kann von niemandem registriert oder verwendet werden.

    Wenn der Nickname derzeit registriert ist, wird er zuerst gelöscht.
    Wenn jemand ihn verwendet, wird er gezwungen, zu einem Gast-Nickname zu wechseln.

    Root-Benutzer, IRC-Operatoren und Service-Nicknames können nicht gesperrt werden.

    Dieser Befehl erfordert die IRCop-Berechtigung: nickserv.forbid

    Syntax: FORBID <nickname> <Grund>
    Beispiel: FORBID SchlechterNick Wiederholte Richtlinienverstöße
  success:            "\x0303✔\x03 Nickname \x02%nickname%\x02 wurde gesperrt."
  updated:            "\x0303✔\x03 Sperrgrund für \x02%nickname%\x02 wurde aktualisiert."
  reason_required:    "\x0304✗\x03 Sie müssen einen Grund für die Sperrung angeben."
  cannot_forbid_root:  "\x0304✗\x03 Root-Benutzer \x02%nickname%\x02 kann nicht gesperrt werden."
  cannot_forbid_oper:  "\x0304✗\x03 IRC-Operator \x02%nickname%\x02 kann nicht gesperrt werden."
  cannot_forbid_service: "\x0304✗\x03 Service-Nickname \x02%nickname%\x02 kann nicht gesperrt werden."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <nickname>"
  short:            "Eine Nickname-Sperrung aufheben."
  help:             |
    Hebt eine Nickname-Sperrung auf, sodass der Nickname wieder verwendet werden kann.

    Dieser Befehl erfordert die IRCop-Berechtigung: nickserv.forbid

    Syntax: UNFORBID <nickname>
    Beispiel: UNFORBID EinNick
  success:          "\x0303✔\x03 Nickname \x02%nickname%\x02 ist nicht mehr gesperrt."
  not_forbidden:    "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht gesperrt."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST {ADD|DEL|LIST} [Muster]"
  short:            "Gesperrte VHost-Muster verwalten."
  help:             |
    Verwaltet Muster, die Benutzer daran hindern, übereinstimmende VHosts
    via NickServ SET VHOST festzulegen.

    Platzhalter: * entspricht einer beliebigen Sequenz, ? einem einzelnen Zeichen.
    Beispiel: *.raubkopien.de sperrt jeden VHost, der auf .raubkopien.de endet.

    Dieser Befehl erfordert die IRCop-Berechtigung: nickserv.forbidvhost

    Unterbefehle:
      ADD <Muster>    Ein gesperrtes Muster hinzufügen
      DEL <Muster>    Ein gesperrtes Muster entfernen
      LIST            Alle gesperrten Muster anzeigen

  unknown_sub: "\x0304✗\x03 Unbekannter Unterbefehl \x02%sub%\x02. Verwenden Sie ADD, DEL oder LIST."

  add:
    syntax:      "FORBIDVHOST ADD <Muster>"
    short:       "Ein gesperrtes VHost-Muster hinzufügen."
    help:        |
      Fügt ein Muster zur gesperrten VHost-Liste hinzu. Benutzer können
      keine VHosts setzen, die diesem Muster via SET VHOST entsprechen.

      Platzhalter: * entspricht einer beliebigen Sequenz, ? einem einzelnen Zeichen.

      Syntax: FORBIDVHOST ADD <Muster>
      Beispiel: FORBIDVHOST ADD *.raubkopien.de
    done:            "\x0303✓\x03 Gesperrtes VHost-Muster hinzugefügt: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 Muster \x02%pattern%\x02 existiert bereits."
    invalid:          "\x0304✗\x03 Ungültiges VHost-Muster-Format."

  del:
    syntax:      "FORBIDVHOST DEL <Muster>"
    short:       "Ein gesperrtes VHost-Muster entfernen."
    help:        |
      Entfernt ein Muster aus der gesperrten VHost-Liste.

      Syntax: FORBIDVHOST DEL <Muster>
      Beispiel: FORBIDVHOST DEL *.raubkopien.de
    done:        "\x0303✓\x03 Gesperrtes VHost-Muster entfernt: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 Muster \x02%pattern%\x02 nicht gefunden."

  list:
    short:       "Alle gesperrten VHost-Muster auflisten."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Zeigt alle gesperrten VHost-Muster an.

      Syntax: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Gesperrte VHost-Muster (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — von %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 Keine gesperrten VHost-Muster."
    unknown_creator: "unbekannt"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <nickname> {ADD|DEL|VIEW|CLEAR}"
  short:            "Nickname-Aktionsverlauf anzeigen oder verwalten."
  help:             |
    Verwaltet den Aktionsverlauf für einen Nickname.
    Nur IRCops mit der Berechtigung 'nickserv.history' können diesen Befehl verwenden.

    Automatisch aufgezeichnete Aktionen:
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Syntax: HISTORY <nickname> ADD <Nachricht>
            HISTORY <nickname> DEL <id>
            HISTORY <nickname> VIEW [PAGE|ALL]
            HISTORY <nickname> CLEAR

    Beispiele:
      HISTORY EinNick VIEW
      HISTORY EinNick ADD Manuelle Notiz über diesen Benutzer
      HISTORY EinNick VIEW 2
      HISTORY EinNick VIEW ALL
      HISTORY EinNick DEL 123
      HISTORY EinNick CLEAR

    Verwenden Sie VIEW, um den Verlauf zu sehen (zeigt standardmäßig 3 Einträge).
    Verwenden Sie VIEW PAGE 2, um die nächste Seite zu sehen.
    Verwenden Sie VIEW ALL, um den vollständigen Verlauf zu sehen.
    Verwenden Sie ADD, um einen manuellen Eintrag hinzuzufügen.
    Verwenden Sie DEL, um einen bestimmten Eintrag anhand der ID zu löschen.
    Verwenden Sie CLEAR, um alle Verlaufseinträge zu löschen.
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht registriert."
  unknown_operator: "(unbekannt)"

  add:
    syntax:     "HISTORY <nickname> ADD <Nachricht>"
    short:      "Einen manuellen Verlaufseintrag hinzufügen."
    help:        |
      Fügt einen manuellen Eintrag zum Nickname-Verlauf hinzu.

      Syntax: HISTORY <nickname> ADD <Nachricht>
      Beispiel: HISTORY EinNick ADD Benutzer wurde wegen Spam gemeldet
    success:    "\x0303✔\x03 Verlaufseintrag für \x02%nickname%\x02 hinzugefügt."

  del:
    syntax:     "HISTORY <nickname> DEL <id>"
    short:      "Einen Verlaufseintrag anhand der ID löschen."
    help:        |
      Löscht einen bestimmten Verlaufseintrag anhand seiner ID.

      Syntax: HISTORY <nickname> DEL <id>
      Beispiel: HISTORY EinNick DEL 42
    success:    "\x0303✔\x03 Verlaufseintrag \x02%id%\x02 gelöscht."
    not_found:  "\x0304✗\x03 Verlaufseintrag \x02%id%\x02 nicht gefunden."
    invalid_id: "\x0304✗\x03 Ungültige Eintrags-ID: \x02%id%\x02."

  view:
    syntax:     "HISTORY <nickname> VIEW [PAGE|ALL]"
    short:      "Nickname-Aktionsverlauf anzeigen."
    help:        |
      Zeigt den Aktionsverlauf des Nicknames an.

      Syntax: HISTORY <nickname> VIEW
              HISTORY <nickname> VIEW PAGE
              HISTORY <nickname> VIEW ALL

      Standardmäßig werden 3 Einträge gleichzeitig angezeigt.
      Verwenden Sie VIEW 2, um die zweite Seite zu sehen.
      Verwenden Sie VIEW ALL, um den vollständigen Verlauf zu sehen.
    header:     "\x02Verlauf für \x0307%nickname%\x03\x02 (zeigt %start%-%end% von %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 von %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Keine Verlaufseinträge für \x02%nickname%\x02 gefunden."
    page_hint:   "Verwenden Sie \x0303HISTORY %nickname% VIEW %next_page%\x03 für weitere Einträge."

  clear:
    syntax:     "HISTORY <nickname> CLEAR"
    short:      "Alle Verlaufseinträge für einen Nickname löschen."
    help:        |
      Entfernt alle Verlaufseinträge für den angegebenen Nickname.
      Diese Aktion kann nicht rückgängig gemacht werden.

      Syntax: HISTORY <nickname> CLEAR
      Beispiel: HISTORY EinNick CLEAR
    success:    "\x0303✔\x03 \x02%count%\x02 Verlaufseinträge für \x02%nickname%\x02 gelöscht."

