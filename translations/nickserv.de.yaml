  pending_deletion_at: "  \x0314Gelöscht\x03               : %date%"
  pending_deletion_until: "  \x0314Endgültig am\x03           : %date%"
  pending_deletion_notice: "  \x0307Dieser Nickname steht zur Löschung an und kann nicht registriert werden.\x03"
  footer:           "\x0314─────────────────────────────\x03"
  channels_header:  "\x0314\x0AChannels mit Zugriff:\x03"
  channels_entry_founder:   "  %channel% (\x0303Founder\x03)"
  channels_entry_successor: "  %channel% (\x0303Successor\x03)"
  channels_entry_access:    "  %channel% (%level%)"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <Option> <Wert>"
  short:            "Ihre %nickserv%-Nickname-Einstellungen ändern."
  help:             "Ändert Ihre %nickserv%-Nickname-Einstellungen.\nSie müssen identifiziert sein, um diesen Befehl zu verwenden."
  unknown_option:   "\x0304✗\x03 Unbekannte Option \x02%option%\x02. Verfügbare Optionen: %options%."

  password:
    syntax:         "SET PASSWORD <neues_passwort>"
    short:          "Ihr Nickname-Passwort ändern."
    help:           "Ändert das Passwort für Ihren NickServ-Nickname. Das neue Passwort wird\nsofort wirksam. Wählen Sie ein starkes Passwort mit mindestens 6 Zeichen,\ndas Sie nicht bei anderen Diensten verwenden."
    success:        "\x0303✔\x03 Ihr Passwort wurde erfolgreich aktualisiert."

  email:
    syntax:         "SET EMAIL <neue_e-mail> [Token]"
    short:          "Die mit Ihrem Nickname verknüpfte E-Mail-Adresse ändern (zweistufige Bestätigung)."
    help:           "E-Mail-Änderung in zwei Schritten aus Sicherheitsgründen.\n1) \x0303SET EMAIL <neue_e-mail>\x03 — ein Token wird an Ihre aktuelle E-Mail gesendet.\n2) \x0303SET EMAIL <neue_e-mail> <Token>\x03 — mit dem erhaltenen Token bestätigen.\nDas Token läuft in 1 Stunde ab."
    success:        "\x0303✔\x03 Ihre E-Mail wurde auf \x02%email%\x02 aktualisiert."
    pending_sent:   "\x0307→\x03 Ein Bestätigungs-Token wurde an \x02%current_email%\x02 gesendet.\n  Um die Änderung auf \x02%new_email%\x02 zu bestätigen, führen Sie aus:\n  \x0303/msg %bot% SET EMAIL %new_email% <Token>\x03\n  Das Token läuft in 1 Stunde ab."
    invalid_token:  "\x0304✗\x03 Das Token ist ungültig oder abgelaufen. Fordern Sie ein neues mit \x0303SET EMAIL <neue_e-mail>\x03 an."

  language:
    syntax:         "SET LANGUAGE <Code>"
    short:          "Die Sprache ändern, in der die Services mit Ihnen kommunizieren."
    help:           "Ändert die Sprache, die %nickserv% und andere Services verwenden, wenn sie\nmit Ihnen sprechen.\nVerfügbare Sprachen:\n  \x02ca\x02 (Katalanisch)\n  \x02de\x02 (Deutsch)\n  \x02el\x02 (Griechisch)\n  \x02en\x02 (Englisch)\n  \x02es\x02 (Spanisch)\n  \x02eu\x02 (Baskisch)\n  \x02fr\x02 (Französisch)\n  \x02gl\x02 (Galicisch)\n  \x02it\x02 (Italienisch)\n  \x02nl\x02 (Niederländisch)\n  \x02pl\x02 (Polnisch)\n  \x02pt\x02 (Portugiesisch)\n  \x02ro\x02 (Rumänisch)\n  \x02tr\x02 (Türkisch)"
    success:        "\x0303✔\x03 Sprache auf \x02%language%\x02 geändert."
    invalid:        "\x0304✗\x03 Nicht unterstützte Sprache. Verfügbare Sprachen: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <Zeitzone>"
    short:          "Die Zeitzone für die Datumsanzeige festlegen."
    help:           "Legt die Zeitzone fest, die %nickserv% bei der Datumsanzeige verwendet.\nVerwenden Sie \x02HELP SET TIMEZONE\x02 für den Regionsindex; \x02HELP SET TIMEZONE <Region>\x02 (z. B. Europe) für Zeitzonen dieser Region. Verwenden Sie \x02OFF\x02 zum Löschen."
    success:        "\x0303✔\x03 Zeitzone auf \x02%timezone%\x02 gesetzt. Daten werden in dieser Zeitzone angezeigt."
    cleared:        "\x0303✔\x03 Zeitzone gelöscht. Daten verwenden die Netzwerk-Standardeinstellung."
    invalid:        "\x0304✗\x03 Ungültige Zeitzone \x02%timezone%\x02. Verwenden Sie eine gültige Kennung (z. B. UTC, Europe/Berlin)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Privatsphäre für Ihre Nickname-Informationen aktivieren oder deaktivieren."
    help:           "Steuert die Sichtbarkeit Ihrer Nickname-Informationen im INFO-Befehl.\nMit \x02PRIVATE ON\x02 können nur Sie und IRC-Operatoren Ihre Details einsehen.\nMit \x02PRIVATE OFF\x02 sind Ihre Informationen für jeden öffentlich."
    on:             "\x0303✔\x03 Ihre Nickname-Informationen sind jetzt \x02privat\x02."
    off:            "\x0303✔\x03 Ihre Nickname-Informationen sind jetzt \x02öffentlich\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "PRIVMSG (ON) oder NOTICE (OFF) für Service-Antworten verwenden."
    help:           "Steuert, wie %nickserv% und andere Services Nachrichten an Sie senden.\nMit \x02MSG ON\x02 werden Antworten als \x02PRIVMSG\x02 gesendet (manche Clients können\nAntworten oder Benachrichtigungen auslösen).\nMit \x02MSG OFF\x02 werden Antworten als \x02NOTICE\x02 gesendet (Standard; normalerweise\nkeine automatische Antwort)."
    on:             "\x0303✔\x03 Service-Nachrichten werden jetzt als \x02PRIVMSG\x02 gesendet."
    off:            "\x0303✔\x03 Service-Nachrichten werden jetzt als \x02NOTICE\x02 gesendet."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Ihren eigenen virtuellen Host (angezeigter Hostname) setzen oder löschen."
    help:           "Legt einen benutzerdefinierten Hostnamen fest, den andere sehen, wenn Sie\nidentifiziert sind.\nVerwenden Sie \x02SET VHOST OFF\x02 zum Löschen. Nur Buchstaben (a-z, A-Z), Ziffern,\nBindestrich und Punkt; kein Bindestrich oder Punkt am Anfang/Ende eines Blocks;\nmax. 48 Zeichen. Eindeutig pro Nickname."
    success:        "\x0303✔\x03 Ihr virtueller Host wurde auf \x02%vhost%\x02 gesetzt."
    cleared:        "\x0303✔\x03 Ihr virtueller Host wurde gelöscht."
    invalid:        "\x0304✗\x03 Ungültiger VHost. Nur Buchstaben, Ziffern, Bindestrich und Punkt (nicht am\nAnfang/Ende eines Blocks); max. 48 Zeichen."
    taken:          "\x0304✗\x03 Dieser VHost wird bereits von einem anderen Nickname verwendet."
    forced:         "\x0304✗\x03 Ihr VHost wird automatisch konfiguriert und kann nicht mit SET VHOST geändert werden."

# --- SASET (IRCop) --------------------------------------------------------------
saset:
  syntax:           "SASET <Nickname> <Option> <Wert>"
  short:            "Einstellungen eines anderen Nicknames ändern."
  help:             |
    Ermöglicht einem IRC-Operator die Einstellungen eines registrierten Nicknames zu ändern.
    Der Ziel-Nickname darf kein Root-Benutzer, IRC-Operator oder Service-Nickname sein.

    Verfügbare Optionen: PASSWORD, EMAIL, LANGUAGE, TIMEZONE, PRIVATE, MSG, VHOST

    SASET PASSWORD: Ändert das Passwort direkt (ohne E-Mail-Bestätigung).
    SASET EMAIL: Ändert die E-Mail direkt (ohne Token-Validierung).

    Dieser Befehl erfordert IRCop-Berechtigung: nickserv.saset

    Syntax: SASET <Nickname> <Option> <Wert>
    Beispiel: SASET Benutzer PASSWORD neuespass
  unknown_option:   "\x0304✗\x03 Unbekannte Option \x02%option%\x02. Verfügbare Optionen: %options%."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht registriert."
  cannot_modify_oper: "\x0304✗\x03 Kann Nickname eines IRC-Operators nicht ändern."

  password:
    syntax:         "SASET <Nickname> PASSWORD <neues_Passwort>"
    short:          "Passwort eines Nicknames ändern."
    help:           "Ändert das Passwort eines anderen Nicknames.\nDie Änderung ist sofort wirksam.\n\nSyntax: SASET <Nickname> PASSWORD <neues_Passwort>\nBeispiel: SASET Benutzer PASSWORD neuespass123"
    success:        "\x0303✔\x03 Das Passwort von \x02%nickname%\x02 wurde aktualisiert."

  email:
    syntax:         "SASET <Nickname> EMAIL <neue_E-Mail>"
    short:          "E-Mail eines Nicknames ändern."
    help:           "Ändert die E-Mail eines anderen Nicknames.\nEs wird keine Bestätigung gesendet—die Änderung ist sofort wirksam.\n\nSyntax: SASET <Nickname> EMAIL <neue_E-Mail>\nBeispiel: SASET Benutzer EMAIL benutzer@beispiel.com"
    success:        "\x0303✔\x03 Die E-Mail von \x02%nickname%\x02 wurde auf \x02%email%\x02 aktualisiert."

  language:
    syntax:         "SASET <Nickname> LANGUAGE <Code>"
    short:          "Sprache eines Nicknames ändern."
    help:           "Ändert die Sprache eines anderen Nicknames.\nVerfügbare Sprachen: en (Englisch), es (Spanisch).\n\nSyntax: SASET <Nickname> LANGUAGE <Code>\nBeispiel: SASET Benutzer LANGUAGE de"
    success:        "\x0303✔\x03 Die Sprache von \x02%nickname%\x02 wurde auf \x02%language%\x02 geändert."

  timezone:
    syntax:         "SASET <Nickname> TIMEZONE <Zeitzone|OFF>"
    short:          "Zeitzone eines Nicknames ändern."
    help:           "Setzt oder löscht die Zeitzone eines anderen Nicknames.\nVerwenden Sie OFF zum Löschen.\n\nSyntax: SASET <Nickname> TIMEZONE <Zeitzone>\nBeispiel: SASET Benutzer TIMEZONE Europe/Berlin"
    success:        "\x0303✔\x03 Die Zeitzone von \x02%nickname%\x02 wurde auf \x02%timezone%\x02 gesetzt."
    cleared:        "\x0303✔\x03 Die Zeitzone von \x02%nickname%\x02 wurde gelöscht."
    invalid:        "\x0304✗\x03 Ungültige Zeitzone \x02%timezone%\x02."

  private:
    syntax:         "SASET <Nickname> PRIVATE {ON|OFF}"
    short:          "Privatsphäre eines Nicknames ändern."
    help:           "Aktiviert oder deaktiviert die Privatsphäre der Informationen eines anderen Nicknames.\n\nSyntax: SASET <Nickname> PRIVATE {ON|OFF}\nBeispiel: SASET Benutzer PRIVATE ON"
    on:             "\x0303✔\x03 Die Informationen von \x02%nickname%\x02 sind jetzt \x02privat\x02."
    off:            "\x0303✔\x03 Die Informationen von \x02%nickname%\x02 sind jetzt \x02öffentlich\x02."

  msg:
    syntax:         "SASET <Nickname> MSG {ON|OFF}"
    short:          "Nachrichtenpräferenz eines Nicknames ändern."
    help:           "Legt fest, ob ein anderer Nickname Antworten als PRIVMSG (ON) oder NOTICE (OFF) erhält.\n\nSyntax: SASET <Nickname> MSG {ON|OFF}\nBeispiel: SASET Benutzer MSG ON"
    on:             "\x0303✔\x03 \x02%nickname%\x02 erhält Nachrichten jetzt als \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 \x02%nickname%\x02 erhält Nachrichten jetzt als \x02NOTICE\x02."

  vhost:
    syntax:         "SASET <Nickname> VHOST <VHost|OFF>"
    short:          "Virtuellen Host eines Nicknames ändern."
