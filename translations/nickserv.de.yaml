# NickServ-Übersetzungen — Deutsch
# Domain: nickserv
#
# IRC-Formatierungscodes (innerhalb von doppelten Anführungszeichen \x##-Hex-Escapes verwenden):
#   \x02        Fett ein/aus
#   \x03NN      Farbe (DEZIMAL: 03=Grün, 04=Rot, 07=Orange, 14=Dunkelgrau)
#   \x03        Farbe zurücksetzen
#   \x0F        Alle Formatierung zurücksetzen
#
# HINWEIS: IRC-Farben verwenden DEZIMALE Zahlen (0-15), nicht hexadezimal.
#   \x0314 = Dunkelgrau (14 dezimal)  ← KORREKT
#   \x030F = Farbe 0 + Buchstabe "F"  ← FALSCH (0F ist hexadezimal, nicht dezimal)

unknown_command: "\x0304✗\x03 Unbekannter Befehl \x02%command%\x02. Verwenden Sie \x0303/msg %bot% HELP\x03."

error:
  syntax:            "\x0304✗\x03 Falsche Syntax. Verwendung: \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Dieser Befehl ist IRC-Operatoren vorbehalten."
  not_identified:    "\x0304✗\x03 Sie sind nicht identifiziert. Verwenden Sie \x0303/msg %bot% IDENTIFY <nickname> <Passwort>\x03"
  permission_denied: "\x0304✗\x03 Zugriff verweigert. Sie haben keinen Zugriff auf diesen Befehl."
  mail_failed:       "\x0304✗\x03 Die E-Mail konnte nicht gesendet werden. Überprüfen Sie Ihre Adresse oder versuchen Sie es später erneut."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <Passwort> <E-Mail>"
  short:            "Ihren Nickname bei den Services registrieren."
  help:             "Startet die Registrierung Ihres aktuellen Nicknames. Ein Verifizierungs-Token\nwird an die angegebene E-Mail-Adresse gesendet. Schließen Sie die Registrierung\nmit \x0303/msg %bot% VERIFY <Token>\x03 ab. Das Token läuft in 1 Stunde ab.\nWenn es nicht ankommt, prüfen Sie Ihren Spam-Ordner oder verwenden Sie \x0303RESEND\x03."
  pending:          "\x0307→\x03 Ein Verifizierungs-Token wurde an \x02%email%\x02 gesendet.\n  Führen Sie \x0303/msg %bot% VERIFY <Token>\x03 aus, um die Registrierung abzuschließen.\n  Nicht erhalten? Prüfen Sie Spam oder verwenden Sie \x0303/msg %bot% RESEND\x03\n  Das Token läuft in \x021 Stunde\x02 ab."
  already_registered: "\x0304✗\x03 Nickname \x02%nickname%\x02 ist bereits registriert."
  already_pending:  "\x0304✗\x03 Nickname \x02%nickname%\x02 hat bereits eine ausstehende Verifizierung.\n  Verwenden Sie \x0303/msg %bot% VERIFY <Token>\x03 oder \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 Nickname \x02%nickname%\x02 kann in diesem Netzwerk nicht registriert werden."
  pending_deletion: "\x0304✗\x03 Der Nickname \x02%nickname%\x02 steht zur Löschung an und kann nicht registriert werden."
  invalid_email:    "\x0304✗\x03 Die angegebene E-Mail-Adresse ist ungültig."
  email_already_used: "\x0304✗\x03 Die E-Mail \x02%email%\x02 wird bereits von einem anderen Nickname verwendet. Verwenden Sie eine andere Adresse."
  throttled:          "\x0304✗\x03 Sie müssen \x02%minutes%\x02 Minute(n) warten, bevor Sie es erneut mit der Registrierung versuchen."
  guest_prefix_forbidden: "\x0304✗\x03 Sie können keinen Nick registrieren, der mit \x02%prefix%\x02 beginnt."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <Token>"
  short:            "Ihre E-Mail-Adresse bestätigen und Ihren Nickname aktivieren."
  help:             "Schließt die Registrierung ab, indem das an Ihre E-Mail gesendete Token verifiziert wird.\nDas Token ist ab dem Zeitpunkt der Registrierung 1 Stunde lang gültig."
  success:          "\x0303✔\x03 Nickname \x02%nickname%\x02 wurde erfolgreich registriert und Sie sind jetzt identifiziert."
  invalid_token:    "\x0304✗\x03 Das Token ist ungültig oder abgelaufen. Verwenden Sie \x0303/msg %bot% REGISTER\x03, um neu zu beginnen."
  no_pending:       "\x0304✗\x03 Sie haben keine ausstehende Registrierung zur Verifizierung."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Das Verifizierungs-Token erneut an Ihre E-Mail senden."
  help:             "Sendet das Verifizierungs-Token erneut an die bei der Registrierung\nangegebene E-Mail-Adresse. Funktioniert nur bei einer ausstehenden Registrierung."
  success:          "\x0307→\x03 Verifizierungs-Token erneut an \x02%email%\x02 gesendet."
  no_pending:       "\x0304✗\x03 Sie haben keine ausstehende Registrierung, für die ein Token erneut gesendet werden kann."
  throttled:        "\x0304✗\x03 Sie müssen \x02%minutes%\x02 Minute(n) warten, bevor Sie eine weitere Verifizierungs-E-Mail anfordern."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <nickname> [Token]"
  short:            "Ihren Nickname wiederherstellen, wenn Sie Ihr Passwort verloren haben."
  help:             "Stellt den Zugriff auf einen registrierten Nickname wieder her, wenn Sie Ihr Passwort\nverloren haben.\n1) \x0303RECOVER <nickname>\x03 — ein Token wird an die E-Mail des Nicknames gesendet.\n2) \x0303RECOVER <nickname> <Token>\x03 — geben Sie das Token aus der E-Mail ein, um Ihr Passwort zurückzusetzen.\nSie erhalten dann ein temporäres Passwort und den Befehl, es zu ändern."
  email_sent:       "\x0307→\x03 Ein Wiederherstellungs-Token wurde an \x02%email_hint%\x02 gesendet. Prüfen Sie Ihren Posteingang (und Spam-Ordner)."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht registriert."
  pending:          "\x0304✗\x03 Nickname \x02%nickname%\x02 hat eine ausstehende E-Mail-Verifizierung."
  suspended:        "\x0304✗\x03 Nickname \x02%nickname%\x02 ist suspendiert. Grund: %reason%"
  forbidden:        "\x0304✗\x03 Nickname \x02%nickname%\x02 kann in diesem Netzwerk nicht verwendet werden."
  no_email:         "\x0304✗\x03 Für Nickname \x02%nickname%\x02 ist keine E-Mail hinterlegt. Wiederherstellung nicht verfügbar."
  throttled:        "\x0304✗\x03 Sie müssen \x02%minutes%\x02 Minute(n) warten, bevor Sie eine weitere Wiederherstellungs-E-Mail anfordern."
  invalid_token:    "\x0304✗\x03 Das Token ist ungültig oder abgelaufen. Fordern Sie ein neues mit \x0303RECOVER %nickname%\x03 an."
  success_identify: "\x0303✔\x03 Passwort zurückgesetzt. Identifizieren Sie sich jetzt: \x0303%identify_cmd%\x03"
  success_then_change: "Ändern Sie dann Ihr Passwort: \x0303/msg %bot% SET PASSWORD <neues_passwort>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <nickname> <Passwort>"
  short:            "Sich als Besitzer eines Nicknames identifizieren."
  help:             "Authentifiziert Ihre Sitzung bei %nickserv% mit Ihrem Nickname und Passwort.\nNach erfolgreicher Identifizierung erhalten Sie den registrierten Modus \x02+r\x02\nund, falls Sie einen Gast-Nick verwendet haben, wird Ihr registrierter Nick wiederhergestellt."
  success:          "\x0303✔\x03 Sie sind jetzt identifiziert als \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 Sie sind bereits identifiziert als \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht registriert."
  invalid_credentials: "\x0304✗\x03 Falsches Passwort. Bitte versuchen Sie es erneut."
  locked_out:         "\x0304✗\x03 Zu viele Fehlversuche. Versuchen Sie es in \x02%minutes%\x02 Minute(n) erneut."
  ghost_released:   "\x0307⚡\x03 Die Geister-Sitzung, die \x02%nickname%\x02 hielt, wurde getrennt."
  kill_reason:      "Nick %nickname% von %source% zurückgefordert (der registrierte Besitzer hat sich identifiziert)"
  pending:          "\x0304✗\x03 Nickname \x02%nickname%\x02 hat eine ausstehende E-Mail-Verifizierung.\n  Führen Sie \x0303/msg %bot% VERIFY <Token>\x03 oder \x0303/msg %bot% RESEND\x03 aus."
  suspended:        "\x0304✗\x03 Nickname \x02%nickname%\x02 ist suspendiert. Grund: %reason%"
  forbidden:        "\x0304✗\x03 Nickname \x02%nickname%\x02 kann in diesem Netzwerk nicht verwendet werden."
  pending_deletion: "\x0304✗\x03 Der Nickname \x02%nickname%\x02 steht zur Löschung an und kann nicht verwendet werden."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <nickname>"
  short:            "Den Registrierungsstatus eines Nicknames anzeigen."
  help:             "Zeigt den aktuellen Status eines Nicknames: registriert, ausstehende Verifizierung,\nsuspendiert oder gesperrt."
  header:           "\x02Status von Nick \x0307%nickname%\x03:\x02"
  unregistered:     "  Status          : Nicht registriert"
  not_registered_offline: "  Status          : \x0315Nicht registriert\x03"
  pending:          "  Status          : \x0307Ausstehende Verifizierung\x03"
  pending_expires:  "  Läuft ab in     : %minutes% Minute(n)"
  pending_expires_at: "  Läuft ab am     : %date%"
  not_connected:    "  Status          : \x0315Nicht verbunden\x03"
  not_identified:   "  Status          : \x0307Nicht identifiziert\x03"
  identified:       "  Status          : \x0303Identifiziert\x03"
  suspended:        "  Status          : \x0304Suspendiert\x03"
  suspended_reason: "  Grund           : %reason%"
  suspended_until:  "  Endet am        : %date%"
  suspended_permanent: "  Endet am        : Dauerhaft"
  forbidden:        "  Status          : \x0304Gesperrt\x03"
  forbidden_reason: "  Grund           : %reason%"
  pending_deletion:   "  \x0314Status\x03          : \x0307Löschung ausstehend\x03"
  pending_deletion_at: "  \x0314Gelöscht\x03        : %date%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <nickname>"
  short:            "Informationen über einen registrierten Nickname anzeigen."
  help:             "Zeigt Registrierungsdetails für einen Nickname: Registrierungsdatum,\nVerbindungsstatus, letzte Quit-Nachricht und E-Mail-Adresse. Die E-Mail\nist nur für den Besitzer sichtbar, wenn identifiziert. Mit PRIVATE ON\nkönnen nur der Besitzer und IRC-Operatoren die Informationen einsehen."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht registriert."
  private:          "\x0304✗\x03 Informationen zu Nickname \x02%nickname%\x02 sind privat."
  header:           "\x02Informationen für Nickname \x0307%nickname%\x03:\x02"
  status:           "  \x0314Status\x03                 : %status%"
  status_registered:  "\x0303Registriert\x03"
  status_suspended:   "\x0304Suspendiert\x03"
  status_forbidden:   "\x0304Gesperrt\x03"
  status_pending_deletion: "\x0307Löschung ausstehend\x03"
  status_pending_deletion_at:  "  \x0314Gelöscht\x03           : %date%"
  reason:           "  \x0314Grund\x03                  : %reason%"
  suspended_until:  "  \x0314Endet am\x03               : %date%"
  suspended_permanent: "  \x0314Endet am\x03               : Dauerhaft"
  registered_at:    "  \x0314Registriert\x03            : %date%"
  last_seen_online: "  \x0314Zuletzt gesehen\x03        : \x0303● JETZT ONLINE\x03"
  last_seen_at:     "  \x0314Zuletzt gesehen\x03        : %date%"
  last_seen_never:  "  \x0314Zuletzt gesehen\x03        : Nie"
