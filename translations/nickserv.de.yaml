    success:        "\x0303✔\x03 Der VHost von \x02%nickname%\x02 wurde auf \x02%vhost%\x02 gesetzt."
    cleared:        "\x0303✔\x03 Der VHost von \x02%nickname%\x02 wurde gelöscht."
