  ip:            "IP: %value%"
  host:          "Host: %value%"

# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <nickname> {ON|OFF}"
  short:            "Ablaufschutz für einen Nickname setzen oder entfernen."
  help:             |
    Steuert, ob ein Nickname aufgrund von Inaktivität abläuft.
    Bei ON läuft der Nickname unabhängig von der letzten Aktivität nie ab.
    Bei OFF gelten die normalen Ablaufregeln.

    Nur IRCops mit der Berechtigung 'nickserv.noexpire' können diesen Befehl verwenden.

    Syntax: NOEXPIRE <nickname> {ON|OFF}
    Beispiele:
      NOEXPIRE WichtigerBenutzer ON
      NOEXPIRE WichtigerBenutzer OFF
  success_on:       "\x0303✔\x03 Nickname \x02%nickname%\x02 ist jetzt vor Ablauf geschützt."
  success_off:      "\x0303✔\x03 Nickname \x02%nickname%\x02 läuft jetzt normal ab."
  not_registered:   "\x0304✗\x03 Nickname \x02%nickname%\x02 ist nicht registriert."
  forbidden:         "\x0304✗\x03 Nickname \x02%nickname%\x02 ist gesperrt."
  suspended:         "\x0304✗\x03 Nickname \x02%nickname%\x02 ist suspendiert."

