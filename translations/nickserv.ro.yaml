# NickServ translations — Romanian
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02        bold on/off
#   \x03NN      color (DECIMAL: 03=green, 04=red, 07=orange, 14=dark grey)
#   \x03        reset color
#   \x0F        reset all formatting
#
# NOTE: IRC colors use DECIMAL numbers (0-15), not hexadecimal.
#   \x0314 = dark grey (14 decimal)  ← CORRECT
#   \x030F = color 0 + letter "F"    ← WRONG (0F is hex, not decimal)

unknown_command: "\x0304✗\x03 Comandă necunoscută \x02%command%\x02. Folosiți \x0303/msg %bot% HELP\x03."

error:
  syntax:            "\x0304✗\x03 Sintaxă incorectă. Utilizare: \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Această comandă este rezervată operatorilor IRC."
  not_identified:    "\x0304✗\x03 Nu sunteți identificat. Folosiți \x0303/msg %bot% IDENTIFY <poreclă> <parolă>\x03"
  permission_denied: "\x0304✗\x03 Permisiune refuzată. Nu aveți acces la această comandă."
  mail_failed:       "\x0304✗\x03 E-mailul nu a putut fi trimis. Verificați adresa sau încercați mai târziu."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <parolă> <e-mail>"
  short:            "Înregistrați-vă porecla la servicii."
  help:             "Inițiază înregistrarea poreclei dumneavoastră actuale. Un token de verificare\nva fi trimis la adresa de e-mail furnizată. Finalizați înregistrarea\nexecutând \x0303/msg %bot% VERIFY <token>\x03. Tokenul expiră într-o oră.\nDacă nu sosește, verificați folderul de spam sau folosiți \x0303RESEND\x03."
  pending:          "\x0307→\x03 Un token de verificare a fost trimis la \x02%email%\x02.\n  Executați \x0303/msg %bot% VERIFY <token>\x03 pentru a finaliza înregistrarea.\n  Nu l-ați primit? Verificați spamul sau folosiți \x0303/msg %bot% RESEND\x03\n  Tokenul va expira în \x021 oră\x02."
  already_registered: "\x0304✗\x03 Porecla \x02%nickname%\x02 este deja înregistrată."
  already_pending:  "\x0304✗\x03 Porecla \x02%nickname%\x02 are deja o verificare în așteptare.\n  Folosiți \x0303/msg %bot% VERIFY <token>\x03 sau \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 Porecla \x02%nickname%\x02 nu poate fi înregistrată în această rețea."
  pending_deletion: "\x0304✗\x03 Porecla \x02%nickname%\x02 este în așteptare de ștergere și nu poate fi înregistrată."
  invalid_email:    "\x0304✗\x03 Adresa de e-mail furnizată nu este validă."
  email_already_used: "\x0304✗\x03 E-mailul \x02%email%\x02 este deja folosit de o altă poreclă. Folosiți o adresă diferită."
  throttled:          "\x0304✗\x03 Trebuie să așteptați \x02%minutes%\x02 minut(e) înainte de a încerca să vă înregistrați din nou."
  guest_prefix_forbidden: "\x0304✗\x03 Nu puteți înregistra o poreclă care începe cu \x02%prefix%\x02."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "Confirmați adresa de e-mail și activați-vă porecla."
  help:             "Finalizează înregistrarea prin verificarea tokenului trimis la e-mailul dumneavoastră.\nTokenul este valabil timp de 1 oră din momentul înregistrării."
  success:          "\x0303✔\x03 Porecla \x02%nickname%\x02 a fost înregistrată cu succes și acum sunteți identificat."
  invalid_token:    "\x0304✗\x03 Tokenul este invalid sau a expirat. Folosiți \x0303/msg %bot% REGISTER\x03 pentru a o lua de la capăt."
  no_pending:       "\x0304✗\x03 Nu aveți nicio înregistrare în așteptare de verificat."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Retrimiteți tokenul de verificare la e-mailul dumneavoastră."
  help:             "Retrimite tokenul de verificare la adresa de e-mail furnizată în timpul\nînregistrării. Funcționează doar dacă aveți o înregistrare în așteptare."
  success:          "\x0307→\x03 Tokenul de verificare a fost retrimis la \x02%email%\x02."
  no_pending:       "\x0304✗\x03 Nu aveți nicio înregistrare în așteptare pentru care să retrimiteți un token."
  throttled:        "\x0304✗\x03 Trebuie să așteptați \x02%minutes%\x02 minut(e) înainte de a solicita alt e-mail de verificare."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <poreclă> [token]"
  short:            "Recuperați-vă porecla dacă v-ați pierdut parola."
  help:             "Recuperează accesul la o poreclă înregistrată atunci când v-ați pierdut parola.\n1) \x0303RECOVER <poreclă>\x03 — se trimite un token la e-mailul poreclei.\n2) \x0303RECOVER <poreclă> <token>\x03 — introduceți tokenul din e-mail pentru a vă reseta parola.\nVeți primi apoi o parolă temporară și comanda pentru a o schimba."
  email_sent:       "\x0307→\x03 Un token de recuperare a fost trimis la \x02%email_hint%\x02. Verificați inboxul (și folderul de spam)."
  not_registered:   "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este înregistrată."
  pending:          "\x0304✗\x03 Porecla \x02%nickname%\x02 este în așteptarea verificării e-mailului."
  suspended:        "\x0304✗\x03 Porecla \x02%nickname%\x02 este suspendată. Motiv: %reason%"
  forbidden:        "\x0304✗\x03 Porecla \x02%nickname%\x02 nu poate fi folosită în această rețea."
  no_email:         "\x0304✗\x03 Nu este setat niciun e-mail pentru porecla \x02%nickname%\x02. Recuperarea nu este disponibilă."
  throttled:        "\x0304✗\x03 Trebuie să așteptați \x02%minutes%\x02 minut(e) înainte de a solicita alt e-mail de recuperare."
  invalid_token:    "\x0304✗\x03 Tokenul este invalid sau a expirat. Solicitați unul nou cu \x0303RECOVER %nickname%\x03."
  success_identify: "\x0303✔\x03 Parolă resetată. Identificați-vă acum: \x0303%identify_cmd%\x03"
  success_then_change: "Apoi schimbați-vă parola: \x0303/msg %bot% SET PASSWORD <parolă_nouă>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <poreclă> <parolă>"
  short:            "Identificați-vă ca proprietar al unei porecle."
  help:             "Autentifică sesiunea dumneavoastră cu %nickserv% folosind porecla și parola.\nDupă o identificare reușită veți primi modul înregistrat \x02+r\x02\nși, dacă foloseați o poreclă de oaspete, porecla dumneavoastră înregistrată va fi restaurată."
  success:          "\x0303✔\x03 Sunteți acum identificat ca \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 Sunteți deja identificat ca \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este înregistrată."
  invalid_credentials: "\x0304✗\x03 Parolă incorectă. Vă rugăm să încercați din nou."
  locked_out:         "\x0304✗\x03 Prea multe încercări eșuate. Încercați din nou peste \x02%minutes%\x02 minut(e)."
  ghost_released:   "\x0307⚡\x03 Sesiunea fantomă care deținea \x02%nickname%\x02 a fost deconectată."
  kill_reason:      "Porecla %nickname% revendicată de %source% (proprietarul înregistrat s-a identificat)"
  pending:          "\x0304✗\x03 Porecla \x02%nickname%\x02 este în așteptarea verificării e-mailului.\n  Executați \x0303/msg %bot% VERIFY <token>\x03 sau \x0303/msg %bot% RESEND\x03."
  suspended:        "\x0304✗\x03 Porecla \x02%nickname%\x02 este suspendată. Motiv: %reason%"
  forbidden:        "\x0304✗\x03 Porecla \x02%nickname%\x02 nu poate fi folosită în această rețea."
  pending_deletion: "\x0304✗\x03 Porecla \x02%nickname%\x02 este în așteptare de ștergere și nu poate fi folosită."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <poreclă>"
  short:            "Afișați starea de înregistrare a unei porecle."
  help:             "Afișează starea actuală a unei porecle: înregistrată, în așteptarea verificării,\nsuspendată sau interzisă."
  header:           "\x02Starea poreclei \x0307%nickname%\x03:\x02"
  unregistered:     "  Stare            : Neînregistrată"
  not_registered_offline: "  Stare            : \x0315Neînregistrată\x03"
  pending:          "  Stare            : \x0307În așteptarea verificării\x03"
  pending_expires:  "  Expiră în        : %minutes% minut(e)"
  pending_expires_at: "  Expiră la        : %date%"
  not_connected:    "  Stare            : \x0315Neconectat\x03"
  not_identified:   "  Stare            : \x0307Neidentificat\x03"
  identified:       "  Stare            : \x0303Identificat\x03"
  suspended:        "  Stare            : \x0304Suspendat\x03"
  suspended_reason: "  Motiv            : %reason%"
  suspended_until:  "  Se termină la    : %date%"
  suspended_permanent: "  Se termină la    : Permanent"
  forbidden:        "  Stare            : \x0304Interzis\x03"
  forbidden_reason: "  Motiv            : %reason%"
  footer:           "\x0314─────────────────────────────\x03"

