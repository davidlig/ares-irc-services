# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <poreclă> <durată> <motiv>"
  short:            "Suspendă o poreclă."
  help:             |
    Suspendă o poreclă, împiedicând proprietarul să se identifice.
    Suspendarea poate fi temporară sau permanentă.

    Formate de durată: \x0303%d\x03 (zile), \x0303%h\x03 (ore), \x0303%m\x03 (minute) sau \x03030\x03 (permanentă).

    Utilizatorii suspendați nu se pot identifica la porecla lor.
    Operatorii IRC și utilizatorii root nu pot fi suspendați.

    Sintaxă: SUSPEND <poreclă> <durată> <motiv>
    Exemple:
      SUSPEND UtilizatorRău 7d Spam în #help
      SUSPEND Abuziv 30d Flood repetat
      SUSPEND UtilizatorProblematic 0 Evitare interzicere permanentă
  success:            "\x0303✔\x03 Porecla \x02%nickname%\x02 a fost suspendată până la \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 Porecla \x02%nickname%\x02 este deja suspendată."
  not_registered:     "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este înregistrată."
  forbidden:          "\x0304✗\x03 Porecla \x02%nickname%\x02 este interzisă și nu poate fi suspendată."
  cannot_suspend_oper: "\x0304✗\x03 Nu se poate suspenda operatorul IRC \x02%nickname%\x02."
  cannot_suspend_root: "\x0304✗\x03 Nu se poate suspenda utilizatorul root \x02%nickname%\x02."
  cannot_suspend_service: "\x0304✗\x03 Nu se poate suspenda porecla de serviciu \x02%nickname%\x02."
  invalid_duration:   "\x0304✗\x03 Durată invalidă. Folosiți: \x0303<z><h><m>\x03 (de ex. 7d, 12h, 30m) sau \x03030\x03 pentru permanentă."
  permanent:          "permanentă"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <poreclă>"
  short:            "Eliminați suspendarea unei porecle."
  help:             |
    Elimină o suspendare activă a unei porecle, permițând proprietarului să se identifice din nou.

    Sintaxă: UNSUSPEND <poreclă>
    Exemplu: UNSUSPEND UnUtilizator
  success:          "\x0303✔\x03 Suspendarea a fost ridicată pentru \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este înregistrată."
  not_suspended:    "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este suspendată."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <poreclă>"
  short:            "Forțați redenumirea unei porecle conectate la o poreclă aleatorie."
  help:             |
    Forțează o poreclă conectată să își schimbe porecla într-una generată aleatoriu.
    Utilă pentru aplicarea politicilor rețelei fără a deconecta utilizatorul.

    Formatul noii porecle folosește prefixul de oaspete configurat (%prefix%).

    Această comandă necesită permisiunea IRCop: nickserv.rename

    Sintaxă: RENAME <poreclă>
    Exemplu: RENAME Problematic
  not_online:        "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este conectată."
  cannot_rename_root: "\x0304✗\x03 Nu se poate redenumi utilizatorul root \x02%nickname%\x02."
  cannot_rename_oper: "\x0304✗\x03 Nu se poate redenumi operatorul IRC \x02%nickname%\x02."
  cannot_rename_service: "\x0304✗\x03 Nu se poate redenumi porecla de serviciu \x02%nickname%\x02."
  success:           "\x0303✓\x03 Porecla \x02%nickname%\x02 a fost redenumită în \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <poreclă> [FORCE]"
  short:            "Eliminați o poreclă înregistrată."
  help:             |
    Elimină o poreclă înregistrată din baza de date.
    Această acțiune nu poate fi anulată.

    Dacă utilizatorul este online, va fi redenumit la o poreclă Guest-.
    Utilizatorii root și operatorii IRC nu pot fi eliminați.
    Nu vă puteți elimina propria poreclă.

    Această comandă necesită permisiunea IRCop: nickserv.drop

    Sintaxă: DROP <poreclă>
    Exemplu: DROP ContVechi
  not_registered:     "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este înregistrată."
  suspended:         "\x0304✗\x03 Porecla \x02%nickname%\x02 este suspendată. Anulați mai întâi suspendarea."
  forbidden:         "\x0304✗\x03 Porecla \x02%nickname%\x02 este interzisă."
  cannot_drop_root:   "\x0304✗\x03 Nu se poate elimina utilizatorul root \x02%nickname%\x02."
  cannot_drop_oper:   "\x0304✗\x03 Nu se poate elimina operatorul IRC \x02%nickname%\x02."
  cannot_drop_self:    "\x0304✗\x03 Nu vă puteți elimina propria poreclă."
  success:            "\x0303✓\x03 Porecla \x02%nickname%\x02 a fost marcată pentru ștergere și poate fi restaurată în perioada de grație."
  force_success:      "\x0303✓\x03 Porecla \x02%nickname%\x02 a fost ștearsă definitiv."
  pending_deletion:   "\x0304✗\x03 Porecla \x02%nickname%\x02 este deja în așteptare de ștergere. Folosiți DROP <poreclă> FORCE pentru a o șterge definitiv."
  cannot_drop_service: "\x0304✗\x03 Nu se poate elimina porecla de serviciu \x02%nickname%\x02."

# --- RESTORE (IRCop) -----------------------------------------------------------
restore:
  syntax:           "RESTORE <poreclă>"
  short:            "Restaurați o poreclă în așteptare de ștergere."
  help:             "Restaurează o poreclă care a fost ștearsă manual și se află încă în perioada de grație. Necesită permisiune IRCop: nickserv.restore."
  success:          "\x0303✓\x03 Porecla \x02%nickname%\x02 a fost restaurată."
  not_registered:   "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este înregistrată."
  not_pending_deletion: "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este în așteptare de ștergere."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <poreclă> <motiv>"
  short:            "Blocați permanent o poreclă de la a fi folosită."
  help:             |
    Interzice utilizarea unei porecle în rețea.
    Porecla nu poate fi înregistrată sau folosită de nimeni.

    Dacă porecla este înregistrată în prezent, va fi mai întâi eliminată.
    Dacă cineva o folosește, va fi forțat să se schimbe la o poreclă Guest-.

    Utilizatorii root, operatorii IRC și poreclele de serviciu nu pot fi interzise.

    Această comandă necesită permisiunea IRCop: nickserv.forbid

    Sintaxă: FORBID <poreclă> <motiv>
    Exemplu: FORBID PoreclaRea Încălcări repetate ale politicilor
  success:            "\x0303✔\x03 Porecla \x02%nickname%\x02 a fost interzisă."
  updated:            "\x0303✔\x03 Motivul interzicerii pentru \x02%nickname%\x02 a fost actualizat."
  reason_required:    "\x0304✗\x03 Trebuie să furnizați un motiv pentru interdicție."
  cannot_forbid_root:  "\x0304✗\x03 Nu se poate interzice utilizatorul root \x02%nickname%\x02."
  cannot_forbid_oper:  "\x0304✗\x03 Nu se poate interzice operatorul IRC \x02%nickname%\x02."
  cannot_forbid_service: "\x0304✗\x03 Nu se poate interzice porecla de serviciu \x02%nickname%\x02."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <poreclă>"
  short:            "Eliminați interdicția unei porecle."
  help:             |
    Elimină interdicția unei porecle, permițând ca porecla să fie folosită din nou.

    Această comandă necesită permisiunea IRCop: nickserv.forbid

    Sintaxă: UNFORBID <poreclă>
    Exemplu: UNFORBID OPoreclă
  success:          "\x0303✔\x03 Porecla \x02%nickname%\x02 nu mai este interzisă."
  not_forbidden:    "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este interzisă."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST {ADD|DEL|LIST} [model]"
  short:            "Gestionați modelele de vhost interzise."
  help:             |
    Gestionează modelele care împiedică utilizatorii să seteze vhosturi
    corespunzătoare prin NickServ SET VHOST.

    Metacaractere: * potrivește orice secvență, ? potrivește un singur caracter.
    Exemplu: *.pirated.com blochează orice vhost care se termină cu .pirated.com

    Această comandă necesită permisiunea IRCop: nickserv.forbidvhost

    Subcomenzi:
      ADD <model>    Adaugă un model interzis
      DEL <model>    Elimină un model interzis
      LIST           Afișează toate modelele interzise

  unknown_sub: "\x0304✗\x03 Subcomandă necunoscută \x02%sub%\x02. Folosiți ADD, DEL sau LIST."

  add:
    syntax:      "FORBIDVHOST ADD <model>"
    short:       "Adăugați un model de vhost interzis."
    help:        |
      Adaugă un model în lista de vhosturi interzise. Utilizatorii nu vor putea
      seta vhosturi care corespund acestui model prin SET VHOST.

      Metacaractere: * potrivește orice secvență, ? potrivește un singur caracter.

      Sintaxă: FORBIDVHOST ADD <model>
      Exemplu: FORBIDVHOST ADD *.pirated.com
    done:            "\x0303✓\x03 Model de vhost interzis adăugat: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 Modelul \x02%pattern%\x02 există deja."
    invalid:          "\x0304✗\x03 Format de model vhost invalid."

  del:
    syntax:      "FORBIDVHOST DEL <model>"
    short:       "Eliminați un model de vhost interzis."
    help:        |
      Elimină un model din lista de vhosturi interzise.

      Sintaxă: FORBIDVHOST DEL <model>
      Exemplu: FORBIDVHOST DEL *.pirated.com
    done:        "\x0303✓\x03 Model de vhost interzis eliminat: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 Modelul \x02%pattern%\x02 nu a fost găsit."

  list:
    short:       "Listați toate modelele de vhost interzise."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Afișează toate modelele de vhost interzise.

      Sintaxă: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Modele de vhost interzise (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — de %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 Nu există modele de vhost interzise."
    unknown_creator: "necunoscut"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <poreclă> {ADD|DEL|VIEW|CLEAR}"
  short:            "Vizualizați sau gestionați istoricul de acțiuni al poreclei."
  help:             |
    Gestionează istoricul de acțiuni pentru o poreclă.
    Doar IRCopii cu permisiunea 'nickserv.history' pot folosi această comandă.

    Acțiuni înregistrate automat:
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Sintaxă: HISTORY <poreclă> ADD <mesaj>
             HISTORY <poreclă> DEL <id>
             HISTORY <poreclă> VIEW [PAGINĂ|ALL]
             HISTORY <poreclă> CLEAR

    Exemple:
      HISTORY OPoreclă VIEW
      HISTORY OPoreclă ADD Notă manuală despre acest utilizator
      HISTORY OPoreclă VIEW 2
      HISTORY OPoreclă VIEW ALL
      HISTORY OPoreclă DEL 123
      HISTORY OPoreclă CLEAR

    Folosiți VIEW pentru a vedea istoricul (afișează 3 intrări în mod implicit).
    Folosiți VIEW PAGE 2 pentru a vedea pagina următoare.
    Folosiți VIEW ALL pentru a vedea istoricul complet.
    Folosiți ADD pentru a adăuga o intrare manuală.
    Folosiți DEL pentru a șterge o intrare specifică după ID.
    Folosiți CLEAR pentru a șterge toate intrările din istoric.
  not_registered:   "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este înregistrată."
  unknown_operator: "(necunoscut)"

  add:
    syntax:     "HISTORY <poreclă> ADD <mesaj>"
    short:      "Adăugați o intrare manuală în istoric."
    help:        |
      Adaugă o intrare manuală în istoricul poreclei.

      Sintaxă: HISTORY <poreclă> ADD <mesaj>
      Exemplu: HISTORY OPoreclă ADD Utilizator raportat pentru spam
    success:    "\x0303✔\x03 Intrare în istoric adăugată pentru \x02%nickname%\x02."

  del:
    syntax:     "HISTORY <poreclă> DEL <id>"
    short:      "Ștergeți o intrare din istoric după ID."
    help:        |
      Șterge o intrare specifică din istoric după ID-ul său.

      Sintaxă: HISTORY <poreclă> DEL <id>
      Exemplu: HISTORY OPoreclă DEL 42
    success:    "\x0303✔\x03 Intrarea din istoric \x02%id%\x02 a fost ștearsă."
    not_found:  "\x0304✗\x03 Intrarea din istoric \x02%id%\x02 nu a fost găsită."
    invalid_id: "\x0304✗\x03 ID de intrare invalid: \x02%id%\x02."

  view:
    syntax:     "HISTORY <poreclă> VIEW [PAGINĂ|ALL]"
    short:      "Vizualizați istoricul de acțiuni al poreclei."
    help:        |
      Afișează istoricul de acțiuni al poreclei.

      Sintaxă: HISTORY <poreclă> VIEW
               HISTORY <poreclă> VIEW PAGE
               HISTORY <poreclă> VIEW ALL

      În mod implicit afișează 3 intrări pe rând.
      Folosiți VIEW 2 pentru a vedea a doua pagină.
      Folosiți VIEW ALL pentru a vedea istoricul complet.
    header:     "\x02Istoric pentru \x0307%nickname%\x03\x02 (se afișează %start%-%end% din %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 de %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Nu s-au găsit intrări în istoric pentru \x02%nickname%\x02."
    page_hint:   "Folosiți \x0303HISTORY %nickname% VIEW %next_page%\x03 pentru mai multe intrări."

  clear:
    syntax:     "HISTORY <poreclă> CLEAR"
    short:      "Ștergeți toate intrările din istoricul unei porecle."
    help:        |
      Elimină toate intrările din istoric pentru porecla specificată.
      Această acțiune nu poate fi anulată.

      Sintaxă: HISTORY <poreclă> CLEAR
      Exemplu: HISTORY OPoreclă CLEAR
    success:    "\x0303✔\x03 S-au șters \x02%count%\x02 intrări din istoricul poreclei \x02%nickname%\x02."

