# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <poreclă> {ON|OFF}"
  short:            "Setați sau eliminați protecția împotriva expirării pentru o poreclă."
  help:             |
    Controlează dacă o poreclă va expira din cauza inactivității.
    Când este ON, porecla nu expiră niciodată, indiferent de ultima activitate.
    Când este OFF, se aplică regulile normale de expirare.

    Doar IRCopii cu permisiunea 'nickserv.noexpire' pot folosi această comandă.

    Sintaxă: NOEXPIRE <poreclă> {ON|OFF}
    Exemple:
      NOEXPIRE UtilizatorImportant ON
      NOEXPIRE UtilizatorImportant OFF
  success_on:       "\x0303✔\x03 Porecla \x02%nickname%\x02 este acum protejată împotriva expirării."
  success_off:      "\x0303✔\x03 Porecla \x02%nickname%\x02 va expira acum normal."
  not_registered:   "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este înregistrată."
  forbidden:         "\x0304✗\x03 Porecla \x02%nickname%\x02 este interzisă."
  suspended:         "\x0304✗\x03 Porecla \x02%nickname%\x02 este suspendată."

