info:
  syntax:           "INFO <poreclă>"
  short:            "Afișați informații despre o poreclă înregistrată."
  help:             "Afișează detaliile de înregistrare pentru o poreclă: data înregistrării, starea\nconexiunii, ultimul mesaj de ieșire și adresa de e-mail. E-mailul este vizibil doar\npentru proprietar când este identificat. Cu PRIVATE ON, doar proprietarul și\noperatorii IRC pot vizualiza informațiile."
  not_registered:   "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este înregistrată."
  private:          "\x0304✗\x03 Informațiile poreclei \x02%nickname%\x02 sunt private."
  header:           "\x02Informații pentru porecla \x0307%nickname%\x03:\x02"
  status:           "  \x0314Stare\x03                   : %status%"
