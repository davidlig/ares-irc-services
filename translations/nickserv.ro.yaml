  channels_entry_founder:   "  %channel% (\x0303Fondator\x03)"
  channels_entry_successor: "  %channel% (\x0303Succesor\x03)"
  channels_entry_access:    "  %channel% (%level%)"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <opțiune> <valoare>"
  short:            "Schimbați setările poreclei dumneavoastră %nickserv%."
  help:             "Modifică setările poreclei dumneavoastră %nickserv%.\nTrebuie să fiți identificat pentru a folosi această comandă."
  unknown_option:   "\x0304✗\x03 Opțiune necunoscută \x02%option%\x02. Opțiuni disponibile: %options%."

  password:
    syntax:         "SET PASSWORD <parolă_nouă>"
    short:          "Schimbați parola poreclei dumneavoastră."
    help:           "Schimbă parola pentru porecla dumneavoastră NickServ. Noua parolă intră în\nvigoare imediat. Alegeți o parolă puternică de cel puțin 6 caractere\npe care să nu o folosiți la alte servicii."
    success:        "\x0303✔\x03 Parola dumneavoastră a fost actualizată cu succes."

  email:
    syntax:         "SET EMAIL <e-mail_nou> [token]"
    short:          "Schimbați adresa de e-mail asociată poreclei dumneavoastră (confirmare în doi pași)."
    help:           "Schimbarea e-mailului în doi pași pentru securitate.\n1) \x0303SET EMAIL <e-mail_nou>\x03 — se trimite un token la e-mailul dumneavoastră actual.\n2) \x0303SET EMAIL <e-mail_nou> <token>\x03 — confirmați cu tokenul primit.\nTokenul expiră într-o oră."
    success:        "\x0303✔\x03 E-mailul dumneavoastră a fost actualizat la \x02%email%\x02."
    pending_sent:   "\x0307→\x03 Un token de confirmare a fost trimis la \x02%current_email%\x02.\n  Pentru a confirma schimbarea la \x02%new_email%\x02 executați:\n  \x0303/msg %bot% SET EMAIL %new_email% <token>\x03\n  Tokenul expiră într-o oră."
    invalid_token:  "\x0304✗\x03 Tokenul este invalid sau a expirat. Solicitați unul nou cu \x0303SET EMAIL <e-mail_nou>\x03."

  language:
    syntax:         "SET LANGUAGE <cod>"
    short:          "Schimbați limba pe care serviciile o folosesc pentru a comunica cu dumneavoastră."
    help:           "Schimbă limba pe care %nickserv% și celelalte servicii o folosesc când vă vorbesc.\nLimbi disponibile:\n  \x02ca\x02 (catalană)\n  \x02de\x02 (germană)\n  \x02el\x02 (greacă)\n  \x02en\x02 (engleză)\n  \x02es\x02 (spaniolă)\n  \x02eu\x02 (bască)\n  \x02fr\x02 (franceză)\n  \x02gl\x02 (galiciană)\n  \x02it\x02 (italiană)\n  \x02nl\x02 (olandeză)\n  \x02pl\x02 (poloneză)\n  \x02pt\x02 (portugheză)\n  \x02ro\x02 (română)\n  \x02tr\x02 (turcă)"
    success:        "\x0303✔\x03 Limba a fost schimbată în \x02%language%\x02."
    invalid:        "\x0304✗\x03 Limbă nesuportată. Limbi disponibile: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <fus_orar>"
    short:          "Setați fusul orar folosit la afișarea datelor."
    help:           "Setează fusul orar folosit atunci când %nickserv% afișează datele.\nFolosiți \x02HELP SET TIMEZONE\x02 pentru indexul regiunilor; \x02HELP SET TIMEZONE <regiune>\x02 (de ex. Europe) pentru fusurile orare ale acelei regiuni. Folosiți \x02OFF\x02 pentru a șterge."
    success:        "\x0303✔\x03 Fusul orar a fost setat la \x02%timezone%\x02. Datele vor fi afișate în acest fus orar."
    cleared:        "\x0303✔\x03 Fusul orar a fost șters. Datele vor folosi valoarea implicită a rețelei."
    invalid:        "\x0304✗\x03 Fus orar invalid \x02%timezone%\x02. Folosiți un identificator valid (de ex. UTC, Europe/București)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Activați sau dezactivați confidențialitatea informațiilor poreclei dumneavoastră."
    help:           "Controlează vizibilitatea informațiilor poreclei dumneavoastră în comanda INFO.\nCu \x02PRIVATE ON\x02 doar dumneavoastră și operatorii IRC puteți vizualiza detaliile.\nCu \x02PRIVATE OFF\x02 informațiile dumneavoastră sunt publice pentru toată lumea."
    on:             "\x0303✔\x03 Informațiile poreclei dumneavoastră sunt acum \x02private\x02."
    off:            "\x0303✔\x03 Informațiile poreclei dumneavoastră sunt acum \x02publice\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Folosiți PRIVMSG (ON) sau NOTICE (OFF) pentru răspunsurile serviciilor."
    help:           "Controlează modul în care %nickserv% și celelalte servicii vă trimit mesaje.\nCu \x02MSG ON\x02 răspunsurile sunt trimise ca \x02PRIVMSG\x02 (unii clienți pot declanșa răspunsuri automate sau notificări).\nCu \x02MSG OFF\x02 răspunsurile sunt trimise ca \x02NOTICE\x02 (implicit; de obicei fără răspuns automat)."
    on:             "\x0303✔\x03 Mesajele serviciilor vor fi trimise acum ca \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 Mesajele serviciilor vor fi trimise acum ca \x02NOTICE\x02."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Setați sau ștergeți gazda virtuală personalizată (hostname afișat)."
    help:           "Setează un hostname personalizat pe care ceilalți îl văd când sunteți identificat.\nFolosiți \x02SET VHOST OFF\x02 pentru a șterge. Doar litere (a-z, A-Z), cifre, cratimă și punct;\nfără cratimă sau punct la începutul/sfârșitul niciunui bloc; max 48 de caractere. Unic per poreclă."
    success:        "\x0303✔\x03 Gazda dumneavoastră virtuală a fost setată la \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 Gazda dumneavoastră virtuală a fost ștearsă."
    invalid:        "\x0304✗\x03 Vhost invalid. Doar litere, cifre, cratimă și punct (nu la începutul/sfârșitul blocului); max 48 de caractere."
    taken:          "\x0304✗\x03 Acel vhost este deja folosit de o altă poreclă."
    forced:         "\x0304✗\x03 Vhostul dumneavoastră este configurat automat și nu poate fi schimbat cu SET VHOST."

# --- SASET (IRCop) --------------------------------------------------------------
saset:
  syntax:           "SASET <poreclă> <opțiune> <valoare>"
  short:            "Modifică setările altei porecle."
  help:             |
    Permite unui operator IRC să modifice setările unei porecle înregistrate.
    Porecla țintă nu poate fi un utilizator root, un operator IRC sau un serviciu.

    Opțiuni disponibile: PASSWORD, EMAIL, LANGUAGE, TIMEZONE, PRIVATE, MSG, VHOST

    SASET PASSWORD: Schimbă parola direct (fără confirmare prin e-mail).
    SASET EMAIL: Schimbă e-mailul direct (fără validare token).

    Această comandă necesită permisiune IRCop: nickserv.saset

    Sintaxă: SASET <poreclă> <opțiune> <valoare>
    Exemplu: SASET Utilizator PASSWORD parolanouă
  unknown_option:   "\x0304✗\x03 Opțiune necunoscută \x02%option%\x02. Opțiuni disponibile: %options%."
  not_registered:   "\x0304✗\x03 Porecla \x02%nickname%\x02 nu este înregistrată."
  cannot_modify_oper: "\x0304✗\x03 Nu se poate modifica o poreclă de operator IRC."

  password:
    syntax:         "SASET <poreclă> PASSWORD <parolă_nouă>"
    short:          "Schimbă parola unei porecle."
    help:           "Schimbă parola altei porecle.\nSchimbarea este imediată.\n\nSintaxă: SASET <poreclă> PASSWORD <parolă_nouă>\nExemplu: SASET Utilizator PASSWORD parolanouă123"
    success:        "\x0303✔\x03 Parola \x02%nickname%\x02 a fost actualizată."

  email:
    syntax:         "SASET <poreclă> EMAIL <e-mail_nou>"
    short:          "Schimbă e-mailul unei porecle."
    help:           "Schimbă e-mailul altei porecle.\nNu se trimite nicio confirmare—schimbarea este imediată.\n\nSintaxă: SASET <poreclă> EMAIL <e-mail_nou>\nExemplu: SASET Utilizator EMAIL utilizator@exemplu.com"
    success:        "\x0303✔\x03 E-mailul \x02%nickname%\x02 a fost actualizat la \x02%email%\x02."

  language:
    syntax:         "SASET <poreclă> LANGUAGE <cod>"
    short:          "Schimbă limba unei porecle."
    help:           "Schimbă limba altei porecle.\nLimbi disponibile: en (engleză), es (spaniolă).\n\nSintaxă: SASET <poreclă> LANGUAGE <cod>\nExemplu: SASET Utilizator LANGUAGE ro"
    success:        "\x0303✔\x03 Limba \x02%nickname%\x02 a fost schimbată în \x02%language%\x02."

  timezone:
    syntax:         "SASET <poreclă> TIMEZONE <fus_orar|OFF>"
    short:          "Schimbă fusul orar al unei porecle."
    help:           "Setează sau șterge fusul orar al altei porecle.\nFolosiți OFF pentru a-l șterge.\n\nSintaxă: SASET <poreclă> TIMEZONE <fus_orar>\nExemplu: SASET Utilizator TIMEZONE Europe/București"
    success:        "\x0303✔\x03 Fusul orar al \x02%nickname%\x02 a fost setat la \x02%timezone%\x02."
    cleared:        "\x0303✔\x03 Fusul orar al \x02%nickname%\x02 a fost șters."
    invalid:        "\x0304✗\x03 Fus orar invalid \x02%timezone%\x02."

  private:
    syntax:         "SASET <poreclă> PRIVATE {ON|OFF}"
    short:          "Schimbă confidențialitatea unei porecle."
    help:           "Activează sau dezactivează confidențialitatea informațiilor altei porecle.\n\nSintaxă: SASET <poreclă> PRIVATE {ON|OFF}\nExemplu: SASET Utilizator PRIVATE ON"
    on:             "\x0303✔\x03 Informațiile \x02%nickname%\x02 sunt acum \x02private\x02."
    off:            "\x0303✔\x03 Informațiile \x02%nickname%\x02 sunt acum \x02publice\x02."

  msg:
    syntax:         "SASET <poreclă> MSG {ON|OFF}"
    short:          "Schimbă preferința de mesaje a unei porecle."
