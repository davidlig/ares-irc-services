    Określa czy kanał wygaśnie z powodu braku aktywności.
    Gdy ON, kanał nigdy nie wygasa niezależnie od ostatniej aktywności.
    Gdy OFF, obowiązują normalne zasady wygaśnięcia.

    Tylko IRCops z uprawnieniem 'chanserv.noexpire' mogą użyć tej komendy.

    Składnia: NOEXPIRE <#kanał> {ON|OFF}
    Przykłady:
      NOEXPIRE #Ważny ON
      NOEXPIRE #Ważny OFF
