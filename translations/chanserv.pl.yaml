# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#kanał>"
  short:            "Wyczyść całą listę dostępu kanału."
  help:             |
    Usuwa wszystkie wpisy dostępu z listy dostępu kanału.
    Ta akcja jest nieodwracalna i nie można jej cofnąć.
    Tylko IRCops z uprawnieniem 'chanserv.clearaccess' mogą użyć tej komendy.

    Składnia: CLEARACCESS <#kanał>
    Przykłady:
      CLEARACCESS #kanał
  success:          "\x0303✔\x03 Wyczyszczono \x02%count%\x02 wpisów dostępu z \x02%channel%\x02."
  empty:            "\x0307ℹ\x03 Kanał \x02%channel%\x02 nie ma wpisów dostępu."

clearusers:
  syntax:           "CLEARUSERS <#kanał> [powód]"
  short:            "Wyrzuć wszystkich użytkowników z kanału."
  help:             |
    Wyrzuca wszystkich użytkowników z podanego kanału.
    To komenda tylko dla IRCop używana do zarządzania kanałami.
    Opcjonalny powód może być podany; jeśli pominięty, używany jest domyślny powód.

    Tylko IRCops z uprawnieniem 'chanserv.clearusers' mogą użyć tej komendy.

    Składnia: CLEARUSERS <#kanał> [powód]
    Przykłady:
      CLEARUSERS #kanał
      CLEARUSERS #kanał zalewanie
  not_on_network:   "\x0304✗\x03 Kanał \x02%channel%\x02 obecnie nie jest w sieci."
  empty:            "\x0307ℹ\x03 Kanał \x02%channel%\x02 nie ma użytkowników do wyrzucenia."
  success:          "\x0303✔\x03 Wyrzucono \x02%count%\x02 użytkownika(ów) z \x02%channel%\x02."
  default_reason:   "Komenda CLEARUSERS"
