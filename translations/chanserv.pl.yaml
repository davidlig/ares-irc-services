# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#kanał> {ADD|DEL|VIEW|CLEAR}"
  short:            "Przeglądaj lub zarządzaj historią działań kanału."
  help:             |
    Zarządzaj historią działań dla kanału.
    Tylko IRCops z uprawnieniem 'chanserv.history' mogą użyć tej komendy.

    Podkomendy:
      ADD   — Dodaj ręczny wpis do historii kanału.
      DEL   — Usuń konkretny wpis według ID.
      VIEW  — Przeglądaj wpisy historii (stronicowane, 3 na stronę).
      CLEAR — Usuń wszystkie wpisy historii kanału.

    Składnia: HISTORY <#kanał> {ADD|DEL|VIEW|CLEAR} [argumenty]
    Przykłady:
      HISTORY #kanał VIEW
      HISTORY #kanał VIEW 2
      HISTORY #kanał VIEW ALL
      HISTORY #kanał ADD Podejrzana próba przejęcia
      HISTORY #kanał DEL 42
      HISTORY #kanał CLEAR
  not_registered:   "\x0304✗\x03 Kanał \x02%channel%\x02 nie jest zarejestrowany."
  unknown_operator: "(nieznany)"

  add:
    syntax:     "HISTORY <#kanał> ADD <wiadomość>"
    short:      "Dodaj ręczny wpis historii."
    help:        |
      Dodaje ręczny wpis do historii kanału.
    success:    "\x0303✔\x03 Wpis historii dodany dla \x02%channel%\x02."

  del:
    syntax:     "HISTORY <#kanał> DEL <id>"
    short:      "Usuń wpis historii według ID."
    success:    "\x0303✔\x03 Wpis historii \x02%id%\x02 usunięty."
    not_found:  "\x0304✗\x03 Wpis historii \x02%id%\x02 nie znaleziony."
    invalid_id: "\x0304✗\x03 Nieprawidłowe ID wpisu: \x02%id%\x02."

  view:
    syntax:     "HISTORY <#kanał> VIEW [PAGE|ALL]"
    short:      "Przeglądaj historię działań kanału."
    header:     "\x02Historia dla \x0307%channel%\x03\x02 (pokazuje %start%-%end% z %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 przez %operator% — %message%"
    extra:       "  Dodatkowo \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Brak wpisów historii dla \x02%channel%\x02."
    page_hint:   "Użyj \x0303HISTORY %channel% VIEW %next_page%\x03 aby zobaczyć więcej wpisów."

  clear:
    syntax:     "HISTORY <#kanał> CLEAR"
    short:      "Usuń wszystkie wpisy historii kanału."
    success:    "\x0303✔\x03 Wyczyszczono \x02%count%\x02 wpisów historii dla \x02%channel%\x02."

