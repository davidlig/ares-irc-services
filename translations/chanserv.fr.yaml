akick:
  syntax:           "AKICK <#canal> {ADD|DEL|LIST|ENFORCE} [masque] [expiration] [raison]"
  short:            "Gérer la liste d'auto-kick."
  help:             "ADD <masque> [expiration] [raison] : ajouter une entrée. DEL <masque|num> : supprimer. LIST : lister les entrées. ENFORCE <masque> : expulser les utilisateurs correspondants."
  unknown_sub:      "\x0304✗\x03 Sous-commande inconnue \x02%sub%\x02. Utilisez ADD, DEL, LIST ou ENFORCE."
  invalid_mask:     "\x0304✗\x03 Format de masque invalide. Utilisez \x02surnom!ident@hôte\x02 avec des jokers (*)."
  dangerous_mask:   "\x0304✗\x03 Le masque \x02%mask%\x02 est trop large. Il doit contenir au moins 4 caractères alphanumériques."
  protected_user:   "\x0304✗\x03 Le surnom \x02%nickname%\x02 a un accès dans ce canal."
  max_entries:      "\x0304✗\x03 Maximum %max% entrées AKICK par canal."
  add:
    syntax:         "AKICK <#canal> ADD <masque> [expiration] [raison]"
    short:          "Ajouter une entrée AKICK."
    help:           "Expiration obligatoire si la raison est spécifiée. Formats : 0 (permanent), 1j, 7j, 30j, 12h, 60m. Exemples : 'AKICK #c ADD *!*@* 0', 'AKICK #c ADD *!*@* 7j Spam'."
    done:           "\x0303✔\x03 AKICK \x02%mask%\x02 ajouté."
    already_exists: "\x0304✗\x03 AKICK \x02%mask%\x02 existe déjà."
    notice_channel: "\x02%from%\x02 ajoute AKICK : \x02%mask%\x02 (%reason%)"
  del:
    syntax:         "AKICK <#canal> DEL <masque|numéro>"
    short:          "Supprimer une entrée AKICK."
    help:           "Supprime par masque exact ou numéro d'entrée de LIST."
    not_found:      "\x0304✗\x03 AKICK \x02%mask%\x02 introuvable."
    done:           "\x0303✔\x03 AKICK \x02%mask%\x02 supprimé."
    notice_channel: "\x02%from%\x02 supprime AKICK : \x02%mask%\x02"
  list:
    syntax:         "AKICK <#canal> LIST"
    short:          "Lister les entrées AKICK."
    help:           "Affiche le masque, la raison, l'expiration et qui a ajouté."
    header:         "\x0303Liste AKICK pour \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 Le canal \x02%channel%\x02 n'a aucune entrée AKICK."
    entry:          "  #%index% %mask% %reason% (par %nickname%, expire : %expiration%)"
    no_reason:      "Aucune raison"
    never_expires:  "jamais"
    unknown_creator: "inconnu"

drop:
  syntax:           "DROP <#canal>"
  short:            "Abandonner un canal enregistré."
  help:             "Supprime un canal enregistré de la base de données."
  success:          "\x0303✔\x03 Le canal \x02%channel%\x02 a été abandonné."
  not_registered:   "\x0304✗\x03 Le canal \x02%channel%\x02 n'est pas enregistré."

suspend:
  syntax:           "SUSPEND <#canal> <durée> <raison>"
  short:            "Suspendre un canal."
  help:             "Désactive temporairement un canal enregistré. Formats de durée : 0 = permanent, 1j, 12h, 60m.\nPendant la suspension, les modes du canal, l'accès et l'application sont désactivés.\nCette commande nécessite la permission IRCop : chanserv.suspend"
  success:          "\x0303✔\x03 Le canal \x02%channel%\x02 a été suspendu jusqu'à \x02%duration%\x02."
  not_registered:   "\x0304✗\x03 Le canal \x02%channel%\x02 n'est pas enregistré."
  already_suspended: "\x0304✗\x03 Le canal \x02%channel%\x02 est déjà suspendu."
  invalid_duration:  "\x0304✗\x03 Durée invalide. Utilisez : 0 (permanent), 1j, 12h ou 60m."
  permanent:         "Permanent"
  channel_suspended: "\x0304✗\x03 Le canal \x02%channel%\x02 est suspendu et ne peut pas être utilisé."
  channel_forbidden: "\x0304✗\x03 Le canal \x02%channel%\x02 est interdit et ne peut pas être utilisé."
  notice_channel:    "\x0304⚠\x03 Le canal a été suspendu. Raison : %reason%"

unsuspend:
  syntax:           "UNSUSPEND <#canal>"
  short:            "Lever la suspension d'un canal."
  help:             "Réactive un canal suspendu, restaurant ses modes et l'application.\nCette commande nécessite la permission IRCop : chanserv.suspend"
  success:          "\x0303✔\x03 Le canal \x02%channel%\x02 n'est plus suspendu."
  not_registered:   "\x0304✗\x03 Le canal \x02%channel%\x02 n'est pas enregistré."
  not_suspended:    "\x0304✗\x03 Le canal \x02%channel%\x02 n'est pas suspendu."
  reason_expired:   "suspension expirée"

# Documentation NOJOIN pour LEVELS :
# NOJOIN : Niveau d'accès minimum requis pour rejoindre le canal. Les utilisateurs avec niveau < NOJOIN sont expulsés.
# Par défaut : -1 (désactivé). Définir à 0 pour n'autoriser que les utilisateurs enregistrés, 50 pour niveau 50+, etc.

nojoin:
  reason: "Restriction de niveau NOJOIN"

# --- DEBUG CHANNEL -----------------------------------------------------------
debug_channel:
  kick_reason: "Vous n'êtes pas autorisé à rejoindre ce canal."

permissions:
  chanserv.drop: "Abandonner un canal enregistré (DROP)"
  chanserv.suspend: "Suspendre ou lever la suspension d'un canal (SUSPEND/UNSUSPEND)"
  chanserv.forbid: "Interdire ou lever l'interdiction d'un canal (FORBID/UNFORBID)"
  chanserv.noexpire: "Définir ou retirer la protection contre l'expiration d'un canal (NOEXPIRE)"
  chanserv.history: "Consulter et gérer l'historique des actions du canal (HISTORY)"
  chanserv.clearaccess: "Vider toute la liste d'accès d'un canal (CLEARACCESS)"
  chanserv.clearusers: "Expulser tous les utilisateurs d'un canal (CLEARUSERS)"

noexpire:
  syntax:           "NOEXPIRE <#canal> {ON|OFF}"
  short:            "Définir ou retirer la protection contre l'expiration d'un canal."
  help:             |
    Contrôle si un canal expirera en raison de l'inactivité.
    Lorsque ON, le canal n'expire jamais, quelle que soit la dernière activité.
    Lorsque OFF, les règles normales d'expiration s'appliquent.

    Seuls les IRCops avec la permission 'chanserv.noexpire' peuvent utiliser cette commande.

    Syntaxe : NOEXPIRE <#canal> {ON|OFF}
    Exemples :
      NOEXPIRE #Important ON
      NOEXPIRE #Important OFF
  success_on:       "\x0303✔\x03 Le canal \x02%channel%\x02 est maintenant protégé contre l'expiration."
  success_off:      "\x0303✔\x03 Le canal \x02%channel%\x02 expirera maintenant normalement."
  not_registered:   "\x0304✗\x03 Le canal \x02%channel%\x02 n'est pas enregistré."
  forbidden:         "\x0304✗\x03 Le canal \x02%channel%\x02 est interdit."
  suspended:         "\x0304✗\x03 Le canal \x02%channel%\x02 est suspendu."

forbid:
  syntax:           "FORBID <#canal> <raison>"
  short:             "Interdire l'utilisation d'un canal."
  help:              "Empêche quiconque d'utiliser un canal.\nSi le canal est actuellement enregistré, il sera d'abord abandonné.\nTous les utilisateurs du canal seront expulsés et le canal sera verrouillé.\nCette commande nécessite la permission IRCop : chanserv.forbid"
  reason_required:  "\x0304✗\x03 Vous devez spécifier une raison."
  success:          "\x0303✔\x03 Le canal \x02%channel%\x02 a été interdit."
  updated:          "\x0303✔\x03 La raison d'interdiction du canal \x02%channel%\x02 a été mise à jour."
  channel_forbidden: "\x0304✗\x03 Le canal \x02%channel%\x02 est interdit et ne peut pas être utilisé."

unforbid:
  syntax:           "UNFORBID <#canal>"
  short:             "Lever l'interdiction d'un canal."
  help:              "Lève l'interdiction d'un canal, permettant de l'enregistrer à nouveau.\nCette commande nécessite la permission IRCop : chanserv.forbid"
  success:          "\x0303✔\x03 Le canal \x02%channel%\x02 n'est plus interdit."
  not_forbidden:    "\x0304✗\x03 Le canal \x02%channel%\x02 n'est pas interdit."

debug:
  action_message: "%operator% exécute la commande %command% sur %target%. %reason%"
  action_with_option: "%operator% exécute la commande %command% sur %target%. Option : %option%. %reason%"
  action_with_value: "%operator% exécute la commande %command% sur %target%. Option : %option%=%value%. %reason%"
  founder_action: "Action niveau-fondateur"
  prefix_reason:  "Raison : %reason%"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#canal> {ADD|DEL|VIEW|CLEAR}"
  short:            "Consulter ou gérer l'historique des actions du canal."
  help:             |
    Gère l'historique des actions d'un canal.
    Seuls les IRCops avec la permission 'chanserv.history' peuvent utiliser cette commande.

    Sous-commandes :
      ADD   — Ajouter une entrée manuelle à l'historique du canal.
      DEL   — Supprimer une entrée spécifique par ID.
      VIEW  — Afficher les entrées de l'historique (paginé, 3 par page).
      CLEAR — Supprimer toutes les entrées de l'historique du canal.

    Syntaxe : HISTORY <#canal> {ADD|DEL|VIEW|CLEAR} [arguments]
    Exemples :
      HISTORY #canal VIEW
      HISTORY #canal VIEW 2
      HISTORY #canal VIEW ALL
      HISTORY #canal ADD Tentative suspecte de prise de contrôle
      HISTORY #canal DEL 42
      HISTORY #canal CLEAR
  not_registered:   "\x0304✗\x03 Le canal \x02%channel%\x02 n'est pas enregistré."
  unknown_operator: "(inconnu)"

  add:
    syntax:     "HISTORY <#canal> ADD <message>"
    short:      "Ajouter une entrée manuelle à l'historique."
    help:        |
      Ajoute une entrée manuelle à l'historique du canal.
    success:    "\x0303✔\x03 Entrée d'historique ajoutée pour \x02%channel%\x02."

  del:
    syntax:     "HISTORY <#canal> DEL <id>"
    short:      "Supprimer une entrée d'historique par ID."
    success:    "\x0303✔\x03 Entrée d'historique \x02%id%\x02 supprimée."
    not_found:  "\x0304✗\x03 Entrée d'historique \x02%id%\x02 introuvable."
    invalid_id: "\x0304✗\x03 ID d'entrée invalide : \x02%id%\x02."

  view:
    syntax:     "HISTORY <#canal> VIEW [PAGE|ALL]"
    short:      "Afficher l'historique des actions du canal."
    header:     "\x02Historique pour \x0307%channel%\x03\x02 (affichage %start%-%end% sur %total%) :"
    entry:       "#%id% [%date%] \x0303%action%\x03 par %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Aucune entrée d'historique trouvée pour \x02%channel%\x02."
    page_hint:   "Utilisez \x0303HISTORY %channel% VIEW %next_page%\x03 pour plus d'entrées."

  clear:
    syntax:     "HISTORY <#canal> CLEAR"
    short:      "Supprimer toutes les entrées d'historique d'un canal."
    success:    "\x0303✔\x03 \x02%count%\x02 entrées d'historique effacées pour \x02%channel%\x02."

# --- Traductions des messages d'historique ---
history.message:
  unsuspend:                  "Suspension levée"
  founder_changed:            "Fondateur changé de %old_founder% à %new_founder%"
  successor_changed:          "Successeur changé de %old_successor% à %new_successor%"
  successor_cleared:          "Successeur effacé"
  access_add:                 "Accès ajouté pour %target_nickname% (niveau %level%)"
  access_del:                 "Accès retiré pour %target_nickname%"
  akick_add:                  "AKICK ajouté : %mask%"
  akick_del:                  "AKICK supprimé : %mask%"

# --- Traductions des champs extra d'historique ---
history.extra:
  duration:      "Durée : %value%"
  expires_at:    "Expire : %value%"
  old_founder:     "Ancien fondateur : %value%"
  new_founder:     "Nouveau fondateur : %value%"
  old_successor:   "Ancien successeur : %value%"
  new_successor:   "Nouveau successeur : %value%"
  target_nickname: "Cible : %value%"
  level:           "Niveau : %value%"
  mask:            "Masque : %value%"
  ip:            "IP : %value%"
  host:          "Hôte : %value%"

# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#canal>"
  short:            "Vider toute la liste d'accès d'un canal."
  help:             |
    Supprime toutes les entrées d'accès de la liste d'accès d'un canal.
    Cette action est irréversible et ne peut pas être annulée.
    Seuls les IRCops avec la permission 'chanserv.clearaccess' peuvent utiliser cette commande.

    Syntaxe : CLEARACCESS <#canal>
    Exemples :
      CLEARACCESS #canal
  success:          "\x0303✔\x03 \x02%count%\x02 entrées d'accès effacées de \x02%channel%\x02."
  empty:            "\x0307ℹ\x03 Le canal \x02%channel%\x02 n'a aucune entrée d'accès."

clearusers:
  syntax:           "CLEARUSERS <#canal> [raison]"
  short:            "Expulser tous les utilisateurs d'un canal."
  help:             |
    Expulse tous les utilisateurs du canal spécifié.
    C'est une commande réservée aux IRCops pour la gestion des canaux.
    Une raison optionnelle peut être fournie ; si omise, une raison par défaut est utilisée.

    Seuls les IRCops avec la permission 'chanserv.clearusers' peuvent utiliser cette commande.

    Syntaxe : CLEARUSERS <#canal> [raison]
    Exemples :
      CLEARUSERS #canal
      CLEARUSERS #canal flooding
  not_on_network:   "\x0304✗\x03 Le canal \x02%channel%\x02 n'est pas actuellement sur le réseau."
  empty:            "\x0307ℹ\x03 Le canal \x02%channel%\x02 n'a aucun utilisateur à expulser."
  success:          "\x0303✔\x03 \x02%count%\x02 utilisateur(s) expulsé(s) de \x02%channel%\x02."
  default_reason:   "Commande CLEARUSERS"
