  user_not_on_channel: "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas sur le réseau."
  notice_grant:     "\x0303✔\x03 \x0302%from%\x03 donne \x0304%mode%\x03 à \x0314%to%\x03"

deop:
