  ircop_header:     "\x02\x0314Commandes disponibles pour les IRCOPS :\x03\x0F"
  suboptions:       "Sous-options :"

op:
  syntax:           "OP <#canal> <surnom>"
  short:            "Donner le mode opérateur de canal."
  help:             "Donne le mode opérateur de canal."
