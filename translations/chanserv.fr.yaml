secure:
  requires_access: "\x0304✗\x03 Avec SECURE activé, \x02%nickname%\x02 doit être dans la liste d'accès pour recevoir un rang."
  requires_min_level: "\x0304✗\x03 Avec SECURE activé, \x02%nickname%\x02 doit avoir au moins le niveau \x02%level%\x02 pour recevoir \x02%mode%\x02."

set:
  syntax:           "SET <#canal> <option> [valeur]"
  short:            "Modifier les options du canal."
  help:             "Modifie les options du canal. Utilisez \x0303HELP SET <option>\x03 pour chacune : FOUNDER, SUCCESSOR, DESC, URL, EMAIL, ENTRYMSG, TOPICLOCK, MLOCK, SECURE."
  unknown_option:    "\x0304✗\x03 Option inconnue \x02%option%\x02. Utilisez l'une de : %options%."
  founder:
    syntax:         "SET <#canal> FOUNDER <surnom> [jeton]"
    short:          "Transférer le canal à un autre surnom enregistré."
    help:           "Sans jeton : envoie un jeton à l'e-mail du fondateur actuel. Avec jeton : finalise le transfert."
    token_sent:     "\x0303✔\x03 Un jeton de changement de fondateur a été envoyé à %email_hint%."
    invalid_token:  "\x0304✗\x03 Jeton invalide ou expiré."
    updated:        "\x0303✔\x03 Le fondateur a été changé en \x02%nickname%\x02."
    no_email:       "\x0304✗\x03 Le fondateur actuel n'a pas d'e-mail défini. Impossible d'envoyer le jeton."
    throttled:      "\x0304✗\x03 Veuillez patienter avant de demander un autre jeton."
    must_be_registered: "\x0304✗\x03 \x02%nickname%\x02 doit être enregistré et activé."
    suspended:         "\x0304✗\x03 \x02%nickname%\x02 est suspendu et ne peut pas être défini comme fondateur."
    cannot_be_self:   "\x0304✗\x03 Le nouveau fondateur ne peut pas être le fondateur actuel."
    cannot_be_successor: "\x0304✗\x03 Le nouveau fondateur ne peut pas être le successeur du canal."
    limit_exceeded: "\x0304✗\x03 \x02%nickname%\x02 a atteint la limite maximale de %max% canaux enregistrés."
    notice_channel:   "\x02%from%\x02 désigne \x02%nickname%\x02 comme fondateur du canal."
  successor:
    syntax:         "SET <#canal> SUCCESSOR [surnom]"
    short:          "Définir le successeur du canal."
    help:           "Définit un surnom comme successeur du canal. Omettez le surnom pour effacer. Le surnom doit être enregistré et activé."
    cleared:        "\x0303✔\x03 Le successeur a été effacé."
    updated:        "\x0303✔\x03 Le successeur a été défini sur \x02%nickname%\x02."
    must_be_registered: "\x0304✗\x03 \x02%nickname%\x02 doit être enregistré et activé."
    suspended:      "\x0304✗\x03 \x02%nickname%\x02 est suspendu et ne peut pas être défini comme successeur."
    cannot_be_founder: "\x0304✗\x03 Le fondateur ne peut pas être défini comme successeur."
    notice_channel:   "\x02%from%\x02 désigne \x02%nickname%\x02 comme successeur du canal."
    notice_channel_cleared: "\x02%from%\x02 a effacé le successeur du canal."
  desc:
    syntax:         "SET <#canal> DESC <description>"
    short:          "Modifier la description du canal."
    help:           "Modifie la description du canal (obligatoire)."
    updated:        "\x0303✔\x03 Description mise à jour."
  url:
    syntax:         "SET <#canal> URL [url]"
    short:          "Définir l'URL du canal."
    help:           "Modifie le site web (URL) du canal. Omettez l'url pour effacer."
    updated:        "\x0303✔\x03 URL mise à jour."
    cleared:        "\x0303✔\x03 URL effacée."
  email:
    syntax:         "SET <#canal> EMAIL <e-mail|none>"
    short:          "Définir l'e-mail du canal."
    help:           "Modifie l'adresse e-mail du canal. Utilisez \x02none\x02 pour effacer."
    updated:        "\x0303✔\x03 E-mail mis à jour."
    cleared:        "\x0303✔\x03 E-mail effacé."
  entrymsg:
    syntax:         "SET <#canal> ENTRYMSG <message|none>"
    short:          "Définir le message d'entrée du canal."
    help:           "Définit le message affiché lorsque les utilisateurs rejoignent le canal (NOTICE). Utilisez \x02none\x02 pour effacer."
    updated:        "\x0303✔\x03 Message d'entrée mis à jour."
    cleared:        "\x0303✔\x03 Message d'entrée effacé."
    too_long:       "\x0304✗\x03 Le message d'entrée ne peut pas dépasser %max% caractères."
  topiclock:
    syntax:         "SET <#canal> TOPICLOCK {ON|OFF}"
    short:          "Verrouiller le sujet du canal."
    help:           "Empêche de modifier le sujet du canal. Lorsque ON, le sujet actuel est stocké et verrouillé."
    on:             "\x0303✔\x03 Le verrouillage du sujet est maintenant ON."
    off:            "\x0303✔\x03 Le verrouillage du sujet est maintenant OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 active TOPICLOCK."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 désactive TOPICLOCK."
  mlock:
    syntax:         "SET <#canal> MLOCK {ON|OFF}"
    short:          "Verrouiller les modes du canal."
    help:           "Verrouille les modes actuels du canal (ex. +nt). Lorsque ON, les modes ne peuvent pas être modifiés."
    no_modes:       "aucun mode"
    on:             "\x0303✔\x03 MLOCK est maintenant ON (%modes%)."
    off:            "\x0303✔\x03 MLOCK est maintenant OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 active MLOCK (%modes%)."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 désactive MLOCK."
  secure:
    syntax:         "SET <#canal> SECURE {ON|OFF}"
    short:          "Exiger la liste d'accès pour les rangs du canal."
    help:           "Lorsque ON, seuls les utilisateurs dans la liste d'accès peuvent recevoir des rangs de canal (OP, VOICE, etc.)."
    on:             "\x0303✔\x03 SECURE est maintenant ON."
    off:            "\x0303✔\x03 SECURE est maintenant OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 active le mode SECURE."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 désactive le mode SECURE."

access:
  syntax:           "ACCESS <#canal> {ADD|DEL|LIST} [surnom] [niveau]"
  short:            "Gérer la liste d'accès."
  help:             "LIST : afficher la liste d'accès (surnom et niveau par entrée). ADD : ajouter ou mettre à jour le niveau d'un surnom (1-499). DEL : retirer un surnom de la liste. Utilisez \x0303HELP ACCESS <option>\x03 pour chacune."
  unknown_sub:      "\x0304✗\x03 Sous-commande inconnue \x02%sub%\x02. Utilisez LIST, ADD ou DEL."
  level_range:      "\x0304✗\x03 Le niveau d'accès doit être entre %min% et %max%."
  cannot_manage_level: "\x0304✗\x03 Vous pouvez uniquement gérer les surnoms avec un niveau strictement inférieur au vôtre."
  founder_not_in_list: "\x0304✗\x03 Le fondateur n'est pas dans la liste d'accès."
  max_entries:      "\x0304✗\x03 Maximum %max% entrées d'accès par canal."
  list:
    syntax:         "ACCESS <#canal> LIST"
    short:          "Lister la liste d'accès (nécessite le niveau ACCESSLIST)."
    help:           "Affiche le surnom et le niveau pour chaque entrée."
    header:         "\x0303Liste d'accès pour \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 Le canal \x02%channel%\x02 n'a aucune entrée d'accès."
    entry:          "  #%index% : %nickname% (niveau %level%)"
  add:
    syntax:         "ACCESS <#canal> ADD <surnom> <niveau>"
    short:          "Ajouter ou mettre à jour le niveau d'accès (nécessite le niveau ACCESSCHANGE)."
    help:           "Niveau 1-499. Vous ne pouvez définir que des niveaux inférieurs au vôtre."
    done:           "\x0303✔\x03 \x02%nickname%\x02 défini au niveau %level%."
    notice_channel: "\x0303✔\x03 \x0302%from%\x03 définit \x0314%to%\x03 au niveau \x0304%level%\x03"
  del:
    syntax:         "ACCESS <#canal> DEL <surnom>"
    short:          "Retirer de la liste d'accès (nécessite le niveau ACCESSCHANGE)."
    help:           "Vous ne pouvez retirer que les surnoms avec un niveau inférieur au vôtre."
    not_in_list:    "\x0304✗\x03 \x02%nickname%\x02 n'est pas dans la liste d'accès."
    done:           "\x0303✔\x03 \x02%nickname%\x02 retiré de la liste d'accès."
    notice_channel: "\x0304✗\x03 \x0302%from%\x03 retire \x0314%to%\x03 de la liste d'accès"

delaccess:
  syntax:           "DELACCESS <#canal>"
  short:            "Retirer votre propre accès d'un canal."
  help:             "Retire votre entrée d'accès de la liste d'accès du canal. Vous devez être identifié. Le fondateur ne peut pas utiliser cette commande."
  done:             "\x0303✔\x03 Votre accès a été retiré de \x02%channel%\x02."
  not_in_list:      "\x0304✗\x03 Vous n'avez pas d'accès dans \x02%channel%\x02."
  founder_not_in_access: "\x0304✗\x03 Vous êtes le fondateur de \x02%channel%\x02 et ne figurez pas dans la liste d'accès."
  notice_channel: "\x0304✗\x03 \x0302%nickname%\x03 retire son accès du canal"

levels:
  syntax:           "LEVELS <#canal> {LIST|SET|RESET} [niveau] [valeur]"
  short:            "Configurer les niveaux du canal."
  help:             "LIST : afficher les exigences de niveau (OPDEOP, VOICEDEVOICE, etc.). SET : définir le niveau minimum pour une action (-1 à 499). RESET : restaurer les valeurs par défaut. Fondateur uniquement pour SET/RESET."
  unknown_sub:      "\x0304✗\x03 Sous-commande inconnue \x02%sub%\x02. Utilisez LIST, SET ou RESET."
  unknown_key:      "\x0304✗\x03 Clé de niveau inconnue \x02%key%\x02 ou non prise en charge par cet IRCd."
  value_range:      "\x0304✗\x03 La valeur de niveau doit être entre %min% et %max%."
  list:
    syntax:         "LEVELS <#canal> LIST"
    short:          "Lister les exigences de niveau."
    help:           "Affiche chaque clé de niveau et sa valeur (par défaut si non définie)."
    header:         "\x0303Niveaux\x03"
  set:
    syntax:         "LEVELS <#canal> SET <niveau> <valeur>"
    short:          "Définir une exigence de niveau."
    help:           "Valeur -1 à 499. Fondateur uniquement."
    done:           "\x0303✔\x03 \x02%key%\x02 défini à %value%."
  reset:
    syntax:         "LEVELS <#canal> RESET"
    short:          "Réinitialiser tous les niveaux aux valeurs par défaut."
    help:           "Supprime toutes les personnalisations. Fondateur uniquement."
    done:           "\x0303✔\x03 Tous les niveaux réinitialisés aux valeurs par défaut."

