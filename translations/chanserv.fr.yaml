  syntax:           "INFO <#canal>"
  short:            "Afficher les informations du canal."
  help:             "Affiche le fondateur, la date d'enregistrement, le successeur, l'URL, l'e-mail, la description, la dernière utilisation, le sujet et les options (TOPICLOCK, MLOCK, SECURE)."
