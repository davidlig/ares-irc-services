  last_used:       "  \x0314Dernière util.\x03      : %date%"
  topic:           "  \x0314Dernier sujet\x03       : %topic%"
  topic_set_by:    "  \x0314Sujet défini par\x03    : %nickname%"
  options:         "  \x0314Options\x03             : TOPICLOCK %topiclock%, MLOCK %mlock%, SECURE %secure%"
  no_expire:       "  \x0314N'expire jamais\x03     : Oui"
  mlock_modes:     "  \x0314Verrouillage modes\x03  : %modes%"
  suspended_status: "  \x0314Statut\x03              : \x0304Suspendu\x03"
  suspended_reason: "  \x0314Raison\x03              : %reason%"
  suspended_until:  "  \x0314Fin le\x03              : %date%"
  suspended_permanent: "  \x0314Fin le\x03              : Permanent"
  forbidden_status: "  \x0314Statut\x03              : \x0304Interdit\x03"
  forbidden_reason: "  \x0314Raison\x03              : %reason%"

help:
