register:
  syntax:           "REGISTER <#canal> <description>"
  short:            "Enregistrer un canal."
  help:             "Enregistre et associe un canal à votre surnom. Vous devez être identifié auprès de %nickserv%."
  success:          "\x0303✔\x03 Le canal \x02%channel%\x02 a été enregistré."
