# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#channel>"
  short:            "Esborrar tota la llista d'accés d'un canal."
  help:             |
    Treu totes les entrades d'accés de la llista d'accés d'un canal.
    Aquesta acció és irreversible i no es pot desfer.
    Només els IRCops amb el permís 'chanserv.clearaccess' poden utilitzar aquesta ordre.

    Sintaxi: CLEARACCESS <#channel>
    Exemples:
      CLEARACCESS #channel
  success:          "\x0303✔\x03 S'han esborrat \x02%count%\x02 entrades d'accés de \x02%channel%\x02."
  empty:            "\x0307ℹ\x03 El canal \x02%channel%\x02 no té cap entrada d'accés."

clearusers:
  syntax:           "CLEARUSERS <#channel> [reason]"
  short:            "Fer kick a tots els usuaris d'un canal."
  help:             |
    Fa kick a tots els usuaris del canal especificat.
    Aquesta és una ordre exclusiva per a IRCops utilitzada per a la gestió de canals.
    Es pot proporcionar un motiu opcional; si s'omet, s'utilitza un motiu predeterminat.

    Només els IRCops amb el permís 'chanserv.clearusers' poden utilitzar aquesta ordre.

    Sintaxi: CLEARUSERS <#channel> [reason]
    Exemples:
      CLEARUSERS #channel
      CLEARUSERS #channel flooding
  not_on_network:   "\x0304✗\x03 El canal \x02%channel%\x02 no és actualment a la xarxa."
  empty:            "\x0307ℹ\x03 El canal \x02%channel%\x02 no té cap usuari per fer kick."
  success:          "\x0303✔\x03 S'ha fet kick a \x02%count%\x02 usuari(s) de \x02%channel%\x02."
  default_reason:   "ordre CLEARUSERS"
