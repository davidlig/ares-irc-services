    help:           "Caducitat necessària si s'especifica el motiu. Formats: 0 (permanent), 1d, 7d, 30d, 12h, 60m. Exemples: 'AKICK #c ADD *!*@* 0', 'AKICK #c ADD *!*@* 7d Spam'."
    done:           "\x0303✔\x03 AKICK \x02%mask%\x02 afegit."
