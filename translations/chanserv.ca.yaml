  help:             "Desactiva temporalment un canal registrat. Formats de durada: 0 = permanent, 1d, 12h, 60m.\nMentre està suspès, els modes del canal, l'accés i l'aplicació estan desactivats.\nAquesta ordre requereix el permís d'IRCop: chanserv.suspend"
  success:          "\x0303✔\x03 El canal \x02%channel%\x02 ha estat suspès fins a \x02%duration%\x02."
  not_registered:   "\x0304✗\x03 El canal \x02%channel%\x02 no està registrat."
  already_suspended: "\x0304✗\x03 El canal \x02%channel%\x02 ja està suspès."
  invalid_duration:  "\x0304✗\x03 Durada no vàlida. Utilitzeu: 0 (permanent), 1d, 12h, o 60m."
  permanent:         "Permanent"
  channel_suspended: "\x0304✗\x03 El canal \x02%channel%\x02 està suspès i no es pot utilitzar."
  channel_forbidden: "\x0304✗\x03 El canal \x02%channel%\x02 està prohibit i no es pot utilitzar."
  notice_channel:    "\x0304⚠\x03 El canal ha estat suspès. Motiu: %reason%"

unsuspend:
  syntax:           "UNSUSPEND <#channel>"
  short:            "Aixecar una suspensió de canal."
  help:             "Reactiva un canal suspès, restaurant els seus modes i l'aplicació.\nAquesta ordre requereix el permís d'IRCop: chanserv.suspend"
  success:          "\x0303✔\x03 El canal \x02%channel%\x02 ja no està suspès."
  not_registered:   "\x0304✗\x03 El canal \x02%channel%\x02 no està registrat."
  not_suspended:    "\x0304✗\x03 El canal \x02%channel%\x02 no està suspès."
  reason_expired:   "suspensió expirada"

# NOJOIN documentation for LEVELS:
# NOJOIN: Minimum access level required to join channel. Users with level < NOJOIN are kicked.
# Default: -1 (disabled). Set to 0 to only allow registered users, 50 for level 50+, etc.

nojoin:
  reason: "restricció de nivell NOJOIN"

