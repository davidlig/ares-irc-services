    syntax:         "ACCESS <#channel> ADD <nickname> <level>"
    short:          "Afegir o actualitzar el nivell d'accés (requereix nivell ACCESSCHANGE)."
    help:           "Nivell 1-499. Només podeu establir nivells inferiors al vostre."
