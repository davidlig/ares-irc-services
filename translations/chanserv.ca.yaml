  chanserv.drop: "Eliminar un canal registrat (DROP)"
  chanserv.suspend: "Suspendre o treure la suspensió d'un canal (SUSPEND/UNSUSPEND)"
  chanserv.forbid: "Prohibir o treure la prohibició d'un canal (FORBID/UNFORBID)"
  chanserv.noexpire: "Establir o treure la protecció contra l'expiració d'un canal (NOEXPIRE)"
