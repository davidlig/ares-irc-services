noexpire:
  syntax:           "NOEXPIRE <#channel> {ON|OFF}"
  short:            "Establir o treure la protecció contra l'expiració d'un canal."
  help:             |
    Controla si un canal expirarà per inactivitat.
    Quan està ON, el canal no expira mai independentment de la darrera activitat.
    Quan està OFF, s'apliquen les regles normals d'expiració.

    Només els IRCops amb el permís 'chanserv.noexpire' poden utilitzar aquesta ordre.

    Sintaxi: NOEXPIRE <#channel> {ON|OFF}
    Exemples:
      NOEXPIRE #Important ON
      NOEXPIRE #Important OFF
  success_on:       "\x0303✔\x03 El canal \x02%channel%\x02 ara està protegit contra l'expiració."
  success_off:      "\x0303✔\x03 El canal \x02%channel%\x02 ara expirarà normalment."
  not_registered:   "\x0304✗\x03 El canal \x02%channel%\x02 no està registrat."
  forbidden:         "\x0304✗\x03 El canal \x02%channel%\x02 està prohibit."
  suspended:         "\x0304✗\x03 El canal \x02%channel%\x02 està suspès."

forbid:
  syntax:           "FORBID <#channel> <reason>"
  short:             "Prohibir l'ús d'un canal."
  help:              "Impedeix que ningú pugui utilitzar un canal.\nSi el canal està registrat actualment, s'eliminarà primer.\nTots els usuaris del canal rebran kick i el canal es bloquejarà.\nAquesta ordre requereix el permís d'IRCop: chanserv.forbid"
  reason_required:  "\x0304✗\x03 Heu d'especificar un motiu."
  success:          "\x0303✔\x03 El canal \x02%channel%\x02 ha estat prohibit."
  updated:          "\x0303✔\x03 El motiu de prohibició del canal \x02%channel%\x02 ha estat actualitzat."
  channel_forbidden: "\x0304✗\x03 El canal \x02%channel%\x02 està prohibit i no es pot utilitzar."

unforbid:
  syntax:           "UNFORBID <#channel>"
  short:             "Treure una prohibició de canal."
  help:              "Treu una prohibició de canal, permetent que el canal es pugui registrar de nou.\nAquesta ordre requereix el permís d'IRCop: chanserv.forbid"
  success:          "\x0303✔\x03 El canal \x02%channel%\x02 ja no està prohibit."
  not_forbidden:    "\x0304✗\x03 El canal \x02%channel%\x02 no està prohibit."

debug:
  action_message: "%operator% executa l'ordre %command% sobre %target%. %reason%"
  action_with_option: "%operator% executa l'ordre %command% sobre %target%. Opció: %option%. %reason%"
  action_with_value: "%operator% executa l'ordre %command% sobre %target%. Opció: %option%=%value%. %reason%"
  founder_action: "Acció de nivell de fundador"
  prefix_reason:  "Motiu: %reason%"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#channel> {ADD|DEL|VIEW|CLEAR}"
  short:            "Veure o gestionar l'historial d'accions del canal."
  help:             |
    Gestiona l'historial d'accions d'un canal.
    Només els IRCops amb el permís 'chanserv.history' poden utilitzar aquesta ordre.

    Subordres:
      ADD   — Afegir una entrada manual a l'historial del canal.
      DEL   — Esborrar una entrada específica per ID.
      VIEW  — Veure les entrades de l'historial (paginat, 3 per pàgina).
      CLEAR — Esborrar totes les entrades de l'historial del canal.

    Sintaxi: HISTORY <#channel> {ADD|DEL|VIEW|CLEAR} [arguments]
    Exemples:
      HISTORY #channel VIEW
      HISTORY #channel VIEW 2
      HISTORY #channel VIEW ALL
      HISTORY #channel ADD Sospita d'intent de takeover
      HISTORY #channel DEL 42
      HISTORY #channel CLEAR
  not_registered:   "\x0304✗\x03 El canal \x02%channel%\x02 no està registrat."
  unknown_operator: "(desconegut)"

  add:
    syntax:     "HISTORY <#channel> ADD <message>"
    short:      "Afegir una entrada manual a l'historial."
    help:        |
      Afegeix una entrada manual a l'historial del canal.
    success:    "\x0303✔\x03 Entrada d'historial afegida per a \x02%channel%\x02."

  del:
    syntax:     "HISTORY <#channel> DEL <id>"
    short:      "Esborrar una entrada de l'historial per ID."
    success:    "\x0303✔\x03 Entrada d'historial \x02%id%\x02 esborrada."
    not_found:  "\x0304✗\x03 Entrada d'historial \x02%id%\x02 no trobada."
    invalid_id: "\x0304✗\x03 ID d'entrada no vàlid: \x02%id%\x02."

  view:
    syntax:     "HISTORY <#channel> VIEW [PAGE|ALL]"
    short:      "Veure l'historial d'accions del canal."
    header:     "\x02Historial de \x0307%channel%\x03\x02 (mostrant %start%-%end% de %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 per %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 No s'han trobat entrades d'historial per a \x02%channel%\x02."
    page_hint:   "Utilitzeu \x0303HISTORY %channel% VIEW %next_page%\x03 per a més entrades."

  clear:
    syntax:     "HISTORY <#channel> CLEAR"
    short:      "Esborrar totes les entrades d'historial d'un canal."
    success:    "\x0303✔\x03 S'han esborrat \x02%count%\x02 entrades d'historial de \x02%channel%\x02."

