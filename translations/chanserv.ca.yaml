    syntax:         "LEVELS <#channel> LIST"
    short:          "Llistar els requisits de nivell."
    help:           "Mostra cada clau de nivell i el seu valor (predeterminats si no s'han establert)."
    header:         "\x0303Nivells\x03"
  set:
    syntax:         "LEVELS <#channel> SET <level> <value>"
    short:          "Establir un requisit de nivell."
    help:           "Valor -1 a 499. Només el fundador."
    done:           "\x0303✔\x03 \x02%key%\x02 establert a %value%."
  reset:
    syntax:         "LEVELS <#channel> RESET"
    short:          "Restablir tots els nivells als valors predeterminats."
    help:           "Treu totes les modificacions. Només el fundador."
