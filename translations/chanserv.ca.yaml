levels:
  syntax:           "LEVELS <#channel> {LIST|SET|RESET} [level] [value]"
  short:            "Configurar els nivells del canal."
  help:             "LIST: mostra els requisits de nivell (OPDEOP, VOICEDEVOICE, etc.). SET: estableix el nivell mínim per a una acció (-1 a 499). RESET: restaura els valors predeterminats. Només el fundador per a SET/RESET."
  unknown_sub:      "\x0304✗\x03 Subordre desconeguda \x02%sub%\x02. Utilitzeu LIST, SET, o RESET."
  unknown_key:      "\x0304✗\x03 Clau de nivell desconeguda \x02%key%\x02 o no compatible amb aquest IRCd."
  value_range:      "\x0304✗\x03 El valor del nivell ha d'estar entre %min% i %max%."
