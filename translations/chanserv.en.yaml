# ChanServ translations — English
# Domain: chanserv

unknown_command: "\x0304✗\x03 Unknown command \x02%command%\x02. Use \x0303/msg %bot% HELP\x03."

error:
  syntax:         "\x0304✗\x03 Incorrect syntax. Usage: \x02%syntax%\x02"
  oper_only:      "\x0304✗\x03 This command is restricted to IRC Operators."
  not_identified: "\x0304✗\x03 You are not identified. Use \x0303/msg %nickserv% IDENTIFY\x03."
  invalid_channel: "\x0304✗\x03 Invalid channel name. Use \x02#channel\x02."
  channel_not_registered: "\x0304✗\x03 Channel \x02%channel%\x02 is not registered."
  generic:        "\x0304✗\x03 An error occurred. Please try again."
  nick_not_registered: "\x0304✗\x03 Nickname \x02%nickname%\x02 is not registered."
  insufficient_access: "\x0304✗\x03 Insufficient access to \x02%operation%\x02 on channel \x02%channel%\x02."
  mail_failed: "\x0304✗\x03 Could not send email. Please try again later."

register:
  syntax:           "REGISTER <#channel> <description>"
  short:            "Register a channel."
  help:             "Register and associate a channel to your nickname. You must be identified with %nickserv%."
  success:          "\x0303✔\x03 Channel \x02%channel%\x02 has been registered."
  channel_not_on_network: "\x0304✗\x03 Channel \x02%channel%\x02 does not exist on the network."
  limit_exceeded: "\x0304✗\x03 You have reached the maximum of %max% registered channels."
  throttled: "\x0304✗\x03 You must wait \x02%minutes%\x02 minute(s) before registering another channel."

info:
  syntax:           "INFO <#channel>"
  short:            "Show channel information."
  help:             "Shows founder, registered date, successor, URL, email, description, last used, topic, and options (TOPICLOCK, MLOCK, SECURE)."
  header:          "\x02Information for channel \x0307%channel%\x03:\x02"
  footer:          "\x0314─────────────────────────────\x03"
  founder:         "  \x0314Founder\x03      : \x02%nickname%\x02"
  registered:      "  \x0314Registered\x03   : %date%"
  successor:       "  \x0314Successor\x03    : \x02%nickname%\x02"
  description:     "  \x0314Description\x03  : %desc%"
  url:             "  \x0314URL\x03          : %url%"
  email:           "  \x0314Email\x03        : %email%"
  last_used:       "  \x0314Last used\x03    : %date%"
  topic:           "  \x0314Last topic\x03   : %topic%"
  topic_set_by:    "  \x0314Topic set by\x03 : %nickname%"
  options:         "  \x0314Options\x03      : TOPICLOCK %topiclock%, MLOCK %mlock%, SECURE %secure%"
  mlock_modes:     "  \x0314Mode lock\x03    : %modes%"
  suspended_status: "  \x0314Status\x03       : \x0304Suspended\x03"
  suspended_reason: "  \x0314Reason\x03       : %reason%"
  suspended_until:  "  \x0314Ends on\x03      : %date%"
  suspended_permanent: "  \x0314Ends on\x03      : Permanent"

help:
  syntax:           "HELP [command [sub-option]]"
  short:            "List commands or show help for a command."
  help:             "Without arguments lists all commands. Use \x0303HELP <command>\x03 for full help, or \x0303HELP <command> <option>\x03 for SET sub-options."
  header_title:     "%bot%"
  intro:            "Channel registration and management service for the IRC network."
  general_header:   "\x02\x0314Available commands:\x03\x0F"
  command_line:     "  \x0307%command%\x03%description%"
  subcommand_line:  "  \x0307%command%\x03%description%"
  options_header:   "\x02\x0314Options:\x03\x0F"
  general_footer:   "Use \x0303/msg %bot% HELP <command>\x03 for more information."
  set_sub_footer:   "Use \x0303/msg %bot% HELP %command% <option>\x03 for more information."
  syntax_label:     "\x0307Syntax:\x03 \x02%syntax%\x02"
  footer:           "\x0314─────────────────────────────\x03"
  intro_expiration: "NOTE: Channels \x0304\x1Funused\x0F for more than %days% days are automatically removed."
  unknown_command:  "\x0304✗\x03 Unknown command \x02%command%\x02. Use \x0303/msg %bot% HELP\x03."
  ircop_header:     "\x02\x0314Available commands for IRCOPS:\x03\x0F"
  suboptions:       "Sub-options:"

op:
  syntax:           "OP <#channel> <nickname>"
  short:            "Give channel operator mode."
  help:             "Give channel operator mode."
  done:             "\x0303✔\x03 \x02%nickname%\x02 has been given channel operator status."
  user_not_on_channel: "\x0304✗\x03 Nickname \x02%nickname%\x02 is not on the network."
  notice_grant:     "\x0303✔\x03 \x0302%from%\x03 gives \x0304%mode%\x03 to \x0314%to%\x03"

deop:
  syntax:           "DEOP <#channel> <nickname>"
  short:            "Remove channel operator mode."
  help:             "Remove channel operator mode."
  done:             "\x0303✔\x03 \x02%nickname%\x02 has been deopped."

secure:
  requires_access: "\x0304✗\x03 With SECURE on, \x02%nickname%\x02 must be in the access list to receive a rank."
  requires_min_level: "\x0304✗\x03 With SECURE on, \x02%nickname%\x02 must have at least level \x02%level%\x02 to receive \x02%mode%\x02."

set:
  syntax:           "SET <#channel> <option> [value]"
  short:            "Change channel options."
  help:             "Change channel options. Use \x0303HELP SET <option>\x03 for each: FOUNDER, SUCCESSOR, DESC, URL, EMAIL, ENTRYMSG, TOPICLOCK, MLOCK, SECURE."
  unknown_option:    "\x0304✗\x03 Unknown option \x02%option%\x02. Use one of: %options%."
  founder:
    syntax:         "SET <#channel> FOUNDER <nickname> [token]"
    short:          "Transfer channel to another registered nickname."
    help:           "Without token: sends a token to the current founder's email. With token: completes the transfer."
    token_sent:     "\x0303✔\x03 A founder change token has been sent to %email_hint%."
    invalid_token:  "\x0304✗\x03 Invalid or expired token."
    updated:        "\x0303✔\x03 Founder has been changed to \x02%nickname%\x02."
    no_email:       "\x0304✗\x03 Current founder has no email set. Cannot send token."
    throttled:      "\x0304✗\x03 Please wait before requesting another token."
    must_be_registered: "\x0304✗\x03 \x02%nickname%\x02 must be registered and activated."
    suspended:         "\x0304✗\x03 \x02%nickname%\x02 is suspended and cannot be set as founder."
    cannot_be_self:   "\x0304✗\x03 The new founder cannot be the current founder."
    cannot_be_successor: "\x0304✗\x03 The new founder cannot be the channel successor."
    limit_exceeded: "\x0304✗\x03 \x02%nickname%\x02 has reached the maximum of %max% registered channels."
    notice_channel:   "\x02%from%\x02 assigns \x02%nickname%\x02 as channel founder."
  successor:
    syntax:         "SET <#channel> SUCCESSOR [nickname]"
    short:          "Set the channel successor."
    help:           "Sets a nickname as channel successor. Omit nickname to clear. Nick must be registered and activated."
    cleared:        "\x0303✔\x03 Successor has been cleared."
    updated:        "\x0303✔\x03 Successor has been set to \x02%nickname%\x02."
    must_be_registered: "\x0304✗\x03 \x02%nickname%\x02 must be registered and activated."
    suspended:      "\x0304✗\x03 \x02%nickname%\x02 is suspended and cannot be set as successor."
    cannot_be_founder: "\x0304✗\x03 The founder cannot be set as successor."
    notice_channel:   "\x02%from%\x02 assigns \x02%nickname%\x02 as channel successor."
    notice_channel_cleared: "\x02%from%\x02 has cleared the channel successor."
  desc:
    syntax:         "SET <#channel> DESC <description>"
    short:          "Change channel description."
    help:           "Change the channel description (required)."
    updated:        "\x0303✔\x03 Description updated."
  url:
    syntax:         "SET <#channel> URL [url]"
    short:          "Set channel URL."
    help:           "Change the channel website (URL). Omit url to clear."
    updated:        "\x0303✔\x03 URL updated."
    cleared:        "\x0303✔\x03 URL cleared."
  email:
    syntax:         "SET <#channel> EMAIL <email|none>"
    short:          "Set channel email."
    help:           "Change the channel email address. Use \x02none\x02 to clear."
    updated:        "\x0303✔\x03 Email updated."
    cleared:        "\x0303✔\x03 Email cleared."
  entrymsg:
    syntax:         "SET <#channel> ENTRYMSG <message|none>"
    short:          "Set channel entry message."
    help:           "Set the message shown when users join the channel (NOTICE). Use \x02none\x02 to clear."
    updated:        "\x0303✔\x03 Entry message updated."
    cleared:        "\x0303✔\x03 Entry message cleared."
    too_long:       "\x0304✗\x03 Entry message cannot exceed %max% characters."
  topiclock:
    syntax:         "SET <#channel> TOPICLOCK {ON|OFF}"
    short:          "Lock channel topic."
    help:           "Prevents changing the channel topic. When ON, the current topic is stored and locked."
    on:             "\x0303✔\x03 Topic lock is now ON."
    off:            "\x0303✔\x03 Topic lock is now OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 enables TOPICLOCK."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 disables TOPICLOCK."
  mlock:
    syntax:         "SET <#channel> MLOCK {ON|OFF}"
    short:          "Lock channel modes."
    help:           "Locks the current channel modes (e.g. +nt). When ON, modes cannot be changed."
    no_modes:       "no modes"
    on:             "\x0303✔\x03 MLOCK is now ON (%modes%)."
    off:            "\x0303✔\x03 MLOCK is now OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 enables MLOCK (%modes%)."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 disables MLOCK."
  secure:
    syntax:         "SET <#channel> SECURE {ON|OFF}"
    short:          "Require access list for channel ranks."
    help:           "When ON, only users in the access list can receive channel ranks (OP, VOICE, etc.)."
    on:             "\x0303✔\x03 SECURE is now ON."
    off:            "\x0303✔\x03 SECURE is now OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 enables SECURE mode."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 disables SECURE mode."

access:
  syntax:           "ACCESS <#channel> {ADD|DEL|LIST} [nickname] [level]"
  short:            "Manage access list."
  help:             "LIST: show access list (nick and level per entry). ADD: add or update a nick's level (1-499). DEL: remove a nick from the list. Use \x0303HELP ACCESS <option>\x03 for each."
  unknown_sub:      "\x0304✗\x03 Unknown subcommand \x02%sub%\x02. Use LIST, ADD, or DEL."
  level_range:      "\x0304✗\x03 Access level must be between %min% and %max%."
  cannot_manage_level: "\x0304✗\x03 You can only manage nicks with level strictly below your own."
  founder_not_in_list: "\x0304✗\x03 The founder is not in the access list."
  max_entries:      "\x0304✗\x03 Maximum %max% access entries per channel."
  list:
    syntax:         "ACCESS <#channel> LIST"
    short:          "List access list (requires ACCESSLIST level)."
    help:           "Shows nickname and level for each entry."
    header:         "\x0303Access list for \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 Channel \x02%channel%\x02 has no access entries."
    entry:          "  #%index%: %nickname% (level %level%)"
  add:
    syntax:         "ACCESS <#channel> ADD <nickname> <level>"
    short:          "Add or update access level (requires ACCESSCHANGE level)."
    help:           "Level 1-499. You can only set levels below your own."
    done:           "\x0303✔\x03 \x02%nickname%\x02 set to level %level%."
    notice_channel: "\x0303✔\x03 \x0302%from%\x03 sets \x0314%to%\x03 to level \x0304%level%\x03"
  del:
    syntax:         "ACCESS <#channel> DEL <nickname>"
    short:          "Remove from access list (requires ACCESSCHANGE level)."
    help:           "You can only remove nicks with level below your own."
    not_in_list:    "\x0304✗\x03 \x02%nickname%\x02 is not in the access list."
    done:           "\x0303✔\x03 \x02%nickname%\x02 removed from access list."
    notice_channel: "\x0304✗\x03 \x0302%from%\x03 removes \x0314%to%\x03 from access list"

delaccess:
  syntax:           "DELACCESS <#channel>"
  short:            "Remove your own access from a channel."
  help:             "Removes your access entry from the channel's access list. You must be identified. Founder cannot use this command."
  done:             "\x0303✔\x03 Your access has been removed from \x02%channel%\x02."
  not_in_list:      "\x0304✗\x03 You don't have access in \x02%channel%\x02."
  founder_not_in_access: "\x0304✗\x03 You are the founder of \x02%channel%\x02 and are not on the access list."
  notice_channel: "\x0304✗\x03 \x0302%nickname%\x03 removes their access from the channel"

levels:
  syntax:           "LEVELS <#channel> {LIST|SET|RESET} [level] [value]"
  short:            "Configure channel levels."
  help:             "LIST: show level requirements (OPDEOP, VOICEDEVOICE, etc.). SET: set minimum level for an action (-1 to 499). RESET: restore defaults. Founder only for SET/RESET."
  unknown_sub:      "\x0304✗\x03 Unknown subcommand \x02%sub%\x02. Use LIST, SET, or RESET."
  unknown_key:      "\x0304✗\x03 Unknown level key \x02%key%\x02 or not supported by this IRCd."
  value_range:      "\x0304✗\x03 Level value must be between %min% and %max%."
  list:
    syntax:         "LEVELS <#channel> LIST"
    short:          "List level requirements."
    help:           "Shows each level key and its value (defaults if not set)."
    header:         "\x0303Levels\x03"
  set:
    syntax:         "LEVELS <#channel> SET <level> <value>"
    short:          "Set a level requirement."
    help:           "Value -1 to 499. Founder only."
    done:           "\x0303✔\x03 \x02%key%\x02 set to %value%."
  reset:
    syntax:         "LEVELS <#channel> RESET"
    short:          "Reset all levels to defaults."
    help:           "Removes all overrides. Founder only."
    done:           "\x0303✔\x03 All levels reset to defaults."

voice:
  syntax:           "VOICE <#channel> <nickname>"
  short:            "Give voice mode in the channel."
  help:             "Give voice mode in the channel."
  done:             "\x0303✔\x03 \x02%nickname%\x02 has been given voice."
  user_not_on_channel: "\x0304✗\x03 Nickname \x02%nickname%\x02 is not on the network."
  notice_grant:     "\x0303✔\x03 \x0302%from%\x03 gives \x0304%mode%\x03 to \x0314%to%\x03"

devoice:
  syntax:           "DEVOICE <#channel> <nickname>"
  short:            "Remove voice mode in the channel."
  help:             "Remove voice mode in the channel."
  done:             "\x0303✔\x03 \x02%nickname%\x02 has been devoiced."

invite:
  syntax:           "INVITE <#channel>"
  short:            "Invite yourself to the channel."
  help:             "Invite yourself to the channel."
  done:             "\x0303✔\x03 You have been invited to \x02%channel%\x02."
  notice_channel:   "\x0303✔\x03 \x0302%nickname%\x03 invites themselves to the channel."

admin:
  syntax:           "ADMIN <#channel> <nickname>"
  short:            "Give channel admin mode."
  help:             "Give channel admin mode. Only if IRCd supports +a."
  done:             "\x0303✔\x03 \x02%nickname%\x02 has been given channel admin."
  user_not_on_channel: "\x0304✗\x03 Nickname \x02%nickname%\x02 is not on the network."
  notice_grant:     "\x0303✔\x03 \x0302%from%\x03 gives \x0304%mode%\x03 to \x0314%to%\x03"
  not_supported:    "\x0304✗\x03 This network does not support channel admin (+a) mode."

deadmin:
  syntax:           "DEADMIN <#channel> <nickname>"
  short:            "Remove channel admin mode."
  help:             "Remove channel admin mode."
  done:             "\x0303✔\x03 \x02%nickname%\x02 has been deadminned."

halfop:
  syntax:           "HALFOP <#channel> <nickname>"
  short:            "Give semi-operator mode in the channel."
  help:             "Give semi-operator mode in the channel. Only if IRCd supports +h."
  done:             "\x0303✔\x03 \x02%nickname%\x02 has been given halfop."
  user_not_on_channel: "\x0304✗\x03 Nickname \x02%nickname%\x02 is not on the network."
  notice_grant:     "\x0303✔\x03 \x0302%from%\x03 gives \x0304%mode%\x03 to \x0314%to%\x03"
  not_supported:    "\x0304✗\x03 This network does not support halfop (+h) mode."

dehalfop:
  syntax:           "DEHALFOP <#channel> <nickname>"
  short:            "Remove semi-operator mode in the channel."
  help:             "Remove semi-operator mode in the channel."
  done:             "\x0303✔\x03 \x02%nickname%\x02 has been dehalfopped."

akick:
  syntax:           "AKICK <#channel> {ADD|DEL|LIST|ENFORCE} [mask] [expiry] [reason]"
  short:            "Manage auto-kick list."
  help:             "ADD <mask> [expiry] [reason]: add entry. DEL <mask|num>: remove. LIST: list entries. ENFORCE <mask>: kick matching users."
  unknown_sub:      "\x0304✗\x03 Unknown subcommand \x02%sub%\x02. Use ADD, DEL, LIST, or ENFORCE."
  invalid_mask:     "\x0304✗\x03 Invalid mask format. Use \x02nick!user@host\x02 with wildcards (*)."
  dangerous_mask:   "\x0304✗\x03 The mask \x02%mask%\x02 is too broad. It must contain at least 4 alphanumeric characters."
  protected_user:   "\x0304✗\x03 Nickname \x02%nickname%\x02 has access in this channel."
  max_entries:      "\x0304✗\x03 Maximum %max% AKICK entries per channel."
  add:
    syntax:         "AKICK <#channel> ADD <mask> [expiry] [reason]"
    short:          "Add AKICK entry."
    help:           "Expiry required if reason is specified. Formats: 0 (permanent), 1d, 7d, 30d, 12h, 60m. Examples: 'AKICK #c ADD *!*@* 0', 'AKICK #c ADD *!*@* 7d Spam'."
    done:           "\x0303✔\x03 AKICK \x02%mask%\x02 added."
    already_exists: "\x0304✗\x03 AKICK \x02%mask%\x02 already exists."
    notice_channel: "\x02%from%\x02 adds AKICK: \x02%mask%\x02 (%reason%)"
  del:
    syntax:         "AKICK <#channel> DEL <mask|number>"
    short:          "Remove AKICK entry."
    help:           "Remove by exact mask or entry number from LIST."
    not_found:      "\x0304✗\x03 AKICK \x02%mask%\x02 not found."
    done:           "\x0303✔\x03 AKICK \x02%mask%\x02 removed."
    notice_channel: "\x02%from%\x02 removes AKICK: \x02%mask%\x02"
  list:
    syntax:         "AKICK <#channel> LIST"
    short:          "List AKICK entries."
    help:           "Shows mask, reason, expiry, and who added."
    header:         "\x0303AKICK list for \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 Channel \x02%channel%\x02 has no AKICK entries."
    entry:          "  #%index% %mask% %reason% (by %nickname%, expires: %expiration%)"
    no_reason:      "No reason"
    never_expires:  "never"
    unknown_creator: "unknown"

drop:
  syntax:           "DROP <#channel>"
  short:            "Drop a registered channel."
  help:             "Removes a registered channel from the database."
  success:          "\x0303✔\x03 Channel \x02%channel%\x02 has been dropped."
  not_registered:   "\x0304✗\x03 Channel \x02%channel%\x02 is not registered."

suspend:
  syntax:           "SUSPEND <#channel> <duration> <reason>"
  short:            "Suspend a channel."
  help:             "Temporarily disables a registered channel. Duration formats: 0 = permanent, 1d, 12h, 60m.\nWhile suspended, channel modes, access, and enforcement are disabled.\nThis command requires IRCop permission: chanserv.suspend"
  success:          "\x0303✔\x03 Channel \x02%channel%\x02 has been suspended until \x02%duration%\x02."
  not_registered:   "\x0304✗\x03 Channel \x02%channel%\x02 is not registered."
  already_suspended: "\x0304✗\x03 Channel \x02%channel%\x02 is already suspended."
  invalid_duration:  "\x0304✗\x03 Invalid duration. Use: 0 (permanent), 1d, 12h, or 60m."
  permanent:         "Permanent"
  channel_suspended: "\x0304✗\x03 Channel \x02%channel%\x02 is suspended and cannot be used."

unsuspend:
  syntax:           "UNSUSPEND <#channel>"
  short:            "Lift a channel suspension."
  help:             "Reactivates a suspended channel, restoring its modes and enforcement.\nThis command requires IRCop permission: chanserv.suspend"
  success:          "\x0303✔\x03 Channel \x02%channel%\x02 is no longer suspended."
  not_registered:   "\x0304✗\x03 Channel \x02%channel%\x02 is not registered."
  not_suspended:    "\x0304✗\x03 Channel \x02%channel%\x02 is not suspended."

# NOJOIN documentation for LEVELS:
# NOJOIN: Minimum access level required to join channel. Users with level < NOJOIN are kicked.
# Default: -1 (disabled). Set to 0 to only allow registered users, 50 for level 50+, etc.

nojoin:
  reason: "NOJOIN level restriction"

# --- DEBUG CHANNEL -----------------------------------------------------------
debug_channel:
  kick_reason: "You are not authorized to join this channel."

debug:
  action_message: "%operator% executes command %command% on %target%. %reason%"
  prefix_reason:  "Reason: %reason%"
