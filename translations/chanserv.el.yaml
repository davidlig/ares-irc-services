    help:           "Ορίστε το μήνυμα που εμφανίζεται όταν χρήστες εισέρχονται στο κανάλι (NOTICE). Χρησιμοποιήστε \x02none\x02 για εκκαθάριση."
    updated:        "\x0303✔\x03 Το μήνυμα εισόδου ενημερώθηκε."
    cleared:        "\x0303✔\x03 Το μήνυμα εισόδου εκκαθαρίστηκε."
    too_long:       "\x0304✗\x03 Το μήνυμα εισόδου δεν μπορεί να υπερβαίνει τους %max% χαρακτήρες."
  topiclock:
    syntax:         "SET <#channel> TOPICLOCK {ON|OFF}"
    short:          "Κλείδωμα θέματος καναλιού."
    help:           "Αποτρέπει την αλλαγή του θέματος του καναλιού. Όταν είναι ON, το τρέχον θέμα αποθηκεύεται και κλειδώνεται."
    on:             "\x0303✔\x03 Το κλείδωμα θέματος είναι τώρα ON."
    off:            "\x0303✔\x03 Το κλείδωμα θέματος είναι τώρα OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 ενεργοποιεί το TOPICLOCK."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 απενεργοποιεί το TOPICLOCK."
  mlock:
    syntax:         "SET <#channel> MLOCK {ON|OFF}"
    short:          "Κλείδωμα λειτουργιών καναλιού."
    help:           "Κλειδώνει τις τρέχουσες λειτουργίες καναλιού (π.χ. +nt). Όταν είναι ON, οι λειτουργίες δεν μπορούν να αλλάξουν."
    no_modes:       "καμία λειτουργία"
    on:             "\x0303✔\x03 Το MLOCK είναι τώρα ON (%modes%)."
    off:            "\x0303✔\x03 Το MLOCK είναι τώρα OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 ενεργοποιεί το MLOCK (%modes%)."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 απενεργοποιεί το MLOCK."
  secure:
    syntax:         "SET <#channel> SECURE {ON|OFF}"
    short:          "Απαίτηση λίστας πρόσβασης για βαθμίδες καναλιού."
    help:           "Όταν είναι ON, μόνο χρήστες στη λίστα πρόσβασης μπορούν να λάβουν βαθμίδες καναλιού (OP, VOICE, κλπ.)."
    on:             "\x0303✔\x03 Το SECURE είναι τώρα ON."
    off:            "\x0303✔\x03 Το SECURE είναι τώρα OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 ενεργοποιεί τη λειτουργία SECURE."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 απενεργοποιεί τη λειτουργία SECURE."

access:
  syntax:           "ACCESS <#channel> {ADD|DEL|LIST} [nickname] [level]"
  short:            "Διαχείριση λίστας πρόσβασης."
  help:             "LIST: εμφάνιση λίστας πρόσβασης (ψευδώνυμο και επίπεδο ανά καταχώρηση). ADD: προσθήκη ή ενημέρωση επιπέδου ψευδωνύμου (1-499). DEL: αφαίρεση ψευδωνύμου από τη λίστα. Χρησιμοποιήστε \x0303HELP ACCESS <option>\x03 για καθεμία."
  unknown_sub:      "\x0304✗\x03 Άγνωστη υπο-εντολή \x02%sub%\x02. Χρησιμοποιήστε LIST, ADD, ή DEL."
  level_range:      "\x0304✗\x03 Το επίπεδο πρόσβασης πρέπει να είναι μεταξύ %min% και %max%."
  cannot_manage_level: "\x0304✗\x03 Μπορείτε να διαχειριστείτε μόνο ψευδώνυμα με επίπεδο αυστηρά χαμηλότερο από το δικό σας."
  founder_not_in_list: "\x0304✗\x03 Ο ιδρυτής δεν είναι στη λίστα πρόσβασης."
  max_entries:      "\x0304✗\x03 Μέγιστο %max% καταχωρήσεις πρόσβασης ανά κανάλι."
