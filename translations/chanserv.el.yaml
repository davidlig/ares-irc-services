  help:              "Αποτρέπει τη χρήση ενός καναλιού από οποιονδήποτε.\nΑν το κανάλι είναι τρέχοντα καταχωρημένο, θα διαγραφεί πρώτα.\nΌλοι οι χρήστες στο κανάλι θα γίνουν kick και το κανάλι θα κλειδωθεί.\nΑυτή η εντολή απαιτεί άδεια IRCop: chanserv.forbid"
