set:
  syntax:           "SET <#channel> <option> [value]"
  short:            "Αλλαγή επιλογών καναλιού."
  help:             "Αλλαγή επιλογών καναλιού. Χρησιμοποιήστε \x0303HELP SET <option>\x03 για καθεμία: FOUNDER, SUCCESSOR, DESC, URL, EMAIL, ENTRYMSG, TOPICLOCK, MLOCK, SECURE."
  unknown_option:    "\x0304✗\x03 Άγνωστη επιλογή \x02%option%\x02. Χρησιμοποιήστε μία από: %options%."
