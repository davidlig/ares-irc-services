    syntax:         "ACCESS <#channel> LIST"
    short:          "Λίστα πρόσβασης (απαιτεί επίπεδο ACCESSLIST)."
    help:           "Εμφανίζει ψευδώνυμο και επίπεδο για κάθε καταχώρηση."
    header:         "\x0303Λίστα πρόσβασης για \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 Το κανάλι \x02%channel%\x02 δεν έχει καταχωρήσεις πρόσβασης."
    entry:          "  #%index%: %nickname% (επίπεδο %level%)"
  add:
    syntax:         "ACCESS <#channel> ADD <nickname> <level>"
    short:          "Προσθήκη ή ενημέρωση επιπέδου πρόσβασης (απαιτεί επίπεδο ACCESSCHANGE)."
    help:           "Επίπεδο 1-499. Μπορείτε να ορίσετε μόνο επίπεδα χαμηλότερα από το δικό σας."
    done:           "\x0303✔\x03 \x02%nickname%\x02 ορίστηκε σε επίπεδο %level%."
    notice_channel: "\x0303✔\x03 \x0302%from%\x03 ορίζει τον/την \x0314%to%\x03 σε επίπεδο \x0304%level%\x03"
  del:
    syntax:         "ACCESS <#channel> DEL <nickname>"
    short:          "Αφαίρεση από τη λίστα πρόσβασης (απαιτεί επίπεδο ACCESSCHANGE)."
    help:           "Μπορείτε να αφαιρέσετε μόνο ψευδώνυμα με επίπεδο χαμηλότερο από το δικό σας."
    not_in_list:    "\x0304✗\x03 Το \x02%nickname%\x02 δεν είναι στη λίστα πρόσβασης."
    done:           "\x0303✔\x03 Το \x02%nickname%\x02 αφαιρέθηκε από τη λίστα πρόσβασης."
    notice_channel: "\x0304✗\x03 \x0302%from%\x03 αφαιρεί τον/την \x0314%to%\x03 από τη λίστα πρόσβασης"

delaccess:
  syntax:           "DELACCESS <#channel>"
  short:            "Αφαίρεση της δικής σας πρόσβασης από ένα κανάλι."
  help:             "Αφαιρεί την καταχώρηση πρόσβασής σας από τη λίστα πρόσβασης του καναλιού. Πρέπει να είστε ταυτοποιημένοι. Ο ιδρυτής δεν μπορεί να χρησιμοποιήσει αυτήν την εντολή."
  done:             "\x0303✔\x03 Η πρόσβασή σας έχει αφαιρεθεί από το \x02%channel%\x02."
  not_in_list:      "\x0304✗\x03 Δεν έχετε πρόσβαση στο \x02%channel%\x02."
  founder_not_in_access: "\x0304✗\x03 Είστε ο ιδρυτής του \x02%channel%\x02 και δεν είστε στη λίστα πρόσβασης."
  notice_channel: "\x0304✗\x03 \x0302%nickname%\x03 αφαιρεί την πρόσβασή του/της από το κανάλι"

levels:
  syntax:           "LEVELS <#channel> {LIST|SET|RESET} [level] [value]"
  short:            "Διαμόρφωση επιπέδων καναλιού."
  help:             "LIST: εμφάνιση απαιτήσεων επιπέδου (OPDEOP, VOICEDEVOICE, κλπ.). SET: ορισμός ελάχιστου επιπέδου για μια ενέργεια (-1 έως 499). RESET: επαναφορά προεπιλογών. Μόνο ο ιδρυτής για SET/RESET."
  unknown_sub:      "\x0304✗\x03 Άγνωστη υπο-εντολή \x02%sub%\x02. Χρησιμοποιήστε LIST, SET, ή RESET."
  unknown_key:      "\x0304✗\x03 Άγνωστο κλειδί επιπέδου \x02%key%\x02 ή δεν υποστηρίζεται από αυτό το IRCd."
  value_range:      "\x0304✗\x03 Η τιμή επιπέδου πρέπει να είναι μεταξύ %min% και %max%."
  list:
    syntax:         "LEVELS <#channel> LIST"
    short:          "Λίστα απαιτήσεων επιπέδου."
    help:           "Εμφανίζει κάθε κλειδί επιπέδου και την τιμή του (προεπιλογές αν δεν έχει οριστεί)."
    header:         "\x0303Επίπεδα\x03"
  set:
    syntax:         "LEVELS <#channel> SET <level> <value>"
    short:          "Ορισμός απαίτησης επιπέδου."
    help:           "Τιμή -1 έως 499. Μόνο ο ιδρυτής."
    done:           "\x0303✔\x03 \x02%key%\x02 ορίστηκε σε %value%."
  reset:
    syntax:         "LEVELS <#channel> RESET"
    short:          "Επαναφορά όλων των επιπέδων στις προεπιλογές."
    help:           "Αφαιρεί όλες τις παρακάμψεις. Μόνο ο ιδρυτής."
    done:           "\x0303✔\x03 Όλα τα επίπεδα επαναφέρθηκαν στις προεπιλογές."

voice:
  syntax:           "VOICE <#channel> <nickname>"
