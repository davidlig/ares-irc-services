# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#channel>"
  short:            "Εκκαθάριση ολόκληρης της λίστας πρόσβασης ενός καναλιού."
  help:             |
    Αφαιρεί όλες τις καταχωρήσεις πρόσβασης από τη λίστα πρόσβασης ενός καναλιού.
    Αυτή η ενέργεια είναι μη αναστρέψιμη και δεν μπορεί να αναιρεθεί.
    Μόνο IRCops με άδεια 'chanserv.clearaccess' μπορούν να χρησιμοποιήσουν αυτήν την εντολή.

    Σύνταξη: CLEARACCESS <#channel>
    Παραδείγματα:
      CLEARACCESS #channel
  success:          "\x0303✔\x03 Εκκαθαρίστηκαν \x02%count%\x02 καταχωρήσεις πρόσβασης από \x02%channel%\x02."
  empty:            "\x0307ℹ\x03 Το κανάλι \x02%channel%\x02 δεν έχει καταχωρήσεις πρόσβασης."

clearusers:
  syntax:           "CLEARUSERS <#channel> [reason]"
  short:            "Kick όλων των χρηστών από ένα κανάλι."
  help:             |
    Κάνει kick όλους τους χρήστες από το καθορισμένο κανάλι.
    Αυτή είναι μια εντολή μόνο για IRCop, που χρησιμοποιείται για διαχείριση καναλιού.
    Μπορεί να δοθεί προαιρετική αιτία· αν παραλειφθεί, χρησιμοποιείται μια προεπιλεγμένη αιτία.

    Μόνο IRCops με άδεια 'chanserv.clearusers' μπορούν να χρησιμοποιήσουν αυτήν την εντολή.

    Σύνταξη: CLEARUSERS <#channel> [reason]
    Παραδείγματα:
