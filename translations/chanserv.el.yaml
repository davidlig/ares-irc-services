# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#channel> {ADD|DEL|VIEW|CLEAR}"
  short:            "Προβολή ή διαχείριση ιστορικού ενεργειών καναλιού."
  help:             |
    Διαχείριση του ιστορικού ενεργειών για ένα κανάλι.
    Μόνο IRCops με άδεια 'chanserv.history' μπορούν να χρησιμοποιήσουν αυτήν την εντολή.

    Υπο-εντολές:
      ADD   — Προσθήκη χειροκίνητης καταχώρησης στο ιστορικό του καναλιού.
      DEL   — Διαγραφή συγκεκριμένης καταχώρησης μέσω ID.
      VIEW  — Προβολή καταχωρήσεων ιστορικού (σελιδοποιημένη, 3 ανά σελίδα).
      CLEAR — Διαγραφή όλων των καταχωρήσεων ιστορικού για το κανάλι.

    Σύνταξη: HISTORY <#channel> {ADD|DEL|VIEW|CLEAR} [arguments]
    Παραδείγματα:
      HISTORY #channel VIEW
      HISTORY #channel VIEW 2
      HISTORY #channel VIEW ALL
      HISTORY #channel ADD Ύποπτη απόπειρα takeover
      HISTORY #channel DEL 42
      HISTORY #channel CLEAR
  not_registered:   "\x0304✗\x03 Το κανάλι \x02%channel%\x02 δεν είναι καταχωρημένο."
  unknown_operator: "(άγνωστος)"

  add:
    syntax:     "HISTORY <#channel> ADD <message>"
    short:      "Προσθήκη χειροκίνητης καταχώρησης ιστορικού."
    help:        |
      Προσθέτει μια χειροκίνητη καταχώρηση στο ιστορικό του καναλιού.
    success:    "\x0303✔\x03 Η καταχώρηση ιστορικού προστέθηκε για το \x02%channel%\x02."

  del:
    syntax:     "HISTORY <#channel> DEL <id>"
    short:      "Διαγραφή καταχώρησης ιστορικού μέσω ID."
    success:    "\x0303✔\x03 Η καταχώρηση ιστορικού \x02%id%\x02 διαγράφηκε."
    not_found:  "\x0304✗\x03 Η καταχώρηση ιστορικού \x02%id%\x02 δεν βρέθηκε."
    invalid_id: "\x0304✗\x03 Μη έγκυρο ID καταχώρησης: \x02%id%\x02."

  view:
    syntax:     "HISTORY <#channel> VIEW [PAGE|ALL]"
    short:      "Προβολή ιστορικού ενεργειών καναλιού."
    header:     "\x02Ιστορικό για \x0307%channel%\x03\x02 (εμφάνιση %start%-%end% από %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 από %operator% — %message%"
    extra:       "  Επιπλέον \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Δεν βρέθηκαν καταχωρήσεις ιστορικού για \x02%channel%\x02."
    page_hint:   "Χρησιμοποιήστε \x0303HISTORY %channel% VIEW %next_page%\x03 για περισσότερες καταχωρήσεις."

  clear:
    syntax:     "HISTORY <#channel> CLEAR"
    short:      "Διαγραφή όλων των καταχωρήσεων ιστορικού για ένα κανάλι."
    success:    "\x0303✔\x03 Εκκαθαρίστηκαν \x02%count%\x02 καταχωρήσεις ιστορικού για \x02%channel%\x02."

