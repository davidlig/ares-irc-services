    must_be_registered: "\x0304✗\x03 Το \x02%nickname%\x02 πρέπει να είναι καταχωρημένο και ενεργοποιημένο."
    suspended:      "\x0304✗\x03 Το \x02%nickname%\x02 είναι σε αναστολή και δεν μπορεί να οριστεί ως διάδοχος."
    cannot_be_founder: "\x0304✗\x03 Ο ιδρυτής δεν μπορεί να οριστεί ως διάδοχος."
    notice_channel:   "\x02%from%\x02 ορίζει τον/την \x02%nickname%\x02 ως διάδοχο καναλιού."
    notice_channel_cleared: "\x02%from%\x02 έχει εκκαθαρίσει τον διάδοχο καναλιού."
  desc:
    syntax:         "SET <#channel> DESC <description>"
    short:          "Αλλαγή περιγραφής καναλιού."
    help:           "Αλλάξτε την περιγραφή του καναλιού (απαιτείται)."
