    syntax:         "SET <#channel> FOUNDER <nickname> [token]"
    short:          "Μεταφορά καναλιού σε άλλο καταχωρημένο ψευδώνυμο."
    help:           "Χωρίς token: αποστέλλει ένα token στο email του τρέχοντος ιδρυτή. Με token: ολοκληρώνει τη μεταφορά."
    token_sent:     "\x0303✔\x03 Ένα token αλλαγής ιδρυτή έχει σταλεί στο %email_hint%."
    invalid_token:  "\x0304✗\x03 Μη έγκυρο ή ληγμένο token."
    updated:        "\x0303✔\x03 Ο ιδρυτής έχει αλλάξει σε \x02%nickname%\x02."
    no_email:       "\x0304✗\x03 Ο τρέχων ιδρυτής δεν έχει ορίσει email. Αδυναμία αποστολής token."
    throttled:      "\x0304✗\x03 Παρακαλώ περιμένετε πριν ζητήσετε άλλο token."
    must_be_registered: "\x0304✗\x03 Το \x02%nickname%\x02 πρέπει να είναι καταχωρημένο και ενεργοποιημένο."
    suspended:         "\x0304✗\x03 Το \x02%nickname%\x02 είναι σε αναστολή και δεν μπορεί να οριστεί ως ιδρυτής."
    cannot_be_self:   "\x0304✗\x03 Ο νέος ιδρυτής δεν μπορεί να είναι ο τρέχων ιδρυτής."
    cannot_be_successor: "\x0304✗\x03 Ο νέος ιδρυτής δεν μπορεί να είναι ο διάδοχος του καναλιού."
    limit_exceeded: "\x0304✗\x03 Το \x02%nickname%\x02 έχει φτάσει το μέγιστο όριο των %max% καταχωρημένων καναλιών."
    notice_channel:   "\x02%from%\x02 ορίζει τον/την \x02%nickname%\x02 ως ιδρυτή καναλιού."
  successor:
    syntax:         "SET <#channel> SUCCESSOR [nickname]"
    short:          "Ορισμός διαδόχου καναλιού."
    help:           "Ορίζει ένα ψευδώνυμο ως διάδοχο καναλιού. Παραλείψτε το ψευδώνυμο για εκκαθάριση. Το ψευδώνυμο πρέπει να είναι καταχωρημένο και ενεργοποιημένο."
    cleared:        "\x0303✔\x03 Ο διάδοχος έχει εκκαθαριστεί."
