noexpire:
  syntax:           "NOEXPIRE <#channel> {ON|OFF}"
  short:            "Ορισμός ή αφαίρεση προστασίας λήξης για ένα κανάλι."
  help:             |
    Ελέγχει αν ένα κανάλι θα λήξει λόγω αδράνειας.
    Όταν είναι ON, το κανάλι δεν λήγει ποτέ ανεξάρτητα από την τελευταία δραστηριότητα.
    Όταν είναι OFF, ισχύουν οι κανονικοί κανόνες λήξης.

    Μόνο IRCops με άδεια 'chanserv.noexpire' μπορούν να χρησιμοποιήσουν αυτήν την εντολή.

    Σύνταξη: NOEXPIRE <#channel> {ON|OFF}
    Παραδείγματα:
      NOEXPIRE #Important ON
      NOEXPIRE #Important OFF
  success_on:       "\x0303✔\x03 Το κανάλι \x02%channel%\x02 είναι τώρα προστατευμένο από λήξη."
  success_off:      "\x0303✔\x03 Το κανάλι \x02%channel%\x02 θα λήγει τώρα κανονικά."
  not_registered:   "\x0304✗\x03 Το κανάλι \x02%channel%\x02 δεν είναι καταχωρημένο."
  forbidden:         "\x0304✗\x03 Το κανάλι \x02%channel%\x02 είναι απαγορευμένο."
  suspended:         "\x0304✗\x03 Το κανάλι \x02%channel%\x02 είναι σε αναστολή."

