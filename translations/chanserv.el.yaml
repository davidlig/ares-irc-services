    updated:        "\x0303✔\x03 Το URL ενημερώθηκε."
    cleared:        "\x0303✔\x03 Το URL εκκαθαρίστηκε."
  email:
    syntax:         "SET <#channel> EMAIL <email|none>"
    short:          "Ορισμός email καναλιού."
