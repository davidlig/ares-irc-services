# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <alcume>"
  short:            "Mostrar información sobre un alcume rexistrado."
  help:             "Mostra detalles de rexistro dun alcume: data de rexistro, estado\nde conexión, última mensaxe de desconexión e enderezo de correo electrónico. O correo\nelectrónico só é visible para o propietario cando está identificado. Con PRIVATE ON só\no propietario e os operadores de IRC poden ver a información."
  not_registered:   "\x0304✗\x03 O alcume \x02%nickname%\x02 non está rexistrado."
  private:          "\x0304✗\x03 A información do alcume \x02%nickname%\x02 é privada."
  header:           "\x02Información do alcume \x0307%nickname%\x03:\x02"
