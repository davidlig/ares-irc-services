# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <alcume> <duración> <motivo>"
  short:            "Suspender un alcume."
  help:             |
    Suspende un alcume, impedindo que o propietario se identifique.
    A suspensión pode ser temporal ou permanente.

    Formatos de duración: \x0303%d\x03 (días), \x0303%h\x03 (horas), \x0303%m\x03 (minutos) ou \x03030\x03 (permanente).

    Os usuarios suspendidos non poden identificarse co seu alcume.
    Os operadores de IRC e os usuarios root non poden ser suspendidos.

    Sintaxe: SUSPEND <alcume> <duración> <motivo>
    Exemplos:
      SUSPEND MalUsuario 7d Spam en #axuda
      SUSPEND Abusador 30d Flood reiterado
      SUSPEND UsuarioProblemático 0 Permaban por evasión
  success:            "\x0303✔\x03 O alcume \x02%nickname%\x02 foi suspendido ata \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 O alcume \x02%nickname%\x02 xa está suspendido."
  not_registered:     "\x0304✗\x03 O alcume \x02%nickname%\x02 non está rexistrado."
  forbidden:          "\x0304✗\x03 O alcume \x02%nickname%\x02 está prohibido e non se pode suspender."
  cannot_suspend_oper: "\x0304✗\x03 Non se pode suspender o operador de IRC \x02%nickname%\x02."
  cannot_suspend_root: "\x0304✗\x03 Non se pode suspender o usuario root \x02%nickname%\x02."
  cannot_suspend_service: "\x0304✗\x03 Non se pode suspender o alcume de servizo \x02%nickname%\x02."
  invalid_duration:   "\x0304✗\x03 Duración non válida. Use: \x0303<d><h><m>\x03 (p.ex., 7d, 12h, 30m) ou \x03030\x03 para permanente."
  permanent:          "permanente"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <alcume>"
  short:            "Eliminar a suspensión dun alcume."
  help:             |
    Elimina unha suspensión activa dun alcume, permitindo que o propietario se identifique de novo.

    Sintaxe: UNSUSPEND <alcume>
    Exemplo: UNSUSPEND AlgúnUsuario
  success:          "\x0303✔\x03 A suspensión foi levantada de \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 O alcume \x02%nickname%\x02 non está rexistrado."
  not_suspended:    "\x0304✗\x03 O alcume \x02%nickname%\x02 non está suspendido."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <alcume>"
  short:            "Forzar o renomeado dun alcume conectado a un alcume aleatorio."
  help:             |
    Forza a un alcume conectado a cambiar o seu nome a un xerado aleatoriamente.
    Útil para facer cumprir as políticas da rede sen desconectar o usuario.

    O formato do novo alcume usa o prefixo de convidado configurado (%prefix%).

    Este comando require o permiso IRCop: nickserv.rename

    Sintaxe: RENAME <alcume>
    Exemplo: RENAME Problemático
  not_online:        "\x0304✗\x03 O alcume \x02%nickname%\x02 non está conectado."
  cannot_rename_root: "\x0304✗\x03 Non se pode renomear o usuario root \x02%nickname%\x02."
  cannot_rename_oper: "\x0304✗\x03 Non se pode renomear o operador de IRC \x02%nickname%\x02."
  cannot_rename_service: "\x0304✗\x03 Non se pode renomear o alcume de servizo \x02%nickname%\x02."
  success:           "\x0303✓\x03 O alcume \x02%nickname%\x02 foi renomeado a \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <alcume>"
  short:            "Eliminar un alcume rexistrado."
  help:             |
    Elimina un alcume rexistrado da base de datos.
    Esta acción non se pode desfacer.

    Se o usuario está en liña, será renomeado a un alcume Guest-.
    Os usuarios root e os operadores de IRC non poden ser eliminados.
    Non pode eliminar o seu propio alcume.

    Este comando require o permiso IRCop: nickserv.drop

    Sintaxe: DROP <alcume>
    Exemplo: DROP ContaAntiga
  not_registered:     "\x0304✗\x03 O alcume \x02%nickname%\x02 non está rexistrado."
  suspended:         "\x0304✗\x03 O alcume \x02%nickname%\x02 está suspendido. Reactíveo primeiro."
  forbidden:         "\x0304✗\x03 O alcume \x02%nickname%\x02 está prohibido."
  cannot_drop_root:   "\x0304✗\x03 Non se pode eliminar o usuario root \x02%nickname%\x02."
  cannot_drop_oper:   "\x0304✗\x03 Non se pode eliminar o operador de IRC \x02%nickname%\x02."
  cannot_drop_self:    "\x0304✗\x03 Non pode eliminar o seu propio alcume."
  success:            "\x0303✓\x03 O alcume \x02%nickname%\x02 foi eliminado."
  cannot_drop_service: "\x0304✗\x03 Non se pode eliminar o alcume de servizo \x02%nickname%\x02."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <alcume> <motivo>"
  short:            "Bloquear permanentemente un alcume para que non se poida usar."
  help:             |
    Prohíbe que un alcume se poida usar na rede.
    O alcume non pode ser rexistrado nin usado por ninguén.

    Se o alcume está actualmente rexistrado, será eliminado primeiro.
    Se alguén o está usando, será forzado a cambiar a un alcume Guest-.

    Os usuarios root, operadores de IRC e alcumes de servizo non poden ser prohibidos.

    Este comando require o permiso IRCop: nickserv.forbid

    Sintaxe: FORBID <alcume> <motivo>
    Exemplo: FORBID MalAlcume Violacións reiteradas das políticas
  success:            "\x0303✔\x03 O alcume \x02%nickname%\x02 foi prohibido."
  updated:            "\x0303✔\x03 O motivo de prohibición de \x02%nickname%\x02 foi actualizado."
  reason_required:    "\x0304✗\x03 Debe proporcionar un motivo para a prohibición."
  cannot_forbid_root:  "\x0304✗\x03 Non se pode prohibir o usuario root \x02%nickname%\x02."
  cannot_forbid_oper:  "\x0304✗\x03 Non se pode prohibir o operador de IRC \x02%nickname%\x02."
  cannot_forbid_service: "\x0304✗\x03 Non se pode prohibir o alcume de servizo \x02%nickname%\x02."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <alcume>"
  short:            "Eliminar unha prohibición de alcume."
  help:             |
    Elimina unha prohibición de alcume, permitindo que o alcume poida ser usado de novo.

    Este comando require o permiso IRCop: nickserv.forbid

    Sintaxe: UNFORBID <alcume>
    Exemplo: UNFORBID AlgúnAlcume
  success:          "\x0303✔\x03 O alcume \x02%nickname%\x02 xa non está prohibido."
  not_forbidden:    "\x0304✗\x03 O alcume \x02%nickname%\x02 non está prohibido."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST ADD|DEL|LIST [patrón]"
  short:            "Xestionar os patróns de vhost prohibidos."
  help:             |
    Xestiona os patróns que impiden que os usuarios establezan vhosts
    coincidentes mediante NickServ SET VHOST.

    Comodíns: * coincide con calquera secuencia, ? coincide cun só carácter.
    Exemplo: *.pirateado.com bloquea calquera vhost que remate en .pirateado.com

    Este comando require o permiso IRCop: nickserv.forbidvhost

    Subcomandos:
      ADD <patrón>    Engadir un patrón prohibido
      DEL <patrón>    Eliminar un patrón prohibido
      LIST            Mostrar todos os patróns prohibidos

  unknown_sub: "\x0304✗\x03 Subcomando descoñecido \x02%sub%\x02. Use ADD, DEL ou LIST."

  add:
    syntax:      "FORBIDVHOST ADD <patrón>"
    short:       "Engadir un patrón de vhost prohibido."
    help:        |
      Engade un patrón á lista de vhosts prohibidos. Os usuarios non
      poderán establecer vhosts que coincidan con este patrón mediante SET VHOST.

      Comodíns: * coincide con calquera secuencia, ? coincide cun só carácter.

      Sintaxe: FORBIDVHOST ADD <patrón>
      Exemplo: FORBIDVHOST ADD *.pirateado.com
    done:            "\x0303✓\x03 Patrón de vhost prohibido engadido: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 O patrón \x02%pattern%\x02 xa existe."
    invalid:          "\x0304✗\x03 Formato de patrón de vhost non válido."

  del:
    syntax:      "FORBIDVHOST DEL <patrón>"
    short:       "Eliminar un patrón de vhost prohibido."
    help:        |
      Elimina un patrón da lista de vhosts prohibidos.

      Sintaxe: FORBIDVHOST DEL <patrón>
      Exemplo: FORBIDVHOST DEL *.pirateado.com
    done:        "\x0303✓\x03 Patrón de vhost prohibido eliminado: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 Patrón \x02%pattern%\x02 non atopado."

  list:
    short:       "Listar todos os patróns de vhost prohibidos."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Mostra todos os patróns de vhost prohibidos.

      Sintaxe: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Patróns de vhost prohibidos (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — por %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 Non hai patróns de vhost prohibidos."
    unknown_creator: "descoñecido"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <alcume> {ADD|DEL|VIEW|CLEAR}"
  short:            "Ver ou xestionar o historial de accións do alcume."
  help:             |
    Xestiona o historial de accións dun alcume.
    Só os IRCops co permiso 'nickserv.history' poden usar este comando.

    Accións rexistradas automaticamente:
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Sintaxe: HISTORY <alcume> ADD <mensaxe>
             HISTORY <alcume> DEL <id>
             HISTORY <alcume> VIEW [PÁXINA|ALL]
             HISTORY <alcume> CLEAR

    Exemplos:
      HISTORY AlgúnAlcume VIEW
      HISTORY AlgúnAlcume ADD Nota manual sobre este usuario
      HISTORY AlgúnAlcume VIEW 2
      HISTORY AlgúnAlcume VIEW ALL
      HISTORY AlgúnAlcume DEL 123
      HISTORY AlgúnAlcume CLEAR

    Use VIEW para ver o historial (mostra 3 entradas por defecto).
    Use VIEW PÁXINA 2 para ver a seguinte páxina.
    Use VIEW ALL para ver o historial completo.
    Use ADD para engadir unha entrada manual.
    Use DEL para eliminar unha entrada específica polo ID.
    Use CLEAR para eliminar todas as entradas do historial.
  not_registered:   "\x0304✗\x03 O alcume \x02%nickname%\x02 non está rexistrado."
  unknown_operator: "(descoñecido)"

  add:
    syntax:     "HISTORY <alcume> ADD <mensaxe>"
    short:      "Engadir unha entrada manual ao historial."
    help:        |
      Engade unha entrada manual ao historial do alcume.

      Sintaxe: HISTORY <alcume> ADD <mensaxe>
      Exemplo: HISTORY AlgúnAlcume ADD Usuario denunciado por spam
    success:    "\x0303✔\x03 Entrada do historial engadida para \x02%nickname%\x02."

  del:
    syntax:     "HISTORY <alcume> DEL <id>"
    short:      "Eliminar unha entrada do historial polo ID."
    help:        |
      Elimina unha entrada específica do historial polo seu ID.

      Sintaxe: HISTORY <alcume> DEL <id>
      Exemplo: HISTORY AlgúnAlcume DEL 42
    success:    "\x0303✔\x03 Entrada do historial \x02%id%\x02 eliminada."
    not_found:  "\x0304✗\x03 Entrada do historial \x02%id%\x02 non atopada."
    invalid_id: "\x0304✗\x03 ID de entrada non válido: \x02%id%\x02."

  view:
    syntax:     "HISTORY <alcume> VIEW [PÁXINA|ALL]"
    short:      "Ver o historial de accións do alcume."
    help:        |
      Mostra o historial de accións do alcume.

      Sintaxe: HISTORY <alcume> VIEW
               HISTORY <alcume> VIEW PÁXINA
               HISTORY <alcume> VIEW ALL

      Por defecto mostra 3 entradas cada vez.
      Use VIEW 2 para ver a segunda páxina.
      Use VIEW ALL para ver o historial completo.
    header:     "\x02Historial de \x0307%nickname%\x03\x02 (mostrando %start%-%end% de %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 por %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Non se atoparon entradas do historial para \x02%nickname%\x02."
    page_hint:   "Use \x0303HISTORY %nickname% VIEW %next_page%\x03 para máis entradas."

  clear:
    syntax:     "HISTORY <alcume> CLEAR"
    short:      "Eliminar todas as entradas do historial dun alcume."
    help:        |
      Elimina todas as entradas do historial do alcume especificado.
      Esta acción non se pode desfacer.

      Sintaxe: HISTORY <alcume> CLEAR
      Exemplo: HISTORY AlgúnAlcume CLEAR
    success:    "\x0303✔\x03 Limpadas \x02%count%\x02 entradas do historial de \x02%nickname%\x02."

