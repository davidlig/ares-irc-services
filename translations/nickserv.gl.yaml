  not_connected:    "  Estado          : \x0315Non conectado\x03"
  not_identified:   "  Estado          : \x0307Non identificado\x03"
  identified:       "  Estado          : \x0303Identificado\x03"
  suspended:        "  Estado          : \x0304Suspendido\x03"
