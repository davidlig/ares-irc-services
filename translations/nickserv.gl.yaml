# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <alcume> {ON|OFF}"
  short:            "Establecer ou eliminar a protección contra caducidade dun alcume."
  help:             |
    Controla se un alcume caducará por inactividade.
    Cando está ON, o alcume nunca caduca sen importar a última actividade.
    Cando está OFF, aplícanse as regras normais de caducidade.

    Só os IRCops co permiso 'nickserv.noexpire' poden usar este comando.

    Sintaxe: NOEXPIRE <alcume> {ON|OFF}
    Exemplos:
      NOEXPIRE UsuarioImportante ON
      NOEXPIRE UsuarioImportante OFF
  success_on:       "\x0303✔\x03 O alcume \x02%nickname%\x02 está agora protexido contra a caducidade."
  success_off:      "\x0303✔\x03 O alcume \x02%nickname%\x02 caducará normalmente agora."
  not_registered:   "\x0304✗\x03 O alcume \x02%nickname%\x02 non está rexistrado."
  forbidden:         "\x0304✗\x03 O alcume \x02%nickname%\x02 está prohibido."
  suspended:         "\x0304✗\x03 O alcume \x02%nickname%\x02 está suspendido."

