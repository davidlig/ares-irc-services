# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <opción> <valor>"
  short:            "Cambiar a súa configuración do alcume en %nickserv%."
  help:             "Modifica a configuración do seu alcume en %nickserv%.\nDebe estar identificado para usar este comando."
  unknown_option:   "\x0304✗\x03 Opción descoñecida \x02%option%\x02. Opcións dispoñibles: %options%."

  password:
    syntax:         "SET PASSWORD <novo_contrasinal>"
    short:          "Cambiar o contrasinal do seu alcume."
    help:           "Cambia o contrasinal do seu alcume de NickServ. O novo contrasinal ten\nefecto inmediato. Escolla un contrasinal seguro de polo menos 6 caracteres\nque non use noutros servizos."
    success:        "\x0303✔\x03 O seu contrasinal foi actualizado con éxito."

  email:
    syntax:         "SET EMAIL <novo_correo-e> [token]"
    short:          "Cambiar o enderezo de correo electrónico ligado ao seu alcume (confirmación en dous pasos)."
    help:           "Cambio de correo electrónico en dous pasos por seguridade.\n1) \x0303SET EMAIL <novo_correo-e>\x03 — envíase un token ao seu correo actual.\n2) \x0303SET EMAIL <novo_correo-e> <token>\x03 — confirme co token recibido.\nO token caduca en 1 hora."
    success:        "\x0303✔\x03 O seu correo electrónico foi actualizado a \x02%email%\x02."
    pending_sent:   "\x0307→\x03 Enviouse un token de confirmación a \x02%current_email%\x02.\n  Para confirmar o cambio a \x02%new_email%\x02 execute:\n  \x0303/msg %bot% SET EMAIL %new_email% <token>\x03\n  O token caduca en 1 hora."
    invalid_token:  "\x0304✗\x03 O token non é válido ou caducou. Solicite un novo con \x0303SET EMAIL <novo_correo-e>\x03."

  language:
    syntax:         "SET LANGUAGE <código>"
    short:          "Cambiar o idioma que os servizos usan para comunicarse con vostede."
    help:           "Cambia o idioma que %nickserv% e outros servizos usan ao falar con vostede.\nIdiomas dispoñibles:\n  \x02ca\x02 (catalán)\n  \x02de\x02 (alemán)\n  \x02el\x02 (grego)\n  \x02en\x02 (inglés)\n  \x02es\x02 (español)\n  \x02eu\x02 (éuscaro)\n  \x02fr\x02 (francés)\n  \x02gl\x02 (galego)\n  \x02it\x02 (italiano)\n  \x02nl\x02 (neerlandés)\n  \x02pl\x02 (polaco)\n  \x02pt\x02 (portugués)\n  \x02ro\x02 (romanés)\n  \x02tr\x02 (turco)"
    success:        "\x0303✔\x03 Idioma cambiado a \x02%language%\x02."
    invalid:        "\x0304✗\x03 Idioma non soportado. Idiomas dispoñibles: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <fuso_horario>"
    short:          "Establecer o fuso horario usado cando se mostran datas."
    help:           "Establece o fuso horario que usa %nickserv% cando mostra datas.\nUse \x02HELP SET TIMEZONE\x02 para o índice de rexións; \x02HELP SET TIMEZONE <rexión>\x02 (p.ex. Europe) para os fusos horarios desa rexión. Use \x02OFF\x02 para limpar."
    success:        "\x0303✔\x03 Fuso horario establecido en \x02%timezone%\x02. As datas mostraranse neste fuso."
    cleared:        "\x0303✔\x03 Fuso horario limpado. As datas usarán o valor predeterminado da rede."
    invalid:        "\x0304✗\x03 Fuso horario non válido \x02%timezone%\x02. Use un identificador válido (p.ex. UTC, Europe/Madrid)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Activar ou desactivar a privacidade da información do seu alcume."
    help:           "Controla a visibilidade da información do seu alcume no comando INFO.\nCon \x02PRIVATE ON\x02 só vostede e os operadores de IRC poden ver os seus detalles.\nCon \x02PRIVATE OFF\x02 a súa información é pública para todos."
    on:             "\x0303✔\x03 A información do seu alcume é agora \x02privada\x02."
    off:            "\x0303✔\x03 A información do seu alcume é agora \x02pública\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Usar PRIVMSG (ON) ou NOTICE (OFF) para as respostas do servizo."
    help:           "Controla como %nickserv% e outros servizos envían mensaxes a vostede.\nCon \x02MSG ON\x02 as respostas envíanse como \x02PRIVMSG\x02 (algúns clientes poden provocar respostas ou notificacións).\nCon \x02MSG OFF\x02 as respostas envíanse como \x02NOTICE\x02 (predeterminado; normalmente sen resposta automática)."
    on:             "\x0303✔\x03 As mensaxes do servizo enviaranse agora como \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 As mensaxes do servizo enviaranse agora como \x02NOTICE\x02."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Establecer ou limpar o seu nome de servidor virtual (hostname mostrado)."
    help:           "Establece un nome de servidor personalizado que outros ven cando está identificado.\nUse \x02SET VHOST OFF\x02 para limpar. Só letras (a-z, A-Z), díxitos, guión e punto;\nsen guión nin punto ao inicio/final de cada bloque; máx. 48 caracteres. Único por alcume."
    success:        "\x0303✔\x03 O seu host virtual foi establecido como \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 O seu host virtual foi limpado."
    invalid:        "\x0304✗\x03 Vhost non válido. Só letras, díxitos, guión e punto (non ao inicio/final de bloque); máx. 48 caracteres."
    taken:          "\x0304✗\x03 Ese vhost xa está en uso por outro alcume."
    forced:         "\x0304✗\x03 O seu vhost está configurado automaticamente e non se pode cambiar con SET VHOST."

