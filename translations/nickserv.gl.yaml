  action_with_value: "%operator% executa o comando %command% sobre %target%. Opción: %option%=%value%. %reason%"
  action_duration: "%operator% executa o comando %command% sobre %target%. Duración: %duration%. %reason%"
  prefix_reason: "Motivo: %reason%"
