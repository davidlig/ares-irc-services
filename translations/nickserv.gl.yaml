# NickServ translations — Galician
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02        bold on/off
#   \x03NN      color (DECIMAL: 03=green, 04=red, 07=orange, 14=dark grey)
#   \x03        reset color
#   \x0F        reset all formatting
# Códigos de formato IRC (dentro de cadeas entre comiñas dobres, use escapes hex \x##):
#   \x02        negrita activar/desactivar
#   \x03NN      cor (DECIMAL: 03=verde, 04=vermello, 07=laranxa, 14=gris escuro)
#   \x03        restablecer cor
#   \x0F        restablecer todo o formato
#
# NOTE: IRC colors use DECIMAL numbers (0-15), not hexadecimal.
#   \x0314 = dark grey (14 decimal)  ← CORRECT
#   \x030F = color 0 + letter "F"    ← WRONG (0F is hex, not decimal)
# NOTA: As cores de IRC usan números DECIMAIS (0-15), non hexadecimais.
#   \x0314 = gris escuro (14 decimal)  ← CORRECTO
#   \x030F = cor 0 + letra "F"         ← INCORRECTO (0F é hex, non decimal)

unknown_command: "\x0304✗\x03 Comando descoñecido \x02%command%\x02. Use \x0303/msg %bot% HELP\x03."

error:
  syntax:            "\x0304✗\x03 Sintaxe incorrecta. Uso: \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Este comando está restrinxido a operadores de IRC."
  not_identified:    "\x0304✗\x03 Non está identificado. Use \x0303/msg %bot% IDENTIFY <alcume> <contrasinal>\x03"
  permission_denied: "\x0304✗\x03 Permiso denegado. Non ten acceso a este comando."
  mail_failed:       "\x0304✗\x03 Non se puido enviar o correo electrónico. Comprobe o seu enderezo ou tenteo de novo máis tarde."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <contrasinal> <correo-e>"
  short:            "Rexistrar o seu alcume cos servizos."
  help:             "Inicia o rexistro do seu alcume actual. Enviaráselle un token de verificación\ná conta de correo electrónico proporcionada. Complete o rexistro\nexecutando \x0303/msg %bot% VERIFY <token>\x03. O token caduca en 1 hora.\nSe non chega, comprobe o seu cartafol de spam ou use \x0303RESEND\x03."
  pending:          "\x0307→\x03 Enviouse un token de verificación a \x02%email%\x02.\n  Execute \x0303/msg %bot% VERIFY <token>\x03 para completar o rexistro.\n  Non o recibiu? Comprobe spam ou use \x0303/msg %bot% RESEND\x03\n  O token caducará en \x021 hora\x02."
  already_registered: "\x0304✗\x03 O alcume \x02%nickname%\x02 xa está rexistrado."
  already_pending:  "\x0304✗\x03 O alcume \x02%nickname%\x02 xa ten unha verificación pendente.\n  Use \x0303/msg %bot% VERIFY <token>\x03 ou \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 O alcume \x02%nickname%\x02 non se pode rexistrar nesta rede."
  invalid_email:    "\x0304✗\x03 O enderezo de correo electrónico proporcionado non é válido."
  email_already_used: "\x0304✗\x03 O correo electrónico \x02%email%\x02 xa está en uso por outro alcume. Use un enderezo diferente."
  throttled:          "\x0304✗\x03 Debe agardar \x02%minutes%\x02 minuto(s) antes de tentar rexistrarse de novo."
  guest_prefix_forbidden: "\x0304✗\x03 Non pode rexistrar un alcume que comece con \x02%prefix%\x02."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "Confirmar o seu enderezo de correo electrónico e activar o seu alcume."
  help:             "Completa o rexistro verificando o token enviado ao seu correo electrónico.\nO token é válido durante 1 hora desde o momento do rexistro."
  success:          "\x0303✔\x03 O alcume \x02%nickname%\x02 foi rexistrado con éxito e agora está identificado."
  invalid_token:    "\x0304✗\x03 O token non é válido ou caducou. Use \x0303/msg %bot% REGISTER\x03 para comezar de novo."
  no_pending:       "\x0304✗\x03 Non ten ningún rexistro pendente que verificar."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Reenviar o token de verificación ao seu correo electrónico."
  help:             "Reenvía o token de verificación ao enderezo de correo electrónico proporcionado\ndurante o rexistro. Só funciona se ten un rexistro pendente."
  success:          "\x0307→\x03 Token de verificación reenviado a \x02%email%\x02."
  no_pending:       "\x0304✗\x03 Non ten ningún rexistro pendente para o que reenviar un token."
  throttled:        "\x0304✗\x03 Debe agardar \x02%minutes%\x02 minuto(s) antes de solicitar outro correo de verificación."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <alcume> [token]"
  short:            "Recuperar o seu alcume se perdeu o contrasinal."
  help:             "Recupera o acceso a un alcume rexistrado cando perdeu o contrasinal.\n1) \x0303RECOVER <alcume>\x03 — envíase un token ao correo electrónico do alcume.\n2) \x0303RECOVER <alcume> <token>\x03 — introduza o token do correo para restablecer o contrasinal.\nRecibirá un contrasinal temporal e o comando para cambialo."
  email_sent:       "\x0307→\x03 Enviouse un token de recuperación a \x02%email_hint%\x02. Comprobe a súa caixa de entrada (e o cartafol de spam)."
  not_registered:   "\x0304✗\x03 O alcume \x02%nickname%\x02 non está rexistrado."
  pending:          "\x0304✗\x03 O alcume \x02%nickname%\x02 ten unha verificación de correo pendente."
  suspended:        "\x0304✗\x03 O alcume \x02%nickname%\x02 está suspendido. Motivo: %reason%"
  forbidden:        "\x0304✗\x03 O alcume \x02%nickname%\x02 non se pode usar nesta rede."
  no_email:         "\x0304✗\x03 Non hai un correo electrónico configurado para o alcume \x02%nickname%\x02. A recuperación non está dispoñible."
  throttled:        "\x0304✗\x03 Debe agardar \x02%minutes%\x02 minuto(s) antes de solicitar outro correo de recuperación."
  invalid_token:    "\x0304✗\x03 O token non é válido ou caducou. Solicite un novo con \x0303RECOVER %nickname%\x03."
  success_identify: "\x0303✔\x03 Contrasinal restablecido. Identifíquese agora: \x0303%identify_cmd%\x03"
  success_then_change: "Despois cambie o seu contrasinal: \x0303/msg %bot% SET PASSWORD <novo_contrasinal>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <alcume> <contrasinal>"
  short:            "Identificarse como o propietario dun alcume."
  help:             "Autentica a súa sesión con %nickserv% usando o seu alcume e contrasinal.\nDespois dunha identificación exitosa recibirá o modo rexistrado \x02+r\x02\ne, se estaba usando un alcume de convidado, restauraráselle o seu alcume rexistrado."
  success:          "\x0303✔\x03 Agora está identificado como \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 Xa está identificado como \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 O alcume \x02%nickname%\x02 non está rexistrado."
  invalid_credentials: "\x0304✗\x03 Contrasinal incorrecto. Tenteo de novo."
  locked_out:         "\x0304✗\x03 Demasiados intentos errados. Tenteo de novo en \x02%minutes%\x02 minuto(s)."
  ghost_released:   "\x0307⚡\x03 A sesión fantasma que mantiña \x02%nickname%\x02 foi desconectada."
  kill_reason:      "Alcume %nickname% recuperado por %source% (o propietario rexistrado identificouse)"
  pending:          "\x0304✗\x03 O alcume \x02%nickname%\x02 ten unha verificación de correo pendente.\n  Execute \x0303/msg %bot% VERIFY <token>\x03 ou \x0303/msg %bot% RESEND\x03."
  suspended:        "\x0304✗\x03 O alcume \x02%nickname%\x02 está suspendido. Motivo: %reason%"
  forbidden:        "\x0304✗\x03 O alcume \x02%nickname%\x02 non se pode usar nesta rede."

