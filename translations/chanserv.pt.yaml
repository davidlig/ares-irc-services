# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#canal> {ADD|DEL|VIEW|CLEAR}"
  short:            "Ver ou gerir histórico de ações do canal."
  help:             |
    Gere o histórico de ações de um canal.
    Apenas IRCops com permissão 'chanserv.history' podem usar este comando.

    Subcomandos:
      ADD   — Adiciona uma entrada manual ao histórico do canal.
      DEL   — Elimina uma entrada específica por ID.
      VIEW  — Visualiza entradas do histórico (paginado, 3 por página).
      CLEAR — Elimina todas as entradas do histórico do canal.

    Sintaxe: HISTORY <#canal> {ADD|DEL|VIEW|CLEAR} [argumentos]
    Exemplos:
      HISTORY #canal VIEW
      HISTORY #canal VIEW 2
      HISTORY #canal VIEW ALL
      HISTORY #canal ADD Tentativa suspeita de tomada de controlo
      HISTORY #canal DEL 42
      HISTORY #canal CLEAR
  not_registered:   "\x0304✗\x03 O canal \x02%channel%\x02 não está registado."
  unknown_operator: "(desconhecido)"

  add:
    syntax:     "HISTORY <#canal> ADD <mensagem>"
    short:      "Adicionar uma entrada manual ao histórico."
    help:        |
      Adiciona uma entrada manual ao histórico do canal.
    success:    "\x0303✔\x03 Entrada de histórico adicionada para \x02%channel%\x02."

  del:
    syntax:     "HISTORY <#canal> DEL <id>"
    short:      "Eliminar uma entrada de histórico por ID."
    success:    "\x0303✔\x03 Entrada de histórico \x02%id%\x02 eliminada."
    not_found:  "\x0304✗\x03 Entrada de histórico \x02%id%\x02 não encontrada."
    invalid_id: "\x0304✗\x03 ID de entrada inválido: \x02%id%\x02."

  view:
    syntax:     "HISTORY <#canal> VIEW [PÁGINA|ALL]"
    short:      "Ver histórico de ações do canal."
    header:     "\x02Histórico de \x0307%channel%\x03\x02 (a mostrar %start%-%end% de %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 por %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Nenhuma entrada de histórico encontrada para \x02%channel%\x02."
    page_hint:   "Use \x0303HISTORY %channel% VIEW %next_page%\x03 para mais entradas."

  clear:
    syntax:     "HISTORY <#canal> CLEAR"
    short:      "Eliminar todas as entradas de histórico de um canal."
    success:    "\x0303✔\x03 Eliminadas \x02%count%\x02 entradas de histórico de \x02%channel%\x02."

