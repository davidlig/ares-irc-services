noexpire:
  syntax:           "NOEXPIRE <#canal> {ON|OFF}"
  short:            "Definir ou remover proteção de expiração para um canal."
  help:             |
    Controla se um canal irá expirar devido a inatividade.
    Quando ON, o canal nunca expira independentemente da última atividade.
    Quando OFF, aplicam-se as regras normais de expiração.

    Apenas IRCops com permissão 'chanserv.noexpire' podem usar este comando.

    Sintaxe: NOEXPIRE <#canal> {ON|OFF}
    Exemplos:
      NOEXPIRE #Importante ON
      NOEXPIRE #Importante OFF
  success_on:       "\x0303✔\x03 O canal \x02%channel%\x02 está agora protegido contra expiração."
  success_off:      "\x0303✔\x03 O canal \x02%channel%\x02 irá agora expirar normalmente."
  not_registered:   "\x0304✗\x03 O canal \x02%channel%\x02 não está registado."
  forbidden:         "\x0304✗\x03 O canal \x02%channel%\x02 está proibido."
  suspended:         "\x0304✗\x03 O canal \x02%channel%\x02 está suspenso."

