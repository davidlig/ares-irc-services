  syntax:           "SUSPEND <#canal> <duração> <motivo>"
  short:            "Suspender um canal."
  help:             "Desativa temporariamente um canal registado. Formatos de duração: 0 = permanente, 1d, 12h, 60m.\nEnquanto suspenso, os modos, acesso e aplicação são desativados.\nEste comando requer permissão IRCop: chanserv.suspend"
  success:          "\x0303✔\x03 O canal \x02%channel%\x02 foi suspenso até \x02%duration%\x02."
