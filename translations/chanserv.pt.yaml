    short:          "Remover entrada AKICK."
    help:           "Remover por máscara exata ou número de entrada da LIST."
    not_found:      "\x0304✗\x03 AKICK \x02%mask%\x02 não encontrado."
    done:           "\x0303✔\x03 AKICK \x02%mask%\x02 removido."
    notice_channel: "\x02%from%\x02 remove AKICK: \x02%mask%\x02"
  list:
    syntax:         "AKICK <#canal> LIST"
    short:          "Listar entradas AKICK."
    help:           "Mostra máscara, motivo, expiração e quem adicionou."
    header:         "\x0303Lista AKICK de \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 O canal \x02%channel%\x02 não tem entradas AKICK."
