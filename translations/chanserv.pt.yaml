set:
  syntax:           "SET <#canal> <opção> [valor]"
  short:            "Alterar opções do canal."
  help:             "Alterar opções do canal. Use \x0303HELP SET <opção>\x03 para cada uma: FOUNDER, SUCCESSOR, DESC, URL, EMAIL, ENTRYMSG, TOPICLOCK, MLOCK, SECURE."
  unknown_option:    "\x0304✗\x03 Opção desconhecida \x02%option%\x02. Use uma das seguintes: %options%."
  founder:
    syntax:         "SET <#canal> FOUNDER <nickname> [token]"
    short:          "Transferir canal para outro nickname registado."
    help:           "Sem token: envia um token para o email do fundador atual. Com token: conclui a transferência."
    token_sent:     "\x0303✔\x03 Foi enviado um token de alteração de fundador para %email_hint%."
    invalid_token:  "\x0304✗\x03 Token inválido ou expirado."
    updated:        "\x0303✔\x03 O fundador foi alterado para \x02%nickname%\x02."
    no_email:       "\x0304✗\x03 O fundador atual não tem um email definido. Não é possível enviar o token."
    throttled:      "\x0304✗\x03 Aguarde antes de solicitar outro token."
    must_be_registered: "\x0304✗\x03 \x02%nickname%\x02 deve estar registado e ativado."
    suspended:         "\x0304✗\x03 \x02%nickname%\x02 está suspenso e não pode ser definido como fundador."
    cannot_be_self:   "\x0304✗\x03 O novo fundador não pode ser o fundador atual."
    cannot_be_successor: "\x0304✗\x03 O novo fundador não pode ser o sucessor do canal."
    limit_exceeded: "\x0304✗\x03 \x02%nickname%\x02 atingiu o máximo de %max% canais registados."
    notice_channel:   "\x02%from%\x02 atribui \x02%nickname%\x02 como fundador do canal."
  successor:
    syntax:         "SET <#canal> SUCCESSOR [nickname]"
    short:          "Definir o sucessor do canal."
    help:           "Define um nickname como sucessor do canal. Omita o nickname para limpar. O nick deve estar registado e ativado."
    cleared:        "\x0303✔\x03 Sucessor removido."
    updated:        "\x0303✔\x03 Sucessor definido como \x02%nickname%\x02."
    must_be_registered: "\x0304✗\x03 \x02%nickname%\x02 deve estar registado e ativado."
    suspended:      "\x0304✗\x03 \x02%nickname%\x02 está suspenso e não pode ser definido como sucessor."
    cannot_be_founder: "\x0304✗\x03 O fundador não pode ser definido como sucessor."
    notice_channel:   "\x02%from%\x02 atribui \x02%nickname%\x02 como sucessor do canal."
    notice_channel_cleared: "\x02%from%\x02 removeu o sucessor do canal."
  desc:
    syntax:         "SET <#canal> DESC <descrição>"
    short:          "Alterar a descrição do canal."
    help:           "Alterar a descrição do canal (obrigatório)."
    updated:        "\x0303✔\x03 Descrição atualizada."
  url:
    syntax:         "SET <#canal> URL [url]"
    short:          "Definir URL do canal."
    help:           "Alterar o site (URL) do canal. Omita o url para limpar."
    updated:        "\x0303✔\x03 URL atualizada."
    cleared:        "\x0303✔\x03 URL removida."
  email:
    syntax:         "SET <#canal> EMAIL <email|none>"
    short:          "Definir email do canal."
    help:           "Alterar o endereço de email do canal. Use \x02none\x02 para limpar."
    updated:        "\x0303✔\x03 Email atualizado."
    cleared:        "\x0303✔\x03 Email removido."
  entrymsg:
    syntax:         "SET <#canal> ENTRYMSG <mensagem|none>"
    short:          "Definir mensagem de entrada do canal."
    help:           "Define a mensagem mostrada quando os utilizadores entram no canal (NOTICE). Use \x02none\x02 para limpar."
    updated:        "\x0303✔\x03 Mensagem de entrada atualizada."
    cleared:        "\x0303✔\x03 Mensagem de entrada removida."
    too_long:       "\x0304✗\x03 A mensagem de entrada não pode exceder %max% caracteres."
  topiclock:
    syntax:         "SET <#canal> TOPICLOCK {ON|OFF}"
    short:          "Bloquear tópico do canal."
    help:           "Impede a alteração do tópico do canal. Quando ON, o tópico atual é armazenado e bloqueado."
    on:             "\x0303✔\x03 Bloqueio de tópico está agora ON."
    off:            "\x0303✔\x03 Bloqueio de tópico está agora OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 ativa TOPICLOCK."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 desativa TOPICLOCK."
  mlock:
    syntax:         "SET <#canal> MLOCK {ON|OFF}"
    short:          "Bloquear modos do canal."
    help:           "Bloqueia os modos atuais do canal (ex: +nt). Quando ON, os modos não podem ser alterados."
