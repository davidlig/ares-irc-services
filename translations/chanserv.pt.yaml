    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 desativa o modo SECURE."

access:
  syntax:           "ACCESS <#canal> {ADD|DEL|LIST} [nickname] [nível]"
  short:            "Gerir lista de acesso."
  help:             "LIST: mostra a lista de acesso (nick e nível por entrada). ADD: adiciona ou atualiza o nível de um nick (1-499). DEL: remove um nick da lista. Use \x0303HELP ACCESS <opção>\x03 para cada uma."
  unknown_sub:      "\x0304✗\x03 Subcomando desconhecido \x02%sub%\x02. Use LIST, ADD ou DEL."
  level_range:      "\x0304✗\x03 O nível de acesso deve estar entre %min% e %max%."
  cannot_manage_level: "\x0304✗\x03 Só pode gerir nicks com nível estritamente abaixo do seu."
  founder_not_in_list: "\x0304✗\x03 O fundador não está na lista de acesso."
  max_entries:      "\x0304✗\x03 Máximo de %max% entradas de acesso por canal."
  list:
    syntax:         "ACCESS <#canal> LIST"
    short:          "Listar lista de acesso (requer nível ACCESSLIST)."
    help:           "Mostra o nickname e o nível para cada entrada."
    header:         "\x0303Lista de acesso de \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 O canal \x02%channel%\x02 não tem entradas de acesso."
    entry:          "  #%index%: %nickname% (nível %level%)"
  add:
    syntax:         "ACCESS <#canal> ADD <nickname> <nível>"
    short:          "Adicionar ou atualizar nível de acesso (requer nível ACCESSCHANGE)."
    help:           "Nível 1-499. Só pode definir níveis abaixo do seu."
    done:           "\x0303✔\x03 \x02%nickname%\x02 definido para o nível %level%."
    notice_channel: "\x0303✔\x03 \x0302%from%\x03 define \x0314%to%\x03 para o nível \x0304%level%\x03"
  del:
    syntax:         "ACCESS <#canal> DEL <nickname>"
    short:          "Remover da lista de acesso (requer nível ACCESSCHANGE)."
    help:           "Só pode remover nicks com nível abaixo do seu."
    not_in_list:    "\x0304✗\x03 \x02%nickname%\x02 não está na lista de acesso."
    done:           "\x0303✔\x03 \x02%nickname%\x02 removido da lista de acesso."
    notice_channel: "\x0304✗\x03 \x0302%from%\x03 remove \x0314%to%\x03 da lista de acesso"

delaccess:
  syntax:           "DELACCESS <#canal>"
  short:            "Remover o seu próprio acesso de um canal."
  help:             "Remove a sua entrada de acesso da lista de acesso do canal. Deve estar identificado. O fundador não pode usar este comando."
  done:             "\x0303✔\x03 O seu acesso foi removido de \x02%channel%\x02."
  not_in_list:      "\x0304✗\x03 Não tem acesso em \x02%channel%\x02."
  founder_not_in_access: "\x0304✗\x03 É o fundador de \x02%channel%\x02 e não está na lista de acesso."
  notice_channel: "\x0304✗\x03 \x0302%nickname%\x03 remove o seu acesso do canal"

levels:
  syntax:           "LEVELS <#canal> {LIST|SET|RESET} [nível] [valor]"
  short:            "Configurar níveis do canal."
  help:             "LIST: mostra requisitos de nível (OPDEOP, VOICEDEVOICE, etc.). SET: define o nível mínimo para uma ação (-1 a 499). RESET: restaura os padrões. Apenas o fundador para SET/RESET."
  unknown_sub:      "\x0304✗\x03 Subcomando desconhecido \x02%sub%\x02. Use LIST, SET ou RESET."
  unknown_key:      "\x0304✗\x03 Chave de nível desconhecida \x02%key%\x02 ou não suportada por este IRCd."
  value_range:      "\x0304✗\x03 O valor do nível deve estar entre %min% e %max%."
  list:
    syntax:         "LEVELS <#canal> LIST"
    short:          "Listar requisitos de nível."
    help:           "Mostra cada chave de nível e o seu valor (padrões se não definidos)."
    header:         "\x0303Níveis\x03"
  set:
    syntax:         "LEVELS <#canal> SET <nível> <valor>"
    short:          "Definir um requisito de nível."
    help:           "Valor -1 a 499. Apenas o fundador."
    done:           "\x0303✔\x03 \x02%key%\x02 definido para %value%."
  reset:
    syntax:         "LEVELS <#canal> RESET"
    short:          "Repor todos os níveis para os padrões."
    help:           "Remove todas as substituições. Apenas o fundador."
    done:           "\x0303✔\x03 Todos os níveis repostos para os padrões."

