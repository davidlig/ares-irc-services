# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#canal>"
  short:            "Limpar toda a lista de acesso de um canal."
  help:             |
    Remove todas as entradas de acesso da lista de acesso de um canal.
    Esta ação é irreversível e não pode ser desfeita.
    Apenas IRCops com permissão 'chanserv.clearaccess' podem usar este comando.

    Sintaxe: CLEARACCESS <#canal>
    Exemplos:
      CLEARACCESS #canal
  success:          "\x0303✔\x03 Removidas \x02%count%\x02 entradas de acesso de \x02%channel%\x02."
  empty:            "\x0307ℹ\x03 O canal \x02%channel%\x02 não tem entradas de acesso."

clearusers:
  syntax:           "CLEARUSERS <#canal> [motivo]"
  short:            "Expulsar todos os utilizadores de um canal."
  help:             |
    Expulsa todos os utilizadores do canal especificado.
    Este é um comando exclusivo para IRCops usado para gestão de canais.
    Pode ser fornecido um motivo opcional; se omitido, é usado um motivo padrão.

    Apenas IRCops com permissão 'chanserv.clearusers' podem usar este comando.

    Sintaxe: CLEARUSERS <#canal> [motivo]
    Exemplos:
      CLEARUSERS #canal
      CLEARUSERS #canal flooding
  not_on_network:   "\x0304✗\x03 O canal \x02%channel%\x02 não está atualmente na rede."
  empty:            "\x0307ℹ\x03 O canal \x02%channel%\x02 não tem utilizadores para expulsar."
  success:          "\x0303✔\x03 Expulsos \x02%count%\x02 utilizador(es) de \x02%channel%\x02."
  default_reason:   "Comando CLEARUSERS"
