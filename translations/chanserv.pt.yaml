    on:             "\x0303✔\x03 MLOCK está agora ON (%modes%)."
    off:            "\x0303✔\x03 MLOCK está agora OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 ativa MLOCK (%modes%)."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 desativa MLOCK."
  secure:
    syntax:         "SET <#canal> SECURE {ON|OFF}"
    short:          "Exigir lista de acesso para níveis de canal."
    help:           "Quando ON, apenas utilizadores na lista de acesso podem receber níveis de canal (OP, VOICE, etc.)."
