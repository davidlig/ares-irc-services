  short:            "Listar comandos ou mostrar ajuda de um comando."
  help:             "Sem argumentos lista todos os comandos. Use \x0303HELP <comando>\x03 para ajuda completa, ou \x0303HELP <comando> <opção>\x03 para sub-opções de SET."
