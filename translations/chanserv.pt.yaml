  topic:           "  \x0314Último tópico\x03        : %topic%"
  topic_set_by:    "  \x0314Tópico definido por\x03  : %nickname%"
  options:         "  \x0314Opções\x03               : TOPICLOCK %topiclock%, MLOCK %mlock%, SECURE %secure%"
