# --- MOTD ----------------------------------------------------------------------
motd:
  short:            "Xestionar as mensaxes MOTD de conexión enviadas aos usuarios ao conectarse."
  syntax:           "MOTD {ADD|DEL|LIST|CLEAN} [args]"
  help:             "Xestiona as entradas de Message Of The Day que se envían aos usuarios cando se conectan á rede.\n\n"
  unknown_sub:      "\x0304✗\x03 Subcomando descoñecido. Use: \x02ADD\x02, \x02DEL\x02, \x02LIST\x02, \x02CLEAN\x02"
  add:
    syntax:         "MOTD ADD {servizo|alcume!ident@vhost} {PRIVMSG|NOTICE} <caducidade> <mensaxe>"
    syntax_hint:    "\x0304✗\x03 Uso: \x02%syntax%\x02"
    short:          "Engadir unha entrada MOTD."
    help:           "Engade unha nova mensaxe MOTD que se enviará a cada usuario cando se conecte á rede.\n\n"
    done:           "\x0303✓\x03 Entrada MOTD nº%id% engadida."
    invalid_type:   "\x0304✗\x03 Tipo de mensaxe non válido. Debe ser \x02PRIVMSG\x02 ou \x02NOTICE\x02."
    invalid_expiry: "\x0304✗\x03 Formato de caducidade non válido. Use: \x02<número><s|m|h|d>\x02 (p.ex., 30s, 5m, 24h, 7d)."
  del:
    syntax:         "MOTD DEL <id>"
    syntax_hint:    "\x0304✗\x03 Uso: \x02%syntax%\x02"
    short:          "Eliminar unha entrada MOTD."
    help:           "Elimina unha entrada MOTD polo seu ID.\n\n"
    done:           "\x0303✓\x03 Entrada MOTD nº%id% eliminada."
    not_found:      "\x0304✗\x03 Entrada MOTD non atopada."
  list:
    syntax:         "MOTD LIST"
