# NickServ translations — Français
# Domaine : nickserv
#
# Codes de formatage IRC (dans les chaînes entre guillemets, utilisez les échappements hex \xNN) :
#   \x02        gras on/off
#   \x03NN      couleur (DÉCIMAL : 03=vert, 04=rouge, 07=orange, 14=gris foncé)
#   \x03        réinitialiser couleur
#   \x0F        réinitialiser tout formatage
#
# NOTE : Les couleurs IRC utilisent des nombres DÉCIMAUX (0-15), pas hexadécimaux.
#   \x0314 = gris foncé (14 décimal)  ← CORRECT
#   \x030F = couleur 0 + lettre "F"   ← INCORRECT (0F est hex, pas décimal)

unknown_command: "\x0304✗\x03 Commande inconnue \x02%command%\x02. Utilisez \x0303/msg %bot% HELP\x03."

error:
  syntax:            "\x0304✗\x03 Syntaxe incorrecte. Usage : \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Cette commande est réservée aux opérateurs IRC."
  not_identified:    "\x0304✗\x03 Vous n'êtes pas identifié. Utilisez \x0303/msg %bot% IDENTIFY <surnom> <motdepasse>\x03"
  permission_denied: "\x0304✗\x03 Permission refusée. Vous n'avez pas accès à cette commande."
  mail_failed:       "\x0304✗\x03 L'e-mail n'a pas pu être envoyé. Vérifiez votre adresse ou réessayez plus tard."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <motdepasse> <e-mail>"
  short:            "Enregistrer votre surnom auprès des services."
  help:             "Démarre l'enregistrement de votre surnom actuel. Un jeton de vérification\nsera envoyé à l'adresse e-mail fournie. Terminez l'enregistrement\nen exécutant \x0303/msg %bot% VERIFY <jeton>\x03. Le jeton expire dans 1 heure.\nS'il n'arrive pas, vérifiez vos spams ou utilisez \x0303RESEND\x03."
  pending:          "\x0307→\x03 Un jeton de vérification a été envoyé à \x02%email%\x02.\n  Exécutez \x0303/msg %bot% VERIFY <jeton>\x03 pour terminer l'enregistrement.\n  Vous ne l'avez pas reçu ? Vérifiez vos spams ou utilisez \x0303/msg %bot% RESEND\x03\n  Le jeton expirera dans \x021 heure\x02."
  already_registered: "\x0304✗\x03 Le surnom \x02%nickname%\x02 est déjà enregistré."
  already_pending:  "\x0304✗\x03 Le surnom \x02%nickname%\x02 a déjà une vérification en attente.\n  Utilisez \x0303/msg %bot% VERIFY <jeton>\x03 ou \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 Le surnom \x02%nickname%\x02 ne peut pas être enregistré sur ce réseau."
  invalid_email:    "\x0304✗\x03 L'adresse e-mail fournie n'est pas valide."
  email_already_used: "\x0304✗\x03 L'e-mail \x02%email%\x02 est déjà utilisé par un autre surnom. Utilisez une adresse différente."
  throttled:          "\x0304✗\x03 Vous devez attendre \x02%minutes%\x02 minute(s) avant de réessayer l'enregistrement."
  guest_prefix_forbidden: "\x0304✗\x03 Vous ne pouvez pas enregistrer un surnom commençant par \x02%prefix%\x02."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <jeton>"
  short:            "Confirmer votre adresse e-mail et activer votre surnom."
  help:             "Termine l'enregistrement en vérifiant le jeton envoyé à votre e-mail.\nLe jeton est valable 1 heure à partir du moment de l'enregistrement."
  success:          "\x0303✔\x03 Le surnom \x02%nickname%\x02 a été enregistré avec succès et vous êtes maintenant identifié."
  invalid_token:    "\x0304✗\x03 Le jeton est invalide ou a expiré. Utilisez \x0303/msg %bot% REGISTER\x03 pour recommencer."
  no_pending:       "\x0304✗\x03 Vous n'avez aucun enregistrement en attente à vérifier."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Renvoyer le jeton de vérification à votre e-mail."
  help:             "Renvoie le jeton de vérification à l'adresse e-mail fournie lors de\nl'enregistrement. Ne fonctionne que si vous avez un enregistrement en attente."
  success:          "\x0307→\x03 Jeton de vérification renvoyé à \x02%email%\x02."
  no_pending:       "\x0304✗\x03 Vous n'avez aucun enregistrement en attente pour renvoyer un jeton."
  throttled:        "\x0304✗\x03 Vous devez attendre \x02%minutes%\x02 minute(s) avant de demander un autre e-mail de vérification."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <surnom> [jeton]"
  short:            "Récupérer votre surnom si vous avez perdu votre mot de passe."
  help:             "Récupère l'accès à un surnom enregistré lorsque vous avez perdu votre mot de passe.\n1) \x0303RECOVER <surnom>\x03 — un jeton est envoyé à l'e-mail du surnom.\n2) \x0303RECOVER <surnom> <jeton>\x03 — saisissez le jeton de l'e-mail pour réinitialiser votre mot de passe.\nVous recevrez alors un mot de passe temporaire et la commande pour le changer."
  email_sent:       "\x0307→\x03 Un jeton de récupération a été envoyé à \x02%email_hint%\x02. Vérifiez votre boîte de réception (et vos spams)."
  not_registered:   "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas enregistré."
  pending:          "\x0304✗\x03 Le surnom \x02%nickname%\x02 est en attente de vérification e-mail."
  suspended:        "\x0304✗\x03 Le surnom \x02%nickname%\x02 est suspendu. Raison : %reason%"
  forbidden:        "\x0304✗\x03 Le surnom \x02%nickname%\x02 ne peut pas être utilisé sur ce réseau."
  no_email:         "\x0304✗\x03 Aucun e-mail n'est défini pour le surnom \x02%nickname%\x02. La récupération n'est pas disponible."
  throttled:        "\x0304✗\x03 Vous devez attendre \x02%minutes%\x02 minute(s) avant de demander un autre e-mail de récupération."
  invalid_token:    "\x0304✗\x03 Le jeton est invalide ou a expiré. Demandez-en un nouveau avec \x0303RECOVER %nickname%\x03."
  success_identify: "\x0303✔\x03 Mot de passe réinitialisé. Identifiez-vous maintenant : \x0303%identify_cmd%\x03"
  success_then_change: "Puis changez votre mot de passe : \x0303/msg %bot% SET PASSWORD <nouveau_motdepasse>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <surnom> <motdepasse>"
  short:            "S'identifier comme le propriétaire d'un surnom."
  help:             "Authentifie votre session auprès de %nickserv% avec votre surnom et mot de passe.\nAprès une identification réussie, vous recevrez le mode enregistré \x02+r\x02\net, si vous utilisiez un surnom invité, votre surnom enregistré sera restauré."
  success:          "\x0303✔\x03 Vous êtes maintenant identifié en tant que \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 Vous êtes déjà identifié en tant que \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas enregistré."
  invalid_credentials: "\x0304✗\x03 Mot de passe incorrect. Veuillez réessayer."
  locked_out:         "\x0304✗\x03 Trop de tentatives échouées. Réessayez dans \x02%minutes%\x02 minute(s)."
  ghost_released:   "\x0307⚡\x03 La session fantôme qui occupait \x02%nickname%\x02 a été déconnectée."
  kill_reason:      "Surnom %nickname% récupéré par %source% (le propriétaire enregistré s'est identifié)"
  pending:          "\x0304✗\x03 Le surnom \x02%nickname%\x02 est en attente de vérification e-mail.\n  Exécutez \x0303/msg %bot% VERIFY <jeton>\x03 ou \x0303/msg %bot% RESEND\x03."
  suspended:        "\x0304✗\x03 Le surnom \x02%nickname%\x02 est suspendu. Raison : %reason%"
  forbidden:        "\x0304✗\x03 Le surnom \x02%nickname%\x02 ne peut pas être utilisé sur ce réseau."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <surnom>"
  short:            "Afficher le statut d'enregistrement d'un surnom."
  help:             "Affiche le statut actuel d'un surnom : enregistré, en attente de vérification,\nsuspendu ou interdit."
  header:           "\x02Statut du surnom \x0307%nickname%\x03 :\x02"
  unregistered:     "  Statut          : Non enregistré"
  not_registered_offline: "  Statut          : \x0315Non enregistré\x03"
  pending:          "  Statut          : \x0307En attente de vérification\x03"
  pending_expires:  "  Expire dans     : %minutes% minute(s)"
  pending_expires_at: "  Expire le       : %date%"
  not_connected:    "  Statut          : \x0315Non connecté\x03"
  not_identified:   "  Statut          : \x0307Non identifié\x03"
  identified:       "  Statut          : \x0303Identifié\x03"
  suspended:        "  Statut          : \x0304Suspendu\x03"
  suspended_reason: "  Raison          : %reason%"
  suspended_until:  "  Fin le          : %date%"
  suspended_permanent: "  Fin le          : Permanent"
  forbidden:        "  Statut          : \x0304Interdit\x03"
  forbidden_reason: "  Raison          : %reason%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <surnom>"
  short:            "Afficher les informations d'un surnom enregistré."
  help:             "Affiche les détails d'enregistrement d'un surnom : date d'enregistrement,\nstatut de connexion, dernier message de départ et adresse e-mail.\nL'e-mail n'est visible que par le propriétaire lorsqu'il est identifié.\nAvec PRIVATE ON, seuls le propriétaire et les opérateurs IRC\npeuvent voir les informations."
  not_registered:   "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas enregistré."
  private:          "\x0304✗\x03 Les informations du surnom \x02%nickname%\x02 sont privées."
  header:           "\x02Informations pour le surnom \x0307%nickname%\x03 :\x02"
  status:           "  \x0314Statut\x03           : %status%"
  status_registered:  "\x0303Enregistré\x03"
  status_suspended:   "\x0304Suspendu\x03"
  status_forbidden:   "\x0304Interdit\x03"
  reason:           "  \x0314Raison\x03           : %reason%"
  suspended_until:  "  \x0314Fin le\x03           : %date%"
  suspended_permanent: "  \x0314Fin le\x03           : Permanent"
  registered_at:    "  \x0314Enregistré\x03       : %date%"
  last_seen_online: "  \x0314Dernière vue\x03     : \x0303● EN LIGNE\x03"
  last_seen_at:     "  \x0314Dernière vue\x03     : %date%"
  last_seen_never:  "  \x0314Dernière vue\x03     : Jamais"
  last_quit:        "  \x0314Dernier départ\x03   : %message%"
  last_connect:     "  \x0314Dernière vue de\x03  : %ip% (%host%)"
  language:         "  \x0314Langue\x03            : %language%"
  email:            "  \x0314E-mail\x03           : %email%"
  vhost:            "  \x0314VHost\x03            : %vhost%"
  no_expire:        "  \x0314N'expire jamais\x03  : Oui"
  footer:           "\x0314─────────────────────────────\x03"
  channels_header:  "\x0314\x0ACanaux avec accès :\x03"
  channels_entry_founder:   "  %channel% (\x0303Fondateur\x03)"
  channels_entry_successor: "  %channel% (\x0303Successeur\x03)"
  channels_entry_access:    "  %channel% (%level%)"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <option> <valeur>"
  short:            "Modifier vos paramètres de surnom %nickserv%."
  help:             "Modifie vos paramètres de surnom %nickserv%.\nVous devez être identifié pour utiliser cette commande."
  unknown_option:   "\x0304✗\x03 Option inconnue \x02%option%\x02. Options disponibles : %options%."

  password:
    syntax:         "SET PASSWORD <nouveau_motdepasse>"
    short:          "Changer le mot de passe de votre surnom."
    help:           "Change le mot de passe de votre surnom NickServ. Le nouveau mot de passe\nprend effet immédiatement. Choisissez un mot de passe robuste d'au moins\n6 caractères que vous n'utilisez pas sur d'autres services."
    success:        "\x0303✔\x03 Votre mot de passe a été mis à jour avec succès."

  email:
    syntax:         "SET EMAIL <nouvel_e-mail> [jeton]"
    short:          "Changer l'adresse e-mail liée à votre surnom (confirmation en deux étapes)."
    help:           "Changement d'e-mail en deux étapes pour la sécurité.\n1) \x0303SET EMAIL <nouvel_e-mail>\x03 — un jeton est envoyé à votre e-mail actuel.\n2) \x0303SET EMAIL <nouvel_e-mail> <jeton>\x03 — confirmez avec le jeton reçu.\nLe jeton expire dans 1 heure."
    success:        "\x0303✔\x03 Votre e-mail a été mis à jour en \x02%email%\x02."
    pending_sent:   "\x0307→\x03 Un jeton de confirmation a été envoyé à \x02%current_email%\x02.\n  Pour confirmer le changement vers \x02%new_email%\x02, exécutez :\n  \x0303/msg %bot% SET EMAIL %new_email% <jeton>\x03\n  Le jeton expire dans 1 heure."
    invalid_token:  "\x0304✗\x03 Le jeton est invalide ou a expiré. Demandez-en un nouveau avec \x0303SET EMAIL <nouvel_e-mail>\x03."

  language:
    syntax:         "SET LANGUAGE <code>"
    short:          "Changer la langue que les services utilisent pour communiquer avec vous."
    help:           "Change la langue que %nickserv% et les autres services utilisent pour vous parler.\nLangues disponibles :\n  \x02ca\x02 (catalan)\n  \x02de\x02 (allemand)\n  \x02el\x02 (grec)\n  \x02en\x02 (anglais)\n  \x02es\x02 (espagnol)\n  \x02eu\x02 (basque)\n  \x02fr\x02 (français)\n  \x02gl\x02 (galicien)\n  \x02it\x02 (italien)\n  \x02nl\x02 (néerlandais)\n  \x02pl\x02 (polonais)\n  \x02pt\x02 (portugais)\n  \x02ro\x02 (roumain)\n  \x02tr\x02 (turc)"
    success:        "\x0303✔\x03 Langue changée en \x02%language%\x02."
    invalid:        "\x0304✗\x03 Langue non prise en charge. Langues disponibles : %languages%."

  timezone:
    syntax:         "SET TIMEZONE <fuseau_horaire>"
    short:          "Définir le fuseau horaire utilisé pour l'affichage des dates."
    help:           "Définit le fuseau horaire utilisé lorsque %nickserv% affiche des dates.\nUtilisez \x02HELP SET TIMEZONE\x02 pour l'index des régions ; \x02HELP SET TIMEZONE <région>\x02 (ex. Europe) pour les fuseaux de cette région. Utilisez \x02OFF\x02 pour effacer."
    success:        "\x0303✔\x03 Fuseau horaire défini sur \x02%timezone%\x02. Les dates seront affichées dans ce fuseau."
    cleared:        "\x0303✔\x03 Fuseau horaire effacé. Les dates utiliseront le fuseau par défaut du réseau."
    invalid:        "\x0304✗\x03 Fuseau horaire invalide \x02%timezone%\x02. Utilisez un identifiant valide (ex. UTC, Europe/Paris)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Activer ou désactiver la confidentialité des informations de votre surnom."
    help:           "Contrôle la visibilité des informations de votre surnom dans la commande INFO.\nAvec \x02PRIVATE ON\x02, seuls vous et les opérateurs IRC peuvent voir vos détails.\nAvec \x02PRIVATE OFF\x02, vos informations sont publiques pour tous."
    on:             "\x0303✔\x03 Les informations de votre surnom sont maintenant \x02privées\x02."
    off:            "\x0303✔\x03 Les informations de votre surnom sont maintenant \x02publiques\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Utiliser PRIVMSG (ON) ou NOTICE (OFF) pour les réponses des services."
    help:           "Contrôle comment %nickserv% et les autres services vous envoient les messages.\nAvec \x02MSG ON\x02, les réponses sont envoyées en \x02PRIVMSG\x02 (certains clients peuvent déclencher des réponses ou notifications).\nAvec \x02MSG OFF\x02, les réponses sont envoyées en \x02NOTICE\x02 (par défaut ; généralement sans réponse automatique)."
    on:             "\x0303✔\x03 Les messages des services seront maintenant envoyés en \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 Les messages des services seront maintenant envoyés en \x02NOTICE\x02."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Définir ou effacer votre hôte virtuel personnalisé (hostname affiché)."
    help:           "Définit un nom d'hôte personnalisé que les autres voient lorsque vous êtes identifié.\nUtilisez \x02SET VHOST OFF\x02 pour effacer. Uniquement lettres (a-z, A-Z), chiffres,\ntrait d'union et point ; pas de tiret/point au début/fin d'un bloc ; max 48 caractères. Unique par surnom."
    success:        "\x0303✔\x03 Votre hôte virtuel a été défini sur \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 Votre hôte virtuel a été effacé."
    invalid:        "\x0304✗\x03 Vhost invalide. Uniquement lettres, chiffres, trait d'union et point (pas au début/fin de bloc) ; max 48 caractères."
    taken:          "\x0304✗\x03 Ce vhost est déjà utilisé par un autre surnom."
    forced:         "\x0304✗\x03 Votre vhost est configuré automatiquement et ne peut pas être modifié avec SET VHOST."

