# --- Commandes IRCop ---------------------------------------------------------
userip:
  syntax:           "USERIP <surnom>"
  short:            "Obtenir l'adresse IP réelle et le nom d'hôte du surnom."
  help:             |
    Affiche l'adresse IP réelle et le nom d'hôte du surnom spécifié.
    Uniquement disponible pour les IRCops avec la permission 'nickserv.userip'.

    Cette commande affiche des informations sensibles sur le surnom.
    À utiliser de manière responsable.

    Syntaxe : USERIP <surnom>
    Exemple : USERIP Utilisateur123
  not_online:       "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas connecté."
  result:           "\x0307ℹ\x03 Surnom : \x02%nickname%\x02 | IP : \x0307%ip%\x03 | Hôte : \x0307%host%\x03"

permissions:
  nickserv.userip: "Voir l'adresse IP/nom d'hôte réel d'un surnom (USERIP)"
  nickserv.suspend: "Suspendre ou lever la suspension d'un surnom (SUSPEND/UNSUSPEND)"
  nickserv.rename: "Forcer le renommage d'un surnom connecté en un surnom aléatoire (RENAME)"
  nickserv.drop: "Abandonner un surnom enregistré (DROP)"
  nickserv.forbid: "Interdire ou lever l'interdiction d'un surnom (FORBID/UNFORBID)"
  nickserv.forbidvhost: "Interdire ou autoriser les motifs de vhost (FORBIDVHOST)"
  nickserv.saset: "Modifier les paramètres d'un autre surnom (SASET)"
  nickserv.noexpire: "Définir ou retirer la protection contre l'expiration d'un surnom (NOEXPIRE)"
  nickserv.history: "Consulter et gérer l'historique des actions du surnom (HISTORY)"

# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <surnom> <durée> <raison>"
  short:            "Suspendre un surnom."
  help:             |
    Suspend un surnom, empêchant le propriétaire de s'identifier.
    La suspension peut être temporaire ou permanente.

    Formats de durée : \x0303%j\x03 (jours), \x0303%h\x03 (heures), \x0303%m\x03 (minutes) ou \x03030\x03 (permanent).

    Les utilisateurs suspendus ne peuvent pas s'identifier à leur surnom.
    Les opérateurs IRC et les utilisateurs root ne peuvent pas être suspendus.

    Syntaxe : SUSPEND <surnom> <durée> <raison>
    Exemples :
      SUSPEND MauvaisUtil 7j Spam dans #aide
      SUSPEND Abuseur 30j Flood répété
      SUSPEND ProblèmeUtil 0 Contournement de bannissement permanent
  success:            "\x0303✔\x03 Le surnom \x02%nickname%\x02 a été suspendu jusqu'à \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 Le surnom \x02%nickname%\x02 est déjà suspendu."
  not_registered:     "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas enregistré."
  forbidden:          "\x0304✗\x03 Le surnom \x02%nickname%\x02 est interdit et ne peut pas être suspendu."
  cannot_suspend_oper: "\x0304✗\x03 Impossible de suspendre l'opérateur IRC \x02%nickname%\x02."
  cannot_suspend_root: "\x0304✗\x03 Impossible de suspendre l'utilisateur root \x02%nickname%\x02."
  cannot_suspend_service: "\x0304✗\x03 Impossible de suspendre le surnom de service \x02%nickname%\x02."
  invalid_duration:   "\x0304✗\x03 Durée invalide. Utilisez : \x0303<j><h><m>\x03 (ex., 7j, 12h, 30m) ou \x03030\x03 pour permanent."
  permanent:          "permanent"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <surnom>"
  short:            "Lever la suspension d'un surnom."
  help:             |
    Lève une suspension active d'un surnom, permettant au propriétaire de s'identifier à nouveau.

    Syntaxe : UNSUSPEND <surnom>
    Exemple : UNSUSPEND UnUtilisateur
  success:          "\x0303✔\x03 La suspension a été levée pour \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas enregistré."
  not_suspended:    "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas suspendu."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <surnom>"
  short:            "Forcer le renommage d'un surnom connecté en un surnom aléatoire."
  help:             |
    Force un surnom connecté à changer son surnom pour un surnom généré aléatoirement.
    Utile pour appliquer les règles du réseau sans déconnecter l'utilisateur.

    Le nouveau format de surnom utilise le préfixe invité configuré (%prefix%).

    Cette commande nécessite la permission IRCop : nickserv.rename

    Syntaxe : RENAME <surnom>
    Exemple : RENAME FauteurDeTrouble
  not_online:        "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas connecté."
  cannot_rename_root: "\x0304✗\x03 Impossible de renommer l'utilisateur root \x02%nickname%\x02."
  cannot_rename_oper: "\x0304✗\x03 Impossible de renommer l'opérateur IRC \x02%nickname%\x02."
  cannot_rename_service: "\x0304✗\x03 Impossible de renommer le surnom de service \x02%nickname%\x02."
  success:           "\x0303✓\x03 Le surnom \x02%nickname%\x02 a été renommé en \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <surnom>"
  short:            "Abandonner un surnom enregistré."
  help:             |
    Supprime un surnom enregistré de la base de données.
    Cette action est irréversible.

    Si l'utilisateur est en ligne, il sera renommé en un surnom Invité-.
    Les utilisateurs root et les opérateurs IRC ne peuvent pas être abandonnés.
    Vous ne pouvez pas abandonner votre propre surnom.

    Cette commande nécessite la permission IRCop : nickserv.drop

    Syntaxe : DROP <surnom>
    Exemple : DROP AncienCompte
  not_registered:     "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas enregistré."
  suspended:         "\x0304✗\x03 Le surnom \x02%nickname%\x02 est suspendu. Levez d'abord la suspension."
  forbidden:         "\x0304✗\x03 Le surnom \x02%nickname%\x02 est interdit."
  cannot_drop_root:   "\x0304✗\x03 Impossible d'abandonner l'utilisateur root \x02%nickname%\x02."
  cannot_drop_oper:   "\x0304✗\x03 Impossible d'abandonner l'opérateur IRC \x02%nickname%\x02."
  cannot_drop_self:    "\x0304✗\x03 Vous ne pouvez pas abandonner votre propre surnom."
  success:            "\x0303✓\x03 Le surnom \x02%nickname%\x02 a été abandonné."
  cannot_drop_service: "\x0304✗\x03 Impossible d'abandonner le surnom de service \x02%nickname%\x02."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <surnom> <raison>"
  short:            "Bloquer définitivement l'utilisation d'un surnom."
  help:             |
    Interdit l'utilisation d'un surnom sur le réseau.
    Le surnom ne peut être enregistré ni utilisé par quiconque.

    Si le surnom est actuellement enregistré, il sera d'abord abandonné.
    Si quelqu'un l'utilise, il sera forcé de changer pour un surnom Invité-.

    Les utilisateurs root, les opérateurs IRC et les surnoms de service ne peuvent pas être interdits.

    Cette commande nécessite la permission IRCop : nickserv.forbid

    Syntaxe : FORBID <surnom> <raison>
    Exemple : FORBID MauvaisSurnom Violations répétées des règles
  success:            "\x0303✔\x03 Le surnom \x02%nickname%\x02 a été interdit."
  updated:            "\x0303✔\x03 La raison d'interdiction pour \x02%nickname%\x02 a été mise à jour."
  reason_required:    "\x0304✗\x03 Vous devez fournir une raison pour l'interdiction."
  cannot_forbid_root:  "\x0304✗\x03 Impossible d'interdire l'utilisateur root \x02%nickname%\x02."
  cannot_forbid_oper:  "\x0304✗\x03 Impossible d'interdire l'opérateur IRC \x02%nickname%\x02."
  cannot_forbid_service: "\x0304✗\x03 Impossible d'interdire le surnom de service \x02%nickname%\x02."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <surnom>"
  short:            "Lever l'interdiction d'un surnom."
  help:             |
    Lève l'interdiction d'un surnom, permettant de le réutiliser.

    Cette commande nécessite la permission IRCop : nickserv.forbid

    Syntaxe : UNFORBID <surnom>
    Exemple : UNFORBID UnSurnom
  success:          "\x0303✔\x03 Le surnom \x02%nickname%\x02 n'est plus interdit."
  not_forbidden:    "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas interdit."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST ADD|DEL|LIST [motif]"
  short:            "Gérer les motifs de vhost interdits."
  help:             |
    Gère les motifs qui empêchent les utilisateurs de définir des vhosts
    correspondants via NickServ SET VHOST.

    Jokers : * correspond à toute séquence, ? correspond à un seul caractère.
    Exemple : *.pirate.com bloque tout vhost se terminant par .pirate.com

    Cette commande nécessite la permission IRCop : nickserv.forbidvhost

    Sous-commandes :
      ADD <motif>    Ajouter un motif interdit
      DEL <motif>    Supprimer un motif interdit
      LIST           Afficher tous les motifs interdits

  unknown_sub: "\x0304✗\x03 Sous-commande inconnue \x02%sub%\x02. Utilisez ADD, DEL ou LIST."

  add:
    syntax:      "FORBIDVHOST ADD <motif>"
    short:       "Ajouter un motif de vhost interdit."
    help:        |
      Ajoute un motif à la liste des vhosts interdits. Les utilisateurs
      ne pourront pas définir de vhosts correspondant à ce motif via SET VHOST.

      Jokers : * correspond à toute séquence, ? correspond à un seul caractère.

      Syntaxe : FORBIDVHOST ADD <motif>
      Exemple : FORBIDVHOST ADD *.pirate.com
    done:            "\x0303✓\x03 Motif de vhost interdit ajouté : \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 Le motif \x02%pattern%\x02 existe déjà."
    invalid:          "\x0304✗\x03 Format de motif vhost invalide."

  del:
    syntax:      "FORBIDVHOST DEL <motif>"
    short:       "Supprimer un motif de vhost interdit."
    help:        |
      Supprime un motif de la liste des vhosts interdits.

      Syntaxe : FORBIDVHOST DEL <motif>
      Exemple : FORBIDVHOST DEL *.pirate.com
    done:        "\x0303✓\x03 Motif de vhost interdit supprimé : \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 Motif \x02%pattern%\x02 introuvable."

  list:
    short:       "Lister tous les motifs de vhost interdits."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Affiche tous les motifs de vhost interdits.

      Syntaxe : FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Motifs de vhost interdits (\x02%count%\x02) :"
    entry:       "  %index%. \x0304%pattern%\x03 — par %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 Aucun motif de vhost interdit."
    unknown_creator: "inconnu"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <surnom> {ADD|DEL|VIEW|CLEAR}"
  short:            "Consulter ou gérer l'historique des actions du surnom."
  help:             |
    Gère l'historique des actions d'un surnom.
    Seuls les IRCops avec la permission 'nickserv.history' peuvent utiliser cette commande.

    Actions enregistrées automatiquement :
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Syntaxe : HISTORY <surnom> ADD <message>
              HISTORY <surnom> DEL <id>
              HISTORY <surnom> VIEW [PAGE|ALL]
              HISTORY <surnom> CLEAR

    Exemples :
      HISTORY UnSurnom VIEW
      HISTORY UnSurnom ADD Note manuelle sur cet utilisateur
      HISTORY UnSurnom VIEW 2
      HISTORY UnSurnom VIEW ALL
      HISTORY UnSurnom DEL 123
      HISTORY UnSurnom CLEAR

    Utilisez VIEW pour voir l'historique (affiche 3 entrées par défaut).
    Utilisez VIEW PAGE 2 pour voir la page suivante.
    Utilisez VIEW ALL pour voir l'historique complet.
    Utilisez ADD pour ajouter une entrée manuelle.
    Utilisez DEL pour supprimer une entrée spécifique par ID.
    Utilisez CLEAR pour supprimer toutes les entrées d'historique.
  not_registered:   "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas enregistré."
  unknown_operator: "(inconnu)"

  add:
    syntax:     "HISTORY <surnom> ADD <message>"
    short:      "Ajouter une entrée manuelle à l'historique."
    help:        |
      Ajoute une entrée manuelle à l'historique du surnom.

      Syntaxe : HISTORY <surnom> ADD <message>
      Exemple : HISTORY UnSurnom ADD Utilisateur signalé pour spam
    success:    "\x0303✔\x03 Entrée d'historique ajoutée pour \x02%nickname%\x02."

  del:
    syntax:     "HISTORY <surnom> DEL <id>"
    short:      "Supprimer une entrée d'historique par ID."
    help:        |
      Supprime une entrée d'historique spécifique par son ID.

      Syntaxe : HISTORY <surnom> DEL <id>
      Exemple : HISTORY UnSurnom DEL 42
    success:    "\x0303✔\x03 Entrée d'historique \x02%id%\x02 supprimée."
    not_found:  "\x0304✗\x03 Entrée d'historique \x02%id%\x02 introuvable."
    invalid_id: "\x0304✗\x03 ID d'entrée invalide : \x02%id%\x02."

  view:
    syntax:     "HISTORY <surnom> VIEW [PAGE|ALL]"
    short:      "Afficher l'historique des actions du surnom."
    help:        |
      Affiche l'historique des actions du surnom.

      Syntaxe : HISTORY <surnom> VIEW
                HISTORY <surnom> VIEW PAGE
                HISTORY <surnom> VIEW ALL

      Par défaut, affiche 3 entrées à la fois.
      Utilisez VIEW 2 pour voir la deuxième page.
      Utilisez VIEW ALL pour voir l'historique complet.
    header:     "\x02Historique pour \x0307%nickname%\x03\x02 (affichage %start%-%end% sur %total%) :"
    entry:       "#%id% [%date%] \x0303%action%\x03 par %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Aucune entrée d'historique trouvée pour \x02%nickname%\x02."
    page_hint:   "Utilisez \x0303HISTORY %nickname% VIEW %next_page%\x03 pour plus d'entrées."

  clear:
    syntax:     "HISTORY <surnom> CLEAR"
    short:      "Supprimer toutes les entrées d'historique d'un surnom."
    help:        |
      Supprime toutes les entrées d'historique du surnom spécifié.
      Cette action est irréversible.

      Syntaxe : HISTORY <surnom> CLEAR
      Exemple : HISTORY UnSurnom CLEAR
    success:    "\x0303✔\x03 \x02%count%\x02 entrées d'historique effacées pour \x02%nickname%\x02."

# --- Traductions des messages d'historique (utilisées lors de l'affichage) ---
history.message:
  unsuspend:                  "Suspension levée"
  password_changed_owner:     "Mot de passe changé par le propriétaire"
  password_changed_operator:  "Mot de passe changé par l'opérateur"
  email_changed_owner:        "E-mail changé de %old_email% à %new_email%"
  email_changed_operator:     "E-mail changé en %new_email% par l'opérateur"
  recover:                    "Mot de passe réinitialisé via jeton e-mail"

# --- Traductions des champs extra d'historique ---
history.extra:
  duration:      "Durée : %value%"
  expires_at:    "Expire : %value%"
  old_email:     "Ancien e-mail : %value%"
  new_email:     "Nouvel e-mail : %value%"
  method:        "Méthode : %value%"
  ip:            "IP : %value%"
  host:          "Hôte : %value%"

# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <surnom> {ON|OFF}"
  short:            "Définir ou retirer la protection contre l'expiration d'un surnom."
  help:             |
    Contrôle si un surnom expirera en raison de l'inactivité.
    Lorsque ON, le surnom n'expire jamais, quelle que soit la dernière activité.
    Lorsque OFF, les règles normales d'expiration s'appliquent.

    Seuls les IRCops avec la permission 'nickserv.noexpire' peuvent utiliser cette commande.

    Syntaxe : NOEXPIRE <surnom> {ON|OFF}
    Exemples :
      NOEXPIRE UtilisateurImportant ON
      NOEXPIRE UtilisateurImportant OFF
  success_on:       "\x0303✔\x03 Le surnom \x02%nickname%\x02 est maintenant protégé contre l'expiration."
  success_off:      "\x0303✔\x03 Le surnom \x02%nickname%\x02 expirera maintenant normalement."
  not_registered:   "\x0304✗\x03 Le surnom \x02%nickname%\x02 n'est pas enregistré."
  forbidden:         "\x0304✗\x03 Le surnom \x02%nickname%\x02 est interdit."
  suspended:         "\x0304✗\x03 Le surnom \x02%nickname%\x02 est suspendu."

# --- DEBUG -------------------------------------------------------------------
debug:
  action_message: "%operator% exécute la commande %command% sur %target%. %reason%"
  action_with_option: "%operator% exécute la commande %command% sur %target%. Option : %option%. %reason%"
  action_with_value: "%operator% exécute la commande %command% sur %target%. Option : %option%=%value%. %reason%"
  action_duration: "%operator% exécute la commande %command% sur %target%. Durée : %duration%. %reason%"
  prefix_reason: "Raison : %reason%"
