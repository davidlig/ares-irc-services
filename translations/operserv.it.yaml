# --- MOTD ----------------------------------------------------------------------
motd:
  short:            "Gestisce i messaggi MOTD inviati agli utenti alla connessione."
  syntax:           "MOTD {ADD|DEL|LIST|CLEAN} [args]"
  help:             "Gestisce le voci Message Of The Day che vengono inviate agli utenti quando si connettono alla rete.\n\n"
  unknown_sub:      "\x0304✗\x03 Sotto-comando sconosciuto. Usi: \x02ADD\x02, \x02DEL\x02, \x02LIST\x02, \x02CLEAN\x02"
  add:
    syntax:         "MOTD ADD {servizio|nick!ident@vhost} {PRIVMSG|NOTICE} <scadenza> <messaggio>"
    syntax_hint:    "\x0304✗\x03 Uso: \x02%syntax%\x02"
    short:          "Aggiunge una voce MOTD."
    help:           "Aggiunge un nuovo messaggio MOTD che sarà inviato a ogni utente quando si connette alla rete.\n\n"
    done:           "\x0303✓\x03 Voce MOTD #%id% aggiunta."
    invalid_type:   "\x0304✗\x03 Tipo di messaggio non valido. Deve essere \x02PRIVMSG\x02 o \x02NOTICE\x02."
    invalid_expiry: "\x0304✗\x03 Formato scadenza non valido. Usi: \x02<numero><s|m|h|d>\x02 (es., 30s, 5m, 24h, 7d)."
  del:
    syntax:         "MOTD DEL <id>"
    syntax_hint:    "\x0304✗\x03 Uso: \x02%syntax%\x02"
    short:          "Elimina una voce MOTD."
    help:           "Elimina una voce MOTD tramite il suo ID.\n\n"
    done:           "\x0303✓\x03 Voce MOTD #%id% eliminata."
    not_found:      "\x0304✗\x03 Voce MOTD non trovata."
  list:
    syntax:         "MOTD LIST"
