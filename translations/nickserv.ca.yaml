# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <nickname> {ON|OFF}"
  short:            "Establir o treure la protecció contra l'expiració d'un sobrenom."
  help:             |
    Controla si un sobrenom expirarà per inactivitat.
    Quan està ON, el sobrenom no expira mai independentment de la darrera activitat.
    Quan està OFF, s'apliquen les regles normals d'expiració.

    Només els IRCops amb el permís 'nickserv.noexpire' poden utilitzar aquesta ordre.

    Sintaxi: NOEXPIRE <nickname> {ON|OFF}
    Exemples:
      NOEXPIRE ImportantUser ON
      NOEXPIRE ImportantUser OFF
  success_on:       "\x0303✔\x03 El sobrenom \x02%nickname%\x02 ara està protegit contra l'expiració."
  success_off:      "\x0303✔\x03 El sobrenom \x02%nickname%\x02 ara expirarà normalment."
  not_registered:   "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està registrat."
  forbidden:         "\x0304✗\x03 El sobrenom \x02%nickname%\x02 està prohibit."
  suspended:         "\x0304✗\x03 El sobrenom \x02%nickname%\x02 està suspès."

