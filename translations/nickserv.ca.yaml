# NickServ translations — Catalan
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02        bold on/off
#   \x03NN      color (DECIMAL: 03=green, 04=red, 07=orange, 14=dark grey)
#   \x03        reset color
#   \x0F        reset all formatting
#
# NOTE: IRC colors use DECIMAL numbers (0-15), not hexadecimal.
#   \x0314 = dark grey (14 decimal)  ← CORRECT
#   \x030F = color 0 + letter "F"    ← WRONG (0F is hex, not decimal)

unknown_command: "\x0304✗\x03 Ordre desconeguda \x02%command%\x02. Utilitzeu \x0303/msg %bot% HELP\x03."

error:
  syntax:            "\x0304✗\x03 Sintaxi incorrecta. Ús: \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Aquesta ordre està restringida als operadors d'IRC."
  not_identified:    "\x0304✗\x03 No esteu identificat. Utilitzeu \x0303/msg %bot% IDENTIFY <nickname> <password>\x03"
  permission_denied: "\x0304✗\x03 Permís denegat. No teniu accés a aquesta ordre."
  mail_failed:       "\x0304✗\x03 No s'ha pogut enviar el correu electrònic. Comproveu la vostra adreça o torneu-ho a provar més tard."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <password> <email>"
  short:            "Registrar el vostre sobrenom amb els serveis."
  help:             "Inicia el registre del vostre sobrenom actual. S'enviarà un token de\nverificació a l'adreça de correu proporcionada. Completeu el registre\nexecutant \x0303/msg %bot% VERIFY <token>\x03. El token expira en 1 hora.\nSi no arriba, comproveu la carpeta de correu brossa o utilitzeu \x0303RESEND\x03."
  pending:          "\x0307→\x03 S'ha enviat un token de verificació a \x02%email%\x02.\n  Executeu \x0303/msg %bot% VERIFY <token>\x03 per completar el registre.\n  No l'heu rebut? Comproveu el correu brossa o utilitzeu \x0303/msg %bot% RESEND\x03\n  El token expirarà en \x021 hora\x02."
  already_registered: "\x0304✗\x03 El sobrenom \x02%nickname%\x02 ja està registrat."
  already_pending:  "\x0304✗\x03 El sobrenom \x02%nickname%\x02 ja té una verificació pendent.\n  Utilitzeu \x0303/msg %bot% VERIFY <token>\x03 o \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no es pot registrar en aquesta xarxa."
  invalid_email:    "\x0304✗\x03 L'adreça de correu proporcionada no és vàlida."
  email_already_used: "\x0304✗\x03 El correu \x02%email%\x02 ja està en ús per un altre sobrenom. Utilitzeu una adreça diferent."
  throttled:          "\x0304✗\x03 Heu d'esperar \x02%minutes%\x02 minut(s) abans d'intentar registrar-vos de nou."
  guest_prefix_forbidden: "\x0304✗\x03 No podeu registrar un sobrenom que comenci amb \x02%prefix%\x02."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "Confirmar la vostra adreça de correu i activar el vostre sobrenom."
  help:             "Completa el registre verificant el token enviat al vostre correu.\nEl token és vàlid durant 1 hora des del moment del registre."
  success:          "\x0303✔\x03 El sobrenom \x02%nickname%\x02 s'ha registrat amb èxit i ara esteu identificat."
  invalid_token:    "\x0304✗\x03 El token no és vàlid o ha expirat. Utilitzeu \x0303/msg %bot% REGISTER\x03 per començar de nou."
  no_pending:       "\x0304✗\x03 No teniu cap registre pendent per verificar."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Reenviar el token de verificació al vostre correu."
  help:             "Reenvia el token de verificació a l'adreça de correu proporcionada durant\nel registre. Només funciona si teniu un registre pendent."
  success:          "\x0307→\x03 Token de verificació reenviat a \x02%email%\x02."
  no_pending:       "\x0304✗\x03 No teniu cap registre pendent per reenviar un token."
  throttled:        "\x0304✗\x03 Heu d'esperar \x02%minutes%\x02 minut(s) abans de sol·licitar un altre correu de verificació."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <nickname> [token]"
  short:            "Recuperar el vostre sobrenom si heu perdut la contrasenya."
  help:             "Recupera l'accés a un sobrenom registrat quan heu perdut la contrasenya.\n1) \x0303RECOVER <nickname>\x03 — s'envia un token al correu del sobrenom.\n2) \x0303RECOVER <nickname> <token>\x03 — introduïu el token del correu per restablir la contrasenya.\nAleshores rebreu una contrasenya temporal i l'ordre per canviar-la."
  email_sent:       "\x0307→\x03 S'ha enviat un token de recuperació a \x02%email_hint%\x02. Comproveu la vostra bústia (i la carpeta de correu brossa)."
  not_registered:   "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està registrat."
  pending:          "\x0304✗\x03 El sobrenom \x02%nickname%\x02 té una verificació de correu pendent."
  suspended:        "\x0304✗\x03 El sobrenom \x02%nickname%\x02 està suspès. Motiu: %reason%"
  forbidden:        "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no es pot utilitzar en aquesta xarxa."
  no_email:         "\x0304✗\x03 No hi ha cap correu establert per al sobrenom \x02%nickname%\x02. La recuperació no està disponible."
  throttled:        "\x0304✗\x03 Heu d'esperar \x02%minutes%\x02 minut(s) abans de sol·licitar un altre correu de recuperació."
  invalid_token:    "\x0304✗\x03 El token no és vàlid o ha expirat. Sol·liciteu-ne un de nou amb \x0303RECOVER %nickname%\x03."
  success_identify: "\x0303✔\x03 Contrasenya restablerta. Identifiqueu-vos ara: \x0303%identify_cmd%\x03"
  success_then_change: "Després canvieu la vostra contrasenya: \x0303/msg %bot% SET PASSWORD <new_password>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <nickname> <password>"
  short:            "Identificar-vos com a propietari d'un sobrenom."
  help:             "Autentica la vostra sessió amb %nickserv% utilitzant el vostre sobrenom i contrasenya.\nDesprés d'una identificació amb èxit rebreu el mode registrat \x02+r\x02\ni, si estàveu utilitzant un sobrenom de convidat, es restaurarà el vostre sobrenom registrat."
  success:          "\x0303✔\x03 Ara esteu identificat com a \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 Ja esteu identificat com a \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està registrat."
  invalid_credentials: "\x0304✗\x03 Contrasenya incorrecta. Torneu-ho a provar."
  locked_out:         "\x0304✗\x03 Massa intents fallits. Torneu-ho a provar d'aquí a \x02%minutes%\x02 minut(s)."
  ghost_released:   "\x0307⚡\x03 La sessió fantasma que retenia \x02%nickname%\x02 ha estat desconnectada."
  kill_reason:      "Sobrenom %nickname% reclamat per %source% (el propietari registrat s'ha identificat)"
  pending:          "\x0304✗\x03 El sobrenom \x02%nickname%\x02 té una verificació de correu pendent.\n  Executeu \x0303/msg %bot% VERIFY <token>\x03 o \x0303/msg %bot% RESEND\x03."
  suspended:        "\x0304✗\x03 El sobrenom \x02%nickname%\x02 està suspès. Motiu: %reason%"
  forbidden:        "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no es pot utilitzar en aquesta xarxa."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <nickname>"
  short:            "Mostrar l'estat de registre d'un sobrenom."
  help:             "Mostra l'estat actual d'un sobrenom: registrat, verificació pendent,\nsuspès o prohibit."
  header:           "\x02Estat del sobrenom \x0307%nickname%\x03:\x02"
  unregistered:     "  Estat           : No registrat"
  not_registered_offline: "  Estat           : \x0315No registrat\x03"
  pending:          "  Estat           : \x0307Verificació pendent\x03"
  pending_expires:  "  Expira en       : %minutes% minut(s)"
  pending_expires_at: "  Expira el       : %date%"
  not_connected:    "  Estat           : \x0315No connectat\x03"
  not_identified:   "  Estat           : \x0307No identificat\x03"
  identified:       "  Estat           : \x0303Identificat\x03"
  suspended:        "  Estat           : \x0304Suspès\x03"
  suspended_reason: "  Motiu           : %reason%"
  suspended_until:  "  Acaba el        : %date%"
  suspended_permanent: "  Acaba el        : Permanent"
  forbidden:        "  Estat           : \x0304Prohibit\x03"
  forbidden_reason: "  Motiu           : %reason%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <nickname>"
  short:            "Mostrar informació sobre un sobrenom registrat."
  help:             "Mostra els detalls de registre d'un sobrenom: data de registre, estat de\nconnexió, darrer missatge de sortida i adreça de correu. El correu només és\nvisible per al propietari quan està identificat. Amb PRIVATE ON només el\npropietari i els operadors d'IRC poden veure la informació."
  not_registered:   "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està registrat."
  private:          "\x0304✗\x03 La informació del sobrenom \x02%nickname%\x02 és privada."
  header:           "\x02Informació del sobrenom \x0307%nickname%\x03:\x02"
  status:           "  \x0314Estat\x03                 : %status%"
  status_registered:  "\x0303Registrat\x03"
  status_suspended:   "\x0304Suspès\x03"
  status_forbidden:   "\x0304Prohibit\x03"
  reason:           "  \x0314Motiu\x03                 : %reason%"
  suspended_until:  "  \x0314Acaba el\x03              : %date%"
  suspended_permanent: "  \x0314Acaba el\x03              : Permanent"
  registered_at:    "  \x0314Registrat\x03             : %date%"
  last_seen_online: "  \x0314Darrer vist\x03           : \x0303● EN LÍNIA ARA\x03"
  last_seen_at:     "  \x0314Darrer vist\x03           : %date%"
  last_seen_never:  "  \x0314Darrer vist\x03           : Mai"
  last_quit:        "  \x0314Darrer miss. sortida\x03  : %message%"
  last_connect:     "  \x0314Darrer vist des de\x03    : %ip% (%host%)"
  language:         "  \x0314Idioma\x03                : %language%"
  email:            "  \x0314Correu\x03                : %email%"
  vhost:            "  \x0314VHost\x03                 : %vhost%"
  no_expire:        "  \x0314Mai expira\x03            : Sí"
  footer:           "\x0314─────────────────────────────\x03"
  channels_header:  "\x0314\x0ACanals amb accés:\x03"
  channels_entry_founder:   "  %channel% (\x0303Fundador\x03)"
  channels_entry_successor: "  %channel% (\x0303Successor\x03)"
  channels_entry_access:    "  %channel% (%level%)"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <option> <value>"
  short:            "Canviar la configuració del vostre sobrenom de %nickserv%."
  help:             "Modifica la configuració del vostre sobrenom de %nickserv%.\nHeu d'estar identificat per utilitzar aquesta ordre."
  unknown_option:   "\x0304✗\x03 Opció desconeguda \x02%option%\x02. Opcions disponibles: %options%."

  password:
    syntax:         "SET PASSWORD <new_password>"
    short:          "Canviar la contrasenya del vostre sobrenom."
    help:           "Canvia la contrasenya del vostre sobrenom de NickServ. La nova contrasenya\nté efecte immediatament. Trieu una contrasenya forta d'almenys 6 caràcters\nque no utilitzeu en altres serveis."
    success:        "\x0303✔\x03 La vostra contrasenya s'ha actualitzat correctament."

  email:
    syntax:         "SET EMAIL <new_email> [token]"
    short:          "Canviar l'adreça de correu vinculada al vostre sobrenom (confirmació en dos passos)."
    help:           "Canvi de correu en dos passos per seguretat.\n1) \x0303SET EMAIL <new_email>\x03 — s'envia un token al vostre correu actual.\n2) \x0303SET EMAIL <new_email> <token>\x03 — confirmeu amb el token rebut.\nEl token expira en 1 hora."
    success:        "\x0303✔\x03 El vostre correu s'ha actualitzat a \x02%email%\x02."
    pending_sent:   "\x0307→\x03 S'ha enviat un token de confirmació a \x02%current_email%\x02.\n  Per confirmar el canvi a \x02%new_email%\x02 executeu:\n  \x0303/msg %bot% SET EMAIL %new_email% <token>\x03\n  El token expira en 1 hora."
    invalid_token:  "\x0304✗\x03 El token no és vàlid o ha expirat. Sol·liciteu-ne un de nou amb \x0303SET EMAIL <new_email>\x03."

  language:
    syntax:         "SET LANGUAGE <code>"
    short:          "Canviar l'idioma que els serveis utilitzen per comunicar-se amb vós."
    help:           "Canvia l'idioma que %nickserv% i altres serveis utilitzen quan us parlen.\nIdiomes disponibles:\n  \x02ca\x02 (Català)\n  \x02de\x02 (Alemany)\n  \x02el\x02 (Grec)\n  \x02en\x02 (Anglès)\n  \x02es\x02 (Espanyol)\n  \x02eu\x02 (Basc)\n  \x02fr\x02 (Francès)\n  \x02gl\x02 (Gallec)\n  \x02it\x02 (Italià)\n  \x02nl\x02 (Neerlandès)\n  \x02pl\x02 (Polonès)\n  \x02pt\x02 (Portuguès)\n  \x02ro\x02 (Romanès)\n  \x02tr\x02 (Turc)"
    success:        "\x0303✔\x03 Idioma canviat a \x02%language%\x02."
    invalid:        "\x0304✗\x03 Idioma no admès. Idiomes disponibles: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <timezone>"
    short:          "Establir la zona horària utilitzada en mostrar dates."
    help:           "Estableix la zona horària que %nickserv% utilitza en mostrar dates.\nUtilitzeu \x02HELP SET TIMEZONE\x02 per a l'índex de regions; \x02HELP SET TIMEZONE <region>\x02 (p. ex. Europe) per a les zones horàries d'aquesta regió. Utilitzeu \x02OFF\x02 per esborrar."
    success:        "\x0303✔\x03 Zona horària establerta a \x02%timezone%\x02. Les dates es mostraran en aquesta zona horària."
    cleared:        "\x0303✔\x03 Zona horària esborrada. Les dates utilitzaran el valor predeterminat de la xarxa."
    invalid:        "\x0304✗\x03 Zona horària no vàlida \x02%timezone%\x02. Utilitzeu un identificador vàlid (p. ex. UTC, Europe/Madrid)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Activar o desactivar la privadesa de la informació del vostre sobrenom."
    help:           "Controla la visibilitat de la informació del vostre sobrenom a l'ordre INFO.\nAmb \x02PRIVATE ON\x02 només vós i els operadors d'IRC podeu veure els vostres detalls.\nAmb \x02PRIVATE OFF\x02 la vostra informació és pública per a tothom."
    on:             "\x0303✔\x03 La informació del vostre sobrenom ara és \x02privada\x02."
    off:            "\x0303✔\x03 La informació del vostre sobrenom ara és \x02pública\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Utilitzar PRIVMSG (ON) o NOTICE (OFF) per a les respostes dels serveis."
    help:           "Controla com %nickserv% i altres serveis us envien missatges.\nAmb \x02MSG ON\x02 les respostes s'envien com a \x02PRIVMSG\x02 (alguns clients poden activar respostes o notificacions).\nAmb \x02MSG OFF\x02 les respostes s'envien com a \x02NOTICE\x02 (predeterminat; normalment sense resposta automàtica)."
    on:             "\x0303✔\x03 Els missatges del servei s'enviaran ara com a \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 Els missatges del servei s'enviaran ara com a \x02NOTICE\x02."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Establir o esborrar el vostre amfitrió virtual personalitzat (nom d'amfitrió mostrat)."
    help:           "Estableix un nom d'amfitrió personalitzat que els altres veuen quan esteu identificat.\nUtilitzeu \x02SET VHOST OFF\x02 per esborrar-lo. Només lletres (a-z, A-Z), dígits, guionet i punt;\nsense guionet ni punt al principi/final de cap bloc; màx. 48 caràcters. Únic per sobrenom."
    success:        "\x0303✔\x03 El vostre amfitrió virtual s'ha establert a \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 El vostre amfitrió virtual s'ha esborrat."
    invalid:        "\x0304✗\x03 Vhost no vàlid. Només lletres, dígits, guionet i punt (no al principi/final de bloc); màx. 48 caràcters."
    taken:          "\x0304✗\x03 Aquest vhost ja està en ús per un altre sobrenom."
    forced:         "\x0304✗\x03 El vostre vhost es configura automàticament i no es pot canviar amb SET VHOST."

