protection:
  nick_in_use:      "\x0304⚠\x03 El sobrenom \x02%nickname%\x02 està registrat. Se us canviarà el nom si no us identifiqueu."
  renamed_to:       "\x0307→\x03 Heu estat reanomenat a \x02%guest_nick%\x02. Per recuperar el vostre sobrenom:\n\x0303/msg %bot% IDENTIFY %nickname% <password>\x03"
  nick_forbidden:   "\x0304✗\x03 El sobrenom \x02%nickname%\x02 està prohibit: %reason%"

# --- IRCop Commands ---------------------------------------------------------
userip:
  syntax:           "USERIP <nickname>"
  short:            "Obtenir l'adreça IP real i el nom d'amfitrió del sobrenom."
  help:             |
    Mostra l'adreça IP real i el nom d'amfitrió del sobrenom especificat.
    Només disponible per a IRCops amb el permís 'nickserv.userip'.

    Aquesta ordre mostra informació sensible del sobrenom.
    Utilitzeu-la amb responsabilitat.

    Sintaxi: USERIP <nickname>
    Exemple: USERIP SomeUser
  not_online:       "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està connectat."
  result:           "\x0307ℹ\x03 Sobrenom: \x02%nickname%\x02 | IP: \x0307%ip%\x03 | Amfitrió: \x0307%host%\x03"

permissions:
  nickserv.userip: "Veure l'adreça IP/nom d'amfitrió real d'un sobrenom (USERIP)"
  nickserv.suspend: "Suspendre o treure la suspensió d'un sobrenom (SUSPEND/UNSUSPEND)"
  nickserv.rename: "Forçar el canvi de nom d'un sobrenom connectat a un sobrenom aleatori (RENAME)"
  nickserv.drop: "Eliminar un sobrenom registrat (DROP)"
  nickserv.forbid: "Prohibir o treure la prohibició d'un sobrenom (FORBID/UNFORBID)"
  nickserv.forbidvhost: "Prohibir o permetre patrons de vhost (FORBIDVHOST)"
  nickserv.saset: "Modificar la configuració d'un altre sobrenom (SASET)"
  nickserv.noexpire: "Establir o treure la protecció contra l'expiració d'un sobrenom (NOEXPIRE)"
  nickserv.history: "Veure i gestionar l'historial d'accions d'un sobrenom (HISTORY)"

# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <nickname> <duration> <reason>"
  short:            "Suspendre un sobrenom."
  help:             |
    Suspèn un sobrenom, impedint que el propietari s'identifiqui.
    La suspensió pot ser temporal o permanent.

    Formats de durada: \x0303%d\x03 (dies), \x0303%h\x03 (hores), \x0303%m\x03 (minuts), o \x03030\x03 (permanent).

    Els usuaris suspesos no poden identificar-se amb el seu sobrenom.
    Els operadors d'IRC i els usuaris root no es poden suspendre.

    Sintaxi: SUSPEND <nickname> <duration> <reason>
    Exemples:
      SUSPEND BadUser 7d Spam a #help
      SUSPEND Abuser 30d Flood repetit
      SUSPEND ProblemUser 0 Evasió de permaban
  success:            "\x0303✔\x03 El sobrenom \x02%nickname%\x02 ha estat suspès fins a \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 El sobrenom \x02%nickname%\x02 ja està suspès."
  not_registered:     "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està registrat."
  forbidden:          "\x0304✗\x03 El sobrenom \x02%nickname%\x02 està prohibit i no es pot suspendre."
  cannot_suspend_oper: "\x0304✗\x03 No es pot suspendre l'operador d'IRC \x02%nickname%\x02."
  cannot_suspend_root: "\x0304✗\x03 No es pot suspendre l'usuari root \x02%nickname%\x02."
  cannot_suspend_service: "\x0304✗\x03 No es pot suspendre el sobrenom de servei \x02%nickname%\x02."
  invalid_duration:   "\x0304✗\x03 Durada no vàlida. Utilitzeu: \x0303<d><h><m>\x03 (p. ex., 7d, 12h, 30m) o \x03030\x03 per a permanent."
  permanent:          "permanent"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <nickname>"
  short:            "Treure la suspensió d'un sobrenom."
  help:             |
    Treu una suspensió activa d'un sobrenom, permetent que el propietari s'identifiqui de nou.

    Sintaxi: UNSUSPEND <nickname>
    Exemple: UNSUSPEND SomeUser
  success:          "\x0303✔\x03 S'ha aixecat la suspensió de \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està registrat."
  not_suspended:    "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està suspès."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <nickname>"
  short:            "Forçar el canvi de nom d'un sobrenom connectat a un sobrenom aleatori."
  help:             |
    Obliga un sobrenom connectat a canviar el seu sobrenom a un de generat aleatòriament.
    Útil per fer complir les polítiques de xarxa sense desconnectar l'usuari.

    El format del nou sobrenom utilitza el prefix de convidat configurat (%prefix%).

    Aquesta ordre requereix el permís d'IRCop: nickserv.rename

    Sintaxi: RENAME <nickname>
    Exemple: RENAME Troublemaker
  not_online:        "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està connectat."
  cannot_rename_root: "\x0304✗\x03 No es pot reanomenar l'usuari root \x02%nickname%\x02."
  cannot_rename_oper: "\x0304✗\x03 No es pot reanomenar l'operador d'IRC \x02%nickname%\x02."
  cannot_rename_service: "\x0304✗\x03 No es pot reanomenar el sobrenom de servei \x02%nickname%\x02."
  success:           "\x0303✓\x03 El sobrenom \x02%nickname%\x02 ha estat reanomenat a \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <nickname>"
  short:            "Eliminar un sobrenom registrat."
  help:             |
    Elimina un sobrenom registrat de la base de dades.
    Aquesta acció no es pot desfer.

    Si l'usuari està en línia, serà reanomenat a un sobrenom de Convidat.
    Els usuaris root i els operadors d'IRC no es poden eliminar.
    No podeu eliminar el vostre propi sobrenom.

    Aquesta ordre requereix el permís d'IRCop: nickserv.drop

    Sintaxi: DROP <nickname>
    Exemple: DROP OldAccount
  not_registered:     "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està registrat."
  suspended:         "\x0304✗\x03 El sobrenom \x02%nickname%\x02 està suspès. Traieu la suspensió primer."
  forbidden:         "\x0304✗\x03 El sobrenom \x02%nickname%\x02 està prohibit."
  cannot_drop_root:   "\x0304✗\x03 No es pot eliminar l'usuari root \x02%nickname%\x02."
  cannot_drop_oper:   "\x0304✗\x03 No es pot eliminar l'operador d'IRC \x02%nickname%\x02."
  cannot_drop_self:    "\x0304✗\x03 No podeu eliminar el vostre propi sobrenom."
  success:            "\x0303✓\x03 El sobrenom \x02%nickname%\x02 ha estat eliminat."
  cannot_drop_service: "\x0304✗\x03 No es pot eliminar el sobrenom de servei \x02%nickname%\x02."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <nickname> <reason>"
  short:            "Bloquejar permanentment l'ús d'un sobrenom."
  help:             |
    Prohibeix l'ús d'un sobrenom a la xarxa.
    El sobrenom no es pot registrar ni utilitzar per ningú.

    Si el sobrenom està registrat actualment, s'eliminarà primer.
    Si algú l'està utilitzant, serà forçat a canviar a un sobrenom de Convidat.

    Els usuaris root, operadors d'IRC i sobrenoms de servei no es poden prohibir.

    Aquesta ordre requereix el permís d'IRCop: nickserv.forbid

    Sintaxi: FORBID <nickname> <reason>
    Exemple: FORBID BadNick Violacions repetides de les normes
  success:            "\x0303✔\x03 El sobrenom \x02%nickname%\x02 ha estat prohibit."
  updated:            "\x0303✔\x03 El motiu de prohibició de \x02%nickname%\x02 ha estat actualitzat."
  reason_required:    "\x0304✗\x03 Heu de proporcionar un motiu per a la prohibició."
  cannot_forbid_root:  "\x0304✗\x03 No es pot prohibir l'usuari root \x02%nickname%\x02."
  cannot_forbid_oper:  "\x0304✗\x03 No es pot prohibir l'operador d'IRC \x02%nickname%\x02."
  cannot_forbid_service: "\x0304✗\x03 No es pot prohibir el sobrenom de servei \x02%nickname%\x02."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <nickname>"
  short:            "Treure una prohibició de sobrenom."
  help:             |
    Treu una prohibició de sobrenom, permetent que el sobrenom es pugui utilitzar de nou.

    Aquesta ordre requereix el permís d'IRCop: nickserv.forbid

    Sintaxi: UNFORBID <nickname>
    Exemple: UNFORBID SomeNick
  success:          "\x0303✔\x03 El sobrenom \x02%nickname%\x02 ja no està prohibit."
  not_forbidden:    "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està prohibit."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST {ADD|DEL|LIST} [pattern]"
  short:            "Gestionar els patrons de vhost prohibits."
  help:             |
    Gestiona els patrons que impedeixen als usuaris establir vhosts coincidents
    mitjançant NickServ SET VHOST.

    Comodins: * coincideix amb qualsevol seqüència, ? coincideix amb un sol caràcter.
    Exemple: *.pirated.com bloqueja qualsevol vhost que acabi amb .pirated.com

    Aquesta ordre requereix el permís d'IRCop: nickserv.forbidvhost

    Subordres:
      ADD <pattern>    Afegir un patró prohibit
      DEL <pattern>    Treure un patró prohibit
      LIST             Mostrar tots els patrons prohibits

  unknown_sub: "\x0304✗\x03 Subordre desconeguda \x02%sub%\x02. Utilitzeu ADD, DEL, o LIST."

  add:
    syntax:      "FORBIDVHOST ADD <pattern>"
    short:       "Afegir un patró de vhost prohibit."
    help:        |
      Afegeix un patró a la llista de vhost prohibits. Els usuaris no podran
      establir vhosts que coincideixin amb aquest patró mitjançant SET VHOST.

      Comodins: * coincideix amb qualsevol seqüència, ? coincideix amb un sol caràcter.

      Sintaxi: FORBIDVHOST ADD <pattern>
      Exemple: FORBIDVHOST ADD *.pirated.com
    done:            "\x0303✓\x03 Patró de vhost prohibit afegit: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 El patró \x02%pattern%\x02 ja existeix."
    invalid:          "\x0304✗\x03 Format de patró de vhost no vàlid."

  del:
    syntax:      "FORBIDVHOST DEL <pattern>"
    short:       "Treure un patró de vhost prohibit."
    help:        |
      Treu un patró de la llista de vhost prohibits.

      Sintaxi: FORBIDVHOST DEL <pattern>
      Exemple: FORBIDVHOST DEL *.pirated.com
    done:        "\x0303✓\x03 Patró de vhost prohibit tret: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 Patró \x02%pattern%\x02 no trobat."

  list:
    short:       "Llistar tots els patrons de vhost prohibits."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Mostra tots els patrons de vhost prohibits.

      Sintaxi: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Patrons de vhost prohibits (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — per %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 No hi ha patrons de vhost prohibits."
    unknown_creator: "desconegut"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <nickname> {ADD|DEL|VIEW|CLEAR}"
  short:            "Veure o gestionar l'historial d'accions del sobrenom."
  help:             |
    Gestiona l'historial d'accions d'un sobrenom.
    Només els IRCops amb el permís 'nickserv.history' poden utilitzar aquesta ordre.

    Accions registrades automàticament:
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Sintaxi: HISTORY <nickname> ADD <message>
            HISTORY <nickname> DEL <id>
            HISTORY <nickname> VIEW [PAGE|ALL]
            HISTORY <nickname> CLEAR

    Exemples:
      HISTORY SomeNick VIEW
      HISTORY SomeNick ADD Nota manual sobre aquest usuari
      HISTORY SomeNick VIEW 2
      HISTORY SomeNick VIEW ALL
      HISTORY SomeNick DEL 123
      HISTORY SomeNick CLEAR

    Utilitzeu VIEW per veure l'historial (mostra 3 entrades per defecte).
    Utilitzeu VIEW PAGE 2 per veure la pàgina següent.
    Utilitzeu VIEW ALL per veure l'historial complet.
    Utilitzeu ADD per afegir una entrada manual.
    Utilitzeu DEL per esborrar una entrada específica per ID.
    Utilitzeu CLEAR per esborrar totes les entrades de l'historial.
  not_registered:   "\x0304✗\x03 El sobrenom \x02%nickname%\x02 no està registrat."
  unknown_operator: "(desconegut)"

  add:
    syntax:     "HISTORY <nickname> ADD <message>"
    short:      "Afegir una entrada manual a l'historial."
    help:        |
      Afegeix una entrada manual a l'historial del sobrenom.

      Sintaxi: HISTORY <nickname> ADD <message>
      Exemple: HISTORY SomeNick ADD Usuari denunciat per spam
    success:    "\x0303✔\x03 Entrada d'historial afegida per a \x02%nickname%\x02."

  del:
    syntax:     "HISTORY <nickname> DEL <id>"
    short:      "Esborrar una entrada de l'historial per ID."
    help:        |
      Esborra una entrada específica de l'historial pel seu ID.

      Sintaxi: HISTORY <nickname> DEL <id>
      Exemple: HISTORY SomeNick DEL 42
    success:    "\x0303✔\x03 Entrada d'historial \x02%id%\x02 esborrada."
    not_found:  "\x0304✗\x03 Entrada d'historial \x02%id%\x02 no trobada."
    invalid_id: "\x0304✗\x03 ID d'entrada no vàlid: \x02%id%\x02."

  view:
    syntax:     "HISTORY <nickname> VIEW [PAGE|ALL]"
    short:      "Veure l'historial d'accions del sobrenom."
    help:        |
      Mostra l'historial d'accions del sobrenom.

      Sintaxi: HISTORY <nickname> VIEW
              HISTORY <nickname> VIEW PAGE
              HISTORY <nickname> VIEW ALL

      Per defecte mostra 3 entrades a la vegada.
      Utilitzeu VIEW 2 per veure la segona pàgina.
      Utilitzeu VIEW ALL per veure l'historial complet.
    header:     "\x02Historial de \x0307%nickname%\x03\x02 (mostrant %start%-%end% de %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 per %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 No s'han trobat entrades d'historial per a \x02%nickname%\x02."
    page_hint:   "Utilitzeu \x0303HISTORY %nickname% VIEW %next_page%\x03 per a més entrades."

  clear:
    syntax:     "HISTORY <nickname> CLEAR"
    short:      "Esborrar totes les entrades d'historial d'un sobrenom."
    help:        |
      Treu totes les entrades d'historial del sobrenom especificat.
      Aquesta acció no es pot desfer.

      Sintaxi: HISTORY <nickname> CLEAR
      Exemple: HISTORY SomeNick CLEAR
    success:    "\x0303✔\x03 S'han esborrat \x02%count%\x02 entrades d'historial de \x02%nickname%\x02."

