set:
  syntax:           "SET <#kanala> <aukera> [balioa]"
  short:            "Aldatu kanalaren aukerak."
  help:             "Aldatu kanalaren aukerak. Erabili \x0303HELP SET <aukera>\x03 bakoitzerako: FOUNDER, SUCCESSOR, DESC, URL, EMAIL, ENTRYMSG, TOPICLOCK, MLOCK, SECURE."
  unknown_option:    "\x0304✗\x03 Aukera ezezaguna \x02%option%\x02. Erabili hauetako bat: %options%."
  founder:
    syntax:         "SET <#kanala> FOUNDER <ezizena> [tokena]"
    short:          "Transferitu kanala beste ezizen erregistratu batera."
    help:           "Tokenik gabe: token bat bidaltzen dio egungo sortzailearen posta elektronikora. Tokenarekin: transferentzia osatzen du."
    token_sent:     "\x0303✔\x03 Sortzaile aldaketa token bat bidali da %email_hint% helbidera."
    invalid_token:  "\x0304✗\x03 Token baliogabea edo iraungia."
    updated:        "\x0303✔\x03 Sortzailea \x02%nickname%\x02(e)ra aldatu da."
    no_email:       "\x0304✗\x03 Egungo sortzaileak ez du posta elektronikorik ezarrita. Ezin da tokenik bidali."
    throttled:      "\x0304✗\x03 Itxaron mesedez beste token bat eskatu aurretik."
    must_be_registered: "\x0304✗\x03 \x02%nickname%\x02 erregistratuta eta aktibatuta egon behar da."
    suspended:         "\x0304✗\x03 \x02%nickname%\x02 etenda dago eta ezin da sortzaile gisa ezarri."
    cannot_be_self:   "\x0304✗\x03 Sortzaile berria ezin da egungo sortzailea izan."
    cannot_be_successor: "\x0304✗\x03 Sortzaile berria ezin da kanalaren ondorengoa izan."
    limit_exceeded: "\x0304✗\x03 \x02%nickname%\x02 erregistratutako kanalen gehieneko kopurura iritsi da: %max%."
    notice_channel:   "\x02%from%\x02(e)k \x02%nickname%\x02 ezartzen du kanal sortzaile gisa."
  successor:
    syntax:         "SET <#kanala> SUCCESSOR [ezizena]"
    short:          "Ezarri kanalaren ondorengoa."
    help:           "Ezizen bat kanal ondorengo gisa ezartzen du. Utzi ezizena hutsik garbitzeko. Ezizenak erregistratuta eta aktibatuta egon behar du."
    cleared:        "\x0303✔\x03 Ondorengoa garbitu da."
    updated:        "\x0303✔\x03 Ondorengoa \x02%nickname%\x02 gisa ezarri da."
    must_be_registered: "\x0304✗\x03 \x02%nickname%\x02 erregistratuta eta aktibatuta egon behar da."
    suspended:      "\x0304✗\x03 \x02%nickname%\x02 etenda dago eta ezin da ondorengo gisa ezarri."
    cannot_be_founder: "\x0304✗\x03 Sortzailea ezin da ondorengo gisa ezarri."
    notice_channel:   "\x02%from%\x02(e)k \x02%nickname%\x02 ezartzen du kanal ondorengo gisa."
    notice_channel_cleared: "\x02%from%\x02(e)k kanalaren ondorengoa garbitu du."
  desc:
    syntax:         "SET <#kanala> DESC <deskribapena>"
    short:          "Aldatu kanalaren deskribapena."
    help:           "Aldatu kanalaren deskribapena (derrigorrezkoa)."
    updated:        "\x0303✔\x03 Deskribapena eguneratu da."
  url:
    syntax:         "SET <#kanala> URL [urla]"
    short:          "Ezarri kanalaren URLa."
    help:           "Aldatu kanalaren webgunea (URLa). Utzi urla hutsik garbitzeko."
    updated:        "\x0303✔\x03 URLa eguneratu da."
    cleared:        "\x0303✔\x03 URLa garbitu da."
  email:
    syntax:         "SET <#kanala> EMAIL <posta|none>"
    short:          "Ezarri kanalaren posta elektronikoa."
    help:           "Aldatu kanalaren posta elektronikoko helbidea. Erabili \x02none\x02 garbitzeko."
    updated:        "\x0303✔\x03 Posta eguneratu da."
    cleared:        "\x0303✔\x03 Posta garbitu da."
  entrymsg:
    syntax:         "SET <#kanala> ENTRYMSG <mezua|none>"
    short:          "Ezarri kanalaren sarrera mezua."
    help:           "Ezarri erabiltzaileak kanalean sartzean erakusten den mezua (NOTICE). Erabili \x02none\x02 garbitzeko."
    updated:        "\x0303✔\x03 Sarrera mezua eguneratu da."
    cleared:        "\x0303✔\x03 Sarrera mezua garbitu da."
