info:
  syntax:           "INFO <#kanala>"
  short:            "Erakutsi kanalaren informazioa."
  help:             "Sortzailea, erregistro data, ondorengoa, URLa, posta elektronikoa, deskribapena, azken erabilera, gaia eta aukerak (TOPICLOCK, MLOCK, SECURE) erakusten ditu."
