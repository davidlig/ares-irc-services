  topic_set_by:    "  \x0314Gaia ezarlea\x03       : %nickname%"
  options:         "  \x0314Aukerak\x03            : TOPICLOCK %topiclock%, MLOCK %mlock%, SECURE %secure%"
  no_expire:       "  \x0314Iraungitzen ez da\x03  : Bai"
  mlock_modes:     "  \x0314Modu blokeoa\x03       : %modes%"
  suspended_status: "  \x0314Egoera\x03             : \x0304Etenda\x03"
  suspended_reason: "  \x0314Arrazoia\x03           : %reason%"
  suspended_until:  "  \x0314Amaiera\x03            : %date%"
  suspended_permanent: "  \x0314Amaiera\x03            : Iraunkorra"
  forbidden_status: "  \x0314Egoera\x03             : \x0304Debekatua\x03"
  forbidden_reason: "  \x0314Arrazoia\x03           : %reason%"
  pending_deletion_status: "  14Egoera             : 07Ezabatzeke"
  pending_deletion_at: "  14Ezabatuta          : %date%"
  pending_deletion_until: "  14Behin betiko       : %date%"
  pending_deletion_notice: "  07Kanal hau ChanServ-en izoztuta dago eta ezin da erregistratu."

help:
  syntax:           "HELP [komandoa [azpi-aukera]]"
  short:            "Zerrendatu komandoak edo erakutsi komando baten laguntza."
  help:             "Argumenturik gabe komando guztiak zerrendatzen ditu. Erabili \x0303HELP <komandoa>\x03 laguntza osorako, edo \x0303HELP <komandoa> <aukera>\x03 SET azpi-aukertarako."
  header_title:     "%bot%"
  intro:            "IRC sarearentzako kanal erregistro eta kudeaketa zerbitzua."
  general_header:   "\x02\x0314Komando erabilgarriak:\x03\x0F"
  command_line:     "  \x0307%command%\x03%description%"
  subcommand_line:  "  \x0307%command%\x03%description%"
  options_header:   "\x02\x0314Aukerak:\x03\x0F"
  general_footer:   "Erabili \x0303/msg %bot% HELP <komandoa>\x03 informazio gehiagorako."
  set_sub_footer:   "Erabili \x0303/msg %bot% HELP %command% <aukera>\x03 informazio gehiagorako."
  syntax_label:     "\x0307Sintaxia:\x03 \x02%syntax%\x02"
  footer:           "\x0314─────────────────────────────\x03"
  intro_expiration: "OHARRA: %days% egun baino gehiagoz \x0304\x1Ferabili gabeko\x0F kanalak automatikoki ezabatzen dira."
  unknown_command:  "\x0304✗\x03 Komando ezezaguna \x02%command%\x02. Erabili \x0303/msg %bot% HELP\x03."
  ircop_header:     "\x02\x0314IRC Operadoreentzako komando erabilgarriak:\x03\x0F"
  suboptions:       "Azpi-aukeraK:"

