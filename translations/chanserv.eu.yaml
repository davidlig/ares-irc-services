  topiclock:
    syntax:         "SET <#kanala> TOPICLOCK {ON|OFF}"
    short:          "Blokeatu kanalaren gaia."
    help:           "Kanalaren gaia aldatzea eragozten du. ON dagoenean, uneko gaia gorde eta blokeatu egiten da."
    on:             "\x0303✔\x03 Gaiaren blokeoa orain ON dago."
    off:            "\x0303✔\x03 Gaiaren blokeoa orain OFF dago."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03(e)k TOPICLOCK gaitzen du."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03(e)k TOPICLOCK desgaitzen du."
  mlock:
    syntax:         "SET <#kanala> MLOCK {ON|OFF}"
    short:          "Blokeatu kanalaren moduak."
    help:           "Uneko kanal moduak blokeatzen ditu (adib. +nt). ON dagoenean, moduak ezin dira aldatu."
    no_modes:       "modurik ez"
    on:             "\x0303✔\x03 MLOCK orain ON dago (%modes%)."
    off:            "\x0303✔\x03 MLOCK orain OFF dago."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03(e)k MLOCK gaitzen du (%modes%)."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03(e)k MLOCK desgaitzen du."
  secure:
    syntax:         "SET <#kanala> SECURE {ON|OFF}"
    short:          "Eskatu sarbide zerrenda kanal mailetarako."
    help:           "ON dagoenean, sarbide zerrendako erabiltzaileek soilik jaso ditzakete kanal mailak (OP, VOICE, etab.)."
    on:             "\x0303✔\x03 SECURE orain ON dago."
    off:            "\x0303✔\x03 SECURE orain OFF dago."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03(e)k SECURE modua gaitzen du."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03(e)k SECURE modua desgaitzen du."

access:
  syntax:           "ACCESS <#kanala> {ADD|DEL|LIST} [ezizena] [maila]"
  short:            "Kudeatu sarbide zerrenda."
  help:             "LIST: erakutsi sarbide zerrenda (ezizena eta maila sarrera bakoitzeko). ADD: gehitu edo eguneratu ezizen baten maila (1-499). DEL: kendu ezizen bat zerrendatik. Erabili \x0303HELP ACCESS <aukera>\x03 bakoitzerako."
  unknown_sub:      "\x0304✗\x03 Azpikomando ezezaguna \x02%sub%\x02. Erabili LIST, ADD edo DEL."
  level_range:      "\x0304✗\x03 Sarbide mailak %min% eta %max% artean egon behar du."
  cannot_manage_level: "\x0304✗\x03 Zurea baino maila hertsiki baxuagoa duten ezizenak soilik kudea ditzakezu."
  founder_not_in_list: "\x0304✗\x03 Sortzailea ez dago sarbide zerrendan."
  max_entries:      "\x0304✗\x03 Gehienez %max% sarbide sarrera kanal bakoitzeko."
  list:
    syntax:         "ACCESS <#kanala> LIST"
    short:          "Zerrendatu sarbide zerrenda (ACCESSLIST maila behar da)."
    help:           "Ezizena eta maila erakusten ditu sarrera bakoitzeko."
    header:         "\x0303\x02%channel%\x02 kanalaren sarbide zerrenda\x03"
    empty:          "\x0307ℹ\x03 \x02%channel%\x02 kanalak ez du sarbide sarrerarik."
    entry:          "  #%index%: %nickname% (%level% maila)"
  add:
    syntax:         "ACCESS <#kanala> ADD <ezizena> <maila>"
    short:          "Gehitu edo eguneratu sarbide maila (ACCESSCHANGE maila behar da)."
    help:           "Maila 1-499. Zurea baino maila baxuagoak soilik ezar ditzakezu."
    done:           "\x0303✔\x03 \x02%nickname%\x02 %level% mailara ezarri da."
    notice_channel: "\x0303✔\x03 \x0302%from%\x03(e)k \x0314%to%\x03 \x0304%level%\x03 mailara ezartzen du"
  del:
    syntax:         "ACCESS <#kanala> DEL <ezizena>"
    short:          "Kendu sarbide zerrendatik (ACCESSCHANGE maila behar da)."
    help:           "Zurea baino maila baxuagoa duten ezizenak soilik ken ditzakezu."
    not_in_list:    "\x0304✗\x03 \x02%nickname%\x02 ez dago sarbide zerrendan."
    done:           "\x0303✔\x03 \x02%nickname%\x02 sarbide zerrendatik kendu da."
    notice_channel: "\x0304✗\x03 \x0302%from%\x03(e)k \x0314%to%\x03 sarbide zerrendatik kentzen du"

delaccess:
  syntax:           "DELACCESS <#kanala>"
  short:            "Kendu zure sarbidea kanal batetik."
  help:             "Zure sarbide sarrera kentzen du kanalaren sarbide zerrendatik. Identifikatuta egon behar duzu. Sortzaileak ezin du komando hau erabili."
  done:             "\x0303✔\x03 Zure sarbidea \x02%channel%\x02 kanaletik kendu da."
  not_in_list:      "\x0304✗\x03 Ez duzu sarbiderik \x02%channel%\x02 kanalean."
