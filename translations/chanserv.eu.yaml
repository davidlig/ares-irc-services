# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#kanala> {ADD|DEL|VIEW|CLEAR}"
  short:            "Ikusi edo kudeatu kanalaren ekintza historia."
  help:             |
    Kanal baten ekintza historia kudeatzen du.
    'chanserv.history' baimena duten IRCopek soilik erabil dezakete komando hau.

    Azpikomandoak:
      ADD   — Gehitu eskuzko sarrera bat kanalaren historiara.
      DEL   — Ezabatu sarrera zehatz bat IDaren arabera.
      VIEW  — Ikusi historia sarrerak (orrikatua, 3 orrialdeko).
      CLEAR — Ezabatu historiako sarrera guztiak kanalarentzat.

    Sintaxia: HISTORY <#kanala> {ADD|DEL|VIEW|CLEAR} [argumentuak]
    Adibideak:
      HISTORY #kanala VIEW
      HISTORY #kanala VIEW 2
      HISTORY #kanala VIEW ALL
      HISTORY #kanala ADD Suspected takeover attempt
      HISTORY #kanala DEL 42
      HISTORY #kanala CLEAR
  not_registered:   "\x0304✗\x03 \x02%channel%\x02 kanala ez dago erregistratuta."
  unknown_operator: "(ezezaguna)"

  add:
    syntax:     "HISTORY <#kanala> ADD <mezua>"
    short:      "Gehitu eskuzko historia sarrera bat."
    help:        |
      Eskuzko sarrera bat gehitzen du kanalaren historiara.
    success:    "\x0303✔\x03 Historia sarrera gehitu da \x02%channel%\x02 kanalean."

  del:
    syntax:     "HISTORY <#kanala> DEL <ida>"
    short:      "Ezabatu historia sarrera bat IDaren arabera."
    success:    "\x0303✔\x03 \x02%id%\x02 historia sarrera ezabatu da."
    not_found:  "\x0304✗\x03 \x02%id%\x02 historia sarrera ez da aurkitu."
    invalid_id: "\x0304✗\x03 Sarrera ID baliogabea: \x02%id%\x02."

  view:
    syntax:     "HISTORY <#kanala> VIEW [ORRIA|ALL]"
    short:      "Ikusi kanalaren ekintza historia."
    header:     "\x02\x0307%channel%\x03 kanalaren historia\x02 (%total%etik %start%-%end% erakusten):"
    entry:       "#%id% [%date%] \x0303%action%\x03 - \x02%operator%\x02 — %message%"
    extra:       "  Gehigarria \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Ez da historia sarrerarik aurkitu \x02%channel%\x02 kanalean."
    page_hint:   "Erabili \x0303HISTORY %channel% VIEW %next_page%\x03 sarrera gehiagotarako."

  clear:
    syntax:     "HISTORY <#kanala> CLEAR"
    short:      "Ezabatu kanal baten historia sarrera guztiak."
    success:    "\x0303✔\x03 \x02%count%\x02 historia sarrera garbitu dira \x02%channel%\x02 kanalean."

