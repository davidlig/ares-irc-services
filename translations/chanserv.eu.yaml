    ON dagoenean, kanala ez da inoiz iraungitzen azken jarduera edozein dela ere.
    OFF dagoenean, iraungitze arau normalak aplikatzen dira.

    'chanserv.noexpire' baimena duten IRCopek soilik erabil dezakete komando hau.

    Sintaxia: NOEXPIRE <#kanala> {ON|OFF}
    Adibideak:
      NOEXPIRE #Garrantzitsua ON
      NOEXPIRE #Garrantzitsua OFF
