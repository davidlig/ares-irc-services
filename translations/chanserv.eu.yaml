# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#kanala>"
  short:            "Garbitu kanal baten sarbide zerrenda osoa."
  help:             |
    Kanal baten sarbide zerrendako sarrera guztiak kentzen ditu.
    Ekintza hau atzeraezina da eta ezin da desegin.
    'chanserv.clearaccess' baimena duten IRCopek soilik erabil dezakete komando hau.

    Sintaxia: CLEARACCESS <#kanala>
    Adibideak:
      CLEARACCESS #kanala
  success:          "\x0303✔\x03 \x02%count%\x02 sarbide sarrera garbitu dira \x02%channel%\x02 kanaletik."
  empty:            "\x0307ℹ\x03 \x02%channel%\x02 kanalak ez du sarbide sarrerarik."

clearusers:
  syntax:           "CLEARUSERS <#kanala> [arrazoia]"
  short:            "Kanporatu erabiltzaile guztiak kanal batetik."
  help:             |
    Erabiltzaile guztiak kanporatzen ditu zehaztutako kanaletik.
    Hau IRCop-en soilik komando bat da, kanal kudeaketarako erabilia.
    Arrazoi bat aukeran eman daiteke; saltatzen bada, arrazoi lehenetsi bat erabiltzen da.

    'chanserv.clearusers' baimena duten IRCopek soilik erabil dezakete komando hau.

    Sintaxia: CLEARUSERS <#kanala> [arrazoia]
    Adibideak:
      CLEARUSERS #kanala
      CLEARUSERS #kanala flooding
  not_on_network:   "\x0304✗\x03 \x02%channel%\x02 kanala ez dago unean sarean."
  empty:            "\x0307ℹ\x03 \x02%channel%\x02 kanalak ez du kanporatzeko erabiltzailerik."
  success:          "\x0303✔\x03 \x02%count%\x02 erabiltzaile kanporatu dira \x02%channel%\x02 kanaletik."
  default_reason:   "CLEARUSERS komandoa"
