  notice_channel: "\x0304✗\x03 \x0302%nickname%\x03(e)k kanaletik bere sarbidea kentzen du"

levels:
  syntax:           "LEVELS <#kanala> {LIST|SET|RESET} [maila] [balioa]"
  short:            "Konfiguratu kanal mailak."
  help:             "LIST: erakutsi maila eskakizunak (OPDEOP, VOICEDEVOICE, etab.). SET: ezarri gutxieneko maila ekintza baterako (-1 eta 499 artean). RESET: leheneratu lehenetsiak. SET/RESET sortzailearentzat soilik."
  unknown_sub:      "\x0304✗\x03 Azpikomando ezezaguna \x02%sub%\x02. Erabili LIST, SET edo RESET."
  unknown_key:      "\x0304✗\x03 Maila giltza ezezaguna \x02%key%\x02 edo IRCd honek ez du onartzen."
  value_range:      "\x0304✗\x03 Maila balioak %min% eta %max% artean egon behar du."
  list:
    syntax:         "LEVELS <#kanala> LIST"
    short:          "Zerrendatu maila eskakizunak."
    help:           "Maila giltza bakoitza eta bere balioa erakusten ditu (lehenetsiak ezarrita ez badaude)."
    header:         "\x0303Mailak\x03"
  set:
    syntax:         "LEVELS <#kanala> SET <maila> <balioa>"
    short:          "Ezarri maila eskakizun bat."
    help:           "Balioa -1etik 499ra. Sortzailearentzat soilik."
    done:           "\x0303✔\x03 \x02%key%\x02 %value%(e)ra ezarri da."
  reset:
    syntax:         "LEVELS <#kanala> RESET"
    short:          "Leheneratu maila guztiak lehenetsitara."
    help:           "Baliogabetze guztiak kentzen ditu. Sortzailearentzat soilik."
    done:           "\x0303✔\x03 Maila guztiak lehenetsitara leheneratu dira."

