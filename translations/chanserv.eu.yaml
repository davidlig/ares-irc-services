register:
  syntax:           "REGISTER <#kanala> <deskribapena>"
  short:            "Erregistratu kanal bat."
  help:             "Erregistratu eta lotu kanal bat zure ezizenarekin. %nickserv% zerbitzuan identifikatuta egon behar duzu."
  success:          "\x0303✔\x03 \x02%channel%\x02 kanala erregistratu da."
  channel_not_on_network: "\x0304✗\x03 \x02%channel%\x02 kanala ez dago sarean."
