  short:             "Debekatu kanal bat erabilia izatea."
  help:              "Kanal bat inork erabiltzea eragozten du.\nKanala unean erregistratuta badago, lehenik ezabatua izango da.\nKanaleko erabiltzaile guztiak kanporatuak izango dira eta kanala blokeatu egingo da.\nKomando honek IRCop baimena behar du: chanserv.forbid"
