read:
  syntax: "READ [#canal] <număr>"
  short: "Citiți un mesaj după număr."
  help: "Citește mesajul cu numărul specificat. Fără #canal, citește din inboxul poreclei dumneavoastră. Cu #canal, necesită nivel MEMOREAD."
  header: "\x02\x0307Mesajul #%index%\x03 de la \x02%from%\x02:\x0F"
  footer: "\x0314─────────────────────────────\x03 \x0314%date%\x03"
