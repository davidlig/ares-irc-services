  not_found: "\x0304✗\x03 Mesajul #%index% nu a fost găsit."

list:
  syntax: "LIST [#canal]"
  short: "Listați mesajele (necititele sunt marcate cu * roșu)."
  help: "Listează mesajele dumneavoastră sau mesajele canalului. Mesajele necitite sunt afișate cu un asterisc roșu și o previzualizare (maxim 50 de caractere). Fără #canal = inboxul poreclei dumneavoastră; cu #canal necesită MEMOREAD."
  header: "\x02\x0307Mesaje pentru %target%\x03:\x0F"
  footer: "\x0314─────────────────────────────\x03"
  empty: "\x0307ℹ\x03 Nu există mesaje pentru \x02%target%\x02."
