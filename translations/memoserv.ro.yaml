  not_found: "\x0304✗\x03 Mesajul #%index% nu a fost găsit."

ignore:
  syntax: "IGNORE {ADD|DEL|LIST} [#canal] [poreclă]"
  short: "Gestionați lista de ignorare pentru mesaje."
  help: "ADD adaugă o poreclă în lista dumneavoastră (sau a canalului) de ignorare; DEL elimină; LIST afișează lista. Pentru canale, ADD/DEL necesită MEMOCHANGE."
  add:
    syntax: "IGNORE ADD [#canal] <poreclă>"
    short: "Adăugați poreclă în lista de ignorare."
    help: "Mesajele de la această poreclă nu vor fi acceptate pentru inboxul dumneavoastră (sau al canalului)."
  del:
    syntax: "IGNORE DEL [#canal] <poreclă>"
    short: "Eliminați poreclă din lista de ignorare."
    help: "Elimină porecla din lista de ignorare."
  list:
    syntax: "IGNORE LIST [#canal]"
    short: "Listați poreclele ignorate."
    help: "Afișează lista poreclelor pe care dumneavoastră (sau canalul) le ignorați pentru mesaje."
  added: "\x0303✔\x03 \x02%nickname%\x02 adăugat în lista de ignorare."
  removed: "\x0303✔\x03 \x02%nickname%\x02 eliminat din lista de ignorare."
