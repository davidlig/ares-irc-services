  service_disabled_for_target: "\x0304✗\x03 O serviço de mensagens está desativado para \x02%target%\x02."

read:
  syntax: "READ [#canal] <número>"
  short: "Ler uma mensagem por número."
  help: "Lê a mensagem com o número indicado. Sem #canal, lê da sua caixa de entrada de nickname. Com #canal, requer nível MEMOREAD."
  header: "\x02\x0307Mensagem #%index%\x03 de \x02%from%\x02:\x0F"
  footer: "\x0314─────────────────────────────\x03 \x0314%date%\x03"
  channel_not_registered: "\x0304✗\x03 O canal \x02%channel%\x02 não está registado."
  not_found: "\x0304✗\x03 Mensagem #%index% não encontrada."

list:
  syntax: "LIST [#canal]"
  short: "Listar mensagens (não lidas marcadas com * vermelho)."
  help: "Lista as suas mensagens ou mensagens do canal. As mensagens não lidas são mostradas com um asterisco vermelho e uma pré-visualização (máx. 50 caracteres). Sem #canal = a sua caixa de entrada de nickname; com #canal requer MEMOREAD."
  header: "\x02\x0307Mensagens para %target%\x03:\x0F"
  footer: "\x0314─────────────────────────────\x03"
  empty: "\x0307ℹ\x03 Nenhuma mensagem para \x02%target%\x02."
  channel_not_registered: "\x0304✗\x03 O canal \x02%channel%\x02 não está registado."

del:
  syntax: "DEL [#canal] <número>"
  short: "Eliminar uma mensagem por número."
  help: "Elimina a mensagem com o número indicado. Para canais requer nível MEMOCHANGE."
  deleted: "\x0303✔\x03 Mensagem #%index% eliminada."
  channel_not_registered: "\x0304✗\x03 O canal \x02%channel%\x02 não está registado."
  not_found: "\x0304✗\x03 Mensagem #%index% não encontrada."

ignore:
  syntax: "IGNORE {ADD|DEL|LIST} [#canal] [nickname]"
  short: "Gerir lista de ignorados para mensagens."
  help: "ADD adiciona um nickname à sua lista de ignorados (ou do canal); DEL remove; LIST mostra a lista. Para canais, ADD/DEL requerem MEMOCHANGE."
  add:
    syntax: "IGNORE ADD [#canal] <nickname>"
    short: "Adicionar nickname à lista de ignorados."
    help: "Mensagens deste nickname não serão aceites para a sua caixa de entrada (ou do canal)."
  del:
    syntax: "IGNORE DEL [#canal] <nickname>"
    short: "Remover nickname da lista de ignorados."
    help: "Remove o nickname da lista de ignorados."
  list:
    syntax: "IGNORE LIST [#canal]"
    short: "Listar nicknames ignorados."
    help: "Mostra a lista de nicknames que você (ou o canal) ignora para mensagens."
  added: "\x0303✔\x03 \x02%nickname%\x02 adicionado à lista de ignorados."
  removed: "\x0303✔\x03 \x02%nickname%\x02 removido da lista de ignorados."
  already_ignored: "\x0304✗\x03 \x02%nickname%\x02 já está na lista de ignorados."
  not_ignored: "\x0304✗\x03 \x02%nickname%\x02 não está na lista de ignorados."
  nick_not_registered: "\x0304✗\x03 O nickname \x02%nickname%\x02 não está registado."
  channel_not_registered: "\x0304✗\x03 O canal \x02%channel%\x02 não está registado."
  limit_reached_nick: "\x0304✗\x03 Limite da lista de ignorados atingido para o seu nickname (máx. \x02%limit%\x02)."
  limit_reached_channel: "\x0304✗\x03 Limite da lista de ignorados atingido para \x02%channel%\x02 (máx. \x02%limit%\x02)."
