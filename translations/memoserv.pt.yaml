send:
  syntax: "SEND {nickname|#canal} <mensagem>"
  short: "Enviar uma mensagem para um nickname ou canal."
  help: "Envia uma mensagem para um nickname ou canal registado. O destinatário deve ter o serviço de mensagens ativado (ENABLE)."
  sent_nick: "\x0303✔\x03 Mensagem enviada para \x02%nickname%\x02."
  sent_channel: "\x0303✔\x03 Mensagem enviada para o canal \x02%channel%\x02."
