  limit_reached: "\x0304✗\x03 Limite de mensagens atingido para \x02%target%\x02."
  ignored: "\x0304✗\x03 Não pode enviar mensagens para este destinatário, está na sua lista de ignorados."
  cannot_send_to_self: "\x0304✗\x03 Não pode enviar uma mensagem para si mesmo."
