  short:            "Elenca i comandi o mostra l'aiuto per un comando."
  help:             "Senza argomenti elenca tutti i comandi. Usi \x0303HELP <comando>\x03 per l'aiuto completo, o \x0303HELP <comando> <opzione>\x03 per le sotto-opzioni di SET."
  header_title:     "%bot%"
  intro:            "Servizio di registrazione e gestione canali per la rete IRC."
  general_header:   "\x02\x0314Comandi disponibili:\x03\x0F"
  command_line:     "  \x0307%command%\x03%description%"
  subcommand_line:  "  \x0307%command%\x03%description%"
  options_header:   "\x02\x0314Opzioni:\x03\x0F"
  general_footer:   "Usi \x0303/msg %bot% HELP <comando>\x03 per maggiori informazioni."
