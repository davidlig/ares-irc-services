  syntax_label:     "\x0307Sintassi:\x03 \x02%syntax%\x02"
  footer:           "\x0314─────────────────────────────\x03"
  intro_expiration: "NOTA: I canali \x0304\x1Fnon utilizzati\x0F per più di %days% giorni vengono rimossi automaticamente."
