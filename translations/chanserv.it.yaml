# --- CLEARACCESS (IRCop) ---------------------------------------------------------
clearaccess:
  syntax:           "CLEARACCESS <#canale>"
  short:            "Svuota l'intera lista di accesso di un canale."
  help:             |
    Rimuove tutte le voci di accesso dalla lista di accesso di un canale.
    Quest'azione è irreversibile e non può essere annullata.
    Solo gli IRCops con il permesso 'chanserv.clearaccess' possono usare questo comando.

    Sintassi: CLEARACCESS <#canale>
    Esempi:
      CLEARACCESS #canale
  success:          "\x0303✔\x03 Eliminate \x02%count%\x02 voci di accesso da \x02%channel%\x02."
  empty:            "\x0307ℹ\x03 Il canale \x02%channel%\x02 non ha voci di accesso."

clearusers:
  syntax:           "CLEARUSERS <#canale> [motivo]"
  short:            "Espelle tutti gli utenti da un canale."
  help:             |
    Espelle tutti gli utenti dal canale specificato.
    Questo è un comando riservato agli IRCop per la gestione dei canali.
    È possibile fornire un motivo opzionale; se omesso, viene usato un motivo predefinito.

    Solo gli IRCops con il permesso 'chanserv.clearusers' possono usare questo comando.

    Sintassi: CLEARUSERS <#canale> [motivo]
    Esempi:
      CLEARUSERS #canale
      CLEARUSERS #canale flooding
  not_on_network:   "\x0304✗\x03 Il canale \x02%channel%\x02 non è attualmente sulla rete."
  empty:            "\x0307ℹ\x03 Il canale \x02%channel%\x02 non ha utenti da espellere."
  success:          "\x0303✔\x03 Espulsi \x02%count%\x02 utente/i da \x02%channel%\x02."
  default_reason:   "Comando CLEARUSERS"
