  help:              "Impedisce a chiunque di usare un canale.\nSe il canale è attualmente registrato, verrà prima eliminato.\nTutti gli utenti nel canale saranno espulsi e il canale sarà bloccato.\nQuesto comando richiede il permesso IRCop: chanserv.forbid"
