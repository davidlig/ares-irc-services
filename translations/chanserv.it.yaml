set:
  syntax:           "SET <#canale> <opzione> [valore]"
  short:            "Modifica le opzioni del canale."
  help:             "Modifica le opzioni del canale. Usi \x0303HELP SET <opzione>\x03 per ognuna: FOUNDER, SUCCESSOR, DESC, URL, EMAIL, ENTRYMSG, TOPICLOCK, MLOCK, SECURE."
  unknown_option:    "\x0304✗\x03 Opzione sconosciuta \x02%option%\x02. Usi una tra: %options%."
  founder:
    syntax:         "SET <#canale> FOUNDER <nickname> [token]"
    short:          "Trasferisce il canale a un altro nickname registrato."
    help:           "Senza token: invia un token all'email del fondatore attuale. Con token: completa il trasferimento."
    token_sent:     "\x0303✔\x03 Un token per il cambio fondatore è stato inviato a %email_hint%."
    invalid_token:  "\x0304✗\x03 Token non valido o scaduto."
    updated:        "\x0303✔\x03 Il fondatore è stato cambiato in \x02%nickname%\x02."
    no_email:       "\x0304✗\x03 Il fondatore attuale non ha un'email impostata. Impossibile inviare il token."
    throttled:      "\x0304✗\x03 Attenda prima di richiedere un altro token."
    must_be_registered: "\x0304✗\x03 \x02%nickname%\x02 deve essere registrato e attivato."
    suspended:         "\x0304✗\x03 \x02%nickname%\x02 è sospeso e non può essere impostato come fondatore."
    cannot_be_self:   "\x0304✗\x03 Il nuovo fondatore non può essere il fondatore attuale."
    cannot_be_successor: "\x0304✗\x03 Il nuovo fondatore non può essere il successore del canale."
    limit_exceeded: "\x0304✗\x03 \x02%nickname%\x02 ha raggiunto il massimo di %max% canali registrati."
    notice_channel:   "\x02%from%\x02 assegna \x02%nickname%\x02 come fondatore del canale."
  successor:
    syntax:         "SET <#canale> SUCCESSOR [nickname]"
    short:          "Imposta il successore del canale."
    help:           "Imposta un nickname come successore del canale. Ometta il nickname per rimuoverlo. Il nick deve essere registrato e attivato."
    cleared:        "\x0303✔\x03 Successore rimosso."
    updated:        "\x0303✔\x03 Successore impostato su \x02%nickname%\x02."
    must_be_registered: "\x0304✗\x03 \x02%nickname%\x02 deve essere registrato e attivato."
    suspended:      "\x0304✗\x03 \x02%nickname%\x02 è sospeso e non può essere impostato come successore."
    cannot_be_founder: "\x0304✗\x03 Il fondatore non può essere impostato come successore."
    notice_channel:   "\x02%from%\x02 assegna \x02%nickname%\x02 come successore del canale."
    notice_channel_cleared: "\x02%from%\x02 ha rimosso il successore del canale."
  desc:
    syntax:         "SET <#canale> DESC <descrizione>"
    short:          "Modifica la descrizione del canale."
    help:           "Modifica la descrizione del canale (obbligatoria)."
    updated:        "\x0303✔\x03 Descrizione aggiornata."
  url:
    syntax:         "SET <#canale> URL [url]"
    short:          "Imposta l'URL del canale."
    help:           "Modifica il sito web del canale (URL). Ometta l'url per rimuoverlo."
    updated:        "\x0303✔\x03 URL aggiornato."
    cleared:        "\x0303✔\x03 URL rimosso."
  email:
    syntax:         "SET <#canale> EMAIL <email|none>"
    short:          "Imposta l'email del canale."
    help:           "Modifica l'indirizzo email del canale. Usi \x02none\x02 per rimuoverlo."
    updated:        "\x0303✔\x03 Email aggiornata."
    cleared:        "\x0303✔\x03 Email rimossa."
  entrymsg:
    syntax:         "SET <#canale> ENTRYMSG <messaggio|none>"
    short:          "Imposta il messaggio di ingresso del canale."
    help:           "Imposta il messaggio mostrato quando gli utenti entrano nel canale (NOTICE). Usi \x02none\x02 per rimuoverlo."
    updated:        "\x0303✔\x03 Messaggio di ingresso aggiornato."
    cleared:        "\x0303✔\x03 Messaggio di ingresso rimosso."
    too_long:       "\x0304✗\x03 Il messaggio di ingresso non può superare i %max% caratteri."
  topiclock:
    syntax:         "SET <#canale> TOPICLOCK {ON|OFF}"
    short:          "Blocca il topic del canale."
    help:           "Impedisce di modificare il topic del canale. Quando ON, il topic attuale viene salvato e bloccato."
    on:             "\x0303✔\x03 Blocco topic ora ON."
    off:            "\x0303✔\x03 Blocco topic ora OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 attiva TOPICLOCK."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 disattiva TOPICLOCK."
  mlock:
    syntax:         "SET <#canale> MLOCK {ON|OFF}"
    short:          "Blocca i modi del canale."
    help:           "Blocca i modi attuali del canale (es. +nt). Quando ON, i modi non possono essere modificati."
    no_modes:       "nessun modo"
    on:             "\x0303✔\x03 MLOCK ora ON (%modes%)."
    off:            "\x0303✔\x03 MLOCK ora OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 attiva MLOCK (%modes%)."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 disattiva MLOCK."
  secure:
    syntax:         "SET <#canale> SECURE {ON|OFF}"
    short:          "Richiede la lista di accesso per i ranghi del canale."
    help:           "Quando ON, solo gli utenti nella lista di accesso possono ricevere ranghi nel canale (OP, VOICE, ecc.)."
    on:             "\x0303✔\x03 SECURE ora ON."
    off:            "\x0303✔\x03 SECURE ora OFF."
    notice_on:      "\x0303✔\x03 \x0302%nickname%\x03 attiva la modalità SECURE."
    notice_off:     "\x0304✗\x03 \x0302%nickname%\x03 disattiva la modalità SECURE."

access:
  syntax:           "ACCESS <#canale> {ADD|DEL|LIST} [nickname] [livello]"
  short:            "Gestisce la lista di accesso."
  help:             "LIST: mostra la lista di accesso (nick e livello per ogni voce). ADD: aggiunge o aggiorna il livello di un nick (1-499). DEL: rimuove un nick dalla lista. Usi \x0303HELP ACCESS <opzione>\x03 per ognuna."
  unknown_sub:      "\x0304✗\x03 Sotto-comando sconosciuto \x02%sub%\x02. Usi LIST, ADD o DEL."
  level_range:      "\x0304✗\x03 Il livello di accesso deve essere tra %min% e %max%."
  cannot_manage_level: "\x0304✗\x03 Può gestire solo nick con livello strettamente inferiore al suo."
  founder_not_in_list: "\x0304✗\x03 Il fondatore non è nella lista di accesso."
  max_entries:      "\x0304✗\x03 Massimo %max% voci di accesso per canale."
  list:
    syntax:         "ACCESS <#canale> LIST"
    short:          "Elenca la lista di accesso (richiede livello ACCESSLIST)."
    help:           "Mostra nickname e livello per ogni voce."
    header:         "\x0303Lista di accesso per \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 Il canale \x02%channel%\x02 non ha voci di accesso."
    entry:          "  #%index%: %nickname% (livello %level%)"
  add:
    syntax:         "ACCESS <#canale> ADD <nickname> <livello>"
    short:          "Aggiunge o aggiorna il livello di accesso (richiede livello ACCESSCHANGE)."
    help:           "Livello 1-499. Può impostare solo livelli inferiori al suo."
    done:           "\x0303✔\x03 \x02%nickname%\x02 impostato al livello %level%."
    notice_channel: "\x0303✔\x03 \x0302%from%\x03 imposta \x0314%to%\x03 al livello \x0304%level%\x03"
  del:
    syntax:         "ACCESS <#canale> DEL <nickname>"
    short:          "Rimuove dalla lista di accesso (richiede livello ACCESSCHANGE)."
    help:           "Può rimuovere solo nick con livello inferiore al suo."
    not_in_list:    "\x0304✗\x03 \x02%nickname%\x02 non è nella lista di accesso."
    done:           "\x0303✔\x03 \x02%nickname%\x02 rimosso dalla lista di accesso."
    notice_channel: "\x0304✗\x03 \x0302%from%\x03 rimuove \x0314%to%\x03 dalla lista di accesso"

delaccess:
  syntax:           "DELACCESS <#canale>"
  short:            "Rimuove il proprio accesso da un canale."
  help:             "Rimuove la sua voce di accesso dalla lista di accesso del canale. Deve essere identificato. Il fondatore non può usare questo comando."
  done:             "\x0303✔\x03 Il suo accesso è stato rimosso da \x02%channel%\x02."
  not_in_list:      "\x0304✗\x03 Non ha accesso in \x02%channel%\x02."
  founder_not_in_access: "\x0304✗\x03 Lei è il fondatore di \x02%channel%\x02 e non è nella lista di accesso."
  notice_channel: "\x0304✗\x03 \x0302%nickname%\x03 rimuove il proprio accesso dal canale"

levels:
  syntax:           "LEVELS <#canale> {LIST|SET|RESET} [livello] [valore]"
  short:            "Configura i livelli del canale."
  help:             "LIST: mostra i requisiti di livello (OPDEOP, VOICEDEVOICE, ecc.). SET: imposta il livello minimo per un'azione (-1 a 499). RESET: ripristina i valori predefiniti. Solo il fondatore per SET/RESET."
  unknown_sub:      "\x0304✗\x03 Sotto-comando sconosciuto \x02%sub%\x02. Usi LIST, SET o RESET."
  unknown_key:      "\x0304✗\x03 Chiave di livello sconosciuta \x02%key%\x02 o non supportata da questo IRCd."
  value_range:      "\x0304✗\x03 Il valore del livello deve essere tra %min% e %max%."
  list:
    syntax:         "LEVELS <#canale> LIST"
    short:          "Elenca i requisiti di livello."
    help:           "Mostra ogni chiave di livello e il suo valore (predefiniti se non impostati)."
    header:         "\x0303Livelli\x03"
  set:
    syntax:         "LEVELS <#canale> SET <livello> <valore>"
    short:          "Imposta un requisito di livello."
    help:           "Valore da -1 a 499. Solo il fondatore."
    done:           "\x0303✔\x03 \x02%key%\x02 impostato a %value%."
  reset:
    syntax:         "LEVELS <#canale> RESET"
    short:          "Ripristina tutti i livelli ai valori predefiniti."
    help:           "Rimuove tutte le personalizzazioni. Solo il fondatore."
    done:           "\x0303✔\x03 Tutti i livelli ripristinati ai valori predefiniti."

