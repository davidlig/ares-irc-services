# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <#canale> {ADD|DEL|VIEW|CLEAR}"
  short:            "Visualizza o gestisce la cronologia azioni del canale."
  help:             |
    Gestisce la cronologia delle azioni per un canale.
    Solo gli IRCops con il permesso 'chanserv.history' possono usare questo comando.

    Sotto-comandi:
      ADD   — Aggiunge una voce manuale alla cronologia del canale.
      DEL   — Elimina una voce specifica per ID.
      VIEW  — Visualizza le voci della cronologia (impaginate, 3 per pagina).
      CLEAR — Elimina tutte le voci della cronologia del canale.

    Sintassi: HISTORY <#canale> {ADD|DEL|VIEW|CLEAR} [argomenti]
    Esempi:
      HISTORY #canale VIEW
      HISTORY #canale VIEW 2
      HISTORY #canale VIEW ALL
      HISTORY #canale ADD Tentativo sospetto di takeover
      HISTORY #canale DEL 42
      HISTORY #canale CLEAR
  not_registered:   "\x0304✗\x03 Il canale \x02%channel%\x02 non è registrato."
  unknown_operator: "(sconosciuto)"

  add:
    syntax:     "HISTORY <#canale> ADD <messaggio>"
    short:      "Aggiunge una voce manuale alla cronologia."
    help:        |
      Aggiunge una voce manuale alla cronologia del canale.
    success:    "\x0303✔\x03 Voce di cronologia aggiunta per \x02%channel%\x02."

  del:
    syntax:     "HISTORY <#canale> DEL <id>"
    short:      "Elimina una voce di cronologia per ID."
    success:    "\x0303✔\x03 Voce di cronologia \x02%id%\x02 eliminata."
    not_found:  "\x0304✗\x03 Voce di cronologia \x02%id%\x02 non trovata."
    invalid_id: "\x0304✗\x03 ID voce non valido: \x02%id%\x02."

  view:
    syntax:     "HISTORY <#canale> VIEW [PAGINA|ALL]"
    short:      "Visualizza la cronologia azioni del canale."
    header:     "\x02Cronologia per \x0307%channel%\x03\x02 (mostra %start%-%end% di %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 di %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Nessuna voce di cronologia trovata per \x02%channel%\x02."
    page_hint:   "Usi \x0303HISTORY %channel% VIEW %next_page%\x03 per altre voci."

  clear:
    syntax:     "HISTORY <#canale> CLEAR"
    short:      "Elimina tutte le voci di cronologia per un canale."
    success:    "\x0303✔\x03 Eliminate \x02%count%\x02 voci di cronologia per \x02%channel%\x02."

