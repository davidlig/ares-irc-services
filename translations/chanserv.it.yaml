akick:
  syntax:           "AKICK <#canale> {ADD|DEL|LIST|ENFORCE} [maschera] [scadenza] [motivo]"
  short:            "Gestisce la lista di auto-kick."
  help:             "ADD <maschera> [scadenza] [motivo]: aggiunge voce. DEL <maschera|num>: rimuove. LIST: elenca voci. ENFORCE <maschera>: espelle gli utenti corrispondenti."
  unknown_sub:      "\x0304✗\x03 Sotto-comando sconosciuto \x02%sub%\x02. Usi ADD, DEL, LIST o ENFORCE."
  invalid_mask:     "\x0304✗\x03 Formato maschera non valido. Usi \x02nick!ident@host\x02 con caratteri jolly (*)."
  dangerous_mask:   "\x0304✗\x03 La maschera \x02%mask%\x02 è troppo ampia. Deve contenere almeno 4 caratteri alfanumerici."
  protected_user:   "\x0304✗\x03 Il nickname \x02%nickname%\x02 ha accesso in questo canale."
  max_entries:      "\x0304✗\x03 Massimo %max% voci AKICK per canale."
  add:
    syntax:         "AKICK <#canale> ADD <maschera> [scadenza] [motivo]"
    short:          "Aggiunge una voce AKICK."
    help:           "Scadenza obbligatoria se si specifica il motivo. Formati: 0 (permanente), 1d, 7d, 30d, 12h, 60m. Esempi: 'AKICK #c ADD *!*@* 0', 'AKICK #c ADD *!*@* 7d Spam'."
    done:           "\x0303✔\x03 AKICK \x02%mask%\x02 aggiunto."
    already_exists: "\x0304✗\x03 AKICK \x02%mask%\x02 esiste già."
    notice_channel: "\x02%from%\x02 aggiunge AKICK: \x02%mask%\x02 (%reason%)"
  del:
    syntax:         "AKICK <#canale> DEL <maschera|numero>"
    short:          "Rimuove una voce AKICK."
    help:           "Rimuove per maschera esatta o numero voce da LIST."
    not_found:      "\x0304✗\x03 AKICK \x02%mask%\x02 non trovato."
    done:           "\x0303✔\x03 AKICK \x02%mask%\x02 rimosso."
    notice_channel: "\x02%from%\x02 rimuove AKICK: \x02%mask%\x02"
  list:
    syntax:         "AKICK <#canale> LIST"
    short:          "Elenca le voci AKICK."
    help:           "Mostra maschera, motivo, scadenza e chi l'ha aggiunta."
    header:         "\x0303Lista AKICK per \x02%channel%\x02\x03"
    empty:          "\x0307ℹ\x03 Il canale \x02%channel%\x02 non ha voci AKICK."
    entry:          "  #%index% %mask% %reason% (da %nickname%, scade: %expiration%)"
    no_reason:      "Nessun motivo"
    never_expires:  "mai"
    unknown_creator: "sconosciuto"

drop:
  syntax:           "DROP <#canale>"
  short:            "Elimina un canale registrato."
  help:             "Rimuove un canale registrato dal database."
  success:          "\x0303✔\x03 Il canale \x02%channel%\x02 è stato eliminato."
  not_registered:   "\x0304✗\x03 Il canale \x02%channel%\x02 non è registrato."

suspend:
  syntax:           "SUSPEND <#canale> <durata> <motivo>"
  short:            "Sospende un canale."
  help:             "Disabilita temporaneamente un canale registrato. Formati durata: 0 = permanente, 1d, 12h, 60m.\nDurante la sospensione, i modi del canale, l'accesso e l'enforcement sono disabilitati.\nQuesto comando richiede il permesso IRCop: chanserv.suspend"
