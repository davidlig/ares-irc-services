noexpire:
  syntax:           "NOEXPIRE <#canale> {ON|OFF}"
  short:            "Imposta o rimuove la protezione dalla scadenza per un canale."
  help:             |
    Controlla se un canale scadrà per inattività.
    Quando ON, il canale non scade mai indipendentemente dall'ultima attività.
    Quando OFF, si applicano le normali regole di scadenza.

    Solo gli IRCops con il permesso 'chanserv.noexpire' possono usare questo comando.

    Sintassi: NOEXPIRE <#canale> {ON|OFF}
    Esempi:
      NOEXPIRE #Importante ON
      NOEXPIRE #Importante OFF
  success_on:       "\x0303✔\x03 Il canale \x02%channel%\x02 è ora protetto dalla scadenza."
  success_off:      "\x0303✔\x03 Il canale \x02%channel%\x02 ora scadrà normalmente."
  not_registered:   "\x0304✗\x03 Il canale \x02%channel%\x02 non è registrato."
