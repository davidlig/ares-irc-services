motd:
  short:            "Zarządzaj wiadomościami MOTD wysyłanymi użytkownikom przy połączeniu."
  syntax:           "MOTD \x02{ADD|DEL|LIST|CLEAN}\x02 [args]"
  help:             "Zarządzaj wpisami Message Of The Day, które są wysyłane do użytkowników gdy łączą się z siecią.\n\n"
  unknown_sub:      "\x0304✗\x03 Nieznana podkomenda. Użyj: \x02ADD\x02, \x02DEL\x02, \x02LIST\x02, \x02CLEAN\x02"
  add:
    syntax:         "MOTD ADD {serwis|nick!ident@vhost} {PRIVMSG|NOTICE} <wygaśnięcie> <wiadomość>"
    syntax_hint:    "\x0304✗\x03 Użycie: \x02%syntax%\x02"
    short:          "Dodaj wpis MOTD."
    help:           "Dodaje nową wiadomość MOTD, która będzie wysyłana do każdego użytkownika gdy łączy się z siecią.\n\n"
    done:           "\x0303✓\x03 Wpis MOTD #%id% dodany."
    invalid_type:   "\x0304✗\x03 Nieprawidłowy typ wiadomości. Musi być \x02PRIVMSG\x02 lub \x02NOTICE\x02."
    invalid_expiry: "\x0304✗\x03 Nieprawidłowy format wygaśnięcia. Użyj: \x02<liczba><s|m|h|d>\x02 (np., 30s, 5m, 24h, 7d)."
  del:
    syntax:         "MOTD DEL \x02<id>\x02"
    syntax_hint:    "\x0304✗\x03 Użycie: \x02%syntax%\x02"
    short:          "Usuń wpis MOTD."
    help:           "Usuwa wpis MOTD według jego ID.\n\n"
    done:           "\x0303✓\x03 Wpis MOTD #%id% usunięty."
    not_found:      "\x0304✗\x03 Wpis MOTD nie znaleziony."
  list:
    syntax:         "MOTD LIST"
    short:          "Lista wszystkich wpisów MOTD."
    help:           "Wyświetla wszystkie skonfigurowane wpisy MOTD.\n\n"
    empty:          "Brak skonfigurowanych wpisów MOTD."
    header:         "Wpisy MOTD:"
    status_enabled: "\x0303włączone\x03"
    status_disabled: "\x0304wyłączone\x03"
    expired:        "\x0304wygasłe\x03"
    no_bot:         "(brak bota)"
    never:          "nigdy"
  clean:
    syntax:         "MOTD CLEAN"
    short:          "Usuń wszystkie wygasłe wpisy MOTD."
    help:           "Usuwa wszystkie wpisy MOTD, których czas wygaśnięcia minął.\n\n"
    done:           "\x0303✓\x03 Usunięto %count% wygasłych wpisów MOTD."
    none:           "\x0303✓\x03 Brak wygasłych wpisów MOTD do usunięcia."
