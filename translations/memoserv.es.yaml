    syntax: "IGNORE LIST [#canal]"
    short: "Lista nicknames ignorados."
    help: "Muestra la lista de nicknames que tú (o el canal) ignoráis para mensajes."
  added: "\x0303✔\x03 \x02%nick%\x02 añadido a la lista de ignorados."
  removed: "\x0303✔\x03 \x02%nick%\x02 quitado de la lista de ignorados."
