list:
  syntax: "LIST [#canal]"
  short: "Lista mensajes (no leídos con * rojo)."
  help: "Lista tus mensajes o los del canal. Los no leídos se muestran con asterisco rojo y vista previa (máx. 50 caracteres). Sin #canal = tu bandeja; con #canal requiere MEMOREAD."
