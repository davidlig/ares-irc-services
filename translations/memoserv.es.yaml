del:
  syntax: "DEL [#canal] <número>"
  short: "Elimina un mensaje por número."
  help: "Elimina el mensaje con el número indicado. En canales requiere nivel MEMOCHANGE."
  deleted: "\x0303✔\x03 Mensaje #%index% eliminado."
