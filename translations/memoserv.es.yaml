  not_found: "\x0304✗\x03 Mensaje #%index% no encontrado."

ignore:
  syntax: "IGNORE {ADD|DEL|LIST} [#canal] [nickname]"
  short: "Gestiona la lista de ignorados para mensajes."
  help: "ADD añade un nickname a tu lista (o la del canal) de ignorados; DEL quita; LIST muestra la lista. En canales, ADD/DEL requieren MEMOCHANGE."
  add:
    syntax: "IGNORE ADD [#canal] <nickname>"
    short: "Añade nickname a la lista de ignorados."
    help: "Los mensajes de este nickname no serán aceptados en tu bandeja (o la del canal)."
  del:
    syntax: "IGNORE DEL [#canal] <nickname>"
    short: "Quita nickname de la lista de ignorados."
    help: "Elimina el nickname de la lista de ignorados."
