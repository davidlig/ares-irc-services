# --- GLINE --------------------------------------------------------------------
gline:
  syntax:           "GLINE {ADD|DEL|LIST} [maske] [süre] [sebep]"
  short:            "Ağ genelindeki G-line'ları yönetin."
  help:             "Ağ genelindeki G-line'ları (genel yasaklamalar) yönetin.\nADD maske, süre ve sebep ile yeni bir G-line ekler.\nDEL bir G-line'ı maske veya giriş numarasıyla kaldırır.\nLIST maske filtresi ile isteğe bağlı olarak tüm G-line'ları gösterir.\n\nSüre formatı: 0=kalıcı, veya d, s, d son ekini kullanın (örn., 7g, 12s, 30d).\nRoot veya IRCop kullanıcılarıyla eşleşen GLINE'lar reddedilir.\nBu komut operserv.gline iznini gerektirir."
  unknown_sub:      "\x0304✗\x03 Bilinmeyen alt komut \x02%sub%\x02. ADD, DEL veya LIST kullanın."
  invalid_mask:     "\x0304✗\x03 Geçersiz maske formatı. user@host formatında olmalıdır (örn., *@192.168.*)."
  global_mask:      "\x0304✗\x03 G-line maskesi \x02%mask%\x02 çok geniş. Genel maskeler kullanılamaz."
  dangerous_mask:   "\x0304✗\x03 G-line maskesi \x02%mask%\x02 çok geniş. Host kısmı en az 4 alfanümerik karakter içermelidir."
  protected_user:   "\x0304✗\x03 Korumalı kullanıcı \x02%nickname%\x02 G-line ile engellenemez."
  invalid_expiry:   "\x0304✗\x03 Geçersiz süre formatı. Kalıcı için 0 veya 7g, 12s, 30d gibi bir değer kullanın."
  already_exists:   "\x0304✗\x03 \x02%mask%\x02 için G-line zaten mevcut."
  max_entries:      "\x0304✗\x03 Maksimum G-line sayısına (%max%) ulaşıldı."
  not_found:        "\x0304✗\x03 G-line \x02%mask%\x02 bulunamadı."
  user_not_found:   "\x0304✗\x03 \x02%nickname%\x02 rumuzu çevrimiçi değil."
  permanent:        "kalıcı"

  add:
    syntax:         "GLINE ADD <maske> <süre> <sebep>"
    short:          "Ağ genelinde bir G-line ekleyin."
    help:           "Ağ genelinde bir G-line (genel yasaklama) ekler.\nMaske user@host formatında olmalıdır.\nSüre: 0=kalıcı, veya d, s, d son ekini kullanın (örn., 7g, 12s, 30d).\nRoot veya IRCop kullanıcılarıyla eşleşen GLINE'lar reddedilir.\nBu komut operserv.gline iznini gerektirir."
    done:           "\x0303✓\x03 G-line eklendi: \x02%mask%\x02 (%duration%) - %reason%"

  del:
    syntax:         "GLINE DEL <maske|numara>"
    short:          "Bir G-line'ı kaldırın."
    help:           "Listeden bir G-line'ı kaldırır.\nMaskeyi veya LIST'teki giriş numarasını belirtebilirsiniz.\nBu komut operserv.gline iznini gerektirir."
    done:           "\x0303✓\x03 G-line \x02%mask%\x02 kaldırıldı."

  list:
    syntax:         "GLINE LIST [maske]"
    short:          "Tüm G-line'ları listeleyin."
    help:           "Tüm G-line'ları listeler. İsteğe bağlı olarak maske kalıbı ile filtreleyin.\nBu komut operserv.gline iznini gerektirir."
    header:         "\x0307---\x03 \x02G-line'lar (%count%) \x0307---\x03"
    empty:          "G-line bulunmamaktadır."
    no_reason:      "Sebep yok"
    never_expires:  "Kalıcı"
    unknown_creator: "bilinmiyor"
    entry:          "\x0310%index%.\x03 \x02%mask%\x02 - %reason% (\x0314%nickname%\x03, bitiş: %expiration%)"

# --- GLOBAL -------------------------------------------------------------------
global:
  syntax:           "GLOBAL {service|nick!ident@vhost} {PRIVMSG|NOTICE} <mesaj>"
  short:            "Tüm bağlı kullanıcılara genel bir mesaj gönderin."
  help:             "Tüm bağlı kullanıcılara bir mesaj gönderir.\n\nİlk argüman bir hizmet adıysa, mesaj mevcut hizmet kullanılarak gönderilir.\n\nHizmet değilse, belirtilen maskeyle geçici bir sözde istemci oluşturulur.\nMaske formatı: nick!ident@vhost\n- nick: IRC geçerli rumuz (harfler, []{}|\\`, rakamlar, harfle başlar)\n- ident: alfanümerik, . _ ~ - ile\n- vhost: geçerli host adı\n\nSözde istemciler için, rumuz bağlı veya kayıtlı olamaz.\nSözde istemci gönderme sırasında bağlı kalır ve otomatik olarak ayrılır\n(rumuz 24s boyunca SQLINE/QLINE ile engellenir).\n\nPRIVMSG özel mesaj olarak, NOTICE bildirim olarak gönderir.\nBu komut operserv.global iznini gerektirir."
  mask_invalid:    "\x0304✗\x03 Geçersiz maske formatı: %error%"
  nick_service:    "\x0304✗\x03 Bir hizmet rumuzu kullanılamaz."
  nick_connected: "\x0304✗\x03 \x02%nickname%\x02 rumuzu şu anda bağlı."
  nick_registered: "\x0304✗\x03 \x02%nickname%\x02 rumuzu kayıtlı."
  type_invalid:    "\x0304✗\x03 Mesaj türü PRIVMSG veya NOTICE olmalıdır."
  done:            "\x0303✓\x03 Genel mesaj \x02%nickname%\x02 adresinden %count% kullanıcıya gönderildi."

# --- RAW ---------------------------------------------------------------------
raw:
  syntax:           "RAW <satır>"
  short:            "IRCd'ye ham bir protokol satırı gönderin."
  help:             "Verilen satırı doğrudan uplink IRCd soketine gönderir.\nSon derece dikkatli kullanın. Geçersiz protokol satırları ağı çökertebilir.\nBu komut operserv.raw iznini gerektirir."
  empty:            "\x0304✗\x03 Göndermek için boş olmayan bir satır belirtmelisiniz."
  too_long:         "\x0304✗\x03 Satır çok uzun. Maksimum 510 karakter."
  not_connected:    "\x0304✗\x03 IRCd'ye bağlı değil."
  done:             "\x0303✓\x03 Ham satır gönderildi."

# --- DEBUG -------------------------------------------------------------------
debug:
