  header_title:     "%bot%"
  intro:            "IRC operatörleri için ağ yönetim hizmeti."
  general_header:   "\x02\x0314Kullanılabilir komutlar:\x03\x0F"
  command_line:     "  \x0307%command%\x03%description%"
  subcommand_line:  "  \x0307%command%\x03%description%"
  options_header:   "\x02\x0314Seçenekler:\x03\x0F"
  general_footer:   "Daha fazla bilgi için \x0303/msg %bot% HELP <komut>\x03 kullanın."
  set_sub_footer:   "Daha fazla bilgi için \x0303/msg %bot% HELP %command% <seçenek>\x03 kullanın."
  syntax_label:     "\x0307Sözdizimi:\x03 \x02%syntax%\x02"
  footer:           "\x0314─────────────────────────────\x03"
