# --- IRCOP --------------------------------------------------------------------
ircop:
  syntax:           "IRCOP <nickname> {ADD|DEL|LIST} [rol]"
  short:            "Ağ IRC operatörlerini yönetin."
  help:             "Ağ IRC operatörlerini yönetin. ADD, kayıtlı bir rumuzu\nbelirtilen rolle operatör olarak ekler.\nDEL bir operatörü kaldırır. LIST tüm operatörleri gösterir.\nMevcut rolleri görmek için ROLE LIST kullanın.\nBu komut yalnızca hizmetlerde yapılandırılmış Root kullanıcıları içindir."

  unknown_sub:      "\x0304✗\x03 Bilinmeyen alt komut \x02%sub%\x02. ADD, DEL veya LIST kullanın."
  unknown_role:     "\x0304✗\x03 \x02%role%\x02 rolü mevcut değil. Kullanılabilir rolleri görmek için \x0303/msg %bot% ROLE LIST\x03 kullanın."
  already_admin:    "\x0304✗\x03 \x02%nickname%\x02 zaten bir IRC operatörüdür (rol: %role%)."
  not_admin:       "\x0304✗\x03 \x02%nickname%\x02 bir IRC operatörü değil."
  role_changed:     "\x0303✓\x03 \x02%nickname%\x02 için rol %old% yerine %new% olarak değiştirildi."

  add:
    syntax:         "IRCOP <nickname> ADD <rol>"
    short:          "Bir ağ IRC operatörü ekleyin."
    help:           "Kayıtlı bir rumuzu ağ IRC operatörü olarak ekler.\nMevcut rolleri görmek için ROLE LIST kullanın.\nBu komut yalnızca Root kullanıcıları içindir."
    done:           "\x0303✓\x03 \x02%nickname%\x02, \x02%role%\x02 olarak eklendi."
    nick_not_active: "\x0304✗\x03 \x02%nickname%\x02 rumuzu etkin bir kayıtlı rumuz değil."

  del:
    syntax:         "IRCOP <nickname> DEL"
    short:          "Bir ağ IRC operatörünü kaldırın."
    help:            "Listeden bir ağ IRC operatörünü kaldırır.\nBu komut yalnızca Root kullanıcıları içindir."
    done:           "\x0303✓\x03 \x02%nickname%\x02 IRC operatörlerinden kaldırıldı."

  list:
    syntax:         "IRCOP LIST"
    short:          "Tüm ağ IRC operatörlerini listeleyin."
    help:            "Tüm ağ IRC operatörlerini rolleri ve kayıt tarihleriyle listeler.\nBu komut yalnızca Root kullanıcıları içindir."
    header:         "\x0307---\x03 \x02Ağ IRC Operatörleri\x02 \x0307---\x03"
    empty:          "IRC operatörü bulunmamaktadır."

# --- ROLE --------------------------------------------------------------------
role:
  syntax:           "ROLE {ADD|DEL|LIST|PERMS|MODES|VHOST} <ad> ..."
  short:            "Operatör rollerini yönetin."
  help:             "Operatör rollerini yönetin. ADD yeni bir rol oluşturur, DEL siler,\nLIST tüm rolleri gösterir, PERMS bir rolün izinlerini yönetir, MODES IRCOP modlarını yönetir,\nVHOST bir rol için zorunlu vhost kalıbını yönetir.\nKorumalı roller (ADMIN, OPER, PREOPER) silinemez.\nBu komut yalnızca Root kullanıcıları içindir."

  unknown_sub:      "\x0304✗\x03 Bilinmeyen alt komut \x02%sub%\x02. ADD, DEL, LIST, PERMS, MODES veya VHOST kullanın."
  not_found:        "\x0304✗\x03 \x02%role%\x02 rolü mevcut değil."
  already_exists:   "\x0304✗\x03 \x02%role%\x02 rolü zaten mevcut."
  protected:        "\x0304✗\x03 \x02%role%\x02 rolü korumalıdır ve silinemez."

  add:
    syntax:         "ROLE ADD <ad> [açıklama]"
    short:          "Yeni bir rol oluşturun."
    help:            "Yeni bir özel rol oluşturur. Açıklama isteğe bağlıdır.\nBu komut yalnızca Root kullanıcıları içindir."
    done:           "\x0303✓\x03 \x02%role%\x02 rolü oluşturuldu."

  del:
    syntax:         "ROLE DEL <ad>"
    short:          "Bir rolü silin."
    help:            "Özel bir rolü siler. Korumalı roller (ADMIN, OPER, PREOPER)\nsilinemez. Rolde atanmış operatörler varsa,\nönce onları yeniden atamanız gerekir.\nBu komut yalnızca Root kullanıcıları içindir."
    done:           "\x0303✓\x03 \x02%role%\x02 rolü silindi."

  list:
    syntax:         "ROLE LIST"
    short:          "Tüm rolleri listeleyin."
    help:            "Tüm rolleri listeler. Korumalı roller [PROTECTED] ile işaretlenir.\nBu komut yalnızca Root kullanıcıları içindir."
    header:         "\x0307---\x03 \x02Operatör Rolleri\x02 \x0307---\x03"
    empty:          "Operatör rolü bulunmamaktadır."

  perms:
    syntax:         "ROLE PERMS <rol> {LIST|ADD|DEL|CLEAR} [izin|ALL]"
    short:          "Rol izinlerini yönetin."
    help:            "Bir role atanmış izinleri yönetin.\nLIST, rolün tüm izinlerini gösterir.\nADD, role bir izin atar.\nDEL, rolden bir izni kaldırır (korumalı roller için geçerli değil).\nCLEAR, roldeki tüm izinleri kaldırır.\nMevcut tüm izinleri tek seferde eklemek için ALL kullanın.\nBu komut yalnızca Root kullanıcıları içindir."
    unknown_action:  "\x0304✗\x03 Bilinmeyen eylem \x02%action%\x02. LIST, ADD, DEL veya CLEAR kullanın."
    not_found:       "\x0304✗\x03 \x02%perm%\x02 izni mevcut değil."
    already_has:     "\x0304✗\x03 \x02%role%\x02 rolü zaten \x02%perm%\x02 iznine sahip."
    does_not_have:   "\x0304✗\x03 \x02%role%\x02 rolü \x02%perm%\x02 iznine sahip değil."
    protected:      "\x0304✗\x03 Korumalı \x02%role%\x02 rolü için izinler değiştirilemez."

    list:
      syntax:       "ROLE PERMS <rol> LIST"
      short:        "Bir rolün izinlerini listeleyin."
      help:         "Bir role atanmış tüm izinleri listeler.\nBu komut yalnızca Root kullanıcıları içindir."
      header:        "\x0307---\x03 \x02%role% için İzinler\x02 \x0307---\x03"
      empty:        "\x02%role%\x02 rolüne atanmış izin yok."
      assigned:     "\x0310Atanmış:\x03"
      none_assigned: "\x0314Atanmış izin yok.\x03"
      available:    "\x0310Kullanılabilir:\x03"
      all_assigned: "\x0314Bu role tüm izinler atanmış.\x03"

    add:
      syntax:       "ROLE PERMS <rol> ADD {izin|ALL}"
      short:        "Bir role izin ekleyin."
      help:         "Bir role izin ekler.\nMevcut tüm izinleri tek seferde eklemek için ALL kullanın.\nBu komut yalnızca Root kullanıcıları içindir."
      done:         "\x0303✓\x03 \x02%perm%\x02 izni \x02%role%\x02 rolüne eklendi."
      all_done:     "\x0303✓\x03 \x02%role%\x02 rolüne \x02%count%\x02 izin eklendi."
      all_skipped:  "\x0304✗\x03 \x02%role%\x02 rolü zaten tüm mevcut izinlere sahip."
      all_empty:    "\x0304✗\x03 Eklenebilecek izin bulunmamaktadır."

    del:
      syntax:       "ROLE PERMS <rol> DEL <izin>"
      short:        "Bir rolden izni kaldırın."
      help:         "Bir rolden izni kaldırır.\nKorumalı roller değiştirilemez.\nBu komut yalnızca Root kullanıcıları içindir."
      done:         "\x0303✓\x03 \x02%perm%\x02 izni \x02%role%\x02 rolünden kaldırıldı."

    clear:
      syntax:       "ROLE PERMS <rol> CLEAR"
      short:        "Bir roldeki tüm izinleri kaldırın."
      help:         "Bir roldeki tüm izinleri kaldırır.\nBu komut yalnızca Root kullanıcıları içindir."
      done:         "\x0303✓\x03 \x02%role%\x02 rolünden \x02%count%\x02 izin kaldırıldı."
      empty:        "\x0304✗\x03 \x02%role%\x02 rolüne atanmış izin yok."

  modes:
    syntax:         "ROLE MODES <rol> {VIEW|SET} [modlar]"
    short:          "Rol için IRCOP kullanıcı modlarını yönetin."
    help:            "Bir role atanmış IRCOP kullanıcı modlarını yönetin.\nVIEW, rolün mevcut modlarını gösterir.\nSET, IRCOP modlarını ayarlar (örn., oH için +oH).\nBu role sahip kullanıcılar kimlik doğrulamada bu modları alır.\nHer IRCD'ye göre kullanılabilir modlar: UnrealIRCd (H, q, s, W), InspIRCd (s).\nBu komut yalnızca Root kullanıcıları içindir."
    unknown_action:  "\x0304✗\x03 Bilinmeyen eylem \x02%action%\x02. VIEW veya SET kullanın."

    view:
      syntax:       "ROLE MODES <rol> VIEW"
      short:        "Rolün modlarını gösterir."
      help:          "Bir role atanmış IRCOP kullanıcı modlarını gösterir.\nBu komut yalnızca Root kullanıcıları içindir."
      header:        "\x0307---\x03 \x02%role% için Modlar\x02 \x0307---\x03"
      empty:        "\x02%role%\x02 rolüne atanmış mod yok."
      line:         "  Modlar: \x0303%modes%\x03"

    set:
      syntax:       "ROLE MODES <rol> SET [modlar]"
      short:        "IRCOP kullanıcı modlarını ayarlayın."
      help:          "Rol için IRCOP kullanıcı modlarını ayarlayın.\nArgüman olmadan, roldeki tüm modları kaldırır.\nYalnızca aktif IRCD için geçerli IRCOP modları.\nBu role sahip kimliği doğrulanmış kullanıcılar değişiklikleri alır.\nBu komut yalnızca Root kullanıcıları içindir."
      done:         "\x0303✓\x03 \x02%role%\x02 rolü için modlar \x02%modes%\x02 olarak ayarlandı."
      cleared:      "\x0303✓\x03 \x02%role%\x02 rolünden tüm modlar kaldırıldı."
      invalid_mode: "\x0304✗\x03 \x02%mode%\x02 modu geçerli bir IRCOP modu değil."
      invalid_modes: "\x0304✗\x03 Geçersiz modlar: %invalid%. Geçerli modlar: %valid%."
      no_irc_user_modes: "\x0304✗\x03 Mevcut IRCD'de yapılandırılmış IRCOP modu yok."

  vhost:
    syntax:         "ROLE VHOST <rol> {VIEW|SET} [kalıp]"
    short:          "Bir rol için zorunlu vhost kalıbını yönetin."
    help:           "Bir role atanmış zorunlu vhost'u yönetin.\nVIEW, mevcut zorunlu vhost kalıbını gösterir.\nSET bir zorunlu vhost kalıbı atar (bu role sahip kullanıcılar\nkimlik doğrulamada bu vhost'u alır, kişisel vhost'u geçersiz kılar).\nKalıp temizlenmiş rumuzun sonuna eklenir, örn.:\n  Rumuz: _davidlig_ → Kalıp: admin.ares → VHost: davidlig.admin.ares\nGeçerli karakterler: a-z, A-Z, 0-9, tire (-) ve nokta (.).\nEn az bir nokta olmalı, - veya . ile başlayamaz/bitemez veya .. içeremez.\nZorunlu vhost kalıbını temizlemek için OFF kullanın.\nBu komut yalnızca Root kullanıcıları içindir."
    unknown_action:  "\x0304✗\x03 Bilinmeyen eylem \x02%action%\x02. VIEW veya SET kullanın."

    view:
      syntax:       "ROLE VHOST <rol> VIEW"
      short:         "Rolün zorunlu vhost kalıbını gösterir."
      help:          "Bir role atanmış zorunlu vhost kalıbını gösterir.\nBu komut yalnızca Root kullanıcıları içindir."
      header:        "\x0307---\x03 \x02%role% için Zorunlu vhost\x02 \x0307---\x03"
      empty:        "\x02%role%\x02 rolü için zorunlu vhost kalıbı ayarlanmamış."
      line:         "  Kalıp: \x0303%pattern%\x03"
      example:      "  Örnek: \x02rumuz\x02.%pattern%"

    set:
      syntax:       "ROLE VHOST <rol> SET [kalıp]"
      short:         "Rol için zorunlu vhost kalıbını ayarlayın."
      help:          "Rol için zorunlu vhost kalıbını ayarlar.\nBu rolle kimlik doğrulayan kullanıcılar zorunlu vhost'u alır,\nbu kişisel vhost'tan önceliklidir.\nKalıp temizlenmiş rumuzun sonuna eklenir.\nZorunlu vhost'u temizlemek için OFF kullanın veya argümanı belirtmeyin.\nBu komut yalnızca Root kullanıcıları içindir."
      done:         "\x0303✓\x03 \x02%role%\x02 rolü için zorunlu vhost kalıbı ayarlandı."
      cleared:      "\x0303✓\x03 \x02%role%\x02 rolünden zorunlu vhost kalıbı kaldırıldı."
      invalid:      "\x0304✗\x03 Geçersiz vhost kalıbı. Geçerli karakterler: a-z, A-Z, 0-9, - ve .. En az bir nokta olmalı, - veya . ile başlayamaz/bitemez veya .. içeremez."

