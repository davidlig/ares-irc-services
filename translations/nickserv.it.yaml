  action_with_value: "%operator% esegue il comando %command% su %target%. Opzione: %option%=%value%. %reason%"
  action_duration: "%operator% esegue il comando %command% su %target%. Durata: %duration%. %reason%"
  prefix_reason: "Motivo: %reason%"
