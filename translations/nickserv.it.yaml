protection:
  nick_in_use:      "\x0304⚠\x03 Il nick \x02%nickname%\x02 è registrato. Sarà rinominato se non si identifica."
  renamed_to:       "\x0307→\x03 È stato rinominato in \x02%guest_nick%\x02. Per recuperare il suo nick:\n\x0303/msg %bot% IDENTIFY %nickname% <password>\x03"
  nick_forbidden:   "\x0304✗\x03 Il nickname \x02%nickname%\x02 è vietato: %reason%"

# --- Comandi IRCop ----------------------------------------------------------
userip:
  syntax:           "USERIP <nickname>"
  short:            "Ottiene l'indirizzo IP reale e l'hostname del nickname."
  help:             |
    Mostra l'indirizzo IP reale e l'hostname del nickname specificato.
    Disponibile solo per IRCops con il permesso 'nickserv.userip'.

    Questo comando mostra informazioni sensibili sul nickname.
    Lo usi responsabilmente.

    Sintassi: USERIP <nickname>
    Esempio: USERIP UnUtente
  not_online:       "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è connesso."
  result:           "\x0307ℹ\x03 Nickname: \x02%nickname%\x02 | IP: \x0307%ip%\x03 | Host: \x0307%host%\x03"

permissions:
  nickserv.userip: "Visualizzare l'IP reale/hostname di un nickname (USERIP)"
  nickserv.suspend: "Sospendere o riattivare un nickname (SUSPEND/UNSUSPEND)"
  nickserv.rename: "Forzare il rename di un nickname connesso a un nick casuale (RENAME)"
  nickserv.drop: "Eliminare un nickname registrato (DROP)"
  nickserv.forbid: "Vietare o riammettere un nickname (FORBID/UNFORBID)"
  nickserv.forbidvhost: "Vietare o consentire pattern vhost (FORBIDVHOST)"
  nickserv.saset: "Modificare le impostazioni di un altro nickname (SASET)"
  nickserv.noexpire: "Impostare o rimuovere la protezione dalla scadenza per un nickname (NOEXPIRE)"
  nickserv.history: "Visualizzare e gestire la cronologia azioni del nickname (HISTORY)"

# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <nickname> <durata> <motivo>"
  short:            "Sospende un nickname."
  help:             |
    Sospende un nickname, impedendo al proprietario di identificarsi.
    La sospensione può essere temporanea o permanente.

    Formati durata: \x0303%d\x03 (giorni), \x0303%h\x03 (ore), \x0303%m\x03 (minuti), o \x03030\x03 (permanente).

    Gli utenti sospesi non possono identificarsi al proprio nickname.
    Gli IRC operator e gli utenti root non possono essere sospesi.

    Sintassi: SUSPEND <nickname> <durata> <motivo>
    Esempi:
      SUSPEND CattivoUtente 7d Spam in #aiuto
      SUSPEND Abusatore 30d Flood ripetuto
      SUSPEND UtenteProblematico 0 Elusione permaban
  success:            "\x0303✔\x03 Il nickname \x02%nickname%\x02 è stato sospeso fino al \x02%duration%\x02."
  already_suspended:  "\x0304✗\x03 Il nickname \x02%nickname%\x02 è già sospeso."
  not_registered:     "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è registrato."
  forbidden:          "\x0304✗\x03 Il nickname \x02%nickname%\x02 è vietato e non può essere sospeso."
  cannot_suspend_oper: "\x0304✗\x03 Impossibile sospendere l'IRC operator \x02%nickname%\x02."
  cannot_suspend_root: "\x0304✗\x03 Impossibile sospendere l'utente root \x02%nickname%\x02."
  cannot_suspend_service: "\x0304✗\x03 Impossibile sospendere il nickname di servizio \x02%nickname%\x02."
  invalid_duration:   "\x0304✗\x03 Durata non valida. Usi: \x0303<d><h><m>\x03 (es., 7d, 12h, 30m) o \x03030\x03 per permanente."
  permanent:          "permanente"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <nickname>"
  short:            "Rimuove la sospensione da un nickname."
  help:             |
    Rimuove una sospensione attiva da un nickname, consentendo al proprietario di identificarsi di nuovo.

    Sintassi: UNSUSPEND <nickname>
    Esempio: UNSUSPEND UnUtente
  success:          "\x0303✔\x03 La sospensione è stata revocata da \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è registrato."
  not_suspended:    "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è sospeso."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <nickname>"
  short:            "Forza il rename di un nickname connesso a un nickname casuale."
  help:             |
    Forza un nickname connesso a cambiare il proprio nick in uno generato casualmente.
    Utile per far rispettare le policy di rete senza disconnettere l'utente.

    Il formato del nuovo nickname usa il prefisso ospite configurato (%prefix%).

    Questo comando richiede il permesso IRCop: nickserv.rename

    Sintassi: RENAME <nickname>
    Esempio: RENAME Piantagrane
  not_online:        "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è connesso."
  cannot_rename_root: "\x0304✗\x03 Impossibile rinominare l'utente root \x02%nickname%\x02."
  cannot_rename_oper: "\x0304✗\x03 Impossibile rinominare l'IRC operator \x02%nickname%\x02."
  cannot_rename_service: "\x0304✗\x03 Impossibile rinominare il nickname di servizio \x02%nickname%\x02."
  success:           "\x0303✓\x03 Il nickname \x02%nickname%\x02 è stato rinominato in \x02%new_nick%\x02."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <nickname>"
  short:            "Elimina un nickname registrato."
  help:             |
    Elimina un nickname registrato dal database.
    Quest'azione non può essere annullata.

    Se l'utente è online, sarà rinominato in un nickname Guest-.
    Gli utenti root e gli IRC operator non possono essere eliminati.
    Non può eliminare il proprio nickname.

    Questo comando richiede il permesso IRCop: nickserv.drop

    Sintassi: DROP <nickname>
    Esempio: DROP VecchioAccount
  not_registered:     "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è registrato."
  suspended:         "\x0304✗\x03 Il nickname \x02%nickname%\x02 è sospeso. Lo riattivi prima."
  forbidden:         "\x0304✗\x03 Il nickname \x02%nickname%\x02 è vietato."
  cannot_drop_root:   "\x0304✗\x03 Impossibile eliminare l'utente root \x02%nickname%\x02."
  cannot_drop_oper:   "\x0304✗\x03 Impossibile eliminare l'IRC operator \x02%nickname%\x02."
  cannot_drop_self:    "\x0304✗\x03 Non può eliminare il proprio nickname."
  success:            "\x0303✓\x03 Il nickname \x02%nickname%\x02 è stato eliminato."
  cannot_drop_service: "\x0304✗\x03 Impossibile eliminare il nickname di servizio \x02%nickname%\x02."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <nickname> <motivo>"
  short:            "Blocca permanentemente l'uso di un nickname."
  help:             |
    Proibisce l'uso di un nickname sulla rete.
    Il nickname non può essere registrato o usato da nessuno.

    Se il nickname è attualmente registrato, verrà prima eliminato.
    Se qualcuno lo sta usando, sarà costretto a cambiare in un nickname Guest-.

    Gli utenti root, gli IRC operator e i nickname di servizio non possono essere vietati.

    Questo comando richiede il permesso IRCop: nickserv.forbid

    Sintassi: FORBID <nickname> <motivo>
    Esempio: FORBID BruttoNick Violazioni ripetute delle policy
  success:            "\x0303✔\x03 Il nickname \x02%nickname%\x02 è stato vietato."
  updated:            "\x0303✔\x03 Il motivo del divieto per \x02%nickname%\x02 è stato aggiornato."
  reason_required:    "\x0304✗\x03 Deve fornire un motivo per il divieto."
  cannot_forbid_root:  "\x0304✗\x03 Impossibile vietare l'utente root \x02%nickname%\x02."
  cannot_forbid_oper:  "\x0304✗\x03 Impossibile vietare l'IRC operator \x02%nickname%\x02."
  cannot_forbid_service: "\x0304✗\x03 Impossibile vietare il nickname di servizio \x02%nickname%\x02."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <nickname>"
  short:            "Rimuove il divieto da un nickname."
  help:             |
    Rimuove il divieto da un nickname, consentendone di nuovo l'uso.

    Questo comando richiede il permesso IRCop: nickserv.forbid

    Sintassi: UNFORBID <nickname>
    Esempio: UNFORBID UnNick
  success:          "\x0303✔\x03 Il nickname \x02%nickname%\x02 non è più vietato."
  not_forbidden:    "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è vietato."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST {ADD|DEL|LIST} [pattern]"
  short:            "Gestisce i pattern vhost vietati."
  help:             |
    Gestisce i pattern che impediscono agli utenti di impostare vhost corrispondenti
    tramite NickServ SET VHOST.

    Caratteri jolly: * corrisponde a qualsiasi sequenza, ? corrisponde a un singolo carattere.
    Esempio: *.pirata.com blocca qualsiasi vhost che termina con .pirata.com

    Questo comando richiede il permesso IRCop: nickserv.forbidvhost

    Sotto-comandi:
      ADD <pattern>    Aggiunge un pattern vietato
      DEL <pattern>    Rimuove un pattern vietato
      LIST             Mostra tutti i pattern vietati

  unknown_sub: "\x0304✗\x03 Sotto-comando sconosciuto \x02%sub%\x02. Usi ADD, DEL o LIST."

  add:
    syntax:      "FORBIDVHOST ADD <pattern>"
    short:       "Aggiunge un pattern vhost vietato."
    help:        |
      Aggiunge un pattern alla lista dei vhost vietati. Gli utenti non potranno
      impostare vhost che corrispondono a questo pattern tramite SET VHOST.

      Caratteri jolly: * corrisponde a qualsiasi sequenza, ? corrisponde a un singolo carattere.

      Sintassi: FORBIDVHOST ADD <pattern>
      Esempio: FORBIDVHOST ADD *.pirata.com
    done:            "\x0303✓\x03 Pattern vhost vietato aggiunto: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 Il pattern \x02%pattern%\x02 esiste già."
    invalid:          "\x0304✗\x03 Formato pattern vhost non valido."

  del:
    syntax:      "FORBIDVHOST DEL <pattern>"
    short:       "Rimuove un pattern vhost vietato."
    help:        |
      Rimuove un pattern dalla lista dei vhost vietati.

      Sintassi: FORBIDVHOST DEL <pattern>
      Esempio: FORBIDVHOST DEL *.pirata.com
    done:        "\x0303✓\x03 Pattern vhost vietato rimosso: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 Pattern \x02%pattern%\x02 non trovato."

  list:
    short:       "Elenca tutti i pattern vhost vietati."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Mostra tutti i pattern vhost vietati.

      Sintassi: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Pattern vhost vietati (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — da %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 Nessun pattern vhost vietato."
    unknown_creator: "sconosciuto"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <nickname> {ADD|DEL|VIEW|CLEAR}"
  short:            "Visualizza o gestisce la cronologia azioni del nickname."
  help:             |
    Gestisce la cronologia delle azioni per un nickname.
    Solo gli IRCops con il permesso 'nickserv.history' possono usare questo comando.

    Azioni registrate automaticamente:
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Sintassi: HISTORY <nickname> ADD <messaggio>
            HISTORY <nickname> DEL <id>
            HISTORY <nickname> VIEW [PAGINA|ALL]
            HISTORY <nickname> CLEAR

    Esempi:
      HISTORY UnNick VIEW
      HISTORY UnNick ADD Nota manuale su questo utente
      HISTORY UnNick VIEW 2
      HISTORY UnNick VIEW ALL
      HISTORY UnNick DEL 123
      HISTORY UnNick CLEAR

    Usi VIEW per vedere la cronologia (mostra 3 voci per impostazione predefinita).
    Usi VIEW PAGE 2 per vedere la pagina successiva.
    Usi VIEW ALL per vedere la cronologia completa.
    Usi ADD per aggiungere una voce manuale.
    Usi DEL per eliminare una voce specifica per ID.
    Usi CLEAR per eliminare tutte le voci di cronologia.
  not_registered:   "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è registrato."
  unknown_operator: "(sconosciuto)"

  add:
    syntax:     "HISTORY <nickname> ADD <messaggio>"
    short:      "Aggiunge una voce manuale alla cronologia."
    help:        |
      Aggiunge una voce manuale alla cronologia del nickname.

      Sintassi: HISTORY <nickname> ADD <messaggio>
      Esempio: HISTORY UnNick ADD Utente segnalato per spam
    success:    "\x0303✔\x03 Voce di cronologia aggiunta per \x02%nickname%\x02."

  del:
    syntax:     "HISTORY <nickname> DEL <id>"
    short:      "Elimina una voce di cronologia per ID."
    help:        |
      Elimina una voce specifica di cronologia tramite il suo ID.

      Sintassi: HISTORY <nickname> DEL <id>
      Esempio: HISTORY UnNick DEL 42
    success:    "\x0303✔\x03 Voce di cronologia \x02%id%\x02 eliminata."
    not_found:  "\x0304✗\x03 Voce di cronologia \x02%id%\x02 non trovata."
    invalid_id: "\x0304✗\x03 ID voce non valido: \x02%id%\x02."

  view:
    syntax:     "HISTORY <nickname> VIEW [PAGINA|ALL]"
    short:      "Visualizza la cronologia azioni del nickname."
    help:        |
      Mostra la cronologia delle azioni del nickname.

      Sintassi: HISTORY <nickname> VIEW
              HISTORY <nickname> VIEW PAGE
              HISTORY <nickname> VIEW ALL

      Per impostazione predefinita mostra 3 voci per volta.
      Usi VIEW 2 per vedere la seconda pagina.
      Usi VIEW ALL per vedere la cronologia completa.
    header:     "\x02Cronologia per \x0307%nickname%\x03\x02 (mostra %start%-%end% di %total%):"
    entry:       "#%id% [%date%] \x0303%action%\x03 di %operator% — %message%"
    extra:       "  Extra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Nessuna voce di cronologia trovata per \x02%nickname%\x02."
    page_hint:   "Usi \x0303HISTORY %nickname% VIEW %next_page%\x03 per altre voci."

  clear:
    syntax:     "HISTORY <nickname> CLEAR"
    short:      "Elimina tutte le voci di cronologia per un nickname."
    help:        |
      Rimuove tutte le voci di cronologia per il nickname specificato.
      Quest'azione non può essere annullata.

      Sintassi: HISTORY <nickname> CLEAR
      Esempio: HISTORY UnNick CLEAR
    success:    "\x0303✔\x03 Eliminate \x02%count%\x02 voci di cronologia per \x02%nickname%\x02."

# --- Traduzioni messaggi cronologia (usate quando si visualizza la cronologia) ---
history.message:
  unsuspend:                  "Sospensione revocata"
  password_changed_owner:     "Password cambiata dal proprietario"
  password_changed_operator:  "Password cambiata dall'operatore"
  email_changed_owner:        "Email cambiata da %old_email% a %new_email%"
  email_changed_operator:     "Email cambiata in %new_email% dall'operatore"
  recover:                    "Password reimpostata tramite token email"

# --- Traduzioni campi extra cronologia ---
history.extra:
  duration:      "Durata: %value%"
  expires_at:    "Scade: %value%"
  old_email:     "Vecchia email: %value%"
  new_email:     "Nuova email: %value%"
  method:        "Metodo: %value%"
  ip:            "IP: %value%"
  host:          "Host: %value%"

# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <nickname> {ON|OFF}"
  short:            "Imposta o rimuove la protezione dalla scadenza per un nickname."
  help:             |
    Controlla se un nickname scadrà per inattività.
    Quando ON, il nickname non scade mai indipendentemente dall'ultima attività.
    Quando OFF, si applicano le normali regole di scadenza.

    Solo gli IRCops con il permesso 'nickserv.noexpire' possono usare questo comando.

    Sintassi: NOEXPIRE <nickname> {ON|OFF}
    Esempi:
      NOEXPIRE UtenteImportante ON
      NOEXPIRE UtenteImportante OFF
  success_on:       "\x0303✔\x03 Il nickname \x02%nickname%\x02 è ora protetto dalla scadenza."
  success_off:      "\x0303✔\x03 Il nickname \x02%nickname%\x02 ora scadrà normalmente."
  not_registered:   "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è registrato."
  forbidden:         "\x0304✗\x03 Il nickname \x02%nickname%\x02 è vietato."
  suspended:         "\x0304✗\x03 Il nickname \x02%nickname%\x02 è sospeso."

