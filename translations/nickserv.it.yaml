# NickServ translations — Italiano
# Domain: nickserv
#
# Codici di formattazione IRC (in stringhe con virgolette, usare escape esadecimali \x##):
#   \x02        bold on/off
#   \x03NN      colore (DECIMALE: 03=verde, 04=rosso, 07=arancione, 14=grigio scuro)
#   \x03        azzera colore
#   \x0F        azzera tutta la formattazione
#
# NOTA: I colori IRC usano numeri DECIMALI (0-15), non esadecimali.
#   \x0314 = grigio scuro (14 decimale)  ← CORRETTO
#   \x030F = colore 0 + lettera "F"      ← ERRATO (0F è esadecimale, non decimale)

unknown_command: "\x0304✗\x03 Comando sconosciuto \x02%command%\x02. Usi \x0303/msg %bot% HELP\x03."

error:
  syntax:            "\x0304✗\x03 Sintassi errata. Uso: \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Questo comando è riservato agli IRC Operator."
  not_identified:    "\x0304✗\x03 Non è identificato. Usi \x0303/msg %bot% IDENTIFY <nickname> <password>\x03"
  permission_denied: "\x0304✗\x03 Permesso negato. Non ha accesso a questo comando."
  mail_failed:       "\x0304✗\x03 Impossibile inviare l'email. Verifichi l'indirizzo o riprovi più tardi."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <password> <email>"
  short:            "Registra il suo nickname con i servizi."
  help:             "Avvia la registrazione del suo nickname attuale. Un token di verifica\nsarà inviato all'indirizzo email fornito. Completi la registrazione\neseguendo \x0303/msg %bot% VERIFY <token>\x03. Il token scade in 1 ora.\nSe non arriva, controlli la cartella spam o usi \x0303RESEND\x03."
  pending:          "\x0307→\x03 Un token di verifica è stato inviato a \x02%email%\x02.\n  Esegua \x0303/msg %bot% VERIFY <token>\x03 per completare la registrazione.\n  Non l'ha ricevuto? Controlli lo spam o usi \x0303/msg %bot% RESEND\x03\n  Il token scadrà in \x021 ora\x02."
  already_registered: "\x0304✗\x03 Il nickname \x02%nickname%\x02 è già registrato."
  already_pending:  "\x0304✗\x03 Il nickname \x02%nickname%\x02 ha già una verifica in sospeso.\n  Usi \x0303/msg %bot% VERIFY <token>\x03 o \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 Il nickname \x02%nickname%\x02 non può essere registrato su questa rete."
  invalid_email:    "\x0304✗\x03 L'indirizzo email fornito non è valido."
  email_already_used: "\x0304✗\x03 L'email \x02%email%\x02 è già in uso da un altro nickname. Usi un indirizzo diverso."
  throttled:          "\x0304✗\x03 Deve attendere \x02%minutes%\x02 minuto/i prima di provare a registrarsi di nuovo."
  guest_prefix_forbidden: "\x0304✗\x03 Non può registrare un nick che inizia con \x02%prefix%\x02."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "Conferma il suo indirizzo email e attiva il suo nickname."
  help:             "Completa la registrazione verificando il token inviato alla sua email.\nIl token è valido per 1 ora dal momento della registrazione."
  success:          "\x0303✔\x03 Il nickname \x02%nickname%\x02 è stato registrato con successo e ora è identificato."
  invalid_token:    "\x0304✗\x03 Il token non è valido o è scaduto. Usi \x0303/msg %bot% REGISTER\x03 per ricominciare."
  no_pending:       "\x0304✗\x03 Non ha nessuna registrazione in sospeso da verificare."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Reinvia il token di verifica alla sua email."
  help:             "Reinvia il token di verifica all'indirizzo email fornito durante\nla registrazione. Funziona solo se ha una registrazione in sospeso."
  success:          "\x0307→\x03 Token di verifica reinviato a \x02%email%\x02."
  no_pending:       "\x0304✗\x03 Non ha nessuna registrazione in sospeso per cui reinviare un token."
  throttled:        "\x0304✗\x03 Deve attendere \x02%minutes%\x02 minuto/i prima di richiedere un'altra email di verifica."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <nickname> [token]"
  short:            "Recuperi il suo nickname se ha perso la password."
  help:             "Recupera l'accesso a un nickname registrato quando ha perso la password.\n1) \x0303RECOVER <nickname>\x03 — un token viene inviato all'email del nickname.\n2) \x0303RECOVER <nickname> <token>\x03 — inserisca il token dall'email per reimpostare la password.\nRiceverà quindi una password temporanea e il comando per cambiarla."
  email_sent:       "\x0307→\x03 Un token di recupero è stato inviato a \x02%email_hint%\x02. Controlli la posta in arrivo (e la cartella spam)."
  not_registered:   "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è registrato."
  pending:          "\x0304✗\x03 Il nickname \x02%nickname%\x02 è in attesa di verifica email."
  suspended:        "\x0304✗\x03 Il nickname \x02%nickname%\x02 è sospeso. Motivo: %reason%"
  forbidden:        "\x0304✗\x03 Il nickname \x02%nickname%\x02 non può essere usato su questa rete."
  no_email:         "\x0304✗\x03 Nessuna email impostata per il nickname \x02%nickname%\x02. Il recupero non è disponibile."
  throttled:        "\x0304✗\x03 Deve attendere \x02%minutes%\x02 minuto/i prima di richiedere un'altra email di recupero."
  invalid_token:    "\x0304✗\x03 Il token non è valido o è scaduto. Ne richieda uno nuovo con \x0303RECOVER %nickname%\x03."
  success_identify: "\x0303✔\x03 Password reimpostata. Si identifichi ora: \x0303%identify_cmd%\x03"
  success_then_change: "Poi cambi la sua password: \x0303/msg %bot% SET PASSWORD <nuova_password>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <nickname> <password>"
  short:            "Si identifichi come proprietario di un nickname."
  help:             "Autentica la sua sessione con %nickserv% usando nickname e password.\nDopo un'identificazione riuscita riceverà la modalità registrata \x02+r\x02\ne, se stava usando un nick ospite, il suo nick registrato sarà ripristinato."
  success:          "\x0303✔\x03 Ora è identificato come \x02%nickname%\x02."
  already_identified: "\x0307ℹ\x03 È già identificato come \x02%nickname%\x02."
  not_registered:   "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è registrato."
  invalid_credentials: "\x0304✗\x03 Password errata. Riprovi."
  locked_out:         "\x0304✗\x03 Troppi tentativi falliti. Riprovi tra \x02%minutes%\x02 minuto/i."
  ghost_released:   "\x0307⚡\x03 La sessione fantasma che occupava \x02%nickname%\x02 è stata disconnessa."
  kill_reason:      "Nick %nickname% reclamato da %source% (il proprietario registrato si è identificato)"
  pending:          "\x0304✗\x03 Il nickname \x02%nickname%\x02 è in attesa di verifica email.\n  Esegua \x0303/msg %bot% VERIFY <token>\x03 o \x0303/msg %bot% RESEND\x03."
  suspended:        "\x0304✗\x03 Il nickname \x02%nickname%\x02 è sospeso. Motivo: %reason%"
  forbidden:        "\x0304✗\x03 Il nickname \x02%nickname%\x02 non può essere usato su questa rete."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <nickname>"
  short:            "Mostra lo stato di registrazione di un nickname."
  help:             "Mostra lo stato attuale di un nickname: registrato, in attesa di verifica,\nsospeso o vietato."
  header:           "\x02Stato del nick \x0307%nickname%\x03:\x02"
  unregistered:     "  Stato           : Non registrato"
  not_registered_offline: "  Stato           : \x0315Non registrato\x03"
  pending:          "  Stato           : \x0307In attesa di verifica\x03"
  pending_expires:  "  Scade tra       : %minutes% minuto/i"
  pending_expires_at: "  Scade il       : %date%"
  not_connected:    "  Stato           : \x0315Non connesso\x03"
  not_identified:   "  Stato           : \x0307Non identificato\x03"
  identified:       "  Stato           : \x0303Identificato\x03"
  suspended:        "  Stato           : \x0304Sospeso\x03"
  suspended_reason: "  Motivo          : %reason%"
  suspended_until:  "  Termina il      : %date%"
  suspended_permanent: "  Termina il      : Permanente"
  forbidden:        "  Stato           : \x0304Vietato\x03"
  forbidden_reason: "  Motivo          : %reason%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <nickname>"
  short:            "Mostra le informazioni su un nickname registrato."
  help:             "Mostra i dettagli di registrazione di un nickname: data di registrazione,\nstato della connessione, ultimo messaggio di quit e indirizzo email.\nL'email è visibile solo al proprietario quando è identificato.\nCon PRIVATE ON solo il proprietario e gli IRC Operator possono vedere le informazioni."
  not_registered:   "\x0304✗\x03 Il nickname \x02%nickname%\x02 non è registrato."
  private:          "\x0304✗\x03 Le informazioni del nickname \x02%nickname%\x02 sono private."
  header:           "\x02Informazioni per il nickname \x0307%nickname%\x03:\x02"
  status:           "  \x0314Stato\x03               : %status%"
  status_registered:  "\x0303Registrato\x03"
  status_suspended:   "\x0304Sospeso\x03"
  status_forbidden:   "\x0304Vietato\x03"
  reason:           "  \x0314Motivo\x03              : %reason%"
  suspended_until:  "  \x0314Termina il\x03          : %date%"
  suspended_permanent: "  \x0314Termina il\x03          : Permanente"
  registered_at:    "  \x0314Registrato\x03          : %date%"
  last_seen_online: "  \x0314Ultimo accesso\x03      : \x0303● ONLINE ORA\x03"
  last_seen_at:     "  \x0314Ultimo accesso\x03      : %date%"
  last_seen_never:  "  \x0314Ultimo accesso\x03      : Mai"
  last_quit:        "  \x0314Ultimo quit\x03         : %message%"
  last_connect:     "  \x0314Ultima connessione\x03  : %ip% (%host%)"
  language:         "  \x0314Lingua\x03              : %language%"
  email:            "  \x0314Email\x03               : %email%"
  vhost:            "  \x0314VHost\x03               : %vhost%"
  no_expire:        "  \x0314Mai in scadenza\x03     : Sì"
  footer:           "\x0314─────────────────────────────\x03"
  channels_header:  "\x0314\x0ACanali con accesso:\x03"
  channels_entry_founder:   "  %channel% (\x0303Fondatore\x03)"
  channels_entry_successor: "  %channel% (\x0303Successore\x03)"
  channels_entry_access:    "  %channel% (%level%)"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <opzione> <valore>"
  short:            "Modifica le impostazioni del suo nickname %nickserv%."
  help:             "Modifica le impostazioni del suo nickname %nickserv%.\nDeve essere identificato per usare questo comando."
  unknown_option:   "\x0304✗\x03 Opzione sconosciuta \x02%option%\x02. Opzioni disponibili: %options%."

  password:
    syntax:         "SET PASSWORD <nuova_password>"
    short:          "Cambia la password del suo nickname."
    help:           "Cambia la password per il suo nickname NickServ. La nuova password ha\neffetto immediato. Scelga una password sicura di almeno 6 caratteri\nche non usi su altri servizi."
    success:        "\x0303✔\x03 La sua password è stata aggiornata con successo."

  email:
    syntax:         "SET EMAIL <nuova_email> [token]"
    short:          "Cambia l'indirizzo email collegato al suo nickname (conferma in due passaggi)."
    help:           "Cambio email in due passaggi per sicurezza.\n1) \x0303SET EMAIL <nuova_email>\x03 — un token viene inviato alla sua email attuale.\n2) \x0303SET EMAIL <nuova_email> <token>\x03 — confermi con il token ricevuto.\nIl token scade in 1 ora."
    success:        "\x0303✔\x03 La sua email è stata aggiornata a \x02%email%\x02."
    pending_sent:   "\x0307→\x03 Un token di conferma è stato inviato a \x02%current_email%\x02.\n  Per confermare il cambio a \x02%new_email%\x02 esegua:\n  \x0303/msg %bot% SET EMAIL %new_email% <token>\x03\n  Il token scade in 1 ora."
    invalid_token:  "\x0304✗\x03 Il token non è valido o è scaduto. Ne richieda uno nuovo con \x0303SET EMAIL <nuova_email>\x03."

  language:
    syntax:         "SET LANGUAGE <codice>"
    short:          "Cambia la lingua usata dai servizi per comunicare con lei."
    help:           "Cambia la lingua che %nickserv% e gli altri servizi usano per comunicare con lei.\nLingue disponibili:\n  \x02ca\x02 (Catalano)\n  \x02de\x02 (Tedesco)\n  \x02el\x02 (Greco)\n  \x02en\x02 (Inglese)\n  \x02es\x02 (Spagnolo)\n  \x02eu\x02 (Basco)\n  \x02fr\x02 (Francese)\n  \x02gl\x02 (Galiziano)\n  \x02it\x02 (Italiano)\n  \x02nl\x02 (Olandese)\n  \x02pl\x02 (Polacco)\n  \x02pt\x02 (Portoghese)\n  \x02ro\x02 (Rumeno)\n  \x02tr\x02 (Turco)"
    success:        "\x0303✔\x03 Lingua cambiata in \x02%language%\x02."
    invalid:        "\x0304✗\x03 Lingua non supportata. Lingue disponibili: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <fuso_orario>"
    short:          "Imposta il fuso orario usato per visualizzare le date."
    help:           "Imposta il fuso orario usato quando %nickserv% mostra le date.\nUsi \x02HELP SET TIMEZONE\x02 per l'indice delle regioni; \x02HELP SET TIMEZONE <regione>\x02 (es. Europe) per i fusi di quella regione. Usi \x02OFF\x02 per azzerare."
    success:        "\x0303✔\x03 Fuso orario impostato su \x02%timezone%\x02. Le date saranno mostrate in questo fuso."
    cleared:        "\x0303✔\x03 Fuso orario azzerato. Le date useranno il predefinito di rete."
    invalid:        "\x0304✗\x03 Fuso orario non valido \x02%timezone%\x02. Usi un identificatore valido (es. UTC, Europe/Rome)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Abilita o disabilita la privacy per le informazioni del suo nickname."
    help:           "Controlla la visibilità delle informazioni del suo nickname nel comando INFO.\nCon \x02PRIVATE ON\x02 solo lei e gli IRC Operator possono vedere i suoi dettagli.\nCon \x02PRIVATE OFF\x02 le sue informazioni sono pubbliche per tutti."
    on:             "\x0303✔\x03 Le informazioni del suo nickname ora sono \x02private\x02."
    off:            "\x0303✔\x03 Le informazioni del suo nickname ora sono \x02pubbliche\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Usa PRIVMSG (ON) o NOTICE (OFF) per le risposte dei servizi."
    help:           "Controlla come %nickserv% e gli altri servizi le inviano i messaggi.\nCon \x02MSG ON\x02 le risposte sono inviate come \x02PRIVMSG\x02 (alcuni client potrebbero generare risposte o notifiche).\nCon \x02MSG OFF\x02 le risposte sono inviate come \x02NOTICE\x02 (predefinito; tipicamente senza risposta automatica)."
    on:             "\x0303✔\x03 I messaggi dei servizi ora saranno inviati come \x02PRIVMSG\x02."
    off:            "\x0303✔\x03 I messaggi dei servizi ora saranno inviati come \x02NOTICE\x02."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Imposta o azzera il suo host virtuale personalizzato (hostname visualizzato)."
    help:           "Imposta un hostname personalizzato che gli altri vedono quando è identificato.\nUsi \x02SET VHOST OFF\x02 per azzerarlo. Solo lettere (a-z, A-Z), cifre, trattino e punto;\nnessun trattino o punto all'inizio/fine di ogni blocco; max 48 caratteri. Unico per nickname."
    success:        "\x0303✔\x03 Il suo host virtuale è stato impostato su \x02%vhost%\x02."
    cleared:        "\x0303✔\x03 Il suo host virtuale è stato azzerato."
    invalid:        "\x0304✗\x03 Vhost non valido. Solo lettere, cifre, trattino e punto (non all'inizio/fine del blocco); max 48 caratteri."
    taken:          "\x0304✗\x03 Quel vhost è già in uso da un altro nickname."
    forced:         "\x0304✗\x03 Il suo vhost è configurato automaticamente e non può essere modificato con SET VHOST."

