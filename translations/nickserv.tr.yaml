info:
  syntax:           "INFO <nickname>"
  short:            "Kayıtlı bir rumuz hakkında bilgi gösterin."
  help:             "Bir rumuz için kayıt bilgilerini gösterir: kayıt tarihi, bağlantı\ndurumu, son çıkış mesajı ve e-posta adresi. E-posta yalnızca\nkimlik doğrulandığında sahibine görünür. PRIVATE AÇIK olduğunda\nbilgileri yalnızca sahibi ve IRC Operatörleri görebilir."
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 rumuzu kayıtlı değil."
  private:          "\x0304✗\x03 \x02%nickname%\x02 rumuzunun bilgileri gizlidir."
