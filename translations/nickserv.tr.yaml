# --- Nick Protection --------------------------------------------------------
protection:
  nick_in_use:      "\x0304⚠\x03 \x02%nickname%\x02 rumuzu kayıtlıdır. Kimlik doğrulamazsanız adınız değiştirilecektir."
  renamed_to:       "\x0307→\x03 Rumuzunuz \x02%guest_nick%\x02 olarak değiştirildi. Rumuzunuzu kurtarmak için:\n\x0303/msg %bot% IDENTIFY %nickname% <şifre>\x03"
  nick_forbidden:   "\x0304✗\x03 \x02%nickname%\x02 rumuzu yasaklanmıştır: %reason%"

# --- IRCop Commands ---------------------------------------------------------
userip:
  syntax:           "USERIP <nickname>"
  short:            "Rumuzun gerçek IP adresini ve host adını öğrenin."
  help:             |
    Belirtilen rumuzun gerçek IP adresini ve hostname'ini gösterir.
    Yalnızca 'nickserv.userip' iznine sahip IRCop'lere açıktır.

    Bu komut hassas rumuz bilgilerini gösterir.
    Sorumlu bir şekilde kullanın.

    Sözdizimi: USERIP <nickname>
    Örnek: USERIP BaziKullanici
  not_online:       "\x0304✗\x03 \x02%nickname%\x02 rumuzu bağlı değil."
  result:           "\x0307ℹ\x03 Rumuz: \x02%nickname%\x02 | IP: \x0307%ip%\x03 | Host: \x0307%host%\x03"

permissions:
