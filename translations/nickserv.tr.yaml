# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <seçenek> <değer>"
  short:            "%nickserv% rumuz ayarlarınızı değiştirin."
  help:             "%nickserv% rumuz ayarlarınızı değiştirir.\nBu komutu kullanmak için kimliğiniz doğrulanmış olmalıdır."
  unknown_option:   "\x0304✗\x03 Bilinmeyen seçenek \x02%option%\x02. Kullanılabilir seçenekler: %options%."

  password:
    syntax:         "SET PASSWORD <yeni_şifre>"
    short:          "Rumuz şifrenizi değiştirin."
    help:           "NickServ rumuzunuzun şifresini değiştirir. Yeni şifre hemen geçerli olur.\nEn az 6 karakterden oluşan, başka hizmetlerde kullanmadığınız\ngüçlü bir şifre seçin."
    success:        "\x0303✔\x03 Şifreniz başarıyla güncellendi."

  email:
    syntax:         "SET EMAIL <yeni_e-posta> [token]"
    short:          "Rumuzunuza bağlı e-posta adresini değiştirin (iki aşamalı onay)."
    help:           "Güvenlik için iki aşamada e-posta değişikliği.\n1) \x0303SET EMAIL <yeni_e-posta>\x03 — mevcut e-postanıza bir token gönderilir.\n2) \x0303SET EMAIL <yeni_e-posta> <token>\x03 — alınan token ile onaylayın.\nToken 1 saat içinde sona erer."
    success:        "\x0303✔\x03 E-postanız \x02%email%\x02 olarak güncellendi."
    pending_sent:   "\x0307→\x03 \x02%current_email%\x02 adresine bir onay tokenı gönderildi.\n  \x02%new_email%\x02 adresine değişikliği onaylamak için çalıştırın:\n  \x0303/msg %bot% SET EMAIL %new_email% <token>\x03\n  Token 1 saat içinde sona erer."
    invalid_token:  "\x0304✗\x03 Token geçersiz veya süresi dolmuş. \x0303SET EMAIL <yeni_e-posta>\x03 ile yeni bir tane isteyin."

  language:
    syntax:         "SET LANGUAGE <kod>"
    short:          "Hizmetlerin sizinle iletişim kurarken kullandığı dili değiştirin."
    help:           "%nickserv% ve diğer hizmetlerin sizinle konuşurken kullandığı dili değiştirir.\nKullanılabilir diller: \x02es\x02 (İspanyolca), \x02en\x02 (İngilizce)."
    success:        "\x0303✔\x03 Dil \x02%language%\x02 olarak değiştirildi."
    invalid:        "\x0304✗\x03 Desteklenmeyen dil. Kullanılabilir diller: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <zaman_dilimi>"
    short:          "Tarihleri görüntülerken kullanılacak zaman dilimini ayarlayın."
    help:           "%nickserv% tarihleri gösterirken kullanılacak zaman dilimini ayarlar.\nBölge dizini için \x02HELP SET TIMEZONE\x02; bölgenin zaman dilimleri için \x02HELP SET TIMEZONE <bölge>\x02 (örn. Europe) kullanın. Temizlemek için \x02OFF\x02 kullanın."
    success:        "\x0303✔\x03 Zaman dilimi \x02%timezone%\x02 olarak ayarlandı. Tarihler bu zaman diliminde gösterilecek."
    cleared:        "\x0303✔\x03 Zaman dilimi temizlendi. Tarihler ağ varsayılanını kullanacak."
    invalid:        "\x0304✗\x03 Geçersiz zaman dilimi \x02%timezone%\x02. Geçerli bir tanımlayıcı kullanın (örn. UTC, Europe/Istanbul)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Rumuz bilgilerinizin gizliliğini etkinleştirin veya devre dışı bırakın."
    help:           "INFO komutunda rumuz bilgilerinizin görünürlüğünü kontrol eder.\n\x02PRIVATE AÇIK\x02 ile bilgilerinizi yalnızca siz ve IRC Operatörleri görebilir.\n\x02PRIVATE KAPALI\x02 ile bilgileriniz herkese açıktır."
    on:             "\x0303✔\x03 Rumuz bilgileriniz artık \x02gizlidir\x02."
    off:            "\x0303✔\x03 Rumuz bilgileriniz artık \x02herkese açıktır\x02."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Hizmet yanıtları için PRIVMSG (AÇIK) veya NOTICE (KAPALI) kullanın."
    help:           "%nickserv% ve diğer hizmetlerin size nasıl mesaj göndereceğini kontrol eder.\n\x02MSG AÇIK\x02 ile yanıtlar \x02PRIVMSG\x02 olarak gönderilir (bazı istemciler otomatik yanıt/uyarı tetikleyebilir).\n\x02MSG KAPALI\x02 ile yanıtlar \x02NOTICE\x02 olarak gönderilir (varsayılan; genellikle otomatik yanıt olmaz)."
    on:             "\x0303✔\x03 Hizmet mesajları artık \x02PRIVMSG\x02 olarak gönderilecek."
    off:            "\x0303✔\x03 Hizmet mesajları artık \x02NOTICE\x02 olarak gönderilecek."

  vhost:
    syntax:         "SET VHOST <vhost>"
    short:          "Özel sanal ana makinenizi (görüntülenen host adı) ayarlayın veya temizleyin."
    help:           "Kimlik doğrulandığınızda başkalarının gördüğü özel bir host adı ayarlar.\nTemizlemek için \x02SET VHOST OFF\x02 kullanın. Yalnızca harfler (a-z, A-Z), rakamlar, tire ve nokta;\nher bloğun başında/sonunda tire veya nokta olmaz; maks 48 karakter. Her rumuz için benzersiz."
    success:        "\x0303✔\x03 Sanal host'unuz \x02%vhost%\x02 olarak ayarlandı."
    cleared:        "\x0303✔\x03 Sanal host'unuz temizlendi."
    invalid:        "\x0304✗\x03 Geçersiz vhost. Yalnızca harfler, rakamlar, tire ve nokta (blok başında/sonunda olamaz); maks 48 karakter."
    taken:          "\x0304✗\x03 Bu vhost zaten başka bir rumuz tarafından kullanılıyor."
    forced:         "\x0304✗\x03 Vhost'unuz otomatik olarak yapılandırılmıştır ve SET VHOST ile değiştirilemez."

