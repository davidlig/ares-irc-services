  email_changed_operator:     "E-posta operatör tarafından %new_email% olarak değiştirildi"
  recover:                    "Şifre e-posta tokenı ile sıfırlandı"

# --- Geçmiş ekstra alan çevirileri ---
history.extra:
  duration:      "Süre: %value%"
  expires_at:    "Bitiş: %value%"
  old_email:     "Eski e-posta: %value%"
  new_email:     "Yeni e-posta: %value%"
  method:        "Yöntem: %value%"
  ip:            "IP: %value%"
  host:          "Host: %value%"

# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <nickname> {ON|OFF}"
  short:            "Bir rumuz için süre sonu korumasını ayarlayın veya kaldırın."
  help:             |
    Bir rumuzun hareketsizlik nedeniyle süresinin dolup dolmayacağını kontrol eder.
    AÇIK olduğunda, rumuz son etkinlikten bağımsız olarak asla sona ermez.
    KAPALI olduğunda, normal süre sonu kuralları uygulanır.

    Bu komutu yalnızca 'nickserv.noexpire' iznine sahip IRCop'ler kullanabilir.

    Sözdizimi: NOEXPIRE <nickname> {ON|OFF}
    Örnekler:
      NOEXPIRE OnemliKullanici ON
      NOEXPIRE OnemliKullanici OFF
  success_on:       "\x0303✔\x03 \x02%nickname%\x02 rumuzu artık süre sonuna karşı korunuyor."
  success_off:      "\x0303✔\x03 \x02%nickname%\x02 rumuzu artık normal şekilde sona erecek."
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 rumuzu kayıtlı değil."
  forbidden:         "\x0304✗\x03 \x02%nickname%\x02 rumuzu yasaklanmış."
  suspended:         "\x0304✗\x03 \x02%nickname%\x02 rumuzu askıya alınmış."

