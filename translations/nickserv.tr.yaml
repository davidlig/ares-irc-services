  nickserv.rename: "Bağlı bir rumuzu rastgele bir rumuza zorla değiştirin (RENAME)"
  nickserv.drop: "Kayıtlı bir rumuzu bırakın (DROP)"
  nickserv.forbid: "Bir rumuzu yasaklayın veya yasağı kaldırın (FORBID/UNFORBID)"
  nickserv.forbidvhost: "Vhost kalıplarını yasaklayın veya izin verin (FORBIDVHOST)"
  nickserv.saset: "Başka bir rumuzun ayarlarını değiştirin (SASET)"
  nickserv.noexpire: "Bir rumuz için süre sonu korumasını ayarlayın veya kaldırın (NOEXPIRE)"
  nickserv.history: "Rumuz eylem geçmişini görüntüleyin ve yönetin (HISTORY)"

# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <nickname> <süre> <sebep>"
  short:            "Bir rumuzu askıya alın."
  help:             |
    Bir rumuzu askıya alarak sahibinin kimlik doğrulamasını engeller.
    Askıya alma geçici veya kalıcı olabilir.

    Süre formatları: \x0303%d\x03 (gün), \x0303%h\x03 (saat), \x0303%m\x03 (dakika), veya \x03030\x03 (kalıcı).

    Askıya alınan kullanıcılar rumuzlarına kimlik doğrulayamaz.
    IRC operatörleri ve root kullanıcılar askıya alınamaz.

    Sözdizimi: SUSPEND <nickname> <süre> <sebep>
    Örnekler:
      SUSPEND KtUye 7g #help kanalında spam
      SUSPEND Suistlm 30g Tekrarlanan flood
      SUSPEND Sorunlu 0 Permaban kaçakçılığı
  success:            "\x0303✔\x03 \x02%nickname%\x02 rumuzu \x02%duration%\x02 tarihine kadar askıya alındı."
  already_suspended:  "\x0304✗\x03 \x02%nickname%\x02 rumuzu zaten askıya alınmış."
  not_registered:     "\x0304✗\x03 \x02%nickname%\x02 rumuzu kayıtlı değil."
  forbidden:          "\x0304✗\x03 \x02%nickname%\x02 rumuzu yasaklanmış ve askıya alınamaz."
  cannot_suspend_oper: "\x0304✗\x03 IRC operatörü \x02%nickname%\x02 askıya alınamaz."
  cannot_suspend_root: "\x0304✗\x03 Root kullanıcı \x02%nickname%\x02 askıya alınamaz."
  cannot_suspend_service: "\x0304✗\x03 Hizmet rumuzu \x02%nickname%\x02 askıya alınamaz."
  invalid_duration:   "\x0304✗\x03 Geçersiz süre. Kullanın: \x0303<g><s><d>\x03 (örn. 7g, 12s, 30d) veya kalıcı için \x03030\x03."
  permanent:          "kalıcı"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <nickname>"
  short:            "Bir rumuzun askısını kaldırın."
  help:             |
    Bir rumuzun aktif askısını kaldırarak sahibinin tekrar kimlik doğrulayabilmesini sağlar.

    Sözdizimi: UNSUSPEND <nickname>
    Örnek: UNSUSPEND BaziKullanici
  success:          "\x0303✔\x03 \x02%nickname%\x02 adlı kullanıcının askısı kaldırıldı."
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 rumuzu kayıtlı değil."
  not_suspended:    "\x0304✗\x03 \x02%nickname%\x02 rumuzu askıya alınmamış."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <nickname>"
  short:            "Bağlı bir rumuzu rastgele bir rumuza zorla değiştirin."
  help:             |
    Bağlı bir rumuzu rastgele oluşturulmuş bir rumuza değiştirmeye zorlar.
    Kullanıcıyı bağlantıdan atmadan ağ politikalarını uygulamak için kullanışlıdır.

    Yeni rumuz formatı yapılandırılmış misafir önekinde (%prefix%) oluşturulur.

    Bu komut IRCop izni gerektirir: nickserv.rename

    Sözdizimi: RENAME <nickname>
    Örnek: RENAME SorunluKisi
  not_online:        "\x0304✗\x03 \x02%nickname%\x02 rumuzu bağlı değil."
  cannot_rename_root: "\x0304✗\x03 Root kullanıcı \x02%nickname%\x02 yeniden adlandırılamaz."
  cannot_rename_oper: "\x0304✗\x03 IRC operatörü \x02%nickname%\x02 yeniden adlandırılamaz."
  cannot_rename_service: "\x0304✗\x03 Hizmet rumuzu \x02%nickname%\x02 yeniden adlandırılamaz."
  success:           "\x0303✓\x03 \x02%nickname%\x02 rumuzu \x02%new_nick%\x02 olarak değiştirildi."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <nickname>"
  short:            "Kayıtlı bir rumuzu bırakın."
  help:             |
    Veritabanından kayıtlı bir rumuzu bırakır.
    Bu eylem geri alınamaz.

    Kullanıcı çevrimiçiyse, Guest- rumuzuna yeniden adlandırılacaktır.
    Root kullanıcılar ve IRC operatörleri bırakılamaz.
    Kendi rumuzunuzu bırakamazsınız.

    Bu komut IRCop izni gerektirir: nickserv.drop

    Sözdizimi: DROP <nickname>
    Örnek: DROP EskiHesap
  not_registered:     "\x0304✗\x03 \x02%nickname%\x02 rumuzu kayıtlı değil."
  suspended:         "\x0304✗\x03 \x02%nickname%\x02 rumuzu askıya alınmış. Önce askıyı kaldırın."
  forbidden:         "\x0304✗\x03 \x02%nickname%\x02 rumuzu yasaklanmış."
  cannot_drop_root:   "\x0304✗\x03 Root kullanıcı \x02%nickname%\x02 bırakılamaz."
  cannot_drop_oper:   "\x0304✗\x03 IRC operatörü \x02%nickname%\x02 bırakılamaz."
  cannot_drop_self:    "\x0304✗\x03 Kendi rumuzunuzu bırakamazsınız."
  success:            "\x0303✓\x03 \x02%nickname%\x02 rumuzu bırakıldı."
  cannot_drop_service: "\x0304✗\x03 Hizmet rumuzu \x02%nickname%\x02 bırakılamaz."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <nickname> <sebep>"
  short:            "Bir rumuzu kalıcı olarak kullanımdan engelleyin."
  help:             |
    Bir rumuzun ağda kullanılmasını yasaklar.
    Rumuz hiç kimse tarafından kaydedilemez veya kullanılamaz.

    Rumuz şu anda kayıtlıysa, önce bırakılacaktır.
    Birisi kullanıyorsa, Guest- rumuzuna değiştirilmeye zorlanacaktır.

    Root kullanıcılar, IRC operatörleri ve hizmet rumuzları yasaklanamaz.

    Bu komut IRCop izni gerektirir: nickserv.forbid

    Sözdizimi: FORBID <nickname> <sebep>
    Örnek: FORBID KtRumuz Tekrarlanan politika ihlalleri
  success:            "\x0303✔\x03 \x02%nickname%\x02 rumuzu yasaklandı."
  updated:            "\x0303✔\x03 \x02%nickname%\x02 için yasaklama sebebi güncellendi."
  reason_required:    "\x0304✗\x03 Yasaklama için bir sebep belirtmelisiniz."
  cannot_forbid_root:  "\x0304✗\x03 Root kullanıcı \x02%nickname%\x02 yasaklanamaz."
  cannot_forbid_oper:  "\x0304✗\x03 IRC operatörü \x02%nickname%\x02 yasaklanamaz."
  cannot_forbid_service: "\x0304✗\x03 Hizmet rumuzu \x02%nickname%\x02 yasaklanamaz."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <nickname>"
  short:            "Bir rumuz yasağını kaldırın."
  help:             |
    Bir rumuz yasağını kaldırarak rumuzun tekrar kullanılabilmesini sağlar.

    Bu komut IRCop izni gerektirir: nickserv.forbid

    Sözdizimi: UNFORBID <nickname>
    Örnek: UNFORBID BaziRumuz
  success:          "\x0303✔\x03 \x02%nickname%\x02 rumuzu artık yasaklı değil."
  not_forbidden:    "\x0304✗\x03 \x02%nickname%\x02 rumuzu yasaklı değil."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST ADD|DEL|LIST [kalıp]"
  short:            "Yasaklı vhost kalıplarını yönetin."
  help:             |
    Kullanıcıların NickServ SET VHOST ile eşleşen vhost'ları
    ayarlamalarını engelleyen kalıpları yönetir.

    Jokerler: * herhangi bir diziyi eşler, ? tek karakteri eşler.
    Örnek: *.korsan.com, .korsan.com ile biten tüm vhost'ları engeller.

    Bu komut IRCop izni gerektirir: nickserv.forbidvhost

    Alt komutlar:
      ADD <kalıp>    Yasaklı bir kalıp ekleyin
      DEL <kalıp>    Yasaklı bir kalıbı kaldırın
      LIST             Tüm yasaklı kalıpları gösterin

  unknown_sub: "\x0304✗\x03 Bilinmeyen alt komut \x02%sub%\x02. ADD, DEL veya LIST kullanın."

  add:
    syntax:      "FORBIDVHOST ADD <kalıp>"
    short:       "Yasaklı bir vhost kalıbı ekleyin."
    help:        |
      Yasaklı vhost listesine bir kalıp ekler. Kullanıcılar
      SET VHOST ile bu kalıpla eşleşen vhost'ları ayarlayamaz.

      Jokerler: * herhangi bir diziyi eşler, ? tek karakteri eşler.

      Sözdizimi: FORBIDVHOST ADD <kalıp>
      Örnek: FORBIDVHOST ADD *.korsan.com
    done:            "\x0303✓\x03 Yasaklı vhost kalıbı eklendi: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 \x02%pattern%\x02 kalıbı zaten mevcut."
    invalid:          "\x0304✗\x03 Geçersiz vhost kalıbı formatı."

  del:
    syntax:      "FORBIDVHOST DEL <kalıp>"
    short:       "Yasaklı bir vhost kalıbını kaldırın."
    help:        |
      Yasaklı vhost listesinden bir kalıbı kaldırır.

      Sözdizimi: FORBIDVHOST DEL <kalıp>
      Örnek: FORBIDVHOST DEL *.korsan.com
    done:        "\x0303✓\x03 Yasaklı vhost kalıbı kaldırıldı: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 \x02%pattern%\x02 kalıbı bulunamadı."

  list:
    short:       "Tüm yasaklı vhost kalıplarını listeleyin."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Tüm yasaklı vhost kalıplarını gösterir.

      Sözdizimi: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Yasaklı vhost kalıpları (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — ekleyen: %nickname% (%date%)"
    empty:       "\x0307ℹ\x03 Yasaklı vhost kalıbı yok."
    unknown_creator: "bilinmiyor"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <nickname> {ADD|DEL|VIEW|CLEAR}"
  short:            "Rumuz eylem geçmişini görüntüleyin veya yönetin."
  help:             |
    Bir rumuzun eylem geçmişini yönetin.
    Bu komutu yalnızca 'nickserv.history' iznine sahip IRCop'ler kullanabilir.

    Otomatik olarak kaydedilen eylemler:
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Sözdizimi: HISTORY <nickname> ADD <mesaj>
            HISTORY <nickname> DEL <id>
            HISTORY <nickname> VIEW [SAYFA|ALL]
            HISTORY <nickname> CLEAR

    Örnekler:
      HISTORY BaziRumuz VIEW
      HISTORY BaziRumuz ADD Bu kullanıcı hakkında manuel not
      HISTORY BaziRumuz VIEW 2
      HISTORY BaziRumuz VIEW ALL
      HISTORY BaziRumuz DEL 123
      HISTORY BaziRumuz CLEAR

    Geçmişi görmek için VIEW kullanın (varsayılan 3 giriş).
    Sonraki sayfayı görmek için VIEW SAYFA 2 kullanın.
    Tam geçmişi görmek için VIEW ALL kullanın.
    Manuel giriş eklemek için ADD kullanın.
    Belirli bir girişi ID ile silmek için DEL kullanın.
    Tüm geçmiş girişlerini silmek için CLEAR kullanın.
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 rumuzu kayıtlı değil."
  unknown_operator: "(bilinmiyor)"

  add:
    syntax:     "HISTORY <nickname> ADD <mesaj>"
    short:      "Manuel bir geçmiş girişi ekleyin."
    help:        |
      Rumuzun geçmişine manuel bir giriş ekler.

      Sözdizimi: HISTORY <nickname> ADD <mesaj>
      Örnek: HISTORY BaziRumuz ADD Kullanıcı spam için raporlandı
    success:    "\x0303✔\x03 \x02%nickname%\x02 için geçmiş girişi eklendi."

  del:
    syntax:     "HISTORY <nickname> DEL <id>"
    short:      "ID ile bir geçmiş girişini silin."
    help:        |
      Belirli bir geçmiş girişini ID'sine göre siler.

      Sözdizimi: HISTORY <nickname> DEL <id>
      Örnek: HISTORY BaziRumuz DEL 42
    success:    "\x0303✔\x03 Geçmiş girişi \x02%id%\x02 silindi."
    not_found:  "\x0304✗\x03 Geçmiş girişi \x02%id%\x02 bulunamadı."
    invalid_id: "\x0304✗\x03 Geçersiz giriş ID'si: \x02%id%\x02."

  view:
    syntax:     "HISTORY <nickname> VIEW [SAYFA|ALL]"
    short:      "Rumuz eylem geçmişini görüntüleyin."
    help:        |
      Rumuzun eylem geçmişini gösterir.

      Sözdizimi: HISTORY <nickname> VIEW
              HISTORY <nickname> VIEW SAYFA
              HISTORY <nickname> VIEW ALL

      Varsayılan olarak her defasında 3 giriş gösterir.
      İkinci sayfayı görmek için VIEW 2 kullanın.
      Tam geçmişi görmek için VIEW ALL kullanın.
    header:     "\x02\x0307%nickname%\x03\x02 için geçmiş (%start%-%end% / %total% gösteriliyor):"
    entry:       "#%id% [%date%] \x0303%action%\x03 - %operator% tarafından — %message%"
    extra:       "  Ekstra \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 \x02%nickname%\x02 için geçmiş girişi bulunamadı."
    page_hint:   "Daha fazla giriş için \x0303HISTORY %nickname% VIEW %next_page%\x03 kullanın."

  clear:
    syntax:     "HISTORY <nickname> CLEAR"
    short:      "Bir rumuz için tüm geçmiş girişlerini silin."
    help:        |
      Belirtilen rumuz için tüm geçmiş girişlerini kaldırır.
      Bu eylem geri alınamaz.

      Sözdizimi: HISTORY <nickname> CLEAR
      Örnek: HISTORY BaziRumuz CLEAR
    success:    "\x0303✔\x03 \x02%nickname%\x02 için \x02%count%\x02 geçmiş girişi temizlendi."

# --- Geçmiş mesaj çevirileri (geçmiş görüntülenirken kullanılır) ---
history.message:
  unsuspend:                  "Askı kaldırıldı"
  password_changed_owner:     "Şifre sahibi tarafından değiştirildi"
  password_changed_operator:  "Şifre operatör tarafından değiştirildi"
