  pending_expires:  "  Sona erme        : %minutes% dakika"
  pending_expires_at: "  Sona erme tarihi : %date%"
  not_connected:    "  Durum           : \x0315Bağlı değil\x03"
  not_identified:   "  Durum           : \x0307Kimlik doğrulanmamış\x03"
  identified:       "  Durum           : \x0303Kimlik doğrulandı\x03"
