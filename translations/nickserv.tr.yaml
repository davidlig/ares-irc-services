# NickServ translations — Turkish
# Domain: nickserv
#
# IRC formatting codes (inside double-quoted strings, use \x## hex escapes):
#   \x02        bold on/off
#   \x03NN      color (DECIMAL: 03=green, 04=red, 07=orange, 14=dark grey)
#   \x03        reset color
#   \x0F        reset all formatting
#
# NOTE: IRC colors use DECIMAL numbers (0-15), not hexadecimal.
#   \x0314 = dark grey (14 decimal)  ← CORRECT
#   \x030F = color 0 + letter "F"    ← WRONG (0F is hex, not decimal)

unknown_command: "\x0304✗\x03 Bilinmeyen komut \x02%command%\x02. \x0303/msg %bot% HELP\x03 kullanın."

error:
  syntax:            "\x0304✗\x03 Hatalı sözdizimi. Kullanım: \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Bu komut yalnızca IRC Operatörleri içindir."
  not_identified:    "\x0304✗\x03 Kimliğiniz doğrulanmamış. \x0303/msg %bot% IDENTIFY <nickname> <password>\x03 kullanın"
  permission_denied: "\x0304✗\x03 Erişim reddedildi. Bu komuta erişim yetkiniz yok."
  mail_failed:       "\x0304✗\x03 E-posta gönderilemedi. Adresinizi kontrol edin veya daha sonra tekrar deneyin."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <şifre> <e-posta>"
  short:            "Rumuzunuzu hizmetlere kaydedin."
  help:             "Mevcut rumuzunuzun kaydını başlatır. Sağlanan e-posta adresine bir doğrulama tokenı\ngönderilecektir. Kaydı \x0303/msg %bot% VERIFY <token>\x03 komutunu çalıştırarak\ntamamlayın. Token 1 saat içinde sona erer.\nGelmezse, spam klasörünüzü kontrol edin veya \x0303RESEND\x03 kullanın."
  pending:          "\x0307→\x03 \x02%email%\x02 adresine bir doğrulama tokenı gönderildi.\n  Kaydı tamamlamak için \x0303/msg %bot% VERIFY <token>\x03 komutunu çalıştırın.\n  Almadınız mı? Spam'i kontrol edin veya \x0303/msg %bot% RESEND\x03 kullanın.\n  Token \x021 saat\x02 içinde sona erecek."
  already_registered: "\x0304✗\x03 \x02%nickname%\x02 rumuzu zaten kayıtlı."
  already_pending:  "\x0304✗\x03 \x02%nickname%\x02 rumuzu için zaten bekleyen bir doğrulama var.\n  \x0303/msg %bot% VERIFY <token>\x03 veya \x0303/msg %bot% RESEND\x03 kullanın."
  forbidden:        "\x0304✗\x03 \x02%nickname%\x02 rumuzu bu ağda kaydedilemez."
  invalid_email:    "\x0304✗\x03 Sağlanan e-posta adresi geçerli değil."
  email_already_used: "\x0304✗\x03 \x02%email%\x02 e-postası zaten başka bir rumuz tarafından kullanılıyor. Farklı bir adres kullanın."
  throttled:          "\x0304✗\x03 Tekrar kayıt olmayı denemeden önce \x02%minutes%\x02 dakika beklemelisiniz."
  guest_prefix_forbidden: "\x0304✗\x03 \x02%prefix%\x02 ile başlayan bir rumuzu kaydedemezsiniz."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <token>"
  short:            "E-posta adresinizi onaylayın ve rumuzunuzu etkinleştirin."
  help:             "E-postanıza gönderilen tokenı doğrulayarak kaydı tamamlar.\nToken, kayıt anından itibaren 1 saat geçerlidir."
  success:          "\x0303✔\x03 \x02%nickname%\x02 rumuzu başarıyla kaydedildi ve artık kimliğiniz doğrulandı."
  invalid_token:    "\x0304✗\x03 Token geçersiz veya süresi dolmuş. Yeniden başlamak için \x0303/msg %bot% REGISTER\x03 kullanın."
  no_pending:       "\x0304✗\x03 Doğrulayacak bekleyen bir kaydınız yok."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Doğrulama tokenını e-postanıza yeniden gönderin."
  help:             "Kayıt sırasında sağlanan e-posta adresine doğrulama tokenını yeniden gönderir.\nYalnızca bekleyen bir kaydınız varsa çalışır."
  success:          "\x0307→\x03 Doğrulama tokenı \x02%email%\x02 adresine yeniden gönderildi."
  no_pending:       "\x0304✗\x03 Token göndermek için bekleyen bir kaydınız yok."
  throttled:        "\x0304✗\x03 Başka bir doğrulama e-postası istemeden önce \x02%minutes%\x02 dakika beklemelisiniz."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <nickname> [token]"
  short:            "Şifrenizi kaybettiyseniz rumuzunuzu kurtarın."
  help:             "Şifrenizi kaybettiğinizde kayıtlı bir rumuza erişimi kurtarır.\n1) \x0303RECOVER <nickname>\x03 — rumuzun e-postasına bir token gönderilir.\n2) \x0303RECOVER <nickname> <token>\x03 — şifrenizi sıfırlamak için e-postadan gelen tokenı girin.\nArdından geçici bir şifre ve değiştirme komutunu alacaksınız."
  email_sent:       "\x0307→\x03 \x02%email_hint%\x02 adresine bir kurtarma tokenı gönderildi. Gelen kutunuzu (ve spam klasörünü) kontrol edin."
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 rumuzu kayıtlı değil."
  pending:          "\x0304✗\x03 \x02%nickname%\x02 rumuzu e-posta doğrulaması bekliyor."
  suspended:        "\x0304✗\x03 \x02%nickname%\x02 rumuzu askıya alınmış. Sebep: %reason%"
  forbidden:        "\x0304✗\x03 \x02%nickname%\x02 rumuzu bu ağda kullanılamaz."
  no_email:         "\x0304✗\x03 \x02%nickname%\x02 rumuzu için e-posta ayarlanmamış. Kurtarma kullanılamaz."
  throttled:        "\x0304✗\x03 Başka bir kurtarma e-postası istemeden önce \x02%minutes%\x02 dakika beklemelisiniz."
  invalid_token:    "\x0304✗\x03 Token geçersiz veya süresi dolmuş. \x0303RECOVER %nickname%\x03 ile yeni bir tane isteyin."
  success_identify: "\x0303✔\x03 Şifre sıfırlandı. Şimdi kimlik doğrulayın: \x0303%identify_cmd%\x03"
  success_then_change: "Ardından şifrenizi değiştirin: \x0303/msg %bot% SET PASSWORD <yeni_şifre>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <nickname> <şifre>"
  short:            "Kendinizi bir rumuzun sahibi olarak tanımlayın."
  help:             "Rumuz ve şifrenizi kullanarak oturumunuzu %nickserv% ile doğrular.\nBaşarılı bir kimlik doğrulamadan sonra \x02+r\x02 kayıtlı modunu alacaksınız\nve, misafir rumuzu kullanıyorsanız, kayıtlı rumuzunuz geri yüklenecektir."
  success:          "\x0303✔\x03 Artık \x02%nickname%\x02 olarak tanımlandınız."
  already_identified: "\x0307ℹ\x03 Zaten \x02%nickname%\x02 olarak tanımlısınız."
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 rumuzu kayıtlı değil."
  invalid_credentials: "\x0304✗\x03 Hatalı şifre. Lütfen tekrar deneyin."
  locked_out:         "\x0304✗\x03 Çok fazla başarısız deneme. \x02%minutes%\x02 dakika sonra tekrar deneyin."
  ghost_released:   "\x0307⚡\x03 \x02%nickname%\x02 adlı rumuzu tutan hayalet oturum bağlantısı kesildi."
  kill_reason:      "%nickname% rumuzu %source% tarafından geri alındı (kayıtlı sahibi kimlik doğruladı)"
  pending:          "\x0304✗\x03 \x02%nickname%\x02 rumuzu e-posta doğrulaması bekliyor.\n  \x0303/msg %bot% VERIFY <token>\x03 veya \x0303/msg %bot% RESEND\x03 komutunu çalıştırın."
  suspended:        "\x0304✗\x03 \x02%nickname%\x02 rumuzu askıya alınmış. Sebep: %reason%"
  forbidden:        "\x0304✗\x03 \x02%nickname%\x02 rumuzu bu ağda kullanılamaz."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <nickname>"
  short:            "Bir rumuzun kayıt durumunu gösterin."
  help:             "Bir rumuzun mevcut durumunu gösterir: kayıtlı, doğrulama bekliyor,\naskıya alınmış veya yasaklanmış."
  header:           "\x02\x0307%nickname%\x03 rumuzunun durumu:\x02"
