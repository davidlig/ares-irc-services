# --- MOTD ----------------------------------------------------------------------
motd:
  short:            "Gestionar els missatges MOTD enviats als usuaris en connectar-se."
  syntax:           "MOTD {ADD|DEL|LIST|CLEAN} [args]"
  help:             "Gestiona les entrades de Message Of The Day que s'envien als usuaris quan es connecten a la xarxa.\n\n"
  unknown_sub:      "\x0304✗\x03 Subordre desconeguda. Utilitzeu: \x02ADD\x02, \x02DEL\x02, \x02LIST\x02, \x02CLEAN\x02"
  add:
    syntax:         "MOTD ADD {service|nick!ident@vhost} {PRIVMSG|NOTICE} <expiry> <message>"
    syntax_hint:    "\x0304✗\x03 Ús: \x02%syntax%\x02"
    short:          "Afegir una entrada MOTD."
