debug:
  action_message:   "%operator% executa l'ordre %command% sobre %target%. %reason%"
  actionWithDuration: "%operator% executa l'ordre %command% sobre %target%. Durada: %duration%. %reason%"
  action_global:    "%operator% executa l'ordre GLOBAL amb el sobrenom %target% via %type% a %count% usuaris. Missatge: %message%"
  prefix_reason:    "Motiu: %reason%"
  prefix_message:   "Missatge: %reason%"

