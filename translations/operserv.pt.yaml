# --- MOTD ----------------------------------------------------------------------
motd:
  short:            "Gerir mensagens MOTD enviadas aos utilizadores ao ligar."
  syntax:           "MOTD \x02{ADD|DEL|LIST|CLEAN}\x02 [args]"
  help:             "Gere entradas Message Of The Day que são enviadas aos utilizadores quando se ligam à rede.\n\n"
  unknown_sub:      "\x0304✗\x03 Subcomando desconhecido. Use: \x02ADD\x02, \x02DEL\x02, \x02LIST\x02, \x02CLEAN\x02"
  add:
    syntax:         "MOTD ADD {serviço|nick!ident@vhost} {PRIVMSG|NOTICE} <expiração> <mensagem>"
    syntax_hint:    "\x0304✗\x03 Uso: \x02%syntax%\x02"
    short:          "Adicionar uma entrada MOTD."
    help:           "Adiciona uma nova mensagem MOTD que será enviada a cada utilizador quando se ligar à rede.\n\n"
    done:           "\x0303✓\x03 Entrada MOTD #%id% adicionada."
    invalid_type:   "\x0304✗\x03 Tipo de mensagem inválido. Deve ser \x02PRIVMSG\x02 ou \x02NOTICE\x02."
    invalid_expiry: "\x0304✗\x03 Formato de expiração inválido. Use: \x02<número><s|m|h|d>\x02 (ex: 30s, 5m, 24h, 7d)."
  del:
    syntax:         "MOTD DEL \x02<id>\x02"
    syntax_hint:    "\x0304✗\x03 Uso: \x02%syntax%\x02"
    short:          "Eliminar uma entrada MOTD."
    help:           "Elimina uma entrada MOTD pelo seu ID.\n\n"
    done:           "\x0303✓\x03 Entrada MOTD #%id% eliminada."
    not_found:      "\x0304✗\x03 Entrada MOTD não encontrada."
  list:
    syntax:         "MOTD LIST"
    short:          "Listar todas as entradas MOTD."
    help:           "Lista todas as entradas MOTD configuradas.\n\n"
    empty:          "Nenhuma entrada MOTD configurada."
    header:         "Entradas MOTD:"
    status_enabled: "\x0303ativada\x03"
    status_disabled: "\x0304desativada\x03"
    expired:        "\x0304expirada\x03"
    no_bot:         "(sem bot)"
    never:          "nunca"
  clean:
