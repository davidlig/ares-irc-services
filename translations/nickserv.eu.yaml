# NickServ itzulpenak — Euskara
# Eremua: nickserv
#
# IRC formatu kodeak (komatxo bikoitzeko kateen barruan, erabili \x## hex ihesak):
#   \x02        lodi aktibatu/desaktibatu
#   \x03NN      kolorea (DEZIMALA: 03=berdea, 04=gorria, 07=laranja, 14=gris iluna)
#   \x03        berrezarri kolorea
#   \x0F        berrezarri formatu guztia
#
# OHARRA: IRC koloreek zenbaki DEZIMALak (0-15) erabiltzen dituzte, ez hamaseitarra.
#   \x0314 = gris iluna (14 dezimalean)  ← ZUZENA
#   \x030F = 0 kolorea + "F" letra       ← OKERRA (0F hex da, ez dezimala)

unknown_command: "\x0304✗\x03 Komando ezezaguna \x02%command%\x02. Erabili \x0303/msg %bot% HELP\x03."

error:
  syntax:            "\x0304✗\x03 Sintaxi okerra. Erabilera: \x02%syntax%\x02"
  oper_only:         "\x0304✗\x03 Komando hau IRC Operadoreentzat mugatuta dago."
  not_identified:    "\x0304✗\x03 Ez zaude identifikatuta. Erabili \x0303/msg %bot% IDENTIFY <ezizena> <pasahitza>\x03"
  permission_denied: "\x0304✗\x03 Baimena ukatuta. Ez duzu komando honetarako sarbiderik."
  mail_failed:       "\x0304✗\x03 Ezin izan da posta elektronikoa bidali. Egiaztatu zure helbidea edo saiatu berriro geroago."

# --- REGISTER ---------------------------------------------------------------
register:
  syntax:           "REGISTER <pasahitza> <posta>"
  short:            "Erregistratu zure ezizena zerbitzuetan."
  help:             "Zure uneko ezizenaren erregistroa hasten du. Egiaztapen token bat\nemandako posta elektronikoko helbidera bidaliko da. Osatu\n\x0303/msg %bot% VERIFY <token>\x03 exekutatuz. Tokena ordubetean iraungitzen da.\nHeldu ez bada, egiaztatu spam karpeta edo erabili \x0303RESEND\x03."
  pending:          "\x0307→\x03 Egiaztapen token bat bidali da \x02%email%\x02 helbidera.\n  Exekutatu \x0303/msg %bot% VERIFY <token>\x03 erregistroa osatzeko.\n  Ez duzu jaso? Egiaztatu spam-a edo erabili \x0303/msg %bot% RESEND\x03\n  Tokena \x021 ordu\x02 barru iraungiko da."
  already_registered: "\x0304✗\x03 \x02%nickname%\x02 ezizena jada erregistratuta dago."
  already_pending:  "\x0304✗\x03 \x02%nickname%\x02 ezizenak jada egiaztapen bat zain du.\n  Erabili \x0303/msg %bot% VERIFY <token>\x03 edo \x0303/msg %bot% RESEND\x03."
  forbidden:        "\x0304✗\x03 \x02%nickname%\x02 ezizena ezin da sare honetan erregistratu."
  invalid_email:    "\x0304✗\x03 Emandako posta elektronikoko helbidea ez da baliozkoa."
  email_already_used: "\x0304✗\x03 \x02%email%\x02 posta jada beste ezizen batek erabiltzen du. Erabili beste helbide bat."
  throttled:          "\x0304✗\x03 \x02%minutes%\x02 minutu itxaron behar duzu berriro erregistratzen saiatu aurretik."
  guest_prefix_forbidden: "\x0304✗\x03 Ezin duzu \x02%prefix%\x02 aurrizkiarekin hasten den ezizenik erregistratu."

# --- VERIFY -----------------------------------------------------------------
verify:
  syntax:           "VERIFY <tokena>"
  short:            "Berretsi zure posta elektronikoko helbidea eta aktibatu zure ezizena."
  help:             "Zure posta elektronikora bidalitako tokena egiaztatuz erregistroa osatzen du.\nTokenak ordubeteko balioa du erregistro momentutik."
  success:          "\x0303✔\x03 \x02%nickname%\x02 ezizena arrakastaz erregistratu da eta orain identifikatuta zaude."
  invalid_token:    "\x0304✗\x03 Tokena baliogabea da edo iraungi da. Erabili \x0303/msg %bot% REGISTER\x03 berriro hasteko."
  no_pending:       "\x0304✗\x03 Ez duzu egiaztatzeko zain dagoen erregistrorik."

# --- RESEND -----------------------------------------------------------------
resend:
  syntax:           "RESEND"
  short:            "Berbidali egiaztapen tokena zure posta elektronikora."
  help:             "Egiaztapen tokena berbidaltzen du erregistroan emandako posta elektroniko\nhelbidera. Erregistroa zain baduzu soilik funtzionatzen du."
  success:          "\x0307→\x03 Egiaztapen tokena \x02%email%\x02 helbidera berbidali da."
  no_pending:       "\x0304✗\x03 Ez duzu tokena berbidaltzeko zain dagoen erregistrorik."
  throttled:        "\x0304✗\x03 \x02%minutes%\x02 minutu itxaron behar duzu beste egiaztapen posta elektroniko bat eskatu aurretik."

# --- RECOVER -----------------------------------------------------------------
recover:
  syntax:           "RECOVER <ezizena> [tokena]"
  short:            "Berreskuratu zure ezizena pasahitza galdu baduzu."
  help:             "Pasahitza galdu duzunean erregistratutako ezizen baten sarbidea berreskuratzen du.\n1) \x0303RECOVER <ezizena>\x03 — token bat bidaltzen da ezizenaren posta elektronikora.\n2) \x0303RECOVER <ezizena> <tokena>\x03 — sartu posta elektronikoko tokena pasahitza berrezartzeko.\nOndoren aldi baterako pasahitz bat eta aldatzeko komandoa jasoko dituzu."
  email_sent:       "\x0307→\x03 Berreskuratze token bat bidali da \x02%email_hint%\x02 helbidera. Egiaztatu sarrera-ontzia (eta spam karpeta)."
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago erregistratuta."
  pending:          "\x0304✗\x03 \x02%nickname%\x02 ezizenak posta elektronikoaren egiaztapena zain du."
  suspended:        "\x0304✗\x03 \x02%nickname%\x02 ezizena etenda dago. Arrazoia: %reason%"
  forbidden:        "\x0304✗\x03 \x02%nickname%\x02 ezizena ezin da sare honetan erabili."
  no_email:         "\x0304✗\x03 Ez dago posta elektronikorik ezarrita \x02%nickname%\x02 ezizenarentzat. Berreskurapena ez dago erabilgarri."
  throttled:        "\x0304✗\x03 \x02%minutes%\x02 minutu itxaron behar duzu beste berreskuratze posta elektroniko bat eskatu aurretik."
  invalid_token:    "\x0304✗\x03 Tokena baliogabea da edo iraungi da. Eskatu berri bat honekin \x0303RECOVER %nickname%\x03."
  success_identify: "\x0303✔\x03 Pasahitza berrezarrita. Identifikatu orain: \x0303%identify_cmd%\x03"
  success_then_change: "Ondoren aldatu zure pasahitza: \x0303/msg %bot% SET PASSWORD <pasahitz_berria>\x03"

# --- IDENTIFY ---------------------------------------------------------------
identify:
  syntax:           "IDENTIFY <ezizena> <pasahitza>"
  short:            "Identifikatu zeure burua ezizen baten jabe gisa."
  help:             "Zure saioa %nickserv% zerbitzuarekin autentikatzen du zure ezizena eta pasahitza erabiliz.\nIdentifikazio arrakastatsu baten ondoren \x02+r\x02 modu erregistratua jasoko duzu\neta, gonbidatu ezizen bat erabiltzen ari bazinen, zure ezizen erregistratua berreskuratuko da."
  success:          "\x0303✔\x03 Orain \x02%nickname%\x02 gisa identifikatuta zaude."
  already_identified: "\x0307ℹ\x03 Jada \x02%nickname%\x02 gisa identifikatuta zaude."
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago erregistratuta."
  invalid_credentials: "\x0304✗\x03 Pasahitz okerra. Saiatu berriro."
  locked_out:         "\x0304✗\x03 Porrot saiakera gehiegi. Saiatu berriro \x02%minutes%\x02 minututan."
  ghost_released:   "\x0307⚡\x03 \x02%nickname%\x02 ezizena eusten zuen mamua saioa deskonektatu da."
  kill_reason:      "%nickname% ezizena %source%(e)k berreskuratu du (jabe erregistratuak identifikatu du)"
  pending:          "\x0304✗\x03 \x02%nickname%\x02 ezizenak posta elektronikoaren egiaztapena zain du.\n  Exekutatu \x0303/msg %bot% VERIFY <token>\x03 edo \x0303/msg %bot% RESEND\x03."
  suspended:        "\x0304✗\x03 \x02%nickname%\x02 ezizena etenda dago. Arrazoia: %reason%"
  forbidden:        "\x0304✗\x03 \x02%nickname%\x02 ezizena ezin da sare honetan erabili."

# --- STATUS -----------------------------------------------------------------
status:
  syntax:           "STATUS <ezizena>"
  short:            "Erakutsi ezizen baten erregistro egoera."
  help:             "Ezizen baten uneko egoera erakusten du: erregistratua, egiaztapena zain,\netenda, edo debekatua."
  header:           "\x02\x0307%nickname%\x03 ezizenaren egoera:\x02"
  unregistered:     "  Egoera          : Erregistratu gabe"
  not_registered_offline: "  Egoera          : \x0315Erregistratu gabe\x03"
  pending:          "  Egoera          : \x0307Egiaztapena zain\x03"
  pending_expires:  "  Iraungitzea      : %minutes% minutu"
  pending_expires_at: "  Iraungitzea      : %date%"
  not_connected:    "  Egoera          : \x0315Konektatu gabe\x03"
  not_identified:   "  Egoera          : \x0307Identifikatu gabe\x03"
  identified:       "  Egoera          : \x0303Identifikatua\x03"
  suspended:        "  Egoera          : \x0304Etenda\x03"
  suspended_reason: "  Arrazoia          : %reason%"
  suspended_until:  "  Amaiera         : %date%"
  suspended_permanent: "  Amaiera         : Iraunkorra"
  forbidden:        "  Egoera          : \x0304Debekatua\x03"
  forbidden_reason: "  Arrazoia          : %reason%"
  footer:           "\x0314─────────────────────────────\x03"

# --- INFO -------------------------------------------------------------------
info:
  syntax:           "INFO <ezizena>"
  short:            "Erakutsi erregistratutako ezizen bati buruzko informazioa."
  help:             "Ezizen baten erregistro xehetasunak erakusten ditu: erregistro data,\nkonexio egoera, azken irteera mezua, eta posta elektronikoko helbidea.\nPosta jabeak identifikatuta daudenean soilik ikus dezake.\nPRIVATE ON dagoenean jabeak eta IRC Operadoreek soilik\nikus dezakete informazioa."
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago erregistratuta."
  private:          "\x0304✗\x03 \x02%nickname%\x02 ezizenaren informazioa pribatua da."
  header:           "\x02\x0307%nickname%\x03 ezizenaren informazioa:\x02"
  status:           "  \x0314Egoera\x03            : %status%"
  status_registered:  "\x0303Erregistratua\x03"
  status_suspended:   "\x0304Etenda\x03"
  status_forbidden:   "\x0304Debekatua\x03"
  reason:           "  \x0314Arrazoia\x03          : %reason%"
  suspended_until:  "  \x0314Amaiera\x03         : %date%"
  suspended_permanent: "  \x0314Amaiera\x03         : Iraunkorra"
  registered_at:    "  \x0314Erregistratua\x03      : %date%"
  last_seen_online: "  \x0314Azken konexioa\x03   : \x0303● ORAIN ONLINE\x03"
  last_seen_at:     "  \x0314Azken konexioa\x03   : %date%"
  last_seen_never:  "  \x0314Azken konexioa\x03   : Inoiz ez"
  last_quit:        "  \x0314Azken irteera\x03     : %message%"
  last_connect:     "  \x0314Azken konexioa\x03   : %ip% (%host%)"
  email:            "  \x0314Posta\x03             : %email%"
  vhost:            "  \x0314VHost\x03             : %vhost%"
  no_expire:        "  \x0314Iraungitzen ez da\x03 : Bai"
  footer:           "\x0314─────────────────────────────\x03"
  channels_header:  "\x0314\x0ASarbidea duten kanalak:\x03"
  channels_entry_founder:   "  %channel% (\x0303Sortzailea\x03)"
  channels_entry_successor: "  %channel% (\x0303Ondorengoa\x03)"
  channels_entry_access:    "  %channel% (%level%)"

# --- SET --------------------------------------------------------------------
set:
  syntax:           "SET <aukera> <balioa>"
  short:            "Aldatu zure %nickserv% ezizen ezarpenak."
  help:             "Zure %nickserv% ezizen ezarpenak aldatzen ditu.\nIdentifikatuta egon behar duzu komando hau erabiltzeko."
  unknown_option:   "\x0304✗\x03 Aukera ezezaguna \x02%option%\x02. Aukera erabilgarriak: %options%."

  password:
    syntax:         "SET PASSWORD <pasahitz_berria>"
    short:          "Aldatu zure ezizenaren pasahitza."
    help:           "Zure NickServ ezizenaren pasahitza aldatzen du. Pasahitz berriak\nberehala eragiten du. Aukeratu gutxienez 6 karaktereko pasahitz sendo bat\nbeste zerbitzuetan erabiltzen ez duzuna."
    success:        "\x0303✔\x03 Zure pasahitza arrakastaz eguneratu da."

  email:
    syntax:         "SET EMAIL <posta_berria> [tokena]"
    short:          "Aldatu zure ezizenari lotutako posta elektroniko helbidea (bi urratseko berrespena)."
    help:           "Posta elektroniko aldaketa bi urratsetan segurtasunerako.\n1) \x0303SET EMAIL <posta_berria>\x03 — token bat zure uneko posta elektronikora bidaltzen da.\n2) \x0303SET EMAIL <posta_berria> <token>\x03 — berretsi jasotako tokenarekin.\nTokena ordubetean iraungitzen da."
    success:        "\x0303✔\x03 Zure posta elektronikoa \x02%email%\x02 helbidera eguneratu da."
    pending_sent:   "\x0307→\x03 Berrespen token bat bidali da \x02%current_email%\x02 helbidera.\n  \x02%new_email%\x02 helbiderako aldaketa baieztatzeko exekutatu:\n  \x0303/msg %bot% SET EMAIL %new_email% <token>\x03\n  Tokena ordubetean iraungitzen da."
    invalid_token:  "\x0304✗\x03 Tokena baliogabea da edo iraungi da. Eskatu berri bat honekin \x0303SET EMAIL <posta_berria>\x03."

  language:
    syntax:         "SET LANGUAGE <kodea>"
    short:          "Aldatu zerbitzuek zurekin komunikatzeko erabiltzen duten hizkuntza."
    help:           "%nickserv% eta beste zerbitzuek zurekin hitz egitean erabiltzen duten hizkuntza\naldatzen du. Hizkuntza erabilgarriak:\n  \x02ca\x02 (Katalana)\n  \x02de\x02 (Alemana)\n  \x02el\x02 (Greziera)\n  \x02en\x02 (Ingelesa)\n  \x02es\x02 (Gaztelania)\n  \x02eu\x02 (Euskara)\n  \x02fr\x02 (Frantsesa)\n  \x02gl\x02 (Galiziera)\n  \x02it\x02 (Italiera)\n  \x02nl\x02 (Nederlandera)\n  \x02pl\x02 (Poloniera)\n  \x02pt\x02 (Portugesa)\n  \x02ro\x02 (Errumaniera)\n  \x02tr\x02 (Turkiera)"
    success:        "\x0303✔\x03 Hizkuntza \x02%language%\x02(e)ra aldatu da."
    invalid:        "\x0304✗\x03 Onartu gabeko hizkuntza. Hizkuntza erabilgarriak: %languages%."

  timezone:
    syntax:         "SET TIMEZONE <ordu-zona>"
    short:          "Ezarri datak erakustean erabiltzen den ordu-zona."
    help:           "%nickserv% zerbitzuak datak erakustean erabiltzen duen ordu-zona ezartzen du.\nErabili \x02HELP SET TIMEZONE\x02 eskualdeen indizerako;\n\x02HELP SET TIMEZONE <eskualdea>\x02 (adib. Europe) eskualde horretako ordu-zonentzako.\nErabili \x02OFF\x02 garbitzeko."
    success:        "\x0303✔\x03 Ordu-zona \x02%timezone%\x02 gisa ezarri da. Datak ordu-zona honetan erakutsiko dira."
    cleared:        "\x0303✔\x03 Ordu-zona garbitu da. Datek sarearen lehenetsia erabiliko dute."
    invalid:        "\x0304✗\x03 Ordu-zona baliogabea \x02%timezone%\x02. Erabili identifikatzaile baliozko bat (adib. UTC, Europe/Madrid)."

  private:
    syntax:         "SET PRIVATE {ON|OFF}"
    short:          "Gaitu edo desgaitu pribatutasuna zure ezizenaren informaziorako."
    help:           "Zure ezizenaren informazioaren ikusgarritasuna kontrolatzen du INFO komandoan.\n\x02PRIVATE ON\x02 dagoenean zuk eta IRC Operadoreek soilik ikus ditzakezue zure xehetasunak.\n\x02PRIVATE OFF\x02 dagoenean zure informazioa guztiontzat publikoa da."
    on:             "\x0303✔\x03 Zure ezizenaren informazioa orain \x02pribatua\x02 da."
    off:            "\x0303✔\x03 Zure ezizenaren informazioa orain \x02publikoa\x02 da."

  msg:
    syntax:         "SET MSG {ON|OFF}"
    short:          "Erabili PRIVMSG (ON) edo NOTICE (OFF) zerbitzuen erantzunetarako."
    help:           "%nickserv% eta beste zerbitzuek zuri mezuak nola bidaltzen dizkizuten kontrolatzen du.\n\x02MSG ON\x02 dagoenean erantzunak \x02PRIVMSG\x02 gisa bidaltzen dira (bezero batzuek erantzunak edo jakinarazpenak aktiba ditzakete).\n\x02MSG OFF\x02 dagoenean erantzunak \x02NOTICE\x02 gisa bidaltzen dira (lehenetsia; normalean ez du erantzun automatikorik)."
    on:             "\x0303✔\x03 Zerbitzuen mezuak orain \x02PRIVMSG\x02 gisa bidaliko dira."
    off:            "\x0303✔\x03 Zerbitzuen mezuak orain \x02NOTICE\x02 gisa bidaliko dira."

  vhost:
    syntax:         "SET VHOST <vhost-a>"
    short:          "Ezarri edo garbitu zure ostalari birtual pertsonalizatua (erakutsitako ostalari izena)."
    help:           "Identifikatuta zaudenean besteek ikusten duten ostalari izen pertsonalizatu bat ezartzen du.\nErabili \x02SET VHOST OFF\x02 garbitzeko. Letrak (a-z, A-Z), digituak, marra eta puntua soilik;\nbloke baten hasieran/amaieran marra edo punturik ez; gehienez 48 karaktere. Ezizen bakoitzeko bakarra."
    success:        "\x0303✔\x03 Zure ostalari birtuala \x02%vhost%\x02 gisa ezarri da."
    cleared:        "\x0303✔\x03 Zure ostalari birtuala garbitu da."
    invalid:        "\x0304✗\x03 Vhost baliogabea. Letrak, digituak, marra eta puntua soilik (ez blokearen hasieran/amaieran); gehienez 48 karaktere."
    taken:          "\x0304✗\x03 Vhost hori jada beste ezizen batek erabiltzen du."
    forced:         "\x0304✗\x03 Zure vhost-a automatikoki konfiguratuta dago eta ezin da SET VHOST bidez aldatu."

# --- HELP -------------------------------------------------------------------
