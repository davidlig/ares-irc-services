# --- NOEXPIRE (IRCop) ---------------------------------------------------------
noexpire:
  syntax:           "NOEXPIRE <ezizena> {ON|OFF}"
  short:            "Ezarri edo kendu iraungitze babesa ezizen batentzat."
  help:             |
    Ezizen bat jarduerarik ezagatik iraungiko den kontrolatzen du.
    ON dagoenean, ezizena ez da inoiz iraungitzen azken jarduera edozein dela ere.
    OFF dagoenean, iraungitze arau normalak aplikatzen dira.

    'nickserv.noexpire' baimena duten IRCopek soilik erabil dezakete komando hau.

    Sintaxia: NOEXPIRE <ezizena> {ON|OFF}
    Adibideak:
      NOEXPIRE ErabiltzaileGarrantzitsua ON
      NOEXPIRE ErabiltzaileGarrantzitsua OFF
  success_on:       "\x0303✔\x03 \x02%nickname%\x02 ezizena iraungitzetik babestuta dago orain."
  success_off:      "\x0303✔\x03 \x02%nickname%\x02 ezizena normal iraungiko da orain."
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago erregistratuta."
  forbidden:         "\x0304✗\x03 \x02%nickname%\x02 ezizena debekatua dago."
  suspended:         "\x0304✗\x03 \x02%nickname%\x02 ezizena etenda dago."

