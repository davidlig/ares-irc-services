# --- Ezizen Babesa ----------------------------------------------------------
protection:
  nick_in_use:      "\x0304⚠\x03 \x02%nickname%\x02 ezizena erregistratuta dago. Izena aldatuko zaizu identifikatzen ez bazara."
  renamed_to:       "\x0307→\x03 \x02%guest_nick%\x02 izenera aldatu zara. Zure ezizena berreskuratzeko:\n\x0303/msg %bot% IDENTIFY %nickname% <pasahitza>\x03"
  nick_forbidden:   "\x0304✗\x03 \x02%nickname%\x02 ezizena debekatua dago: %reason%"

# --- IRCop Komandoak --------------------------------------------------------
userip:
  syntax:           "USERIP <ezizena>"
  short:            "Lortu ezizenaren benetako IP helbidea eta ostalari izena."
  help:             |
    Zehaztutako ezizenaren benetako IP helbidea eta ostalari izena erakusten ditu.
    'nickserv.userip' baimena duten IRCopentzat soilik erabilgarri.

    Komando honek ezizen informazio sentikorra erakusten du.
    Erabili arduraz.

    Sintaxia: USERIP <ezizena>
    Adibidea: USERIP ErabiltzaileBat
  not_online:       "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago konektatuta."
  result:           "\x0307ℹ\x03 Ezizena: \x02%nickname%\x02 | IPa: \x0307%ip%\x03 | Ostalaria: \x0307%host%\x03"

permissions:
  nickserv.userip: "Ikusi ezizen baten benetako IPa/ostalari izena (USERIP)"
  nickserv.suspend: "Etten du edo etenaldia kendu ezizen bati (SUSPEND/UNSUSPEND)"
  nickserv.rename: "Behartu konektatutako ezizen baten izen aldaketa ausazko batera (RENAME)"
  nickserv.drop: "Ezabatu erregistratutako ezizen bat (DROP)"
  nickserv.forbid: "Debekatu edo des-debekatu ezizen bat (FORBID/UNFORBID)"
  nickserv.forbidvhost: "Debekatu edo baimendu vhost ereduak (FORBIDVHOST)"
  nickserv.saset: "Aldatu beste ezizen baten ezarpenak (SASET)"
  nickserv.noexpire: "Ezarri edo kendu iraungitze babesa ezizen batentzat (NOEXPIRE)"
  nickserv.history: "Ikusi eta kudeatu ezizenaren ekintza historia (HISTORY)"

# --- SUSPEND (IRCop) ---------------------------------------------------------
suspend:
  syntax:           "SUSPEND <ezizena> <iraupena> <arrazoia>"
  short:            "Etten du ezizen bat."
  help:             |
    Ezizen bat eteten du, jabea identifikatzea eragotziz.
    Etenaldia aldi baterakoa edo iraunkorra izan daiteke.

    Iraupen formatuak: \x0303%d\x03 (egun), \x0303%h\x03 (ordu), \x0303%m\x03 (minutu), edo \x03030\x03 (iraunkorra).

    Etenda dauden erabiltzaileak ezin dira bere ezizenean identifikatu.
    IRC operadoreak eta root erabiltzaileak ezin dira eten.

    Sintaxia: SUSPEND <ezizena> <iraupena> <arrazoia>
    Adibideak:
      SUSPEND ErabiltzaileGaiztoa 7d Spam egiten #laguntza kanalean
      SUSPEND TratuTxarrekoa 30d Behin eta berrizko jarioa
      SUSPEND Arazoa 0 Betiko debeku saihesketa
  success:            "\x0303✔\x03 \x02%nickname%\x02 ezizena \x02%duration%\x02 arte eten da."
  already_suspended:  "\x0304✗\x03 \x02%nickname%\x02 ezizena jada etenda dago."
  not_registered:     "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago erregistratuta."
  forbidden:          "\x0304✗\x03 \x02%nickname%\x02 ezizena debekatua dago eta ezin da eten."
  cannot_suspend_oper: "\x0304✗\x03 Ezin da IRC operadore \x02%nickname%\x02 eten."
  cannot_suspend_root: "\x0304✗\x03 Ezin da root erabiltzaile \x02%nickname%\x02 eten."
  cannot_suspend_service: "\x0304✗\x03 Ezin da zerbitzu ezizen \x02%nickname%\x02 eten."
  invalid_duration:   "\x0304✗\x03 Iraupen baliogabea. Erabili: \x0303<d><o><m>\x03 (adib., 7d, 12o, 30m) edo \x03030\x03 iraunkorrerako."
  permanent:          "iraunkorra"

# --- UNSUSPEND (IRCop) -------------------------------------------------------
unsuspend:
  syntax:           "UNSUSPEND <ezizena>"
  short:            "Kendu ezizen baten etenaldia."
  help:             |
    Ezizen baten etenaldi aktiboa kentzen du, jabea berriro identifikatzea ahalbidetuz.

    Sintaxia: UNSUSPEND <ezizena>
    Adibidea: UNSUSPEND ErabiltzaileBat
  success:          "\x0303✔\x03 \x02%nickname%\x02 ezizenaren etenaldia kendu da."
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago erregistratuta."
  not_suspended:    "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago etenda."

# --- RENAME (IRCop) -----------------------------------------------------------
rename:
  syntax:           "RENAME <ezizena>"
  short:            "Behartu konektatutako ezizen bat ausazko ezizen batera izenaz aldatzea."
  help:             |
    Konektatutako ezizen bat ausaz sortutako batera izena aldatzea behartzen du.
    Erabiltzailea deskonektatu gabe sare politikak betearazteko baliagarria.

    Ezizen berriaren formatuak konfiguratutako gonbidatu aurrizkia (%prefix%) erabiltzen du.

    Komando honek IRCop baimena behar du: nickserv.rename

    Sintaxia: RENAME <ezizena>
    Adibidea: RENAME ArazoSortzailea
  not_online:        "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago konektatuta."
  cannot_rename_root: "\x0304✗\x03 Ezin da root erabiltzaile \x02%nickname%\x02 izenaz aldatu."
  cannot_rename_oper: "\x0304✗\x03 Ezin da IRC operadore \x02%nickname%\x02 izenaz aldatu."
  cannot_rename_service: "\x0304✗\x03 Ezin da zerbitzu ezizen \x02%nickname%\x02 izenaz aldatu."
  success:           "\x0303✓\x03 \x02%nickname%\x02 ezizena \x02%new_nick%\x02 izenera aldatu da."

# --- DROP (IRCop) --------------------------------------------------------------
drop:
  syntax:           "DROP <ezizena>"
  short:            "Ezabatu erregistratutako ezizen bat."
  help:             |
    Erregistratutako ezizen bat datu-basetik ezabatzen du.
    Ekintza hau ezin da desegin.

    Erabiltzailea online badago, Guest- ezizen batera aldatuko zaio izena.
    Root erabiltzaileak eta IRC operadoreak ezin dira ezabatu.
    Ezin duzu zure ezizena ezabatu.

    Komando honek IRCop baimena behar du: nickserv.drop

    Sintaxia: DROP <ezizena>
    Adibidea: DROP KontuZaharra
  not_registered:     "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago erregistratuta."
  suspended:         "\x0304✗\x03 \x02%nickname%\x02 ezizena etenda dago. Kendu etenaldia lehenik."
  forbidden:         "\x0304✗\x03 \x02%nickname%\x02 ezizena debekatua dago."
  cannot_drop_root:   "\x0304✗\x03 Ezin da root erabiltzaile \x02%nickname%\x02 ezabatu."
  cannot_drop_oper:   "\x0304✗\x03 Ezin da IRC operadore \x02%nickname%\x02 ezabatu."
  cannot_drop_self:    "\x0304✗\x03 Ezin duzu zure ezizena ezabatu."
  success:            "\x0303✓\x03 \x02%nickname%\x02 ezizena ezabatu da."
  cannot_drop_service: "\x0304✗\x03 Ezin da zerbitzu ezizen \x02%nickname%\x02 ezabatu."

# --- FORBID (IRCop) --------------------------------------------------------------
forbid:
  syntax:           "FORBID <ezizena> <arrazoia>"
  short:            "Betirako blokeatu ezizen bat erabilia izatea."
  help:             |
    Ezizen bat sarean erabilia izatea debekatzen du.
    Ezizena ezin da erregistratu edo inork erabili.

    Ezizena unean erregistratuta badago, lehenik ezabatua izango da.
    Norbaitek erabiltzen badu, Guest- ezizen batera aldatzea behartuko zaio.

    Root erabiltzaileak, IRC operadoreak eta zerbitzu ezizenak ezin dira debekatu.

    Komando honek IRCop baimena behar du: nickserv.forbid

    Sintaxia: FORBID <ezizena> <arrazoia>
    Adibidea: FORBID EzizenGaiztoa Behin eta berrizko politika urraketak
  success:            "\x0303✔\x03 \x02%nickname%\x02 ezizena debekatu da."
  updated:            "\x0303✔\x03 \x02%nickname%\x02 ezizenaren debeku arrazoia eguneratu da."
  reason_required:    "\x0304✗\x03 Debekurako arrazoi bat eman behar duzu."
  cannot_forbid_root:  "\x0304✗\x03 Ezin da root erabiltzaile \x02%nickname%\x02 debekatu."
  cannot_forbid_oper:  "\x0304✗\x03 Ezin da IRC operadore \x02%nickname%\x02 debekatu."
  cannot_forbid_service: "\x0304✗\x03 Ezin da zerbitzu ezizen \x02%nickname%\x02 debekatu."

# --- UNFORBID (IRCop) ------------------------------------------------------------
unforbid:
  syntax:           "UNFORBID <ezizena>"
  short:            "Kendu ezizen debekua."
  help:             |
    Ezizen debekua kentzen du, ezizena berriro erabilia izatea ahalbidetuz.

    Komando honek IRCop baimena behar du: nickserv.forbid

    Sintaxia: UNFORBID <ezizena>
    Adibidea: UNFORBID EzizenBat
  success:          "\x0303✔\x03 \x02%nickname%\x02 ezizena jada ez dago debekatuta."
  not_forbidden:    "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago debekatuta."

# --- FORBIDVHOST (IRCop) ---------------------------------------------------------
forbidvhost:
  syntax:           "FORBIDVHOST ADD|DEL|LIST [eredua]"
  short:            "Kudeatu debekatutako vhost ereduak."
  help:             |
    NickServ SET VHOST bidez bat datozen vhost-ak ezartzea
    eragozten duten ereduak kudeatzen ditu.

    Komodinek: * edozein segida bat dator, ? karaktere bakarra bat dator.
    Adibidea: *.pirated.com .pirated.com-ez amaitzen den edozein vhost blokeatzen du

    Komando honek IRCop baimena behar du: nickserv.forbidvhost

    Azpikomandoak:
      ADD <eredua>    Gehitu debekatutako eredu bat
      DEL <eredua>    Kendu debekatutako eredu bat
      LIST            Erakutsi debekatutako eredu guztiak

  unknown_sub: "\x0304✗\x03 Azpikomando ezezaguna \x02%sub%\x02. Erabili ADD, DEL edo LIST."

  add:
    syntax:      "FORBIDVHOST ADD <eredua>"
    short:       "Gehitu debekatutako vhost eredu bat."
    help:        |
      Eredu bat debekatutako vhost zerrendara gehitzen du. Erabiltzaileek ezin
      izango dute eredu honekin bat datorren vhostik ezarri SET VHOST bidez.

      Komodinek: * edozein segida bat dator, ? karaktere bakarra bat dator.

      Sintaxia: FORBIDVHOST ADD <eredua>
      Adibidea: FORBIDVHOST ADD *.pirated.com
    done:            "\x0303✓\x03 Debekatutako vhost eredua gehitu da: \x02%pattern%\x02"
    already_exists:  "\x0304✗\x03 \x02%pattern%\x02 eredua jada existitzen da."
    invalid:          "\x0304✗\x03 Debekatutako vhost eredu formatu baliogabea."

  del:
    syntax:      "FORBIDVHOST DEL <eredua>"
    short:       "Kendu debekatutako vhost eredu bat."
    help:        |
      Eredu bat debekatutako vhost zerrendatik kentzen du.

      Sintaxia: FORBIDVHOST DEL <eredua>
      Adibidea: FORBIDVHOST DEL *.pirated.com
    done:        "\x0303✓\x03 Debekatutako vhost eredua kendu da: \x02%pattern%\x02"
    not_found:   "\x0304✗\x03 \x02%pattern%\x02 eredua ez da aurkitu."

  list:
    short:       "Zerrendatu debekatutako vhost eredu guztiak."
    syntax:      "FORBIDVHOST LIST"
    help:        |
      Debekatutako vhost eredu guztiak erakusten ditu.

      Sintaxia: FORBIDVHOST LIST
    header:      "\x0307ℹ\x03 Debekatutako vhost ereduak (\x02%count%\x02):"
    entry:       "  %index%. \x0304%pattern%\x03 — %nickname%-(e)k (%date%)"
    empty:       "\x0307ℹ\x03 Ez dago debekatutako vhost eredurik."
    unknown_creator: "ezezaguna"

# --- HISTORY (IRCop) ---------------------------------------------------------
history:
  syntax:           "HISTORY <ezizena> {ADD|DEL|VIEW|CLEAR}"
  short:            "Ikusi edo kudeatu ezizenaren ekintza historia."
  help:             |
    Ezizen baten ekintza historia kudeatzen du.
    'nickserv.history' baimena duten IRCopek soilik erabil dezakete komando hau.

    Automatikoki grabatutako ekintzak:
      SUSPEND, UNSUSPEND, SET PASSWORD, SET EMAIL, SASET PASSWORD,
      SASET EMAIL, RECOVER

    Sintaxia: HISTORY <ezizena> ADD <mezua>
            HISTORY <ezizena> DEL <ida>
            HISTORY <ezizena> VIEW [ORRIA|ALL]
            HISTORY <ezizena> CLEAR

    Adibideak:
      HISTORY EzizenBat VIEW
      HISTORY EzizenBat ADD Erabiltzaile honi buruzko oharra
      HISTORY EzizenBat VIEW 2
      HISTORY EzizenBat VIEW ALL
      HISTORY EzizenBat DEL 123
      HISTORY EzizenBat CLEAR

    Erabili VIEW historia ikusteko (3 sarrera erakusten ditu lehenetsiz).
    Erabili VIEW PAGE 2 hurrengo orria ikusteko.
    Erabili VIEW ALL historia osoa ikusteko.
    Erabili ADD eskuzko sarrera bat gehitzeko.
    Erabili DEL ID zehatz baten sarrera ezabatzeko.
    Erabili CLEAR historia sarrera guztiak ezabatzeko.
  not_registered:   "\x0304✗\x03 \x02%nickname%\x02 ezizena ez dago erregistratuta."
  unknown_operator: "(ezezaguna)"

  add:
    syntax:     "HISTORY <ezizena> ADD <mezua>"
    short:      "Gehitu eskuzko historia sarrera bat."
    help:        |
      Ezizenaren historiara eskuzko sarrera bat gehitzen du.

      Sintaxia: HISTORY <ezizena> ADD <mezua>
      Adibidea: HISTORY EzizenBat ADD Erabiltzailea spam egiteagatik salatua
    success:    "\x0303✔\x03 Historia sarrera gehitu da \x02%nickname%\x02 ezizenarentzat."

  del:
    syntax:     "HISTORY <ezizena> DEL <ida>"
    short:      "Ezabatu historia sarrera bat IDaren arabera."
    help:        |
      Historia sarrera zehatz bat ezabatzen du bere IDaren arabera.

      Sintaxia: HISTORY <ezizena> DEL <ida>
      Adibidea: HISTORY EzizenBat DEL 42
    success:    "\x0303✔\x03 \x02%id%\x02 historia sarrera ezabatu da."
    not_found:  "\x0304✗\x03 \x02%id%\x02 historia sarrera ez da aurkitu."
    invalid_id: "\x0304✗\x03 Sarrera ID baliogabea: \x02%id%\x02."

  view:
    syntax:     "HISTORY <ezizena> VIEW [ORRIA|ALL]"
    short:      "Ikusi ezizenaren ekintza historia."
    help:        |
      Ezizenaren ekintza historia erakusten du.

      Sintaxia: HISTORY <ezizena> VIEW
              HISTORY <ezizena> VIEW ORRIA
              HISTORY <ezizena> VIEW ALL

      Lehenetsiz 3 sarrera erakusten ditu aldiko.
      Erabili VIEW 2 bigarren orria ikusteko.
      Erabili VIEW ALL historia osoa ikusteko.
    header:     "\x02\x0307%nickname%\x03 ezizenaren historia\x02 (%total%etik %start%-%end% erakusten):"
    entry:       "#%id% [%date%] \x0303%action%\x03 - \x02%operator%\x02 — %message%"
    extra:       "  Gehigarria \x0307→\x03 %extra%"
    no_entries:  "\x0307ℹ\x03 Ez da historia sarrerarik aurkitu \x02%nickname%\x02 ezizenarentzat."
    page_hint:   "Erabili \x0303HISTORY %nickname% VIEW %next_page%\x03 sarrera gehiagotarako."

  clear:
    syntax:     "HISTORY <ezizena> CLEAR"
    short:      "Ezabatu ezizen baten historia sarrera guztiak."
    help:        |
      Zehaztutako ezizenaren historia sarrera guztiak kentzen ditu.
      Ekintza hau ezin da desegin.

      Sintaxia: HISTORY <ezizena> CLEAR
      Adibidea: HISTORY EzizenBat CLEAR
    success:    "\x0303✔\x03 \x02%count%\x02 historia sarrera garbitu dira \x02%nickname%\x02 ezizenarentzat."

