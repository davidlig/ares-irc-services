  syntax_label:     "\x0307Sintaxia:\x03 \x02%syntax%\x02"
  footer:           "\x0314─────────────────────────────\x03"
  unknown_command:  "\x0304✗\x03 Ez dago laguntzarik \x02%command%\x02 komandoarentzat."
  ircop_header:     "\x02\x0314IRC Operadoreentzako komando erabilgarriak:\x03\x0F"

  set_timezone:
