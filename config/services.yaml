        arguments:
            $permissionRegistry: '@App\Application\Security\PermissionRegistry'
        tags: ['operserv.command']

    App\Application\OperServ\Command\Handler\HelpCommand:
        tags: ['operserv.command']

    # --- OperServ Infrastructure -------------------------------------------------

    App\Infrastructure\IRC\ServiceBridge\OperServSendNoticeAdapter:
        class: App\Infrastructure\IRC\ServiceBridge\CoreSendNoticeAdapter

    App\Infrastructure\OperServ\Bot\OperServBot:
        arguments:
            $servicesVhost: '%services.vhost%'
