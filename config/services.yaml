    App\Domain\OperServ\Repository\OperRoleRepositoryInterface:
        class: App\Infrastructure\OperServ\Doctrine\OperRoleDoctrineRepository

    App\Domain\OperServ\Repository\OperPermissionRepositoryInterface:
        class: App\Infrastructure\OperServ\Doctrine\OperPermissionDoctrineRepository

    App\Domain\OperServ\Repository\GlineRepositoryInterface:
        class: App\Infrastructure\OperServ\Doctrine\GlineDoctrineRepository

    # --- OperServ Application ---------------------------------------------------

    App\Application\OperServ\RootUserRegistry:
        arguments:
            $rootUsers: '%operserv.root_users%'

    App\Application\OperServ\IrcopAccessHelper: ~

    App\Application\OperServ\Command\OperServCommandRegistry:
        arguments:
            $commands: !tagged_iterator operserv.command

    App\Application\OperServ\OperServService:
        arguments:
            $serviceNicks: '@App\Application\ApplicationPort\ServiceNicknameRegistry'
            $authorizationContext: '@App\Application\NickServ\Security\AuthorizationContextInterface'
