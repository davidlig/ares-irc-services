    App\Infrastructure\NickServ\UserLanguageResolver:
        arguments:
            $defaultLanguage: '%services.default_language%'

    # --- UserMessageTypeResolver — NOTICE vs PRIVMSG preference -----------------

    App\Application\Port\UserMessageTypeResolverInterface:
        alias: App\Infrastructure\NickServ\UserMessageTypeResolver

    App\Infrastructure\NickServ\UserMessageTypeResolver: ~

    # --- OperServ Domain --------------------------------------------------------

    App\Domain\OperServ\Repository\OperIrcopRepositoryInterface:
