# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    # IRC link parameters — values come from environment variables (see .env)
    irc.server_name:   '%env(IRC_SERVER_NAME)%'
    irc.ircd_host:     '%env(IRC_IRCD_HOST)%'
    irc.ircd_port:     '%env(int:IRC_IRCD_PORT)%'
    irc.link_password: '%env(IRC_LINK_PASSWORD)%'
    irc.description:   '%env(IRC_DESCRIPTION)%'
    irc.protocol:      '%env(IRC_PROTOCOL)%'
    irc.use_tls:       '%env(bool:IRC_USE_TLS)%'
    irc.unreal_sid:    '%env(IRC_UNREAL_SID)%'
    irc.inspircd_sid:  '%env(IRC_INSPIRCD_SID)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # --- Interface bindings ---------------------------------------------------

    App\Domain\IRC\Connection\ConnectionFactoryInterface:
        class: App\Infrastructure\IRC\Connection\SocketConnectionFactory
        arguments:
            $logger: '@monolog.logger.irc'

    App\Domain\IRC\Protocol\ProtocolHandlerRegistryInterface:
        class: App\Infrastructure\IRC\Protocol\ProtocolHandlerRegistry
        arguments:
            $handlers: !tagged_iterator irc.protocol_handler

    # --- Application services — inject the irc Monolog channel ---------------

    App\Application\IRC\IRCClientFactory:
        arguments:
            $logger: '@monolog.logger.irc'

    # --- CLI command — inject .env defaults so the command runs without arguments ---

    App\UI\CLI\ConnectCommand:
        arguments:
            $defaultServerName:  '%irc.server_name%'
            $defaultHost:        '%irc.ircd_host%'
            $defaultPort:        '%irc.ircd_port%'
            $defaultPassword:    '%irc.link_password%'
            $defaultDescription: '%irc.description%'
            $defaultProtocol:    '%irc.protocol%'
            $defaultUseTls:      '%irc.use_tls%'

    # --- Protocol handlers (tagged for auto-registration into the registry) ---

    App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdProtocolHandler:
        arguments:
            $sid:    '%irc.unreal_sid%'
            $logger: '@monolog.logger.irc'
        tags: ['irc.protocol_handler']

    App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdProtocolHandler:
        arguments:
            $sid:    '%irc.inspircd_sid%'
            $logger: '@monolog.logger.irc'
        tags: ['irc.protocol_handler']

    # --- Event subscriber — logs domain events to the irc channel ------------

    App\Infrastructure\IRC\Logging\IRCEventSubscriber:
        arguments:
            $logger: '@monolog.logger.irc'
        tags: ['kernel.event_subscriber']
