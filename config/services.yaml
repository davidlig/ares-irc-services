        tags: ['operserv.command']

    App\Application\OperServ\IrcopModeApplier:
        arguments:
            $identifiedRegistry: '@App\Application\NickServ\IdentifiedSessionRegistry'
            $connectionHolder: '@App\Infrastructure\IRC\Connection\ActiveConnectionHolder'
