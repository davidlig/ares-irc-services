        tags: ['maintenance.prunable']

    App\Application\NickServ\Maintenance\Pruner\PendingEmailChangePruner:
        tags: ['maintenance.prunable']

    App\Application\NickServ\Maintenance\Pruner\IdentifiedSessionPruner:
        tags: ['maintenance.prunable']

    App\Application\NickServ\Maintenance\Pruner\RecoveryTokenPruner:
        tags: ['maintenance.prunable']

    App\Application\NickServ\Maintenance\PruneMemoryRegistriesTask:
        arguments:
            $prunables:        !tagged_iterator maintenance.prunable
            $logger:           '@monolog.logger.maintenance'
            $intervalSeconds:  '%maintenance.interval%'
        tags: ['maintenance.task']

