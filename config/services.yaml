# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    # IRC link parameters — values come from environment variables (see .env)
    irc.server_name:   '%env(IRC_SERVER_NAME)%'
    irc.ircd_host:     '%env(IRC_IRCD_HOST)%'
    irc.ircd_port:     '%env(int:IRC_IRCD_PORT)%'
    irc.link_password: '%env(IRC_LINK_PASSWORD)%'
    irc.description:   '%env(IRC_DESCRIPTION)%'
    irc.protocol:      '%env(IRC_PROTOCOL)%'
    irc.use_tls:       '%env(bool:IRC_USE_TLS)%'
    irc.server_sid:    '%env(IRC_SERVER_SID)%'

    # Services global settings
    services.vhost:         '%env(IRC_SERVICES_VHOST)%'
    services.default_language: '%env(SERVICES_DEFAULT_LANGUAGE)%'
    services.default_timezone_fallback: 'UTC'
    services.default_timezone: '%env(default:services.default_timezone_fallback:SERVICES_DEFAULT_TIMEZONE)%'
    services.guest_prefix:     '%env(NICKSERV_GUEST_PREFIX)%'
    services.vhost_suffix:     '%env(default::NICKSERV_VHOST_SUFFIX)%'

    # IRCops debug channel (shared by all services)
    ircops.debug_channel_default: null
    ircops.debug_channel: '%env(string:default:ircops.debug_channel_default:IRCOPS_DEBUG_CHANNEL)%'

    # Maintenance scheduler
    maintenance.interval: '%env(int:MAINTENANCE_INTERVAL)%'
    maintenance.purge_expired_akick_interval: '%env(int:MAINTENANCE_INTERVAL)%'
    maintenance.purge_expired_glines_interval: '%env(int:MAINTENANCE_INTERVAL)%'

    # NickServ pseudo-client
    nickserv.nick:     '%env(NICKSERV_NICK)%'
    nickserv.ident:    '%env(NICKSERV_IDENT)%'
    nickserv.realname: '%env(NICKSERV_REALNAME)%'
    # UID = SID (3 chars) + suffix — must be unique on the network (see IRC_SERVER_SID)
    nickserv.uid:      '%env(NICKSERV_UID)%'
    # Minimum seconds between RESEND requests per nick (default 600 = 10 minutes)
    nickserv.resend_min_interval_default: 600
    nickserv.resend_min_interval: '%env(int:default:nickserv.resend_min_interval_default:NICKSERV_RESEND_MIN_INTERVAL)%'
    # Minimum seconds between REGISTER attempts per host/IP (default 300 = 5 minutes, anti-bot)
    nickserv.register_min_interval_default: 300
    nickserv.register_min_interval: '%env(int:default:nickserv.register_min_interval_default:NICKSERV_REGISTER_MIN_INTERVAL)%'
    # IDENTIFY lockout after repeated failures (anti brute-force)
    nickserv.identify_max_failed_attempts_default: 5
    nickserv.identify_max_failed_attempts: '%env(int:default:nickserv.identify_max_failed_attempts_default:NICKSERV_IDENTIFY_MAX_FAILED_ATTEMPTS)%'
    nickserv.identify_failed_window_seconds_default: 900
    nickserv.identify_failed_window_seconds: '%env(int:default:nickserv.identify_failed_window_seconds_default:NICKSERV_IDENTIFY_FAILED_WINDOW_SECONDS)%'
    nickserv.identify_lockout_seconds_default: 600
    nickserv.identify_lockout_seconds: '%env(int:default:nickserv.identify_lockout_seconds_default:NICKSERV_IDENTIFY_LOCKOUT_SECONDS)%'
    # RECOVER: token TTL and throttle
    nickserv.recover_token_ttl_seconds_default: 3600
    nickserv.recover_token_ttl_seconds: '%env(int:default:nickserv.recover_token_ttl_seconds_default:NICKSERV_RECOVER_TOKEN_TTL)%'
    nickserv.recover_min_interval_seconds_default: 600
    nickserv.recover_min_interval_seconds: '%env(int:default:nickserv.recover_min_interval_seconds_default:NICKSERV_RECOVER_MIN_INTERVAL)%'
    # Inactivity expiry: days without use after which a registered nick is dropped (0 = disabled)
    nickserv.inactivity_expiry_days_default: 0
    nickserv.inactivity_expiry_days: '%env(int:default:nickserv.inactivity_expiry_days_default:NICKSERV_INACTIVITY_EXPIRY_DAYS)%'
    # History retention: days to keep nickname action history (0 = forever)
    nickserv.history_retention_days_default: 30
    nickserv.history_retention_days: '%env(int:default:nickserv.history_retention_days_default:NICKSERV_HISTORY_RETENTION_DAYS)%'

    # ChanServ pseudo-client
    chanserv.nick:     '%env(CHANSERV_NICK)%'
    chanserv.ident:    '%env(CHANSERV_IDENT)%'
    chanserv.realname: '%env(CHANSERV_REALNAME)%'
    chanserv.uid:      '%env(CHANSERV_UID)%'
    # Maximum registered channels per nick (default: 3)
    chanserv.max_channels_per_nick_default: 3
    chanserv.max_channels_per_nick: '%env(int:default:chanserv.max_channels_per_nick_default:CHANSERV_MAX_CHANNELS_PER_NICK)%'
    # Minimum seconds between channel registrations per nick (default: 21600 = 6 hours)
    chanserv.register_min_interval_default: 21600
    chanserv.register_min_interval: '%env(int:default:chanserv.register_min_interval_default:CHANSERV_REGISTER_MIN_INTERVAL)%'
    # SET FOUNDER: token TTL and throttle (same defaults as NickServ RECOVER)
    chanserv.founder_token_ttl_seconds_default: 3600
    chanserv.founder_token_ttl_seconds: '%env(int:default:chanserv.founder_token_ttl_seconds_default:CHANSERV_FOUNDER_TOKEN_TTL)%'
    chanserv.founder_min_interval_seconds_default: 600
    chanserv.founder_min_interval_seconds: '%env(int:default:chanserv.founder_min_interval_seconds_default:CHANSERV_FOUNDER_MIN_INTERVAL)%'
    # Inactivity expiry: days without use after which a registered channel is dropped (0 = disabled)
    chanserv.inactivity_expiry_days_default: 0
    chanserv.inactivity_expiry_days: '%env(int:default:chanserv.inactivity_expiry_days_default:CHANSERV_INACTIVITY_EXPIRY_DAYS)%'

    # MemoServ pseudo-client
    memoserv.nick_default: 'MemoServ'
    memoserv.nick: '%env(string:default:memoserv.nick_default:MEMOSERV_NICK)%'
    memoserv.ident_default: 'MemoServ'
    memoserv.ident: '%env(string:default:memoserv.ident_default:MEMOSERV_IDENT)%'
    memoserv.realname_default: 'Memo Services'
    memoserv.realname: '%env(string:default:memoserv.realname_default:MEMOSERV_REALNAME)%'
    memoserv.uid: '%env(MEMOSERV_UID)%'
    memoserv.send_min_interval_seconds_default: 30
    memoserv.send_min_interval_seconds: '%env(int:default:memoserv.send_min_interval_seconds_default:MEMOSERV_SEND_MIN_INTERVAL)%'
    memoserv.max_memos_per_nick_default: 50
    memoserv.max_memos_per_nick: '%env(int:default:memoserv.max_memos_per_nick_default:MEMOSERV_MAX_MEMOS_PER_NICK)%'
    memoserv.max_memos_per_channel_default: 50
    memoserv.max_memos_per_channel: '%env(int:default:memoserv.max_memos_per_channel_default:MEMOSERV_MAX_MEMOS_PER_CHANNEL)%'
    memoserv.ignore_list_limit_nick_default: 50
    memoserv.ignore_list_limit_nick: '%env(int:default:memoserv.ignore_list_limit_nick_default:MEMOSERV_IGNORE_LIST_LIMIT_NICK)%'
    memoserv.ignore_list_limit_channel_default: 100
    memoserv.ignore_list_limit_channel: '%env(int:default:memoserv.ignore_list_limit_channel_default:MEMOSERV_IGNORE_LIST_LIMIT_CHANNEL)%'

    # OperServ pseudo-client
    operserv.uid: '%env(OPERSERV_UID)%'
    operserv.nick_default: 'OperServ'
    operserv.nick: '%env(string:default:operserv.nick_default:OPERSERV_NICK)%'
    operserv.ident_default: 'OperServ'
    operserv.ident: '%env(string:default:operserv.ident_default:OPERSERV_IDENT)%'
    operserv.realname_default: 'Network Operations Services'
    operserv.realname: '%env(string:default:operserv.realname_default:OPERSERV_REALNAME)%'
    operserv.root_users_default: ''
    operserv.root_users: '%env(string:default:operserv.root_users_default:OPERSERV_ROOT_USERS)%'
    operserv.max_glines_default: 1000
    operserv.max_glines: '%env(int:default:operserv.max_glines_default:OPERSERV_MAX_GLINES)%'

    # Mailer (verification and email-change emails)
    mailer.from: '%env(MAILER_FROM)%'
    mailer.send_delay_seconds_default: 5
    # Seconds to wait after each email send (avoids provider rate limits / blocks)
    mailer.send_delay_seconds: '%env(int:default:mailer.send_delay_seconds_default:MAILER_SEND_DELAY_SECONDS)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # --- Interface bindings ---------------------------------------------------

    App\Domain\IRC\Connection\ConnectionFactoryInterface:
        class: App\Infrastructure\IRC\Connection\SocketConnectionFactory
        arguments:
            $logger: '@monolog.logger.irc'

    App\Domain\IRC\Protocol\ProtocolHandlerRegistryInterface:
        class: App\Infrastructure\IRC\Protocol\ProtocolHandlerRegistry
        arguments:
            $handlers: !tagged_iterator irc.protocol_handler

    App\Application\Mail\MailerInterface:
        class: App\Infrastructure\Mail\SymfonyMailerAdapter
        arguments:
            $from: '%mailer.from%'
            $senderName: '%irc.server_name%'

    App\Domain\NickServ\Service\PasswordHasherInterface:
        class: App\Infrastructure\NickServ\Security\PhpPasswordHasher

    App\Infrastructure\Messenger\Middleware\EmailDelayMiddleware:
        arguments:
            $emailDelaySeconds: '%mailer.send_delay_seconds%'

    # --- Service Nickname Registry (dynamic service names for placeholders) ---------

    App\Application\ApplicationPort\ServiceNicknameRegistry:
        arguments:
            $providers: !tagged_iterator app.service_nickname_provider

    # --- Service UID Registry (resolve service nick to UID) -------------------------

    App\Application\ApplicationPort\ServiceUidRegistry:
        factory: ['App\Application\ApplicationPort\ServiceUidRegistry', 'fromIterable']
        arguments: [!tagged_iterator app.service_uid_provider]

    # --- Application services — inject the irc Monolog channel ---------------

    App\Application\IRC\IRCClientFactoryInterface: '@App\Application\IRC\IRCClientFactory'

    App\Application\IRC\IRCClientFactory:
        arguments:
            $maintenanceDispatchIntervalSeconds: '%maintenance.interval%'
            $logger: '@monolog.logger.irc'

    # --- Messenger consumer process (started/stopped with irc:connect) ---

    App\Infrastructure\Messenger\ConsumerProcessManagerInterface: '@App\Infrastructure\Messenger\ConsumerProcessManager'

    App\Infrastructure\Messenger\ConsumerProcessManager:
        arguments:
            $consolePath: '%kernel.project_dir%/bin/console'
            $transportNames: ['async', 'async_emails']

    # --- CLI command — inject .env defaults so the command runs without arguments ---

    App\Application\IRC\Connect\ConnectToServerHandlerInterface: '@App\Application\IRC\Connect\ConnectToServerHandler'

    App\UI\CLI\ConnectCommand:
        arguments:
            $consumerManager:   '@App\Infrastructure\Messenger\ConsumerProcessManager'
            $defaultServerName:  '%irc.server_name%'
            $defaultHost:        '%irc.ircd_host%'
            $defaultPort:        '%irc.ircd_port%'
            $defaultPassword:    '%irc.link_password%'
            $defaultDescription: '%irc.description%'
            $defaultProtocol:    '%irc.protocol%'
            $defaultUseTls:      '%irc.use_tls%'

    # --- Protocol modules (one per IRCd type: Unreal, InspIRCd, etc.) ---

    App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdProtocolHandler:
        arguments:
            $sid:             '%irc.server_sid%'
            $logger:          '@monolog.logger.irc'
            $eventDispatcher: '@event_dispatcher'
        tags: ['irc.protocol_handler']

    App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdProtocolHandler:
        arguments:
            $sid:             '%irc.server_sid%'
            $logger:          '@monolog.logger.irc'
            $eventDispatcher: '@event_dispatcher'
        tags: ['irc.protocol_handler']

    App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdVhostCommandBuilder: ~

    App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdVhostCommandBuilder: ~

    App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdServiceIntroductionFormatter: ~

    App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdServiceIntroductionFormatter: ~

    App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdProtocolServiceActions:
        arguments:
            $logger: '@monolog.logger.irc'

    App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdProtocolServiceActions:
        arguments:
            $logger: '@monolog.logger.irc'

    App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdNickReservation:
        arguments:
            $logger: '@monolog.logger.irc'

    App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdNickReservation:
        arguments:
            $logger: '@monolog.logger.irc'

    App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdChannelModeSupport: ~

    App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdUserModeSupport: ~

    App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdModule:
        arguments:
            $handler: '@App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdProtocolHandler'
            $serviceActions: '@App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdProtocolServiceActions'
            $introductionFormatter: '@App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdServiceIntroductionFormatter'
            $vhostCommandBuilder: '@App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdVhostCommandBuilder'
            $channelModeSupport: '@App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdChannelModeSupport'
            $userModeSupport: '@App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdUserModeSupport'
            $nickReservation: '@App\Infrastructure\IRC\Protocol\Unreal\UnrealIRCdNickReservation'
        tags: ['irc.protocol_module']

    App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdChannelModeSupport: ~

    App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdUserModeSupport: ~

    App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdModule:
        arguments:
            $handler: '@App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdProtocolHandler'
            $serviceActions: '@App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdProtocolServiceActions'
            $introductionFormatter: '@App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdServiceIntroductionFormatter'
            $vhostCommandBuilder: '@App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdVhostCommandBuilder'
            $channelModeSupport: '@App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdChannelModeSupport'
            $userModeSupport: '@App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdUserModeSupport'
            $nickReservation: '@App\Infrastructure\IRC\Protocol\InspIRCd\InspIRCdNickReservation'
        tags: ['irc.protocol_module']

    App\Infrastructure\IRC\Protocol\ProtocolModuleRegistry:
        arguments:
            $modules: !tagged_iterator irc.protocol_module

    App\Application\Port\ProtocolModuleRegistryInterface:
        alias: App\Infrastructure\IRC\Protocol\ProtocolModuleRegistry

    # --- Event subscriber — logs domain events to the irc channel ------------

    App\Infrastructure\IRC\Logging\IRCEventSubscriber:
        arguments:
            $logger: '@monolog.logger.irc'
        tags: ['kernel.event_subscriber']

    # --- Network state repositories (in-memory, live for the duration of the link) ---

    App\Domain\IRC\Repository\NetworkUserRepositoryInterface:
        class: App\Infrastructure\IRC\Network\InMemoryNetworkUserRepository

    App\Domain\IRC\Repository\ChannelRepositoryInterface:
        class: App\Infrastructure\IRC\Network\InMemoryChannelRepository

    # --- Network state: protocol router (wire → domain events) + subscriber (domain events → repos) ---

    App\Infrastructure\IRC\Network\Adapter\UnrealIRCdNetworkStateAdapter:
        arguments:
            $logger: '@monolog.logger.irc'

    App\Infrastructure\IRC\Network\Adapter\InspIRCdNetworkStateAdapter:
        arguments:
            $logger: '@monolog.logger.irc'

    App\Infrastructure\IRC\Network\NetworkEventEnricher:
        arguments:
            $logger: '@monolog.logger.irc'
        tags: ['kernel.event_subscriber']

    App\Infrastructure\IRC\Network\ProtocolNetworkStateRouter:
        arguments:
            $protocol: '%irc.protocol%'
            $adapters:
                unreal: '@App\Infrastructure\IRC\Network\Adapter\UnrealIRCdNetworkStateAdapter'
                inspircd: '@App\Infrastructure\IRC\Network\Adapter\InspIRCdNetworkStateAdapter'
        tags: ['kernel.event_subscriber']

    # --- Service Nick Reservation: SQLINE/QLINE before bot introduction ---------------------

    App\Infrastructure\IRC\ServiceBridge\ServiceNickReservationSubscriber:
        arguments:
            $connectionHolder: '@App\Infrastructure\IRC\Connection\ActiveConnectionHolder'
            $userLookup: '@App\Application\Port\NetworkUserLookupPort'
            $serviceListeners: !tagged_iterator service_command_listener
            $logger: '@monolog.logger.irc'
        tags: ['kernel.event_subscriber']

    # --- Service Command Gateway: PRIVMSG → registered service listeners ---

    App\Infrastructure\IRC\ServiceBridge\ServiceCommandGateway:
        arguments:
            $listeners: !tagged_iterator service_command_listener
            $logger: '@monolog.logger.irc'
        tags: ['kernel.event_subscriber']

    App\Infrastructure\NickServ\Subscriber\NickServCommandListener:
        arguments:
            $logger: '@monolog.logger.irc'
        tags: ['service_command_listener']

    App\Infrastructure\ChanServ\Subscriber\ChanServCommandListener:
        arguments:
            $defaultLanguage: '%services.default_language%'
            $logger: '@monolog.logger.irc'
        tags: ['service_command_listener']

    App\Infrastructure\MemoServ\Subscriber\MemoServCommandListener:
        arguments:
            $defaultLanguage: '%services.default_language%'
            $logger: '@monolog.logger.irc'
        tags: ['service_command_listener']

    App\Infrastructure\ChanServ\Subscriber\ChanServRejoinSubscriber:
        arguments:
            $logger: '@monolog.logger.irc'

    App\Infrastructure\ChanServ\Subscriber\ChanServChannelRankSubscriber:
        arguments:
            $chanservUid: '%chanserv.uid%'
            $logger: '@monolog.logger.irc'

    App\Infrastructure\ChanServ\Subscriber\ChanServEntryMsgSubscriber:
        arguments:
            $chanservUid: '%chanserv.uid%'

    App\Infrastructure\ChanServ\Subscriber\ChanServTopicApplySubscriber:
        arguments:
            $logger: '@monolog.logger.irc'

    App\Infrastructure\ChanServ\Subscriber\ChanServTopicSyncSubscriber:
        arguments:
            $chanservNick: '%chanserv.nick%'
            $nickservNick: '%nickserv.nick%'
            $logger: '@monolog.logger.irc'

    App\Infrastructure\IRC\Network\NetworkStateSubscriber:
        arguments:
            $logger: '@monolog.logger.irc'
        tags: ['kernel.event_subscriber']

    App\Infrastructure\IRC\Subscriber\CoreToAppEventBridge:
        tags: ['kernel.event_subscriber']

    App\Infrastructure\IRC\Network\LocalUserModeSync: ~

    App\Domain\IRC\LocalUserModeSyncInterface:
        alias: App\Infrastructure\IRC\Network\LocalUserModeSync

    App\Domain\IRC\SkipIdentifiedModeStripRegistryInterface:
        alias: App\Infrastructure\NickServ\PendingNickRestoreRegistry

    # --- Ports (Core ↔ Services): Core implements, Services consume ---

    App\Application\Port\NetworkUserLookupPort:
        class: App\Infrastructure\IRC\ServiceBridge\CoreNetworkUserLookupAdapter

    App\Application\Port\BurstCompletePort:
        class: App\Infrastructure\IRC\ServiceBridge\CoreBurstCompleteAdapter

    App\Application\Port\ChannelLookupPort:
        class: App\Infrastructure\IRC\ServiceBridge\CoreChannelLookupAdapter

    App\Application\Port\ApplyOutgoingChannelModesPort:
        class: App\Infrastructure\IRC\ServiceBridge\CoreApplyOutgoingChannelModesAdapter

    App\Infrastructure\IRC\Network\ApplyOutgoingChannelModesApplicatorInterface: '@App\Infrastructure\IRC\Network\NetworkEventEnricher'

    App\Application\Port\ChannelSyncCompletedRegistryInterface:
        class: App\Infrastructure\IRC\Network\ChannelSyncCompletedRegistry

    App\Infrastructure\IRC\Network\ChannelSyncCompletedMarkerSubscriber:
        arguments:
            $registry: '@App\Application\Port\ChannelSyncCompletedRegistryInterface'
        tags: ['kernel.event_subscriber']

    App\Infrastructure\Shared\Subscriber\DoctrineIdentityMapClearSubscriber:
        tags: ['kernel.event_subscriber']

    App\Application\Port\SendNoticePort:
        class: App\Infrastructure\IRC\ServiceBridge\CoreSendNoticeAdapter

    # --- CTCP Handler: handles CTCP VERSION requests ---

    App\Application\Port\SendCtcpPort:
        class: App\Infrastructure\IRC\ServiceBridge\CoreSendCtcpAdapter

    App\Infrastructure\IRC\ServiceBridge\CtcpVersionResponder:
        arguments:
            $translator: '@translator'
            $languageResolver: '@App\Infrastructure\NickServ\UserLanguageResolver'

    App\Infrastructure\IRC\ServiceBridge\CtcpHandler:
        arguments:
            $sendCtcp: '@App\Application\Port\SendCtcpPort'
            $sendNotice: '@App\Application\Port\SendNoticePort'
            $versionResponder: '@App\Infrastructure\IRC\ServiceBridge\CtcpVersionResponder'
            $userLookup: '@App\Application\Port\NetworkUserLookupPort'
            $languageResolver: '@App\Infrastructure\NickServ\UserLanguageResolver'
            $serviceUidMap:
                nickserv: '%nickserv.uid%'
                chanserv: '%chanserv.uid%'
                memoserv: '%memoserv.uid%'
                operserv: '%operserv.uid%'
            $logger: '@monolog.logger.irc'
        tags: ['kernel.event_subscriber']

    App\Application\Port\ActiveChannelModeSupportProviderInterface:
        class: App\Infrastructure\IRC\ServiceBridge\ActiveChannelModeSupportProvider

    App\Infrastructure\IRC\Protocol\NullChannelModeSupport: ~

    App\Infrastructure\IRC\ServiceBridge\ActiveChannelModeSupportProvider:
        arguments:
            $nullSupport: '@App\Infrastructure\IRC\Protocol\NullChannelModeSupport'

    # --- ActiveConnectionHolder — stores the live S2S connection for all services ---

    App\Application\Port\ActiveConnectionHolderInterface:
        alias: App\Infrastructure\IRC\Connection\ActiveConnectionHolder

    App\Infrastructure\IRC\Connection\ActiveConnectionHolder:
        tags: ['kernel.event_subscriber']

    # --- NickServ Domain --------------------------------------------------------

    App\Domain\NickServ\Repository\RegisteredNickRepositoryInterface:
        class: App\Infrastructure\NickServ\Doctrine\RegisteredNickDoctrineRepository

    App\Domain\NickServ\Repository\ForbiddenVhostRepositoryInterface:
        class: App\Infrastructure\NickServ\Doctrine\ForbiddenVhostDoctrineRepository

    App\Domain\NickServ\Repository\NickHistoryRepositoryInterface:
        class: App\Infrastructure\NickServ\Doctrine\NickHistoryDoctrineRepository

    # --- ChanServ Domain --------------------------------------------------------

    App\Domain\ChanServ\Repository\RegisteredChannelRepositoryInterface:
        class: App\Infrastructure\ChanServ\Doctrine\RegisteredChannelDoctrineRepository

    App\Domain\ChanServ\Repository\ChannelAccessRepositoryInterface:
        class: App\Infrastructure\ChanServ\Doctrine\ChannelAccessDoctrineRepository

    App\Domain\ChanServ\Repository\ChannelLevelRepositoryInterface:
        class: App\Infrastructure\ChanServ\Doctrine\ChannelLevelDoctrineRepository

    # --- MemoServ Domain --------------------------------------------------------

    App\Domain\MemoServ\Repository\MemoRepositoryInterface:
        class: App\Infrastructure\MemoServ\Doctrine\MemoDoctrineRepository

    App\Domain\MemoServ\Repository\MemoIgnoreRepositoryInterface:
        class: App\Infrastructure\MemoServ\Doctrine\MemoIgnoreDoctrineRepository

    App\Domain\MemoServ\Repository\MemoSettingsRepositoryInterface:
        class: App\Infrastructure\MemoServ\Doctrine\MemoSettingsDoctrineRepository

    # --- NickServ Bot pseudo-client ---------------------------------------------

    App\Infrastructure\NickServ\PendingNickRestoreRegistry:
        class: App\Infrastructure\NickServ\PendingNickRestoreRegistry

    App\Application\NickServ\PendingNickRestoreRegistryInterface:
        alias: App\Infrastructure\NickServ\PendingNickRestoreRegistry

    App\Application\NickServ\BurstState:
        class: App\Application\NickServ\BurstState

    App\Application\NickServ\VhostValidator: ~
    App\Application\NickServ\VhostDisplayResolver:
        arguments:
            $vhostSuffix: '%services.vhost_suffix%'

    App\Application\NickServ\IdentifiedUserVhostSyncService:
        arguments:
            $notifier:        '@App\Application\NickServ\Command\NickServNotifierInterface'
            $displayResolver: '@App\Application\NickServ\VhostDisplayResolver'
            $ircopRepository: '@App\Domain\OperServ\Repository\OperIrcopRepositoryInterface'
            $logger:          '@monolog.logger.irc'

    App\Application\NickServ\NickProtectionService:
        arguments:
            $notifier: '@App\Application\NickServ\Command\NickServNotifierInterface'
            $burstState: '@App\Application\NickServ\BurstState'
            $forbiddenService: '@App\Application\NickServ\Service\ForbiddenNickService'
            $guestPrefix: '%services.guest_prefix%'
            $defaultLanguage: '%services.default_language%'
            $eventDispatcher: '@event_dispatcher'
            $logger: '@monolog.logger.irc'

    App\Application\NickServ\Service\NickForceService:
        arguments:
            $identifiedRegistry: '@App\Application\NickServ\IdentifiedSessionRegistry'
            $notifier: '@App\Application\NickServ\Command\NickServNotifierInterface'
            $pendingRegistry: '@App\Application\NickServ\PendingNickRestoreRegistryInterface'
            $userLookup: '@App\Application\Port\NetworkUserLookupPort'
            $nickRepository: '@App\Domain\NickServ\Repository\RegisteredNickRepositoryInterface'
            $eventDispatcher: '@event_dispatcher'
            $logger: '@monolog.logger.irc'
            $guestPrefix: '%services.guest_prefix%'

    App\Application\NickServ\Service\NickSuspensionService:
        arguments:
            $userLookup: '@App\Application\Port\NetworkUserLookupPort'
            $forceService: '@App\Application\NickServ\Service\NickForceService'
            $guestPrefix: '%services.guest_prefix%'
            $logger: '@monolog.logger.irc'

    App\Application\NickServ\Service\NickDropService:
        arguments:
