framework:
    messenger:
        # Uncomment this (and the failed transport below) to send failed messages to this transport for later handling.
        # failure_transport: failed

        transports:
            sync: 'sync://'
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            # Dedicated queue for emails (delay is applied via middleware)
            async_emails: 'doctrine://default?queue_name=emails&auto_setup=0'

        routing:
            App\Application\Maintenance\Message\RunMaintenanceCycle: sync
            App\Application\Mail\Message\SendEmail: async_emails

        buses:
            default:
                middleware:
                    - App\Infrastructure\Messenger\Middleware\EmailDelayMiddleware

