services:
  ares:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        UID: ${UID:-1000}
    container_name: ares-irc-services
    restart: unless-stopped

    # Bind mounts for persistence
    volumes:
      - ../var/data:/app/var/data
      - ../var/log:/app/var/log
      - ../.env.local:/app/.env.local

    # Network configuration for external IRCD access
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - APP_ENV=prod

    healthcheck:
      test: ["CMD", "pgrep", "-f", "php bin/console irc:connect"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
